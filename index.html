// 疊加設施 pipeline：基座處理完後依序套用每個 overlay 的 fn / FX，並把 base 的格子加成套用到每個 overlay 上
function applyOverlayPipeline(el, r, c, cellEl){
  const ovs=getOverlays(r,c);
  if(!ovs||ovs.length===0) return el;
  const k=`${r},${c}`;
  const cellMod=(G.cellMods&&G.cellMods[k]||0)+(G.permCellMods&&G.permCellMods[k]||0);
  const upgradeBonus=(G.bldgUpgrades&&G.bldgUpgrades[k])||0;
  const pctMod=(G.cellPctMods&&G.cellPctMods[k])||0;
  const leyaPct=(G.leyaPctMods&&G.leyaPctMods[k])||0;
  for(const ovId of ovs){
    const ob=BLDG[ovId];
    if(!ob) continue;
    // 類型匹配（暴食惡魔互換）
    let effType=el.type;
    if(hasPartner('gluttony')){
      if(el.type==='material') effType='goods';
      else if(el.type==='goods') effType='material';
    }
    if(ob.req&&ob.req!=='any'&&ob.req!==effType&&ob.req!==el.type) continue;
    const prev={...el};
    // 套用 overlay 的特效 FX 或 基礎 fn
    if(ob.special&&FACILITY_FX[ob.special]){
      const ovFx={
        el:{...el}, r, c, cellEl,
        hit(){}, next(){},
        pulse(){pulse(r,c);},
        updateCard(){}, updateMover(){},
      };
      try{ FACILITY_FX[ob.special](ovFx); }catch(e){ console.warn('overlay FX 失敗:',ovId,e); continue; }
      el=ovFx.el;
    } else if(ob.fn){
      el={value:ob.fn(el.value), type:(ob.out||el.type)};
    }
    // 套用與 base 相同的格子加成（每個 overlay 都吃）
    const totalFixed=cellMod+upgradeBonus;
    if(totalFixed!==0) el.value=Math.max(0,el.value+totalFixed);
    if(pctMod!==0){
      const chg=Math.ceil(Math.abs(el.value*pctMod/100))*Math.sign(pctMod);
      el.value=Math.max(1,el.value+chg);
    }
    if(leyaPct>0) el.value=el.value+Math.ceil(el.value*leyaPct/100);
    G.inv.facHit=(G.inv.facHit||0)+1;
    if(G.inv.facPath) G.inv.facPath.push(ovId);
    addLog(`  🔁 疊加 ${ob.emoji}${ob.name}: ${TLABEL[prev.type]||prev.type}${prev.value}→${TLABEL[el.type]||el.type}${el.value}`,'g');
  }
  return el;
}

let _stepAnimGen=0; // 動畫世代計數器，用於取消殘留 setTimeout
function cancelStepAnim(){ _stepAnimGen++; const m=document.getElementById('el-mover'); if(m) m.style.display='none'; }
function stepWithMover(path,el,i,startVal,mover,updateMover){
  const gen=_stepAnimGen; // 捕獲當前世代
  if(i>=path.length){
    mover.style.display='none';
    finish(el,startVal);
    return;
  }
  const[r,c]=path[i];

  // 記錄實際經過的格子（工業化用）
  if(G.inv.cellPath) G.inv.cellPath.push([r,c]);

  // 移動移動器到格子位置
  const cellEl=cellQ(r,c);
  if(cellEl){
    const rect=cellEl.getBoundingClientRect();
    mover.style.left=(rect.left+2)+'px';
    mover.style.top=(rect.top+2)+'px';
  }

  const bId=G.grid[r][c];

  // 高亮當前格（跳過百貨公司格子避免 overlay 閃爍）
  if(stepWithMover._prevActive) stepWithMover._prevActive.classList.remove('active-path');
  const _isDeptCell=bId==='dept_store'||bId==='dept_store_part';
  if(cellEl&&!_isDeptCell) cellEl.classList.add('active-path');
  stepWithMover._prevActive=_isDeptCell?null:cellEl;
  // 速遞站：經過空格或廢墟時消耗 flag（效果浪費）
  if((!bId||bId==='ruin')&&G.inv.speedAct) G.inv.speedAct=false;
  // ── 共用尾碼 helper ──
  // 速遞站：上一格觸發速遞站後，本格設施額外觸發一次
  const _speedReplay=G.inv.speedAct&&bId&&isFacility(bId)&&BLDG[bId]?.special!=='speed_station';
  if(_speedReplay) G.inv.speedAct=false;
  const _next=(delay=350)=>{
    if(_speedReplay){
      addLog(`  ⚡ 速遞站：再觸發一次！`,'g');
      setTimeout(()=>{ if(_stepAnimGen!==gen) return; stepWithMover(path,el,i,startVal,mover,updateMover); },delay);
    } else {
      setTimeout(()=>{ if(_stepAnimGen!==gen) return; stepWithMover(path,el,i+1,startVal,mover,updateMover); },delay);
    }
  };
  const _prevValFx=el.value; // 大熱波：FACILITY_FX 用
  const _hit=(delay=350)=>{
    G.inv.facHit=(G.inv.facHit||0)+1;
    SFX.hit(G.inv.facHit-1);
    if(G.inv.facPath) G.inv.facPath.push(bId);
    if(G.inv.facProfitMap){const gain=el.value-_prevValFx;if(gain>0) G.inv.facProfitMap[bId]=(G.inv.facProfitMap[bId]||0)+gain;}
    pulse(r,c);updateCard(el);updateMover(el);
    // 疊加設施也吃相同加成（非 redirect 基座；redirect 分支有自己的 overlay 處理）
    if(BLDG[bId]&&BLDG[bId].special!=='redirect'){
      const _ovBefore=el;
      el=applyOverlayPipeline(el,r,c,cellEl);
      if(el!==_ovBefore){ updateCard(el); updateMover(el); }
    }
    _next(delay);
  };
  // ── 廢墟：資源直接通過，不產生任何交互 ──
  if(bId==='ruin'){
    G._ruinPassedThisTurn=true; // 移動都市負面檢查用
    // 無冕之王：每次投入廢墟前，所有廢墟收益+2（累積）
    if(hasPartner('uncrowned_king')){
      const ruinCount=G.ruinCells?G.ruinCells.size:0;
      const add=ruinCount*2;
      G.inv._uncrownedBonus=(G.inv._uncrownedBonus||0)+add;
      addLog(`  👑 無冕之王：投入廢墟，${ruinCount}廢墟×2 = +${add}（累計${G.inv._uncrownedBonus}）`,'g');
    }
    // 廢墟掠奪者：每回合第一次投入廢墟時，資源-4或-6，重疊等量廢墟
    if(hasPartner('ruin_scavenger')&&!G.inv._ruinScavengerUsed){
      G.inv._ruinScavengerUsed=true;
      const penalty=Math.random()<0.5?4:6;
      el={...el,value:Math.max(1,el.value-penalty)};
      addLog(`  💀 廢墟掠奪者：投入廢墟，資源-${penalty}→${el.value}`,'b');
      // 在該格重疊等量廢墟（概念上堆疊，不影響格子狀態但記錄）
      addLog(`  💀 廢墟掠奪者：${penalty}個廢墟重疊至 (${r+1},${c+1})`);
      updateCard(el); updateMover(el);
    }
    _next(300); return;
  }
  if(bId){
    const b=BLDG[bId];
    TUT.hookStep(bId);

    // ── 人材幣通過商店：×3 變金錢 ──
    // (人材幣機制已移除)
    // ── 鑽石通過商店：×12 變金錢 ──
    if(el.type==='diamond' && isShopType(bId)){
      const prev={...el};
      let nv=el.value*12+(G.bldgUpgrades&&G.bldgUpgrades[`${r},${c}`]||0);
      el={value:nv,type:'money'};
      cellEl?.classList.add('transform-flash');
      setTimeout(()=>cellEl?.classList.remove('transform-flash'),500);
      if(cellEl){
        const badge=document.createElement('div');
        badge.className='change-badge';
        badge.textContent=`💚 ${BLDG.shop.emoji}商店: 💎${prev.value} → 💰${nv} (×12)`;
        badge.style.background=TCOLOR.money;
        cellEl.appendChild(badge);
        setTimeout(()=>badge.remove(),800);
      }
      addLog(`  🏪 商店: 💎鑽石 ${prev.value} → 💰金錢 ${nv} (×12)`,'g');
      G.partners.forEach(pid=>{ const p=PARTNERS[pid]; if(p&&p.onBuildingHit){ const pb=G.profit; p.onBuildingHit(G,'shop'); const g=G.profit-pb; if(g>0){addLog(`  ${p.emoji}${p.name}：+${g} 收益`,'g');setTimeout(()=>profitFlyFromPartner(pid,g),200);} } });
      _hit(); return;
    }

    // ── 設施特效調度 ──
    if(b.special && FACILITY_FX[b.special]){
      let _fxDone=false;
      const fx={
        el, r, c, cellEl,
        hit(d=350){_fxDone=true;el=fx.el;_hit(d);},
        next(d=350){_fxDone=true;el=fx.el;_next(d);},
        pulse(){pulse(r,c);},
        updateCard(){el=fx.el;updateCard(el);},
        updateMover(){el=fx.el;updateMover(el);},
      };
      FACILITY_FX[b.special](fx);
      if(_fxDone) return;
      el=fx.el;
    }

    // ── 物流中心：轉向 ──
    if(b.special==='redirect'){
      // 颱風/運輸異常：物流失效
      if(G.buff&&(G.buff.typhoonActive||G.buff.logisticsDisabled)){
        const reason=G.buff.typhoonActive?'颱風':'運輸異常';
        addLog(`  ${b.emoji}${b.name}: ${reason}導致物流失效，略過`,'b');
        _next(300); return;
      }
      // 每次投入每格只能觸發一次
      const cellKey=`${r},${c}`;
      if(G.inv.logSet&&G.inv.logSet.has(cellKey)){
        addLog(`  ${b.emoji}${b.name}: 已觸發過，略過`);
        _next(300); return;
      }
      if(!G.inv.logSet) G.inv.logSet=new Set();
      G.inv.logSet.add(cellKey);
      // 運輸大亨：每次通過物流+3
      if(hasPartner('transport_tycoon')){
        el={...el,value:el.value+3};
        addLog(`  🚢 運輸大亨：通過物流+3→${el.value}`,'g');
        G.inv.logHits=(G.inv.logHits||0)+1;
      }
      SFX.hit(G.inv.facHit||0);
      pulse(r,c);
      cellEl?.classList.add('transform-flash');
      setTimeout(()=>cellEl?.classList.remove('transform-flash'),400);

      // 物流中心：當前方向存於 cellRedirectDir，覆蓋 BLDG.dir
      const isPerTurnRot=b.perTurnRotate;
      const cellDir=(G.cellRedirectDir&&G.cellRedirectDir[cellKey])||b.dir;
      // upgrade bonus (有 overlay 時升級屬於 overlay 設施，redirect 不重複計算)
      const _hasOverlay=G.cellOverlay&&G.cellOverlay[`${r},${c}`];
      const upgradeBonus=_hasOverlay?0:(G.bldgUpgrades?.[`${r},${c}`]||0);
      if(upgradeBonus>0){
        el={...el,value:el.value+upgradeBonus};
        addLog(`  ${b.emoji}${b.name}: 轉向 + 升級加成 +${upgradeBonus} → ${el.value}`);
      } else {
        addLog(`  ${b.emoji}${b.name}: 轉向 ${cellDir}`);
      }
      updateCard(el);
      setTimeout(()=>{ if(_stepAnimGen!==gen) return; updateMover(el); },100);

      // rebuild remaining path from next cell in new direction
      const newDir=cellDir;
      if(isPerTurnRot){
        if(!G._logCenterRotated) G._logCenterRotated=new Set();
        if(!G._logCenterRotated.has(cellKey)){
          const rotMap={right:'bottom',bottom:'left',left:'top',top:'right'};
          const nextDir=rotMap[cellDir]||'right';
          if(!G.cellRedirectDir) G.cellRedirectDir={};
          G.cellRedirectDir[cellKey]=nextDir;
          G._logCenterRotated.add(cellKey);
          const arrowMap={right:'→',bottom:'↓',left:'←',top:'↑'};
          addLog(`  ${b.emoji}${b.name}: 自動切換方向 ${arrowMap[cellDir]}→${arrowMap[nextDir]}（每回合一次）`,'b');
        }
      }
      const newPath=[];
      let nr=r,nc=c;
      const visited=new Set();
      visited.add(`${r},${c}`);
      const _gn2=GN();
      for(let s=0;s<_gn2*4;s++){
        if(newDir==='top')    nr--;
        if(newDir==='bottom') nr++;
        if(newDir==='left')   nc--;
        if(newDir==='right')  nc++;
        if(nr<0||nr>=_gn2||nc<0||nc>=_gn2) break;
        if(visited.has(`${nr},${nc}`)) break; // 防止迴圈
        visited.add(`${nr},${nc}`);
        newPath.push([nr,nc]);
      }

      // 疊加設施：使用統一 pipeline，每個 overlay 都吃到與 base 相同的格子加成
      el=applyOverlayPipeline(el,r,c,cellEl);
      updateCard(el);
      setTimeout(()=>{ if(_stepAnimGen!==gen) return; updateMover(el); },100);
      setTimeout(()=>{
        if(_stepAnimGen!==gen) return;
        if(newPath.length===0){
          mover.style.display='none';
          if(stepWithMover._prevActive){stepWithMover._prevActive.classList.remove('active-path');stepWithMover._prevActive=null;}
          finish(el,startVal);
        } else {
          stepWithMover(newPath,el,0,startVal,mover,updateMover);
        }
      },400);
      return;
    }

    // 暴食惡魔：material<->goods 互換用於匹配和輸出
    let effType=el.type;
    if(hasPartner('gluttony')){
      if(el.type==='material') effType='goods';
      else if(el.type==='goods') effType='material';
    }
    if(b.req==='any'||b.req===effType||b.req===el.type){
      // 運輸異常：原料無法→商品
      if(G.buff&&G.buff.noMatToGoods&&(el.type==='material'||effType==='material')&&b.out==='goods'){
        addLog(`  🚫 ${b.emoji}${b.name}：運輸異常，原料無法轉為商品，略過`,'b');
        _next(300); return;
      }
      // 嫉妒惡魔：進入嫉妒工廠前若已有設施命中則中斷
      if(hasPartner('envy')&&bId==='envy_factory'&&(G.inv.facHit||0)>0){
        addLog('  💚 嫉妒惡魔：已經過其他設施，嫉妒工廠中斷','b');
        setTimeout(()=>{ if(_stepAnimGen!==gen) return; mover.style.display='none'; if(stepWithMover._prevActive){stepWithMover._prevActive.classList.remove('active-path');stepWithMover._prevActive=null;} finish(el,startVal); },400);
        return;
      }
      // 嫉妒工廠負面：投入時非鑽石則最終收益-50%
      if(bId==='envy_factory' && el.type!=='diamond'){
        G.inv.envyPen=true;
        addLog('  💚 嫉妒工廠：非鑽石投入，最終收益將-50%','b');
      }
      // 暴食惡魔：若匹配是因為互換，則視為互換類型進入
      if(hasPartner('gluttony')&&b.req===effType&&b.req!==el.type) el={...el,type:effType};
      G.inv.facHit=(G.inv.facHit||0)+1;
      if(G.inv.facPath) G.inv.facPath.push(bId);
      // 電子放電惡魔：追蹤電子/非電子設施命中
      if(hasPartner('elec_discharge_demon')){
        const isElec=hasTag(bId,'electronic');
        if(isElec) G.inv._elecHits=(G.inv._elecHits||0)+1;
        else G.inv._nonElecHits=(G.inv._nonElecHits||0)+1;
      }
      // 電子輸送帶：下一個電子設施永久+2
      if(G.inv._elecConveyorActive&&hasTag(bId,'electronic')){
        const ek=`${r},${c}`;
        G.bldgUpgrades[ek]=(G.bldgUpgrades[ek]||0)+2;
        addLog(`  ⚡ 電子輸送帶：${BLDG[bId].name} 永久+2`,'g');
        G.inv._elecConveyorActive=false;
      }
      const _prevVal=el.value; // 大熱波：記錄轉換前數值
      if(isCenterCell(r,c)){ G.inv.cenHits=(G.inv.cenHits||0)+1; G.inv.hwCenter=true; }
      const prev={...el};
      const modKey=`${r},${c}`;
      const upgradeBonus=(!b.special||b.special==='cafeteria')&&G.bldgUpgrades?.[modKey]||0;

      // ── Step 1: 基礎轉換 ──
      let nv=b.fn(el.value);
      let nt=b.out||el.type;

      // 套利者負面：原料→商品不增加數值
      if(hasPartner('arbitrageur')&&prev.type==='material'&&nt==='goods'){
        nv=prev.value; // 保持原值，不增加
        addLog(`  ⚖️ 套利者：原料→商品不增加數值`,'b');
      }
      // 物流放大器：下一設施這回合獲得+8（加到 nv）
      if(G.inv.ampAct){ nv=nv+8; G.inv.ampAct=false; addLog(`  📡 物流放大器：+8 → ${nv}`,'g'); }

      // 暴食惡魔：輸出類型互換
      if(hasPartner('gluttony')){
        if(nt==='material') nt='goods';
        else if(nt==='goods') nt='material';
      }

      // ── Step 2: 事件 buff 加成 ──
      // 原料大降：金錢→原料×2，原料→金錢÷2，原料→商品×2
      if(G.buff.matCrash){
        if(prev.type==='money'&&nt==='material'){ nv=nv*2; addLog(`  📉 原料大降：金錢→原料 ×2`,'w'); }
        else if(prev.type==='material'&&nt==='money'){ nv=Math.max(1,Math.floor(nv/2)); addLog(`  📉 原料大降：原料→金錢 ÷2`,'b'); }
        else if(prev.type==='material'&&nt==='goods'){ nv=nv*2; addLog(`  📉 原料大降：原料→商品 ×2`,'w'); }
      }
      // 原料出口熱 ×2 + 累積加成（與原料大降互斥）
      if(G.buff.matOutMult&&!G.buff.matCrash&&prev.type==='material'&&nt!=='material'){
        nv=Math.round(nv*G.buff.matOutMult);
        if(G.buff.matBoomExtra){ nv+=G.buff.matBoomExtra; addLog(`  📈 原料出口熱累積：+${G.buff.matBoomExtra}`,'g'); }
      }
      if(G.buff.matToMoneyDouble&&prev.type==='material'&&nt==='money'){
        nv=nv*2;
        addLog(`  🌀 颱風：原料→金錢翻倍！`,'w');
      }
      // 重大食安：金錢→商品時 -5（最小1）
      if(G.buff.moneyToGoodsPenalty&&prev.type==='money'&&nt==='goods'){
        nv=Math.max(1,nv-5);
        addLog(`  🍽 重大食安：金錢→商品 -5 → ${nv}`,'b');
      }

      // ── Step 3: 格子固定加成 + 升級加成 ──
      let cellMod=(G.cellMods[modKey]||0)+(G.permCellMods&&G.permCellMods[modKey]||0);
      // 激情惡魔：逆轉減益
      if(cellMod<0 && hasPartner('wrath')){
        cellMod=-cellMod;
        addLog(`  🔥 激情惡魔：減益逆轉 → +${cellMod}`,'g');
        G.partnerState.wrath=G.partnerState.wrath||{noDebuffTurns:0};
        G.partnerState.wrath.noDebuffTurns=0;
      }
      const totalFixed=cellMod+upgradeBonus;
      if(totalFixed!==0) nv=Math.max(0,nv+totalFixed);

      // ── Step 3.5: 格子百分比修正（+10%/-10%，向上取整，最小1） ──
      const pctMod=G.cellPctMods?G.cellPctMods[modKey]||0:0;
      if(pctMod!==0){
        const pctChange=Math.ceil(Math.abs(nv*pctMod/100))*Math.sign(pctMod);
        nv=Math.max(1,nv+pctChange);
        addLog(`  ${pctMod>0?'📈':'📉'} 格子${pctMod>0?'+':''}${pctMod}%：${pctMod>0?'+':''}${pctChange} → ${nv}`);
      }

      // ── Step 3.6: 蕾雅升級百分比加成（永久，+2%可累積） ──
      const leyaPct=G.leyaPctMods?G.leyaPctMods[modKey]||0:0;
      if(leyaPct>0){
        const leyaChange=Math.ceil(nv*leyaPct/100);
        nv=nv+leyaChange;
        addLog(`  👩‍🔧 蕾雅+${leyaPct}%：+${leyaChange} → ${nv}`);
      }

      // ── Step 4: 商品熱銷固定加成 ──
      if(G.buff.goodsBonus&&prev.type==='goods'&&nt==='money'){
        nv+=G.buff.goodsBonus;
      }

      // ── Step 5: 下次輸出加成（nextBonus）──
      if(G.nextBonus&&G.nextBonus.amount>0){
        if(G.nextBonus.type==='any'||G.nextBonus.type===nt){
          nv+=G.nextBonus.amount;
          addLog(`  ✨ 下次輸出加成：+${G.nextBonus.amount}（${TLABEL[nt]}輸出）`,'g');
          G.nextBonus=null; // 消耗一次
        }
      }

      // ── Step 6: 合夥人設施命中效果 ──
      // 黑市商人：商品→金錢時額外倍率
      if(hasPartner('black_market')&&prev.type==='goods'&&nt==='money'){
        const st=G.partnerState.black_market||{mult:1.25};
        if(st.mult>1){
          const bmBonus=Math.ceil(nv*(st.mult-1));
          nv+=bmBonus;
          addLog(`  🕶️ 黑市商人：商品→金錢 ×${(st.mult*100).toFixed(0)}% +${bmBonus}`,'g');
        }
        st.mult=Math.max(1,st.mult-0.5);
        G.partnerState.black_market=st;
      }
      // 壟斷者負面：少於4商店時，商店不參與投入（跳過效果）
      if(hasPartner('monopolist')&&isShopType(bId)&&countAllShops()<4){
        nv=prev.value; nt=prev.type; // 還原為通過前狀態
        addLog(`  🎩 壟斷者：商店不足4個，${b.emoji}${b.name}不參與投入`,'b');
      }
      // 追蹤轉換方向（外匯交易員/套利者用）
      if(prev.type==='money'&&nt==='goods'){ G.inv.fxM2G=true; G.inv.arbM2G=true; }
      if(prev.type==='goods'&&nt==='money'){ G.inv.fxG2M=true; G.inv.arbG2M=true; }
      // 外匯交易員：追蹤金錢投入次數
      if(prev.type==='money') G.inv._forexMoneyCount=(G.inv._forexMoneyCount||0)+1;

      el={value:nv,type:nt};

      pulse(r,c);
      cellEl?.classList.add('transform-flash');
      setTimeout(()=>cellEl?.classList.remove('transform-flash'),500);

      if(cellEl){
        const badge=document.createElement('div');
        badge.className='change-badge';
        badge.textContent=`${b.emoji} ${TLABEL[prev.type]}${prev.value}→${TLABEL[el.type]}${el.value}${el.value!==prev.value?` (+${el.value-prev.value})`:''}`;
        badge.style.background=TCOLOR[el.type]||'var(--green)';
        cellEl.style.position='relative';
        cellEl.appendChild(badge);
        setTimeout(()=>badge.remove(),700);
      }

      // partner onBuildingHit
      G.partners.forEach(pid=>{
        const p=PARTNERS[pid];
        if(p&&p.onBuildingHit){
          const profitBefore=G.profit;
          p.onBuildingHit(G,G.grid[r][c]);
          const gained=G.profit-profitBefore;
          if(gained>0){
            addLog(`★ ${p.emoji}${p.name}：+${gained} 收益`,'g');
            setTimeout(()=>profitFlyFromPartner(pid,gained),200);
          }
        }
      });
      const upgrade=upgradeBonus;
      // 建立算式說明（包含所有加成）
      let calcParts=[];
      const baseChg=b.fn(1)-1;
      if(baseChg!==0||nt!==prev.type) calcParts.push(`基礎${baseChg>=0?'+':''}${baseChg}`);
      if(G.buff.matCrash&&prev.type==='material') calcParts.push('原料大降');
      if(G.buff.matOutMult&&!G.buff.matCrash&&prev.type==='material'&&nt!=='material') calcParts.push(`出口熱×${G.buff.matOutMult}`);
      if(G.buff.matToMoneyDouble&&prev.type==='material'&&nt==='money') calcParts.push(`颱風×2`);
      if(upgrade>0) calcParts.push(`升級+${upgrade}`);
      if(cellMod>0) calcParts.push(`格子+${cellMod}`);
      if(cellMod<0) calcParts.push(`格子${cellMod}`);
      if(G.buff.goodsBonus&&prev.type==='goods'&&nt==='money') calcParts.push(`熱銷+${G.buff.goodsBonus}`);
      const calcStr=calcParts.length?`（${calcParts.join('，')}）`:'';
      addLog(`  ${b.emoji}${b.name}: ${TLABEL[prev.type]}${prev.value}→${TLABEL[el.type]}${el.value}${calcStr}`);
      // 大熱波：記錄設施轉換增益
      if(G.inv.facProfitMap){ const gain=el.value-_prevVal; if(gain>0) G.inv.facProfitMap[bId]=(G.inv.facProfitMap[bId]||0)+gain; }
      if(el.type!==prev.type) SFX.convert(G.inv.facHit-1); else SFX.hit(G.inv.facHit-1);
      // 疊加設施也吃相同加成
      el=applyOverlayPipeline(el,r,c,cellEl);
      updateCard(el);
      setTimeout(()=>{ if(_stepAnimGen!==gen) return; updateMover(el); _next(); },350);
      return;
    } else {
      // 類型不符：略過此格，繼續前進
      addLog(`  ⏭ ${b.emoji}${b.name} 類型不符（需要 ${TLABEL[b.req]}），略過`);
    }
  }
  _next(300);
}

function finish(el,startVal){
  if(stepWithMover._prevActive){stepWithMover._prevActive.classList.remove('active-path');stepWithMover._prevActive=null;}
  // ── 工業化模式：攔截結算，建立巨型設施 ──
  if(G._industrializing){
    G._industrializing=false;
    document.getElementById('indust-hint')?.remove();
    const dir=G.inv.sendDir;
    const idx=G.inv.sendIdx;
    const cellPath=G.inv.cellPath||[];
    // 計算入口格
    const gn=GN();
    let entryR=0, entryC=0;
    if(dir==='left'){entryR=idx;entryC=0;}
    if(dir==='right'){entryR=idx;entryC=gn-1;}
    if(dir==='top'){entryR=0;entryC=idx;}
    if(dir==='bottom'){entryR=gn-1;entryC=idx;}
    // 輸出類型
    if(el.type==='diamond') el={value:el.value,type:'money'};
    const finalMoney=el.type==='money'?el.value:Math.floor(el.value*0.6);
    const profit=Math.max(0,finalMoney-startVal);
    const outputType=el.type;
    // 建立巨型設施（使用實際路徑）
    const mega=createMegaFacilityFromRun(entryR,entryC,dir,cellPath,'money',outputType,profit);
    const _mi=megaIcons(mega);
    addLog(`🏭 工業化完成！${_mi.flow}，模擬收益 +${profit}`,'g');
    G.phase='done';
    render();
    return;
  }
  if(TUT.hookFinishPre(el)) return;
  // (人材幣機制已移除)
  // Diamond exits without shop: convert at face value (no bonus)
  if(el.type==='diamond') el={value:el.value,type:'money'};
  // Lust demon
  if(hasPartner('lust')){
    el=PARTNERS.lust.modifyFinish(G,el,G.inv.facHit||0);
  }
  const finalMoney=el.type==='money'?el.value:Math.floor(el.value*0.6);
  const profit=Math.max(0,finalMoney-startVal);
  const profitAtStart=G.profit;
  G.profit+=profit;
  if(profit>0) SFX.settle();
  // 清倉拍賣場：結算時入帳
  if(G.inv.clearanceBonus>0){
    G.profit+=G.inv.clearanceBonus;
    addLog(`  🏷️ 清倉拍賣場結算：+${G.inv.clearanceBonus}收益`,'g');
    (G.inv.clearanceCells||[]).forEach((cc,i)=>setTimeout(()=>profitFlyFromCell(cc.r,cc.c,cc.bonus),i*200));
    G.inv.clearanceBonus=0; G.inv.clearanceCells=[];
  }
  // 匯率波動板：效果已移至通過時（FACILITY_FX.exchange_board）；這裡不再做結算加成
  // ── 合夥人結算效果（onSettle hook） ──
  // 執行順序：依 G.partners 陣列順序（即招募順序）。
  // 後面的 onSettle 會吃到前面修改後的 G.profit。
  // 順序在此之後：稅務局(-10%) → 嫉妒工廠(-50%) → 勞工保險(-人材×2%)
  G.partners.forEach(pid=>{
    const p=PARTNERS[pid];
    if(p&&p.onSettle){
      try{ p.onSettle.call(p, G, profit, el); }
      catch(e){ console.warn('partner.onSettle 失敗:',pid,e); }
    }
  });
  // ── 新設施結算效果 ──
  // H2: 世界奇觀：每有一個人材+8
  if(findCells((r,c,b)=>b==='world_wonder').length>0){
    const tc=G.talentCards||0;
    if(tc>0){ const wb=tc*8; G.profit+=wb; addLog(`🏟 世界奇觀：${tc}人材×8 → +${wb}收益`,'g'); }
  }
  // H3: 古代的機械工廠：所有工廠被投入+8
  if(findCells((r,c,b)=>b==='ancient_factory').length>0&&profit>0){
    const factoryHits=(G.inv.facPath||[]).filter(id=>id==='factory'||id==='adv_factory').length;
    if(factoryHits>0){ const ab=factoryHits*8; G.profit+=ab; addLog(`🏛 古代機械工廠：${factoryHits}次工廠投入×8 → +${ab}收益`,'g'); }
  }
  // H4: 廢鐵城：回合結束消滅所有廢墟，+x收益（x每消滅設施+2累積）
  findCells((r,c,b)=>b==='scrap_city').forEach(([sr,sc])=>{
    const st=G.partnerState._scrapCity||{x:0};
    const ruinList=G.ruinCells?[...G.ruinCells]:[];
    if(ruinList.length>0){
      ruinList.forEach(key=>{
        const [rr,rc]=key.split(',').map(Number);
        G.grid[rr][rc]=null;
        G.ruinCells.delete(key);
        clearKeyedData(key);
      });
      addLog(`🏚 廢鐵城：消滅${ruinList.length}個廢墟，+${st.x}收益`,'g');
      G.profit+=st.x;
    }
    G.partnerState._scrapCity=st;
  });
  // H5: 災害控管局：回合結束每消滅一個設施+4
  if(findCells((r,c,b)=>b==='disaster_bureau').length>0){
    const destroyed=G.inv._facilitiesDestroyedThisTurn||0;
    if(destroyed>0){ const db=destroyed*4; G.profit+=db; addLog(`🛡 災害控管局：${destroyed}設施被消滅×4 → +${db}收益`,'g'); }
  }
  // H6: 員工住宅：回合結束未投入則+4人材
  findCells((r,c,b)=>b==='staff_housing').forEach(([sr,sc])=>{
    const hitSet=G.inv._staffHousingHit||new Set();
    if(!hitSet.has(`${sr},${sc}`)){
      G.talentCards=(G.talentCards||0)+4;
      addLog(`🏠 員工住宅 (${sr+1},${sc+1})：未投入，+4人材`,'g');
    }
  });
  // H7: 中央監督局：此回合沒有投入時，每經過一個對應設施+2
  if((G.inv.facHit||0)===0){
    const bureauTypes={center_factory_bureau:['factory','adv_factory'],center_shop_bureau:'_shop',center_mat_bureau:['mat_factory','adv_mat_factory']};
    Object.entries(bureauTypes).forEach(([bId,targets])=>{
      findCells((r,c,b)=>b===bId).forEach(()=>{
        let count=0;
        if(targets==='_shop') count=countAllShops();
        else eachCell((r,c,b)=>{if(b&&targets.includes(b))count++;});
        if(count>0){ const bb=count*2; G.profit+=bb; addLog(`${BLDG[bId].emoji} ${BLDG[bId].name}：${count}設施×2 → +${bb}收益`,'g'); }
      });
    });
  }
  // 稅務局：-10%最終收益（以本回合 G.profit 實際增量為基數，含 onSettle 加成）
  {
    const turnGain=G.profit-profitAtStart;
    if(turnGain>0){
      const taxCells=findCells((r,c,b)=>b==='tax_office');
      if(taxCells.length>0){
        const cut=Math.ceil(turnGain*0.1);
        G.profit-=cut;
        addLog(`  🏛 稅務局：-10% (-${cut})`,'b');
        setTimeout(()=>profitFlyFromCell(taxCells[0][0],taxCells[0][1],-cut),150);
      }
    }
  }
  if(G.inv.envyPen && profit>0 && !isDemonNegDisabled('envy')){
    const cut=Math.floor(profit*0.5);
    G.profit-=cut;
    addLog(`💚 嫉妒工廠負面：收益-50% (-${cut})`,'b');
    const envyCells=findCells((r,c,b)=>b==='envy_factory');
    if(envyCells.length>0) setTimeout(()=>profitFlyFromCell(envyCells[0][0],envyCells[0][1],-cut),150);
    G.inv.envyPen=false;
  }
  // 黃牛販子：本次投入有經過且最終收益為 0 時 -8
  if((G.inv._scalperHits||0)>0 && profit<=0){
    G.profit-=8;
    addLog(`🎫 黃牛販子：本回合沒有獲得收益，-8`,'b');
    const scCells=findCells((r,c,b)=>b==='scalper');
    if(scCells.length>0) setTimeout(()=>profitFlyFromCell(scCells[0][0],scCells[0][1],-8),150);
  }
  // 勞工保險：最終收益扣除 人材數×2%
  if(G.buff&&G.buff.laborInsurance&&profit>0){
    const talents=G.talentCards||0;
    const pct=talents*2;
    if(pct>0){
      const cut=Math.ceil(profit*pct/100);
      G.profit-=cut;
      addLog(`📋 勞工保險：人材${talents}×2=${pct}%，收益-${cut}`,'b');
    }
  }
  // 移動都市負面：本回合若沒有投入過廢墟，最終收益變為 0
  if(findCells((r,c,b)=>b==='mobile_city').length>0 && !G._ruinPassedThisTurn){
    const cut=G.profit-profitAtStart;
    if(cut>0){
      G.profit=profitAtStart;
      addLog(`🏙 移動都市：本回合未投入廢墟，最終收益歸 0（-${cut}）`,'b');
      const mcCells=findCells((r,c,b)=>b==='mobile_city');
      if(mcCells.length>0) setTimeout(()=>profitFlyFromCell(mcCells[0][0],mcCells[0][1],-cut),150);
    }
  }
  addLog(`💰 結算：${TLABEL[el.type]}${el.value} → 入帳${finalMoney}，+${profit}收益`,'g');

  // 收益飛行動畫
  const profitEl=document.getElementById('el-profit');
  const profitRect=profitEl.getBoundingClientRect();
  const targetEl=document.getElementById('r-profit');
  const targetRect=targetEl.getBoundingClientRect();
  const fly=document.createElement('div');
  fly.className='profit-fly';
  fly.textContent=`+${profit}`;
  fly.style.left=profitRect.left+'px';
  fly.style.top=profitRect.top+'px';
  const dx=targetRect.left-profitRect.left;
  fly.style.setProperty('--fly-x',dx+'px');
  document.body.appendChild(fly);
  setTimeout(()=>fly.remove(),1300);

  // 累積本回合投入次數：SFX 會映射到五聲音階（避免刺耳音程），上限在 pitchOffset 內處理
  G._turnPitchOffset = (G._turnPitchOffset||0) + 1;

  // 計算本回合總收益（含所有合夥人加成）並更新顯示
  const totalTurnProfit=G.profit-profitAtStart;
  // 追蹤連續零收益回合（安全網機制）
  if(totalTurnProfit<=0) G._zeroProfitTurns=(G._zeroProfitTurns||0)+1;
  else G._zeroProfitTurns=0;
  const hasBonus=totalTurnProfit!==profit;
  let profitHTML=`<span style="color:var(--green);font-size:18px;">+${totalTurnProfit}</span>`;
  if(hasBonus) profitHTML+=`<div style="font-size:9px;color:var(--mu);margin-top:2px;">投入+${profit}，加成${totalTurnProfit-profit>=0?'+':''}${totalTurnProfit-profit}</div>`;
  document.getElementById('el-profit').innerHTML=profitHTML;

  if((G.elementExtraUses||0)>0){
    G.elementExtraUses--;
    addLog(`🧑‍💼 人材效果：可再投入一次（剩餘 ${G.elementExtraUses} 次）`,'g');
    G.phase='place';
    G._extraUsePhase=true; // 標記：額外投入階段，允許跳過
    updateCard(el);
    render();
    return;
  }
  G._extraUsePhase=false;
  // ── 大熱波追蹤與檢查 ──
  checkHeatwave();

  G.phase='done';
  G._turnInvested=true; // 旗標：本回合已完成投入（供按鈕容錯）
  updateCard(el);
  render();

  if(TUT.hookFinishPost(totalTurnProfit)) return;

  // 首次達標：記錄回合數
  if(G.profit>=G.goal && !G._goalReachedTurn){
    G._goalReachedTurn=G.turn;
  }

  if(G.profit>=G.goal&&!G._winPending){
    G._winPending=true;
    const turnsUsed=G._goalReachedTurn||G.turn;
    setTimeout(()=>performWinSettlement(turnsUsed),600);
  }
}

// ══════════════════════════════════════
// 過關結算（支援連續結算：當收益同時超越多輪目標時自動連鎖）
// ══════════════════════════════════════
function performWinSettlement(turnsUsed){
  G._winPending=false;
  const startRound=G.round;
  const passedGoals=[];
  // 連續結算：只要 profit 仍 >= 當前 goal 就繼續過關（上限 20 輪防護）
  let _iter=0;
  while(G.profit>=G.goal && _iter<20){
    _iter++;
    const oldGoal=G.goal;
    passedGoals.push({round:G.round,goal:oldGoal});
    G.roundHistory.push({round:G.round,turnsUsed,goal:oldGoal,profit:G.profit});
    adjustDifficulty();
    G.round++;
    const scaledMult=1.4*G.difficultyMult;
    G.goal=Math.round(oldGoal*scaledMult+8);
  }
  if(passedGoals.length===0) return; // 保險：理論不會發生
  G._goalReachedTurn=0;
  G.turn=1; G.buff={}; G.sel=null; G.cellMods={}; G.cellPctMods={};
  const diffPct=Math.round((G.difficultyMult-1)*100);
  const diffLabel=diffPct>0?` 📈難度+${diffPct}%`:diffPct<0?` 📉難度${diffPct}%`:'';
  autoSave();
  let modalText;
  if(passedGoals.length===1){
    modalText=`第 ${startRound} 輪過關！（${turnsUsed}回合達標）\n達成目標 ${passedGoals[0].goal}\n\n第 ${G.round} 輪新目標：${G.goal}${diffLabel}`;
  } else {
    const chain=passedGoals.map(p=>`第${p.round}輪(目標${p.goal})`).join(' → ');
    modalText=`🎉 連續結算 ${passedGoals.length} 輪！\n總收益 ${G.profit} 連過：\n${chain}\n\n第 ${G.round} 輪新目標：${G.goal}${diffLabel}`;
  }
  showModal('win',modalText);
}

// ══════════════════════════════════════
// 動態難度調整
// ══════════════════════════════════════
function adjustDifficulty(){
  const hist=G.roundHistory;
  if(hist.length===0) return;

  const recent=hist.slice(-3);
  const avgTurns=recent.reduce((s,h)=>s+h.turnsUsed,0)/recent.length;

  let delta=0;

  // ── 基於平均達標速度 ──
  // 新數值體系下收益更高，玩家達標更快是正常的
  // 閾值從 2/4/6/8 上調至 3/5/7/9
  if(avgTurns<=3)      delta+=0.20;   // 3 回合內達標：強力加壓
  else if(avgTurns<=5) delta+=0.10;   // 5 回合內：中度加壓
  else if(avgTurns<=7) delta+=0.03;   // 7 回合內：微調
  else if(avgTurns<=9) delta+=0;      // 正常節奏
  else                 delta-=0.10;   // 幾乎用盡回合：降壓

  // ── 連續速通檢測 ──
  if(recent.length>=2){
    const streak=recent.filter(h=>h.turnsUsed<=3).length;
    if(streak>=3)      delta+=0.15;   // 連續 3 輪速通
    else if(streak>=2) delta+=0.08;   // 連續 2 輪速通
  }

  // ── 收益/目標倍數差異（核心調整）──
  const lastRound=hist[hist.length-1];
  const overRatio=lastRound.profit/lastRound.goal;
  if(overRatio>=10)     delta+=0.30;  // 收益 ≥10 倍：極端加壓
  else if(overRatio>=5) delta+=0.20;  // 收益 ≥5 倍：重度加壓
  else if(overRatio>=3) delta+=0.12;  // 收益 ≥3 倍
  else if(overRatio>=2) delta+=0.06;  // 收益 ≥2 倍

  // ── 最近 3 輪平均超額比率 ──
  const avgRatio=recent.reduce((s,h)=>s+h.profit/h.goal,0)/recent.length;
  if(avgRatio>=5)       delta+=0.15;  // 平均 5 倍以上：持續碾壓
  else if(avgRatio>=3)  delta+=0.08;  // 平均 3 倍以上

  // ── 掙扎檢測：玩家收益遠低於目標時降壓 ──
  if(overRatio<1.3&&overRatio>=1.0) delta-=0.05; // 險過：微降
  // 連續多輪剛好過關
  if(recent.length>=2&&recent.every(h=>h.profit/h.goal<1.5)) delta-=0.05;

  // ── 套用並限制範圍 ──
  G.difficultyMult=Math.max(0.5, Math.min(3.0, G.difficultyMult+delta));

  // log
  const ratioStr=overRatio>=2?`，超額${overRatio.toFixed(1)}倍`:'';
  if(delta>0) addLog(`📈 動態難度：+${Math.round(delta*100)}%（平均${avgTurns.toFixed(1)}回合${ratioStr}，倍率${G.difficultyMult.toFixed(2)}）`,'w');
  else if(delta<0) addLog(`📉 動態難度：${Math.round(delta*100)}%（平均${avgTurns.toFixed(1)}回合${ratioStr}，倍率${G.difficultyMult.toFixed(2)}）`,'g');
}

  { id:'buy_fac',   label:'🏗 購買設施',         cost:6, desc:'從設施池隨機取3個，選1加入手牌' },

function pickActionOptions(){
  const shuffled=[...ACTION_POOL].sort(()=>Math.random()-.5);
  G.actionOptions=shuffled.slice(0,2);
}

function pickNextEvent(){
  // 預告下一個 EVENT_INTERVAL 倍數回合的事件
  const nextEvTurn = Math.ceil((G.turn+1)/EVENT_INTERVAL)*EVENT_INTERVAL;
  // 莫菲定律後，下次事件限定池
  let pool=G._murphyNextPool
    ? EVENTS.filter(e=>['pick_fac','earthquake','job_assist','leya_gift'].includes(e.id))
    : EVENTS.filter(e=>e.id!=='murphy'); // 莫菲定律不進預告池
  G._murphyNextPool=false;
  G.nextEvent=pool[Math.floor(Math.random()*pool.length)];
  G.nextEventTurn=nextEvTurn;
  G.nextEventData=precomputeEventData(G.nextEvent);
}
// 莫菲定律：事件觸發時檢查是否劫持（第2輪起）
function checkMurphyHijack(){
  if(G.round<2||TUT.isBlocking()) return false;
  const mt=G._murphyTrack||{repeatCount:0,noMove:0};
  // 跨輪計算：1 回合達標的玩家 repeatCount 跨輪累積
  const murphyWeight=1+Math.max(0,mt.repeatCount-2)*3+Math.max(0,mt.noMove-3)*2;
  if(murphyWeight<=1) return false;
  const prob=Math.min(0.6, murphyWeight/(murphyWeight+5));
  return Math.random()<prob;
}

function precomputeEventData(ev){
  if(!ev) return null;
  const gn=GN();
  const data={cells:[]};
  if(ev.id==='row_buff'){
    data.r1=Math.floor(Math.random()*gn);
    data.r2=(data.r1+1+Math.floor(Math.random()*(gn-1)))%gn;
    for(let i=0;i<gn;i++){ data.cells.push(`${data.r1},${i}`); data.cells.push(`${data.r2},${i}`); }
  } else if(ev.id==='col_buff'){
    data.c1=Math.floor(Math.random()*gn);
    data.c2=(data.c1+1+Math.floor(Math.random()*(gn-1)))%gn;
    for(let i=0;i<gn;i++){ data.cells.push(`${i},${data.c1}`); data.cells.push(`${i},${data.c2}`); }
  } else if(ev.id==='area_buff'){
    const positions=[];
    for(let r=0;r<gn-1;r++) for(let c=0;c<gn-1;c++) positions.push([r,c]);
    const [pr1,pc1]=positions[Math.floor(Math.random()*positions.length)];
    const nonOv=positions.filter(([r,c])=>Math.abs(r-pr1)>=2||Math.abs(c-pc1)>=2);
    const cand=nonOv.length>0?nonOv:positions.filter(([r,c])=>!(r===pr1&&c===pc1));
    const [pr2,pc2]=cand.length>0?cand[Math.floor(Math.random()*cand.length)]:[pr1,pc1];
    data.r1=pr1; data.c1=pc1; data.r2=pr2; data.c2=pc2;
    for(let dr=0;dr<2;dr++) for(let dc=0;dc<2;dc++){ data.cells.push(`${data.r1+dr},${data.c1+dc}`); data.cells.push(`${data.r2+dr},${data.c2+dc}`); }
  } else if(ev.id==='rebellion'){
    const corners=[[0,0],[0,gn-1],[gn-1,0],[gn-1,gn-1]];
    const count=Math.floor(Math.random()*4)+1;
    data.victims=corners.sort(()=>Math.random()-.5).slice(0,count);
    data.victims.forEach(([r,c])=>data.cells.push(`${r},${c}`));
  } else if(ev.id==='earthquake'){
    const dirs=['top','bottom','left','right'];
    data.dir=dirs[Math.floor(Math.random()*4)];
    for(let r=0;r<gn;r++) for(let c=0;c<gn;c++) if(isFacility(G.grid[r][c])) data.cells.push(`${r},${c}`);
  } else if(ev.id==='hazardous_waste'){
    const empties=[];
    for(let r=0;r<gn;r++) for(let c=0;c<gn;c++) if(!G.grid[r][c]||G.grid[r][c]==='ruin') empties.push([r,c]);
    data.picks=empties.sort(()=>Math.random()-.5).slice(0,1);
    data.picks.forEach(([r,c])=>data.cells.push(`${r},${c}`));
  } else if(ev.id==='leya_gift'){
    const filled=[];
    for(let r=0;r<gn;r++) for(let c=0;c<gn;c++) if(isFacility(G.grid[r][c])) filled.push([r,c]);
    if(filled.length>0){ data.target=filled[Math.floor(Math.random()*filled.length)]; data.cells.push(`${data.target[0]},${data.target[1]}`); }
  } else if(ev.id==='murphy'){
    // 預告高亮所有設施格
    for(let r=0;r<gn;r++) for(let c=0;c<gn;c++) if(isFacility(G.grid[r][c])) data.cells.push(`${r},${c}`);
  }
  return data;
}

function doAction(id){
  // 立即關閉卡牌
  document.getElementById('action-chooser').style.display='none';
  const act=ACTION_POOL.find(a=>a.id===id);
  if(!act)return;
  const actCost=scaledCost(act.cost);
  if(G.profit<actCost){ addLog(`⚠ 收益不足（需要 ${actCost}，現有 ${G.profit}）`,'b'); return; }
  G.profit-=actCost;

  const _tc=getPlayerTagCounts(); // 快取詞條計數（本次行動共用）
  if(id==='buy_fac'){
    const pool=weightedPickN(Object.keys(BLDG).filter(isPoolableBldg),3,_tc);
    const refund=actCost;
    showCardChooser(
      '🏗 選擇一個設施加入手牌',
      pool.map(bid=>({
        emoji:BLDG[bid].emoji, name:BLDG[bid].name,
        desc:BLDG[bid].desc, pos:'', neg:'',
        onclick:`cardChooserPick(()=>{evPick('${bid}',null)})`
      })),
      ()=>{G.profit+=refund; closeActionOverlay(); G.actionOptions=[]; G.phase="place"; render();}
    );
    G.phase='event'; render(); return;
  }
  if(id==='trig_ev'){
    triggerEvent(); return;
  }
  if(id==='move_fac'){
    // 進入自由排列模式（無論是否有拆遷隊都一樣）
    saveGridSnapshot();
    G.freeRearrange=true; G.moveMode=false; G.moveSrc=null;
    addLog('🔧 自由排列模式：拖曳設施到想要的位置，完成後點「確認排列」');
    G.phase='place'; render(); return;
  }
  if(id==='get_partner'){
    const pool=Object.keys(PARTNERS).filter(pid=>!hasPartner(pid));
    if(!pool.length){addLog('⚠ 已招募所有合夥人','b');G.profit+=actCost;G.phase='place';render();return;}
    // 安全網：大幅提高蕾雅/譚雅出現機率
    let picks;
    if(checkSafetyNet()){
      const priority=['tanya','leya'].filter(pid=>pool.includes(pid));
      const rest=weightedPickN(pool.filter(pid=>!priority.includes(pid)),3-priority.length,_tc);
      picks=[...priority,...rest].slice(0,3);
    } else {
      picks=weightedPickN(pool,3,_tc);
    }
    const refund=actCost;
    showCardChooser(
      '🤝 招募合夥人',
      picks.map(pid=>({
        emoji:PARTNERS[pid].emoji, name:PARTNERS[pid].name,
        desc:PARTNERS[pid].desc||'',
        pos:PARTNERS[pid].pos||'', neg:PARTNERS[pid].neg||'',
        onclick:`cardChooserPick(()=>{recruitPartner('${pid}');G.phase='place';render();})`
      })),
      ()=>{G.profit+=refund; closeActionOverlay(); G.actionOptions=[]; G.phase="place"; render();}
    );
    G.phase='event'; render(); return;
  }
  if(id==='upgrade'){
    const filled=findFacilityCells();
    if(!filled.length){addLog('⚠ 沒有可提升的設施','b');G.profit+=act.cost;G.phase='place';render();return;}
    G.upgradeMode=true;
    G.phase='place';
    addLog('⬆ 點擊想要提升的設施（永久 +1 輸出）','w');
    render();
    return;
  }
  if(id==='next_bonus'){
    const types=['money','material','goods'];
    const t=types[Math.floor(Math.random()*types.length)];
    G.nextBonus={type:t,amount:3};
    addLog(`✨ 下次 ${TLABEL[t]} 輸出時額外 +3`,'g');
  }
  if(id==='swap_ev'){
    const oldId=G.nextEvent&&G.nextEvent.id;
    pickNextEvent();
    // 不能換到與原來一樣的事件
    if(oldId&&G.nextEvent.id===oldId){
      const alt=EVENTS.filter(e=>e.id!=='murphy'&&e.id!==oldId);
      if(alt.length){ G.nextEvent=alt[Math.floor(Math.random()*alt.length)]; G.nextEventData=precomputeEventData(G.nextEvent); }
    }
    addLog(`🔄 預告事件已更換為：${G.nextEvent.title}`,'g');
  }
  if(id==='nothing'){
    addLog('😴 什麼也沒發生，收益保留');
  }

  closeActionOverlay();
  G.actionOptions=[];
  G.phase='place';
  render();
}

function upgradeCell(r,c){
  hideEv();
  const bId=G.grid[r][c];
  if(!isFacility(bId)) return;
  const b=BLDG[bId];
  const key=`${r},${c}`;
  G.bldgUpgrades[key]=(G.bldgUpgrades[key]||0)+1;
  addLog(`⬆ ${b.emoji}${b.name} (${r+1},${c+1}) 升級！+${G.bldgUpgrades[key]}`,'g');
  G.upgradeMode=false;
  G.actionOptions=[];
  pulse(r,c);
  G.phase='place'; render();
}

function recruitPartner(pid){
  G.partners.push(pid);
  if(PARTNERS[pid]&&PARTNERS[pid].onRecruit) PARTNERS[pid].onRecruit(G);
  if(!G.partnerState[pid]&&PARTNERS[pid].state) G.partnerState[pid]={...PARTNERS[pid].state};
  addLog(`🤝 招募了 ${PARTNERS[pid].emoji}${PARTNERS[pid].name}！`,'g');
  if(pid==='envy') addHand('envy_factory');
  // 場風大師：招募後立即設定本回合方向
  if(pid==='wind_master'&&!G.windDir) rollWindDir();
  G.actionOptions=[];
  closeActionOverlay();
  renderPartners();
  render();
}

// ── 自由排列拖曳系統 ──
let _rearrangeSrc=null;
function onRearrangeDragStart(e,r,c){
  if(!G.freeRearrange||!G.grid[r][c]||G.grid[r][c]==='ruin'){e.preventDefault();return;}
  // 百貨公司（2×2）不可在排列模式中拖曳，避免拆散結構
  if(G.grid[r][c]==='dept_store'||G.grid[r][c]==='dept_store_part'){
    addLog('🏬 百貨公司不可在排列模式中移動','b');
    e.preventDefault();
    return;
  }
  _rearrangeSrc=[r,c];
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain','rearrange');
  const cellEl=cellQ(r,c);
  if(cellEl) cellEl.style.opacity='0.4';
  // 高亮所有格子為可放置目標
  document.querySelectorAll('.cell').forEach(el=>{
    if(el.dataset.r!==String(r)||el.dataset.c!==String(c)) el.classList.add('drag-target');
  });
}
function onRearrangeDragEnd(e){
  _rearrangeSrc=null;
  document.querySelectorAll('.cell').forEach(el=>{el.style.opacity='';el.classList.remove('drag-target');el.classList.remove('drag-over-cell');});
}
function onRearrangeDragOver(e,r,c){
  if(!_rearrangeSrc) return;
  const [sr,sc]=_rearrangeSrc;
  if(r===sr&&c===sc) return;
  // 廢墟不可作為交換目標，不顯示可投放提示
  if(G.grid[r][c]==='ruin') return;
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  const cellEl=cellQ(r,c);
  if(cellEl) cellEl.classList.add('drag-over-cell');
}
function onRearrangeDragLeave(r,c){
  if(!_rearrangeSrc) return;
  const cellEl=cellQ(r,c);
  if(cellEl) cellEl.classList.remove('drag-over-cell');
}
function onRearrangeDrop(e,r,c){
  if(!_rearrangeSrc) return;
  e.preventDefault();
  const [sr,sc]=_rearrangeSrc;
  _rearrangeSrc=null;
  document.querySelectorAll('.cell').forEach(el=>{el.style.opacity='';el.classList.remove('drag-target');el.classList.remove('drag-over-cell');});
  if(r===sr&&c===sc) return;
  const srcId=G.grid[sr][sc], dstId=G.grid[r][c];
  // 目標也不可是百貨公司（會破壞 2×2 結構）
  if(dstId==='dept_store'||dstId==='dept_store_part'){
    addLog('🏬 百貨公司不可作為交換目標','b');
    return;
  }
  // 廢墟不可被交換位置：若目標是廢墟則拒絕
  if(dstId==='ruin'){
    addLog('🏚️ 廢墟不可被交換位置','b');
    return;
  }

  // 蕾雅新規格：同類設施視為不同建築，不再於重新排列時自動合併（落在正常交換流程）

  // 一般交換
  swapCellData(sr,sc,r,c);
  addLog(`🔧 已交換 (${sr+1},${sc+1}) ↔ (${r+1},${c+1})`,'g');
  // 只有實際設施被移動時才觸發合夥人效果
  if(isFacility(G.grid[r][c])||isFacility(G.grid[sr][sc])) onFacilityMoved(r,c,sr,sc);
  G.moveSrc=null;
  pulse(r,c); render();
}

function cancelRearrange(){
  // 還原到進入排列模式前的狀態
  restoreGridSnapshot();
  G.freeRearrange=false; G.moveSrc=null;
  G._demolitionRearrange=false;
  G._demolishBureauPending=false;
  addLog('↩ 取消排列，設施已還原');
  render();
}
function confirmRearrange(){
  // 只有從拆遷隊啟動的重排才扣次數
  if(G._demolitionRearrange && hasPartner('demolition')){
    G.demolitionCharges=Math.max(0,(G.demolitionCharges||0)-1);
    addLog(`🔨 拆遷隊使用 1 次，剩餘 ${G.demolitionCharges} 次`,'g');
  }
  G._demolitionRearrange = false;
  // 拆遷補償局：確定排列後結算一次（整段排列只視為 1 次移動，每個補償局 +4）
  if(G._demolishBureauPending){
    const bureaus=findCells((r,c,b)=>b==='demolish_bureau');
    if(bureaus.length>0){
      const bonus=bureaus.length*4;
      G.profit+=bonus;
      addLog(`🏢 拆遷補償局：排列確定 1次移動 × ${bureaus.length}個補償局，+${bonus}收益`,'g');
      bureaus.forEach(([br,bc])=>profitFlyFromCell(br,bc,4));
    }
    G._demolishBureauPending=false;
  }
  // 莫菲定律：重排後重置未移動計數
  if(G._murphyTrack) G._murphyTrack.noMove=0;
  deleteGridSnapshot();
  G.freeRearrange=false; G.moveSrc=null;
  addLog('✅ 設施排列已確定','g');
  render();
  TUT.hookConfirmRearrange();
}

let _lastStartedTurn=-1; // 防止同回合重複執行 startTurn
function startTurn(){
  // 同回合同輪防重入：行動選項中的 evPick/evDone 會再呼叫 startTurn，跳過重複
  const turnKey=G.round*1000+G.turn;
  if(_lastStartedTurn===turnKey){
    G.phase='place'; render();
    if(hasPartner('tanya')&&!G._tanyaSwappedThisTurn){ G._tanyaSwappedThisTurn=true; tanyaOfferSwap(); }
    else openActionOverlay();
    return;
  }
  _lastStartedTurn=turnKey;
  G.phase='place';
  G._turnPitchOffset = 0; // 每回合音階位移歸零
  G._talentUsedOnElement = false;
  G._demoExpertMode = false;
  G._yongqingSellMode = false;
  G._yongqingSellUsed = false;
  G._hrUsedThisTurn = false; // 人力資源總監每回合重置
  G._hrTalentUsedCount = 0; // 人力資源總監：每回合人材投入計數重置
  G._mobileCityMode = false;
  G._mobileCitySrc = null;
  G._mobileCityUsedThisTurn = false;
  G._ruinPassedThisTurn = false;
  G._omniGainedThisTurn = false;
  G._dispatchHqFiredThisTurn = false;
  G._logCenterRotated = new Set(); // 物流中心：每回合最多旋轉一次
  // 防呆：每回合開始時保證 元素卡額外投入狀態 歸零，避免上一輪殘留導致按鈕失效
  G.elementExtraUses = 0;
  G._extraUsePhase = false;
  G._turnInvested = false;
  // 莫菲定律：追蹤未移動設施的回合數（跨輪累計，但新輪第 1 回合不計）
  if(!G._murphyTrack) G._murphyTrack={lastSend:null,repeatCount:0,noMove:0};
  if(G.turnFacMoved===0&&G.turn>1) G._murphyTrack.noMove++;
  else if(G.turn>1) G._murphyTrack.noMove=0;
  // turn===1 時不動 noMove（玩家還沒機會操作）
  G.turnFacMoved = 0; // 動態加強器用：本回合設施移動計數（重置放在檢查之後）
  _safetyNetRoll = false; // 重置安全網判定
  G._permShopUsed = false; // 重置商店使用
  // 合夥人每回合開始效果
  G.partners.forEach(pid=>{
    const p=PARTNERS[pid];
    if(p&&p.onTurnStart){
      try{ p.onTurnStart(G); }
      catch(e){ console.warn('partner.onTurnStart 失敗:',pid,e); }
    }
  });

  // 勞動部長：效果已移至 onSettle（最終收益時失半人材每個+4）
  // 地皮炒家：負面已移除（舊：>3回合未移動-1）

  // ── 新設施回合開始效果 ──
  // 人力銀行：釋放上回合預約的人材（+4 累計）
  if((G._talentBankPending||0)>0){
    const pending=G._talentBankPending;
    G.talentCards=(G.talentCards||0)+pending;
    addLog(`🏧 人力銀行：發放預約人材 +${pending}`,'g');
    G._talentBankPending=0;
    if(typeof renderTalentPanel==='function') renderTalentPanel();
  }
  // H1: 巨人村：回合開始人材歸0，獲得+8
  findCells((r,c,b)=>b==='giant_village').forEach(()=>{
    G.talentCards=8;
    addLog('🏰 巨人村：人材歸0，獲得+8人材','g');
    if(typeof renderTalentPanel==='function') renderTalentPanel();
  });
  // 大型電子供給站：每回合開始，若未被重疊過，在自身疊加一個大型電子供給站
  findCells((r,c,b)=>b==='mega_elec_supply').forEach(([mr,mc])=>{
    if(getOverlays(mr,mc).length>0) return;
    if(!G.cellOverlay) G.cellOverlay={};
    setOverlays(mr,mc,['mega_elec_supply']);
    addLog(`🔋 大型電子供給站 (${mr+1},${mc+1})：自動疊加於自身`,'g');
  });

  // 稅務局：每回合開始隨機升級一個設施
  {
    const taxCells=findCells((r,c,b)=>b==='tax_office');
    if(taxCells.length>0){
      const allFilled=[];
      findCells((r,c,b)=>isFacility(b)&&b!=='tax_office').forEach(p=>allFilled.push(p));
      if(allFilled.length>0){
        const [tr,tc]=allFilled[Math.floor(Math.random()*allFilled.length)];
        const key=`${tr},${tc}`;
        G.bldgUpgrades[key]=(G.bldgUpgrades[key]||0)+1;
        addLog(`🏛 稅務局：${BLDG[G.grid[tr][tc]].emoji}${BLDG[G.grid[tr][tc]].name} (${tr+1},${tc+1}) 自動升級！`,'w');
      }
    }
  }

  // 磁力板：每回合開始與相鄰隨機設施交換位置
  {
    const magnets=findCells((r,c,b)=>b==='magnet_plate');
    // 隨機順序處理，避免固定優先
    magnets.sort(()=>Math.random()-.5);
    const swapped=new Set(); // 避免同一格被重複交換
    magnets.forEach(([mr,mc])=>{
      const mk=`${mr},${mc}`;
      if(swapped.has(mk)) return;
      // 排除 dept_store/part（會破壞 2×2 結構）
      const adj=[[mr-1,mc],[mr+1,mc],[mr,mc-1],[mr,mc+1]]
        .filter(([ar,ac])=>ar>=0&&ar<GN()&&ac>=0&&ac<GN()&&isFacility(G.grid[ar][ac])&&!swapped.has(`${ar},${ac}`)
          &&G.grid[ar][ac]!=='dept_store'&&G.grid[ar][ac]!=='dept_store_part');
      if(adj.length===0) return;
      const [tr,tc]=adj[Math.floor(Math.random()*adj.length)];
      const tmp=G.grid[tr][tc];
      swapCellData(mr,mc,tr,tc);
      swapped.add(mk); swapped.add(`${tr},${tc}`);
      // 交換後被交換設施（現在位於 mr,mc）永久 +2（bldgUpgrades 會跟隨設施移動）
      const targetKey=`${mr},${mc}`;
      G.bldgUpgrades[targetKey]=(G.bldgUpgrades[targetKey]||0)+2;
      // 若對方也是磁力板，交換後兩端皆 +2（磁力板仍位於 tr,tc）
      const bothMagnet=tmp==='magnet_plate';
      if(bothMagnet){
        const srcKey=`${tr},${tc}`;
        G.bldgUpgrades[srcKey]=(G.bldgUpgrades[srcKey]||0)+2;
        addLog(`🧲 磁力板 (${mr+1},${mc+1}) ↔ 🧲磁力板 (${tr+1},${tc+1})，兩邊皆永久+2`,'w');
      } else {
        addLog(`🧲 磁力板 (${mr+1},${mc+1}) ↔ ${BLDG[tmp].emoji}${BLDG[tmp].name} (${tr+1},${tc+1})，被交換設施永久+2`,'w');
      }
      onFacilityMoved(tr,tc,mr,mc);
    });
  }

  // 爆破裝置：倒數計時（先收集再處理，避免迭代中修改 grid）
  if(!G.bombTimers) G.bombTimers={};
  const _bombs=findCells((r,c,b)=>b==='bomb_device');
  _bombs.forEach(([r,cc])=>{
    if(G.grid[r][cc]!=='bomb_device') return; // 已被其他爆炸波及消滅
    const key=`${r},${cc}`;
    if(G.bombTimers[key]===undefined) G.bombTimers[key]=3;
    G.bombTimers[key]--;
    if(G.bombTimers[key]<=0){
      // 先記錄相鄰設施（爆炸前）
      const adj=[[r-1,cc],[r+1,cc],[r,cc-1],[r,cc+1]]
        .filter(([ar,ac])=>ar>=0&&ar<GN()&&ac>=0&&ac<GN()&&isFacility(G.grid[ar][ac])&&G.grid[ar][ac]!=='bomb_device');
      addLog(`💣 爆破裝置 (${r+1},${cc+1}) 爆炸！`,'b');
      destroyFacility(r,cc);
      if(adj.length>0){
        const [tr,tc]=adj[Math.floor(Math.random()*adj.length)];
        const victimId=G.grid[tr][tc];
        if(victimId){
          addLog(`💣 爆炸波及：${BLDG[victimId].emoji}${BLDG[victimId].name} (${tr+1},${tc+1}) 被消滅！`,'b');
          destroyFacility(tr,tc);
        }
      } else {
        addLog(`💣 周圍無設施，未波及`);
      }
      delete G.bombTimers[key];
    } else {
      addLog(`💣 爆破裝置 (${r+1},${cc+1}) 倒數 ${G.bombTimers[key]} 回合`);
    }
  });

  // 人力訓練中心：每回合+1人材
  findCells((r,c,b)=>b==='talent_training').forEach(([r,c])=>{
    G.talentCards=(G.talentCards||0)+1;
    addLog(`🎓 人力訓練中心 (${r+1},${c+1})：+1人材（共${G.talentCards}）`,'g');
  });
  // 公路之星：每回合中央隨機2格+2，每10回合累積+2（10→+4，20→+6…）
  if(hasPartner('highway_star')){
    const centerList=[...getCenterCells()].sort(()=>Math.random()-.5).slice(0,2);
    const tier = Math.floor(G.turn / 10);
    const bonus = 2 + tier * 2;
    centerList.forEach(key=>{
      G.cellMods[key]=(G.cellMods[key]||0)+bonus;
    });
    addLog(`🌟 公路之星：中央2格+${bonus}${tier>0?`（${tier}階加成）`:''}（${centerList.join(' ')}）`,'g');
    G.inv.hwCenter=false;
  }
  // 期貨交易所：上回合被觸發的交易所移動到隨機空格
  if(G._futuresMoveNext&&G._futuresMoveNext.length>0){
    G._futuresMoveNext.forEach(({r,c})=>{
      if(G.grid[r][c]!=='futures_market') return;
      const gn=GN();
      const empties=[];
      for(let er=0;er<gn;er++) for(let ec=0;ec<gn;ec++) if(!G.grid[er][ec]) empties.push([er,ec]);
      if(empties.length>0){
        const [nr,nc]=empties[Math.floor(Math.random()*empties.length)];
        G.grid[r][c]=null; G.grid[nr][nc]='futures_market';
        // 轉移附帶資料
        const ok=`${r},${c}`, nk=`${nr},${nc}`;
        KEYED_DATA_FIELDS.forEach(dk=>{
          if(G[dk]&&G[dk][ok]!==undefined){ G[dk][nk]=G[dk][ok]; delete G[dk][ok]; }
        });
        // 轉移並重新抽選百分比
        if(G.futuresPct){ delete G.futuresPct[ok]; }
        if(!G.futuresPct) G.futuresPct={};
        G.futuresPct[nk]=Math.floor(Math.random()*21)-10;
        addLog(`🏛 期貨交易所 (${r+1},${c+1})→(${nr+1},${nc+1}) 移動，本回合 ${G.futuresPct[nk]>=0?'+':''}${G.futuresPct[nk]}%`,'w');
      } else {
        // 沒有空格，消滅自己
        destroyFacility(r,c);
        addLog(`🏛 期貨交易所 (${r+1},${c+1}) 無空格可移動，自我消滅！`,'b');
      }
    });
    G._futuresMoveNext=[];
  }
  // 期貨交易所：每回合重新抽選所有期貨的百分比
  {
    if(!G.futuresPct) G.futuresPct={};
    const gn=GN();
    for(let r=0;r<gn;r++) for(let c=0;c<gn;c++){
      if(G.grid[r][c]==='futures_market'){
        const k=`${r},${c}`;
        G.futuresPct[k]=Math.floor(Math.random()*21)-10;
      }
    }
  }
  // 場風大師：每回合重新抽方向（颱風時不覆蓋）
  if(hasPartner('wind_master')){
    rollWindDir();
  } else if(!(G.buff&&G.buff.typhoonActive)){
    G.windDir=null;
  }
  addLog(`── 回合 ${G.turn}/${G.maxTurns} ──`);
  autoSave();
  render();
  // 人材發光提示
  if((G.talentCards||0)>0){
    const tt=document.querySelector('.talent-token');
    if(tt){ tt.classList.remove('talent-glow'); void tt.offsetWidth; tt.classList.add('talent-glow'); }
  }
  // 譚雅交換：同一回合只觸發一次（evPick/evDone 重入 startTurn 時跳過）
  if(hasPartner('tanya')&&!G._tanyaSwappedThisTurn){
    G._tanyaSwappedThisTurn=true;
    tanyaOfferSwap();
  } else {
    openActionOverlay();
  }
}

// 回合推進
// ══════════════════════════════════════
function scaledCost(base){
  return Math.ceil(base*Math.max(1,(1+(G.round-1)*0.35)));
}
function doNext(){
  if(TUT.hookDoNext()) return;
  // 額外投入階段：允許跳過
  if(G.phase==='place'&&G._extraUsePhase){
    G.elementExtraUses=0;
    G._extraUsePhase=false;
    G.phase='done';
    addLog('⏩ 跳過剩餘人材投入','w');
    render();
  }
  // 容錯：本回合已投入且無 UI 阻塞時，強制進入 done
  // phase==='event' 但無模態顯示視為殘留狀態（事件/商店/動作彈窗未正確 reset phase）
  if(G.phase!=='done'&&G._turnInvested&&!G.freeRearrange&&!G.moveMode&&!G._yongqingSellMode&&!G._demoExpertMode&&!G._omniDragging&&G.phase!=='animating'){
    if(G.phase!=='event' || !isAnyEventModalOpen()){
      G.phase='done';
    }
  }
  if(G.phase!=='done')return;

  // 儲存本回合 log 到歷史
  commitTurnLog();

  // 臨時工棚：回合結束時自動賣出自己 +2，且若場上有廢墟則隨機賣出一個 +2
  findCells((r,c,b)=>b==='temp_shed').forEach(([r,c])=>{
    G.grid[r][c]=null;
    clearKeyedData(`${r},${c}`);
    G.profit+=2;
    addLog(`🛖 臨時工棚 (${r+1},${c+1})：回合結束自動賣出，+2 收益`,'g');
    profitFlyFromCell(r,c,2);
    if(G.ruinCells&&G.ruinCells.size>0){
      const ruins=[...G.ruinCells];
      const pick=ruins[Math.floor(Math.random()*ruins.length)];
      const [rr,rc]=pick.split(',').map(Number);
      G.grid[rr][rc]=null;
      G.ruinCells.delete(pick);
      clearKeyedData(pick);
      G.profit+=2;
      addLog(`🛖 臨時工棚：順便賣出廢墟 (${rr+1},${rc+1})，+2 收益`,'g');
      profitFlyFromCell(rr,rc,2);
    }
  });

  // 每回合結束清除格子修正（只持續一回合）
  G.cellMods={}; G.cellPctMods={};
  G.buff={};G.sel=null;G.moveMode=false;G.moveSrc=null;
  G._tanyaSwappedThisTurn=false;

  // 達標判定（轉換收益等非投入方式也能觸發過關）
  if(G.profit>=G.goal){
    if(!G._goalReachedTurn) G._goalReachedTurn=G.turn;
    const oldRound=G.round; const oldGoal=G.goal;
    const turnsUsed=G._goalReachedTurn||G.turn;
    G.roundHistory.push({round:oldRound, turnsUsed, goal:oldGoal, profit:G.profit});
    adjustDifficulty();
    G.round++;
    const scaledMult=1.4*G.difficultyMult;
    G.goal=Math.round(oldGoal*scaledMult+8);
    G._goalReachedTurn=0;
    G.turn=1; G.buff={}; G.sel=null; G.cellMods={}; G.cellPctMods={};
    const diffPct=Math.round((G.difficultyMult-1)*100);
    const diffLabel=diffPct>0?` 📈難度+${diffPct}%`:diffPct<0?` 📉難度${diffPct}%`:'';
    autoSave();
    showModal('win',`第 ${oldRound} 輪過關！（${turnsUsed}回合達標）\n達成目標 ${oldGoal}\n\n第 ${G.round} 輪新目標：${G.goal}${diffLabel}`);
    return;
  }

  // 回合用盡（未達標）→ 失敗
  if(G.turn>=G.maxTurns){
    showModal('lose',`第 ${G.round} 輪失敗！\n收益 ${G.profit} / 目標 ${G.goal}\n差距 ${G.goal-G.profit}`);
    return;
  }

  G.turn++;

  // 拆遷隊：已改為計數制（在 PARTNERS.demolition.onTurnStart 實作）

  // 達到預定回合時觸發事件（延遲事件可能提前至 turn 2 或 1）
  if(G.nextEvent && G.turn>=G.nextEventTurn){
    let ev=G.nextEvent;
    G._eventDeferred=0;
    // 莫菲定律劫持：第2輪起根據權重替換預告事件
    if(checkMurphyHijack()){
      ev=EVENTS.find(e=>e.id==='murphy');
    }
    G.nextEvent=null;
    G.cellMods={}; G.cellPctMods={}; // 確保事件效果從乾淨狀態套用
    G.phase='event';
    ev.show(ev);
    pickNextEvent();
    render();
    return;
  }

  // 產生本回合2個行動選項
  pickActionOptions();
  startTurn();
}

// ── 常駐行動：購買設施（商店） ──
function getPermShopCost(){
  return scaledCost(8); // 基礎 8，隨輪數遞增
}
function isPermShopFree(){
  const handFacs=G.hand.filter(h=>h.count>0).length;
  if(handFacs>0) return false;
  return findFacilityCells().length < GN()*GN()/2;
}
function doPermShop(){
  if(G.phase!=='place'&&G.phase!=='done') return;
  if(G._permShopUsed) return;
  const _shopTc=getPlayerTagCounts();
  // 基礎設施池 + 1 隨機物流方向
  let pool=[...BASIC_FACILITIES];
  pool.push(LOGISTICS_DIRS[Math.floor(Math.random()*LOGISTICS_DIRS.length)]);
  // 35% 機率額外出現一個非基礎設施
  if(Math.random()<0.35){
    const nonBasic=Object.keys(BLDG).filter(id=>
      isPoolableBldg(id)&&!BASIC_FACILITIES.includes(id)
    );
    if(nonBasic.length) pool.push(weightedPickN(nonBasic,1,_shopTc)[0]);
  }
  const shuffled=weightedPickN([...new Set(pool)],3,_shopTc);
  const hasFree=isPermShopFree();
  const freeIdx=hasFree?Math.floor(Math.random()*shuffled.length):-1;
  const cost=getPermShopCost();
  const prevPhase=G.phase;
  showCardChooser(
    `🏗 商店${hasFree?' （含免費）':''}`,
    shuffled.map((bid,i)=>{
      const isFree=i===freeIdx;
      const c=isFree?0:cost;
      const afford=G.profit>=c;
      return {
        emoji:BLDG[bid].emoji, name:BLDG[bid].name,
        desc:BLDG[bid].desc+(isFree?' 🎁 免費！':(afford?'':'\n⚠ 收益不足')),
        pos:isFree?'🎁 免費':'-'+c+' 收益', neg:'',
        onclick:afford?`cardChooserPick(()=>{G.profit-=${c};G._permShopUsed=true;addHandMaybeCompound('${bid}');addLog('🏗 購買了 ${BLDG[bid].emoji}${BLDG[bid].name}${isFree?" （免費）":""}','g');G.phase='${prevPhase}';render();})`:'',
      };
    }),
    ()=>{ G.phase=prevPhase; render(); } // 取消
  );
  G.phase='event'; render();
}
// ── 常駐行動：資源轉換器 ──
function doPermConvert(){
  if(G.phase!=='place'&&G.phase!=='done') return;
  if(!G.card||G.card.type==='money') return;
  const oldType=G.card.type, oldVal=G.card.value;
  const profit=Math.max(1,Math.floor(oldVal*0.6));
  G.profit+=profit;
  G.card={value:1,type:'money'};
  updateCard(G.card);
  addLog(`🔄 資源轉換：${TLABEL[oldType]}${oldVal} → +${profit} 收益`,'g');
  render();
  profitFlyFrom(document.getElementById('btn-perm-convert'),profit);
  // 達標：立即觸發過關（與投入路徑一致；支援連續結算）
  if(G.profit>=G.goal){
    if(!G._goalReachedTurn) G._goalReachedTurn=G.turn;
    if(!G._winPending){
      G._winPending=true;
      const turnsUsed=G._goalReachedTurn||G.turn;
      setTimeout(()=>performWinSettlement(turnsUsed),600);
    }
  }
}
// 更新常駐按鈕狀態
function updatePermBtns(){
  const shopBtn=document.getElementById('btn-perm-shop');
  const convBtn=document.getElementById('btn-perm-convert');
  if(!shopBtn||!convBtn) return;
  const inGame=G.phase==='place'||G.phase==='done';
  // 商店：place/done 階段可用，且本回合未使用
  const shopUsed=G._permShopUsed||false;
  const shopOk=inGame&&!TUT.isBlocking()&&!shopUsed;
  shopBtn.classList.toggle('perm-disabled',!shopOk);
  // 有免費設施時發光提示
  shopBtn.classList.toggle('btn-glow',shopOk&&isPermShopFree());
  // 轉換器：只有輸出非金錢時才亮
  const canConv=inGame&&G.card&&G.card.type!=='money'&&!TUT.isBlocking();
  convBtn.classList.toggle('perm-disabled',!canConv);
  convBtn.classList.toggle('btn-glow',!!canConv);
  if(canConv){
    const val=Math.max(1,Math.floor(G.card.value*0.6));
    convBtn.textContent=`🔄 轉換 +${val}`;
    convBtn.title=`將 ${TLABEL[G.card.type]}${G.card.value} 以 60% 折價轉為 +${val} 收益`;
  } else {
    convBtn.textContent='🔄 轉換收益';
    convBtn.title='持有非金錢資源時可折價轉為收益（60%）';
  }
}

function openActionOverlay(){
  const chooser=document.getElementById('action-chooser');
  const cards=document.getElementById('action-cards');
  DM.onActionOpen();
  if(!G.actionOptions||G.actionOptions.length===0){chooser.style.display='none';return;}
  // Check if player can afford any option
  const canAffordAny=G.actionOptions.some(a=>G.profit>=scaledCost(a.cost));
  cards.innerHTML=G.actionOptions.map(act=>{
    const sc=scaledCost(act.cost);
    const canAfford=G.profit>=sc;
    return `<div class="acard ${!canAfford?'acard-disabled':''}" onclick="${canAfford?`doAction('${act.id}')`:''}" onmouseenter="DM.onActionHover('${act.label.replace(/^[^\u4e00-\u9fa5a-zA-Z]+/, '')}')" style="cursor:${canAfford?'pointer':'not-allowed'}">
      <div class="acard-label">${act.label}</div>
      <div class="acard-desc">${act.desc}</div>
      <div class="acard-cost ${act.cost===0?'free':''}">${act.cost===0?'免費':'-'+sc+' 收益'}</div>
    </div>`;
  }).join('');
  // Hide skip button if player can afford options (must choose) — sloth demon always allows skip
  const skipBtn=chooser.querySelector('button[onclick="closeActionOverlay()"]');
  const showSkip=!canAffordAny||hasPartner('sloth');
  if(skipBtn){
    skipBtn.style.display=showSkip?'block':'none';
    skipBtn.classList.toggle('btn-glow',!canAffordAny&&showSkip);
  }
  chooser.style.display='flex';
}
function closeActionOverlay(){
  document.getElementById('action-chooser').style.display='none';
  // sloth demon: trigger on skip
  if(hasPartner('sloth')&&G.actionOptions&&G.actionOptions.length>0){
    PARTNERS.sloth.onSkipAction(G);
  }
  G.actionOptions=[];
}
let modalMode='';
function showModal(mode,msg){
  modalMode=mode;
  document.getElementById('memo').textContent=mode==='win'?'🎉':'😔';
  document.getElementById('mtitle').textContent=mode==='win'?'過關！':'失敗…';
  document.getElementById('mmsg').textContent=msg;
  document.getElementById('mbtn').textContent=mode==='win'?'繼續下一輪':'重新開始';
  document.getElementById('modal').classList.add('show');
}
function onMBtn(){
  document.getElementById('modal').classList.remove('show');
  if(modalMode==='win'){
    startRound();
  } else {
    clearAutoSave(); G=newGame(); SM.goto('title');
  }
}

// RENDER
// ══════════════════════════════════════
function render(){
  document.getElementById('r-turn').textContent=`第${G.round}輪 回合${G.turn}/${G.maxTurns}`;
  document.getElementById('r-profit').textContent=G.profit;
  document.getElementById('r-goal').textContent=G.goal;
  const pct=Math.min(100,Math.round(G.profit/G.goal*100));
  document.getElementById('pbar-fill').style.width=pct+'%';
  // 動態難度指標（第2輪後顯示）
  const diffChip=document.getElementById('diff-chip');
  if(diffChip){
    if(G.round>1&&G.difficultyMult!==1.0){
      diffChip.style.display='';
      const dm=G.difficultyMult;
      document.getElementById('r-diff').textContent=`×${dm.toFixed(2)}`;
      document.getElementById('r-diff').style.color=dm>1.1?'var(--red)':dm<0.95?'var(--green)':'var(--blue)';
    } else { diffChip.style.display='none'; }
  }

  // 同步卡牌 UI（fan hand handles display)
  if(G.card) updateCard(G.card);

  // 提升設施提示橫幅
  document.getElementById('upgrade-hint').classList.toggle('show', !!G.upgradeMode);

  // 場風大師 / 颱風方向提示
  const windHint=document.getElementById('wind-hint');
  if(windHint){
    const isTyphoon=G.buff&&G.buff.typhoonActive;
    const isWind=hasPartner('wind_master');
    if((isWind||isTyphoon)&&G.windDir&&G.phase==='place'){
      const dirLabels={left:'← 左側',right:'→ 右側',top:'↑ 上方',bottom:'↓ 下方'};
      const dirArrows={left:'→',right:'←',top:'↓',bottom:'↑'};
      const icon=isTyphoon?'🌀 颱風：':'🌀 場風大師：';
      const extra=isTyphoon?' （物流失效，原料→金錢翻倍）':'（獲得×2倍率）';
      windHint.style.display='flex';
      windHint.style.background=isTyphoon?'rgba(122,26,26,.1)':'rgba(26,78,122,.1)';
      windHint.style.borderColor=isTyphoon?'rgba(122,26,26,.25)':'rgba(26,78,122,.25)';
      windHint.style.color=isTyphoon?'var(--red)':'var(--blue)';
      document.getElementById('wind-hint-text').textContent=`${icon}本回合只能從 ${dirLabels[G.windDir]} 投入 ${extra}`;
      document.getElementById('wind-dir-arrow').textContent=dirArrows[G.windDir];
    } else {
      windHint.style.display='none';
    }
  }

  const _btnNext=document.getElementById('btn-next');
  // 按鈕 enable 條件：
  // 1. phase='done'（正常投入完成）
  // 2. phase='place' 且 _extraUsePhase（額外投入階段可跳過）
  // 3. 容錯：本回合已投入過（_turnInvested），且不在其他互動模式 → 允許結束
  //    phase==='event' 視為阻塞「僅在實際有事件/商店/動作模態顯示時」，避免殘留 phase 卡死按鈕
  const _eventBlocking=G.phase==='event'&&isAnyEventModalOpen();
  const _inOtherMode=G.freeRearrange||G.moveMode||G._yongqingSellMode||G._demoExpertMode||G._omniDragging||G.phase==='animating'||_eventBlocking;
  const _canEnd=G.phase==='done' || (G.phase==='place'&&G._extraUsePhase) || (G._turnInvested&&!_inOtherMode);
  _btnNext.disabled=!_canEnd;
  _btnNext.textContent=G._extraUsePhase?'⏩ 跳過額外投入':'⏩ 結束回合';
  updatePermBtns();

  renderGrid();
  renderHand();
  renderPartners();
  renderFanHand();
  renderTalentPanel();
  renderSideLog();
}

function renderPartners(){
  const row = document.getElementById('partner-row');
  const section = document.getElementById('partner-section');
  if(!row||!section) return;
  section.style.display='block';
  if(!G.partners||G.partners.length===0){
    row.innerHTML='<div style="font-size:9px;color:var(--hi);padding:4px 0;">尚無合夥人</div>';
    return;
  }
  row.innerHTML = G.partners.map((pid,i) => {
    const p = PARTNERS[pid];
    if(!p) return '';
    const isDemon = p.isDemon ? ' demon' : '';
    const tip = [p.name, p.pos?'✓ '+p.pos:'', p.neg&&p.neg!=='無'?'✕ '+p.neg:'']
      .filter(Boolean).join('|').replace(/"/g,'&quot;');
    const isDemo=pid==='demolition';
    const charges=isDemo?(G.demolitionCharges||0):0;
    const isDemoExpert=pid==='demolition_expert';
    const expertClickable=isDemoExpert&&G.phase==='place'&&G.profit>=2;
    const isYongqing=pid==='yongqing_house';
    const yqClickable=isYongqing&&G.phase==='place'&&!G._yongqingSellMode;
    // Omni accountant：顯示全能計數（點擊開啟灌注面板）
    const isOmni=pid==='omni_accountant';

function hideOmniDragPanel(){
  const p=document.getElementById('omni-drag-panel');
  if(p){
    if(p._cleanup) p._cleanup();
    p.remove();
  }
}
function closeOmniPanel(){ hideOmniDragPanel(); }

function installOmniPanelCloser(panel){
  // ESC 或點擊面板外部 → 關閉；面板內部點擊不關閉
  const onKey=(ev)=>{ if(ev.key==='Escape') closeOmniPanel(); };
  const onDocDown=(ev)=>{ if(!panel.contains(ev.target)) closeOmniPanel(); };
  // 延遲掛載，避免觸發 useOmniAccountant 的 click 事件連帶關閉。
  // 若面板在 setTimeout 觸發前被關閉（例如快速 drop 重建面板），cleanup 會先執行；
  // 此時 attached=false，setTimeout 回呼需檢查 panel 是否仍在 DOM 中才掛載。
  let attached=false;
  const timerId=setTimeout(()=>{
    if(!document.body.contains(panel)) return; // panel 已被移除，不掛載
    document.addEventListener('keydown',onKey);
    document.addEventListener('mousedown',onDocDown,true);
    attached=true;
  },150);
  panel._cleanup=()=>{
    clearTimeout(timerId);
    if(attached){
      document.removeEventListener('keydown',onKey);
      document.removeEventListener('mousedown',onDocDown,true);
    }
  };
}

// 面板內 omni source card 拖曳
function onOmniDragStart(e){
  G._omniDragging=true;
  try{
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain','omni');
  }catch(_){}
  const src=document.getElementById('omni-source-card');
  if(src) src.style.opacity='0.5';
}

function onOmniDragEnd(e){
  G._omniDragging=false;
  const src=document.getElementById('omni-source-card');
  if(src) src.style.opacity='';
  document.querySelectorAll('.omni-drop-card.omni-hover').forEach(el=>el.classList.remove('omni-hover'));
}

function onOmniDragOverPanel(e,pid){
  if(!G._omniDragging) return;
  if(!COUNT_PARTNERS.includes(pid)) return;
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  const card=e.currentTarget;
  if(card) card.classList.add('omni-hover');
}

function onOmniDragLeavePanel(e){
  const card=e.currentTarget;
  if(card) card.classList.remove('omni-hover');
}

function onOmniDropPanel(e,pid){
  if(!G._omniDragging) return;
  if(!COUNT_PARTNERS.includes(pid)) return;
  e.preventDefault();
  G._omniDragging=false;
  document.querySelectorAll('.omni-drop-card.omni-hover').forEach(el=>el.classList.remove('omni-hover'));
  // 直接套用計數
  const st=G.partnerState.omni_accountant||{count:0};
  if(st.count<=0){ closeOmniPanel(); return; }
  const tgt=G.partnerState[pid]||{count:0};
  tgt.count++;
  st.count--;
  G.partnerState[pid]=tgt;
  G.partnerState.omni_accountant=st;
  addLog(`📊 全能會計師：${PARTNERS[pid].name} 計數+1（目前 ${tgt.count}）`,'g');
  processCountTrigger(pid);
  // 如果 omni 還有計數，刷新面板內容讓玩家繼續；否則關閉
  if(st.count>0){
    showOmniDragPanel(); // 重建面板（含新計數、willTrigger 狀態）
  } else {
    closeOmniPanel();
  }
  render();
}

function renderHand(){

  const items=G.hand.filter(h=>h.count>0);
  if(!items.length){el.innerHTML='<div style="font-size:10px;color:var(--hi);">手牌空了</div>';return;}
  el.innerHTML=items.map(h=>{
    const sel=G.sel===h.id;
    const canSel=G.phase==='place';
    if(h.compound){
      const b1=BLDG[h.parts[0]],b2=BLDG[h.parts[1]];
      if(!b1||!b2) return '';
      const compTip=`${b1.emoji} ${b1.name}\\n${b1.desc}\\n基礎輸出: +${b1.fn(1)-1}\\n\\n🔗 ${h.dirLabel}\\n\\n${b2.emoji} ${b2.name}\\n${b2.desc}\\n基礎輸出: +${b2.fn(1)-1}`;

function renderSideLog(){
  const el=document.getElementById('side-log');
  if(!el) return;
  let html='';

  // 過去回合（舊→新，最新在底部）
  if(G.turnLogHistory){
    const reversed=[...G.turnLogHistory].reverse();
    reversed.forEach(t=>{
      html+=`<div class="log-turn-block" style="opacity:.7;">`;
      html+=`<div class="log-turn-hdr" style="color:var(--mu);">第${t.round}輪 回合${t.turn}</div>`;
      html+=t.entries.map(e=>{
        const isCalc=e.msg.startsWith('  ');
        return `<div class="${isCalc?'log-calc':'log-entry'} ${e.cls||''}">${e.msg.trim()}</div>`;
      }).join('');
      html+=`</div>`;
    });
  }

  // 當前回合（最新，在最底部）
  if(G.turnLog&&G.turnLog.length>0){
    html+=`<div class="log-turn-block">`;
    html+=`<div class="log-turn-hdr">第${G.round}輪 回合${G.turn}</div>`;
    html+=G.turnLog.map(e=>{
      const isCalc=e.msg.startsWith('  ');
      return `<div class="${isCalc?'log-calc':'log-entry'} ${e.cls||''}">${e.msg.trim()}</div>`;
    }).join('');
    html+=`</div>`;
  }

  if(!html) html='<div style="font-size:9px;color:var(--hi);">尚無記錄</div>';
  el.innerHTML=html;
  // 自動捲到最底顯示最新 log
  el.scrollTop=el.scrollHeight;
}

function pulse(r,c){

// 設施放置時觸發的永久效果（放置瞬間結算一次）
// opts.bldgId 指定剛放置的設施 id（疊加 / 複雜情境），未指定則讀 G.grid[r][c]
function onFacilityPlaced(r,c,bldgId){
  if(!bldgId||bldgId==='ruin'||bldgId==='dept_store_part') return;
  // 電子工廠：場上每有一個電子設施（含自己、含疊加），這個設施永久+2
  if(bldgId==='elec_factory'){
    let elecCount=findCells((rr,cc,bb)=>bb&&hasTag(bb,'electronic')).length;
    eachCell((rr,cc)=>{ getOverlays(rr,cc).forEach(ovId=>{ if(hasTag(ovId,'electronic')) elecCount++; }); });
    if(elecCount>0){
      const k=`${r},${c}`;
      G.bldgUpgrades[k]=(G.bldgUpgrades[k]||0)+elecCount*2;
      addLog(`⚡ 電子工廠 (${r+1},${c+1})：場上 ${elecCount} 個電子設施，永久+${elecCount*2}（累計+${G.bldgUpgrades[k]}）`,'g');
    }
  }
}

// 放置設施：強化視覺特效（彈出動畫 + 光環 + 火花）+ 音效
// opts.overlay=true 時用 SFX.placeOverlay（疊加：蕾雅/物流之王/倉儲女王/大財團取代）
// opts.bldgId 指定剛放置 id（供 onFacilityPlaced 使用；疊加時需顯式傳入）
function placeEffect(r,c,opts){
  opts=opts||{};
  if(opts.overlay) SFX.placeOverlay(); else SFX.place();
  const el=cellQ(r,c);
  if(!el) return;
  // 彈出動畫
  el.classList.remove('place-spawn');void el.offsetWidth;el.classList.add('place-spawn');
  setTimeout(()=>el.classList.remove('place-spawn'),600);
  // 光環（expanding ring）
  const parent=el.parentElement;
  if(parent){
    const rect=el.getBoundingClientRect(), pRect=parent.getBoundingClientRect();
    const ring=document.createElement('div');
    ring.className='place-ring';
    ring.style.left=(rect.left-pRect.left)+'px';
    ring.style.top=(rect.top-pRect.top)+'px';
    ring.style.width=rect.width+'px';
    ring.style.height=rect.height+'px';
    parent.style.position=parent.style.position||'relative';
    parent.appendChild(ring);
    setTimeout(()=>ring.remove(),600);
    // 火花粒子（6 顆向外飛散）
    for(let i=0;i<6;i++){
      const sp=document.createElement('div');
      sp.className='place-sparkle';
      sp.textContent='✨';
      const cx=rect.left-pRect.left+rect.width/2-8;
      const cy=rect.top-pRect.top+rect.height/2-8;
      sp.style.left=cx+'px';
      sp.style.top=cy+'px';
      const angle=(i/6)*Math.PI*2;
      sp.style.setProperty('--sx',Math.cos(angle)*42+'px');
      sp.style.setProperty('--sy',Math.sin(angle)*42+'px');
      parent.appendChild(sp);
      setTimeout(()=>sp.remove(),850);
    }
  }
  // 放置後觸發的設施專屬效果（如電子工廠 +2×N）
  const placedId = opts.bldgId || G.grid[r][c];
  onFacilityPlaced(r, c, placedId);
}

const tip=()=>document.getElementById('tooltip');
function showTooltip(e,html){
  const t=tip(); if(!t)return;
  t.innerHTML=html; t.classList.add('show');
  positionTooltip(e);
}
function positionTooltip(e){
  const t=tip(); if(!t)return;
  let x=e.clientX+14, y=e.clientY+14;
  if(x+210>window.innerWidth) x=e.clientX-220;
  if(y+120>window.innerHeight) y=e.clientY-130;
  t.style.left=x+'px'; t.style.top=y+'px';
}
function hideTooltip(){ const t=tip(); if(t) t.classList.remove('show'); }
document.addEventListener('mousemove',e=>{ const t=tip(); if(t&&t.classList.contains('show')) positionTooltip(e); });

// 選擇卡片渲染（設施/合夥人統一格式）
// ══════════════════════════════════════
function makeSelCard(emoji,name,desc,pos,neg,onclick,extraClass='',pid='',hoverFn=''){
  const negLine=neg&&neg!=='無'?`<div class="sel-card-neg">✕ ${neg}</div>`:'';
  const tipParts=[desc||''];
  if(pos) tipParts.push('✓ '+pos);
  if(neg&&neg!=='無') tipParts.push('✕ '+neg);
  const tipAttr=tipParts.join('\n').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  const pDef=pid&&PARTNERS[pid];
  const emojiHtml = pDef&&pDef.avatar
    ? `<img src="${pDef.avatar}" class="sel-card-avatar" alt="${name}">`
    : `<div class="sel-card-emoji">${emoji}</div>`;
  const hoverCall = hoverFn || `DM.onPartnerHover(this.querySelector('.sel-card-name').textContent); DM.onBldgHover(Object.keys(BLDG).find(k=>BLDG[k].name===this.querySelector('.sel-card-name').textContent)||'');`;
  // 稀有度：pid 優先從 PARTNER_RARITY 取；若非合夥人則以 name 反查 BLDG id
  let rarity='';
  if(pid&&PARTNER_RARITY[pid]) rarity=PARTNER_RARITY[pid];
  else{
    const matchBid=Object.keys(BLDG).find(k=>BLDG[k].name===name);
    if(matchBid&&BLDG_RARITY[matchBid]) rarity=BLDG_RARITY[matchBid];
  }
  const rarityClass=rarity?' rarity-'+rarity.toLowerCase():'';
  return `<div class="sel-card ${extraClass}${rarityClass}" onclick="${onclick}"
    data-tip="${tipAttr}"
    onmouseenter="tipFromAttr(event,this); ${hoverCall}"
    onmouseleave="hideTooltip()">
    ${emojiHtml}
    <div class="sel-card-name">${name}</div>
    <div class="sel-card-desc">${highlightDescTags(desc||'')}</div>
    ${pos?`<div class="sel-card-pos">✓ ${highlightDescTags(pos)}</div>`:''}
    ${negLine}
  </div>`;
}

let _cardChooserSkipFn=null;
function showCardChooser(title, cards, onSkip){

  document.getElementById('card-chooser-title').textContent=title;
  document.getElementById('card-chooser-cards').innerHTML=cards.map(card=>
    makeSelCard(card.emoji,card.name,card.desc,card.pos,card.neg,card.onclick,'',card.pid||'')
  ).join('');

  if(skipBtn){ skipBtn.style.display=''; skipBtn.textContent='✕ 取消'; skipBtn.onclick=()=>{ const fn=_cardChooserSkipFn; closeCardChooser(); if(fn) fn(); }; }

function closeCardChooser(){
  document.getElementById('card-chooser').style.display='none';
  _cardChooserSkipFn=null;
}
function cardChooserPick(fn){

function tipFromAttr(e,el){
  const raw=(el.getAttribute('data-tip')||'')
    .replace(/&quot;/g,'"').replace(/&#39;/g,"'");
  const txt=raw.replace(/\|/g,'\n');
  if(txt&&e) showTooltip(e,txt);
}
function tipBldg(e,id){
  const b=BLDG[id]; if(!b)return;
  showTooltip(e, b.name + '\n' + (b.desc||'') + '\n基礎輸出: +' + (b.fn(1)-1));
  DM.onBldgHover(id);
}

// 格子懸停：短暫顯示設施名，1秒後顯示詳細加成
let _cellHoverTimer=null, _cellHoverEvt=null;
function cellHoverStart(e,r,c){
  clearTimeout(_cellHoverTimer);
  _cellHoverEvt=e;
  const bId=G.grid[r][c];
  if(bId&&BLDG[bId]){
    const ovs=getOverlays(r,c);
    if(ovs.length>0){
      let tip=BLDG[bId].name+'\n'+(BLDG[bId].desc||'');
      ovs.forEach(ovId=>{ const ob=BLDG[ovId]; if(ob) tip+='\n── 疊加 ──\n'+ob.name+'\n'+(ob.desc||''); });
      showTooltip(e, tip);
    } else {
      tipBldg(e,bId);
    }
  }
  // 1秒後顯示詳細加成面板
  _cellHoverTimer=setTimeout(()=>showCellDetailTip(e,r,c),1000);
}
function cellHoverEnd(){
  clearTimeout(_cellHoverTimer);
  hideTooltip();
}
function showCellDetailTip(e,r,c){
  const k=`${r},${c}`;
  const bId=G.grid[r][c];
  const lines=[];
  // 設施基礎資訊
  if(bId&&BLDG[bId]){
    const b=BLDG[bId];
    lines.push(`<b>${b.emoji} ${b.name}</b>`);
    lines.push(b.desc||'');
  } else if(bId==='ruin'){
    lines.push('<b>🏚️ 廢墟</b>');
  } else {
    lines.push('<b>空格</b>');
  }
  // 升級加成
  const upg=G.bldgUpgrades&&G.bldgUpgrades[k]||0;
  if(upg>0) lines.push(`⬆ 升級加成: +${upg}`);
  // 蕾雅百分比
  const leya=G.leyaPctMods&&G.leyaPctMods[k]||0;
  if(leya>0) lines.push(`👩‍🔧 蕾雅: +${leya}%`);
  // cellMods（人材/派遣總部/磁力板/公路之星等，每回合清除）
  const mod=G.cellMods&&G.cellMods[k]||0;
  if(mod!==0) lines.push(`${mod>0?'🧑‍💼':'🏚️'} 本回合加成: ${mod>0?'+':''}${mod}`);
  // permCellMods（地皮炒家空格+4 等永久）
  const permMod=G.permCellMods&&G.permCellMods[k]||0;
  if(permMod!==0) lines.push(`🏚️ 永久加成: ${permMod>0?'+':''}${permMod}`);
  // cellPctMods（事件效果）
  const pct=G.cellPctMods&&G.cellPctMods[k]||0;
  if(pct!==0) lines.push(`🎲 事件效果: ${pct>0?'+':''}${pct}%`);
  // 期貨百分比
  if(bId==='futures_market'){
    const fp=G.futuresPct&&G.futuresPct[k]||0;
    lines.push(`🏛 本回合期貨: ${fp>=0?'+':''}${fp}%`);
  }
  // 爆破倒數
  if(bId==='bomb_device'&&G.bombTimers&&G.bombTimers[k]!==undefined){
    lines.push(`💣 爆炸倒數: ${G.bombTimers[k]} 回合`);
  }
  // 疊加設施
  const _ovs=getOverlays(r,c);
  _ovs.forEach(ovId=>{
    const ov=BLDG[ovId];
    if(ov){
      lines.push(`── 疊加設施 ──`);
      lines.push(`<b>${ov.emoji} ${ov.name}</b>`);
      lines.push(ov.desc||'');
    }
  });
  // 事件預告
  if(G.nextEvent&&G.nextEventData&&G.nextEventData.cells&&G.nextEventData.cells.includes(k)){
    lines.push(`⚠ 預告: ${G.nextEvent.title}`);
  }
  // 只在有加成資訊時顯示（超過基本設施描述）
  if(lines.length>2||(!bId&&lines.length>1)){
    showTooltip(_cellHoverEvt||e, lines.join('\n'));
  }
}
