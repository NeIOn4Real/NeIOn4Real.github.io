// 中央區域判斷
// 4×4: (1,1)(1,2)(2,1)(2,2) — 內圈2×2
// 5×5: (1,1)~(3,3) — 內圈3×3
// ══════════════════════════════════════
let _centerCellsCache=null;
let _centerCellsCacheSize=0;
function getCenterCells(n){
  n = n || GN();
  if(_centerCellsCache && _centerCellsCacheSize===n) return _centerCellsCache;
  const cells = new Set();
  if(n===4){
    [[1,1],[1,2],[2,1],[2,2]].forEach(([r,c])=>cells.add(`${r},${c}`));
  } else if(n===5){
    for(let r=1;r<=3;r++) for(let cc=1;cc<=3;cc++) cells.add(`${r},${cc}`);
  } else {
    // generic: exclude outer ring
    for(let r=1;r<n-1;r++) for(let cc=1;cc<n-1;cc++) cells.add(`${r},${cc}`);
  }
  _centerCellsCache=cells;
  _centerCellsCacheSize=n;
  return cells;
}
function isCenterCell(r,c){ return getCenterCells().has(`${r},${c}`); }

// 嫉妒惡魔負面：偵測格子（base 或 overlay 任一）含嫉妒工廠 → 觸發遊戲結束
// 必須在實際消滅 / clearKeyedData 之前呼叫，否則 cellOverlay 已被清空
function _triggerEnvyGameOverIfPresent(r, c, reason){
  if(!hasPartner('envy') || isDemonNegDisabled('envy') || G._envyGameOverFired) return;
  const bId = G.grid[r] && G.grid[r][c];
  const ovs = (typeof getOverlays === 'function') ? getOverlays(r, c) : [];
  if(bId !== 'envy_factory' && !ovs.includes('envy_factory')) return;
  G._envyGameOverFired = true;
  addLog(`💚 嫉妒惡魔：嫉妒工廠${reason}，遊戲結束！`, 'b');
  // 預演：全屏震動 + 喪鐘預告
  const main=document.querySelector('main');
  if(main){ main.classList.remove('expanding'); void main.offsetWidth; main.classList.add('expanding'); setTimeout(()=>main.classList.remove('expanding'),1300); }
  setTimeout(() => {
    try { if(typeof clearAutoSave === 'function') clearAutoSave(); } catch(_) {}
    SFX.loseToll();
    showModal('lose', `嫉妒工廠${reason}！\n第 ${G.round} 輪結束\n收益 ${G.profit} / 目標 ${G.goal}`);
  }, 300);
}

function destroyFacility(r, c){
  const bId=G.grid[r][c];
  if(!bId||bId==='ruin') return;
  // 不可消滅設施：跳過（巨人村、古代機械工廠、世界奇觀、災害控管局）
  if(BLDG[bId]&&BLDG[bId].indestructible){
    addLog(`🛡️ ${BLDG[bId].emoji}${BLDG[bId].name} 不會被消滅！`);
    SFX.invalid();
    requestAnimationFrame(()=>{ const el=cellQ(r,c); if(el){ el.classList.remove('invalid-shake'); void el.offsetWidth; el.classList.add('invalid-shake'); setTimeout(()=>el.classList.remove('invalid-shake'),360); } });
    return;
  }
  // 地產合約：累計賣出 / 消滅設施計數
  if(Array.isArray(G.activeContracts)){
    const reAc = G.activeContracts.find(ac=>ac.id==='real_estate_contract');
    if(reAc){ reAc.state.soldCount = (reAc.state.soldCount||0) + 1; }
  }
  // 嫉妒惡魔負面：嫉妒工廠（base 或 overlay）被消滅 → 遊戲結束
  _triggerEnvyGameOverIfPresent(r, c, '被消滅');
  // 消滅視覺效果（cell-only 紅閃 + 碎片 + destroy 音效）
  // 必須在 G.grid 變更前呼叫；百貨公司 2×2 在下方分支內各自觸發
  if(bId!=='dept_store'&&bId!=='dept_store_part') destroyEffect(r,c);
  // 炸彈客：爆破裝置消滅時不產生廢墟
  const _bomberNoRuin=hasPartner('bomber')&&bId==='bomb_device';
  // 爆破工程師手動使用時不產生廢墟（由 useDemoExpert 設 _demoExpertNoRuin）
  const _demoExpertNoRuin=G._demoExpertNoRuin===true;
  const _noRuin=_bomberNoRuin||_demoExpertNoRuin;
  // 百貨公司：消滅任一格時連帶消滅整個 2×2
  if(bId==='dept_store'||bId==='dept_store_part'){
    // 找到 anchor
    const key=`${r},${c}`;
    let ak=bId==='dept_store'?key:(G.deptStoreParts&&G.deptStoreParts[key]);
    if(ak){
      const [ar,ac]=ak.split(',').map(Number);
      let _deptSfxPlayed=false;
      for(let dr=0;dr<2;dr++) for(let dc=0;dc<2;dc++){
        const cr=ar+dr, cc=ac+dc, ck=`${cr},${cc}`;
        if(cr<GN()&&cc<GN()&&G.grid[cr]&&(G.grid[cr][cc]==='dept_store'||G.grid[cr][cc]==='dept_store_part')){
          destroyEffect(cr,cc, _deptSfxPlayed?{silent:true}:undefined); // 只第一格播音
          _deptSfxPlayed=true;
          // 先處理該格上的疊加設施
          const _deptOvs=getOverlays(cr,cc);
          if(_deptOvs.length>0){
            _deptOvs.forEach(ovId=>{
              const ovName=BLDG[ovId]?.name||'疊加設施';
              addLog(`🗑 疊加設施 ${BLDG[ovId]?.emoji||''}${ovName} 隨百貨公司一同消滅`,'b');
              if(hasPartner('facility_destroyer')){
                G.profit+=4;
                addLog(`💣 設施破壞者：${ovName}（疊加）被消滅，+4收益！`,'g');
                schedulePartnerProfit('facility_destroyer',4,100);
              }
              if(G.partnerState._scrapCity){
                G.partnerState._scrapCity.x=(G.partnerState._scrapCity.x||0)+2;
              }
              G._facilitiesDestroyedThisTurn=(G._facilitiesDestroyedThisTurn||0)+1;
            });
          }
          G.grid[cr][cc]='ruin';
          if(!G.ruinCells) G.ruinCells=new Set();
          G.ruinCells.add(ck);
          clearKeyedData(ck);
        }
        if(G.deptStoreParts) delete G.deptStoreParts[ck];
      }
      if(G.deptStoreAnchors) delete G.deptStoreAnchors[ak];
    }
    addLog(`🏬 百貨公司 被消滅！整個 2×2 區域變為廢墟`,'b');
    if(hasPartner('facility_destroyer')){
      G.profit+=4;
      addLog(`💣 設施破壞者：百貨公司被消滅，+4收益！`,'g');
    }
    if(hasPartner('ruin_scavenger')) addLog(`💀 廢墟掠奪者：百貨公司成為廢墟`,'g');
    renderFanHand(); render(); return;
  }
  // 疊加設施（cellOverlay）：每個疊加設施也視為一次消滅，觸發設施破壞者/廢鐵城/災害控管局/廢墟掠奪者
  const _ovList=getOverlays(r,c);
  if(_ovList.length>0){
    _ovList.forEach(ovId=>{
      const ovName=BLDG[ovId]?.name||'疊加設施';
      addLog(`🗑 疊加設施 ${BLDG[ovId]?.emoji||''}${ovName} 隨底層一同消滅`,'b');
      if(hasPartner('facility_destroyer')){
        G.profit+=4;
        addLog(`💣 設施破壞者：${ovName}（疊加）被消滅，+4收益！`,'g');
        schedulePartnerProfit('facility_destroyer',4,100);
      }
      if(G.partnerState._scrapCity){
        G.partnerState._scrapCity.x=(G.partnerState._scrapCity.x||0)+2;
        addLog(`🏚 廢鐵城：疊加設施消滅，累積+2（x=${G.partnerState._scrapCity.x}）`,'g');
      }
      G._facilitiesDestroyedThisTurn=(G._facilitiesDestroyedThisTurn||0)+1;
    });
  }
  // 設施破壞者：+4 收益
  if(hasPartner('facility_destroyer')){
    G.profit+=4;
    addLog(`💣 設施破壞者：${BLDG[bId].name}被消滅，+4收益！`,'g');
    schedulePartnerProfit('facility_destroyer',4,100);
  }
  // 廢鐵城：每消滅設施 x 永久+2
  const _scSt=G.partnerState._scrapCity;
  if(_scSt){ _scSt.x=(_scSt.x||0)+2; addLog(`🏚 廢鐵城：消滅設施，累積+2（x=${_scSt.x}）`,'g'); }
  // 災害控管局：追蹤本回合消滅數（per-turn 累計）
  G._facilitiesDestroyedThisTurn=(G._facilitiesDestroyedThisTurn||0)+1;
  // Clear all keyed data for that cell
  const _dk=`${r},${c}`;
  clearKeyedData(_dk);
  // 廢墟紀念碑消滅後還原為空格，不變成廢墟
  if(bId==='ruin_monument'){
    G.grid[r][c]=null;
    addLog(`🗿 廢墟紀念碑 (${r+1},${c+1}) 被消滅，格子還原為空地`);
    // 地皮炒家：格子變空格時 永久 +4
    if(hasPartner('land_speculator')){
      if(!G.permCellMods) G.permCellMods={};
      G.permCellMods[`${r},${c}`]=(G.permCellMods[`${r},${c}`]||0)+4;
      addLog(`🏚️ 地皮炒家：(${r+1},${c+1}) 變成空格，永久+4`,'g');
    }
  } else if(_noRuin){
    // 炸彈客 / 爆破工程師：消滅時不產生廢墟，變空格
    G.grid[r][c]=null;
    if(_bomberNoRuin) addLog(`💣 炸彈客：爆破裝置不產生廢墟`);
    else addLog(`🧨 爆破工程師：消滅後不產生廢墟`);
    if(hasPartner('land_speculator')){
      if(!G.permCellMods) G.permCellMods={};
      G.permCellMods[`${r},${c}`]=(G.permCellMods[`${r},${c}`]||0)+4;
      addLog(`🏚️ 地皮炒家：(${r+1},${c+1}) 變成空格，永久+4`,'g');
    }
  } else {
    // 放置廢墟
    G.grid[r][c]='ruin';
    if(!G.ruinCells) G.ruinCells=new Set();
    G.ruinCells.add(`${r},${c}`);
    if(hasPartner('ruin_scavenger')) addLog(`💀 廢墟掠奪者：(${r+1},${c+1})成為廢墟`,'g');
  }
  // 強化增幅裝置光環：消滅可能改變鄰接關係 → 重算
  recomputeBoosterAura();
  renderFanHand();
  render();
}

// ── 格子資料交換（grid + bldgUpgrades + leyaPctMods + cellMods） ──
function swapCellData(r1,c1,r2,c2){
  const k1=`${r1},${c1}`, k2=`${r2},${c2}`;
  SFX.swap();
  // grid
  const tmp=G.grid[r2][c2];
  G.grid[r2][c2]=G.grid[r1][c1];
  G.grid[r1][c1]=tmp;
  // 交換所有位置鍵值資料
  KEYED_DATA_FIELDS.forEach(dk=>{
    if(!G[dk]) return;
    const v1=G[dk][k1], v2=G[dk][k2];
    if(v1!==undefined||v2!==undefined){ G[dk][k1]=v2; G[dk][k2]=v1; }
    if(G[dk][k1]===undefined) delete G[dk][k1];
    if(G[dk][k2]===undefined) delete G[dk][k2];
  });
  // 嫉妒工廠 cellBonus 同步交換（per-cell 但巢狀於 partnerState）
  const eb=G.partnerState&&G.partnerState.envy&&G.partnerState.envy.cellBonus;
  if(eb){
    const v1=eb[k1], v2=eb[k2];
    if(v1!==undefined||v2!==undefined){ eb[k1]=v2; eb[k2]=v1; }
    if(eb[k1]===undefined) delete eb[k1];
    if(eb[k2]===undefined) delete eb[k2];
  }
  // 同步廢墟追蹤
  if(G.ruinCells){
    if(G.grid[r1][c1]==='ruin') G.ruinCells.add(k1); else G.ruinCells.delete(k1);
    if(G.grid[r2][c2]==='ruin') G.ruinCells.add(k2); else G.ruinCells.delete(k2);
  }
  // 百貨公司映射可能因交換而錯亂，重建
  rebuildDeptStore();
}

// ── 百貨公司映射重建 ──
function rebuildDeptStore(){
  G.deptStoreAnchors={}; G.deptStoreParts={};
  const gn=GN();
  for(let r=0;r<gn;r++) for(let c=0;c<gn;c++){
    if(G.grid[r][c]==='dept_store'){
      const ak=`${r},${c}`;
      G.deptStoreAnchors[ak]=true;
      [[r,c+1],[r+1,c],[r+1,c+1]].forEach(([pr,pc])=>{
        if(pr<gn&&pc<gn&&G.grid[pr][pc]==='dept_store_part') G.deptStoreParts[`${pr},${pc}`]=ak;
      });
    }
  }
  // 清理孤立的 dept_store_part（沒有對應 dept_store 錨點）
  for(let r=0;r<gn;r++) for(let c=0;c<gn;c++){
    if(G.grid[r][c]==='dept_store_part' && !G.deptStoreParts[`${r},${c}`]){
      G.grid[r][c]=null;
      clearKeyedData(`${r},${c}`);
    }
  }
}

// ── 相鄰設施計數（百貨公司視為一個整體） ──
function countAllShops(){
  let count=findCells((r,c,b)=>isShopType(b)).length;
  eachCell((r,c)=>{ getOverlays(r,c).forEach(ovId=>{ if(isShopType(ovId)) count++; }); });
  return count;
}
function countAdjacentFacilities(r,c){
  const gn=GN();
  const adj=[[r-1,c],[r+1,c],[r,c-1],[r,c+1]];
  const seen=new Set();
  let count=0;
  adj.forEach(([ar,ac])=>{
    if(ar<0||ar>=gn||ac<0||ac>=gn) return;
    if(!isFacility(G.grid[ar][ac])) return;
    // 百貨公司：用錨點做唯一 ID，避免重複計數
    const bid=G.grid[ar][ac];
    if(bid==='dept_store'||bid==='dept_store_part'){
      const anchor=bid==='dept_store'?`${ar},${ac}`:(G.deptStoreParts&&G.deptStoreParts[`${ar},${ac}`]||`${ar},${ac}`);
      if(seen.has(anchor)) return;
      seen.add(anchor);
    }
    count++;
    // 環境感應站 desc：「周圍 4 格每有 1 個設施 +2」— 每格只算一次，疊加設施不另計
  });
  return count;
}

// ── 相鄰是否有商店（百貨公司視為一個整體，含疊加設施） ──
function hasAdjacentShop(r,c){
  const gn=GN();
  const adj=[[r-1,c],[r+1,c],[r,c-1],[r,c+1]];
  return adj.some(([ar,ac])=>{
    if(ar<0||ar>=gn||ac<0||ac>=gn) return false;
    if(isShopType(G.grid[ar][ac])) return true;
    return getOverlays(ar,ac).some(ovId=>isShopType(ovId));
  });
}

// ── 移動 session 共用判斷與 flush ──
// freeRearrange（拆遷隊/自由排列）與 _mobileCityMode（移動都市）皆視為移動 session。
// session 內，「設施被移動」相關的觸發效果延後到 session 結束才結算，整段視為 1 次移動，
// 避免在 session 內反覆 swap A↔B 無限觸發 demolish_bureau / dynamic_amp / trade_zone。
function _isInMoveSession(){ return !!(G.freeRearrange || G._mobileCityMode); }
function _flushMoveSession(){
  if(G._demolishBureauPending){
    const bureaus=findCells((r,c,b)=>b==='demolish_bureau');
    if(bureaus.length>0){
      const bonus=bureaus.length*4;
      G.profit+=bonus;
      addLog(`🏢 拆遷補償局：移動結束 1次移動 × ${bureaus.length}個補償局，+${bonus}收益`,'g');
      bureaus.forEach(([br,bc])=>profitFlyFromCell(br,bc,4));
    }
    G._demolishBureauPending=false;
  }
  if(G._tradeZonePending&&G._tradeZonePending.length>0){
    G._tradeZonePending.forEach(p=>_addTradeZoneBonus(p.zr,p.zc,p.reason));
    G._tradeZonePending=null;
  }
  if(G._dynamicAmpPending&&G._dynamicAmpPending.size>0){
    if(!G.dynamicAmpMoves) G.dynamicAmpMoves={};
    G._dynamicAmpPending.forEach(k=>{
      G.dynamicAmpMoves[k]=(G.dynamicAmpMoves[k]||0)+1;
    });
    G._dynamicAmpPending=null;
  }
}
function startMobileCityMode(){
  saveGridSnapshot();
  G._mobileCityMode=true;
  G._mobileCitySrc=null;
  G._mobileCityMoveCount=0;
  G._demolishBureauPending=false;
  G._tradeZonePending=null;
  G._dynamicAmpPending=null;
  addLog('🏙 移動都市：點擊周圍 8 格內要交換的兩格設施，可多次交換，完成後按「完成移動」');
  render();
}
function endMobileCityMode(committed){
  if(committed){
    _flushMoveSession();
    deleteGridSnapshot();
    const cnt=G._mobileCityMoveCount||0;
    G._mobileCityMode=false;
    G._mobileCitySrc=null;
    G._mobileCityUsedThisTurn=true;
    addLog(`🏙 完成移動都市操作（共移動 ${cnt} 次）`,'g');
  } else {
    // 取消：還原 grid + 丟棄 pending（與 cancelRearrange 一致；不消耗本回合 slot）
    restoreGridSnapshot();
    G._mobileCityMode=false;
    G._mobileCitySrc=null;
    G._mobileCityMoveCount=0;
    G._demolishBureauPending=false;
    G._tradeZonePending=null;
    G._dynamicAmpPending=null;
    addLog('🏙 取消移動都市操作（設施已還原）');
  }
  render();
}

// ── 交換後附帶效果（拆遷補償局/地皮炒家） ──
function onFacilityMoved(r,c,sr,sc){
  G.turnFacMoved=(G.turnFacMoved||0)+1;
  // 拆遷補償局：移動 session 內延後到 session 結束才結算，整段只視為 1 次移動
  if(_isInMoveSession()){
    G._demolishBureauPending=true;
  } else {
    const bureaus=findCells((r,c,b)=>b==='demolish_bureau');
    if(bureaus.length>0){G.profit+=4;addLog('🏢 拆遷補償局：設施移動+4收益','g');profitFlyFromCell(bureaus[0][0],bureaus[0][1],4);SFX.partnerProc();}
  }
  if(hasPartner('land_speculator')&&sr!==undefined){
    // 來源格變成空格時，該格永久+4（寫入 permCellMods，不受每回合清除影響）
    if(!G.grid[sr][sc]||G.grid[sr][sc]==='ruin'){
      if(!G.permCellMods) G.permCellMods={};
      G.permCellMods[`${sr},${sc}`]=(G.permCellMods[`${sr},${sc}`]||0)+4;
      addLog(`🏚️ 地皮炒家：(${sr+1},${sc+1}) 變成空格，永久+4`,'g');
      SFX.upgrade();
      requestAnimationFrame(()=>{ const el=cellQ(sr,sc); if(el){ el.classList.remove('transform-flash'); void el.offsetWidth; el.classList.add('transform-flash'); setTimeout(()=>el.classList.remove('transform-flash'),500); } });
    }
  }
  // 動態加強器：若被移動的設施是 dynamic_amp 本身（兩端任一），per-cell 計數 +1
  // 移動 session 內延後計數，session 結束時每個被移動過的 dynamic_amp 只算 1 次（避免反覆 swap 灌水）
  if(sr!==undefined){
    const _dstId=G.grid[r]&&G.grid[r][c];
    const _srcId=G.grid[sr]&&G.grid[sr][sc];
    if(_dstId==='dynamic_amp'||_srcId==='dynamic_amp'){
      if(_isInMoveSession()){
        if(!G._dynamicAmpPending) G._dynamicAmpPending=new Set();
        if(_dstId==='dynamic_amp') G._dynamicAmpPending.add(`${r},${c}`);
        if(_srcId==='dynamic_amp') G._dynamicAmpPending.add(`${sr},${sc}`);
      } else {
        if(!G.dynamicAmpMoves) G.dynamicAmpMoves={};
        if(_dstId==='dynamic_amp'){
          const dk=`${r},${c}`;
          G.dynamicAmpMoves[dk]=(G.dynamicAmpMoves[dk]||0)+1;
        }
        if(_srcId==='dynamic_amp'){
          const dk=`${sr},${sc}`;
          G.dynamicAmpMoves[dk]=(G.dynamicAmpMoves[dk]||0)+1;
        }
      }
    }
  }
  // 貿易特區：商店被移動到 trade_zone 周圍時 +2（僅當「從非鄰接移入鄰接」才觸發）
  // 處理兩端：交換時兩個位置都可能是新移入的商店
  if(sr!==undefined){
    const _checkMovedShop=(newR,newC,oldR,oldC)=>{
      const bId=G.grid[newR][newC];
      if(!bId||bId==='trade_zone'||!BLDG[bId]||!BLDG[bId].isShop) return;
      eachCell((zr,zc,zb)=>{
        if(zb!=='trade_zone'||(zr===newR&&zc===newC)) return;
        const wasAdj=_isWithin8(oldR,oldC,zr,zc);
        const nowAdj=_isWithin8(newR,newC,zr,zc);
        if(nowAdj&&!wasAdj){
          _maybeAddTradeZoneBonus(zr,zc,`${BLDG[bId].name} 移入 (${newR+1},${newC+1})`);
        }
      });
    };
    _checkMovedShop(r,c,sr,sc);   // (sr,sc) → (r,c) 端
    _checkMovedShop(sr,sc,r,c);   // 交換時的另一端
  }
  // 強化增幅裝置光環：設施位置變動 → 重算
  recomputeBoosterAura();
}

function leyaUpgrade(r,c,bId){

}

// 套用格子升級加成（所有special設施共用）
// 旗標宣告於 applyOverlayPipeline 之前，避免 TDZ；
// overlay pipeline 期間此旗標為 true，applyUpgradeBonus 變 no-op，由 pipeline 統一加 upgradeBonus
function applyUpgradeBonus(r, c, val, bName){
  if(_inOverlayCtx) return val;
  const key=`${r},${c}`;
  let upg=G.bldgUpgrades&&G.bldgUpgrades[key]||0;
  // 電子專用加成：base 為電子設施才吃
  const baseBId=G.grid[r]&&G.grid[r][c];
  if(baseBId&&hasTag(baseBId,'electronic')){
    upg+=G.bldgUpgradesElec&&G.bldgUpgradesElec[key]||0;
  }
  if(upg>0){
    addLog(`    ⬆ ${bName}升級加成：+${upg}`,'g');
    return val+upg;
  }
  return val;
}

let _lastTalentCount=null;
function renderTalentPanel(){
  const panel=document.getElementById('talent-panel');
  const title=document.getElementById('talent-section-title');
  if(!panel) return;
  const n=G.talentCards||0;
  // 員工合約：追蹤本輪人材歷史最高
  if(G.contractCounters && n > (G.contractCounters.roundMaxTalent||0)){
    G.contractCounters.roundMaxTalent = n;
  }
  // 偵測人材變化：增加播獲得音、減少播失去音；數字 tween
  // 首次呼叫（_lastTalentCount===null）只記錄不播音，避免載入存檔誤觸發
  const delta = (_lastTalentCount===null) ? 0 : (n-_lastTalentCount);
  if(title) title.style.display='block';
  panel.style.display='flex';
  if(n===0){
    panel.innerHTML='<div style="font-size:9px;color:var(--hi);padding:4px 0;">尚無人材</div>';
  } else {
    // 批量投入量設定（拖到設施格時生效）
    const _bulk = (G._talentBulkSize==='all')?'all':(Number(G._talentBulkSize)||1);
    const _bulkLabel = _bulk==='all' ? `全部(${n})` : `×${_bulk}`;
    const _btn=(v,label)=>{
      const sel=(_bulk===v||(_bulk==='all'&&v==='all'))?' sel':'';
      const arg=typeof v==='number'?v:`'${v}'`;
      return `<button class="bs${sel}" onclick="setTalentBulkSize(${arg})">${label}</button>`;
    };
    panel.innerHTML=`<div class="talent-token" title="人材：拖到元素卡多投入一次，或拖到設施格 +${_bulk==='all'?'全部':_bulk}"
      draggable="true"
      ondragstart="onTalentDragStart(event,0)"
      ondragend="onTalentDragEnd(event)"
      style="width:32px;height:42px;background:linear-gradient(145deg,#fff9ee,#fff3d4);
        border:1.5px solid var(--money);border-radius:6px;
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        cursor:grab;font-size:16px;box-shadow:0 2px 6px rgba(42,26,8,.12);position:relative;">
      <div>🧑‍💼</div>
      ${_bulk!==1?`<div style="position:absolute;top:-4px;right:-6px;font-size:8px;font-weight:900;color:#fff;background:var(--money);border-radius:99px;padding:1px 4px;line-height:1.2;border:1px solid #fff;">${_bulkLabel}</div>`:''}
    </div>
    <div id="talent-count" style="font-size:11px;font-weight:900;color:var(--money);
      display:flex;align-items:center;padding-left:4px;">×${n}</div>
    <div class="talent-bulk-selector" title="批量投入：選擇後一次拖曳投入 N 次（含所有副作用：工會/惡魔/分身/銀行）">
      ${_btn(1,'×1')}${_btn(2,'×2')}${_btn(5,'×5')}${_btn('all','全部')}
    </div>`;
  }
  // 變化動畫 + 音效（首次呼叫 delta=0 自然不觸發）
  if(delta!==0){
    if(delta>0) SFX.talentGain(); else SFX.talentLose();
    requestAnimationFrame(()=>{
      const cnt=document.getElementById('talent-count');
      if(cnt){
        const cls=delta>0?'value-tween':'value-tween-lose';
        cnt.classList.remove(cls); void cnt.offsetWidth; cnt.classList.add(cls);
      }
    });
  }
  _lastTalentCount=n;
}

// 立繪 pop（教學步驟切換 / 重要事件台詞時使用，1.5s throttle 避免頻繁觸發）
let _lastCharPopTime=0;
function charPopFx(){
  const now=Date.now();
  if(now-_lastCharPopTime<1500) return;
  _lastCharPopTime=now;
  const tray=document.getElementById('char-tray');
  if(!tray) return;
  tray.classList.remove('char-pop'); void tray.offsetWidth; tray.classList.add('char-pop');
  setTimeout(()=>tray.classList.remove('char-pop'),320);
}
const DM = {
  _timer: null,

  show(text, duration=4000, expr=0){
    if(!text) return;
    if(TUT.hookDMFilter()) return;
    const el = document.getElementById('char-bubble');
    if(!el) return;
    if(this._timer) clearTimeout(this._timer);
    // 切換角色表情
    if(expr >= 1 && expr <= 6) setCharExpr(expr);
    el.textContent = text;
    el.classList.add('show');
    this._timer = setTimeout(()=>{
      el.classList.remove('show');
      this._timer = null;
      // 對話結束後恢復預設表情
      setCharExpr(1);
    }, duration);
  },

  // 主要觸發入口：傳入觸發鍵值（教學/事件等重要時刻；附立繪 pop）
  trigger(key){
    const text = DIALOGUES[key];
    if(text){ this.show(text, 4000, DIALOGUE_EXPR[key]||1); charPopFx(); }
  },

  // 事件觸發（自動匹配 DIALOGUES 中 event_ 開頭的鍵）
  onEvent(title){
    // 從 title 中取出中文名稱部分（去除 emoji 前綴）
    const clean=title.replace(/^[^\u4e00-\u9fff]+/,'').trim();
    const key='event_'+clean;
    const text=DIALOGUES[key];
    if(text){ this.show(text, 5000, DIALOGUE_EXPR[key]||1); charPopFx(); return; }
    // fallback: 遍歷所有 event_ 鍵做子字串匹配
    for(const dk of Object.keys(DIALOGUES)){
      if(dk.startsWith('event_')&&title.includes(dk.slice(6))){
        this.show(DIALOGUES[dk], 5000, DIALOGUE_EXPR[dk]||1); return;
      }
    }
  },

  // 設施 hover（立即覆蓋）
  onBldgHover(bldgId){
    const b = BLDG[bldgId];
    if(!b) return;
    const name = b.special==='redirect' ? '物流中心' : b.name;
    const key = 'bldg_hover_' + name;
    const text = DIALOGUES[key];
    if(text) this.show(text, 4000, DIALOGUE_EXPR[key]||1);
  },

  // 行動 hover（立即覆蓋）
  onActionHover(label){
    const clean = label.replace(/^[^一-龥a-zA-Z]+/, '').trim();
    const key = 'action_hover_' + clean;
    if(DIALOGUES[key]) this.show(DIALOGUES[key], 4000, DIALOGUE_EXPR[key]||1);
  },

  // 行動選擇開啟（短時間，讓位給 hover）
  onActionOpen(){
    const key = 'action_open';
    if(DIALOGUES[key]) this.show(DIALOGUES[key], 4000, DIALOGUE_EXPR[key]||1);
  },

  // 合夥人 hover（選擇時）
  onPartnerHover(name){
    const pKey = 'partner_hover_' + name;
    const sKey = 'starter_hover_' + name;
    const text = DIALOGUES[pKey] || DIALOGUES[sKey];
    const expr = DIALOGUE_EXPR[pKey] || DIALOGUE_EXPR[sKey] || 1;
    if(text) this.show(text, 4000, expr);
  },

  // 起始合夥人 hover
  onStarterHover(name){
    const key = 'starter_hover_' + name;
    if(DIALOGUES[key]) this.show(DIALOGUES[key], 4000, DIALOGUE_EXPR[key]||1);
  },
};

// ── 譚雅：每回合開始顯示交換選單 ──
function tanyaOfferSwap(){
  if(!hasPartner('tanya')) return;
  const handOptions = G.hand.filter(h=>h.count>0&&!h.compound);
  if(handOptions.length === 0){ addLog('👩‍💼 譚雅：手牌無設施可交換，跳過','w'); return; }
  G._tanyaSwapPending = true;
  // Build chooser: first pick from hand what to give
  showTanyaHandPick();
}

function showTanyaHandPick(){
  const el = document.getElementById('card-chooser');
  document.getElementById('card-chooser-title').textContent = '👩‍💼 譚雅：選擇要交換出去的手牌設施';
  const handOptions = G.hand.filter(h=>h.count>0&&!h.compound);
  document.getElementById('card-chooser-cards').innerHTML = handOptions.map(h=>
    makeSelCard(BLDG[h.id].emoji, BLDG[h.id].name, BLDG[h.id].desc, '', '',
      `tanyaSelectGive('${h.id}')`, '', '', '')
  ).join('');
  // Skip button
  const skipBtn = document.getElementById('card-chooser-skip');
  if(skipBtn){ skipBtn.style.display=''; skipBtn.textContent='✕ 跳過交換'; skipBtn.onclick=()=>{ closeCardChooser(); tanyaSwapDone(); }; }
  el.style.display='flex';
}

function tanyaSelectGive(giveId){
  closeCardChooser();
  // 稀有度升級：N→R→SR→SSR
  const giveRarity=getBldgRarity(giveId);
  const targetRarity=getNextRarity(giveRarity);
  // 從目標稀有度池中隨機抽3個
  const candidates=Object.keys(BLDG).filter(id=>
    isPoolableBldg(id)&&getBldgRarity(id)===targetRarity
  );
  const pool=candidates.length>0?weightedPickN(candidates,3):[giveId]; // fallback
  // Now show options to receive
  const el = document.getElementById('card-chooser');
  document.getElementById('card-chooser-title').textContent =
    `👩‍💼 譚雅：交出 ${BLDG[giveId].emoji}${BLDG[giveId].name}（${giveRarity}），選擇換入的設施（${targetRarity}）`;
  document.getElementById('card-chooser-cards').innerHTML = pool.map(bid=>
    makeSelCard(BLDG[bid].emoji, BLDG[bid].name, BLDG[bid].desc+` 【${targetRarity}】`, '', '',
      `tanyaDoSwap('${giveId}','${bid}')`, '', '', '')
  ).join('');
  const skipBtn = document.getElementById('card-chooser-skip');
  if(skipBtn){ skipBtn.style.display=''; skipBtn.textContent='✕ 取消'; skipBtn.onclick=()=>{ closeCardChooser(); showTanyaHandPick(); }; }
  el.style.display='flex';
}

function tanyaDoSwap(giveId, receiveId){
  closeCardChooser();
  // 狀態立即更新（動畫視覺層以 DOM 操作處理原手牌卡透明度）
  const slot = G.hand.find(h=>h.id===giveId);
  if(slot && slot.count>0) slot.count--;
  const existing = G.hand.find(h=>h.id===receiveId);
  if(existing) existing.count++;
  else G.hand.push({id:receiveId, count:1});
  addLog(`👩‍💼 譚雅：交出 ${BLDG[giveId].emoji}${BLDG[giveId].name}（${getBldgRarity(giveId)}），換入 ${BLDG[receiveId].emoji}${BLDG[receiveId].name}（${getBldgRarity(receiveId)}）！`,'g');
  // 依換入卡稀有度差異化音效：SSR 用鐘聲（showSsrSparkle 內含 rareDrop 音）、SR 用招募音、其他用獲得卡音
  const _rcvR=getBldgRarity(receiveId);
  if(_rcvR==='SSR') showSsrSparkle(null); // 內已含 SFX.rareDrop，不再額外播
  else if(_rcvR==='SR') SFX.recruit();
  else SFX.gainCard();
  // 計算補牌
  const handCount=G.hand.reduce((s,h)=>s+(h.compound?h.parts.length:h.count),0);
  const gn=GN(); let fieldCount=0;
  for(let r=0;r<gn;r++) for(let c=0;c<gn;c++){
    if(isFacility(G.grid[r][c])) fieldCount++;
    const ovs=getOverlays(r,c); fieldCount+=ovs.length;
  }
  let refillPick=null;
  if(handCount+fieldCount<24){
    const pool=Object.keys(BLDG).filter(id=>isPoolableBldg(id)&&getBldgRarity(id)==='N');
    if(pool.length>0){
      refillPick=pool[Math.floor(Math.random()*pool.length)];
      addHand(refillPick);
      addLog(`👩‍💼 譚雅：設施總數不足24，額外獲得 ${BLDG[refillPick].emoji}${BLDG[refillPick].name}（N）！`,'g');
    }
  }
  // 電影式交換動畫（會關閉彈窗、blocking 期間玩家不能操作）
  tanyaSwapCardCinematic(giveId, receiveId, ()=>{
    renderFanHand();
    if(refillPick){
      tanyaGainCardCinematic(refillPick, ()=>{
        tanyaSwapDone();
      });
    } else {
      tanyaSwapDone();
    }
  });
}

function tanyaSwapDone(){
  G._tanyaSwapPending = false;
  G._tanyaSwapPool = null;
  openActionOverlay();
}

  // ── 輔助：顯示連續台詞 ──
  _speechQueue: [],
  _speechIdx: 0,
  speak(lines, onDone){
    TUT._speechQueue = lines;
    TUT._speechIdx = 0;
    TUT._speechDone = onDone;
    TUT._nextLine();
  },
  _nextLine(){
    if(TUT._speechIdx >= TUT._speechQueue.length){
      TUT._allowDM = false;
      if(TUT._speechDone) TUT._speechDone();
      return;
    }
    const line = TUT._speechQueue[TUT._speechIdx++];
    const expr = TUT_TEXT_EXPR[line] || 1;
    TUT._allowDM = true;
    DM.show(line, 3000, expr);
    TUT._allowDM = false;
    TUT._speechTimer = setTimeout(()=>TUT._nextLine(), 3200);
  },

  bubble(text){
    const expr = TUT_TEXT_EXPR[text] || 1;
    TUT._allowDM = true;
    DM.show(text, 99999, expr);
    TUT._allowDM = false;
  },

  // ── 輔助：高亮格子 ──
  highlightGrid(on){
    const grid = document.getElementById('grid');
    if(grid) grid.style.outline = on ? '3px solid var(--acc)' : '';
  },

  // ── 輔助：高亮合夥人 ──
  highlightPartner(pid){
    const cards = document.querySelectorAll('.joker-card');
    cards.forEach(card=>{
      const name = card.querySelector('.jc-name')?.textContent;
      if(name === PARTNERS[pid]?.name){
        card.style.outline = '3px solid var(--acc)';

    G.nextEventTurn = G.turn; // 當前回合觸發

    render();
    setTimeout(()=>TUT.next(), 500);

  // ── 教學事件：玩家觸發特定動作時呼叫 ──
  onAction(action, data){
    if(!TUT.active) return false;
    if(TUT.waitingFor === action){
      TUT.waitingFor = null;
      setTimeout(()=>TUT.next(), 600);
      return true;
    }
    return false;
  },

  // ══════════════════════════════════════
  // 集中式鉤子：核心函數呼叫這些方法而非自行檢查 TUT 狀態
  // 返回 true 表示教學已攔截（呼叫端應 return）
  // ══════════════════════════════════════

  // tryPlaceAtCell 結尾：設施放置後檢查教學進度
  hookPlace(bldgId){
    if(!TUT.active) return false;
    if(TUT.waitingFor==='place_mat_factory'&&bldgId==='mat_factory'){
      TUT.onAction('place_mat_factory'); return false;
    }
    if(TUT.waitingFor==='place_factory_shop'&&(bldgId==='factory'||bldgId==='shop')){
      if(findCells((r,c,b)=>b==='factory').length>0 && findCells((r,c,b)=>b==='shop').length>0){
        TUT.onAction('place_factory_shop');
      }
    }
    return false;
  },

  // stepWithMover：記錄是否通過原料廠
  hookStep(bId){
    if(!TUT.active) return;
    if(bId==='mat_factory') G._tutHitMatFactory = true;
  },

  // finish 開頭：教學第一次投入（send_el）→ 攔截正常結算
  hookFinishPre(el){
    if(!TUT.active) return false;
    if(TUT.waitingFor==='send_el'){
      const hitMatFactory = G._tutHitMatFactory;
      G._tutHitMatFactory = false;
      TUT.waitingFor = null;
      setTimeout(()=>{
        if(hitMatFactory && el.type === 'material'){
          G.card = {value: el.value, type: 'material'};
        } else {
          G.card = null;
        }
        G.turn = 2; G.phase = 'place';
        render(); renderFanHand();
        TUT.speak(hitMatFactory ? [
          '金錢通過了原料廠，變成了原料！',
          '不過……原料不是金錢，所以收益還是零。',
        ] : [
          '金錢直接穿過格子，沒有通過原料廠……',
          '所以資源沒有被轉換，收益是零。',
        ], ()=>{ TUT.step = 4; TUT.next(); });
      }, 800);
      return true; // 攔截
    }
    if(TUT.waitingFor==='tut_send_for_profit'){
      TUT.waitingFor = null;
      // 不攔截，讓正常結算執行
    }
    return false;
  },

  // finish 結尾（phase='done' 後）：step6 投入完成後提示結束回合
  hookFinishPost(totalTurnProfit){
    if(!TUT.active || TUT.step!==6 || TUT.waitingFor) return false;
    TUT.waitingFor = 'tut_end_turn_for_partner';
    setTimeout(()=>{
      TUT.speak(totalTurnProfit > 0 ? [
        `太棒了！你獲得了 +${totalTurnProfit} 收益！`,
        '現在點擊「結束回合」按鈕吧！',
      ] : [
        '哎呀，這次沒有獲得收益……',
        '可能是設施的排列方式不對，讓資源沒有正確轉換成金錢。',
        '沒關係，先點「結束回合」繼續吧！',
      ]);
    }, 500);
    return true;
  },

  // doNext（結束回合按鈕）：教學各階段的回合推進
  hookDoNext(){
    if(!TUT.active) return false;
    // step8：跳過拆遷隊
    if(TUT.waitingFor==='use_demolition'||TUT.waitingFor==='confirm_rearrange'){
      TUT.waitingFor=null;
      document.querySelectorAll('.joker-card').forEach(c=>{c.style.outline='';c.style.animation='';});
      TUT.step=8; TUT.next();
      return true;
    }
    // 一般 end_turn
    if(TUT.waitingFor==='end_turn'){ TUT.onAction('end_turn'); return true; }
    // step6 結束回合 → step7
    if(TUT.waitingFor==='tut_end_turn_for_partner'){
      G.turn = 3; render();
      TUT.waitingFor = null; TUT.step = 6; TUT.next();
      return true;
    }
    // 教學模式下無匹配的 waitingFor → 不執行正常回合推進
    return true;

  // confirmRearrange 結尾：確認排列後恢復等待

const SAVE_KEY='VentureTown_Save';
const SAVE_VERSION=1;

function serializeGame(){
  return {
    v:SAVE_VERSION,
    ts:new Date().toISOString(),
    g:JSON.parse(JSON.stringify(G,(_,v)=>v instanceof Set?{_s:[...v]}:v)),
    cs:_compoundSeq,
    mega:JSON.parse(JSON.stringify(_megaFacilities||[])),
  };
}
function deserializeGame(save){
  if(!save||save.v!==SAVE_VERSION) return false;
  const data=save.g;
  // 驗證必要欄位
  if(!data||typeof data.round!=='number'||!Array.isArray(data.hand)||!Array.isArray(data.grid)||!Array.isArray(data.partners)) return false;
  // 還原 Set
  function reviveSets(o){
    for(const k in o){
      if(o[k]&&typeof o[k]==='object'){
        if(Array.isArray(o[k])){
          // 遞迴處理陣列元素中的 Set
          o[k].forEach((item,i)=>{
            if(item&&typeof item==='object'){
              if(item._s){ o[k][i]=new Set(item._s); }
              else reviveSets(item);
            }
          });
          continue;
        }
        if(o[k]._s){ o[k]=new Set(o[k]._s); }
        else reviveSets(o[k]);
      }
    }
  }
  reviveSets(data);
  // 合約系統欄位補填（舊存檔可能無這些欄位 → 防 renderContractBtn 等讀 undefined.length）
  if(!Array.isArray(data.activeContracts)) data.activeContracts=[];
  if(!data.contractState||typeof data.contractState!=='object') data.contractState={};
  if(!data.contractCounters||typeof data.contractCounters!=='object'){
    data.contractCounters={};
  }
  if(!Array.isArray(data.contractHistory)) data.contractHistory=[];
  // contractCounters 中 Set 欄位若舊存檔沒有，補上空 Set（reviveSets 對 _s 已處理過存在的）
  ['roundShopCellsHit','roundFactoryCellsHit','roundMatFactoryCellsHit'].forEach(k=>{
    if(!(data.contractCounters[k] instanceof Set)) data.contractCounters[k]=new Set();
  });
  // 合約 chooser 模組變數重置：避免 mid-modal 匯入存檔或失敗重開後 _kickContractChooser 卡死
  _contractChooserQueue = [];
  _contractChooserActive = false;
  // 舊存檔遷移：logistics_vault_v2 已併入 logistics_vault；trade_hub/tech_lab 改為 center_trade/center_tech
  const gn=data.gridSize||4;
  for(let r=0;r<gn;r++) for(let c=0;c<gn;c++){
    const cell=data.grid[r]&&data.grid[r][c];
    if(cell==='logistics_vault_v2') data.grid[r][c]='logistics_vault';
    else if(cell==='trade_hub') data.grid[r][c]='center_trade';
    else if(cell==='tech_lab') data.grid[r][c]='center_tech';
  }
  if(data.vaultV2Counts){
    if(!data.vaultCounts) data.vaultCounts={};
    for(const k in data.vaultV2Counts) data.vaultCounts[k]=(data.vaultCounts[k]||0)+data.vaultV2Counts[k];
    delete data.vaultV2Counts;
  }
  // 驗證設施/合夥人 ID 存在性（防止版本不相容崩潰）
  for(let r=0;r<gn;r++) for(let c=0;c<gn;c++){
    const b=data.grid[r]&&data.grid[r][c];
    if(b&&b!=='ruin'&&!BLDG[b]) data.grid[r][c]=null;
  }
  data.partners=data.partners.filter(pid=>PARTNERS[pid]);
  data.hand=data.hand.filter(h=>{
    if(h.compound) return h.parts&&h.parts.every(p=>BLDG[p]);
    return BLDG[h.id];
  });
  // 清除指向無效設施的位置鍵值
  // 注意：永久綁定格子的加成（地皮炒家+4 等）寫在 permCellMods，不在此清除清單
  KEYED_DATA_FIELDS.forEach(dk=>{
    if(!data[dk]||typeof data[dk]!=='object') return;
    for(const k in data[dk]){
      const [r,c]=k.split(',').map(Number);
      if(!data.grid[r]||!data.grid[r][c]) delete data[dk][k];
    }
  });
  if(data.cellOverlay){
    for(const k in data.cellOverlay){
      const v=data.cellOverlay[k];
      if(Array.isArray(v)){ data.cellOverlay[k]=v.filter(id=>BLDG[id]); if(data.cellOverlay[k].length===0) delete data.cellOverlay[k]; }
      else if(!BLDG[v]) delete data.cellOverlay[k];
    }
  }
  // 清除不應持久化的臨時狀態（每回合重置 / UI 模式 / 快照）
  data.inv={};
  data.sel=null;
  // phase 白名單化：'done' 代表已完成投入、等待結束回合 → 保留；'place' 直接採用；
  // 其他中間態（'animating'/'event' 等）強制 reset 為 'place' 避免卡在進行中的動畫/事件
  if(data.phase!=='done'&&data.phase!=='place') data.phase='place';
  // buff 是本回合 buff（事件產生的 matCrash/typhoonActive 等），跨存檔應保留；
  // 僅當欄位損壞/缺失時初始化為空物件
  if(!data.buff||typeof data.buff!=='object') data.buff={};
  // permCellMods：舊存檔可能沒有此欄位，初始化為空物件
  if(!data.permCellMods||typeof data.permCellMods!=='object') data.permCellMods={};
  if(!data.cellRedirectDir||typeof data.cellRedirectDir!=='object') data.cellRedirectDir={};
  if(!data.bldgUpgradesElec||typeof data.bldgUpgradesElec!=='object') data.bldgUpgradesElec={};
  if(!data.talentBankCount||typeof data.talentBankCount!=='object') data.talentBankCount={};
  if(!data.futuresValue||typeof data.futuresValue!=='object') data.futuresValue={};
  if(!data.ruinStacks||typeof data.ruinStacks!=='object') data.ruinStacks={};
  // _talentBankPending 結構驗證：必須是非負有限整數、上限 100（防存檔損壞/竄改）
  const _tbp=data._talentBankPending;
  if(typeof _tbp!=='number'||!isFinite(_tbp)||_tbp<0||_tbp>100) data._talentBankPending=0;
  // Session 34 新欄位：舊存檔缺失時 fallback 為當前 profit / false，避免貪婪/貧窮神/嫉妒首投誤判
  if(typeof data._turnStartProfit!=='number') data._turnStartProfit=data.profit||0;
  if(typeof data._firstFacInvestedThisTurn!=='boolean') data._firstFacInvestedThisTurn=false;
  // 嫉妒工廠遊戲結束 flag：跨存檔不應殘留，避免 lose modal 顯示前存檔導致下次無法觸發
  delete data._envyGameOverFired;
  delete data.futuresPct; // 舊欄位已被 futuresValue 取代
  // 跨存檔不應殘留的動畫/pending 旗標
  data._winPending = false;
  data._turnPitchOffset = 0;
  // elementExtraUses 僅在 `phase='place' && _extraUsePhase` 合法組合下保留，避免 UI 顯示「跳過」但底層數量為 0
  if(!(data.phase==='place'&&data._extraUsePhase)) data.elementExtraUses=0;
  data.actionOptions=[];
  data.turnFacMoved=0;
  data.moveMode=false; data.moveSrc=null;
  data.upgradeMode=false;
  data.freeRearrange=false;
  delete data._futuresMoveNext; // 已移除「下回合自動移動」機制
  delete data._freeMoveLogistics; delete data._freeMoveLogisticsSrc;
  delete data._mobileCityMode; delete data._mobileCitySrc; delete data._mobileCityUsedThisTurn; delete data._ruinPassedThisTurn;
  delete data._omniDragging; delete data._omniGainedThisTurn; delete data._dispatchHqFiredThisTurn;
  // _turnInvested 只在 phase='done' 時有意義（代表本回合已投入），保留以確保按鈕可用
  if(data.phase!=='done') delete data._turnInvested;
  delete data._demoExpertMode; delete data._yongqingSellMode; delete data._yongqingSellUsed;
  delete data._demolitionRearrange; delete data._laborMinisterUsed; delete data._hrTalentUsedCount;
  delete data._currentEventId; delete data._demolishBureauPending; delete data._dynamicAmpPending; delete data._sendBaselineValue;
  delete data._tradeZonePending;
  delete data._gridSnapshot; delete data._keyedSnapshot; delete data._ruinCellsSnapshot;
  delete data._talentUsedOnElement; delete data._hrUsedThisTurn;
  delete data._tanyaSwapPending; delete data._tanyaSwapPool;
  delete data._permShopUsed;
  delete data._industrializing;
  // _extraUsePhase：僅在 phase='place' 且確實處於額外投入階段時保留，其他狀態下清除
  if(!(data.phase==='place'&&data._extraUsePhase)) delete data._extraUsePhase;
  delete data._cardBeforeIndustrialize;
  G=data;
  _lastStartedTurn=-1; // 重置防重入標記，確保讀檔後 startTurn 正常執行
  if(save.cs!==undefined) _compoundSeq=save.cs;
  // 還原巨型設施（同步到獨立 localStorage key）
  if(Array.isArray(save.mega)){ _megaFacilities=save.mega; saveMegaFacilities(); }
  // 重建事件預告資料
  if(G.nextEvent) G.nextEventData=precomputeEventData(G.nextEvent);
  // 強化增幅裝置光環：derived 欄位，依 grid 重建
  if(!G.boosterAura) G.boosterAura={};
  recomputeBoosterAura();
  // BGM：載入後依新存檔的輪數切歌（active 才生效）
  if(typeof BGM!=='undefined') BGM.syncToRound();
  return true;
}

function exportSave(){

  const save=serializeGame();
  const blob=new Blob([JSON.stringify(save)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`VentureTown_R${G.round}_T${G.turn}_${new Date().toISOString().slice(0,10)}.json`;

function triggerImport(){ if(TUT.isBlocking()) return; document.getElementById('import-file').click(); }
function importSave(e){
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const save=JSON.parse(ev.target.result);
      if(deserializeGame(save)){
        if(SM.current!=='gameplay'){
          SM.goto('gameplay',{mode:'import'});
        } else {
          hideEv(); closeCardChooser(); closeActionOverlay();
          document.getElementById('modal').classList.remove('show');
          if(G.phase!=='place') G.phase='place';
          addLog('📂 存檔已匯入','g');
          SFX.openShop();
          render();
        }
      } else { SFX.invalid(); alert('存檔格式不正確或版本不相容'); }
    }catch(err){ SFX.invalid(); alert('無法讀取存檔：'+err.message); }
    e.target.value='';
  };
  reader.readAsText(file);
}

// 從實際投入結果建立巨型設施
function createMegaFacilityFromRun(entryR, entryC, entryDir, cellPath, inputType, outputType, simProfit){
  const gn=GN();
  const gridCopy=[];
  for(let r=0;r<gn;r++){
    gridCopy[r]=[];
    for(let c=0;c<gn;c++) gridCopy[r][c]=G.grid[r][c];
  }
  // 找出路徑上第一個和最後一個設施的 emoji
  let startEmoji='🏭', endEmoji='🏭';
  for(const[pr,pc] of cellPath){
    const bid=gridCopy[pr]&&gridCopy[pr][pc];
    if(bid&&bid!=='ruin'&&BLDG[bid]){startEmoji=BLDG[bid].emoji;break;}
  }
  for(let i=cellPath.length-1;i>=0;i--){
    const[pr,pc]=cellPath[i];
    const bid=gridCopy[pr]&&gridCopy[pr][pc];
    if(bid&&bid!=='ruin'&&BLDG[bid]){endEmoji=BLDG[bid].emoji;break;}
  }
  const mega={
    id:'mega_'+Date.now()+'_'+Math.floor(Math.random()*1000),
    grid:gridCopy,
    gridSize:gn,
    partners:[...G.partners],
    partnerState:JSON.parse(JSON.stringify(G.partnerState||{})),
    talentCards:G.talentCards||0,
    ruinCells:G.ruinCells?{_s:[...G.ruinCells]}:null,
    buffs:JSON.parse(JSON.stringify(G.buff||{})),
    bldgUpgrades:JSON.parse(JSON.stringify(G.bldgUpgrades||{})),
    leyaPctMods:JSON.parse(JSON.stringify(G.leyaPctMods||{})),
    cellMods:JSON.parse(JSON.stringify(G.cellMods||{})),
    permCellMods:JSON.parse(JSON.stringify(G.permCellMods||{})),
    boosterAura:JSON.parse(JSON.stringify(G.boosterAura||{})),
    cellPctMods:JSON.parse(JSON.stringify(G.cellPctMods||{})),
    cellOverlay:JSON.parse(JSON.stringify(G.cellOverlay||{})),
    path:cellPath,
    entryCell:[entryR,entryC],
    entryDir,
    inputType,
    outputType,
    startEmoji,
    endEmoji,
    simProfit,
    round:G.round,
    timestamp:new Date().toISOString()
  };
  _megaFacilities.push(mega);
  saveMegaFacilities();
  return mega;
}

// 巨型設施模擬用特殊設施效果（簡化版，不依賴 DOM/G 狀態）
const MEGA_SIM_FX={
  small_shop(sim){
    if(sim.type==='goods'){sim.value+=1;sim.type='money';}
    else if(sim.type==='money'){sim.value+=2;}
  },
  scalper(sim){
    if(sim.type==='goods'){const m=sim.value+1;sim.value=Math.max(1,Math.ceil(m*0.9));} // goods→money+1→goods(-10%)
  },
  bulk_store(sim,mega,ctx){
    // 商品→金錢+4；投入前每經過工廠 +4 收益
    if(sim.type!=='goods') return;
    sim.value+=4;
    sim.type='money';
    // 簡化：用 ctx.facHit 當作「之前經過設施數」近似 — mega 模擬無法區分工廠類型，採保守估算
    // 若需精確，改為掃描 mega.path 過往 cells 篩選 factory/adv_factory；此處保留簡化
    const factoryHits=ctx.facHit||0;
    if(factoryHits>0) ctx.bonusProfit+=factoryHits*4;
  },
  dept_store(sim){
    // 三段鏈：商品→金錢+8 → 商品+8 → 金錢+8
    if(sim.type!=='goods') return;
    sim.value=sim.value+24; sim.type='money';
  },
  spiral_hub(sim,mega,ctx){
    // 商品→商品（不變）；之前每通過 1 設施 → bonusProfit += 2
    if(sim.type!=='goods') return;
    ctx.bonusProfit+=ctx.facHit*2;
  },
  terminal(sim,mega,ctx){sim.value+=ctx.facHit*4;},
  env_sensor(sim,mega,ctx){
    // 計算快照中相鄰設施數
    const[r,c]=ctx.cell;const gn=mega.gridSize;let adj=0;
    [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([ar,ac])=>{
      if(ar>=0&&ar<gn&&ac>=0&&ac<gn){const bid=mega.grid[ar]&&mega.grid[ar][ac];if(bid&&bid!=='ruin'&&BLDG[bid]) adj++;}
    });
    sim.value+=adj*2;
  },
  exchange_board(sim,mega,ctx){
    // xlsx: 隨機 ±2，重複快照中設施數量次
    const gn=mega.gridSize;let fcount=0;
    for(let r=0;r<gn;r++) for(let c=0;c<gn;c++){
      const bid=mega.grid[r]&&mega.grid[r][c];
      if(bid&&bid!=='ruin'&&BLDG[bid]) fcount++;
    }
    let total=0;
    for(let i=0;i<fcount;i++) total += Math.random()<0.5 ? 2 : -2;
    sim.value=Math.max(0, sim.value+total);
  },
  trade_zone(sim){
    // 商店：商品→金錢（+2 永久加成寫在 bldgUpgrades，由 simFacilityPath 主迴圈統一套用）
    if(sim.type==='goods'){ sim.type='money'; }
  },
  trade_port(sim,mega,ctx){
    // 商品→金錢+2；每單位商品額外+2收益（mega 模擬無 G.goal 上下文，省略上限）
    if(sim.type!=='goods') return;
    const prevVal=sim.value;
    sim.value=prevVal+2;
    sim.type='money';
    ctx.bonusProfit+=prevVal*2;
  },
  clearance(sim,mega,ctx){
    // 失一半；每 4 個 +8（簡化：mega 模擬不累積成長，一律每組 +8）
    if(sim.type!=='goods') return;
    const prev=sim.value;
    const lost=Math.floor(prev/2);
    sim.value=Math.max(1,prev-lost);
    const groups=Math.floor(lost/4);
    if(groups>0) ctx.bonusProfit+=groups*8;
  },
  futures_market(sim){
    if(sim.type!=='goods') return;
    const choices=[0,2,4,8];
    sim.value+=choices[Math.floor(Math.random()*4)];
  },
  // 電子系
  elec_factory(sim){
    if(sim.type==='material'){sim.type='money';}
  },
  elec_conveyor(sim){
    // 對下個電子設施 +2 的銜接機制在 mega 模擬中無法跨 cell 累積，本格僅 pass-through
  },
  elec_shop(sim){
    if(sim.type==='money'){sim.type='material';}
    else if(sim.type==='goods'){sim.type='material';}
    else if(sim.type==='material'){sim.value+=2;sim.type='money';}
  },
  mega_elec_supply(sim){
    if(sim.type==='money'||sim.type==='goods'){sim.value+=4;sim.type='material';}
  },
  convenience(sim){
    if(sim.type==='goods'||sim.type==='material'){sim.value+=4;sim.type='money';}
  },
};

// 共用設施模擬迴圈（巨型設施 + 戰鬥共用）
// cells: [[r,c],...] 路徑座標，gridCtx: {grid, gridSize, round, bldgUpgrades?, partners?, partnerState?, talentCards?, buffs?, ...}
function simFacilityPath(cells, resource, gridCtx){
  let sim={value:resource.value, type:resource.type};
  let facHit=0, bonusProfit=0;
  const logs=[];
  const _partners=gridCtx.partners||[];
  const _hasP=pid=>_partners.includes(pid);
  const _pState=gridCtx.partnerState||{};
  const _buffs=gridCtx.buffs||{};
  const _isShopB=bid=>{ const bb=BLDG[bid]; return bb&&bb.isShop; };
  // 輔助：isDemonNeg（模擬版，不依賴全域）
  const _hasPride=_hasP('pride');
  const _isDemonNeg=pid=>{ if(!_hasPride||!pid) return false; const p=PARTNERS[pid]; return p&&p.isDemon; };

  // 輔助：取得格子疊加設施（相容 string/array 格式）
  const _getOv=(r,c)=>{
    const ov=gridCtx.cellOverlay&&gridCtx.cellOverlay[`${r},${c}`];
    if(!ov) return [];
    return Array.isArray(ov)?ov:[ov];
  };

  for(const[r,c] of cells){
    const bId=gridCtx.grid[r]&&gridCtx.grid[r][c];
    if(!bId||bId==='ruin') continue;
    const b=BLDG[bId];
    if(!b) continue;
    // redirect（物流中心）：處理疊加設施後跳過
    if(b.special==='redirect'){
      const ovList=_getOv(r,c);
      if(ovList.length>0){
        const upKey=`${r},${c}`;
        const ovUpg=gridCtx.bldgUpgrades&&gridCtx.bldgUpgrades[upKey]||0;
        let upgApplied=false;
        ovList.forEach(ovId=>{
          const ob=BLDG[ovId];
          if(!ob) return;
          if(ob.req&&ob.req!=='any'&&ob.req!==sim.type) return;
          const prevVal=sim.value, prevType=sim.type;
          if(ob.special&&MEGA_SIM_FX[ob.special]){
            const ctx={facHit, cell:[r,c], bonusProfit};
            MEGA_SIM_FX[ob.special](sim, gridCtx, ctx);
            bonusProfit=ctx.bonusProfit;
          } else {
            const upBonus=upgApplied?0:ovUpg;
            sim.value=ob.fn(sim.value)+upBonus;
            if(ob.out) sim.type=ob.out;
          }
          upgApplied=true;
          facHit++;
          logs.push(`  🚛 疊加 ${ob.emoji}${ob.name}: ${TLABEL[prevType]||prevType}${prevVal}→${TLABEL[sim.type]||sim.type}${sim.value}`);
        });
      }
      continue;
    }
    // 暴食惡魔：material<->goods 互換匹配
    let effType=sim.type;
    if(_hasP('gluttony')){
      if(sim.type==='material') effType='goods';
      else if(sim.type==='goods') effType='material';
    }
    if(b.req&&b.req!=='any'&&b.req!==effType&&b.req!==sim.type) continue;
    // buff：運輸異常
    if(_buffs.noMatToGoods&&(sim.type==='material'||effType==='material')&&b.out==='goods') continue;
    // 嫉妒工廠：新版隨機輸出，模擬中保留原 fn (v=>v) 與類型不變（避免影響工業化估算）
    // 暴食惡魔：匹配因互換，以互換類型進入
    if(_hasP('gluttony')&&b.req===effType&&b.req!==sim.type) sim={...sim,type:effType};

    const prevVal=sim.value, prevType=sim.type;
    const ctx={facHit, cell:[r,c], bonusProfit};
    if(b.special&&MEGA_SIM_FX[b.special]){
      MEGA_SIM_FX[b.special](sim, gridCtx, ctx);
      bonusProfit=ctx.bonusProfit;
    } else {
      if(b.fn) sim.value=b.fn(sim.value);
      if(b.out) sim.type=b.out;
    }
    // 暴食惡魔：輸出類型互換
    if(_hasP('gluttony')){
      if(sim.type==='material') sim.type='goods';
      else if(sim.type==='goods') sim.type='material';
    }
    // 匯率波動板：效果已在 MEGA_SIM_FX.exchange_board 處理（通過時 ±2 × 設施數）
    // buff 加成
    if(_buffs.matCrash){
      if(prevType==='money'&&sim.type==='material') sim.value*=2;
      else if(prevType==='material'&&sim.type==='money') sim.value=Math.max(1,Math.floor(sim.value/2));
      else if(prevType==='material'&&sim.type==='goods') sim.value*=2;
    }
    if(_buffs.matOutMult&&!_buffs.matCrash&&prevType==='material'&&sim.type!=='material'){
      sim.value=Math.round(sim.value*_buffs.matOutMult);
      if(_buffs.matBoomExtra) sim.value+=_buffs.matBoomExtra;
    }
    if(_buffs.matToMoneyDouble&&prevType==='material'&&sim.type==='money') sim.value*=2;
    if(_buffs.moneyToGoodsPenalty&&prevType==='money'&&sim.type==='goods') sim.value=Math.max(1,sim.value-5);
    if(_buffs.goodsBonus&&prevType==='goods'&&sim.type==='money') sim.value+=_buffs.goodsBonus;
    // 格子加成
    const upKey=`${r},${c}`;
    let cellMod=(gridCtx.cellMods&&gridCtx.cellMods[upKey]||0)+(gridCtx.permCellMods&&gridCtx.permCellMods[upKey]||0)+(gridCtx.boosterAura&&gridCtx.boosterAura[upKey]||0);
    // 激情惡魔：新版改為「每回合獲得 3 張設施」，移除減益逆轉
    const up=gridCtx.bldgUpgrades;if(up&&up[upKey]) sim.value+=up[upKey];
    const lp=gridCtx.leyaPctMods; if(lp&&lp[upKey]) sim.value=Math.max(1,Math.ceil(sim.value*(1+lp[upKey]/100)));
    if(cellMod) sim.value=Math.max(1,sim.value+cellMod);
    const cp=gridCtx.cellPctMods; if(cp&&cp[upKey]) sim.value=Math.max(1,Math.ceil(sim.value*(1+cp[upKey]/100)));
    facHit++;
    logs.push(`  ${b.emoji} ${b.name}: ${TLABEL[prevType]||prevType}${prevVal}→${TLABEL[sim.type]||sim.type}${sim.value}`);
  }
  if(sim.type==='diamond') sim={value:sim.value,type:'money'};

  // ── 結算：合夥人效果（模擬版，不依賴 DOM/G） ──
  // 慾望惡魔 modifyFinish（新版）
  if(_hasP('lust')){
    if(facHit===2){
      // 正面為「兩設施永久 +4」，模擬中以 +8 數值表示一次獎勵
      sim.value+=8; logs.push(`  💘 慾望惡魔：僅 2 設施，等效 +8（永久 +4 兩格）→ ${sim.value}`);
    } else if(facHit>2&&!_isDemonNeg('lust')){
      const cut=facHit*6;
      sim.value=Math.max(1,sim.value-cut);
      logs.push(`  💘 慾望惡魔：${facHit} 設施 × -6 = -${cut} → ${sim.value}`);
    }
  }
  const finalMoney=sim.type==='money'?sim.value:Math.floor(sim.value*0.6);
  let profit=Math.max(0,finalMoney-resource.value)+bonusProfit;
  // 匯率波動板：效果已在通過時處理，不在結算時再調整
  // onSettle hooks（簡化模擬：僅計算數值調整，不修改全域狀態）
  _partners.forEach(pid=>{
    const p=PARTNERS[pid];
    if(!p||!p.onSettle) return;
    // 貪婪惡魔：新版為回合結束時整體加成，per-send 模擬不適用
    if(pid==='black_market'&&profit>0){
      const st=_pState.black_market||{usedThisRound:false,mult:1.25};
      if(!st.usedThisRound){ const bonus=Math.floor(profit*0.25); profit+=bonus; logs.push(`  🕶️ 黑市商人：首次+25% → +${bonus}`); }
    }
    // 工會主席：新效果在人材投入中，模擬中跳過
    if(pid==='transport_tycoon'){
      const logHits=cells.filter(([r,c])=>{const bid=gridCtx.grid[r]&&gridCtx.grid[r][c];return bid&&BLDG[bid]&&BLDG[bid].special==='redirect';}).length;
      if(logHits>0){ const bonus=logHits*3; profit+=bonus; logs.push(`  🚢 運輸大亨：${logHits}物流中心，+${bonus}`); }
      else if(!_isDemonNeg('transport_tycoon')){ const cut=Math.floor(profit*0.5); profit=Math.max(0,profit-cut); logs.push(`  🚢 運輸大亨：無物流，-50% → -${cut}`); }
    }
    if(pid==='express_master'){
      if(facHit>4){ const extra=facHit-4; const bonus=extra*4; profit+=bonus; logs.push(`  🚀 快遞達人：${facHit}格（超4格${extra}格），+${bonus}`); }
    }
    // 路線規劃師：負面已移除
    if(pid==='monopolist'){
      const gn=gridCtx.gridSize;let shopCount=0;
      for(let _r=0;_r<gn;_r++) for(let _c=0;_c<gn;_c++){const bid=gridCtx.grid[_r]&&gridCtx.grid[_r][_c];if(bid&&_isShopB(bid)) shopCount++;}
      if(shopCount>=4){ const bonus=shopCount*6; profit+=bonus; logs.push(`  🎩 壟斷者：${shopCount}商店（≥4），+${bonus}`); }
    }
    // 無冕之王：新效果在 stepWithMover 廢墟通過時累積，模擬中跳過
  });
  // 稅務局
  if(profit>0){
    const gn=gridCtx.gridSize;let hasTax=false;
    for(let _r=0;_r<gn;_r++) for(let _c=0;_c<gn;_c++) if(gridCtx.grid[_r]&&gridCtx.grid[_r][_c]==='tax_office') hasTax=true;
    if(hasTax){ const cut=Math.ceil(profit*0.1); profit=Math.max(0,profit-cut); logs.push(`  🏛 稅務局：-10% → -${cut}`); }
  }
  // 嫉妒工廠：新版負面為「被消滅/賣出時遊戲結束」，不影響工業化模擬
  // 勞工保險
  if(_buffs.laborInsurance&&profit>0){
    const tc=gridCtx.talentCards||0;const pct=tc*2;
    if(pct>0){ const cut=Math.ceil(profit*pct/100); profit=Math.max(0,profit-cut); logs.push(`  📋 勞工保險：人材${tc}×2=${pct}%，-${cut}`); }
  }
  return {el:sim, finalMoney, facHit, logs, bonusProfit:0, profit};
}

// 模擬資源通過巨型設施
function simulateMegaFacility(mega, el){
  // 確保 ruinCells 為 Set（相容序列化格式 {_s:[...]}）
  if(mega.ruinCells&&!(mega.ruinCells instanceof Set)){
    mega.ruinCells=mega.ruinCells._s?new Set(mega.ruinCells._s):new Set();
  }
  return simFacilityPath(mega.path, el, mega);
}

const RESOURCE_EMOJI={money:'💰',material:'🪨',goods:'📦',diamond:'💎'};
// 取得巨型設施顯示圖示（相容舊資料）
function megaIcons(m){
  const s=m.startEmoji||(RESOURCE_EMOJI[m.inputType]||'🏭');
  const e=m.endEmoji||(RESOURCE_EMOJI[m.outputType]||'🏭');
  return {start:s, end:e, flow:s+'→'+e};
}

    !!G._industrializing;

  },
  onCellDragOver(e,r,c){

    if(_megaGrid[r][c]) return; // 已有設施
    e.preventDefault();
    e.currentTarget.classList.add('drag-over');
  },
  onCellDragLeave(e,r,c){

    e.preventDefault();
    e.currentTarget.classList.remove('drag-over');
    if(!_megaDragging) return;
    if(_megaGrid[r][c]) return;
    MEGA.placeMega(r,c,_megaDragging);
    _megaDragging=null;
  },
  // ── 拖曳：資源卡 → 方向箭頭 ──
  _elDragging:false,
  onElDragStart(e){
    MEGA._elDragging=true;
    e.dataTransfer.setData('text/plain','mega-element');

  // ── 投入資源 ──
  sendMega(dir,idx){
    const path=[];
    for(let i=0;i<4;i++){
      if(dir==='left')  path.push([idx,i]);
      if(dir==='right') path.push([idx,3-i]);
      if(dir==='top')   path.push([i,idx]);
      if(dir==='bottom')path.push([3-i,idx]);
    }
    let el={value:1, type:'money'};
    const dname={left:'← 左側',right:'→ 右側',top:'↑ 上方',bottom:'↓ 下方'}[dir];
    _megaLog.push(`▶ 從${dname}第${idx+1}格投入 💰 1`);
    let totalProfit=0;
    for(const[r,c] of path){
      const megaId=_megaGrid[r][c];
      if(!megaId) continue;
      const mega=_megaFacilities.find(m=>m.id===megaId);
      if(!mega) continue;
      _megaLog.push(`🏭 進入巨型設施 [${r},${c}]：${megaIcons(mega).flow}`);
      const result=simulateMegaFacility(mega, el);
      result.logs.forEach(l=>_megaLog.push(l));
      const profit=result.profit;
      totalProfit+=profit;
      _megaLog.push(`  💰 此設施收益：+${profit}（入${el.value}→出${result.finalMoney}）`);
      el=result.el;
    }
    _megaProfit+=totalProfit;
    _megaLog.push(`💰 本次總收益：+${totalProfit}（累計：${_megaProfit}）`);
    _megaLog.push('─'.repeat(30));

    }).join('');
  },
  // ── 檢視巨型設施內部 ──
  inspect(megaId){
    const mega=_megaFacilities.find(m=>m.id===megaId);
    if(!mega) return;
    const box=document.getElementById('mega-inspect-box');
    const gn=mega.gridSize;
    const mi=megaIcons(mega);
    const pathSet=new Set(mega.path.map(p=>`${p[0]},${p[1]}`));
    const entryKey=`${mega.entryCell[0]},${mega.entryCell[1]}`;
    const dirLabels={left:'← 左側',right:'→ 右側',top:'↑ 上方',bottom:'↓ 下方'};
    let ih=`<div class="mib-title">${mi.flow} 巨型設施 <span style="font-size:10px;font-weight:400;color:var(--mu);">R${mega.round} | ${gn}×${gn}</span></div>`;
    ih+=`<div style="font-size:9px;color:var(--mu);margin-bottom:8px;">投入起點：[${mega.entryCell[0]},${mega.entryCell[1]}] 方向：${dirLabels[mega.entryDir]||mega.entryDir}${mega.simProfit!==undefined?` | 模擬收益：+${mega.simProfit}`:''}</div>`;
    ih+=`<div class="mib-grid" style="grid-template-columns:repeat(${gn},56px);">`;
    for(let r=0;r<gn;r++) for(let c=0;c<gn;c++){
      const bId=mega.grid[r]&&mega.grid[r][c];
      const b=(bId&&bId!=='ruin')?BLDG[bId]:null;
      const key=`${r},${c}`;
      const isEntry=key===entryKey;
      const isPath=pathSet.has(key);
      ih+=`<div class="mib-cell${isEntry?' mib-entry':''}${isPath?' mib-path':''}">`;
      if(bId==='ruin') ih+=`<div style="opacity:.45;">🏚️</div><div style="opacity:.45;">廢墟</div>`;
      else if(b){
        ih+=`<div style="font-size:18px;">${b.emoji}</div><div>${b.name}</div>`;
        const upBonus=mega.bldgUpgrades[key]||0;
        if(upBonus>0) ih+=`<div style="color:var(--money);font-size:7px;">+${upBonus}</div>`;
      }
      ih+=`</div>`;
    }
    ih+=`</div>`;
    if(mega.partners.length>0){
      ih+=`<div class="mib-info"><strong>合夥人：</strong>`;
      mega.partners.forEach(pid=>{const p=PARTNERS[pid];if(p) ih+=`${p.emoji}${p.name} `;});
      ih+=`</div>`;
    }
    // 從地圖移除按鈕
    let removeBtn='';
    for(let r=0;r<4;r++) for(let c=0;c<4;c++){
      if(_megaGrid[r][c]===megaId) removeBtn=`<button class="mib-close" style="background:#c33;color:#fff;border-color:#c33;margin-right:8px;" onclick="MEGA.removeMega(${r},${c});MEGA.closeInspect()">✕ 從地圖移除</button>`;
    }
    ih+=`<div style="text-align:center;">${removeBtn}<button class="mib-close" onclick="MEGA.closeInspect()">✕ 關閉</button></div>`;
    box.innerHTML=ih;
    document.getElementById('mega-inspect-overlay').classList.add('show');
  },
  closeInspect(){
    document.getElementById('mega-inspect-overlay').classList.remove('show');
  },
  // ── 工業化 ──
  startIndustrialize(){
    if(_isAnyOverlayOpen()){addLog('⚠ 請先關閉其他面板','b');return;}
    // 備份原始資源卡
    G._cardBeforeIndustrialize=G.card?{...G.card}:null;
    G._industrializing=true;
    G.card={value:1, type:'money'};
    G.phase='place';
    updateCard(G.card);
    render();

    hint.id='indust-hint';
    hint.style.cssText='position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:7000;'+
      'background:linear-gradient(135deg,#2d1a00,#4a2800);color:#ffd080;padding:12px 24px;border-radius:12px;'+
      'font-size:13px;font-weight:700;box-shadow:0 4px 20px rgba(0,0,0,.4);display:flex;align-items:center;gap:12px;'+
      'border:1.5px solid rgba(255,180,60,.3);';
    hint.innerHTML=`<span style="font-size:24px;">🏭</span>
      <div><div>工業化模式</div><div style="font-size:10px;font-weight:400;color:#c89050;margin-top:2px;">選擇一個方向投入 💰1，模擬實際路徑後建立巨型設施</div></div>
      <button onclick="MEGA.cancelIndustrialize()" style="margin-left:12px;padding:4px 12px;border-radius:6px;border:1px solid rgba(255,180,60,.4);background:rgba(255,255,255,.1);color:#ffd080;cursor:pointer;font-size:10px;font-family:inherit;">取消</button>`;
    document.body.appendChild(hint);
    addLog('🏭 工業化模式啟動：請選擇方向投入 💰1','g');
  },
  cancelIndustrialize(){
    G._industrializing=false;
    document.getElementById('indust-hint')?.remove();
    // 還原原始資源卡
    if(G._cardBeforeIndustrialize){G.card=G._cardBeforeIndustrialize;delete G._cardBeforeIndustrialize;}
    G.phase='place';
    updateCard(G.card);
    render();
    addLog('🏭 工業化已取消','b');
  }
};

// 初始化載入
loadMegaFacilities();

// ══════════════════════════════════════
// 戰鬥系統（開發者模式）
// ══════════════════════════════════════
let _battleState=null; // {deck, hand, field, enemy, turn, redrawCount, resource, log, invested}
let _battleDragging=null; // 正在拖曳的設施 ID

const BATTLE={
  // 洗牌
  shuffle(arr){
    const a=[...arr];
    for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
    return a;
  },
  // 開始戰鬥
  start(){
    if(_isAnyOverlayOpen()){addLog('⚠ 請先關閉其他面板','b');return;}
    // 建立牌組：複製小鎮所有設施 + 手牌（凍結快照）
    const deck=[];
    const gn=GN();
    for(let r=0;r<gn;r++) for(let c=0;c<gn;c++){
      const bId=G.grid[r][c];
      if(bId&&bId!=='ruin'&&BLDG[bId]) deck.push(bId);
    }
    G.hand.forEach(h=>{
      if(h.compound) return;
      if(BLDG[h.id]) for(let i=0;i<h.count;i++) deck.push(h.id);
    });
    if(deck.length===0){alert('小鎮上沒有任何設施，無法進入戰鬥！');return;}
    const res=G.card?{...G.card}:{value:1,type:'money'};
    _battleState={
      fullDeck:[...deck],       // 凍結的完整牌組（不再從 G 重建）
      deck:BATTLE.shuffle(deck),
      hand:[],
      field:Array(8).fill(null),
      enemy:{name:'競爭對手',emoji:'🏴‍☠️',hp:100,maxHp:100},
      turn:1,
      round:G.round,            // 凍結輪數（不再引用 G.round）
      redrawCount:0,
      resource:res,
      log:[],
      invested:false,
      _returnNeeded:0,
      _drawnThisTurn:false,
    };
    BATTLE.drawCards(7);
    document.getElementById('battle-overlay').classList.add('show');
    BATTLE.render();
    BATTLE.addLog(`⚔ 戰鬥開始！對手 HP：${_battleState.enemy.maxHp}`);
    BATTLE.addLog(`💰 起始資源：${TLABEL[res.type]||res.type} ${res.value}`);
  },
  // 抽牌（牌組耗盡時從凍結牌組重建）
  drawCards(n){
    const s=_battleState;
    if(s.deck.length===0) s.deck=BATTLE.shuffle([...s.fullDeck]);
    for(let i=0;i<n&&s.deck.length>0;i++){
      s.hand.push(s.deck.pop());
    }
  },
  // 重抽
  redraw(){
    const s=_battleState;
    if(s.turn>1){BATTLE.addLog('⚠ 重抽只能在第 1 回合使用');return;}
    if(s.invested){BATTLE.addLog('⚠ 已投入資源，無法重抽');return;}
    if((s._returnNeeded||0)>0){BATTLE.addLog(`⚠ 請先返還 ${s._returnNeeded} 張手牌再重抽`);return;}
    s.redrawCount++;
    const returnCount=s.redrawCount;
    s.deck.push(...s.hand);
    s.hand=[];
    s.deck=BATTLE.shuffle(s.deck);
    BATTLE.drawCards(7);
    BATTLE.addLog(`🔄 重抽手牌（第${s.redrawCount}次），需返回 ${returnCount} 張`);
    s._returnNeeded=(s._returnNeeded||0)+returnCount;
    BATTLE.render();
  },
  // 返回手牌
  returnCard(idx){
    const s=_battleState;
    if(!s._returnNeeded||s._returnNeeded<=0) return;
    if(idx<0||idx>=s.hand.length) return;
    const card=s.hand.splice(idx,1)[0];
    if(card) s.deck.push(card);
    s._returnNeeded--;
    BATTLE.addLog(`↩ 返回 ${BLDG[card]?.emoji||''}${BLDG[card]?.name||card}（剩餘 ${s._returnNeeded} 張）`);
    BATTLE.render();
  },
  // 放置設施到戰場（從手牌移除）
  placeOnField(fieldIdx, bldgId){
    const s=_battleState;
    if(s.invested) return;
    // 若目標格已有設施，先歸還手牌
    if(s.field[fieldIdx]) s.hand.push(s.field[fieldIdx]);
    s.field[fieldIdx]=bldgId;
    // 從手牌移除一張
    const hi=s.hand.indexOf(bldgId);
    if(hi!==-1) s.hand.splice(hi,1);
    BATTLE.render();
  },
  // 移除戰場設施（歸還手牌）
  removeFromField(fieldIdx){
    const s=_battleState;
    if(s.invested) return;
    if(s.field[fieldIdx]) s.hand.push(s.field[fieldIdx]);
    s.field[fieldIdx]=null;
    BATTLE.render();
  },
  // 每回合抽牌（每回合限一次）
  drawExtra(){
    const s=_battleState;
    if(s.invested){BATTLE.addLog('⚠ 已投入，無法抽牌');return;}
    if(s._drawnThisTurn){BATTLE.addLog('⚠ 本回合已抽過牌');return;}
    s._drawnThisTurn=true;
    const before=s.hand.length;
    BATTLE.drawCards(1);
    const drawn=s.hand.length>before?s.hand[s.hand.length-1]:null;
    if(drawn&&BLDG[drawn]) BATTLE.addLog(`🃏 抽牌：${BLDG[drawn].emoji}${BLDG[drawn].name}`);
    else BATTLE.addLog('🃏 牌組已空');
    BATTLE.render();
  },
  // 投入資源（帶動畫）
  invest(){
    const s=_battleState;
    if(s.enemy.hp<=0){BATTLE.addLog('⚠ 對手已被擊敗');return;}
    if(s.invested){BATTLE.addLog('⚠ 本回合已投入');return;}
    if(s._returnNeeded>0){BATTLE.addLog('⚠ 還需返回手牌');return;}
    s.invested=true;
    BATTLE.render();
    const emojis={money:'💵',material:'🪨',goods:'📦',diamond:'💎'};
    let el={value:s.resource.value, type:s.resource.type};
    const startVal=el.value;
    BATTLE.addLog(`▶ 投入 ${TLABEL[el.type]||el.type} ${el.value}`);
    // 建立移動器
    let mover=document.getElementById('battle-mover');
    if(!mover){
      mover=document.createElement('div');
      mover.id='battle-mover';
      mover.style.cssText='position:fixed;width:56px;height:66px;background:linear-gradient(145deg,var(--sur),var(--bg2));'+
        'border:2px solid var(--acc);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;'+
        'gap:2px;pointer-events:none;z-index:8400;box-shadow:0 4px 14px rgba(179,58,0,.3);'+
        'transition:left .3s cubic-bezier(.4,0,.2,1),top .3s cubic-bezier(.4,0,.2,1);';
      mover.innerHTML='<div class="bm-emoji" style="font-size:16px;line-height:1;"></div><div class="bm-val" style="font-size:14px;font-weight:900;font-family:DM Mono,monospace;"></div><div class="bm-type" style="font-size:7px;color:var(--mu);"></div>';
      document.body.appendChild(mover);
    }
    function updateMover(){
      mover.querySelector('.bm-emoji').textContent=emojis[el.type]||'❓';
      mover.querySelector('.bm-val').textContent=el.value;
      mover.querySelector('.bm-type').textContent=TLABEL[el.type]||el.type;
      mover.style.borderColor=TCOLOR[el.type]||'var(--acc)';
    }
    mover.style.display='flex';
    updateMover();
    // 逐格動畫
    const fieldCells=document.querySelectorAll('#battle-field .cell');
    let step=0;
    let facHit=0, bonusProfit=0;
    function animStep(){
      if(step>=8){
        // 動畫結束 → 結算傷害
        mover.style.display='none';
        fieldCells.forEach(c=>c.classList.remove('active-path'));
        if(el.type==='diamond') el={value:el.value,type:'money'};
        const finalMoney=el.type==='money'?el.value:Math.floor(el.value*0.6);
        let damage=Math.max(0,finalMoney-startVal)+bonusProfit;
        if(bonusProfit>0) BATTLE.addLog(`  🏷️ 額外傷害：+${bonusProfit}`);
        // 傷害數字放大 + 飛向敵人
        BATTLE._showDamageFly(damage);
        setTimeout(()=>{
          s.enemy.hp=Math.max(0,s.enemy.hp-damage);
          BATTLE.addLog(`💥 造成 ${damage} 點傷害！（入${startVal}→出${finalMoney}）`);
          BATTLE.addLog(`❤ 對手 HP：${s.enemy.hp}/${s.enemy.maxHp}`);
          if(s.enemy.hp<=0) BATTLE.addLog('🎉 對手被擊敗！');
          BATTLE.render();
        },1200);
        return;
      }
      // 移動到當前格
      const cellEl=fieldCells[step];
      if(!cellEl){step++;animStep();return;}
      fieldCells.forEach(c=>c.classList.remove('active-path'));
      cellEl.classList.add('active-path');
      const rect=cellEl.getBoundingClientRect();
      mover.style.left=(rect.left+2)+'px';
      mover.style.top=(rect.top-70)+'px';
      const bId=s.field[step];
      if(!bId||!BLDG[bId]||BLDG[bId].special==='redirect'){step++;setTimeout(animStep,200);return;}
      const b=BLDG[bId];
      if(b.req&&b.req!=='any'&&b.req!==el.type){step++;setTimeout(animStep,200);return;}
      const prev=el.value, prevType=el.type;
      const ctx={facHit,cell:[0,step],bonusProfit};
      if(b.special&&MEGA_SIM_FX[b.special]){
        MEGA_SIM_FX[b.special](el,{grid:[s.field],gridSize:8,round:s.round},ctx);
        bonusProfit=ctx.bonusProfit;
      } else {
        if(b.fn) el.value=b.fn(el.value);
        if(b.out) el.type=b.out;
      }
      facHit++;
      updateMover();
      cellEl.style.transform='scale(1.1)';
      setTimeout(()=>{cellEl.style.transform='';},300);
      BATTLE.addLog(`  ${b.emoji} ${b.name}: ${TLABEL[prevType]||prevType}${prev}→${TLABEL[el.type]||el.type}${el.value}`);
      // 更新記錄面板
      const logEl=document.getElementById('battle-log');
      if(logEl){
        logEl.innerHTML+=`<div>  ${b.emoji} ${b.name}: ${TLABEL[prevType]||prevType}${prev}→${TLABEL[el.type]||el.type}${el.value}</div>`;
        logEl.scrollTop=logEl.scrollHeight;
      }
      step++;
      setTimeout(animStep,350);
    }
    // 從左側箭頭開始
    const arrowIn=document.querySelector('.battle-arrow-in');
    if(arrowIn){
      const ar=arrowIn.getBoundingClientRect();
      mover.style.left=ar.left+'px';
      mover.style.top=(ar.top-20)+'px';
    }
    setTimeout(animStep,300);
  },
  // 傷害飛行動畫：數字放大 → 停頓 → 飛向敵人血量條
  _showDamageFly(damage){
    const fly=document.createElement('div');
    fly.style.cssText='position:fixed;z-index:8500;pointer-events:none;font-weight:900;font-family:DM Mono,monospace;'+
      'text-shadow:0 2px 12px rgba(200,40,40,.5);';
    fly.textContent=damage>0?`-${damage}`:'0';
    fly.style.color=damage>0?'#c33':'var(--mu)';
    // 起始位置：戰場中央
    const field=document.getElementById('battle-field');
    if(!field) return;
    const fr=field.getBoundingClientRect();
    fly.style.left=(fr.left+fr.width/2-30)+'px';
    fly.style.top=(fr.top+fr.height/2-20)+'px';
    fly.style.fontSize='16px';
    fly.style.transition='all .4s cubic-bezier(.4,0,.2,1)';
    document.body.appendChild(fly);
    // 階段 1：放大
    requestAnimationFrame(()=>{
      fly.style.fontSize='48px';
      fly.style.transform='scale(1.2)';
    });
    // 階段 2：停頓後飛向敵人
    setTimeout(()=>{
      const hpBar=document.getElementById('battle-hp-fill');
      if(hpBar){
        const hr=hpBar.getBoundingClientRect();
        fly.style.left=(hr.left+hr.width/2-30)+'px';
        fly.style.top=(hr.top-10)+'px';
        fly.style.fontSize='20px';
        fly.style.opacity='0';
        fly.style.transform='scale(.6)';
      }
    },600);
    setTimeout(()=>fly.remove(),1300);
  },
  // 結束回合
  endTurn(){
    const s=_battleState;
    if(s._returnNeeded>0){BATTLE.addLog('⚠ 還需返回手牌');return;}
    if(s.enemy.hp<=0){BATTLE.addLog('🎉 戰鬥已結束，請撤退');return;}
    s.turn++;
    s.invested=false;
    s._drawnThisTurn=false;
    BATTLE.addLog(`── 回合 ${s.turn} ──`);
    BATTLE.render();
  },
  // 結束戰鬥
  endBattle(){
    document.getElementById('battle-overlay').classList.remove('show');
    _battleState=null;
    _battleDragging=null;
  },
  // 記錄
  addLog(msg){
    if(!_battleState) return;
    _battleState.log.push(msg);
  },
  // ── 拖曳系統 ──
  onCardDragStart(e, bldgId){
    _battleDragging=bldgId;
    e.dataTransfer.setData('text/plain',bldgId);
    e.dataTransfer.effectAllowed='copy';
    const cv=document.createElement('canvas');cv.width=1;cv.height=1;
    e.dataTransfer.setDragImage(cv,0,0);
    // 高亮空格
    document.querySelectorAll('#battle-field .cell').forEach(c=>{
      if(!c.dataset.bid) c.classList.add('upgrade-glow');
    });
  },
  _fieldDragSrc:null, // 正在從場上拖曳的格子 index
  onCardDragEnd(e){
    _battleDragging=null;
    document.querySelectorAll('#battle-field .cell').forEach(c=>{
      c.classList.remove('upgrade-glow');c.classList.remove('drag-over');
    });
  },
  // 場上設施拖曳（重新排列）
  onFieldCellDragStart(e,idx){
    BATTLE._fieldDragSrc=idx;
    _battleDragging=null; // 不是從手牌拖的
    e.dataTransfer.setData('text/plain','field-'+idx);
    e.dataTransfer.effectAllowed='move';
    const cv=document.createElement('canvas');cv.width=1;cv.height=1;
    e.dataTransfer.setDragImage(cv,0,0);
    e.currentTarget.style.opacity='.4';
  },
  onFieldCellDragEnd(e){
    BATTLE._fieldDragSrc=null;
    document.querySelectorAll('#battle-field .cell').forEach(c=>{c.style.opacity='';c.classList.remove('drag-over');});
  },
  onFieldDragOver(e,idx){
    if(!_battleDragging&&BATTLE._fieldDragSrc===null) return;
    e.preventDefault();
    e.currentTarget.classList.add('drag-over');
  },
  onFieldDragLeave(e,idx){
    e.currentTarget.classList.remove('drag-over');
  },
  onFieldDrop(e,idx){
    e.preventDefault();
    e.currentTarget.classList.remove('drag-over');
    if(!_battleState||_battleState.invested) return;
    const s=_battleState;
    // 場上設施互換
    if(BATTLE._fieldDragSrc!==null){
      const src=BATTLE._fieldDragSrc;
      BATTLE._fieldDragSrc=null;
      if(src!==idx){
        const tmp=s.field[src];
        s.field[src]=s.field[idx];
        s.field[idx]=tmp;
      }
      BATTLE.render();
      return;
    }
    // 手牌拖入
    if(_battleDragging){
      BATTLE.placeOnField(idx, _battleDragging);
      _battleDragging=null;
    }
  },
  // ── 拖曳：資源卡 → 投入箭頭 ──
  _elDragging:false,
  onElDragStart(e){
    BATTLE._elDragging=true;
    e.dataTransfer.setData('text/plain','battle-element');
    e.dataTransfer.effectAllowed='move';
    const cv=document.createElement('canvas');cv.width=1;cv.height=1;
    e.dataTransfer.setDragImage(cv,0,0);
    document.querySelectorAll('.battle-arrow-in').forEach(a=>a.style.cssText+=';border:2px dashed var(--acc);border-radius:6px;opacity:1;');
  },
  onElDragEnd(e){
    BATTLE._elDragging=false;
    document.querySelectorAll('.battle-arrow-in').forEach(a=>{a.style.border='';a.style.opacity='';a.classList.remove('drag-over');});
  },
  onInvestDragOver(e){
    if(!BATTLE._elDragging) return;
    e.preventDefault();
    e.currentTarget.classList.add('drag-over');
    e.currentTarget.style.opacity='1';
  },
  onInvestDragLeave(e){
    e.currentTarget.classList.remove('drag-over');
  },
  onInvestDrop(e){
    e.preventDefault();
    if(!BATTLE._elDragging) return;
    BATTLE._elDragging=false;
    document.querySelectorAll('.battle-arrow-in').forEach(a=>{a.style.border='';a.style.opacity='';a.classList.remove('drag-over');});
    BATTLE.invest();
  },
  // ── 渲染 ──
  render(){
    if(!_battleState) return;
    const s=_battleState;
    // 回合資訊
    document.getElementById('battle-turn-info').textContent=`回合 ${s.turn}${s.invested?' — 已投入':''}`;
    // 敵人 HP
    document.getElementById('battle-enemy-name').textContent=s.enemy.name;
    const hpPct=Math.max(0,Math.round(s.enemy.hp/s.enemy.maxHp*100));
    document.getElementById('battle-hp-fill').style.width=hpPct+'%';
    document.getElementById('battle-hp-text').textContent=`${s.enemy.hp} / ${s.enemy.maxHp}`;
    // 戰場
    const fieldArea=document.getElementById('battle-field-area');
    let fh='<div style="display:flex;align-items:center;gap:3px;">';
    fh+=`<div class="battle-arrow-in"
      ondragover="BATTLE.onInvestDragOver(event)" ondragleave="BATTLE.onInvestDragLeave(event)"
      ondrop="BATTLE.onInvestDrop(event)">→</div>`;
    fh+=`<div id="battle-field" style="grid-template-columns:repeat(8,var(--cell))">`;
    for(let i=0;i<8;i++){
      const bId=s.field[i];
      const b=bId?BLDG[bId]:null;
      const canInteract=!s.invested;
      fh+=`<div class="cell${b?' filled':''}" data-fi="${i}" ${b?`data-bid="${bId}"`:''}
        ${canInteract&&b?`draggable="true" ondragstart="BATTLE.onFieldCellDragStart(event,${i})" ondragend="BATTLE.onFieldCellDragEnd(event)"`:''}
        onclick="${canInteract?`BATTLE.removeFromField(${i})`:''}"
        ondragover="BATTLE.onFieldDragOver(event,${i})"
        ondragleave="BATTLE.onFieldDragLeave(event,${i})"
        ondrop="BATTLE.onFieldDrop(event,${i})">`;
      if(b){
        fh+=`<div style="font-size:28px;line-height:1;">${b.emoji}</div>`;
        fh+=`<div class="cname">${b.name}</div>`;
      }
      fh+=`</div>`;
    }
    fh+=`</div>`;
    fh+=`<div class="battle-arrow-out">→</div>`;
    fh+=`</div>`;
    fieldArea.innerHTML=fh;
    // 按鈕狀態
    document.getElementById('btn-battle-draw').style.opacity=(s.invested||s._drawnThisTurn)?'.4':'1';
    document.getElementById('btn-battle-invest').style.opacity=s.invested?'.4':'1';
    document.getElementById('btn-battle-redraw').style.opacity=(s.invested||s.turn>1)?'.4':'1';
    // 記錄
    const logEl=document.getElementById('battle-log');
    logEl.innerHTML=s.log.map(l=>{
      if(l.startsWith('▶')) return `<div style="color:var(--acc);font-weight:700;margin-top:4px;">${l}</div>`;
      if(l.startsWith('💥')) return `<div style="color:var(--red);font-weight:700;">${l}</div>`;
      if(l.startsWith('🎉')) return `<div style="color:var(--green);font-weight:900;font-size:12px;">${l}</div>`;
      if(l.startsWith('──')) return `<hr style="border:none;border-top:1px solid var(--br2);margin:4px 0;">`;
      return `<div>${l}</div>`;
    }).join('');
    logEl.scrollTop=logEl.scrollHeight;
    // 扇形手牌
    BATTLE.renderFan();
  },
  // 扇形手牌
  renderFan(){
    const area=document.getElementById('battle-fan-area');
    if(!area||!_battleState) return;
    const s=_battleState;
    const isReturn=s._returnNeeded>0;
    const cards=[];
    // 手牌設施
    s.hand.forEach((bId,idx)=>{
      const b=BLDG[bId];
      if(!b) return;
      cards.push({type:'bldg',id:bId,idx,emoji:b.emoji,name:b.name,desc:b.desc});
    });
    // 資源卡（最右）
    const emojis={money:'💵',material:'🪨',goods:'📦',diamond:'💎'};
    cards.push({
      type:'element',
      emoji:emojis[s.resource.type]||'💵',
      name:TLABEL[s.resource.type]||'資源',
      val:s.resource.value,
    });
    const total=cards.length;
    const maxAngle=Math.min(25,total*4);
    area.innerHTML=cards.map((card,i)=>{
      const frac=total>1?(i/(total-1))-0.5:0;
      const angle=frac*maxAngle*2;
      const sinkY=Math.abs(frac)*14;
      const zi=i+1;
      if(card.type==='element'){
        const canInvest=!s.invested&&!(s._returnNeeded>0)&&s.enemy.hp>0;
        return `<div class="fan-card el-card-fan" style="transform:translateY(${sinkY}px) rotate(${angle}deg);z-index:${zi};${canInvest?'cursor:grab;':'opacity:.4;'}"
          ${canInvest?`draggable="true" ondragstart="BATTLE.onElDragStart(event)" ondragend="BATTLE.onElDragEnd(event)"`:''}
          >
          <div class="fc-emoji">${card.emoji}</div>
          <div class="fc-val">${card.val}</div>
          <div class="fc-type">${card.name}</div>
          <div class="fc-buff-desc fc-buff-idle">拖曳到 → 投入</div>
        </div>`;
      }
      // 重抽返回模式：點擊返回
      if(isReturn){
        return `<div class="fan-card" style="transform:translateY(${sinkY}px) rotate(${angle}deg);z-index:${zi};cursor:pointer;border-color:var(--red);"
          onclick="BATTLE.returnCard(${card.idx})">
          <div class="fc-emoji">${card.emoji}</div>
          <div class="fc-name">${card.name}</div>
          <div class="fc-desc" style="color:var(--red);font-weight:700;">點擊返回</div>
        </div>`;
      }
      // 一般模式：可拖曳到戰場（檢查可用數量）
      const canDrag=!s.invested;
      return `<div class="fan-card" style="transform:translateY(${sinkY}px) rotate(${angle}deg);z-index:${zi};${canDrag?'cursor:grab;':'cursor:default;'}"
        ${canDrag?`draggable="true" ondragstart="BATTLE.onCardDragStart(event,'${card.id}')" ondragend="BATTLE.onCardDragEnd(event)"`:''}
        >
        <div class="fc-emoji">${card.emoji}</div>
        <div class="fc-name">${card.name}</div>
        <div class="fc-desc">${card.desc}</div>
      </div>`;
    }).join('');
  },
};

// 場景管理器 (Scene Manager)

const SM={
  current:null,
  defs:{},
  define(name,def){ this.defs[name]=def; },
  goto(name,opts){
    const prev=this.current;
    if(prev&&this.defs[prev]&&this.defs[prev].exit) this.defs[prev].exit();
    this.current=name;
    // 重置增量偵測 sentinel：避免場景切換 / 載入存檔後第一次 render 誤播音效
    _lastTalentCount=null;
    _lastCardValue=null;
    _lastCardType=null;
    // BGM 場景切換（title → bgm_4 / gameplay → 依輪數）
    if(typeof BGM!=='undefined'&&BGM.setScene) BGM.setScene(name);
    if(this.defs[name]&&this.defs[name].enter) this.defs[name].enter(opts||{});
  }
};

// ── 場景：標題畫面 ──
SM.define('title',{
  _exitTimer:null,
  enter(){
    clearTimeout(this._exitTimer);
    const ts=document.getElementById('title-screen');
    ts.classList.remove('ts-hide');
    ts.style.display='flex';
    // 偵測自動存檔
    let hasSave=false, saveInfo='';
    try{
      const raw=localStorage.getItem(SAVE_KEY);
      if(raw){
        const s=JSON.parse(raw);
        if(s&&s.v===SAVE_VERSION&&s.g){
          hasSave=true;
          const g=s.g;
          const ts=s.ts?new Date(s.ts).toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';
          saveInfo=`第${g.round}輪 回合${g.turn}/${g.maxTurns}<br>收益 ${g.profit}/${g.goal}${ts?`<br><span style="color:var(--mu);font-size:8px;">${ts}</span>`:''}`;
        }
      }
    }catch(e){}
    // 建立選單卡片
    let h='';
    if(hasSave){
      h+=`<div class="ts-card ts-primary" onclick="SM.goto('gameplay',{mode:'resume'})">
        <div class="ts-card-emoji">▶️</div>
        <div class="ts-card-name">繼續遊戲</div>
        <div class="ts-card-desc">${saveInfo}</div>
        <div class="ts-card-hint">從上次進度繼續</div>
      </div>`;
    }
    h+=`<div class="ts-card" onclick="SM.goto('gameplay',{mode:'tutorial'})">
      <div class="ts-card-emoji">📖</div>
      <div class="ts-card-name">新手教學</div>
      <div class="ts-card-desc">譚雅與蕾雅帶你<br>了解遊戲規則</div>
    </div>`;
    h+=`<div class="ts-card" onclick="SM.goto('gameplay',{mode:'new'})">
      <div class="ts-card-emoji">⚔️</div>
      <div class="ts-card-name">開始遊戲</div>
      <div class="ts-card-desc">跳過教學<br>直接開始冒險</div>
    </div>`;
    h+=`<div class="ts-card" onclick="triggerImport()">
      <div class="ts-card-emoji">📂</div>
      <div class="ts-card-name">讀取存檔</div>
      <div class="ts-card-desc">從檔案匯入<br>遊戲進度</div>
    </div>`;
    document.getElementById('ts-cards').innerHTML=h;
  },
  exit(){
    const ts=document.getElementById('title-screen');
    ts.classList.add('ts-hide');
    this._exitTimer=setTimeout(()=>{ ts.style.display='none'; },400);
  }
});

// ── 場景：遊戲主畫面 ──
SM.define('gameplay',{
  enter(opts){
    if(opts.mode==='tutorial'){
      G=newGame();
      TUT.start();
    } else if(opts.mode==='resume'){
      if(!autoLoad()){ SM.goto('title'); return; }
      if(G.phase!=='place') G.phase='place';
      render();
    } else if(opts.mode==='new'){
      clearAutoSave();
      G=newGame();
      render();
      showStarterPartnerSelection();
    } else if(opts.mode==='import'){
      if(G.phase!=='place') G.phase='place';
      addLog('📂 存檔已匯入','g');
      render();
    }
  },
  exit(){
    // 關閉所有遊戲中的 overlay
    hideEv(); closeCardChooser(); closeActionOverlay();
    document.getElementById('modal').classList.remove('show');
    // 清理遊戲中的事件監聽器
    if(G._yongqingSellEsc){ document.removeEventListener('keydown',G._yongqingSellEsc); G._yongqingSellEsc=null; }
    if(_transferPickerCleanup){ _transferPickerCleanup(); _transferPickerCleanup=null; }
    // 取消殘留的資源行進動畫
    cancelStepAnim();
  }
});

const DEV={
  seq:[],                     // 'L'=logo, 'C'=char
  pattern:['L','L','C','L','L'],
  timer:null,
  push(code){
    this.seq.push(code);
    if(this.timer) clearTimeout(this.timer);
    this.timer=setTimeout(()=>this.seq=[],3000);
    // 檢查末尾是否匹配
    const p=this.pattern;
    const s=this.seq;
    if(s.length>=p.length){
      const tail=s.slice(-p.length);
      if(tail.every((v,i)=>v===p[i])){
        this.seq=[];
        this.open();
      }
    }
  },
  open(){
    const panel=document.getElementById('dev-panel');
    panel.classList.add('show');
    SFX.openShop();
    this.render();
  },
  close(){
    document.getElementById('dev-panel').classList.remove('show');
    SFX.cardChange();
  },
  render(){
    const panel=document.getElementById('dev-panel');
    let h='';
    // header
    h+=`<div id="dev-close"><span style="font-weight:700;font-size:12px;">🛠 開發者模式</span>
      <button onclick="DEV.close()">✕</button></div>`;

        難度倍率: <b style="color:#fc5">${G.difficultyMult.toFixed(2)}</b> | 格子: <b style="color:#fff">${GN()}×${GN()}</b> | 人材: <b style="color:#fff">${G.talentCards||0}</b>
