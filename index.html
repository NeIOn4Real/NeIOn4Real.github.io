<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>創業小鎮</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4efe5;--bg2:#ebe3d0;--bg3:#ddd4bc;--sur:#faf7f1;
  --br:rgba(80,55,20,.13);--br2:rgba(80,55,20,.25);
  --tx:#2a1a08;--mu:rgba(42,26,8,.5);--hi:rgba(42,26,8,.28);
  --money:#b06000;--mat:#7a4e1a;--goods:#2a6e3a;
  --acc:#b33a00;--blue:#1a4e7a;--green:#2a7a3a;--red:#c0392b;
  --cell:66px;--r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--tx);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:12px;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(80,55,20,.03) 40px,rgba(80,55,20,.03) 41px),
    repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(80,55,20,.03) 40px,rgba(80,55,20,.03) 41px);}

/* HEADER */
#hdr{width:100%;max-width:880px;display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
#logo{font-size:18px;font-weight:900;letter-spacing:-.5px;}
#logo span{color:var(--acc);}
.chip{display:flex;align-items:center;gap:4px;background:var(--sur);border:1px solid var(--br2);
  border-radius:99px;padding:4px 12px;font-size:12px;font-weight:700;
  box-shadow:0 1px 3px rgba(80,55,20,.07);}
.chip .v{color:var(--money);}
#profit-area{margin-left:auto;display:flex;align-items:center;gap:6px;}
#pbar{height:7px;width:100px;background:var(--bg3);border-radius:99px;overflow:hidden;border:1px solid var(--br);}
#pbar-fill{height:100%;background:var(--green);border-radius:99px;transition:width .4s;}

/* LAYOUT */
#main{width:100%;max-width:880px;display:grid;grid-template-columns:155px 1fr 220px;gap:10px;align-items:start;}
.panel{background:var(--sur);border:1px solid var(--br2);border-radius:var(--r);padding:10px 12px;box-shadow:0 2px 6px rgba(80,55,20,.05);}
.pt{font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.7px;
  padding-bottom:6px;border-bottom:1px solid var(--br);margin-bottom:8px;}

/* EVENT BANNER */
#ev-banner{width:100%;max-width:880px;background:var(--sur);border:1px solid var(--br2);
  border-radius:var(--r);padding:10px 14px;margin-bottom:10px;display:none;
  box-shadow:0 2px 8px rgba(80,55,20,.07);}
#ev-banner.show{display:block;}
#ev-title{font-size:12px;font-weight:700;margin-bottom:3px;}
#ev-desc{font-size:11px;color:var(--mu);margin-bottom:8px;}
.ev-opts{display:flex;gap:6px;flex-wrap:wrap;}
.eopt{padding:6px 14px;border-radius:99px;border:1px solid var(--br2);background:var(--bg2);
  font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'Noto Sans TC',sans-serif;}
.eopt:hover{background:var(--bg);border-color:var(--acc);color:var(--acc);}
.eopt.pri{background:var(--acc);color:#fff;border-color:var(--acc);}

/* GRID */
#grid-area{display:flex;flex-direction:column;align-items:center;gap:2px;}
.drow{display:flex;gap:2px;position:relative;}
.dcol-wrap{display:flex;align-items:center;gap:2px;}
.dside{display:flex;flex-direction:column;gap:2px;}
.dbtn{
  width:var(--cell);height:26px;background:transparent;border:2px dashed transparent;
  border-radius:6px;cursor:pointer;font-size:16px;font-weight:900;color:transparent;
  transition:all .2s;display:flex;align-items:center;justify-content:center;
  font-family:'Noto Sans TC',sans-serif;pointer-events:none;opacity:0;
}
.dbtn.side{width:26px;height:var(--cell);}
/* 拖曳中才顯示箭頭 */
body.card-dragging .dbtn:not(.wind-blocked){
  opacity:1;pointer-events:auto;color:var(--acc);
  border-color:rgba(179,58,0,.25);background:rgba(179,58,0,.05);
  z-index:70;position:relative;
}
/* 拖曳元素卡時淡化手牌，讓投入箭頭更明顯 */
body.card-dragging #hand-fan-area {
  opacity: 0.3;
}
/* 場風/颱風限制方向：拖曳中也保持隱藏 */
body.card-dragging .dbtn.wind-blocked{
  opacity:0 !important;pointer-events:none !important;
}
/* 允許方向：加強顯示 */
body.card-dragging .dbtn.wind-active{
  opacity:1;pointer-events:auto;
  color:var(--acc);border-color:var(--acc);
  background:rgba(179,58,0,.12);
  animation:windPulse 1s ease-in-out infinite;
}
@keyframes windPulse{
  0%,100%{ box-shadow:0 0 0 0 rgba(179,58,0,.3); }
  50%{ box-shadow:0 0 0 6px rgba(179,58,0,.0); }
}
body.card-dragging .dbtn:hover:not(.wind-blocked),
.dbtn.drag-over{
  background:rgba(42,122,58,.18)!important;border-color:var(--green)!important;
  color:var(--green)!important;transform:scale(1.15);opacity:1;pointer-events:auto;
}
.dbtn:disabled{opacity:0!important;pointer-events:none;}
#grid{display:grid;gap:2px;background:var(--bg3);border:2px solid var(--br2);
  border-radius:var(--r);padding:4px;box-shadow:0 4px 14px rgba(80,55,20,.1);}
.cell{width:var(--cell);height:var(--cell);background:var(--bg2);border:1px solid var(--br);
  border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;position:relative;user-select:none;}
.cell:hover:not(.filled){background:var(--bg);border-color:var(--br2);}
.cell.filled{background:var(--bg);border-color:var(--br2);cursor:default;}
.cell.filled:hover{background:var(--bg);}
.cell.pulse{animation:pulse .45s ease;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.cell.place-spawn{animation:placeSpawn .55s cubic-bezier(.34,1.56,.64,1);z-index:10;}
@keyframes placeSpawn{
  0%{transform:scale(.2) rotate(-8deg);opacity:0;}
  55%{transform:scale(1.22) rotate(4deg);opacity:1;}
  80%{transform:scale(.96) rotate(-2deg);}
  100%{transform:scale(1) rotate(0);opacity:1;}
}
.place-ring{
  position:absolute;pointer-events:none;z-index:9;
  border:3px solid var(--acc);border-radius:12px;
  animation:placeRing .55s ease-out forwards;
}
@keyframes placeRing{
  0%{transform:scale(.6);opacity:.9;}
  100%{transform:scale(1.8);opacity:0;}
}
.place-sparkle{
  position:absolute;pointer-events:none;z-index:11;
  font-size:16px;animation:placeSparkle .8s ease-out forwards;
}
@keyframes placeSparkle{
  0%{transform:translate(0,0) scale(.4);opacity:1;}
  100%{transform:translate(var(--sx,0),var(--sy,-40px)) scale(1.2);opacity:0;}
}
/* Overlay 進場（商店/行動 overlay 開啟）：scale + opacity 彈性入場 */
@keyframes overlayPopIn{
  0%{transform:scale(.85);opacity:0;}
  60%{transform:scale(1.04);opacity:1;}
  100%{transform:scale(1);opacity:1;}
}
.overlay-popin{ animation:overlayPopIn .28s cubic-bezier(.34,1.56,.64,1) both; }
/* 通用「卡牌飛入手牌」動畫：由 JS 設定 transform 起點/終點，class 控制過渡 */
.card-fly{
  position:fixed;pointer-events:none;z-index:9200;
  background:var(--bg2);border:2px solid var(--acc);border-radius:8px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(0,0,0,.3);
  transition:transform .7s cubic-bezier(.34,1.2,.64,1), opacity .7s ease-out;
}
.card-fly-em{font-size:28px;line-height:1;}
.card-fly-nm{font-size:9px;font-weight:700;margin-top:2px;color:var(--tx);text-align:center;padding:0 2px;}
/* 消滅 / 爆破：cell 上紅色閃爆 + scale + 6 顆碎片飛散 */
@keyframes destroyBoom{
  0%{transform:scale(1);background:rgba(217,72,40,0);}
  20%{transform:scale(1.18) rotate(-3deg);background:rgba(217,72,40,.55);}
  60%{transform:scale(.92) rotate(2deg);background:rgba(217,72,40,.25);}
  100%{transform:scale(1) rotate(0);background:rgba(217,72,40,0);}
}
.destroy-boom{ animation:destroyBoom .55s ease-out; }
.destroy-shard{
  position:fixed;pointer-events:none;z-index:9100;
  font-size:18px;animation:destroyShard .65s ease-out forwards;
}
@keyframes destroyShard{
  0%{transform:translate(0,0) scale(.6) rotate(0);opacity:1;}
  100%{transform:translate(var(--sx,0),var(--sy,-30px)) scale(1.3) rotate(var(--sr,180deg));opacity:0;}
}
/* 招募合夥人：合夥人卡 pop-in（隆重的彈性放大） */
@keyframes recruitPopIn{
  0%{transform:scale(.3) rotate(-12deg);opacity:0;}
  50%{transform:scale(1.25) rotate(6deg);opacity:1;}
  75%{transform:scale(.95) rotate(-3deg);}
  100%{transform:scale(1) rotate(0);opacity:1;}
}
.recruit-popin{ animation:recruitPopIn .65s cubic-bezier(.34,1.56,.64,1) both; }
/* Modal 進場（過關 / 失敗）：scale + 旋轉小過衝 */
@keyframes modalPop{
  0%{transform:scale(.6) rotate(-3deg);opacity:0;}
  60%{transform:scale(1.06) rotate(2deg);opacity:1;}
  100%{transform:scale(1) rotate(0);opacity:1;}
}
.modal-pop{ animation:modalPop .5s cubic-bezier(.34,1.56,.64,1) both; }
/* 新輪 banner：全屏中央大字浮現後上滑淡出 */
.round-banner{
  position:fixed;left:50%;top:38%;transform:translate(-50%,-50%);
  z-index:9300;pointer-events:none;
  font-size:64px;font-weight:900;color:#f5e8c8;
  text-shadow:0 4px 16px rgba(0,0,0,.65),0 0 24px rgba(232,168,32,.4);
  letter-spacing:8px;
  animation:roundBannerIn 1.6s ease-out forwards;
}
@keyframes roundBannerIn{
  0%{opacity:0;transform:translate(-50%,-30%) scale(.8);}
  20%{opacity:1;transform:translate(-50%,-50%) scale(1.05);}
  35%{transform:translate(-50%,-50%) scale(1);}
  75%{opacity:1;transform:translate(-50%,-50%) scale(1);}
  100%{opacity:0;transform:translate(-50%,-70%) scale(.95);}
}
/* 回合數字 pop（header turn 變更） */
@keyframes turnPop{
  0%{transform:scale(1);}
  40%{transform:scale(1.35);color:var(--acc);}
  100%{transform:scale(1);}
}
.turn-pop{ animation:turnPop .35s ease-out; }
/* 事件 banner 滑入（從畫面上方滑入 + 過衝） */
/* 注意：#ev-banner 是普通 block 元素由 body flex 置中，不可加 X 平移（會造成靠左） */
@keyframes eventBannerSlideIn{
  0%{transform:translateY(-160%) scale(.9);opacity:0;}
  60%{transform:translateY(8%) scale(1.04);opacity:1;}
  100%{transform:translateY(0) scale(1);opacity:1;}
}
.ev-banner-slide-in{ animation:eventBannerSlideIn .5s cubic-bezier(.34,1.56,.64,1) both; }
/* 臨時加成格子脈動高亮（cellMods 本回合 / cellPctMods 本輪事件，永久加成不套） */
@keyframes tempBuffPulse{
  0%,100%{box-shadow:inset 0 0 0 2px rgba(74,168,90,.32),0 0 6px rgba(74,168,90,.18);}
  50%{box-shadow:inset 0 0 0 2px rgba(74,168,90,.62),0 0 14px rgba(74,168,90,.45);}
}
@keyframes tempDebuffPulse{
  0%,100%{box-shadow:inset 0 0 0 2px rgba(192,57,43,.32),0 0 6px rgba(192,57,43,.18);}
  50%{box-shadow:inset 0 0 0 2px rgba(192,57,43,.62),0 0 14px rgba(192,57,43,.45);}
}
.cell.temp-buff{animation:tempBuffPulse 1.6s ease-in-out infinite;}
.cell.temp-debuff{animation:tempDebuffPulse 1.6s ease-in-out infinite;}
/* 目標達成：goal 數字綠光脈衝 + 達標 chip 滑入 */
@keyframes goalFlash{
  0%{color:inherit;text-shadow:none;}
  30%{color:var(--green,#3a8a4a);text-shadow:0 0 12px rgba(74,168,90,.7);}
  100%{color:inherit;text-shadow:none;}
}
.goal-flash{ animation:goalFlash 1.2s ease-out 2; }
.goal-reached-chip{
  position:fixed;left:50%;top:25%;transform:translate(-50%,-50%);
  z-index:9250;pointer-events:none;
  background:linear-gradient(135deg,#3a8a4a,#74b85f);color:#fff;
  font-size:22px;font-weight:900;padding:10px 28px;border-radius:24px;
  box-shadow:0 6px 22px rgba(0,0,0,.4),0 0 18px rgba(74,168,90,.5);
  animation:goalChipIn 1.6s ease-out forwards;
}
@keyframes goalChipIn{
  0%{opacity:0;transform:translate(-50%,-100%) scale(.6);}
  20%{opacity:1;transform:translate(-50%,-50%) scale(1.1);}
  35%{transform:translate(-50%,-50%) scale(1);}
  75%{opacity:1;transform:translate(-50%,-50%) scale(1);}
  100%{opacity:0;transform:translate(-50%,-30%) scale(.9);}
}
/* 計數達標：金光閃爍光暈（套於 partner card / count badge） */
@keyframes countCompleteGlow{
  0%,100%{box-shadow:0 0 0 0 rgba(232,168,32,0),0 0 0 0 rgba(232,168,32,0);}
  20%{box-shadow:0 0 0 4px rgba(232,168,32,.7),0 0 22px 6px rgba(232,168,32,.5);}
  60%{box-shadow:0 0 0 6px rgba(232,168,32,.4),0 0 30px 10px rgba(232,168,32,.3);}
}
.count-complete{ animation:countCompleteGlow .9s ease-out 2; }
/* 合夥人技能觸發：短閃白光（比 count-complete 短，僅 0.4s）*/
@keyframes partnerFlash{
  0%,100%{box-shadow:0 0 0 0 rgba(255,240,180,0);}
  50%{box-shadow:0 0 0 3px rgba(255,240,180,.85),0 0 16px 4px rgba(232,168,32,.55);}
}
.partner-flash{ animation:partnerFlash .4s ease-out; }
/* 無效操作：cell 紅色震動 + 紅閃 */
@keyframes invalidShake{
  0%,100%{transform:translateX(0);background:rgba(217,72,40,0);}
  20%{transform:translateX(-4px) rotate(-1deg);background:rgba(217,72,40,.45);}
  40%{transform:translateX(4px) rotate(1deg);background:rgba(217,72,40,.35);}
  60%{transform:translateX(-3px);background:rgba(217,72,40,.25);}
  80%{transform:translateX(3px);background:rgba(217,72,40,.10);}
}
.invalid-shake{ animation:invalidShake .35s ease-out; }
.invalid-flash-layer{
  position:fixed;pointer-events:none;z-index:9098;border-radius:8px;
  animation:invalidShake .35s ease-out;
}
/* 數值 tween：套用於元素卡值 / talent badge / cell upgrade 數字 */
@keyframes valueTween{
  0%{transform:scale(1);}
  35%{transform:scale(1.4);color:var(--acc);text-shadow:0 0 6px rgba(232,168,32,.6);}
  100%{transform:scale(1);}
}
.value-tween{ animation:valueTween .35s ease-out; }
@keyframes valueTweenLose{
  0%{transform:scale(1);}
  35%{transform:scale(1.3);color:#d94828;text-shadow:0 0 6px rgba(217,72,40,.5);}
  100%{transform:scale(1);}
}
.value-tween-lose{ animation:valueTweenLose .35s ease-out; }
/* 設施升級浮動數字（比 cellFloat 更強調、金色） */
.upgrade-float{
  position:fixed;pointer-events:none;z-index:9100;
  font-size:18px;font-weight:900;color:var(--acc);
  text-shadow:0 0 8px rgba(232,168,32,.7),0 1px 2px rgba(0,0,0,.4);
  animation:upgradeFloatAnim 1.0s ease-out forwards;
}
@keyframes upgradeFloatAnim{
  0%{opacity:0;transform:translateY(0) scale(.6);}
  20%{opacity:1;transform:translateY(-6px) scale(1.2);}
  100%{opacity:0;transform:translateY(-44px) scale(1);}
}
/* 資源轉換時 mover 強調：emoji 翻轉 + scale 過衝 */
@keyframes moverConvert{
  0%{transform:scale(1) rotateY(0);}
  40%{transform:scale(1.25) rotateY(180deg);filter:brightness(1.4);}
  70%{transform:scale(.95) rotateY(360deg);}
  100%{transform:scale(1) rotateY(360deg);filter:brightness(1);}
}
.mover-convert .mv-emoji{ animation:moverConvert .42s ease-out; display:inline-block; }
.mover-convert{ box-shadow:0 0 14px 3px rgba(232,168,32,.55); }
/* 立繪 pop（教學步驟切換 / DM.show 強調） */
@keyframes charPop{
  0%{transform:scale(1);}
  40%{transform:scale(1.06) translateY(-4px);}
  100%{transform:scale(1);}
}
.char-pop{ animation:charPop .3s ease-out; }
/* 行動費用無法負擔：點擊時短震動 + 紅色閃 */
@keyframes acardDeny{
  0%,100%{transform:translateX(0);background:inherit;}
  20%{transform:translateX(-3px);background:rgba(217,72,40,.15);}
  60%{transform:translateX(3px);background:rgba(217,72,40,.10);}
}
.acard-deny{ animation:acardDeny .3s ease-out; }
/* 格子被選中（選資源卡 / 移動模式 src）短閃光暈 */
@keyframes selectChirp{
  0%{box-shadow:0 0 0 0 rgba(232,168,32,0);}
  50%{box-shadow:0 0 0 3px rgba(232,168,32,.65),0 0 12px 2px rgba(232,168,32,.4);}
  100%{box-shadow:0 0 0 0 rgba(232,168,32,0);}
}
.select-chirp{ animation:selectChirp .35s ease-out; }
/* SSR 抽到金粉灑落（從卡片中心向外散開） */
.ssr-sparkle{
  position:fixed;pointer-events:none;z-index:9150;
  font-size:20px;animation:ssrSparkleAnim 1.4s ease-out forwards;
  text-shadow:0 0 8px rgba(232,168,32,.85);
}
@keyframes ssrSparkleAnim{
  0%{opacity:0;transform:translate(0,0) scale(.4) rotate(0);}
  20%{opacity:1;transform:translate(calc(var(--sx,0) * .3),calc(var(--sy,0) * .3)) scale(1.2) rotate(120deg);}
  100%{opacity:0;transform:translate(var(--sx,0),var(--sy,0)) scale(.7) rotate(360deg);}
}
/* 嫉妒工廠匹配 +8：金光閃 + 「！」浮現 */
.envy-match-flash{
  position:fixed;pointer-events:none;z-index:9100;
  font-size:32px;font-weight:900;color:#52c878;
  text-shadow:0 0 12px rgba(82,200,120,.85),0 0 22px rgba(232,168,32,.4);
  animation:envyMatchAnim 1.0s ease-out forwards;
}
@keyframes envyMatchAnim{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.4) rotate(-15deg);}
  35%{opacity:1;transform:translate(-50%,-50%) scale(1.5) rotate(8deg);}
  60%{transform:translate(-50%,-50%) scale(1.1) rotate(-3deg);}
  100%{opacity:0;transform:translate(-50%,-100%) scale(1.3) rotate(0);}
}
/* 全屏地圖擴張動畫（全屏震 + 金色擴散圈） */
.expand-overlay{
  position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);
  pointer-events:none;z-index:9300;
  width:30px;height:30px;border-radius:50%;
  border:4px solid var(--acc);
  box-shadow:0 0 30px 10px rgba(232,168,32,.6);
  animation:expandOverlayAnim 1.2s ease-out forwards;
}
@keyframes expandOverlayAnim{
  0%{width:30px;height:30px;opacity:1;border-width:4px;}
  60%{width:80vmin;height:80vmin;opacity:.6;border-width:8px;}
  100%{width:140vmin;height:140vmin;opacity:0;border-width:2px;}
}
.expand-banner{
  position:fixed;left:50%;top:42%;transform:translate(-50%,-50%);
  z-index:9310;pointer-events:none;
  font-size:48px;font-weight:900;color:#f5e8c8;
  text-shadow:0 4px 16px rgba(0,0,0,.65),0 0 24px rgba(232,168,32,.5);
  letter-spacing:6px;
  animation:expandBannerAnim 1.5s ease-out forwards;
}
@keyframes expandBannerAnim{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.6);}
  25%{opacity:1;transform:translate(-50%,-50%) scale(1.05);}
  75%{opacity:1;transform:translate(-50%,-50%) scale(1);}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1.2);}
}
/* 地圖擴張時主畫面震動 */
@keyframes mainShake{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-6px);}
  40%{transform:translateX(6px);}
  60%{transform:translateX(-4px);}
  80%{transform:translateX(4px);}
}
.expanding{ animation:mainShake .6s ease-out 2; }
/* 物流方向旋轉動畫 */
@keyframes dirRotate{
  0%{transform:rotate(0);}
  100%{transform:rotate(360deg);}
}
.dir-rotating{ animation:dirRotate .35s ease-out; display:inline-block; }
/* 複合設施鏈接動畫：兩張卡入手後鏈接特效 */
.compound-link-fx{
  position:fixed;pointer-events:none;z-index:9180;
  font-size:32px;animation:compoundLinkAnim .8s ease-out forwards;
  text-shadow:0 0 10px rgba(232,168,32,.7);
}
@keyframes compoundLinkAnim{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.4) rotate(-30deg);}
  40%{opacity:1;transform:translate(-50%,-50%) scale(1.4) rotate(15deg);}
  100%{opacity:0;transform:translate(-50%,-50%) scale(.9) rotate(0);}
}
.cemoji{font-size:22px;line-height:1;}
.cname{font-size:8px;color:var(--mu);margin-top:1px;}

/* HAND */
.hi{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:7px;
  background:var(--bg2);border:1px solid var(--br);cursor:pointer;transition:all .15s;margin-bottom:4px;}
.hi:hover{background:var(--bg);border-color:var(--br2);}
.hi.sel{background:rgba(179,58,0,.1);border-color:var(--acc);}
.hi.off{opacity:.35;cursor:not-allowed;pointer-events:none;}
.hi-em{font-size:18px;flex-shrink:0;}
.hi-nm{font-size:11px;font-weight:700;}
.hi-ds{font-size:9px;color:var(--mu);line-height:1.3;}
.hi-ct{font-size:10px;font-weight:700;color:var(--acc);margin-left:auto;}

/* BTNS */
.abtn{width:100%;padding:9px 12px;border:1px solid var(--br2);border-radius:var(--r);
  background:var(--sur);color:var(--tx);font-size:12px;font-weight:700;
  font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .15s;
  text-align:left;margin-bottom:5px;}
.abtn:hover:not(:disabled){background:var(--bg2);}
.abtn.pri{background:var(--acc);color:#fff;border-color:var(--acc);}
.abtn.pri:hover{opacity:.88;}
.abtn:disabled{opacity:.28;cursor:not-allowed;}

/* LOG */
#side-log{
  background:var(--sur);border:1px solid var(--br);
  border-radius:var(--r);padding:8px 10px;
  height:100%;overflow-y:auto;font-size:10px;
  min-height:200px;
}
.log-turn-block{ margin-bottom:10px; }
.log-turn-hdr{ font-size:10px;font-weight:700;color:var(--acc);margin-bottom:3px;padding-bottom:3px;border-bottom:1px solid var(--br); }
.log-entry{ line-height:1.6;color:var(--mu);padding-left:4px; }
.log-entry.g{ color:var(--green); }
.log-entry.b{ color:var(--red); }
.log-entry.w{ color:var(--money); }
.log-entry.h{ color:var(--tx);font-weight:700; }
.log-calc{ font-family:'DM Mono',monospace;font-size:9px;color:var(--blue);padding-left:8px; }

/* MODAL */
#modal{display:none;position:fixed;inset:0;z-index:100;background:rgba(42,26,8,.55);
  align-items:center;justify-content:center;}
#modal.show{display:flex;}
#mbox{background:var(--sur);border:1px solid var(--br2);border-radius:14px;padding:28px 24px;
  text-align:center;max-width:300px;width:90%;box-shadow:0 8px 28px rgba(42,26,8,.18);
  animation:min .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes min{from{transform:scale(.7);opacity:0}}
#memo{font-size:38px;margin-bottom:8px;}
#mtitle{font-size:20px;font-weight:900;margin-bottom:6px;}
#mmsg{font-size:11px;color:var(--mu);margin-bottom:16px;line-height:1.7;white-space:pre-line;}
#mbtn{padding:9px 24px;border-radius:99px;border:none;font-size:12px;font-weight:700;
  font-family:'Noto Sans TC',sans-serif;cursor:pointer;background:var(--acc);color:#fff;}

/* DELTA */
.delta{position:fixed;pointer-events:none;font-size:14px;font-weight:900;z-index:200;
  animation:fup .9s ease forwards;}
@keyframes fup{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-44px)}}
/* ── 元素卡牌 ── */


.cell.move-src{outline:3px solid var(--acc);box-shadow:0 0 10px rgba(179,58,0,.3);z-index:2;}
.cell.ruin-cell{background:repeating-linear-gradient(45deg,var(--bg2),var(--bg2) 4px,rgba(120,100,80,.12) 4px,rgba(120,100,80,.12) 8px);border-color:rgba(120,100,80,.4);}
.cell.drag-target{background:rgba(179,58,0,.1);border-color:var(--acc);border-style:dashed;}
.cell.drag-over-cell{background:rgba(42,122,58,.12);border:2px solid var(--green);}

/* ── 元素移動動畫 ── */
#el-mover{
  position:fixed;width:56px;height:66px;
  background:linear-gradient(145deg,var(--sur),var(--bg2));
  border:2px solid var(--acc);border-radius:8px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;pointer-events:none;z-index:500;
  box-shadow:0 4px 14px rgba(179,58,0,.3);
  transition:left .32s cubic-bezier(.4,0,.2,1),top .32s cubic-bezier(.4,0,.2,1);
}
#el-mover .mv-emoji{font-size:16px;line-height:1;}
#el-mover .mv-val{font-size:14px;font-weight:900;font-family:'DM Mono',monospace;}
#el-mover .mv-type{font-size:7px;color:var(--mu);}

/* ── 收益飛行動畫 ── */
.profit-fly{
  position:fixed;pointer-events:none;z-index:600;
  font-size:20px;font-weight:900;color:var(--green);
  text-shadow:0 2px 8px rgba(42,122,58,.4);
  animation:profitFly 1.2s cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes profitFly{
  0%{opacity:0;transform:scale(.5) translateY(0);}
  20%{opacity:1;transform:scale(1.2) translateY(-20px);}
  80%{opacity:1;}
  100%{opacity:0;transform:scale(.6) translateY(-120px) translateX(var(--fly-x,0px));}
}
/* 匯率波動板：單格浮動 ±2（不飛向收益區） */
.cell-float{
  position:fixed;pointer-events:none;z-index:600;
  font-size:18px;font-weight:900;
  text-shadow:0 2px 6px rgba(0,0,0,.3);
  animation:cellFloat .8s cubic-bezier(.3,.7,.4,1) forwards;
}
@keyframes cellFloat{
  0%{opacity:0;transform:scale(.6) translate(-50%,0);}
  25%{opacity:1;transform:scale(1.15) translate(-50%,-14px);}
  75%{opacity:1;transform:scale(1) translate(-50%,-30px);}
  100%{opacity:0;transform:scale(.8) translate(-50%,-52px);}
}
/* 莫菲定律全屏特效 */
@keyframes murphyShake{
  0%,100%{transform:translate(0,0)}
  10%{transform:translate(-8px,4px)}
  20%{transform:translate(6px,-6px)}
  30%{transform:translate(-10px,2px)}
  40%{transform:translate(8px,-4px)}
  50%{transform:translate(-4px,8px)}
  60%{transform:translate(6px,-2px)}
  70%{transform:translate(-6px,6px)}
  80%{transform:translate(4px,-8px)}
  90%{transform:translate(-2px,4px)}
}
@keyframes murphyFadeIn{
  0%{opacity:0;}
  100%{opacity:1;}
}
#murphy-overlay{
  position:fixed;inset:0;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  background:rgba(0,0,0,.7);
  pointer-events:auto;cursor:pointer;
}
#murphy-overlay .murphy-text{
  color:#fff;font-size:22px;font-weight:900;text-align:center;
  text-shadow:0 2px 16px rgba(0,0,0,.9);
  padding-top:24px;
  z-index:2;
  animation:murphyFadeIn .6s ease-out;
}
#murphy-overlay .murphy-chars{
  display:flex;align-items:flex-start;justify-content:center;
  width:80vw;max-width:700px;height:calc(100vh - 80px);overflow:hidden;
  margin-top:-10px;
}
#murphy-overlay .murphy-chars img{
  width:100%;height:100%;
  object-fit:cover;object-position:top center;
  image-rendering:auto;
  filter:drop-shadow(0 4px 24px rgba(0,0,0,.7));
}
.murphy-shaking{ animation:murphyShake .5s ease-in-out 3; }
/* 大熱波全屏特效 */
#heatwave-overlay{
  position:fixed;inset:0;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(30,0,0,.8);
  pointer-events:auto;cursor:pointer;
}
#heatwave-overlay .hw-explosion{
  font-size:120px;position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  animation:hwBoom .8s ease-out forwards;z-index:2;
}
@keyframes hwBoom{0%{transform:translate(-50%,-50%) scale(0);opacity:1}40%{transform:translate(-50%,-50%) scale(3);opacity:1}100%{transform:translate(-50%,-50%) scale(4);opacity:0}}
/* 疊加設施輪播 */
.ov-rotate{font-size:24px;line-height:1;position:relative;width:32px;height:32px;}
.ov-rotate .ov-a,.ov-rotate .ov-b{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);animation:ovSwap 3s ease-in-out infinite;}
.ov-rotate .ov-b{animation-delay:1.5s;animation-fill-mode:backwards;}
@keyframes ovSwap{0%,40%{opacity:1}50%,90%{opacity:0}100%{opacity:1}}
#heatwave-overlay .hw-text{
  color:#ff4444;font-size:22px;font-weight:900;text-align:center;
  text-shadow:0 2px 16px rgba(255,0,0,.7);
  z-index:3;animation:murphyFadeIn .6s ease-out .5s both;
}
#heatwave-overlay .hw-chars{
  display:flex;align-items:flex-start;justify-content:center;
  width:80vw;max-width:700px;height:calc(100vh - 120px);overflow:hidden;
  margin-top:-20px;z-index:1;animation:murphyFadeIn .8s ease-out .3s both;
}
#heatwave-overlay .hw-chars img{
  width:100%;height:100%;
  object-fit:cover;object-position:top center;
  filter:drop-shadow(0 4px 24px rgba(255,0,0,.5));
}
/* 人材發光提示 */
/* 擁慶記房屋賣出模式：設施發抖 */
@keyframes sellShake{
  0%,100%{transform:translate(0,0) rotate(0deg);}
  20%{transform:translate(-2px,1px) rotate(-1deg);}
  40%{transform:translate(2px,-1px) rotate(1deg);}
  60%{transform:translate(-1px,2px) rotate(-0.5deg);}
  80%{transform:translate(1px,-1px) rotate(0.5deg);}
}
/* 特異度提升至 .cell.sell-shake 才能覆蓋 .cell.temp-buff / .cell.event-preview / .cell.temp-debuff
   等同特異度（2 classes）的 animation 宣告；較晚宣告者勝出 */
.cell.sell-shake{animation:sellShake .4s ease-in-out infinite;cursor:pointer !important;}
.cell.sell-shake:hover{outline:2px solid var(--red);box-shadow:0 0 10px rgba(200,0,0,.3);}
@keyframes talentGlow{
  0%,100%{box-shadow:0 0 4px rgba(176,96,0,.2);}
  50%{box-shadow:0 0 14px rgba(176,96,0,.6),0 0 24px rgba(176,96,0,.3);}
}
.talent-glow{ animation:talentGlow 1.5s ease-in-out 3; }

/* 人材批量投入選擇器 */
.talent-bulk-selector{display:inline-flex;gap:1px;align-items:center;margin-left:auto;}
.talent-bulk-selector .bs{
  font-size:9px;padding:2px 5px;
  border:1px solid var(--br2);background:var(--sur);color:var(--mu);
  border-radius:4px;cursor:pointer;font-weight:700;
  font-family:'DM Mono','Noto Sans TC',monospace;
  transition:background .12s,color .12s,border-color .12s;
}
.talent-bulk-selector .bs.sel{
  background:var(--money);color:#fff;border-color:var(--money);
  box-shadow:0 0 6px rgba(176,96,0,.4);
}
.talent-bulk-selector .bs:hover:not(.sel){background:rgba(176,96,0,.12);color:var(--money);}

/* ── 格子閃光 ── */
.cell.active-path{
  background:rgba(179,58,0,.08);
  border-color:rgba(179,58,0,.4);
  box-shadow:0 0 0 2px rgba(179,58,0,.2);
}
.cell.transform-flash{animation:tflash .5s ease;}
@keyframes tflash{0%{background:rgba(42,122,58,.2)}100%{background:inherit}}

/* ── 數值變化標籤 ── */
.change-badge{
  position:absolute;top:-18px;left:50%;transform:translateX(-50%);
  background:var(--green);color:#fff;border-radius:99px;
  padding:2px 8px;font-size:10px;font-weight:700;white-space:nowrap;
  animation:badgePop .5s ease forwards;pointer-events:none;z-index:10;
}
@keyframes badgePop{0%{opacity:0;transform:translateX(-50%) scale(.5)}
  60%{opacity:1;transform:translateX(-50%) scale(1.1)}
  100%{opacity:1;transform:translateX(-50%) scale(1)}}

/* 行動選項 */
.act-opt{width:100%;padding:7px 10px;margin-bottom:5px;border-radius:8px;
  border:1px solid var(--br2);background:var(--bg2);cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;text-align:left;transition:all .15s;}
.act-opt:hover:not(:disabled){background:var(--bg);border-color:var(--acc);}
.act-opt:disabled{opacity:.3;cursor:not-allowed;}
.act-opt-label{font-size:11px;font-weight:700;display:flex;justify-content:space-between;align-items:center;}
.act-opt-desc{font-size:9px;color:var(--mu);margin-top:2px;}
.act-cost{color:var(--acc);font-size:10px;font-weight:700;white-space:nowrap;}
.act-cost.free{color:var(--green);}
/* 通用按鈕發光提示 */
@keyframes btnGlow{0%,100%{box-shadow:0 0 4px rgba(176,96,0,.3)}50%{box-shadow:0 0 14px rgba(176,96,0,.6),0 0 24px rgba(176,96,0,.25)}}
.btn-glow{animation:btnGlow 1.2s ease-in-out infinite;border-color:var(--acc)!important;}
/* 商店免費設施 / 免費行動：金色脈衝 + 光帶閃爍 + 「🎁 免費」絲帶 */
@keyframes freeCardPulse{
  0%,100%{box-shadow:0 0 12px rgba(232,168,32,.55), 0 0 28px rgba(232,168,32,.3), inset 0 0 8px rgba(255,233,150,.4); transform:translateY(-4px) scale(1.02);}
  50%{box-shadow:0 0 22px rgba(232,168,32,.85), 0 0 44px rgba(232,168,32,.55), inset 0 0 14px rgba(255,233,150,.65); transform:translateY(-8px) scale(1.04);}
}
@keyframes freeCardShimmer{
  0%{background-position:-150% 0;}
  100%{background-position:250% 0;}
}
@keyframes freeRibbonBob{
  0%,100%{transform:translateX(-50%) translateY(0) rotate(-3deg);}
  50%{transform:translateX(-50%) translateY(-3px) rotate(3deg);}
}
.sel-card.free-card{
  position:relative !important;
  border:2px solid #e8a820 !important;
  background:linear-gradient(115deg,#fff8de 0%,#ffe9a3 35%,#ffd56a 50%,#ffe9a3 65%,#fff8de 100%) !important;
  background-size:220% 100% !important;
  animation:freeCardPulse 1.4s ease-in-out infinite, freeCardShimmer 2.6s linear infinite !important;
  z-index:5;
}
.sel-card.free-card::before{
  content:'🎁 免費';
  position:absolute;
  top:-12px; left:50%;
  background:linear-gradient(90deg,#ffae00,#ff7700);
  color:#fff;
  padding:3px 12px; border-radius:12px;
  font-size:11px; font-weight:900; letter-spacing:.6px;
  box-shadow:0 3px 10px rgba(255,140,0,.65);
  white-space:nowrap;
  animation:freeRibbonBob 1.6s ease-in-out infinite;
  z-index:6;
  pointer-events:none;
}
.sel-card.free-card .sel-card-name,.sel-card.free-card .sel-card-desc,.sel-card.free-card .sel-card-pos{
  color:#5a3500 !important;
}
/* 暗叫合約：卡背樣式（手牌設施卡 + chooser 設施卡） */
.fan-card.card-back-fac, .sel-card.card-back-fac{
  background:linear-gradient(135deg,#2d1f3d 0%,#1a1228 50%,#3a2854 100%) !important;
  border-color:#5a3d80 !important;
  box-shadow:inset 0 0 12px rgba(0,0,0,.55), 0 2px 6px rgba(0,0,0,.4) !important;
  color:rgba(255,255,255,.85) !important;
  position:relative;
  overflow:hidden;
}
.fan-card.card-back-fac::before, .sel-card.card-back-fac::before{
  content:'🃏';
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:42px;
  text-shadow:0 2px 8px rgba(0,0,0,.6);
  pointer-events:none;
  z-index:1;
}
.fan-card.card-back-fac .fc-emoji,
.fan-card.card-back-fac .fc-name,
.fan-card.card-back-fac .fc-desc,
.fan-card.card-back-fac .fc-pos-mark,
.sel-card.card-back-fac .sel-card-emoji,
.sel-card.card-back-fac .sel-card-name,
.sel-card.card-back-fac .sel-card-desc,
.sel-card.card-back-fac .sel-card-pos{
  visibility:hidden !important;
}
/* 複合設施卡背：保留排列形狀（layout 與 link）但隱藏具體 emoji，改用 ❓ 占位 */
.fan-card.card-back-fac.fc-compound::before{ display:none; }
.fan-card.card-back-fac .fc-compound-layout,
.fan-card.card-back-fac .fc-compound-link{
  visibility:visible !important;
  position:relative;z-index:2;
}
.fan-card.card-back-fac .fc-compound-emoji{
  position:relative;
  color:transparent !important;
  text-shadow:none !important;
}
.fan-card.card-back-fac .fc-compound-emoji::after{
  content:'❓';
  position:absolute;top:0;left:0;right:0;bottom:0;
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.85);
  font-size:.85em;
  text-shadow:0 1px 4px rgba(0,0,0,.6);
}
.fan-card.card-back-fac .fc-compound-name{ visibility:hidden !important; }
/* 配對消除模式：第一格選中強光，可配對的同 id 格子綠光提示 */
.cell.hidden-pair-selected{
  outline:3px solid #ff7700 !important;
  box-shadow:0 0 18px rgba(255,119,0,.7) !important;
  animation:btnGlow 1s ease-in-out infinite;
}
.cell.hidden-pair-target{
  outline:2px dashed #5b5 !important;
  box-shadow:0 0 12px rgba(91,181,91,.55) !important;
  cursor:pointer !important;
}
/* 合約：選擇 modal 的羊皮紙風格卡 */
.sel-card.contract-card{
  background:linear-gradient(135deg,#fdf6e3 0%,#f5e8c5 60%,#e8d49a 100%) !important;
  border:2px solid #b08c4a !important;
  color:#3a2a10 !important;
  position:relative;
}
.sel-card.contract-card .sel-card-name,
.sel-card.contract-card .sel-card-desc,
.sel-card.contract-card .sel-card-pos,
.sel-card.contract-card .sel-card-emoji{
  color:#3a2a10 !important;
}
/* 合約按鈕：大顯眼版，緊鄰收益顯示 */
#btn-contract{
  position:relative;display:inline-flex;align-items:center;justify-content:center;
  width:38px;height:38px;font-size:24px;line-height:1;
  margin-left:8px;padding:0;cursor:pointer;
  background:linear-gradient(135deg,#fdf6e3 0%,#f5e8c5 60%,#e8d49a 100%);
  border:2px solid #b08c4a;border-radius:8px;
  box-shadow:0 2px 6px rgba(176,140,74,.4), inset 0 0 4px rgba(255,233,170,.5);
  transition:transform .15s ease-out, box-shadow .15s ease-out;
  font-family:inherit;
}
#btn-contract:hover{
  transform:translateY(-2px) scale(1.05);
  box-shadow:0 4px 10px rgba(176,140,74,.6), inset 0 0 8px rgba(255,233,170,.7);
}
#btn-contract:active{ transform:translateY(0) scale(.98); }
#btn-contract .contract-count{
  position:absolute;top:-6px;right:-6px;
  background:var(--red);color:#fff;
  font-size:11px;font-weight:900;
  min-width:18px;height:18px;line-height:18px;
  text-align:center;border-radius:99px;
  padding:0 4px;
  box-shadow:0 2px 5px rgba(0,0,0,.5);
  border:1.5px solid #fff;
}
#btn-contract .contract-failed-dot{
  position:absolute;bottom:-4px;right:-4px;
  background:var(--red);color:#fff;
  font-size:10px;font-weight:900;
  width:16px;height:16px;line-height:16px;
  text-align:center;border-radius:99px;
  box-shadow:0 0 8px rgba(207,76,76,.85);
  animation:btnGlow 1s ease-in-out infinite;
  border:1.5px solid #fff;
}
/* 合約進度條 */
.contract-progress-bar{
  margin-top:8px;height:6px;border-radius:3px;
  background:rgba(58,42,16,.15);overflow:hidden;
}
.contract-progress-fill{
  height:100%;background:linear-gradient(90deg,#7da76a,#4a8a3a);
  transition:width .3s ease-out;
}
/* 常駐按鈕 */
.perm-btn{
  display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:8px;
  border:1.5px solid var(--br2);background:var(--sur);cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;font-size:10px;font-weight:700;color:var(--tx);
  transition:box-shadow .2s,border-color .2s;
}
.perm-btn:hover:not(.perm-disabled){border-color:var(--acc);box-shadow:0 0 8px rgba(176,96,0,.2);}
.perm-btn.perm-disabled{opacity:.4;cursor:not-allowed;}
.cell.upgrade-glow{
  border-color:var(--money)!important;
  box-shadow:0 0 0 2px rgba(176,96,0,.3), 0 0 10px rgba(176,96,0,.2);
  animation:upgradeGlow 1.2s ease-in-out infinite;
  cursor:pointer!important;
}
.omni-drop-card.omni-hover{
  transform:scale(1.08)!important;
  border-color:var(--green)!important;
  box-shadow:0 0 0 3px var(--green), 0 0 18px rgba(72,133,72,.55)!important;
  z-index:100!important;
}
@keyframes upgradeGlow{0%,100%{box-shadow:0 0 0 2px rgba(176,96,0,.3)}50%{box-shadow:0 0 0 3px rgba(176,96,0,.6),0 0 14px rgba(176,96,0,.3)}}
@keyframes omniPanelIn{from{opacity:0;transform:translate(-50%,calc(-50% - 8px))}to{opacity:1;transform:translate(-50%,-50%)}}
/* 事件預告格子高亮 */
.cell.event-preview{
  border-color:var(--blue)!important;
  box-shadow:0 0 0 2px rgba(26,78,122,.25), 0 0 8px rgba(26,78,122,.15);
  animation:eventPreviewPulse 2s ease-in-out infinite;
}
@keyframes eventPreviewPulse{0%,100%{box-shadow:0 0 0 2px rgba(26,78,122,.2)}50%{box-shadow:0 0 0 3px rgba(26,78,122,.45),0 0 10px rgba(26,78,122,.2)}}
.upgrade-hint{width:100%;max-width:880px;background:rgba(176,96,0,.1);border:1px solid rgba(176,96,0,.3);
  border-radius:8px;padding:7px 14px;margin-bottom:8px;font-size:11px;font-weight:700;color:var(--money);display:none;}
.upgrade-hint.show{display:block;}
.acard{width:160px;background:var(--sur);border:1.5px solid var(--br2);border-radius:14px;padding:16px 14px;
  display:flex;flex-direction:column;gap:7px;transition:all .15s;
  box-shadow:0 8px 28px rgba(42,26,8,.18),0 2px 6px rgba(42,26,8,.08);opacity:1;}
.acard:hover:not(.acard-disabled){border-color:var(--acc);transform:translateY(-4px);box-shadow:0 14px 36px rgba(179,58,0,.22);}
.acard-disabled{opacity:1;border-color:var(--red);background:var(--bg2);cursor:not-allowed;}
.acard-disabled .acard-label{color:var(--mu);}
.acard-disabled .acard-desc{color:var(--hi);}
.acard-disabled .acard-cost{color:var(--red);}
.acard-label{font-size:12px;font-weight:700;color:var(--tx);}
.acard-desc{font-size:9px;color:var(--mu);line-height:1.5;flex:1;}
.acard-cost{font-size:11px;font-weight:700;color:var(--acc);text-align:right;}
.acard-cost.free{color:var(--green);}
/* 格子增幅標記 */
.cell-mod-pos{position:absolute;bottom:2px;right:3px;font-size:9px;font-weight:900;color:var(--green);}
.cell-mod-neg{position:absolute;bottom:2px;right:3px;font-size:9px;font-weight:900;color:var(--red);}
/* 合夥人卡片 */
.partner-card{
  flex-shrink:0;width:72px;
  background:var(--sur);border:1px solid var(--br2);border-radius:10px;
  padding:8px 6px;text-align:center;
  box-shadow:0 2px 8px rgba(42,26,8,.1);
  transition:transform .15s;cursor:default;
}
.partner-card:hover{transform:translateY(-2px);}
.partner-card .pc-emoji{font-size:20px;line-height:1;margin-bottom:3px;}
.partner-card .pc-name{font-size:8px;font-weight:700;color:var(--tx);line-height:1.2;}
.partner-card .pc-pos{font-size:7px;color:var(--green);margin-top:2px;line-height:1.3;}
.partner-card .pc-neg{font-size:7px;color:var(--red);margin-top:1px;line-height:1.3;}

/* 浮動說明視窗 */
#tooltip{
  position:fixed;z-index:9999;pointer-events:none;
  background:var(--tx);color:var(--bg);
  border-radius:8px;padding:8px 12px;
  font-size:10px;line-height:1.6;max-width:200px;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
  opacity:0;transition:opacity .15s;
  white-space:pre-wrap;
}
#tooltip.show{opacity:1;}
/* 複合設施懸浮預覽 */
#compound-preview-float{
  position:fixed;z-index:9998;pointer-events:none;
  display:none;gap:8px;
}
#compound-preview-float.show{display:flex;}
.cpf-card{
  width:120px;background:var(--sur);border:1.5px solid var(--br2);
  border-radius:12px;padding:10px 8px;
  box-shadow:0 4px 16px rgba(42,26,8,.18);
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.cpf-card .cpf-emoji{font-size:28px;line-height:1;}
.cpf-card .cpf-name{font-size:11px;font-weight:700;color:var(--tx);text-align:center;}
.cpf-card .cpf-desc{font-size:9px;color:var(--mu);text-align:center;line-height:1.4;}
.cpf-dir{display:flex;align-items:center;font-size:16px;color:var(--mu);font-weight:700;}

/* 選擇卡片（設施/合夥人） */
.sel-card{
  width:180px;flex-shrink:0;
  min-height:200px;
  background:var(--sur);border:1.5px solid var(--br2);border-radius:12px;
  padding:14px 12px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  box-shadow:0 4px 14px rgba(42,26,8,.12);
  transition:all .15s;
  text-align:center;
}
.sel-card:hover{border-color:var(--acc);transform:translateY(-3px);box-shadow:0 8px 20px rgba(179,58,0,.18);}
.sel-card-emoji{font-size:24px;line-height:1;margin-bottom:2px;}
.sel-card-name{font-size:12px;font-weight:700;color:var(--tx);text-align:center;width:100%;}
.sel-card-desc{font-size:9px;color:var(--mu);line-height:1.4;flex:1;text-align:center;width:100%;}
.sel-card-pos{font-size:8px;color:var(--green);margin-top:2px;}
.sel-card-neg{font-size:8px;color:var(--red);margin-top:1px;}
/* partner card hover tooltip */
.partner-card{position:relative;}

/* ══ 扇形手牌系統 ══ */
#hand-fan-area {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 60;
  background: linear-gradient(to top, rgba(244,239,229,0.98) 75%, transparent);
  overflow: visible;
}

/* 卡牌基底 */
.fan-card {
  position: relative;
  flex-shrink: 0;
  width: 114px;
  height: 158px;
  border-radius: 14px;
  cursor: pointer;
  pointer-events: auto;
  transform-origin: center bottom;
  transition: transform 0.22s cubic-bezier(.4,0,.2,1), box-shadow 0.2s;
  user-select: none;
  will-change: transform;
  margin: 0 -12px;
  background: var(--sur);
  border: 1.5px solid var(--br2);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 6px 5px;
  box-shadow: 0 4px 12px rgba(42,26,8,.13);
}
.fan-card.fc-selected { border-color: var(--acc) !important; }
/* ── 稀有度外框（卡片 / 合夥人牌） ── */
.fan-card.rarity-n,.joker-card.rarity-n,.acard.rarity-n,.omni-drop-card.rarity-n,.sel-card.rarity-n{border-color:#b0a89a!important;box-shadow:0 2px 8px rgba(176,168,154,.3)!important;}
.fan-card.rarity-r,.joker-card.rarity-r,.acard.rarity-r,.omni-drop-card.rarity-r,.sel-card.rarity-r{border-color:#4a90c2!important;box-shadow:0 2px 10px rgba(74,144,194,.45)!important;}
.fan-card.rarity-sr,.joker-card.rarity-sr,.acard.rarity-sr,.omni-drop-card.rarity-sr,.sel-card.rarity-sr{border-color:#c06bd6!important;box-shadow:0 2px 12px rgba(192,107,214,.55)!important;}
.fan-card.rarity-ssr,.joker-card.rarity-ssr,.acard.rarity-ssr,.omni-drop-card.rarity-ssr,.sel-card.rarity-ssr{border-color:#e8a820!important;box-shadow:0 2px 14px rgba(232,168,32,.6),0 0 18px rgba(232,168,32,.35)!important;animation:rarityGlowSSR 2.4s ease-in-out infinite!important;}
@keyframes rarityGlowSSR{0%,100%{box-shadow:0 2px 14px rgba(232,168,32,.5),0 0 14px rgba(232,168,32,.3)}50%{box-shadow:0 2px 16px rgba(232,168,32,.75),0 0 24px rgba(232,168,32,.5)}}
/* ── 譚雅電影式卡牌動畫 ── */
.tanya-cinematic-card{
  position:fixed;z-index:9200;pointer-events:none;
  background:linear-gradient(160deg,#fff9f2,#fcefb0);
  border:3px solid #e8a820;border-radius:16px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:18px 14px;box-sizing:border-box;
  box-shadow:0 12px 40px rgba(0,0,0,.45), 0 0 60px rgba(232,168,32,.5);
  font-family:'Noto Sans TC',sans-serif;color:var(--tx);
  transition:left .5s cubic-bezier(.3,1.6,.5,1),top .5s cubic-bezier(.3,1.6,.5,1),width .5s,height .5s,transform .5s,opacity .4s;
}
.tanya-cinematic-backdrop{
  position:fixed;z-index:9150;inset:0;background:rgba(0,0,0,.5);
  opacity:0;transition:opacity .3s;pointer-events:none;
}
.tanya-cinematic-backdrop.show{opacity:1;}
@keyframes tanyaShake{
  0%,100%{transform:translate(-50%,-50%) rotate(0)}
  15%{transform:translate(-52%,-50%) rotate(-4deg)}
  30%{transform:translate(-48%,-50%) rotate(4deg)}
  45%{transform:translate(-51%,-50%) rotate(-3deg)}
  60%{transform:translate(-49%,-50%) rotate(3deg)}
  75%{transform:translate(-50.5%,-50%) rotate(-2deg)}
  90%{transform:translate(-49.5%,-50%) rotate(2deg)}
}
.tanya-cinematic-card.tanya-shake{animation:tanyaShake .6s ease-in-out 2;}
@keyframes tanyaGlowFlash{
  0%{filter:brightness(1) saturate(1);box-shadow:0 12px 40px rgba(0,0,0,.45),0 0 60px rgba(232,168,32,.5)}
  40%{filter:brightness(2.4) saturate(1.6);box-shadow:0 12px 80px rgba(255,230,130,1),0 0 160px rgba(255,215,0,.9)}
  100%{filter:brightness(1) saturate(1);box-shadow:0 12px 40px rgba(0,0,0,.45),0 0 60px rgba(72,133,72,.6)}
}
.tanya-cinematic-card.tanya-glow-flash{animation:tanyaGlowFlash .8s ease-in-out forwards;}

/* 燃燒消失動畫 */
@keyframes burnAway {
  0%   { opacity:1; transform: translateY(-80px) scale(1.1); filter: brightness(1); }
  40%  { opacity:.9; transform: translateY(-130px) scale(1.12); filter: brightness(1.6) sepia(1) saturate(4); }

/* main area bottom padding so content isn't hidden by hand */
body { padding-bottom: 150px; }

/* 懸停展開合夥人浮動面板 */
#partner-float{

.joker-card.demon .jc-name { color:#c0392b; }

/* ── 角色立繪（右下角） ── */
/* z-index 50：低於 #hand-fan-area(60)，讓手牌過多時最右側的卡片能在視覺與點擊上蓋過立繪。 */
/* hand-fan-area 是 pointer-events:none 的容器（只 .fan-card 收事件），立繪仍可被點擊（事件穿透）。 */
/* 拖曳卡片時不裁切/淡出立繪，僅靠 z-index 分層讓手牌與投入箭頭(.dbtn z70)位於立繪上方。 */
#char-tray {
  position: fixed;
  bottom: -22%;
  right: -5px;
  z-index: 50;
  pointer-events: none;
  width: clamp(276px, 27.6vw, 437px);
}

/* ── 對話泡泡 ── */
#char-bubble {
  position: fixed;
  right: 6px;
  bottom: calc(clamp(276px, 27.6vw, 437px) * 1.2);
  max-width: 240px;
  background: #fff;
  border: 2px solid var(--br2);
  border-radius: 16px 16px 16px 4px;
  padding: 10px 14px;
  font-size: 12px;
  line-height: 1.6;
  color: var(--tx);
  box-shadow: 0 4px 16px rgba(42,26,8,.15);
  z-index: 99;
  pointer-events: none;
  opacity: 0;
  transform: translateY(6px) scale(0.96);
  transition: opacity .22s ease, transform .22s ease;
  word-break: break-word;
}
#char-bubble.show {
  opacity: 1;
  transform: translateY(0) scale(1);
}
/* 泡泡尾巴朝右下（指向人物） */
#char-bubble::after {
  content: '';
  position: absolute;
  bottom: -10px;
  right: 12px;
  border: 6px solid transparent;
  border-top-color: var(--br2);
}
#char-bubble::before {
  content: '';
  position: absolute;
  bottom: -7px;
  right: 13px;
  border: 5px solid transparent;
  border-top-color: #fff;
  z-index: 1;
}
/* 人物發光效果 */
#char-tray img {
  width: 100%;
  display: block;
  pointer-events: auto;
  cursor: pointer;
  filter: drop-shadow(-3px 0 12px rgba(0,0,0,.18));
  transition: transform .2s ease, filter .3s ease;
}

#char-tray:hover img {
  transform: translateY(-6px) scale(1.01);
}


/* 合夥人選擇卡頭像 */
.sel-card-avatar {
  width:80px;height:80px;border-radius:50%;
  object-fit:cover;object-position:top center;
  margin-bottom:6px;flex-shrink:0;
}

<script>
// ══════════════════════════════════════
// 音效系統（Web Audio API）
// ══════════════════════════════════════
const SFX=(()=>{
  let ctx=null;
  function getCtx(){ if(!ctx) ctx=new(window.AudioContext||window.webkitAudioContext)(); return ctx; }
  // 五聲音階（C 大調）：C, D, E, G, A — 避免小二度/大七度等刺耳音程
  const PENTATONIC = [0, 2, 4, 7, 9];
  // 音高偏移：以「本回合投入次數」為基底，再疊加「本投入內第幾步」
  // → 同一次投入內每經過一格音調往上爬，跨投入也會繼續升（直到 36 半音上限）
  function pitchOffset(extraStep){
    const turnN = (typeof G!=='undefined' && G && G._turnPitchOffset) || 0;
    const n = turnN + (extraStep||0);
    const octave = Math.floor(n / PENTATONIC.length);
    const idx = n % PENTATONIC.length;
    return Math.min(36, octave * 12 + PENTATONIC[idx]);
  }
  // 疊加重音：每多一個 overlay 加一層 sub-bass thump（頻率更低、音量更大）
  function addOverlayThump(c, overlayCount, dur){
    const ov = overlayCount||0;
    if(ov<=0) return;
    const tOsc = c.createOscillator();
    const tGain = c.createGain();
    tOsc.type='sine';
    const baseFreq = Math.max(55, 130 - ov*15); // overlay 越多，基頻越低（最低 55 Hz）
    tOsc.frequency.setValueAtTime(baseFreq*1.7, c.currentTime);
    tOsc.frequency.exponentialRampToValueAtTime(baseFreq, c.currentTime+dur*0.85);
    const thumpGain = Math.min(0.34, 0.10 + ov*0.07);
    tGain.gain.setValueAtTime(thumpGain, c.currentTime);
    tGain.gain.exponentialRampToValueAtTime(0.001, c.currentTime+dur);
    tOsc.connect(tGain); tGain.connect(c.destination);
    tOsc.start(c.currentTime); tOsc.stop(c.currentTime+dur);
  }
  // 設施通過音效：step=本投入第幾步、overlayCount=同格疊加數量
  function hit(step, overlayCount){
    try{
      const c=getCtx(); if(c.state==='suspended') c.resume();
      const freq=261.63*Math.pow(2,pitchOffset(step)/12); // C4 + 五聲音階位移
      const osc=c.createOscillator();
      const gain=c.createGain();
      osc.type='triangle';
      osc.frequency.value=freq;
      gain.gain.setValueAtTime(0.12,c.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.15);
      osc.connect(gain); gain.connect(c.destination);
      osc.start(c.currentTime); osc.stop(c.currentTime+0.15);
      addOverlayThump(c, overlayCount, 0.22);

        osc.connect(gain); gain.connect(c.destination);
        osc.start(t); osc.stop(t+0.10);
      });
    }catch(e){}
  }
  // 疊加切換：極輕「卡」音（square 30ms）
  function swap(){
    try{
      const c=getCtx(); if(c.state==='suspended') c.resume();
      const osc=c.createOscillator(); const gain=c.createGain();
      osc.type='square'; osc.frequency.value=440;
      gain.gain.setValueAtTime(0.025,c.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.04);
      osc.connect(gain); gain.connect(c.destination);
      osc.start(c.currentTime); osc.stop(c.currentTime+0.04);
    }catch(e){}
  }
  // 地圖擴張：低頻隆隆（sawtooth 40→100Hz）+ 高頻喇叭
  function expand(){
    try{
      const c=getCtx(); if(c.state==='suspended') c.resume();
      // 低頻 rumble
      const osc=c.createOscillator(); const gain=c.createGain();
      osc.type='sawtooth';
      osc.frequency.setValueAtTime(40,c.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100,c.currentTime+0.5);
      gain.gain.setValueAtTime(0.10,c.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.6);
      osc.connect(gain); gain.connect(c.destination);
      osc.start(c.currentTime); osc.stop(c.currentTime+0.6);
      // 高頻喇叭 G4 → C5 → E5
      [392, 523.25, 659.25].forEach((freq,i)=>{
        const o=c.createOscillator(); const g=c.createGain();
        o.type='triangle'; o.frequency.value=freq;
        const t=c.currentTime+i*0.10;
        g.gain.setValueAtTime(0.07,t);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.40);
        o.connect(g); g.connect(c.destination);
        o.start(t); o.stop(t+0.40);
      });
    }catch(e){}
  }
  // 嫉妒匹配 +8：短促上揚金光音（C6→G6 sweep）
  function envyMatch(){
    try{
      const c=getCtx(); if(c.state==='suspended') c.resume();
      const osc=c.createOscillator(); const gain=c.createGain();
      osc.type='sine';
      osc.frequency.setValueAtTime(1046.50,c.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1567.98,c.currentTime+0.15);
      gain.gain.setValueAtTime(0.08,c.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.25);
      osc.connect(gain); gain.connect(c.destination);
      osc.start(c.currentTime); osc.stop(c.currentTime+0.25);
    }catch(e){}
  }
  // 物流方向旋轉：短 swish（白噪 50ms 帶 high-pass 感）
  function rotateDir(){
    try{
      const c=getCtx(); if(c.state==='suspended') c.resume();
      const buflen=c.sampleRate*0.06;
      const buf=c.createBuffer(1,buflen,c.sampleRate);
      const data=buf.getChannelData(0);
      for(let i=0;i<buflen;i++) data[i]=(Math.random()*2-1)*(1-i/buflen)*0.7;
      const src=c.createBufferSource();
      const gain=c.createGain();
      src.buffer=buf;
      gain.gain.setValueAtTime(0.05,c.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.06);
      src.connect(gain); gain.connect(c.destination);
      src.start(c.currentTime); src.stop(c.currentTime+0.06);
    }catch(e){}
  }
  return {hit,convert,settle,place,placeOverlay,openShop,gainCard,recruit,destroy,
    winFanfare,loseToll,roundStart,turnTick,eventTrigger,goalReached,countComplete,
    partnerProc,upgrade,talentGain,talentLose,invalid,cardChange,
    select,cardHover,
    rareDrop,compoundLink,swap,expand,envyMatch,rotateDir};
})();

// ══════════════════════════════════════
// 背景音樂（外部 mp3，依場景與輪數切換）
// title → bgm_4 / 1-4 輪 → bgm_1 / 5-8 輪 → bgm_2 / 9+ 輪 → bgm_3
// ══════════════════════════════════════
const BGM=(()=>{
  let active=false;
  let audio=null;
  let currentIdx=0;
  let _scene='title'; // 'title' | 'gameplay'，由 SM.goto 同步
  const VOLUME=0.18;

  function pickIdxForRound(round){
    const r=round||1;
    if(r<=4) return 1;
    if(r<=8) return 2;
    return 3;
  }
  function pickIdx(){
    if(_scene==='title') return 4;
    return pickIdxForRound(typeof G!=='undefined'&&G?G.round:1);
  }
  function ensureAudio(idx){
    if(audio&&currentIdx===idx) return audio;
    if(audio){ try{ audio.pause(); }catch(e){} audio=null; }
    audio=new Audio(`bgm/bgm_${idx}.mp3`);
    audio.loop=true;
    audio.volume=VOLUME;
    currentIdx=idx;
    return audio;
  }
  function _switchToCurrentIdx(){
    const idx=pickIdx();
    if(idx===currentIdx&&audio) return;
    ensureAudio(idx);
    if(active){
      const p=audio.play();
      if(p&&p.catch) p.catch(()=>{});
    }
  }
  function start(){
    if(active) return;
    try{
      const idx=pickIdx();
      const a=ensureAudio(idx);
      const p=a.play();
      if(p&&p.catch) p.catch(()=>{ active=false; });
      active=true;
    }catch(e){ active=false; }
  }
  function stop(){
    if(!active) return;
    active=false;
    if(audio){ try{ audio.pause(); }catch(e){} }
  }
  function toggle(){
    if(active) stop(); else start();
    try{ localStorage.setItem('vt_bgm_on', active?'1':'0'); }catch(e){}
    return active;
  }
  function isActive(){ return active; }
  function preferOn(){
    // 預設開啟：未設定（首次進站 / 已清除 localStorage）回傳 true，僅當顯式設為 '0' 才關閉
    try{
      const v=localStorage.getItem('vt_bgm_on');
      return v===null?true:v==='1';
    }catch(e){ return true; }
  }
  // 切換到當前輪數對應的 BGM；非 active 時不自動啟動
  function syncToRound(){
    if(!active) return;
    _switchToCurrentIdx();
  }
  // 切換場景（'title' / 'gameplay'）。active 時即時切歌，非 active 時僅記錄 scene
  function setScene(name){
    if(_scene===name) return;
    _scene=name;
    _switchToCurrentIdx();
  }
  return { start, stop, toggle, isActive, preferOn, syncToRound, setScene };
})();
function toggleBgm(){
  const on=BGM.toggle();
  const btn=document.getElementById('btn-bgm');
  if(btn){ btn.textContent=on?'🎵':'🔇'; btn.title=on?'關閉背景音樂':'開啟背景音樂'; }
}

// 查詢是否持有某合約（用於 runtime 渲染與點擊處理檢查永久效果）
function hasActiveContract(contractId){
  if(!G || !Array.isArray(G.activeContracts)) return false;
  return G.activeContracts.some(ac=>ac.id===contractId);
}
// 暗叫合約：配對消除點擊處理 — 兩次點擊同 id 設施則消除並 +30 收益
function _handleHiddenCallPair(r, c){
  const bId = G.grid[r] && G.grid[r][c];
  if(!bId || bId === 'ruin') return false;
  // 大型設施 part 視為其錨點（不可消滅）— 防玩家以雙擊 part 繞過 indestructible 並 destroy 整棟
  if(bId === 'dept_store_part' || bId === 'ancient_factory_part'){
    addLog('🃏 暗叫：大型設施部位無法配對消除','b');
    return true;
  }
  // 不可消滅的設施（古代機械工廠 / 世界奇觀 / 巨人村 / 災害控管局 / 百貨公司 anchor）跳過
  if(BLDG[bId] && BLDG[bId].indestructible){
    addLog(`🃏 暗叫：${BLDG[bId].emoji}${BLDG[bId].name} 不可消滅，無法配對`,'b');
    return true; // 攔截但不處理
  }
  const sel = G._hiddenCallPickedCell;
  if(!sel){
    G._hiddenCallPickedCell = { r, c, bId };
    addLog(`🃏 暗叫：選中 ${BLDG[bId].emoji}${BLDG[bId].name} (${r+1},${c+1})，再點同類設施配對消除`,'w');
    if(typeof SFX!=='undefined' && SFX.select) SFX.select();
    render();
    return true;
  }
  // 點同一格 → 取消
  if(sel.r === r && sel.c === c){
    G._hiddenCallPickedCell = null;
    addLog('🃏 暗叫：取消配對選擇','w');
    render();
    return true;
  }
  // 不同 id → 改選
  if(sel.bId !== bId){
    G._hiddenCallPickedCell = { r, c, bId };
    addLog(`🃏 暗叫：改選 ${BLDG[bId].emoji}${BLDG[bId].name} (${r+1},${c+1})`,'w');
    if(typeof SFX!=='undefined' && SFX.select) SFX.select();
    render();
    return true;
  }
  // 配對成功 → 消除兩格 + 30 收益
  const cellEl = (typeof cellQ==='function') ? cellQ(r, c) : null;
  destroyFacility(sel.r, sel.c);
  destroyFacility(r, c);
  G.profit += 30;
  addLog(`🃏 暗叫：配對 ${BLDG[bId].name}！+30 收益`,'g');
  if(typeof profitFlyFrom === 'function' && cellEl) profitFlyFrom(cellEl, 30);
  if(typeof SFX!=='undefined' && SFX.rareDrop) SFX.rareDrop();
  G._hiddenCallPickedCell = null;
  render();
  // 若達標即觸發過關（與既有路徑一致）
  if(G.profit>=G.goal){
    if(!G._goalReachedTurn){ G._goalReachedTurn=G.turn; if(typeof showGoalReachedFx==='function') showGoalReachedFx(); }
    if(!G._winPending){
      G._winPending=true;
      const turnsUsed=G._goalReachedTurn||G.turn;
      setTimeout(()=>performWinSettlement(turnsUsed),600);
    }
  }
  return true;
}

// ── 框架輔助 ──
function runContractHook(name, ...args){
  if(!G || !Array.isArray(G.activeContracts)) return;
  G.activeContracts.forEach(ac=>{
    const def = CONTRACTS[ac.id];
    if(def && def.hooks && def.hooks[name]){
      try { def.hooks[name].call(def, G, ac, ...args); }
      catch(e){ console.warn('contract.'+name+' 失敗:', ac.id, e); }
    }
  });
}
// 觸發輪：第 2/4/6 輪固定，第 6 輪後每 2 輪一次（8/10/12...）
function isContractTriggerRound(round){
  if(typeof round!=='number') return false;
  if(CONTRACT_TRIGGER_ROUNDS.indexOf(round) >= 0) return true;
  return round > 6 && round % 2 === 0;
}
function pickContractCandidates(round){
  let pool;
  if(round <= 6){
    pool = (CONTRACT_POOLS['r' + round] || []).slice();
  } else {
    // 第 6 輪後：合併所有池（r2 + r4 + r6）供再抽
    pool = [].concat(
      CONTRACT_POOLS.r2 || [],
      CONTRACT_POOLS.r4 || [],
      CONTRACT_POOLS.r6 || []
    );
  }
  if(pool.length === 0) return [];
  const ownedIds = new Set((G.activeContracts||[]).map(c=>c.id));
  const available = pool.filter(id=>!ownedIds.has(id) && CONTRACTS[id]);
  if(available.length <= 2) return available;
  // Fisher-Yates 部分洗牌取前 2
  for(let i=0; i<2; i++){
    const j = i + Math.floor(Math.random()*(available.length-i));
    const tmp = available[i]; available[i] = available[j]; available[j] = tmp;
  }
  return available.slice(0, 2);
}
function acceptContract(contractId){
  const def = CONTRACTS[contractId];
  if(!def){ console.warn('未知合約:', contractId); return; }
  const acceptedRound = G.round;
  const deadlineRound = def.permanent ? null : (acceptedRound + (def.durationOffset||0));
  const ac = {
    id: contractId,
    acceptedRound,
    deadlineRound,
    permanent: !!def.permanent,
    failed: false,
    state: {}
  };
  G.activeContracts = G.activeContracts || [];
  G.activeContracts.push(ac);
  G.contractHistory = G.contractHistory || [];
  G.contractHistory.push({ id: contractId, acceptedRound });
  if(def.onAccept){
    try { def.onAccept.call(def, G, ac); }
    catch(e){ console.warn('contract.onAccept 失敗:', contractId, e); }
  }
  addLog(`📜 接受合約：${def.name}`, 'g');
  if(typeof renderContractBtn === 'function') renderContractBtn();
  if(typeof render === 'function') render();
  // 處理下一個排隊中的 chooser（多輪過關連跳會堆積多份）
  _contractChooserActive = false;
  setTimeout(_kickContractChooser, 400);
}
// 合約 chooser 隊列：多輪過關連跳時，途中 trigger rounds 也要補發
let _contractChooserQueue = [];
let _contractChooserActive = false;
function queueContractChooser(round){
  if(typeof round !== 'number') return;
  if(_contractChooserQueue.indexOf(round) >= 0) return; // 防重複入列
  _contractChooserQueue.push(round);
}
function _kickContractChooser(){
  if(_contractChooserActive) return;
  if(_contractChooserQueue.length === 0) return;
  const round = _contractChooserQueue.shift();
  _contractChooserActive = true;
  triggerContractChooser(round);
}
function checkContractDeadlines(roundJustEnded){
  if(!G.activeContracts || G.activeContracts.length === 0) return;
  for(let i = G.activeContracts.length - 1; i >= 0; i--){
    const ac = G.activeContracts[i];
    if(ac.permanent || ac.failed) continue;
    if(ac.deadlineRound !== roundJustEnded) continue;
    const def = CONTRACTS[ac.id];
    if(!def){ G.activeContracts.splice(i, 1); continue; }
    let result = { done: false };
    if(def.checkProgress){
      try { result = def.checkProgress.call(def, G, ac) || result; }
      catch(e){ console.warn('contract.checkProgress 失敗:', ac.id, e); }
    }
    if(result.done){
      try { if(def.onComplete) def.onComplete.call(def, G, ac); }
      catch(e){ console.warn('contract.onComplete 失敗:', ac.id, e); }
      addLog(`📜✓ 合約完成：${def.name}`, 'g');
      if(typeof showContractResolveFx === 'function') showContractResolveFx(def, true);
      G.activeContracts.splice(i, 1);
    } else {
      try { if(def.onFail) def.onFail.call(def, G, ac); }
      catch(e){ console.warn('contract.onFail 失敗:', ac.id, e); }
      addLog(`📜✗ 合約違約：${def.name}`, 'b');
      if(typeof showContractResolveFx === 'function') showContractResolveFx(def, false);
      if(def.failConvertsToPermanent){
        ac.failed = true;
        ac.permanent = true;
      } else {
        G.activeContracts.splice(i, 1);
      }
    }
  }
  if(typeof renderContractBtn === 'function') renderContractBtn();
}
function triggerContractChooser(round){
  const candidates = pickContractCandidates(round);
  if(!candidates || candidates.length < 1){
    addLog(`📜 第 ${round} 輪合約池為空`, 'w');
    _contractChooserActive = false;
    setTimeout(_kickContractChooser, 200);
    return;
  }
  if(candidates.length === 1){
    addLog(`📜 第 ${round} 輪合約池只剩 1 張，自動接受：${CONTRACTS[candidates[0]].name}`, 'w');
    acceptContract(candidates[0]); // acceptContract 會 set active=false 並 kick 下一個
    return;
  }
  showContractChooser(round, candidates);
}

// 找出小鎮上「含 X 設施」的格子（base 或 overlay 任一符合 predicate）
function _findContractFacilityCells(predicate){
  const cells = [];
  if(!G||!G.grid) return cells;
  for(let r=0;r<GN();r++) for(let c=0;c<GN();c++){
    const b = G.grid[r][c];
    if(predicate(b) || (typeof getOverlays==='function' && getOverlays(r,c).some(predicate))){
      cells.push([r,c]);
    }
  }
  return cells;
}
// 設施被投入時更新合約計數（base + 所有 overlay）。從 _hit() 內呼叫。
function _trackContractHits(r, c, bId){
  if(!G.contractCounters) return;
  const cc = G.contractCounters;
  const k = `${r},${c}`;
  const ids = [bId];
  if(typeof getOverlays==='function') getOverlays(r,c).forEach(ov=>ids.push(ov));
  ids.forEach(id=>{
    if(_isShopForContract(id)){
      cc.roundShopHits = (cc.roundShopHits||0) + 1;
      if(!cc.roundShopCellsHit) cc.roundShopCellsHit = new Set();
      cc.roundShopCellsHit.add(k);
    }
    if(_isFactoryForContract(id)){
      cc.roundFactoryHits = (cc.roundFactoryHits||0) + 1;
      if(!cc.roundFactoryCellsHit) cc.roundFactoryCellsHit = new Set();
      cc.roundFactoryCellsHit.add(k);
    }
    if(_isMatFactoryForContract(id)){
      cc.roundMatFactoryHits = (cc.roundMatFactoryHits||0) + 1;
      if(!cc.roundMatFactoryCellsHit) cc.roundMatFactoryCellsHit = new Set();
      cc.roundMatFactoryCellsHit.add(k);
    }
  });
}

// 把 desc 開頭（以「。」分隔的首幾句）中的詞條關鍵字包成 span
// 只處理「。」前綴段的單詞（避免誤標後續句子中的一般用字）
function highlightDescTags(desc){
  if(!desc||typeof desc!=='string') return desc||'';
  // 只檢查開頭一段（第一個句號之前的前綴），通常是分號連接的詞條
  const firstDotIdx=desc.indexOf('。');
  if(firstDotIdx<=0) return desc;
  let prefix=desc.slice(0,firstDotIdx);
  const rest=desc.slice(firstDotIdx);
  TAG_KEYWORDS_MAP.forEach(({cn,cls})=>{
    // 使用 split/join 逐次替換，避免已 wrap 過的 span 內容被重複包
    if(prefix.includes(cn)){
      prefix=prefix.split(cn).join(`<span class="tag-chip ${cls}">${cn}</span>`);
    }
  });
  return prefix+rest;
}

// ── 稀有度×輪數 出現權重 ──
// 回傳一個 0~1+ 的權重乘數，低輪數壓制高稀有度，高輪數釋放
// round: 當前輪數
// rarity: 'N'|'R'|'SR'|'SSR'
function rarityWeightByRound(round, rarity){
  // 基礎權重表：每個稀有度在各輪數區間的出現倍率
  // N:   總是可用，但隨輪數遞減（讓位給高稀有度）
  // R:   第1輪起少量出現，第2輪起正常
  // SR:  第1~2輪極低，第3輪起漸增
  // SSR: 第1~3輪極低，第4輪起漸增，第6輪起正常
  if(rarity==='N'){
    // N 權重隨輪數緩慢降低（但永不為 0）
    return Math.max(0.3, 1.0 - (round-1)*0.07);
  }
  if(rarity==='R'){
    if(round<=1) return 0.3;
    if(round<=2) return 0.7;
    return 1.0;
  }
  if(rarity==='SR'){
    if(round<=1) return 0.05;
    if(round<=2) return 0.15;
    if(round<=3) return 0.4;
    if(round<=4) return 0.7;
    return 1.0;
  }
  if(rarity==='SSR'){
    if(round<=2) return 0.02;
    if(round<=3) return 0.05;
    if(round<=4) return 0.15;
    if(round<=5) return 0.35;
    if(round<=6) return 0.6;
    return 1.0;
  }
  return 1.0;
}

const TAG_WEIGHT=0.12; // 每個匹配詞條加 12% 權重

// 計算玩家當前擁有的詞條計數
function getPlayerTagCounts(){
  const tc={};
  const _add=id=>{ if(TAGS[id]) TAGS[id].forEach(t=>tc[t]=(tc[t]||0)+1); };
  // 小鎮設施
  const gn=GN();
  for(let r=0;r<gn;r++) for(let c=0;c<gn;c++){
    const b=G.grid[r]&&G.grid[r][c];
    if(b&&b!=='ruin') _add(b);
  }
  // 手牌
  G.hand.forEach(h=>{
    if(h.compound){ h.parts.forEach(p=>_add(p)); }
    else { for(let i=0;i<h.count;i++) _add(h.id); }
  });
  // 合夥人
  G.partners.forEach(pid=>_add(pid));
  return tc;
}

// 根據詞條 + 稀有度×輪數 計算候選項權重
function tagWeightFor(id, tagCounts){
  const tags=TAGS[id];
  let w=1;
  if(tags) tags.forEach(t=>{ if(tagCounts[t]) w+=tagCounts[t]*TAG_WEIGHT; });
  // 稀有度×輪數權重乘數
  const rarity=getItemRarity(id);
  const round=G&&G.round||1;
  w*=rarityWeightByRound(round,rarity);
  return Math.max(0.01, w); // 永不為 0，保證極小機率仍可出現
}

// 加權隨機抽取 n 個不重複項目
function weightedPickN(pool, n, tagCounts){
  if(!tagCounts) tagCounts=getPlayerTagCounts();
  const items=pool.map(id=>({id, w:tagWeightFor(id, tagCounts)}));
  const result=[];
  while(result.length<n&&items.length>0){
    const total=items.reduce((s,x)=>s+x.w,0);
    let r=Math.random()*total;
    let idx=0;
    for(let i=0;i<items.length;i++){
      r-=items[i].w;
      if(r<=0){idx=i;break;}
    }
    result.push(items[idx].id);
    items.splice(idx,1);
  }
  return result;
}

let _safetyNetRoll=false; // 本回合安全網是否已判定
function checkSafetyNet(){
  // 每回合只判定一次，多處呼叫共用結果
  if(_safetyNetRoll!==false) return _safetyNetRoll;
  const z=G._zeroProfitTurns||0, used=G._safetyNetUsed||0;
  if(z<3||used>=4){ _safetyNetRoll=false; return false; }
  const chance=[1,0.75,0.5,0.25][used]||0;
  _safetyNetRoll=Math.random()<chance;
  if(_safetyNetRoll){ G._safetyNetUsed=used+1; G._zeroProfitTurns=0; }
  return _safetyNetRoll;
}

function findHeatwaveTarget(){
  let target=null, bestVal=0;
  const pathFacs=(G.inv.facPath||[]);
  const hw=G._heatwave||{facProfits:{}};
  eachCell((r,c,b)=>{
    if(!isFacility(b)) return;
    const cumProfit=hw.facProfits[b]||0;
    const turnProfit=G.inv.facProfitMap&&G.inv.facProfitMap[b]||0;
    const inPath=pathFacs.includes(b);
    const score=cumProfit+turnProfit+(inPath?50:0);
    if(score>bestVal){ bestVal=score; target=[r,c]; }
  });
  return target;
}
function checkHeatwave(){
  if(TUT.isBlocking()) return;
  if(!G._heatwave) G._heatwave={facProfits:{}, samePathCount:0, lastPath:''};
  const hw=G._heatwave;
  // 更新設施收益追蹤
  if(G.inv.facProfitMap) Object.entries(G.inv.facProfitMap).forEach(([k,v])=>{ hw.facProfits[k]=(hw.facProfits[k]||0)+v; });
  // 更新路徑歷史（方向+設施序列）——跨輪累計
  const pathKey=(G.inv.sendDir||'')+'|'+(G.inv.facPath||[]).join(',');
  if(pathKey===hw.lastPath) hw.samePathCount++;
  else { hw.samePathCount=1; hw.lastPath=pathKey; }

  // 觸發方式A：收益超過目標100倍
  if(G.profit>=G.goal*100){
    const t=findHeatwaveTarget();
    if(t){ hw.facProfits={}; hw.samePathCount=0; hw.lastPath=''; triggerHeatwave(t); return; }
  }

  // 觸發方式B：條件放寬（跨輪累計路徑 + 1 回合達標）
  const rh=G.roundHistory||[];
  const cond1=rh.length>=3&&rh.slice(-3).every(r=>r.turnsUsed<=1); // 連續 3 輪 1 回合達標
  const cond2=(G.inv.facHit||0)<4;                                  // 經過少於 4 設施
  const cond3=Object.values(hw.facProfits).some(v=>v>G.goal*1.5);   // 有設施累積收益 > 目標 150%
  const cond4=hw.samePathCount>=3;                                   // 連續 3 次相同路徑（跨輪計算）
  if(!(cond1&&cond2&&cond3&&cond4)) return;

  const t=findHeatwaveTarget();
  hw.facProfits={}; hw.samePathCount=0; hw.lastPath='';
  if(t) triggerHeatwave(t);
}

// derived 欄位，不需序列化 — 載入後 recomputeBoosterAura() 會重建
function recomputeBoosterAura(){
  if(!G||!G.grid) return;
  G.boosterAura={};
  const gn=GN();
  // booster 來源 = base 是 adv_booster 或 overlay 包含 adv_booster（複合設施情境）
  for(let br=0;br<gn;br++) for(let bc=0;bc<gn;bc++){
    const isBase=G.grid[br][bc]==='adv_booster';
    const isOv=getOverlays(br,bc).includes('adv_booster');
    if(!isBase&&!isOv) continue;
    [[br-1,bc],[br+1,bc],[br,bc-1],[br,bc+1]].forEach(([ar,ac])=>{
      if(ar<0||ar>=gn||ac<0||ac>=gn) return;
      if(!isFacility(G.grid[ar][ac])) return;
      const k=`${ar},${ac}`;
      G.boosterAura[k]=(G.boosterAura[k]||0)+2;
    });
  }
}

  G.grid=G._gridSnapshot;

  recomputeBoosterAura();
  deleteGridSnapshot();

// ── 格子修正 helper ──
function applyRowColPctMod(axis,idx,val){
  if(!G.cellPctMods) G.cellPctMods={};
  for(let i=0;i<GN();i++){
    const key=axis==='row'?`${idx},${i}`:`${i},${idx}`;
    G.cellPctMods[key]=(G.cellPctMods[key]||0)+val;
  }
  flashModCells(axis,idx,val);
}
function apply2x2PctMod(r,c,val){
  if(!G.cellPctMods) G.cellPctMods={};
  for(let dr=0;dr<2;dr++) for(let dc=0;dc<2;dc++){
    const key=`${r+dr},${c+dc}`;
    G.cellPctMods[key]=(G.cellPctMods[key]||0)+val;
  }
  flash2x2Cells(r,c,val);
}
function flashModCells(axis,idx,val){
  setTimeout(()=>{
    for(let i=0;i<GN();i++){
      const [r,ci]=axis==='row'?[idx,i]:[i,idx];
      const el=cellQ(r,ci);
      if(el){ el.style.outline=`3px solid ${val>0?'var(--green)':'var(--red)'}`;
        setTimeout(()=>el.style.outline='',1200); }
    }
  },100);
}
function flash2x2Cells(r,c,val){
  setTimeout(()=>{
    for(let dr=0;dr<2;dr++) for(let dc=0;dc<2;dc++){
      const el=cellQ(r+dr,c+dc);
      if(el){ el.style.outline=`3px solid ${val>0?'var(--green)':'var(--red)'}`;
        setTimeout(()=>el.style.outline='',1200); }
    }
  },100);
}

}

// 共用：對所有合夥人安全呼叫一個 hook 名（onRoundStart / onTurnStart / onSettle 等）
// 異常時 console.warn 後跳過，不阻斷其他合夥人觸發
function runPartnerHook(name, ...args){
  if(!G||!Array.isArray(G.partners)) return;
  G.partners.forEach(pid=>{
    const p=PARTNERS[pid];
    if(p&&p[name]){
      try{ p[name].call(p, G, ...args); }
      catch(e){ console.warn('partner.'+name+' 失敗:',pid,e); }
    }
  });
}

function startRound(){
  G.cellMods={};
  G.cellPctMods={};
  G._near80Played=false;
  // 合約 per-round 計數器重置
  _resetContractRoundCounters();
  // 暗叫合約：跨輪重置「已選格子」UI 殘留
  G._hiddenCallPickedCell=null;
  // 保留上一輪未觸發的預告事件，每次延遲提前觸發回合
  if(G.nextEvent){
    G._eventDeferred=(G._eventDeferred||0)+1;
    // 每延遲一次，觸發回合提前 1（最早第 1 回合立即觸發）
    G.nextEventTurn=Math.max(1, EVENT_INTERVAL - G._eventDeferred);
    G.nextEventData=precomputeEventData(G.nextEvent);
  } else {
    G._eventDeferred=0;
    pickNextEvent();
  }
  pickActionOptions();
  // 大熱波：每輪重置設施收益追蹤（samePathCount 跨輪保留以偵測固定路徑）
  if(G._heatwave){ G._heatwave.facProfits={}; }
  // partner round start effects
  runPartnerHook('onRoundStart');
  // 合約 onRoundStart hook（永久合約可在此施加每輪 buff/debuff）
  runContractHook('onRoundStart');
  // 稅務局升級邏輯已移至 startTurn()，每回合觸發
  addLog(`══ 第 ${G.round} 輪　目標收益：${G.goal} ══`,'w');
  // 第 2 輪起顯示新輪 banner（第 1 輪由 SM/教學流程處理開場）
  if(G.round>1) showRoundBanner(G.round);
  // 第一回合的 onTurnStart/場風/UI 統一由 startTurn() 處理（避免重複觸發）
  startTurn();
  // 合約系統：第 2/4/6 輪、以及第 6 輪後每 2 輪起始必選 1 張合約
  // （含 performWinSettlement 補發的跳過輪次）
  if(isContractTriggerRound(G.round)){
    queueContractChooser(G.round);
  }
  // 統一在 banner 顯示 800ms 後啟動隊列（即使本輪非觸發輪，仍要消化跳過輪次的 pending）
  setTimeout(_kickContractChooser, 800);
  // BGM 依輪數切歌（1-4 → bgm_1, 5-8 → bgm_2, 9+ → bgm_3）
  if(typeof BGM!=='undefined') BGM.syncToRound();
}
// 新輪 banner：「第 N 輪」大字浮現 1.6 秒，自動移除

function pathSum(path, weightFn){
  if(!path) return 0;
  let s=0; for(let i=0;i<path.length;i++) s+=weightFn(path[i]);
  return s;
}
function countFactoryHits(path){ return pathSum(path, _factoryWeight); }

function countMatFactoryHits(path){ return pathSum(path, _matFactoryWeight); }

  cells.forEach(([r,c])=>{
    const k=`${r},${c}`;
