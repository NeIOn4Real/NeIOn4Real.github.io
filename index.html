      <div class="dev-row" title="難度倍率 +0.2（目標更高）" onclick="G.difficultyMult=Math.min(3.0,G.difficultyMult+0.2);addLog('DEV：難度倍率 → '+G.difficultyMult.toFixed(2));DEV.render();"><span class="de">📈</span><span class="dn">難度 +0.2 (${(G.difficultyMult+0.2).toFixed(2)})</span></div>
      <div class="dev-row" title="難度倍率 -0.2（目標更低）" onclick="G.difficultyMult=Math.max(0.5,G.difficultyMult-0.2);addLog('DEV：難度倍率 → '+G.difficultyMult.toFixed(2));DEV.render();"><span class="de">📉</span><span class="dn">難度 -0.2 (${(G.difficultyMult-0.2).toFixed(2)})</span></div>
      <div class="dev-row" title="難度倍率重置為 1.0" onclick="G.difficultyMult=1.0;addLog('DEV：難度倍率重置為 1.0');DEV.render();"><span class="de">🔄</span><span class="dn">難度重置 1.0</span></div>
      <div class="dev-row" title="直接跳到下一輪（保留設施和合夥人）" onclick="G.round++;G.turn=1;G.profit=0;G.goal=Math.round(G.goal*1.4*G.difficultyMult+8);G.buff={};G.cellMods={};G.cellPctMods={};addLog('DEV：跳到第'+G.round+'輪，目標 '+G.goal);render();DEV.render();"><span class="de">⏭</span><span class="dn">跳到下一輪</span></div>
      <div class="dev-row" title="跳到第 5 輪（SR 大量出現）" onclick="G.round=5;G.turn=1;G.profit=0;G.goal=133;G.buff={};G.cellMods={};G.cellPctMods={};addLog('DEV：跳到第5輪，目標 133');render();DEV.render();"><span class="de">5️⃣</span><span class="dn">跳到第 5 輪（SR 期）</span></div>
      <div class="dev-row" title="跳到第 8 輪（SSR 全開）" onclick="G.round=8;G.turn=1;G.profit=0;G.goal=400;G.buff={};G.cellMods={};G.cellPctMods={};addLog('DEV：跳到第8輪，目標 400');render();DEV.render();"><span class="de">8️⃣</span><span class="dn">跳到第 8 輪（後期）</span></div>
    </div>`;

    // ── 稀有度測試 ──
    h+=`<div class="dev-sec"><div class="dev-sec-title">🎰 稀有度測試</div>
      <div class="dev-row" title="模擬 10 次設施抽取，顯示稀有度分布" onclick="DEV.testRarityDraw('bldg');"><span class="de">🎲</span><span class="dn">模擬設施抽取×10</span></div>
      <div class="dev-row" title="模擬 10 次合夥人抽取，顯示稀有度分布" onclick="DEV.testRarityDraw('partner');"><span class="de">🎲</span><span class="dn">模擬合夥人抽取×10</span></div>
    </div>`;

    // ── 工業化系統 ──
    const megaCount=_megaFacilities.length;
    h+=`<div class="dev-sec"><div class="dev-sec-title">🏭 工業化</div>
      <div class="dev-row" title="將當前小鎮快照為巨型設施（投入 💰1 模擬路徑）" onclick="MEGA.startIndustrialize();"><span class="de">🏭</span><span class="dn">工業化（建立巨型設施）</span></div>
      <div class="dev-row" title="開啟巨型設施地圖（測試模式）" onclick="MEGA.open();"><span class="de">🗺️</span><span class="dn">巨型設施地圖（${megaCount}個）</span></div>
      <div class="dev-row" title="清除所有已建立的巨型設施" onclick="if(confirm('確定清除所有巨型設施？')){_megaFacilities=[];saveMegaFacilities();DEV.render();}"><span class="de">🗑️</span><span class="dn">清除所有巨型設施</span></div>
    </div>`;

    // ── 戰鬥系統 ──
    h+=`<div class="dev-sec"><div class="dev-sec-title">⚔ 戰鬥</div>
      <div class="dev-row" title="進入戰鬥場景（使用小鎮設施組成牌組）" onclick="BATTLE.start();"><span class="de">⚔</span><span class="dn">開始戰鬥</span></div>
    </div>`;

    // ── 合約系統（Phase A 框架測試） ──
    const _activeContracts=(G.activeContracts||[]);
    const _contractList=_activeContracts.length===0
      ? '<span style="color:#aaa;font-size:9px;">無持有合約</span>'
      : _activeContracts.map((ac,i)=>{
          const def=CONTRACTS[ac.id];
          const name=def?def.name:ac.id;
          const status=ac.failed?'⚠ 違約':(ac.permanent?'【永久】':`截止 R${ac.deadlineRound}`);
          return `<div style="font-size:9px;color:#ddd;">${i+1}. ${name} <span style="color:#888;">(${status})</span></div>`;
        }).join('');
    h+=`<div class="dev-sec"><div class="dev-sec-title">📜 合約（${(G.activeContracts||[]).length} 已接受）</div>
      <div style="margin:4px 0;padding:4px 6px;background:rgba(0,0,0,.2);border-radius:4px;">${_contractList}</div>`;
    // 池篩選 + 點擊獲得指定合約
    h+=`<div style="display:flex;gap:4px;padding:4px 8px;margin:4px 0;flex-wrap:wrap;">
      <span style="color:rgba(255,255,255,.5);font-size:9px;margin-right:4px;">池:</span>
      <button onclick="DEV._contractFilter=null;DEV.render();" style="font-size:9px;padding:2px 6px;border-radius:4px;border:1px solid rgba(255,255,255,.2);background:${!DEV._contractFilter?'var(--acc)':'transparent'};color:#fff;cursor:pointer;">全部</button>
      <button onclick="DEV._contractFilter='r2';DEV.render();" style="font-size:9px;padding:2px 6px;border-radius:4px;border:1px solid rgba(255,255,255,.2);background:transparent;color:#5bc;cursor:pointer;">R2</button>
      <button onclick="DEV._contractFilter='r4';DEV.render();" style="font-size:9px;padding:2px 6px;border-radius:4px;border:1px solid rgba(255,255,255,.2);background:transparent;color:#c8a;cursor:pointer;">R4</button>
      <button onclick="DEV._contractFilter='r6';DEV.render();" style="font-size:9px;padding:2px 6px;border-radius:4px;border:1px solid rgba(255,255,255,.2);background:transparent;color:#fc5;cursor:pointer;">R6</button>
    </div>`;
    h+=`<div style="display:flex;flex-wrap:wrap;">`;
    const _cf=DEV._contractFilter;
    for(const[cid,cdef] of Object.entries(CONTRACTS)){
      if(_cf&&cdef.pool!==_cf) continue;
      const owned=hasActiveContract(cid);
      const poolColor={r2:'#5bc',r4:'#c8a',r6:'#fc5'}[cdef.pool]||'#aaa';
      const tipParts=[`[${(cdef.pool||'').toUpperCase()}]${cdef.permanent?'（永久）':(cdef.durationOffset!==undefined?`（持續 ${cdef.durationOffset+1} 輪）`:'')}`];
      if(cdef.immediateText) tipParts.push('立即：'+cdef.immediateText);
      if(cdef.guaranteeText) tipParts.push('擔保：'+cdef.guaranteeText);
      if(cdef.compensationText) tipParts.push((cdef.permanent?'永久效果':'賠償')+'：'+cdef.compensationText);
      const tipText=tipParts.join('\n').replace(/"/g,'&quot;');
      h+=`<div class="dev-card" style="${owned?'opacity:.35;pointer-events:none;border-color:rgba(42,122,58,.5);':''}"
        onclick="if(!hasActiveContract('${cid}')){acceptContract('${cid}');DEV.render();}" title="${tipText}">
        <div class="de">${cdef.emoji||'📜'}</div><div class="dn" style="color:${poolColor}">${cdef.name}</div></div>`;
    }
    h+=`</div>`;
    h+=`<div class="dev-row" title="強制觸發第 2 輪合約選擇（即使 G.round 不是 2）" onclick="triggerContractChooser(2);"><span class="de">📜</span><span class="dn">觸發第 2 輪 chooser</span></div>
      <div class="dev-row" title="強制觸發第 4 輪合約選擇" onclick="triggerContractChooser(4);"><span class="de">📜</span><span class="dn">觸發第 4 輪 chooser</span></div>
      <div class="dev-row" title="強制觸發第 6 輪合約選擇" onclick="triggerContractChooser(6);"><span class="de">📜</span><span class="dn">觸發第 6 輪 chooser</span></div>
      <div class="dev-row" title="強制觸發第 8 輪 chooser（合併池）" onclick="triggerContractChooser(8);"><span class="de">📜</span><span class="dn">觸發第 8 輪 chooser（合併池）</span></div>
      <div class="dev-row" title="強制以「完成」結算所有非永久合約" onclick="DEV.forceContractResolve(true);"><span class="de">✅</span><span class="dn">強制完成所有合約</span></div>
      <div class="dev-row" title="強制以「失敗」結算所有非永久合約" onclick="DEV.forceContractResolve(false);"><span class="de">❌</span><span class="dn">強制失敗所有合約</span></div>
      <div class="dev-row" title="清空所有合約（含永久 debuff，僅 dev 用）" onclick="G.activeContracts=[];G.contractState={};renderContractBtn();render();DEV.render();"><span class="de">🧹</span><span class="dn">清空所有合約</span></div>
      <div class="dev-row" title="開啟合約瀏覽面板" onclick="openContractPanel();"><span class="de">📖</span><span class="dn">開合約面板</span></div>
    </div>`;

    panel.innerHTML=h;
  },
  addRandomCompound(){
    const pool=Object.keys(BLDG).filter(id=>!_isCompoundExcluded(id));
    if(pool.length<2){ addLog('⚠ 可用設施不足','b'); return; }
    const a=pool[Math.floor(Math.random()*pool.length)];
    let b=a; while(b===a) b=pool[Math.floor(Math.random()*pool.length)];
    const dir=COMPOUND_DIRS[Math.floor(Math.random()*COMPOUND_DIRS.length)];
    G.hand.push({
      id:`compound_${++_compoundSeq}`,
      compound:true,
      parts:[a,b],
      dr:dir.dr, dc:dir.dc, dirLabel:dir.label,
      count:1
    });
    addLog(`🔗 DEV：複合設施 ${BLDG[a].emoji}${BLDG[a].name} ${dir.label} ${BLDG[b].emoji}${BLDG[b].name}`,'w');
    renderHand(); renderFanHand();
  },
  clearGrid(){
    const gn=GN();
    for(let r=0;r<gn;r++) for(let c=0;c<gn;c++) G.grid[r][c]=null;
    G.bldgUpgrades={};
    if(G.leyaPctMods) G.leyaPctMods={};
    G.cellMods={};
    G.bombTimers={};
    G.ruinCells=new Set();
    G.deptStoreAnchors={};
    G.deptStoreParts={};
    addLog('🗑️ DEV：已清除小鎮所有設施（含廢墟）','b');
    render();
  },
  // ── 選定清除格子 ──
  _selectClearCells:null,
  startSelectClear(){
    if(DEV._selectClearCells){addLog('⚠ 已在選取模式中','b');return;}
    DEV._selectClearCells=new Set();
    addLog('🎯 DEV：點擊格子選取要清除的設施，再點一次取消選取','w');
    // 顯示確認/取消橫幅
    const bar=document.createElement('div');
    bar.id='dev-select-clear-bar';
    bar.style.cssText='position:fixed;bottom:220px;left:50%;transform:translateX(-50%);z-index:9500;'+
      'display:flex;gap:8px;padding:10px 18px;border-radius:12px;'+
      'background:rgba(20,12,4,.92);box-shadow:0 4px 20px rgba(0,0,0,.4);';
    bar.innerHTML=`
      <span style="color:#ffd080;font-size:12px;font-weight:700;margin-right:8px;" id="dev-sc-count">已選：0</span>
      <button onclick="DEV.confirmSelectClear()" style="padding:6px 16px;border-radius:8px;border:none;background:var(--acc);color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;">✅ 確認清除</button>
      <button onclick="DEV.cancelSelectClear()" style="padding:6px 16px;border-radius:8px;border:1px solid rgba(255,255,255,.3);background:transparent;color:#eee;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;">✕ 取消</button>`;
    document.body.appendChild(bar);
    render();
  },
  toggleSelectCell(r,c){
    if(!DEV._selectClearCells) return;
    const key=`${r},${c}`;
    if(DEV._selectClearCells.has(key)) DEV._selectClearCells.delete(key);
    else DEV._selectClearCells.add(key);
    // 更新計數
    const cnt=document.getElementById('dev-sc-count');
    if(cnt) cnt.textContent=`已選：${DEV._selectClearCells.size}`;
    // 更新格子高亮
    const cellEl=cellQ(r,c);
    if(cellEl) cellEl.classList.toggle('dev-select-clear',DEV._selectClearCells.has(key));
  },
  confirmSelectClear(){
    if(!DEV._selectClearCells) return;
    const cells=[...DEV._selectClearCells];
    cells.forEach(key=>{
      const [r,c]=key.split(',').map(Number);
      const bId=G.grid[r][c];
      if(!bId) return;
      // 百貨公司：整體清除
      if(bId==='dept_store'){
        for(let dr=0;dr<2;dr++) for(let dc=0;dc<2;dc++){
          G.grid[r+dr][c+dc]=null;
          clearKeyedData(`${r+dr},${c+dc}`);
        }
      } else if(bId==='dept_store_part'){
        // 找到錨點整體清除
        const anchor=G.deptStoreParts[key];
        if(anchor){
          const [ar,ac]=anchor.split(',').map(Number);
          for(let dr=0;dr<2;dr++) for(let dc=0;dc<2;dc++){
            G.grid[ar+dr][ac+dc]=null;
            clearKeyedData(`${ar+dr},${ac+dc}`);
          }
        } else { G.grid[r][c]=null; }
      } else {
        G.grid[r][c]=null;
        clearKeyedData(key);
      }
      if(G.ruinCells) G.ruinCells.delete(key);
    });
    rebuildDeptStore();
    addLog(`🎯 DEV：已清除 ${cells.length} 個格子`,'b');
    DEV.cancelSelectClear();
    render();
  },
  cancelSelectClear(){
    DEV._selectClearCells=null;
    document.getElementById('dev-select-clear-bar')?.remove();
    document.querySelectorAll('.dev-select-clear').forEach(c=>c.classList.remove('dev-select-clear'));
    render();
  },
  _bldgFilter:null,
  _partnerFilter:null,
  testRarityDraw(type){
    const tc=getPlayerTagCounts();
    let pool;
    if(type==='bldg'){
      pool=Object.keys(BLDG).filter(isPoolableBldg);
    } else {
      pool=Object.keys(PARTNERS).filter(pid=>!hasPartner(pid));
    }
    const picks=weightedPickN(pool,10,tc);
    const counts={N:0,R:0,SR:0,SSR:0};
    const names=[];
    picks.forEach(id=>{
      const r=type==='bldg'?getBldgRarity(id):getPartnerRarity(id);
      counts[r]++;
      const obj=type==='bldg'?BLDG[id]:PARTNERS[id];
      names.push(`[${r}]${obj.emoji}${obj.name}`);
    });
    addLog(`🎰 DEV 稀有度抽取（第${G.round}輪 ${type}）：N=${counts.N} R=${counts.R} SR=${counts.SR} SSR=${counts.SSR}`,'w');
    addLog(`   ${names.join('、')}`,'w');
  },
  // 合約系統：強制以指定結果結算所有非永久且未失敗的合約
  forceContractResolve(success){
    if(!G.activeContracts||G.activeContracts.length===0){
      addLog('📜 DEV：目前無合約可結算','w');
      return;
    }
    for(let i=G.activeContracts.length-1;i>=0;i--){
      const ac=G.activeContracts[i];
      if(ac.permanent||ac.failed) continue;
      const def=CONTRACTS[ac.id];
      if(!def){ G.activeContracts.splice(i,1); continue; }
      try{
        if(success){
          if(def.onComplete) def.onComplete.call(def,G,ac);
          addLog(`📜✓ DEV 強制完成：${def.name}`,'g');
          G.activeContracts.splice(i,1);
        } else {
          if(def.onFail) def.onFail.call(def,G,ac);
          addLog(`📜✗ DEV 強制失敗：${def.name}`,'b');
          if(def.failConvertsToPermanent){ ac.failed=true; ac.permanent=true; }
          else G.activeContracts.splice(i,1);
        }
      }catch(e){ console.warn('DEV.forceContractResolve 異常:',ac.id,e); }
    }
    renderContractBtn();
    render();
    DEV.render();
  }
};

// 標題點擊
document.getElementById('logo').addEventListener('click',()=>DEV.push('L'));

G=newGame();

// BGM 偏好恢復：瀏覽器 autoplay policy 要求 user gesture，等首次點擊再啟動
(function bgmAutoStart(){
  const btn=document.getElementById('btn-bgm');
  if(!BGM.preferOn()){
    // 用戶顯式關閉過 → 同步按鈕視覺成 🔇
    if(btn){ btn.textContent='🔇'; btn.title='開啟背景音樂'; }
    return;
  }
  if(btn){ btn.textContent='🎵'; btn.title='關閉背景音樂'; }
  const onFirstGesture=()=>{
    if(!BGM.isActive()) BGM.start();
    document.removeEventListener('click',onFirstGesture,true);
    document.removeEventListener('keydown',onFirstGesture,true);
    document.removeEventListener('touchstart',onFirstGesture,true);
  };
  document.addEventListener('click',onFirstGesture,true);
  document.addEventListener('keydown',onFirstGesture,true);
  document.addEventListener('touchstart',onFirstGesture,true);
})();
</script>
