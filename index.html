function isCompoundHand(h){ return h&&h.compound===true; }
function getCompoundSecondCell(r,c,h){ return [r+h.dr, c+h.dc]; }
function canPlaceCompound(r,c,h){
  const gn=GN();
  const [r2,c2]=getCompoundSecondCell(r,c,h);
  if(r<0||r>=gn||c<0||c>=gn||r2<0||r2>=gn||c2<0||c2>=gn) return false;
  // 同一個複合卡的兩格不能落在同一格（理論上 dr/dc 至少有一非零）
  if(r===r2&&c===c2) return false;
  const part1=h.parts[0], part2=h.parts[1];
  // 兩格各自須能接受對應 part（空格或合夥人允許疊加）
  return _canPlaceCompoundPart(r,c,part1) && _canPlaceCompoundPart(r2,c2,part2);
}
// 非破壞性檢查：(r,c) 是否能接收 partId（不真實放置）
// 規則順序模仿 tryPlaceAtCell：空格 OK；現有設施需走 蕾雅／物流之王／倉儲女王／中央電子網路 等疊加路徑
function _canPlaceCompoundPart(r,c,partId){
  const gn=GN();
  if(r<0||r>=gn||c<0||c>=gn) return false;
  const existing = G.grid[r][c];
  const partDef = BLDG[partId];
  if(!partDef) return false;
  // 空格
  if(!existing){
    if(partDef.ruinOnly) return false; // 廢墟紀念碑類僅限廢墟
    if(partDef.centerOnly && !isCenterCell(r,c)) return false;
    if(partDef.needs2x2) return false; // 大型 2×2 設施無法以複合卡部件放置
    return true;
  }
  // 廢墟：唯有 ruinOnly 部件可放
  if(existing==='ruin'){
    return !!partDef.ruinOnly;
  }
  // 既有設施 → 須以疊加方式放置
  if(partDef.noOverlay) return false;
  const existingDef = BLDG[existing];
  if(existingDef && existingDef.noOverlay) return false;
  // 蕾雅：相同設施 id（base 或既有 overlay 含同名）
  if(hasPartner('leya')){
    const sameId = existing === partId || (typeof getOverlays==='function' && getOverlays(r,c).includes(partId));
    if(sameId) return true;
  }
  // 物流之王 / 倉儲女王
  if(hasPartner('logistics_king') || hasPartner('storage_queen')){
    const ovs = (typeof getOverlays==='function') ? getOverlays(r,c) : [];
    const maxOv = hasPartner('storage_queen') ? 2 : 1;
    const isLogExisting = existingDef && existingDef.special==='redirect';
    const isLogPlacing  = partDef.special==='redirect';
    const facOnLog = isLogExisting && !isLogPlacing && ovs.length < maxOv;
    const logOnFac = !isLogExisting && isLogPlacing && isFacility(existing) && ovs.length === 0;
    if(facOnLog || logOnFac) return true;
  }
  // 中央電子網路：可疊加任何 center tag 設施（但 partId 自己非 center_elec_net）
  if(existing==='center_elec_net' && hasTag(partId,'center') && partId!=='center_elec_net'){
    const ovs = (typeof getOverlays==='function') ? getOverlays(r,c) : [];
    const maxOv = hasPartner('storage_queen') ? 2 : 1;
    if(ovs.length < maxOv) return true;
  }
  return false;
}
// 真實放置複合卡的單個部件（依目前格子狀態走對應路徑）。回傳描述字串供 log 使用。
function _placeCompoundPart(r,c,partId){
  const existing = G.grid[r][c];
  if(!existing){
    if(BLDG[partId] && BLDG[partId].ruinOnly){
      // 空格不允許 ruinOnly（_canPlaceCompoundPart 已擋）— 防呆
      return null;
    }
    G.grid[r][c] = partId;
    return 'placed';
  }
  if(existing==='ruin'){
    if(BLDG[partId] && BLDG[partId].ruinOnly){
      G.grid[r][c] = partId;
      G.ruinCells && G.ruinCells.delete(`${r},${c}`);
      return 'placedOnRuin';
    }
    return null;
  }
  // 既有設施 → 疊加
  // 優先順序：蕾雅 → 物流之王/倉儲女王 → 中央電子網路
  if(hasPartner('leya')){
    const sameId = existing === partId || (typeof getOverlays==='function' && getOverlays(r,c).includes(partId));
    if(sameId){
      const ovs = getOverlays(r,c); ovs.push(partId); setOverlays(r,c,ovs);
      const k = `${r},${c}`;
      G.bldgUpgrades[k] = (G.bldgUpgrades[k]||0) + 2;
      return 'leya';
    }
  }
  if(hasPartner('logistics_king') || hasPartner('storage_queen')){
    const existingDef = BLDG[existing];
    const placingDef = BLDG[partId];
    const ovs = getOverlays(r,c);
    const maxOv = hasPartner('storage_queen') ? 2 : 1;
    const isLogExisting = existingDef && existingDef.special==='redirect';
    const isLogPlacing  = placingDef && placingDef.special==='redirect';
    const facOnLog = isLogExisting && !isLogPlacing && ovs.length < maxOv;
    const logOnFac = !isLogExisting && isLogPlacing && isFacility(existing) && ovs.length === 0;
    if(facOnLog || logOnFac){
      ovs.push(partId); setOverlays(r,c,ovs);
      return facOnLog ? 'facOnLog' : 'logOnFac';
    }
  }
  if(existing==='center_elec_net' && hasTag(partId,'center') && partId!=='center_elec_net'){
    const ovs = getOverlays(r,c);
    const maxOv = hasPartner('storage_queen') ? 2 : 1;
    if(ovs.length < maxOv){
      ovs.push(partId); setOverlays(r,c,ovs);
      return 'center_elec_net';
    }
  }
  return null;
}

// ══════════════════════════════════════
// 事件
// ══════════════════════════════════════
// 市場事件 id 集合（惡魔巨人的觸發事件）
const MARKET_EVENT_IDS = ['mat_crash','mat_boom','goods_up','row_buff','col_buff','area_buff'];

function triggerEvent(){
  G.phase='event';
  let ev;
  if(checkMurphyHijack()){
    ev=EVENTS.find(e=>e.id==='murphy');
  } else {
    const pool=EVENTS.filter(e=>e.id!=='murphy');
    ev=pool[Math.floor(Math.random()*pool.length)];
  }
  G._currentEventId = ev.id;
  G.nextEventData=precomputeEventData(ev);
  _playEventSfx(ev);
  ev.show(ev);
  render();
}
// 事件 id → 音效類型分類（用於 showEv 觸發 SFX.eventTrigger）
const EVENT_SFX_TYPE={
  // 正面：玩家獲益
  pick_fac:'good', mat_boom:'good', goods_up:'good', tanya_gift:'good',
  leya_gift:'good', job_assist:'good',
  // 中性：無實際得失（純空轉 / 區域重分配）
  skip:'neutral', row_buff:'neutral', col_buff:'neutral', area_buff:'neutral',
  // 負面：玩家受損
  mat_crash:'bad', typhoon:'bad', rebellion:'bad', earthquake:'bad',
  hazardous_waste:'bad', transport_error:'bad', food_safety:'bad',
  labor_insurance:'bad', murphy:'bad'
};
function showEv(title,desc,optsHtml){
  document.getElementById('ev-title').textContent=title;
  document.getElementById('ev-desc').textContent=desc;
  document.getElementById('ev-opts').innerHTML=optsHtml;
  const banner=document.getElementById('ev-banner');
  banner.classList.add('show');
  // 滑入動畫（重置強制重播）。SFX.eventTrigger 已在 triggerEvent / doNext 統一播放
  banner.classList.remove('ev-banner-slide-in'); void banner.offsetWidth; banner.classList.add('ev-banner-slide-in');
  // 確認按鈕發光提示
  const confirmBtn=document.querySelector('#ev-opts .eopt.pri');
  if(confirmBtn) confirmBtn.classList.add('btn-glow');
  DM.onEvent(title);
}
// 統一在事件實際觸發時（ev.show 之前）播放對應音效
// 涵蓋走 showEv 與走 showCardChooser 的事件（如 pick_fac 不走 showEv）
function _playEventSfx(ev){
  const sfxType=EVENT_SFX_TYPE[ev.id]||'neutral';
  SFX.eventTrigger(sfxType);
}
function hideEv(){
  document.getElementById('ev-banner').classList.remove('show');
}
// 判斷是否有事件相關 UI 模態正在顯示（事件橫幅/抽卡器/動作彈窗）
// 用於容錯：phase='event' 但無模態顯示時視為殘留狀態，允許結束回合
function isAnyEventModalOpen(){
  const ev=document.getElementById('ev-banner');
  if(ev&&ev.classList.contains('show')) return true;
  const cc=document.getElementById('card-chooser');
  if(cc&&cc.style.display==='flex') return true;
  const ac=document.getElementById('action-chooser');
  if(ac&&ac.style.display==='flex') return true;
  return false;
}
function evDone(){
  hideEv();
  G.actionOptions=[];
  // 惡魔巨人：每次觸發「市場事件」後，挑選（玩家選）一個合夥人消滅（排除自身）
  const eventId = G._currentEventId;
  G._currentEventId = null;
  const isMarketEvent = MARKET_EVENT_IDS.indexOf(eventId) >= 0;
  if(isMarketEvent && hasPartner('demon_giant') && !isDemonNegDisabled('demon_giant')){
    const candidates = G.partners.filter(pid=>pid!=='demon_giant');
    if(candidates.length>0){
      showDemonGiantChooser(candidates);
      return; // 由 chooser 的 onclick 接續 startTurn
    }
  }
  startTurn();
}

function showDemonGiantChooser(candidates){
  const cards = candidates.map(pid=>{
    const p = PARTNERS[pid];
    return {
      emoji: p.emoji,
      name: p.name,
      desc: p.desc||'',
      pos: p.pos||'',
      neg: p.neg||'',
      onclick: `cardChooserPick(()=>{ demonGiantDestroy('${pid}'); })`
    };
  });
  showCardChooser('👹 惡魔巨人：挑選一位合夥人消滅（市場事件後觸發）', cards, null);
  // 隱藏取消按鈕：此選擇是強制的
  const skipBtn = document.getElementById('card-chooser-skip');
  if(skipBtn) skipBtn.style.display = 'none';
}

function demonGiantDestroy(pid){
  const p = PARTNERS[pid];
  G.partners = G.partners.filter(x=>x!==pid);
  if(p) addLog(`👹 惡魔巨人：${p.emoji}${p.name} 被消滅！`,'b');
  // 巨人合約失敗永久效果：每次需消滅 2 個合夥人
  const giantFailed = Array.isArray(G.activeContracts) && G.activeContracts.some(ac=>ac.id==='giant_contract' && ac.failed);
  if(giantFailed && !G._giantSecondKillPending){
    G._giantSecondKillPending = true;
    const candidates = G.partners.filter(x=>x!=='demon_giant');
    if(candidates.length > 0){
      addLog('📜 巨人合約違約：再消滅一位合夥人','b');
      setTimeout(()=>showDemonGiantChooser(candidates), 400);
      return;
    }
  }
  G._giantSecondKillPending = false;
  startTurn();
}
function evPick(id,fromEl){
  const handBefore=G.hand.length;
  addHandMaybeCompound(id);
  // addHandMaybeCompound 已在複合時 addLog，普通時這裡補 log
  const wasCompound=G.hand.length>handBefore&&G.hand[G.hand.length-1].compound;
  if(!wasCompound) addLog(`🎁 獲得 ${BLDG[id].emoji}${BLDG[id].name}！`,'g');
  hideEv();
  closeCardChooser();
  closeActionOverlay();
  // 卡牌飛入手牌動畫（fromEl 通常為 null；flyCardToHand 會從畫面中央起飛）+ SFX
  flyCardToHand(id, fromEl);
  G.actionOptions=[];
  startTurn();
}

// ══════════════════════════════════════
// 放設施
// ══════════════════════════════════════
function selBldg(id){
  if(G.phase!=='place')return;
  G.sel=G.sel===id?null:id;
  if(G.sel&&BLDG[G.sel]&&BLDG[G.sel].ruinOnly){
    const count=G.ruinCells?G.ruinCells.size:0;
    if(count===0) addLog('🗿 目前沒有廢墟格可放置','b');
    else addLog(`🗿 請點擊廢墟格（灰色斜紋格子）放置，共${count}個`,'w');
  }
  render();
  renderFanHand();
}
// ══════════════════════════════════════
// 統一放置邏輯（click / drag 共用）
// 回傳 true=放置成功, false=無法放置（保留選取）
// ══════════════════════════════════════
function tryPlaceAtCell(r,c,bldgId){
  if(!bldgId) return false;
  const handItem=G.hand.find(h=>h.id===bldgId);

  // ── 複合設施 ──
  if(handItem&&isCompoundHand(handItem)){
    if(!canPlaceCompound(r,c,handItem)){
      const [r2,c2]=getCompoundSecondCell(r,c,handItem);
      const gn=GN();
      const part1=handItem.parts[0], part2=handItem.parts[1];
      if(r2<0||r2>=gn||c2<0||c2>=gn) addLog('🔗 複合設施：第二格超出邊界','b');
      else if(!_canPlaceCompoundPart(r,c,part1)) addLog(`🔗 複合設施：錨點格子無法接受 ${BLDG[part1]?.name||part1}`,'b');
      else if(!_canPlaceCompoundPart(r2,c2,part2)) addLog(`🔗 複合設施：第二格無法接受 ${BLDG[part2]?.name||part2}`,'b');
      else addLog('🔗 複合設施：無法放置','b');
      return false;
    }
    const [r2,c2]=getCompoundSecondCell(r,c,handItem);
    handItem.count--;
    const part1=handItem.parts[0], part2=handItem.parts[1];
    const result1 = _placeCompoundPart(r,c,part1);
    const result2 = _placeCompoundPart(r2,c2,part2);
    const overlayLog = (rr,cc,kind,id)=>{
      if(kind==='leya'){
        const k=`${rr},${cc}`;
        addLog(`👩‍🔧 蕾雅：${BLDG[id].emoji}${BLDG[id].name} 疊加於 (${rr+1},${cc+1})，永久+2（共${G.bldgUpgrades[k]||0}）`,'g');
        if(typeof placeEffect==='function') placeEffect(rr,cc,{overlay:true,bldgId:id});
      } else if(kind==='facOnLog'||kind==='logOnFac'){
        addLog(`🚛 物流疊加：${BLDG[id].emoji}${BLDG[id].name} 於 (${rr+1},${cc+1})`,'g');
        if(typeof placeEffect==='function') placeEffect(rr,cc,{overlay:true,bldgId:id});
      } else if(kind==='center_elec_net'){
        addLog(`🔌 中央電子網路：${BLDG[id].emoji}${BLDG[id].name} 疊加 (${rr+1},${cc+1})`,'g');
        if(typeof placeEffect==='function') placeEffect(rr,cc,{overlay:true,bldgId:id});
        if(typeof onFacilityPlaced==='function') onFacilityPlaced(rr,cc,id);
      }
    };
    addLog(`🔗 放置複合：${BLDG[part1].emoji}${BLDG[part1].name} (${r+1},${c+1}) + ${BLDG[part2].emoji}${BLDG[part2].name} (${r2+1},${c2+1})`,'g');
    overlayLog(r,c,result1,part1);
    overlayLog(r2,c2,result2,part2);
    // 複合設施可能含 adv_booster，需即時重算光環（base/overlay 任一為 booster 都計入）
    if(part1==='adv_booster'||part2==='adv_booster') recomputeBoosterAura();
    pulse(r,c); pulse(r2,c2); render();
    // 複合卡若含轉運中心/物流轉運中心，依序顯示方向 picker
    const _isTransferP=id=>id==='transfer_hub'||id==='logistics_hub';
    const t1=_isTransferP(handItem.parts[0]);
    const t2=_isTransferP(handItem.parts[1]);
    if(t1&&t2){ showTransferHubDirPicker(r,c,()=>showTransferHubDirPicker(r2,c2)); }
    else if(t1){ showTransferHubDirPicker(r,c); }
    else if(t2){ showTransferHubDirPicker(r2,c2); }
    return true;
  }

  // ── 商店限定工具型設施（早於一般放置流程處理；本身不會留在格子上） ──
  // 貨櫃屋：將目標格的 base + overlay 全數加回手牌，每張 -2 收益
  if(bldgId==='container_house'){
    const cur=G.grid[r][c];
    if(!cur||cur==='ruin'){
      addLog('🚛 貨櫃屋只能重疊在已有設施的格子上','b');
      return false;
    }
    if(cur==='dept_store_part'||cur==='ancient_factory_part'){
      addLog('🚛 貨櫃屋不能用於大型設施的 2×2 占位格','b');
      return false;
    }
    if(BLDG[cur]&&BLDG[cur].indestructible){
      addLog(`🚛 ${BLDG[cur].name}無法被拆解`,'b');
      return false;
    }
    if(!handItem||handItem.count<=0) return false;
    handItem.count--;
    const overlays=getOverlays(r,c);
    const all=[cur, ...overlays];
    // 過濾不可加回手牌的（無 BLDG 定義 / indestructible）
    const returnable=all.filter(id=>BLDG[id]&&!BLDG[id].indestructible);
    returnable.forEach(id=>addHand(id,1));
    G.grid[r][c]=null;
    setOverlays(r,c,[]);
    clearKeyedData(`${r},${c}`);
    if(G.ruinCells) G.ruinCells.delete(`${r},${c}`);
    const loss=returnable.length*2;
    G.profit-=loss;
    addLog(`🚛 貨櫃屋 (${r+1},${c+1})：返回 ${returnable.length} 個設施到手牌，收益 -${loss}`,'g');
    recomputeBoosterAura();
    if(typeof renderFanHand==='function') renderFanHand();
    render();
    return true;
  }

  // 紅綠燈：只能蓋在物流站上，選方向後該物流站變成指定方向
  if(bldgId==='traffic_light'){
    const cur=G.grid[r][c];
    const isLogStation=['logistics_up','logistics_down','logistics_left','logistics_right'].includes(cur);
    if(!isLogStation){
      addLog('🚦 紅綠燈只能蓋在物流站（→↓←↑）上','b');
      return false;
    }
    if(!handItem||handItem.count<=0) return false;
    handItem.count--;
    if(typeof renderFanHand==='function') renderFanHand();
    // 取消未選方向時退還手牌（避免誤點消耗）
    showTransferHubDirPicker(r,c,null,()=>{
      handItem.count++;
      if(typeof renderFanHand==='function') renderFanHand();
      addLog('🚦 紅綠燈：未選擇方向，已退還','b');
    });
    render();
    return true;
  }

  // ── 蕾雅：手牌百貨公司 疊加於 小鎮百貨公司 上（視為不同建築，永久+2）──
  if(bldgId==='dept_store'&&hasPartner('leya')){
    const clickedBId=G.grid[r][c];
    if(clickedBId==='dept_store'||clickedBId==='dept_store_part'){
      if(!handItem||handItem.count<=0){ addLog('👩‍🔧 蕾雅：手牌不足','b'); return false; }
      // 找到錨點
      let ar=r,ac=c;
      if(clickedBId==='dept_store_part'){
        const ak=G.deptStoreParts[`${r},${c}`];
        if(ak){[ar,ac]=ak.split(',').map(Number);}
      }
      handItem.count--;
      // 錨點疊加 dept_store（視為不同建築）
      const ovs=getOverlays(ar,ac);
      ovs.push('dept_store');
      setOverlays(ar,ac,ovs);
      // 錨點永久 +2（dept_store FX 會聚合 2×2 四格的 bldgUpgrades）
      const ak=`${ar},${ac}`;
      G.bldgUpgrades[ak]=(G.bldgUpgrades[ak]||0)+2;
      addLog(`👩‍🔧 蕾雅：🏬 百貨公司 疊加於 (${ar+1},${ac+1})，永久+2（共${G.bldgUpgrades[ak]}）`,'g');
      placeEffect(ar,ac,{overlay:true,bldgId:'dept_store'}); render();
      return true;
    }
  }

  // ── 大型設施數量限制（isLarge）：小鎮中只能存在一個大型設施，惡魔巨人豁免 ──
  if(BLDG[bldgId]&&BLDG[bldgId].isLarge&&!hasPartner('demon_giant')){
    const hasOtherLarge=findCells((rr,cc,bb)=>bb&&BLDG[bb]&&BLDG[bb].isLarge).length>0;
    if(hasOtherLarge){
      addLog(`🚫 ${BLDG[bldgId].name}：小鎮中只能存在一個大型設施（惡魔巨人可豁免）`,'b');
      return false;
    }
  }

  // ── 百貨公司 / 大型設施 2×2 放置 ──
  if(BLDG[bldgId]&&BLDG[bldgId].needs2x2){
    const isDept=bldgId==='dept_store';
    const isAncient=bldgId==='ancient_factory';
    // 先試專屬條件（百貨公司：2×2 商店；古代機械工廠：2×2 工廠）
    let anchor = isDept ? findShop2x2(r,c) : (isAncient ? findFactory2x2(r,c) : null);
    let useBigCorp = false;
    // 非 dept/ancient 的大型設施（mega_elec_supply / giant_village / world_wonder）：試純空格 2×2
    if(!anchor && !isDept && !isAncient){
      anchor = findEmpty2x2(r,c);
    }
    // 大財團：若上述都失敗，嘗試任意 2×2 非大型區域（含可破壞設施）
    if(!anchor && hasPartner('big_corp')){
      anchor = findAny2x2(r,c);
      if(anchor) useBigCorp = true;
    }
    if(!anchor){
      if(isDept) addLog('🏬 百貨公司需要 2×2 的一般商店區域（不含已有的百貨公司）','b');
      else if(isAncient) addLog('🏛 古代機械工廠需要 2×2 的工廠區域（factory/adv_factory）','b');
      else addLog(`🚫 ${BLDG[bldgId].name}需要 2×2 空格（大財團可取代非大型區域）`,'b');
      return false;
    }
    if(!handItem||handItem.count<=0) return false;
    const [tr,tc]=anchor;
    // 大財團：先消滅 2×2 內現有的非大型設施
    if(useBigCorp){
      let destroyed=0;
      for(let dr=0;dr<2;dr++) for(let dc=0;dc<2;dc++){
        const er=tr+dr, ec=tc+dc;
        if(G.grid[er][ec] && G.grid[er][ec]!=='ruin'){
          const destroyedName=BLDG[G.grid[er][ec]]?.name||'設施';
          destroyFacility(er,ec);
          destroyed++;
          addLog(`🏢 大財團：消滅 ${destroyedName} (${er+1},${ec+1})`,'b');
        }
      }
      if(destroyed>0) addLog(`🏢 大財團：${BLDG[bldgId].name} 取代 ${destroyed} 個非大型設施`,'g');
    }
    handItem.count--;
    if(isDept){
      addLog(`🏬 百貨公司：取代 2×2 ${useBigCorp?'區域':'商店'} (${tr+1},${tc+1})~(${tr+2},${tc+2})`,'g');
      placeDeptStore(r,c,anchor);
    } else if(isAncient){
      addLog(`🏛 古代機械工廠：取代 2×2 ${useBigCorp?'區域':'工廠'} (${tr+1},${tc+1})~(${tr+2},${tc+2})`,'g');
      placeAncientFactory(r,c,anchor);
    } else {
      // 非百貨公司/古代機械工廠的大型設施：目前實作為單格（居主格），其餘 3 格以 null 佔住 anchor 標記
      // 依現行實作保持單格行為，僅消滅 2×2 區域釋出空間
      G.grid[r][c]=bldgId;
      addLog(`放置 ${BLDG[bldgId].emoji}${BLDG[bldgId].name} (${r+1},${c+1})`,'g');
    }
    placeEffect(tr,tc); render();
    return true;
  }

  // ── 蕾雅：相同設施疊加（base 或既有 overlay 中已有同名都算；視為不同建築，每次永久 +2）──
  if(G.grid[r][c]&&hasPartner('leya')&&(G.grid[r][c]===bldgId||getOverlays(r,c).includes(bldgId))){
    if(BLDG[bldgId]&&BLDG[bldgId].noOverlay){
      addLog(`🚫 ${BLDG[bldgId].name}無法被重疊`,'b');
      return false;
    }
    if(!handItem||handItem.count<=0){ addLog('👩‍🔧 蕾雅：手牌不足','b'); return false; }
    handItem.count--;
    const ovs=getOverlays(r,c);
    ovs.push(bldgId);
    setOverlays(r,c,ovs);
    const k=`${r},${c}`;
    G.bldgUpgrades[k]=(G.bldgUpgrades[k]||0)+2;
    addLog(`👩‍🔧 蕾雅：${BLDG[bldgId].emoji}${BLDG[bldgId].name} 疊加於 (${r+1},${c+1})，永久+2（共${G.bldgUpgrades[k]}）`,'g');
    placeEffect(r,c,{overlay:true,bldgId}); render();
    return true;
  }

  // ── 中央電子網路：可疊加任何「中央」tag 建築（無需合夥人） ──
  // 上限：基本 1 層；持有阿北 1 層；持有倉儲女王 2 層（與物流疊加共用層數）
  if(G.grid[r][c]==='center_elec_net'&&BLDG[bldgId]&&hasTag(bldgId,'center')&&bldgId!=='center_elec_net'){
    if(BLDG[bldgId].noOverlay){ addLog(`🚫 ${BLDG[bldgId].name}無法被重疊`,'b'); return false; }
    const _ovs=getOverlays(r,c);
    const _maxOv=hasPartner('storage_queen')?2:1;
    if(_ovs.length>=_maxOv){
      addLog(`🔌 中央電子網路：疊加數已達上限（${_maxOv}）`,'b');
      return false;
    }
    if(!handItem||handItem.count<=0) return false;
    handItem.count--;
    _ovs.push(bldgId);
    setOverlays(r,c,_ovs);
    addLog(`🔌 中央電子網路：${BLDG[bldgId].emoji}${BLDG[bldgId].name} 疊加 (${r+1},${c+1})`,'g');
    placeEffect(r,c,{overlay:true,bldgId});
    onFacilityPlaced(r,c,bldgId);
    render();
    return true;
  }

  // ── 廢墟紀念碑（ruinOnly） ──
  if(BLDG[bldgId]&&BLDG[bldgId].ruinOnly){
    if(G.grid[r][c]!=='ruin'){
      addLog(`🗿 廢墟紀念碑只能放在廢墟上！目前廢墟：${[...(G.ruinCells||[])].map(k=>{const[rr,cc]=k.split(',');return `(${+rr+1},${+cc+1})`;}).join(' ')||'無'}`,'b');
      return false;
    }
    if(!handItem||handItem.count<=0) return false;
    handItem.count--;
    G.grid[r][c]=bldgId;
    G.ruinCells&&G.ruinCells.delete(`${r},${c}`);
    addLog(`放置 ${BLDG[bldgId].emoji}${BLDG[bldgId].name} (${r+1},${c+1})（取代廢墟）`);
    placeEffect(r,c); render();
    return true;
  }

  // ── 中央限定 ──
  if(BLDG[bldgId]&&BLDG[bldgId].centerOnly&&!isCenterCell(r,c)){
    addLog(`🚫 ${BLDG[bldgId].name}只能放在中央區域！`,'b');
    return false;
  }

  // ── 物流之王/倉儲女王疊加 ──
  if(G.grid[r][c]&&(hasPartner('logistics_king')||hasPartner('storage_queen'))){
    const existing=BLDG[G.grid[r][c]];
    const placing=BLDG[bldgId];
    const ovs=getOverlays(r,c);
    const maxOv=hasPartner('storage_queen')?2:1;
    // 設施蓋在物流上，或物流蓋在設施上
    const facOnLog=existing&&existing.special==='redirect'&&placing&&placing.special!=='redirect'&&ovs.length<maxOv;
    const logOnFac=existing&&existing.special!=='redirect'&&placing&&placing.special==='redirect'&&isFacility(G.grid[r][c])&&ovs.length===0;
    if(facOnLog||logOnFac){
      // noOverlay 阻擋：放置端或基底端任一禁止疊加即拒絕
      if((placing&&placing.noOverlay)||(existing&&existing.noOverlay)){
        const blockName=(placing&&placing.noOverlay)?placing.name:existing.name;
        addLog(`🚫 ${blockName}無法被重疊`,'b');
        return false;
      }
      if(!handItem||handItem.count<=0) return false;
      if(hasPartner('storage_queen')&&!hasPartner('logistics_king')){
        if(G.profit<2){ addLog('👑 倉儲女王：收益不足（需要2）','b'); return false; }
        G.profit-=2;
        addLog('👑 倉儲女王：疊加行動費 -2 收益','b');
      }
      handItem.count--;
      if(facOnLog){
        ovs.push(bldgId);
        setOverlays(r,c,ovs);
      } else {
        // 物流蓋在設施上：物流變底，原設施變 overlay
        setOverlays(r,c,[G.grid[r][c]]);
        G.grid[r][c]=bldgId;
      }
      const who=hasPartner('logistics_king')?'🚛 物流之王':'👑 倉儲女王';
      addLog(`${who}：${BLDG[bldgId].emoji}${BLDG[bldgId].name} 與 ${existing.emoji}${existing.name} 疊加！`,'g');
      // 轉運中心放置時選擇方向
      if(bldgId==='transfer_hub'||bldgId==='logistics_hub') showTransferHubDirPicker(r,c);
      placeEffect(r,c,{overlay:true,bldgId}); render();
      return true;
    }
  }
  if(G.grid[r][c]){
    addLog(G.grid[r][c]==='ruin'?'該格子是廢墟，無法放置設施':'該格子已有設施','b');
    return false;
  }

  // ── 一般放置 ──
  if(!handItem||handItem.count<=0) return false;
  handItem.count--;
  G.grid[r][c]=bldgId;
  // 期貨交易所：放置時決定本回合加成值（0/2/4/8）
  if(bldgId==='futures_market'){
    if(!G.futuresValue) G.futuresValue={};
    const _fc=[0,2,4,8];
    G.futuresValue[`${r},${c}`]=_fc[Math.floor(Math.random()*4)];
  }
  TUT.hookPlace(bldgId);
  addLog(`放置 ${BLDG[bldgId].emoji}${BLDG[bldgId].name} (${r+1},${c+1})`);
  // 轉運中心：放置後選擇方向
  if(bldgId==='transfer_hub'||bldgId==='logistics_hub'){
    placeEffect(r,c); render();
    showTransferHubDirPicker(r,c);
    return true;
  }
  placeEffect(r,c);
  render();
  return true;
}

function onCell(r,c){
  // DEV 選定清除模式（優先攔截）
  if(DEV._selectClearCells){DEV.toggleSelectCell(r,c);return;}

  if(G.phase!=='place')return;

  // 擁慶記房屋賣出模式
  if(G._yongqingSellMode){
    yongqingSellCell(r,c);
    return;
  }

  // 爆破工程師摧毀模式（可消滅設施或廢墟；消滅後不產生廢墟；每回合限 1 次）
  if(G._demoExpertMode){
    const bId=G.grid[r][c];
    if(!bId){ addLog('🧨 請點擊有設施或廢墟的格子','b'); return; }
    if(BLDG[bId]&&BLDG[bId].indestructible){ addLog(`🧨 ${BLDG[bId].emoji}${BLDG[bId].name} 不可摧毀`,'b'); return; }
    G.profit-=8;
    if(bId==='ruin'){
      // 廢墟：直接清除（原本就不會再產生廢墟）
      addLog(`🧨 爆破工程師：失去8收益，消滅廢墟 (${r+1},${c+1})！`,'b');
      G.grid[r][c]=null;
      if(G.ruinCells) G.ruinCells.delete(`${r},${c}`);
      // 地皮炒家連鎖：格子變空格
      if(hasPartner('land_speculator')){
        if(!G.permCellMods) G.permCellMods={};
        G.permCellMods[`${r},${c}`]=(G.permCellMods[`${r},${c}`]||0)+4;
        addLog(`🏚️ 地皮炒家：(${r+1},${c+1}) 變成空格，永久+4`,'g');
      }
    } else {
      addLog(`🧨 爆破工程師：失去8收益，消滅 ${BLDG[bId].emoji}${BLDG[bId].name} (${r+1},${c+1})！`,'b');
      // 設 flag 讓 destroyFacility 不產生廢墟
      G._demoExpertNoRuin=true;
      destroyFacility(r,c);
      G._demoExpertNoRuin=false;
    }
    G._demoExpertMode=false;
    G._demoExpertUsedThisTurn=true;
    render(); return;
  }

  // 提升設施模式
  if(G.upgradeMode){
    if(!G.grid[r][c]){addLog('請點擊有設施的格子','b');return;}
    upgradeCell(r,c);
    return;
  }

  // 移動都市：周圍 8 格兩兩交換（每回合一次模式，可在模式內多次交換，按確定結束）
  if(G._mobileCityMode){
    const mcCells=findCells((rr,cc,bb)=>bb==='mobile_city');
    const gn=GN();
    const inRangeOfAny=(rr,cc)=>mcCells.some(([mr,mc])=>Math.abs(rr-mr)<=1&&Math.abs(cc-mc)<=1&&!(rr===mr&&cc===mc));
    const bId=G.grid[r][c];
    const _isMovableHere=(rr,cc,b)=>{
      if(!inRangeOfAny(rr,cc)) return false;
      if(b==='mobile_city') return false;
      if(BLDG[b]&&BLDG[b].isLarge) return false;
      if(b==='dept_store_part'||b==='ancient_factory_part') return false;
      return true;
    };
    if(!G._mobileCitySrc){
      if(!isFacility(bId)){addLog('🏙 請點擊移動都市周圍 8 格內的設施','b');return;}
      if(!_isMovableHere(r,c,bId)){addLog('🏙 該格不在範圍或不可移動（移動都市本身/大型/2×2 part 不可選）','b');return;}
      G._mobileCitySrc=[r,c];
      addLog(`🏙 選中 ${BLDG[bId].emoji}${BLDG[bId].name} (${r+1},${c+1})，再點擊目標格`);
      render(); return;
    } else {
      const [sr,sc]=G._mobileCitySrc;
      if(r===sr&&c===sc){G._mobileCitySrc=null;addLog('🏙 取消選擇');render();return;}
      if(!inRangeOfAny(r,c)){addLog('🏙 目標格不在任何移動都市周圍 8 格內','b');return;}
      if(bId==='mobile_city'){addLog('🏙 不能覆寫移動都市本身','b');return;}
      if(BLDG[bId]&&BLDG[bId].isLarge){addLog('🏙 大型設施不可移動','b');return;}
      if(bId==='dept_store_part'||bId==='ancient_factory_part'){addLog('🏙 大型設施 part 不可移動','b');return;}
      const srcId=G.grid[sr][sc];
      swapCellData(sr,sc,r,c);
      onFacilityMoved(r,c,sr,sc);
      if(isFacility(bId)) onFacilityMoved(sr,sc,r,c);
      G._mobileCityMoveCount=(G._mobileCityMoveCount||0)+1;
      addLog(`🏙 移動都市：交換 ${BLDG[srcId].emoji}${BLDG[srcId].name} (${sr+1},${sc+1}) ↔ (${r+1},${c+1})（已移動 ${G._mobileCityMoveCount} 次，按「完成移動」結束）`,'g');
      G._mobileCitySrc=null;
      pulse(r,c); render(); return;
    }
  }

  // 路線規劃師：免費移動一個物流中心
  if(G._freeMoveLogistics){
    const bId=G.grid[r][c];
    if(!G._freeMoveLogisticsSrc){
      // 第一次點擊：選擇物流中心
      if(!bId||BLDG[bId].special!=='redirect'){addLog('🗺️ 請點擊一個物流中心','b');return;}
      G._freeMoveLogisticsSrc=[r,c];
      addLog(`🗺️ 選中 ${BLDG[bId].emoji}${BLDG[bId].name} (${r+1},${c+1})，再點擊目標格子`);
      render(); return;
    } else {
      // 第二次點擊：移動到目標格
      const [sr,sc]=G._freeMoveLogisticsSrc;
      if(r===sr&&c===sc){G._freeMoveLogisticsSrc=null;addLog('🗺️ 取消選擇');render();return;}
      if(bId&&bId!=='ruin'){addLog('🗺️ 目標格子已有設施，請選擇空格或廢墟','b');return;}
      const srcId=G.grid[sr][sc];
      swapCellData(sr,sc,r,c);
      onFacilityMoved(r,c,sr,sc);
      addLog(`🗺️ 路線規劃師：移動 ${BLDG[srcId].emoji}${BLDG[srcId].name} (${sr+1},${sc+1})→(${r+1},${c+1})`,'g');
      G._freeMoveLogistics=false;
      G._freeMoveLogisticsSrc=null;
      pulse(r,c); render(); return;
    }
  }

  // 自由排列模式（拖曳設施到目標格子交換）
  if(G.freeRearrange){
    if(G.grid[r][c]&&G.grid[r][c]!=='ruin'){
      addLog(`💡 拖曳 ${BLDG[G.grid[r][c]].emoji}${BLDG[G.grid[r][c]].name} 到想要的位置`);
    }
    return;
  }

  // 一般移動設施模式
  if(G.moveMode){
    if(!G.moveSrc){
      if(!G.grid[r][c]){addLog('請點擊有設施的格子','b');return;}
      G.moveSrc=[r,c];
      addLog(`選中 ${BLDG[G.grid[r][c]].emoji}${BLDG[G.grid[r][c]].name}，再點空格放置`);
      SFX.select();
      // 選中格子閃光（cellQ 在 render 後找）
      requestAnimationFrame(()=>{ const el=cellQ(r,c); if(el){el.classList.remove('select-chirp');void el.offsetWidth;el.classList.add('select-chirp');setTimeout(()=>el.classList.remove('select-chirp'),360);} });
      render(); return;
    } else {
      const [sr,sc]=G.moveSrc;
      if(r===sr&&c===sc){G.moveSrc=null;render();return;}
      if(G.grid[r][c]){addLog('目標格子已有設施','b');return;}
      const bName=BLDG[G.grid[sr][sc]].emoji+BLDG[G.grid[sr][sc]].name;
      swapCellData(sr,sc,r,c);
      // 清除來源廢墟標記（目標原為空格）
      if(G.ruinCells) G.ruinCells.delete(`${sr},${sc}`);
      onFacilityMoved(r,c,sr,sc);
      addLog(`移動 ${bName} 到 (${r+1},${c+1})`,'g');
      G.moveMode=false;G.moveSrc=null;
      pulse(r,c);render(); return;
    }
  }

  // 暗叫合約：未選手牌時，點擊設施進入「配對消除」流程；點空格取消已選
  if(hasActiveContract('hidden_call') && !G.sel){
    const cellBId = G.grid[r][c];
    if(cellBId && cellBId !== 'ruin'){
      if(_handleHiddenCallPair(r, c)) return;
    } else if(G._hiddenCallPickedCell){
      G._hiddenCallPickedCell = null;
      addLog('🃏 暗叫：取消配對選擇','w');
      render();
      return;
    }
  }

  // 正常放置模式
  if(!G.sel){addLog('請先選擇手牌設施','b');return;}
  if(tryPlaceAtCell(r,c,G.sel)) G.sel=null;
}

// 元素卡牌拖曳系統

let cardDragging=false;

function onCardDragStart(e){
  if(G.phase!=='place'){e.preventDefault();return;}
  cardDragging=true;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain','el-card');
  document.body.classList.add('card-dragging');
}
function onCardDragEnd(e){
  cardDragging=false;
  document.body.classList.remove('card-dragging');
  document.querySelectorAll('.dbtn').forEach(b=>b.classList.remove('drag-over'));
}
function onDirDragOver(e,btn){
  if(!cardDragging)return;
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  btn.classList.add('drag-over');
}
function onDirDragLeave(btn){btn.classList.remove('drag-over');}
function onDirDrop(e,dir,idx){
  e.preventDefault();
  document.body.classList.remove('card-dragging');
  document.querySelectorAll('.dbtn').forEach(b=>b.classList.remove('drag-over'));
  if(!cardDragging)return;
  cardDragging=false;
  sendEl(dir,idx);
}

// 設施拖曳到格子
let bldgDragging=null;
const _emptyDragImg=(()=>{const c=document.createElement('canvas');c.width=1;c.height=1;return c;})();
function onBldgDragStart(e,id){
  if(G.phase!=='place'){e.preventDefault();return;}
  const h=G.hand.find(h=>h.id===id);
  if(!h||h.count<=0){e.preventDefault();return;}
  hideCompoundPreview();
  bldgDragging=id;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain','bldg:'+id);
  e.dataTransfer.setDragImage(_emptyDragImg,0,0);
  // 高亮空格子（排除廢墟）
  document.querySelectorAll('.cell:not(.filled):not(.ruin-cell)').forEach(c=>c.classList.add('drag-target'));
}
function _clearBldgPreview(){
  document.querySelectorAll('.bldg-drag-preview').forEach(el=>el.remove());
  document.querySelectorAll('.compound-preview').forEach(el=>{el.classList.remove('compound-preview','drag-over-cell');});
  document.querySelectorAll('.drag-over-cell').forEach(el=>{el.classList.remove('drag-over-cell');el.style.outline='';el.style.boxShadow='';});
}
function _insertBldgPreview(cellEl, bId){
  if(!cellEl) return;
  const b=BLDG[bId]; if(!b) return;
  const div=document.createElement('div');
  div.className='bldg-drag-preview';
  div.style.cssText='position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;opacity:.55;z-index:2;';
  div.innerHTML=`<div class="cemoji">${b.emoji}</div><div class="cname">${b.name}</div>`;
  cellEl.appendChild(div);
}
function onBldgDragEnd(e){
  bldgDragging=null;
  _clearBldgPreview();
  document.querySelectorAll('.cell').forEach(c=>{c.classList.remove('drag-target');});
}
function onCellDragOver(e,r,c){
  if(!bldgDragging) return;
  // 複合設施：檢查兩格都可用
  const compH=G.hand.find(h=>h.id===bldgDragging&&h.compound);
  if(compH){
    _clearBldgPreview();
    if(!canPlaceCompound(r,c,compH)) return;
    e.preventDefault();
    const cellEl=cellQ(r,c);
    if(cellEl){ cellEl.classList.add('drag-over-cell','compound-preview'); }
    _insertBldgPreview(cellEl, compH.parts[0]);
    const [r2,c2]=getCompoundSecondCell(r,c,compH);
    const cell2=cellQ(r2,c2);
    if(cell2){ cell2.classList.add('drag-over-cell','compound-preview'); }
    _insertBldgPreview(cell2, compH.parts[1]);
    return;
  }
  // 百貨公司：2×2 預覽 或 蕾雅升級預覽
  if(bldgDragging==='dept_store'){
    _clearBldgPreview();
    // 蕾雅：拖到已有的百貨公司上 → 升級預覽
    if(hasPartner('leya')&&(G.grid[r][c]==='dept_store'||G.grid[r][c]==='dept_store_part')){
      e.preventDefault();
      const cellEl=cellQ(r,c);
      if(cellEl){cellEl.classList.add('drag-over-cell');cellEl.style.boxShadow='0 0 0 3px rgba(0,200,100,.4)';}
      return;
    }
    const anchor=findShop2x2(r,c);
    if(!anchor) return;
    e.preventDefault();
    const [tr,tc]=anchor;
    for(let dr=0;dr<2;dr++) for(let dc=0;dc<2;dc++){
      const cell=cellQ(tr+dr,tc+dc);
      if(cell){ cell.classList.add('drag-over-cell','compound-preview'); }
      if(dr===0&&dc===0) _insertBldgPreview(cell,'dept_store');
    }
    return;
  }
  // 中央限定：非中央格不預覽
  if(BLDG[bldgDragging]&&BLDG[bldgDragging].centerOnly&&!isCenterCell(r,c)) return;
  // 蕾雅：允許拖到相同設施的格子（base 或既有 overlay 同名都算；百貨公司特殊；noOverlay 除外）
  const _draggingNoOverlay=BLDG[bldgDragging]&&BLDG[bldgDragging].noOverlay;
  const _ovsAtCell=getOverlays(r,c);
  const isLeyaUpgrade = !_draggingNoOverlay && hasPartner('leya')&&(
    G.grid[r][c]===bldgDragging||
    _ovsAtCell.includes(bldgDragging)||
    (bldgDragging==='dept_store'&&(G.grid[r][c]==='dept_store'||G.grid[r][c]==='dept_store_part'))
  );
  // 廢墟紀念碑：允許拖到廢墟格
  const isRuinPlace = bldgDragging==='ruin_monument' && G.grid[r][c]==='ruin';
  // 物流之王/倉儲女王：允許雙向疊加（noOverlay 兩端任一即拒）
  const existB=G.grid[r][c]&&BLDG[G.grid[r][c]];
  const placingB=BLDG[bldgDragging];
  const hasOverlayPartner=hasPartner('logistics_king')||hasPartner('storage_queen');
  const _maxOv=hasPartner('storage_queen')?2:1;
  const _ovBlocked=(placingB&&placingB.noOverlay)||(existB&&existB.noOverlay);
  const isOverlay = hasOverlayPartner&&existB&&!_ovBlocked&&(
    (existB.special==='redirect'&&placingB&&placingB.special!=='redirect'&&_ovsAtCell.length<_maxOv)||
    (existB.special!=='redirect'&&placingB&&placingB.special==='redirect'&&isFacility(G.grid[r][c])&&_ovsAtCell.length===0)
  );
  // 中央電子網路：可疊加任何中央 tag 建築（無需合夥人；noOverlay 除外）
  const isCenterNetOverlay = G.grid[r][c]==='center_elec_net' && placingB && !_draggingNoOverlay
    && hasTag(bldgDragging,'center') && bldgDragging!=='center_elec_net'
    && _ovsAtCell.length<_maxOv;
  // 貨櫃屋：允許拖到任意可拆解的設施上（排除 ruin / 大型 part / indestructible）
  const isContainerHouseDrop = bldgDragging==='container_house' && G.grid[r][c] && G.grid[r][c]!=='ruin'
    && G.grid[r][c]!=='dept_store_part' && G.grid[r][c]!=='ancient_factory_part'
    && !(existB&&existB.indestructible);
  // 紅綠燈：允許拖到 logistics_up/down/left/right 上
  const isTrafficLightDrop = bldgDragging==='traffic_light'
    && (G.grid[r][c]==='logistics_up'||G.grid[r][c]==='logistics_down'
        ||G.grid[r][c]==='logistics_left'||G.grid[r][c]==='logistics_right');
  if(G.grid[r][c] && !isLeyaUpgrade && !isRuinPlace && !isOverlay && !isCenterNetOverlay
     && !isContainerHouseDrop && !isTrafficLightDrop) return;
  e.preventDefault();
  _clearBldgPreview();
  const cellEl=cellQ(r,c);
  if(cellEl) cellEl.classList.add('drag-over-cell');
  if((isLeyaUpgrade||isOverlay||isCenterNetOverlay) && cellEl){
    cellEl.style.outline='3px solid var(--money)';
    cellEl.style.boxShadow='0 0 12px rgba(176,96,0,.45)';
  } else if(isContainerHouseDrop && cellEl){
    // 貨櫃屋：紅色高亮表示「拆解 / 回收」語意
    cellEl.style.outline='3px solid #c84';
    cellEl.style.boxShadow='0 0 12px rgba(200,80,40,.5)';
  } else if(isTrafficLightDrop && cellEl){
    // 紅綠燈：綠色高亮表示「改向」
    cellEl.style.outline='3px solid #5a5';
    cellEl.style.boxShadow='0 0 12px rgba(80,170,80,.5)';
  } else {
    _insertBldgPreview(cellEl, bldgDragging);
    if(isRuinPlace && cellEl) cellEl.style.outline='3px solid var(--money)';
  }
}
function onCellDragLeave(r,c){
  _clearBldgPreview();
}
function onCellDrop(e,r,c){
  e.preventDefault();
  _clearBldgPreview();
  document.querySelectorAll('.cell').forEach(el=>{el.classList.remove('drag-target');el.style.outline='';el.style.boxShadow='';});
  if(!bldgDragging) return;
  const ok=tryPlaceAtCell(r,c,bldgDragging);
  if(!ok) invalidPlaceFx(r,c);
  bldgDragging=null;
}

let _lastCardValue=null, _lastCardType=null;
function updateCard(el){
  // 偵測值變化（在 G.card 被覆寫之前比對）
  const newVal=el?el.value:null, newType=el?el.type:null;
  const dv = (typeof newVal==='number' && typeof _lastCardValue==='number') ? newVal - _lastCardValue : 0;
  const typeChanged = newType !== _lastCardType && _lastCardType !== null;
  G.card=el;
  if(typeof newVal==='number') _trackContractMaxResource(newVal);
  // 「積累」合約：追蹤本送入過程中的成長 delta（current - sendBaseline）
  if(typeof newVal==='number' && typeof G._sendBaselineValue==='number'){
    if(!G.contractCounters) G.contractCounters={};
    const _delta = newVal - G._sendBaselineValue;
    if(_delta > (G.contractCounters.roundMaxResourceIncrease||0)){
      G.contractCounters.roundMaxResourceIncrease = _delta;
    }
  }
  if(typeof renderFanHand==='function') renderFanHand();
  if(typeof renderTalentPanel==='function') renderTalentPanel();
  // 變化動畫 + 細微音效（首次設定不播；只在 value/type 變動時觸發）
  if(_lastCardValue!==null && (dv!==0||typeChanged)){
    SFX.cardChange();
    if(dv!==0){
      requestAnimationFrame(()=>{
        const elCard=document.querySelector('.fan-card.el-card-fan');
        if(elCard){
          const cls=dv>0?'value-tween':'value-tween-lose';
          elCard.classList.remove(cls); void elCard.offsetWidth; elCard.classList.add(cls);
        }
      });
    }
  }
  _lastCardValue=newVal;
  _lastCardType=newType;
}

function sendEl(dir,idx){
  if(G.phase!=='place')return;
  // 工業化模式：跳過方向限制
  if(!G._industrializing){
    // 颱風：只能從指定方向投入
    if(G.buff&&G.buff.typhoonActive&&G.windDir&&dir!==G.windDir){
      addLog(`🌀 颱風：只能從 ${G.windDir} 方向投入！`,'b');
      return;
    }
    // 場風大師：只能從指定方向投入
    if(hasPartner('wind_master')&&G.windDir){
      if(dir!==G.windDir){
        addLog(`🌀 場風大師：本回合只能從 ${G.windDir} 方向投入！`,'b');
        return;
      }
    }
  }
  G.phase='animating';
  G._tutHitMatFactory = false; // 教學：每次投入重置
  G.sel=null;
  // 莫菲定律：追蹤重複投入模式
  const sendKey=`${dir},${idx}`;
  if(!G._murphyTrack) G._murphyTrack={lastSend:null,repeatCount:0,noMove:0};
  if(sendKey===G._murphyTrack.lastSend) G._murphyTrack.repeatCount++;
  else { G._murphyTrack.lastSend=sendKey; G._murphyTrack.repeatCount=1; }
  render();

  const path=[];
  const _N=GN();
  if(dir==='left')  for(let c=0;c<_N;c++)     path.push([idx,c]);
  if(dir==='right') for(let c=_N-1;c>=0;c--) path.push([idx,c]);
  if(dir==='top')   for(let r=0;r<_N;r++)     path.push([r,idx]);
  if(dir==='bottom')for(let r=_N-1;r>=0;r--)  path.push([r,idx]);

  // 怠惰惡魔負面：投入時 1/3 機率資源 -6
  if(hasPartner('sloth') && !isDemonNegDisabled('sloth') && G.card){
    if(Math.random() < 1/3){
      const before = G.card.value;
      G.card.value = Math.max(1, G.card.value - 6);
      addLog(`😴 怠惰惡魔：投入時不幸觸發，資源 ${before} → ${G.card.value} (-6)`,'b');
      updateCard(G.card);
    }
  }
  let startCard = {...G.card};
  // Gluttony: swap material/goods
  if(hasPartner('gluttony') && !isDemonNegDisabled('gluttony')){
    if(startCard.type==='material') startCard={...startCard,type:'goods'};
    else if(startCard.type==='goods') startCard={...startCard,type:'material'};
  }
  G.inv={facHit:0, logSet:new Set(), cenHits:0, logHits:0,
    speedAct:false, ampAct:false, fxM2G:false, fxG2M:false, arbM2G:false, arbG2M:false,
    windOK:hasPartner('wind_master')&&!!G.windDir, hwCenter:false, exchBoard:false,
    clearanceBonus:0, clearanceCells:[], ruinHits:0,
    facPath:[], facCellPath:[], facProfitMap:{}, sendDir:dir, sendIdx:idx, cellPath:[],
    _envyOut:null, _envyCell:null};
  const startVal=startCard.value;
  const startType=startCard.type;
  G._sendBaselineValue=startVal; // 「積累」合約用：本送入的資源起始值
  let el={value:startVal,type:startType};
  const dname={left:'左側',right:'右側',top:'上方',bottom:'下方'}[dir];
  addLog(`▶ 送入 ${TLABEL[startType]} ${startVal}`,'h');
  updateCard(el);

  // 啟動移動器
  const mover=document.getElementById('el-mover');
  mover.style.display='flex';
  const emojis={money:'💵',material:'🪨',goods:'📦',diamond:'💎'};
  let _moverPrevType=null;
  function updateMover(el){
    const emojiEl=mover.querySelector('.mv-emoji');
    const valEl=mover.querySelector('.mv-val');
    const typeEl=mover.querySelector('.mv-type');
    const newEmoji=emojis[el.type]||'❓';
    const typeChanged=_moverPrevType!==null && _moverPrevType!==el.type;
    emojiEl.textContent=newEmoji;
    valEl.textContent=el.value;
    valEl.style.color=TCOLOR[el.type]||'var(--tx)';
    typeEl.textContent=TLABEL[el.type]||el.type;
    mover.style.borderColor=TCOLOR[el.type]||'var(--acc)';
    // 類型變化時 emoji pop + mover scale 強調
    if(typeChanged){
      mover.classList.remove('mover-convert'); void mover.offsetWidth; mover.classList.add('mover-convert');
      setTimeout(()=>mover.classList.remove('mover-convert'),420);
    }
    _moverPrevType=el.type;
  }
  updateMover(el);

  stepWithMover(path,el,0,startVal,mover,updateMover);
}

  exchange_board(fx){
    // xlsx: 資源投入時，隨機 +2 或 -2，重複「小鎮上已有設施的數量」次，加到該設施輸出
    const facCount = findFacilityCells().length;
    if(facCount<=0){
      addLog(`  📈 匯率波動板: 場上無設施，無波動`);
      fx.hit();
      return;
    }
    let total=0;
    const rolls=[];
    for(let i=0;i<facCount;i++){
      const delta = Math.random()<0.5 ? 2 : -2;
      rolls.push(delta);
      total += delta;
    }
    fx.el={...fx.el, value: Math.max(0, fx.el.value + total)};
    const plusN=rolls.filter(d=>d>0).length, minusN=rolls.filter(d=>d<0).length;
    addLog(`  📈 匯率波動板: 重複 ${facCount} 次（+2×${plusN} / -2×${minusN}）= ${total>=0?'+':''}${total} → ${fx.el.value}`, total>=0?'g':'b');

    if(!G._exchangeBoardNextAt) G._exchangeBoardNextAt={};
    const _ebKey=`${fx.r},${fx.c}`, _ebNow=Date.now();
    const _ebStart=Math.max(_ebNow, G._exchangeBoardNextAt[_ebKey]||0);
    rolls.forEach((d,i)=>{
      setTimeout(()=>floatAtCell(fx.r, fx.c, (d>0?'+':'')+d, d>0), (_ebStart-_ebNow)+i*80);
    });
    G._exchangeBoardNextAt[_ebKey]=_ebStart+rolls.length*80;
    fx.hit();
  },

    const prev=fx.el.value;
    const lost=Math.floor(prev/2);
    const kept=prev-lost;
    const k=`${fx.r},${fx.c}`;
    if(!G.bulkStoreBonus) G.bulkStoreBonus={};
    if(G.bulkStoreBonus[k]===undefined) G.bulkStoreBonus[k]=8;
    const bonusPer=G.bulkStoreBonus[k];
    const groups=Math.floor(lost/4);
    const totalBonus=groups*bonusPer;
    fx.el={value:Math.max(1,kept),type:'goods'};
    if(totalBonus>0){
      G.inv.clearanceBonus=(G.inv.clearanceBonus||0)+totalBonus;
      if(!G.inv.clearanceCells) G.inv.clearanceCells=[];
      G.inv.clearanceCells.push({r:fx.r,c:fx.c,bonus:totalBonus});
      G.bulkStoreBonus[k]+=4;
      addLog(`  🏷️ 清倉拍賣場: 📦${prev}→${kept}（失去${lost}），${groups}組×${bonusPer} = +${totalBonus}收益（結算時入帳，下次每組+${bonusPer+4}）`,'g');

    fx.hit();

  unstable_base(fx){
    // 周圍 4 格設施兩兩交換（隨機配對）；被交換的設施本回合 cellMods += 2
    const gn=GN();
    const adj=[[fx.r-1,fx.c],[fx.r+1,fx.c],[fx.r,fx.c-1],[fx.r,fx.c+1]]
      .filter(([ar,ac])=>ar>=0&&ar<gn&&ac>=0&&ac<gn)
      .filter(([ar,ac])=>{
        const b=G.grid[ar][ac];
        if(!isFacility(b)) return false;
        // 排除大型設施與其 part（避免破壞 2×2 結構）
        if(BLDG[b]&&BLDG[b].isLarge) return false;
        if(b==='dept_store_part'||b==='ancient_factory_part') return false;
        return true;
      });
    if(adj.length<2){
      addLog(`  ⚠️ 地基不穩定站: 周圍可交換設施不足，無效果`);
      fx.hit(); return;
    }
    // 隨機配對（洗牌後 0-1, 2-3 配對）；奇數時最後一個落單
    const shuffled=[...adj].sort(()=>Math.random()-.5);
    const swapped=[];
    for(let i=0;i+1<shuffled.length;i+=2){
      const [r1,c1]=shuffled[i], [r2,c2]=shuffled[i+1];
      const b1=G.grid[r1][c1], b2=G.grid[r2][c2];
      swapCellData(r1,c1,r2,c2);
      onFacilityMoved(r2,c2,r1,c1);
      onFacilityMoved(r1,c1,r2,c2);
      // 兩格本回合 cellMods +2
      const k1=`${r1},${c1}`, k2=`${r2},${c2}`;
      G.cellMods[k1]=(G.cellMods[k1]||0)+2;
      G.cellMods[k2]=(G.cellMods[k2]||0)+2;
      swapped.push(`${BLDG[b1].name}(${r1+1},${c1+1})↔${BLDG[b2].name}(${r2+1},${c2+1})`);
    }
    if(swapped.length>0){
      addLog(`  ⚠️ 地基不穩定站: 兩兩交換 ${swapped.join('、')}，被交換設施本回合 +2`,'g');
    }
    fx.hit();
  },

  // ══ 人力系新設施 ══
  staff_housing(fx){
    // 通過時記錄本回合已投入（per-turn，避免多次 send 重複觸發）
    if(!G._staffHousingHitThisTurn) G._staffHousingHitThisTurn=new Set();
    G._staffHousingHitThisTurn.add(`${fx.r},${fx.c}`);
    fx.next(300);
  },
};

// 疊加設施 pipeline 用旗標：避免 overlay 內 FX 自行套用 upgrade 與 pipeline 後處理重複
let _inOverlayCtx=false;
// 疊加設施 pipeline：基座處理完後依序套用每個 overlay 的 fn / FX，並把 base 的格子加成套用到每個 overlay 上
function applyOverlayPipeline(el, r, c, cellEl){
  const ovs=getOverlays(r,c);
  if(!ovs||ovs.length===0) return el;
  const k=`${r},${c}`;
  const cellMod=(G.cellMods&&G.cellMods[k]||0)+(G.permCellMods&&G.permCellMods[k]||0)+(G.boosterAura&&G.boosterAura[k]||0);
  const upgradeBonus=(G.bldgUpgrades&&G.bldgUpgrades[k])||0;
  const pctMod=(G.cellPctMods&&G.cellPctMods[k])||0;
  const leyaPct=(G.leyaPctMods&&G.leyaPctMods[k])||0;
  for(const ovId of ovs){
    const ob=BLDG[ovId];
    if(!ob) continue;
    // 類型匹配（暴食惡魔互換）
    let effType=el.type;
    if(hasPartner('gluttony')){
      if(el.type==='material') effType='goods';
      else if(el.type==='goods') effType='material';
    }
    if(ob.req&&ob.req!=='any'&&ob.req!==effType&&ob.req!==el.type) continue;
    const prev={...el};
    // 套用 overlay 的特效 FX 或 基礎 fn
    if(ob.special&&FACILITY_FX[ob.special]){
      const ovFx={
        el:{...el}, r, c, cellEl,
        hit(){}, next(){},
        pulse(){pulse(r,c);},
        updateCard(){}, updateMover(){},
      };
      // 進入 overlay context：FX 內部呼叫 applyUpgradeBonus 變 no-op，
      // 由 pipeline 在迴圈尾統一加 upgradeBonus，避免重複套用
      _inOverlayCtx=true;
      let _ovErr=false;
      try{ FACILITY_FX[ob.special](ovFx); }catch(e){ console.warn('overlay FX 失敗:',ovId,e); _ovErr=true; }
      _inOverlayCtx=false;
      if(_ovErr) continue;
      el=ovFx.el;
    } else if(ob.fn){
      el={value:ob.fn(el.value), type:(ob.out||el.type)};
    }
    // 套用與 base 相同的格子加成（每個 overlay 都吃；電子專用加成只有電子 overlay 吃）
    let totalFixed=cellMod+upgradeBonus;
    if(hasTag(ovId,'electronic')){
      totalFixed+=(G.bldgUpgradesElec&&G.bldgUpgradesElec[k])||0;
    }
    if(totalFixed!==0) el.value=Math.max(0,el.value+totalFixed);
    if(pctMod!==0){
      const chg=Math.ceil(Math.abs(el.value*pctMod/100))*Math.sign(pctMod);
      el.value=Math.max(1,el.value+chg);
    }
    if(leyaPct>0) el.value=el.value+Math.ceil(el.value*leyaPct/100);
    G.inv.facHit=(G.inv.facHit||0)+1;
    if(G.inv.facPath) G.inv.facPath.push(ovId);
    addLog(`  🔁 疊加 ${ob.emoji}${ob.name}: ${TLABEL[prev.type]||prev.type}${prev.value}→${TLABEL[el.type]||el.type}${el.value}`,'g');
  }
  return el;
}

let _stepAnimGen=0; // 動畫世代計數器，用於取消殘留 setTimeout
function cancelStepAnim(){ _stepAnimGen++; const m=document.getElementById('el-mover'); if(m) m.style.display='none'; }
function stepWithMover(path,el,i,startVal,mover,updateMover){
  const gen=_stepAnimGen; // 捕獲當前世代
  if(i>=path.length){
    mover.style.display='none';
    finish(el,startVal);
    return;
  }
  const[r,c]=path[i];

  // 記錄實際經過的格子（工業化用）
  if(G.inv.cellPath) G.inv.cellPath.push([r,c]);

  // 移動移動器到格子位置
  const cellEl=cellQ(r,c);
  if(cellEl){
    const rect=cellEl.getBoundingClientRect();
    mover.style.left=(rect.left+2)+'px';
    mover.style.top=(rect.top+2)+'px';
  }

  const bId=G.grid[r][c];

  // 高亮當前格（跳過百貨公司格子避免 overlay 閃爍）
  if(stepWithMover._prevActive) stepWithMover._prevActive.classList.remove('active-path');
  const _isDeptCell=bId==='dept_store'||bId==='dept_store_part';
  if(cellEl&&!_isDeptCell) cellEl.classList.add('active-path');
  stepWithMover._prevActive=_isDeptCell?null:cellEl;
  // 速遞站：經過空格或廢墟時消耗 flag（效果浪費）
  if((!bId||bId==='ruin')&&G.inv.speedAct) G.inv.speedAct=false;
  // ── 共用尾碼 helper ──
  // 速遞站：上一格觸發速遞站後，本格設施額外觸發一次
  const _speedReplay=G.inv.speedAct&&bId&&isFacility(bId)&&BLDG[bId]?.special!=='speed_station';
  if(_speedReplay) G.inv.speedAct=false;
  const _next=(delay=350)=>{
    if(_speedReplay){
      addLog(`  ⚡ 速遞站：再觸發一次！`,'g');
      setTimeout(()=>{ if(_stepAnimGen!==gen) return; stepWithMover(path,el,i,startVal,mover,updateMover); },delay);
    } else {
      setTimeout(()=>{ if(_stepAnimGen!==gen) return; stepWithMover(path,el,i+1,startVal,mover,updateMover); },delay);
    }
  };
  const _prevValFx=el.value; // 大熱波：FACILITY_FX 用
  const _hit=(delay=350)=>{
    G.inv.facHit=(G.inv.facHit||0)+1;
    SFX.hit(G.inv.facHit-1, getOverlays(r,c).length);
    if(G.inv.facPath) G.inv.facPath.push(bId);
    if(G.inv.facCellPath) G.inv.facCellPath.push([r,c]);
    _trackContractHits(r,c,bId);
    G._firstFacInvestedThisTurn = true; // 嫉妒惡魔：標記本回合已有設施被投入
    if(G.inv.facProfitMap){const gain=el.value-_prevValFx;if(gain>0) G.inv.facProfitMap[bId]=(G.inv.facProfitMap[bId]||0)+gain;}
    pulse(r,c);updateCard(el);updateMover(el);
    // 疊加設施也吃相同加成（非 redirect 基座；redirect 分支有自己的 overlay 處理）
    if(BLDG[bId]&&BLDG[bId].special!=='redirect'){
      const _ovBefore=el;
      el=applyOverlayPipeline(el,r,c,cellEl);
      if(el!==_ovBefore){ updateCard(el); updateMover(el); }
    }
    _next(delay);
  };
  // ── 廢墟：資源直接通過，不產生任何交互 ──
  if(bId==='ruin'){
    G._ruinPassedThisTurn=true; // 移動都市負面檢查用
    G.inv.ruinHits=(G.inv.ruinHits||0)+1; // 建築廢料廠用：本次投入經過廢墟次數
    // 無冕之王：每次投入廢墟前，所有廢墟（含疊加）收益+2（累積）
    if(hasPartner('uncrowned_king')){
      const ruinCount=countAllRuins();
      const add=ruinCount*2;
      G.inv._uncrownedBonus=(G.inv._uncrownedBonus||0)+add;
      addLog(`  👑 無冕之王：投入廢墟，${ruinCount}廢墟×2 = +${add}（累計${G.inv._uncrownedBonus}）`,'g');
    }
    // 廢墟掠奪者：每回合第一次投入廢墟時，資源-4或-6，隨機選一個廢墟疊加等量計數
    if(hasPartner('ruin_scavenger')&&!G._ruinScavengerUsedThisTurn){
      G._ruinScavengerUsedThisTurn=true;
      const penalty=Math.random()<0.5?4:6;
      el={...el,value:Math.max(1,el.value-penalty)};
      addLog(`  💀 廢墟掠奪者：投入廢墟，資源-${penalty}→${el.value}`,'b');
      // 隨機選一個場上廢墟作為疊加目標
      const ruinKeys=G.ruinCells?[...G.ruinCells]:[];
      if(ruinKeys.length>0){
        const targetKey=ruinKeys[Math.floor(Math.random()*ruinKeys.length)];
        const [tr,tc]=targetKey.split(',').map(Number);
        if(!G.ruinStacks) G.ruinStacks={};
        G.ruinStacks[targetKey]=(G.ruinStacks[targetKey]||0)+penalty;
        addLog(`  💀 廢墟掠奪者：${penalty}個廢墟疊加至 (${tr+1},${tc+1})（該格總疊加 ${G.ruinStacks[targetKey]}）`,'b');
        SFX.partnerProc();
        requestAnimationFrame(()=>{ const el=cellQ(tr,tc); if(el){ el.classList.remove('invalid-shake'); void el.offsetWidth; el.classList.add('invalid-shake'); setTimeout(()=>el.classList.remove('invalid-shake'),360); } });
      }
      updateCard(el); updateMover(el);
    }
    _next(300); return;
  }
  if(bId){
    const b=BLDG[bId];
    TUT.hookStep(bId);

    // ── 合約永久效果：電極/姊妹/工會 — 不滿足條件的設施不參與投入 ──
    const _skipReason = (typeof _contractCellSkipReason==='function') ? _contractCellSkipReason(r,c,bId) : null;
    if(_skipReason){
      addLog(`  ⏭ ${b.emoji}${b.name} ${_skipReason}，跳過`,'b');
      _next(300); return;
    }

    // ── 電子放電惡魔：每通過一個設施（base + 每個 overlay）分別計算電子/非電子命中 ──
    // 必須放在 special FX dispatch 之前，否則 special 設施早 return 導致漏算
    if(hasPartner('elec_discharge_demon')){
      if(hasTag(bId,'electronic')) G.inv._elecHits=(G.inv._elecHits||0)+1;
      else G.inv._nonElecHits=(G.inv._nonElecHits||0)+1;
      const _eddOvs=getOverlays(r,c);
      _eddOvs.forEach(ovId=>{
        if(hasTag(ovId,'electronic')) G.inv._elecHits=(G.inv._elecHits||0)+1;
        else G.inv._nonElecHits=(G.inv._nonElecHits||0)+1;
      });
    }

    // ── 外匯交易員：金錢投入任意設施時計數（per-cell，涵蓋所有 special 設施） ──
    if(hasPartner('forex_trader')&&el.type==='money'){
      G.inv._forexMoneyCount=(G.inv._forexMoneyCount||0)+1;
    }

    // ── 物流放大器：下一設施本回合 +8 value（不論是否為 special FX）──
    // 在 special FX dispatch 之前消費 ampAct，避免 special FX 早 return 跳過通用處理器導致死碼
    if(G.inv.ampAct){
      const _amp8=8;
      // 將 +8 加到資源 value（per-pass，本回合自然滿足因 G.inv 為 per-send）
      el={...el, value:Math.max(0, el.value+_amp8)};
      addLog(`  📡 物流放大器：${BLDG[bId].name} 獲得 +${_amp8} → ${el.value}`,'g');
      G.inv.ampAct=false;
      updateCard(el); updateMover(el);
    }

    // ── 電子輸送帶：在當前格的特效跑之前先處理（base + overlays 中的電子實例 +2） ──
    // 規格：下一個設施若為電子（base 或疊加），所有電子實例獲得 +2 永久；
    //       若都不是電子，效果消耗、無加成；旗標一律消耗
    if(G.inv._elecConveyorActive){
      const _ovs=getOverlays(r,c);
      const _names=[];
      if(hasTag(bId,'electronic')) _names.push(BLDG[bId].name);
      _ovs.forEach(ovId=>{ if(hasTag(ovId,'electronic')) _names.push(BLDG[ovId].name); });
      if(_names.length>0){
        if(!G.bldgUpgradesElec) G.bldgUpgradesElec={};
        const _ek=`${r},${c}`;
        G.bldgUpgradesElec[_ek]=(G.bldgUpgradesElec[_ek]||0)+2;
        addLog(`  ⚡ 電子輸送帶：${_names.join('、')} 永久+2`,'g');
      } else {
        addLog(`  ⚡ 電子輸送帶：${BLDG[bId].name} 非電子且無電子疊加，效果浪費`,'b');
      }
      G.inv._elecConveyorActive=false;
    }

    // (鑽石機制已隨舊嫉妒工廠移除；新版嫉妒輸出只在 money/material/goods 三種)

    // ── 設施特效調度 ──
    if(b.special && FACILITY_FX[b.special]){
      let _fxDone=false;
      const fx={
        el, r, c, cellEl,
        hit(d=350){_fxDone=true;el=fx.el;_hit(d);},
        // 特效命中後顯式觸發合夥人「投入設施」hook（用於 special FX 早 return 路徑）
        hitWithPartner(bId,d=350){fx.hit(d);_runPartnerOnBuildingHit(bId);},
        next(d=350){_fxDone=true;el=fx.el;_next(d);},
        pulse(){pulse(r,c);},
        updateCard(){el=fx.el;updateCard(el);},
        updateMover(){el=fx.el;updateMover(el);},
      };
      FACILITY_FX[b.special](fx);
      if(_fxDone) return;
      el=fx.el;
    }

    // ── 物流中心：轉向 ──
    if(b.special==='redirect'){
      // 颱風/運輸異常：物流失效
      if(G.buff&&(G.buff.typhoonActive||G.buff.logisticsDisabled)){
        const reason=G.buff.typhoonActive?'颱風':'運輸異常';
        addLog(`  ${b.emoji}${b.name}: ${reason}導致物流失效，略過`,'b');
        _next(300); return;
      }
      // 每次投入每格只能觸發一次
      const cellKey=`${r},${c}`;
      if(G.inv.logSet&&G.inv.logSet.has(cellKey)){
        addLog(`  ${b.emoji}${b.name}: 已觸發過，略過`);
        _next(300); return;
      }
      if(!G.inv.logSet) G.inv.logSet=new Set();
      G.inv.logSet.add(cellKey);
      // 交通合約：本輪轉向次數 +1
      if(G.contractCounters) G.contractCounters.roundRedirectHits = (G.contractCounters.roundRedirectHits||0) + 1;
      // 運輸大亨：每次通過物流+3
      if(hasPartner('transport_tycoon')){
        el={...el,value:el.value+3};
        addLog(`  🚢 運輸大亨：通過物流+3→${el.value}`,'g');
        G.inv.logHits=(G.inv.logHits||0)+1;
      }
      SFX.hit(G.inv.facHit||0, getOverlays(r,c).length);
      pulse(r,c);
      cellEl?.classList.add('transform-flash');
      setTimeout(()=>cellEl?.classList.remove('transform-flash'),400);

      // 物流中心：當前方向存於 cellRedirectDir，覆蓋 BLDG.dir
      // 物流站（logistics_up/down/left/right、transfer_hub）只用 b.dir，避免 stale cellRedirectDir 被誤套用
      const isPerTurnRot=b.perTurnRotate===true;
      const cellDir=isPerTurnRot ? ((G.cellRedirectDir&&G.cellRedirectDir[cellKey])||b.dir) : b.dir;
      // upgrade bonus (有 overlay 時升級屬於 overlay 設施，redirect 不重複計算)
      const _hasOverlay=G.cellOverlay&&G.cellOverlay[`${r},${c}`];
      const upgradeBonus=_hasOverlay?0:(G.bldgUpgrades?.[`${r},${c}`]||0);
      if(upgradeBonus>0){
        el={...el,value:el.value+upgradeBonus};
        addLog(`  ${b.emoji}${b.name}: 轉向 + 升級加成 +${upgradeBonus} → ${el.value}`);
      } else {
        addLog(`  ${b.emoji}${b.name}: 轉向 ${cellDir}`);
      }
      updateCard(el);
      setTimeout(()=>{ if(_stepAnimGen!==gen) return; updateMover(el); },100);

      // rebuild remaining path from next cell in new direction
      const newDir=cellDir;
      if(isPerTurnRot){
        if(!G._logCenterRotated) G._logCenterRotated=new Set();
        if(!G._logCenterRotated.has(cellKey)){
          const rotMap={right:'bottom',bottom:'left',left:'top',top:'right'};
          const nextDir=rotMap[cellDir]||'right';
          if(!G.cellRedirectDir) G.cellRedirectDir={};
          G.cellRedirectDir[cellKey]=nextDir;
          G._logCenterRotated.add(cellKey);
          const arrowMap={right:'→',bottom:'↓',left:'←',top:'↑'};
          addLog(`  ${b.emoji}${b.name}: 自動切換方向 ${arrowMap[cellDir]}→${arrowMap[nextDir]}（每回合一次）`,'b');
          SFX.rotateDir();
          // cell 內 emoji 旋轉動畫（render 後找新 emoji 元素）
          requestAnimationFrame(()=>{
            const ce=cellQ(r,c);
            const em=ce&&ce.querySelector('.cemoji');
            if(em){ em.classList.remove('dir-rotating'); void em.offsetWidth; em.classList.add('dir-rotating'); setTimeout(()=>em.classList.remove('dir-rotating'),360); }
          });
        }
      }
      const newPath=[];
      let nr=r,nc=c;
      const visited=new Set();
      visited.add(`${r},${c}`);
      const _gn2=GN();
      for(let s=0;s<_gn2*4;s++){
        if(newDir==='top')    nr--;
        if(newDir==='bottom') nr++;
        if(newDir==='left')   nc--;
        if(newDir==='right')  nc++;
        if(nr<0||nr>=_gn2||nc<0||nc>=_gn2) break;
        if(visited.has(`${nr},${nc}`)) break; // 防止迴圈
        visited.add(`${nr},${nc}`);
        newPath.push([nr,nc]);
      }

      // 疊加設施：使用統一 pipeline，每個 overlay 都吃到與 base 相同的格子加成
      el=applyOverlayPipeline(el,r,c,cellEl);
      updateCard(el);
      setTimeout(()=>{ if(_stepAnimGen!==gen) return; updateMover(el); },100);
      setTimeout(()=>{
        if(_stepAnimGen!==gen) return;
        if(newPath.length===0){
          mover.style.display='none';
          if(stepWithMover._prevActive){stepWithMover._prevActive.classList.remove('active-path');stepWithMover._prevActive=null;}
          finish(el,startVal);
        } else {
          stepWithMover(newPath,el,0,startVal,mover,updateMover);
        }
      },400);
      return;
    }

    // 暴食惡魔：material<->goods 互換用於匹配和輸出
    let effType=el.type;
    if(hasPartner('gluttony')){
      if(el.type==='material') effType='goods';
      else if(el.type==='goods') effType='material';
    }
    if(b.req==='any'||b.req===effType||b.req===el.type){
      // 運輸異常：原料無法→商品
      if(G.buff&&G.buff.noMatToGoods&&(el.type==='material'||effType==='material')&&b.out==='goods'){
        addLog(`  🚫 ${b.emoji}${b.name}：運輸異常，原料無法轉為商品，略過`,'b');
        _next(300); return;
      }
      // 嫉妒工廠：新版改由 FACILITY_FX.envy 處理（任意→隨機資源 + 首次投入永久 +4 + 輸出匹配獎勵）
      // 暴食惡魔：若匹配是因為互換，則視為互換類型進入
      if(hasPartner('gluttony')&&b.req===effType&&b.req!==el.type) el={...el,type:effType};
      G.inv.facHit=(G.inv.facHit||0)+1;
      if(G.inv.facPath) G.inv.facPath.push(bId);
      if(G.inv.facCellPath) G.inv.facCellPath.push([r,c]);
      G._firstFacInvestedThisTurn = true; // 嫉妒惡魔：標記本回合已有設施被投入
      // 合約進度追蹤（基礎設施路徑；special FX 路徑由 _hit 內部呼叫）
      _trackContractHits(r,c,bId);
      // 電子放電惡魔：已於 stepWithMover 進入此 cell 時統一處理（FX dispatch 之前），
      // base + 每個 overlay 分別計算，涵蓋所有 special 設施
      // 電子輸送帶：已於 stepWithMover 進入此 cell 時統一處理（FX dispatch 之前）
      const _prevVal=el.value; // 大熱波：記錄轉換前數值
      if(isCenterCell(r,c)){ G.inv.cenHits=(G.inv.cenHits||0)+1; G.inv.hwCenter=true; }
      const prev={...el};
      const modKey=`${r},${c}`;
      const upgradeBonus=(!b.special||b.special==='cafeteria')&&G.bldgUpgrades?.[modKey]||0;

      // ── Step 1: 基礎轉換 ──
      let nv=b.fn(el.value);
      let nt=b.out||el.type;

      // 套利者負面：原料→商品不增加數值
      if(hasPartner('arbitrageur')&&prev.type==='material'&&nt==='goods'){
        nv=prev.value; // 保持原值，不增加
        addLog(`  ⚖️ 套利者：原料→商品不增加數值`,'b');
      }
      // 物流放大器：已於 stepWithMover 進入此 cell 時統一處理（FX dispatch 之前）

      // 暴食惡魔：輸出類型互換
      if(hasPartner('gluttony')){
        if(nt==='material') nt='goods';
        else if(nt==='goods') nt='material';
      }

      // ── Step 2: 事件 buff 加成 ──
      // 原料大降：金錢→原料×2，原料→金錢÷2，原料→商品×2
      if(G.buff.matCrash){
        if(prev.type==='money'&&nt==='material'){ nv=nv*2; addLog(`  📉 原料大降：金錢→原料 ×2`,'w'); }
        else if(prev.type==='material'&&nt==='money'){ nv=Math.max(1,Math.floor(nv/2)); addLog(`  📉 原料大降：原料→金錢 ÷2`,'b'); }
        else if(prev.type==='material'&&nt==='goods'){ nv=nv*2; addLog(`  📉 原料大降：原料→商品 ×2`,'w'); }
      }
      // 原料出口熱 ×2 + 累積加成（與原料大降互斥）
      if(G.buff.matOutMult&&!G.buff.matCrash&&prev.type==='material'&&nt!=='material'){
        nv=Math.round(nv*G.buff.matOutMult);
        if(G.buff.matBoomExtra){ nv+=G.buff.matBoomExtra; addLog(`  📈 原料出口熱累積：+${G.buff.matBoomExtra}`,'g'); }
      }
      if(G.buff.matToMoneyDouble&&prev.type==='material'&&nt==='money'){
        nv=nv*2;
        addLog(`  🌀 颱風：原料→金錢翻倍！`,'w');
      }
      // 重大食安：金錢→商品時 -5（最小1）
      if(G.buff.moneyToGoodsPenalty&&prev.type==='money'&&nt==='goods'){
        nv=Math.max(1,nv-5);
        addLog(`  🍽 重大食安：金錢→商品 -5 → ${nv}`,'b');
      }

      // ── Step 3: 格子固定加成 + 升級加成 ──
      let cellMod=(G.cellMods[modKey]||0)+(G.permCellMods&&G.permCellMods[modKey]||0)+(G.boosterAura&&G.boosterAura[modKey]||0);
      // 激情惡魔：逆轉減益
      if(cellMod<0 && hasPartner('wrath')){
        cellMod=-cellMod;
        addLog(`  🔥 激情惡魔：減益逆轉 → +${cellMod}`,'g');
        G.partnerState.wrath=G.partnerState.wrath||{noDebuffTurns:0};
        G.partnerState.wrath.noDebuffTurns=0;
      }
      const totalFixed=cellMod+upgradeBonus;
      if(totalFixed!==0) nv=Math.max(0,nv+totalFixed);

      // ── Step 3.5: 格子百分比修正（+10%/-10%，向上取整，最小1） ──
      const pctMod=G.cellPctMods?G.cellPctMods[modKey]||0:0;
      if(pctMod!==0){
        const pctChange=Math.ceil(Math.abs(nv*pctMod/100))*Math.sign(pctMod);
        nv=Math.max(1,nv+pctChange);
        addLog(`  ${pctMod>0?'📈':'📉'} 格子${pctMod>0?'+':''}${pctMod}%：${pctMod>0?'+':''}${pctChange} → ${nv}`);
      }

      // ── Step 3.6: 蕾雅升級百分比加成（永久，+2%可累積） ──
      const leyaPct=G.leyaPctMods?G.leyaPctMods[modKey]||0:0;
      if(leyaPct>0){
        const leyaChange=Math.ceil(nv*leyaPct/100);
        nv=nv+leyaChange;
        addLog(`  👩‍🔧 蕾雅+${leyaPct}%：+${leyaChange} → ${nv}`);
      }

      // ── Step 4: 商品熱銷固定加成 ──
      if(G.buff.goodsBonus&&prev.type==='goods'&&nt==='money'){
        nv+=G.buff.goodsBonus;
      }

      // ── Step 5: 下次輸出加成（nextBonus）──
      if(G.nextBonus&&G.nextBonus.amount>0){
        if(G.nextBonus.type==='any'||G.nextBonus.type===nt){
          nv+=G.nextBonus.amount;
          addLog(`  ✨ 下次輸出加成：+${G.nextBonus.amount}（${TLABEL[nt]}輸出）`,'g');
          G.nextBonus=null; // 消耗一次
        }
      }

      // ── Step 6: 合夥人設施命中效果 ──
      // 黑市商人：商品→金錢時額外倍率
      if(hasPartner('black_market')&&prev.type==='goods'&&nt==='money'){
        const st=G.partnerState.black_market||{mult:1.25};
        if(st.mult>1){
          const bmBonus=Math.ceil(nv*(st.mult-1));
          nv+=bmBonus;
          addLog(`  🕶️ 黑市商人：商品→金錢 ×${(st.mult*100).toFixed(0)}% +${bmBonus}`,'g');
        }
        st.mult=Math.max(1,st.mult-0.5);
        G.partnerState.black_market=st;
      }
      // 壟斷者負面：少於4商店時，商店不參與投入（跳過效果）
      if(hasPartner('monopolist')&&isShopType(bId)&&countAllShops()<4){
        nv=prev.value; nt=prev.type; // 還原為通過前狀態
        addLog(`  🎩 壟斷者：商店不足4個，${b.emoji}${b.name}不參與投入`,'b');
      }
      // 追蹤轉換方向（外匯交易員/套利者用）
      if(prev.type==='money'&&nt==='goods'){ G.inv.fxM2G=true; G.inv.arbM2G=true; }
      if(prev.type==='goods'&&nt==='money'){ G.inv.fxG2M=true; G.inv.arbG2M=true; }
      // 外匯交易員：已於 stepWithMover 進入此 cell 時統一處理（FX dispatch 之前），
      // 涵蓋 special 設施；per-cell 計數（不重複計算 overlay）

      el={value:nv,type:nt};

      pulse(r,c);
      cellEl?.classList.add('transform-flash');
      setTimeout(()=>cellEl?.classList.remove('transform-flash'),500);

      if(cellEl){
        const badge=document.createElement('div');
        badge.className='change-badge';
        badge.textContent=`${b.emoji} ${TLABEL[prev.type]}${prev.value}→${TLABEL[el.type]}${el.value}${el.value!==prev.value?` (+${el.value-prev.value})`:''}`;
        badge.style.background=TCOLOR[el.type]||'var(--green)';
        cellEl.style.position='relative';
        cellEl.appendChild(badge);
        setTimeout(()=>badge.remove(),700);
      }

      // partner onBuildingHit
      _runPartnerOnBuildingHit(G.grid[r][c]);
      const upgrade=upgradeBonus;
      // 建立算式說明（包含所有加成）
      let calcParts=[];
      const baseChg=b.fn(1)-1;
      if(baseChg!==0||nt!==prev.type) calcParts.push(`基礎${baseChg>=0?'+':''}${baseChg}`);
      if(G.buff.matCrash&&prev.type==='material') calcParts.push('原料大降');
      if(G.buff.matOutMult&&!G.buff.matCrash&&prev.type==='material'&&nt!=='material') calcParts.push(`出口熱×${G.buff.matOutMult}`);
      if(G.buff.matToMoneyDouble&&prev.type==='material'&&nt==='money') calcParts.push(`颱風×2`);
      if(upgrade>0) calcParts.push(`升級+${upgrade}`);
      if(cellMod>0) calcParts.push(`格子+${cellMod}`);
      if(cellMod<0) calcParts.push(`格子${cellMod}`);
      if(G.buff.goodsBonus&&prev.type==='goods'&&nt==='money') calcParts.push(`熱銷+${G.buff.goodsBonus}`);
      const calcStr=calcParts.length?`（${calcParts.join('，')}）`:'';
      addLog(`  ${b.emoji}${b.name}: ${TLABEL[prev.type]}${prev.value}→${TLABEL[el.type]}${el.value}${calcStr}`);
      // 大熱波：記錄設施轉換增益
      if(G.inv.facProfitMap){ const gain=el.value-_prevVal; if(gain>0) G.inv.facProfitMap[bId]=(G.inv.facProfitMap[bId]||0)+gain; }
      const _ovCnt = getOverlays(r,c).length;
      if(el.type!==prev.type) SFX.convert(G.inv.facHit-1, _ovCnt); else SFX.hit(G.inv.facHit-1, _ovCnt);
      // 疊加設施也吃相同加成
      el=applyOverlayPipeline(el,r,c,cellEl);
      updateCard(el);
      setTimeout(()=>{ if(_stepAnimGen!==gen) return; updateMover(el); _next(); },350);
      return;
    } else {
      // 類型不符：略過此格，繼續前進
      addLog(`  ⏭ ${b.emoji}${b.name} 類型不符（需要 ${TLABEL[b.req]}），略過`);
      if(cellEl){ cellEl.classList.remove('transform-flash'); void cellEl.offsetWidth; cellEl.classList.add('transform-flash'); setTimeout(()=>cellEl.classList.remove('transform-flash'),400); }
    }
  }
  _next(300);
}

function finish(el,startVal){
  if(stepWithMover._prevActive){stepWithMover._prevActive.classList.remove('active-path');stepWithMover._prevActive=null;}
  // ── 工業化模式：攔截結算，建立巨型設施 ──
  if(G._industrializing){
    G._industrializing=false;
    document.getElementById('indust-hint')?.remove();
    const dir=G.inv.sendDir;
    const idx=G.inv.sendIdx;
    const cellPath=G.inv.cellPath||[];
    // 計算入口格
    const gn=GN();
    let entryR=0, entryC=0;
    if(dir==='left'){entryR=idx;entryC=0;}
    if(dir==='right'){entryR=idx;entryC=gn-1;}
    if(dir==='top'){entryR=0;entryC=idx;}
    if(dir==='bottom'){entryR=gn-1;entryC=idx;}
    // 輸出類型
    if(el.type==='diamond') el={value:el.value,type:'money'};
    const finalMoney=el.type==='money'?el.value:Math.floor(el.value*0.6);
    const profit=Math.max(0,finalMoney-startVal);
    const outputType=el.type;
    // 建立巨型設施（使用實際路徑）
    const mega=createMegaFacilityFromRun(entryR,entryC,dir,cellPath,'money',outputType,profit);
    const _mi=megaIcons(mega);
    addLog(`🏭 工業化完成！${_mi.flow}，模擬收益 +${profit}`,'g');
    G.phase='done';
    render();
    return;
  }
  if(TUT.hookFinishPre(el)) return;
  // (人材幣機制已移除)
  // 嫉妒工廠：在 diamond→money 轉換前先捕獲 finalType，供匹配比對
  const _finalTypeForEnvy = el.type;
  // Diamond exits without shop: convert at face value (no bonus)
  if(el.type==='diamond') el={value:el.value,type:'money'};
  // Lust demon
  if(hasPartner('lust')){
    el=PARTNERS.lust.modifyFinish(G,el,G.inv.facHit||0);
  }
  const finalMoney=el.type==='money'?el.value:Math.floor(el.value*0.6);
  const profit=Math.max(0,finalMoney-startVal);
  const profitAtStart=G.profit;
  G.profit+=profit;
  if(profit>0){
    // 連續設施轉換 combo：經過 3 個以上設施且有收益，前置一段琶音
    if((G.inv.facHit||0)>=3) SFX.compoundLink();
    SFX.settle();
  }
  // 接近目標 80%：本輪首次觸及 80%~99%，輕鳴提示玩家快達標
  if(!G._near80Played && G.profit>=Math.ceil(G.goal*0.8) && G.profit<G.goal){
    G._near80Played=true;
    SFX.cardChange();
    const goalEl=document.getElementById('r-goal');
    if(goalEl){ goalEl.classList.remove('goal-flash'); void goalEl.offsetWidth; goalEl.classList.add('goal-flash'); }
  }
  // 清倉拍賣場：結算時入帳
  if(G.inv.clearanceBonus>0){
    G.profit+=G.inv.clearanceBonus;
    addLog(`  🏷️ 清倉拍賣場結算：+${G.inv.clearanceBonus}收益`,'g');
    (G.inv.clearanceCells||[]).forEach((cc,i)=>setTimeout(()=>profitFlyFromCell(cc.r,cc.c,cc.bonus),i*200));
    G.inv.clearanceBonus=0; G.inv.clearanceCells=[];
  }
  // 匯率波動板：效果已移至通過時（FACILITY_FX.exchange_board）；這裡不再做結算加成
  // ── 合夥人結算效果（onSettle hook） ──
  // 執行順序：依 G.partners 陣列順序（即招募順序）。
  // 後面的 onSettle 會吃到前面修改後的 G.profit。
  // 順序在此之後：稅務局(-10%) → 嫉妒工廠(-50%) → 勞工保險(-人材×2%)
  runPartnerHook('onSettle', profit, el);
  runContractHook('onSettle', profit, el);
  // ── 新設施結算效果 ──
  // H2: 世界奇觀：每有一個人材+8
  if(findCells((r,c,b)=>b==='world_wonder').length>0){
    const tc=G.talentCards||0;
    if(tc>0){ const wb=tc*8; G.profit+=wb; addLog(`🏟 世界奇觀：${tc}人材×8 → +${wb}收益`,'g'); }
  }
  // H3: 古代的機械工廠：所有工廠被投入+8（古代機械工廠視為 4 工廠；ancient_factory_part 為視覺佔位、不計）
  if(findCells((r,c,b)=>b==='ancient_factory').length>0&&profit>0){
    const factoryHits=countFactoryHits(G.inv.facPath);
    if(factoryHits>0){ const ab=factoryHits*8; G.profit+=ab; addLog(`🏛 古代機械工廠：${factoryHits}次工廠投入×8 → +${ab}收益`,'g'); }
  }
  // H4: 廢鐵城：回合結束消滅所有廢墟，+x收益（x每消滅設施+2累積）
  findCells((r,c,b)=>b==='scrap_city').forEach(([sr,sc])=>{
    const st=G.partnerState._scrapCity||{x:0};
    const ruinList=G.ruinCells?[...G.ruinCells]:[];
    if(ruinList.length>0){
      ruinList.forEach(key=>{
        const [rr,rc]=key.split(',').map(Number);
        G.grid[rr][rc]=null;
        G.ruinCells.delete(key);
        clearKeyedData(key);
      });
      addLog(`🏚 廢鐵城：消滅${ruinList.length}個廢墟，+${st.x}收益`,'g');
      G.profit+=st.x;
    }
    G.partnerState._scrapCity=st;
  });
  // H5: 災害控管局：回合結束每消滅一個設施+4（per-turn 累計，防多 send 重複）
  if(findCells((r,c,b)=>b==='disaster_bureau').length>0 && !G._disasterBureauFiredThisTurn){
    const destroyed=G._facilitiesDestroyedThisTurn||0;
    if(destroyed>0){
      const db=destroyed*4;
      G.profit+=db;
      addLog(`🛡 災害控管局：${destroyed}設施被消滅×4 → +${db}收益`,'g');
      G._disasterBureauFiredThisTurn=true;
    }
  }
  // H6: 員工住宅：本回合沒有資源投入此設施 → +4 人材（per-cell；防多 send 重複）
  {
    if(!G._staffHousingHitThisTurn) G._staffHousingHitThisTurn=new Set();
    if(!G._staffHousingFiredThisTurn) G._staffHousingFiredThisTurn=new Set();
    findCells((r,c,b)=>b==='staff_housing').forEach(([sr,sc])=>{
      const k=`${sr},${sc}`;
      if(G._staffHousingHitThisTurn.has(k)) return;
      if(G._staffHousingFiredThisTurn.has(k)) return;
      G.talentCards=(G.talentCards||0)+4;
      addLog(`🏠 員工住宅 (${sr+1},${sc+1})：本回合未投入，+4人材`,'g');
      G._staffHousingFiredThisTurn.add(k);
    });
  }
  // H7: 中央監督局：「此回合沒有資源投入此設施」時，每經過一個對應設施 +2 收益
  // 嚴格按 desc：用本次 send 的 facPath 計算「經過數」（古代機械工廠視為 4 工廠、百貨公司視為 4 商店）
  // _bureauHitThisTurn：此回合有投入過 bureau 本身 → 不觸發
  // 不再使用 _bureauFiredThisTurn（每次 send 都按該 send 實際經過數計算）
  {
    if(!G._bureauHitThisTurn) G._bureauHitThisTurn=new Set();
    const bureauCount={
      center_factory_bureau: ()=>countFactoryHits(G.inv.facPath),
      center_shop_bureau:    ()=>countShopHits(G.inv.facPath),
      center_mat_bureau:     ()=>countMatFactoryHits(G.inv.facPath),
    };
    Object.entries(bureauCount).forEach(([bId,getCount])=>{
      findCells((r,c,b)=>b===bId).forEach(([br,bc])=>{
        const k=`${br},${bc}`;
        if(G._bureauHitThisTurn.has(k)) return;       // 此回合有投入過 → 不觸發
        const count=getCount();
        if(count>0){
          const bb=count*2;
          G.profit+=bb;
          addLog(`${BLDG[bId].emoji} ${BLDG[bId].name} (${br+1},${bc+1})：本回合未投入此設施，經過${count}個目標設施×2 → +${bb}收益`,'g');
        }
      });
    });
  }
  // 稅務局：-10%最終收益（以本回合 G.profit 實際增量為基數，含 onSettle 加成）
  {
    const turnGain=G.profit-profitAtStart;
    if(turnGain>0){
      const taxCells=findCells((r,c,b)=>b==='tax_office');
      if(taxCells.length>0){
        const cut=Math.ceil(turnGain*0.1);
        G.profit-=cut;
        addLog(`  🏛 稅務局：-10% (-${cut})`,'b');
        setTimeout(()=>profitFlyFromCell(taxCells[0][0],taxCells[0][1],-cut),150);
      }
    }
  }
  // 嫉妒工廠：最終輸出與此設施隨機輸出相符 → 最終收益 +8（並使該效果永久 +8）
  // 用 _finalTypeForEnvy（diamond→money 轉換前的原始類型）比對，避免 diamond 被改成 money 後永遠不匹配
  if(hasPartner('envy') && G.inv._envyOut && _finalTypeForEnvy === G.inv._envyOut){
    const st = G.partnerState.envy || {matchBonus: 8};
    G.profit += st.matchBonus;
    addLog(`💚 嫉妒工廠：最終輸出 ${TLABEL[_finalTypeForEnvy]} 與工廠輸出相符，+${st.matchBonus} 收益（下次匹配 +${st.matchBonus+8}）`,'g');
    if(G.inv._envyCell){
      const [er, ec] = G.inv._envyCell;
      setTimeout(()=>profitFlyFromCell(er, ec, st.matchBonus),150);
      // 嫉妒匹配特效：「+N！」金光 + 上揚音
      if(typeof showEnvyMatchFlash==='function') showEnvyMatchFlash(er, ec, st.matchBonus);
    }
    st.matchBonus += 8;
    G.partnerState.envy = st;
  }
  // 黃牛販子：本次投入有經過且最終收益為 0 時 -8
  if((G.inv._scalperHits||0)>0 && profit<=0){
    G.profit-=8;
    addLog(`🎫 黃牛販子：本回合沒有獲得收益，-8`,'b');
    const scCells=findCells((r,c,b)=>b==='scalper');
    if(scCells.length>0) setTimeout(()=>profitFlyFromCell(scCells[0][0],scCells[0][1],-8),150);
  }
  // 勞工保險：最終收益扣除 人材數×2%
  if(G.buff&&G.buff.laborInsurance&&profit>0){
    const talents=G.talentCards||0;
    const pct=talents*2;
    if(pct>0){
      const cut=Math.ceil(profit*pct/100);
      G.profit-=cut;
      addLog(`📋 勞工保險：人材${talents}×2=${pct}%，收益-${cut}`,'b');
    }
  }
  // 移動都市負面：本回合若沒有投入過廢墟，最終收益變為 0
  if(findCells((r,c,b)=>b==='mobile_city').length>0 && !G._ruinPassedThisTurn){
    const cut=G.profit-profitAtStart;
    if(cut>0){
      G.profit=profitAtStart;
      addLog(`🏙 移動都市：本回合未投入廢墟，最終收益歸 0（-${cut}）`,'b');
      const mcCells=findCells((r,c,b)=>b==='mobile_city');
      if(mcCells.length>0) setTimeout(()=>profitFlyFromCell(mcCells[0][0],mcCells[0][1],-cut),150);
    }
  }
  addLog(`💰 結算：${TLABEL[el.type]}${el.value} → 入帳${finalMoney}，+${profit}收益`,'g');

  // 收益飛行動畫
  const profitEl=document.getElementById('el-profit');
  const profitRect=profitEl.getBoundingClientRect();
  const targetEl=document.getElementById('r-profit');
  const targetRect=targetEl.getBoundingClientRect();
  const fly=document.createElement('div');
  fly.className='profit-fly';
  fly.textContent=`+${profit}`;
  fly.style.left=profitRect.left+'px';
  fly.style.top=profitRect.top+'px';
  const dx=targetRect.left-profitRect.left;
  fly.style.setProperty('--fly-x',dx+'px');
  document.body.appendChild(fly);
  setTimeout(()=>fly.remove(),1300);

  // 累積本回合投入次數：SFX 會映射到五聲音階（避免刺耳音程），上限在 pitchOffset 內處理
  G._turnPitchOffset = (G._turnPitchOffset||0) + 1;

  // ── 合約永久效果：終點 / 擴展 / 地產‧產線 違約 zero-profit ──
  // 終點合約：本次投入第一格與最後一格皆需為終點站，否則本次收益歸零
  if(hasActiveContract('terminal_contract')){
    const facPath = (G.inv && G.inv.facPath) || [];
    const first = facPath[0];
    const last = facPath[facPath.length-1];
    if(facPath.length === 0 || first !== 'terminal' || last !== 'terminal'){
      if(G.profit > profitAtStart){
        const lost = G.profit - profitAtStart;
        G.profit = profitAtStart;
        addLog(`📜 終點合約：投入未以終點站起終，本次收益歸零（−${lost}）`,'b');
      }
    }
  }
  // 擴展合約：小鎮未填滿時，每空一格 −5% 當前收益（線性疊加，最多扣到 profitAtStart）
  if(hasActiveContract('expand_contract')){
    let empties = 0;
    for(let r=0;r<GN();r++) for(let c=0;c<GN();c++){
      if(!isFacility(G.grid[r][c])) empties++;
    }
    if(empties > 0){
      const pctLoss = Math.min(1, empties * 0.05);
      const before = G.profit;
      const target = Math.floor(G.profit * (1 - pctLoss));
      G.profit = Math.max(profitAtStart, target);
      const actualLoss = before - G.profit;
      if(actualLoss > 0) addLog(`📜 擴展：小鎮空 ${empties} 格（−${empties*5}%）→ 本次收益 −${actualLoss}`,'b');
    }
  }
  // 地產 / 產線 違約：剩餘 N 回合本次收益歸零
  if((G._contractProfitZeroTurns||0) > 0){
    if(G.profit > profitAtStart){
      const lost = G.profit - profitAtStart;
      G.profit = profitAtStart;
      addLog(`📜 合約違約：本次收益歸零（剩 ${G._contractProfitZeroTurns} 回合）`,'b');
    }
  }

  // 計算本回合總收益（含所有合夥人加成）並更新顯示
  const totalTurnProfit=G.profit-profitAtStart;
  _trackContractMaxSendProfit(totalTurnProfit);
  // 追蹤連續零收益回合（安全網機制）
  if(totalTurnProfit<=0) G._zeroProfitTurns=(G._zeroProfitTurns||0)+1;
  else G._zeroProfitTurns=0;
  const hasBonus=totalTurnProfit!==profit;
  const _profitColor = totalTurnProfit>=0 ? 'var(--green)' : 'var(--red)';
  const _profitSign = totalTurnProfit>=0 ? '+' : '';
  let profitHTML=`<span style="color:${_profitColor};font-size:18px;">${_profitSign}${totalTurnProfit}</span>`;
  if(hasBonus) profitHTML+=`<div style="font-size:9px;color:var(--mu);margin-top:2px;">投入+${profit}，加成${totalTurnProfit-profit>=0?'+':''}${totalTurnProfit-profit}</div>`;
  document.getElementById('el-profit').innerHTML=profitHTML;

  if((G.elementExtraUses||0)>0){
    G.elementExtraUses--;
    addLog(`🧑‍💼 人材效果：可再投入一次（剩餘 ${G.elementExtraUses} 次）`,'g');
    G.phase='place';
    G._extraUsePhase=true; // 標記：額外投入階段，允許跳過
    updateCard(el);
    render();
    return;
  }
  G._extraUsePhase=false;
  // ── 大熱波追蹤與檢查 ──
  checkHeatwave();

  G.phase='done';
  G._turnInvested=true; // 旗標：本回合已完成投入（供按鈕容錯）
  updateCard(el);
  render();

  if(TUT.hookFinishPost(totalTurnProfit)) return;

  // 首次達標：記錄回合數 + 達標視覺/音效（Modal 在 600ms 後才出現，先給即時回饋）
  if(G.profit>=G.goal && !G._goalReachedTurn){
    G._goalReachedTurn=G.turn;
    showGoalReachedFx();
  }

  if(G.profit>=G.goal&&!G._winPending){
    G._winPending=true;
    const turnsUsed=G._goalReachedTurn||G.turn;
    setTimeout(()=>performWinSettlement(turnsUsed),600);
  }
}

// 目標達成瞬間視覺+音效（Modal 顯示前的即時回饋）
function showGoalReachedFx(){
