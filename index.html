function pickActionOptions(){
  const shuffled=[...ACTION_POOL].sort(()=>Math.random()-.5);
  G.actionOptions=shuffled.slice(0,2);
}

function pickNextEvent(){
  // 預告下一個 EVENT_INTERVAL 倍數回合的事件
  const nextEvTurn = Math.ceil((G.turn+1)/EVENT_INTERVAL)*EVENT_INTERVAL;
  // 莫菲定律後，下次事件限定池
  let pool=G._murphyNextPool
    ? EVENTS.filter(e=>['pick_fac','earthquake','job_assist','leya_gift'].includes(e.id))
    : EVENTS.filter(e=>e.id!=='murphy'); // 莫菲定律不進預告池
  G._murphyNextPool=false;
  G.nextEvent=pool[Math.floor(Math.random()*pool.length)];
  G.nextEventTurn=nextEvTurn;
  G.nextEventData=precomputeEventData(G.nextEvent);
}
// 莫菲定律：事件觸發時檢查是否劫持（第2輪起）
function checkMurphyHijack(){
  if(G.round<2||TUT.active) return false;
  const mt=G._murphyTrack||{repeatCount:0,noMove:0};
  const murphyWeight=1+Math.max(0,mt.repeatCount-3)*3+Math.max(0,mt.noMove-5)*2;
  if(murphyWeight<=1) return false;
  // 機率上限 60%，防止高權重時必發
  const prob=Math.min(0.6, murphyWeight/(murphyWeight+5));
  return Math.random()<prob;
}

function precomputeEventData(ev){
  if(!ev) return null;
  const gn=GN();
  const data={cells:[]};
  if(ev.id==='row_buff'){
    data.r1=Math.floor(Math.random()*gn);
    data.r2=(data.r1+1+Math.floor(Math.random()*(gn-1)))%gn;
    for(let i=0;i<gn;i++){ data.cells.push(`${data.r1},${i}`); data.cells.push(`${data.r2},${i}`); }
  } else if(ev.id==='col_buff'){
    data.c1=Math.floor(Math.random()*gn);
    data.c2=(data.c1+1+Math.floor(Math.random()*(gn-1)))%gn;
    for(let i=0;i<gn;i++){ data.cells.push(`${i},${data.c1}`); data.cells.push(`${i},${data.c2}`); }
  } else if(ev.id==='area_buff'){
    data.r1=Math.floor(Math.random()*(gn-1)); data.c1=Math.floor(Math.random()*(gn-1));
    do{ data.r2=Math.floor(Math.random()*(gn-1)); data.c2=Math.floor(Math.random()*(gn-1)); }while(data.r2===data.r1&&data.c2===data.c1);
    for(let dr=0;dr<2;dr++) for(let dc=0;dc<2;dc++){ data.cells.push(`${data.r1+dr},${data.c1+dc}`); data.cells.push(`${data.r2+dr},${data.c2+dc}`); }
  } else if(ev.id==='rebellion'){
    const corners=[[0,0],[0,gn-1],[gn-1,0],[gn-1,gn-1]];
    const count=Math.floor(Math.random()*4)+1;
    data.victims=corners.sort(()=>Math.random()-.5).slice(0,count);
    data.victims.forEach(([r,c])=>data.cells.push(`${r},${c}`));
  } else if(ev.id==='earthquake'){
    const dirs=['top','bottom','left','right'];
    data.dir=dirs[Math.floor(Math.random()*4)];
    for(let r=0;r<gn;r++) for(let c=0;c<gn;c++) if(isFacility(G.grid[r][c])) data.cells.push(`${r},${c}`);
  } else if(ev.id==='hazardous_waste'){
    const empties=[];
    for(let r=0;r<gn;r++) for(let c=0;c<gn;c++) if(!G.grid[r][c]||G.grid[r][c]==='ruin') empties.push([r,c]);
    data.picks=empties.sort(()=>Math.random()-.5).slice(0,1);
    data.picks.forEach(([r,c])=>data.cells.push(`${r},${c}`));
  } else if(ev.id==='leya_gift'){
    const filled=[];
    for(let r=0;r<gn;r++) for(let c=0;c<gn;c++) if(isFacility(G.grid[r][c])) filled.push([r,c]);
    if(filled.length>0){ data.target=filled[Math.floor(Math.random()*filled.length)]; data.cells.push(`${data.target[0]},${data.target[1]}`); }
  } else if(ev.id==='murphy'){
    // 預告高亮所有設施格
    for(let r=0;r<gn;r++) for(let c=0;c<gn;c++) if(isFacility(G.grid[r][c])) data.cells.push(`${r},${c}`);
  }
  return data;
}

function doAction(id){
  // 立即關閉卡牌
  document.getElementById('action-chooser').style.display='none';
  const act=ACTION_POOL.find(a=>a.id===id);
  if(!act)return;
  const actCost=Math.ceil(act.cost*Math.max(1,(1+(G.round-1)*0.5)));
  if(G.profit<actCost){ addLog(`⚠ 收益不足（需要 ${actCost}，現有 ${G.profit}）`,'b'); return; }
  G.profit-=actCost;

  if(id==='buy_fac'){
    const pool=Object.keys(BLDG).filter(bid=>bid!=='envy_factory'&&bid!=='ruin'&&bid!=='dept_store_part').sort(()=>Math.random()-.5).slice(0,3);
    const refund=actCost;
    showCardChooser(
      '🏗 選擇一個設施加入手牌',
      pool.map(bid=>({
        emoji:BLDG[bid].emoji, name:BLDG[bid].name,
        desc:BLDG[bid].desc, pos:'', neg:'',
        onclick:`cardChooserPick(()=>{evPick('${bid}',null)})`
      })),
      ()=>{G.profit+=refund; closeActionOverlay(); G.actionOptions=[]; startTurn();}
    );
    G.phase='event'; render(); return;
  }
  if(id==='trig_ev'){
    triggerEvent(); return;
  }
  if(id==='move_fac'){
    // 進入自由排列模式（無論是否有拆遷隊都一樣）
    G._gridSnapshot=G.grid.map(r=>[...r]);
    G._upgradesSnapshot=JSON.parse(JSON.stringify(G.bldgUpgrades||{}));
    G._leyaSnapshot=JSON.parse(JSON.stringify(G.leyaPctMods||{}));
    G._cellModsSnapshot=JSON.parse(JSON.stringify(G.cellMods||{}));
    G.freeRearrange=true; G.moveMode=false; G.moveSrc=null;
    addLog('🔧 自由排列模式：拖曳設施到想要的位置，完成後點「確認排列」');
    G.phase='place'; render(); return;
  }
  if(id==='get_partner'){
    const pool=Object.keys(PARTNERS).filter(pid=>!hasPartner(pid));
    if(!pool.length){addLog('⚠ 已招募所有合夥人','b');G.profit+=actCost;startTurn();return;}
    const picks=pool.sort(()=>Math.random()-.5).slice(0,3);
    const refund=actCost;
    showCardChooser(
      '🤝 招募合夥人',
      picks.map(pid=>({
        emoji:PARTNERS[pid].emoji, name:PARTNERS[pid].name,
        desc:PARTNERS[pid].desc||'',
        pos:PARTNERS[pid].pos||'', neg:PARTNERS[pid].neg||'',
        onclick:`cardChooserPick(()=>{recruitPartner('${pid}');startTurn();})`
      })),
      ()=>{G.profit+=refund; closeActionOverlay(); G.actionOptions=[]; startTurn();}
    );
    G.phase='event'; render(); return;
  }
  if(id==='upgrade'){
    const filled=[];
    for(let r=0;r<N;r++) for(let cc=0;cc<N;cc++) if(isFacility(G.grid[r][cc])) filled.push([r,cc]);
    if(!filled.length){addLog('⚠ 沒有可提升的設施','b');G.profit+=act.cost;startTurn();return;}
    G.upgradeMode=true;
    G.phase='place';
    addLog('⬆ 點擊想要提升的設施（永久 +1 輸出）','w');
    render();
    return;
  }
  if(id==='next_bonus'){
    const types=['money','material','goods'];
    const t=types[Math.floor(Math.random()*types.length)];
    G.nextBonus={type:t,amount:3};
    addLog(`✨ 下次 ${TLABEL[t]} 輸出時額外 +3`,'g');
  }
  if(id==='swap_ev'){
    pickNextEvent();
    addLog(`🔄 預告事件已更換為：${G.nextEvent.title}`,'g');
  }
  if(id==='nothing'){
    addLog('😴 什麼也沒發生，收益保留');
  }

  closeActionOverlay();
  G.actionOptions=[];
  startTurn();
}

function upgradeCell(r,c){
  hideEv();
  const bId=G.grid[r][c];
  if(!isFacility(bId)) return;
  const b=BLDG[bId];
  const key=`${r},${c}`;
  G.bldgUpgrades[key]=(G.bldgUpgrades[key]||0)+1;
  addLog(`⬆ ${b.emoji}${b.name} (${r+1},${c+1}) 升級！+${G.bldgUpgrades[key]}`,'g');
  G.upgradeMode=false;
  G.actionOptions=[];
  pulse(r,c);
  G.phase='place'; render();
}

function recruitPartner(pid){
  G.partners.push(pid);
  if(PARTNERS[pid]&&PARTNERS[pid].onRecruit) PARTNERS[pid].onRecruit(G);
  if(!G.partnerState[pid]&&PARTNERS[pid].state) G.partnerState[pid]={...PARTNERS[pid].state};
  addLog(`🤝 招募了 ${PARTNERS[pid].emoji}${PARTNERS[pid].name}！`,'g');
  if(pid==='envy') addHand('envy_factory');
  // 場風大師：招募後立即設定本回合方向
  if(pid==='wind_master'&&!G.windDir){
    const dirs=['left','right','top','bottom'];
    const labels={left:'← 左側',right:'→ 右側',top:'↑ 上方',bottom:'↓ 下方'};
    G.windDir=dirs[Math.floor(Math.random()*dirs.length)];
    addLog(`🌀 場風大師：本回合只能從 ${labels[G.windDir]} 投入，獲得×2倍率`,'w');
  }
  G.actionOptions=[];
  closeActionOverlay();
  renderPartners();
  render();
}

// ── 自由排列拖曳系統 ──
let _rearrangeSrc=null;
function onRearrangeDragStart(e,r,c){
  if(!G.freeRearrange||!G.grid[r][c]){e.preventDefault();return;}
  _rearrangeSrc=[r,c];
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain','rearrange');
  const cellEl=document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  if(cellEl) cellEl.style.opacity='0.4';
  // 高亮所有格子為可放置目標
  document.querySelectorAll('.cell').forEach(el=>{
    if(el.dataset.r!==String(r)||el.dataset.c!==String(c)) el.classList.add('drag-target');
  });
}
function onRearrangeDragEnd(e){
  _rearrangeSrc=null;
  document.querySelectorAll('.cell').forEach(el=>{el.style.opacity='';el.classList.remove('drag-target');el.classList.remove('drag-over-cell');});
}
function onRearrangeDragOver(e,r,c){
  if(!_rearrangeSrc) return;
  const [sr,sc]=_rearrangeSrc;
  if(r===sr&&c===sc) return;
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  const cellEl=document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  if(cellEl) cellEl.classList.add('drag-over-cell');
}
function onRearrangeDragLeave(r,c){
  if(!_rearrangeSrc) return;
  const cellEl=document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  if(cellEl) cellEl.classList.remove('drag-over-cell');
}
function onRearrangeDrop(e,r,c){
  if(!_rearrangeSrc) return;
  e.preventDefault();
  const [sr,sc]=_rearrangeSrc;
  _rearrangeSrc=null;
  document.querySelectorAll('.cell').forEach(el=>{el.style.opacity='';el.classList.remove('drag-target');el.classList.remove('drag-over-cell');});
  if(r===sr&&c===sc) return;
  const srcId=G.grid[sr][sc], dstId=G.grid[r][c];

  // 蕾雅：相同設施合併升級
  if(hasPartner('leya')&&isFacility(srcId)&&srcId===dstId){
    const ku=`${sr},${sc}`, kv=`${r},${c}`;
    G.grid[sr][sc]=null;
    // 合併升級值：目標 += 來源 + 1
    const srcUpg=G.bldgUpgrades[ku]||0;
    G.bldgUpgrades[kv]=(G.bldgUpgrades[kv]||0)+srcUpg+1;
    delete G.bldgUpgrades[ku];
    // 合併蕾雅百分比：目標 += 來源 + 2%
    const srcLeya=G.leyaPctMods[ku]||0;
    G.leyaPctMods[kv]=(G.leyaPctMods[kv]||0)+srcLeya+2;
    delete G.leyaPctMods[ku];
    addLog(`👩‍🔧 蕾雅：合併 ${BLDG[srcId].emoji}${BLDG[srcId].name} (${sr+1},${sc+1})→(${r+1},${c+1}) 升級！+${G.bldgUpgrades[kv]}, +${G.leyaPctMods[kv]}%`,'g');
    pulse(r,c); render();
    return;
  }

  // 一般交換
  swapCellData(sr,sc,r,c);
  addLog(`🔧 已交換 (${sr+1},${sc+1}) ↔ (${r+1},${c+1})`,'g');
  onFacilityMoved(r,c,sr,sc);
  G.moveSrc=null;
  pulse(r,c); render();
}

function cancelRearrange(){
  // 還原到進入排列模式前的狀態
  if(G._gridSnapshot){
    G.grid=G._gridSnapshot;
    G.bldgUpgrades=G._upgradesSnapshot||{};
    G.leyaPctMods=G._leyaSnapshot||{};
    G.cellMods=G._cellModsSnapshot||{};
    delete G._gridSnapshot;
    delete G._upgradesSnapshot;
    delete G._leyaSnapshot;
    delete G._cellModsSnapshot;
  }
  G.freeRearrange=false; G.moveSrc=null;
  G._demolitionRearrange=false;
  addLog('↩ 取消排列，設施已還原');
  render();
}
function confirmRearrange(){
  // 只有從拆遷隊啟動的重排才扣次數
  if(G._demolitionRearrange && hasPartner('demolition')){
    G.demolitionCharges=Math.max(0,(G.demolitionCharges||0)-1);
    addLog(`🔨 拆遷隊使用 1 次，剩餘 ${G.demolitionCharges} 次`,'g');
  }
  G._demolitionRearrange = false;
  // 莫菲定律：重排後重置未移動計數
  if(G._murphyTrack) G._murphyTrack.noMove=0;
  delete G._gridSnapshot;
  delete G._upgradesSnapshot;
  delete G._leyaSnapshot;
  delete G._cellModsSnapshot;
  G.freeRearrange=false; G.moveSrc=null;
  addLog('✅ 設施排列已確定','g');
  render();
  // 教學 hook：確認排列後回到等待狀態，讓玩家可繼續投入或結束回合
  if(TUT.active && TUT.waitingFor === 'confirm_rearrange'){
    TUT.waitingFor = 'use_demolition';
    document.getElementById('btn-next').disabled=false;
  }
}

function startTurn(){
  G.phase='place';
  G._talentUsedOnElement = false;
  G._demoExpertMode = false;
  G._hrUsedThisTurn = false; // 人力資源總監每回合重置
  // 莫菲定律：用上回合的 turnFacMoved（重置前）判斷是否有移動
  if(!G._murphyTrack) G._murphyTrack={lastSend:null,repeatCount:0,noMove:0};
  if(G.turnFacMoved===0&&G.turn>1) G._murphyTrack.noMove++;
  else G._murphyTrack.noMove=0;
  G.turnFacMoved = 0; // 動態加強器用：本回合設施移動計數（重置放在檢查之後）
  // 合夥人每回合開始效果
  G.partners.forEach(pid=>{
    const p=PARTNERS[pid];
    if(p&&p.onTurnStart) p.onTurnStart(G);
  });

  // 勞動部長：上回合使用人材 → 本次投入+5；未使用 → 收益-5%
  if(hasPartner('labor_minister')){
    if(G._laborMinisterUsed){
      G.nextBonus=G.nextBonus||{type:'any',amount:0};
      G.nextBonus.amount+=5;
      addLog(`🎩 勞動部長：上回合使用人材，本次投入+5`,'g');
      G._laborMinisterUsed=false;
    } else if(G.turn>1){
      const cut=Math.ceil(G.profit*0.05);
      if(cut>0){ G.profit=Math.max(0,G.profit-cut); addLog(`🎩 勞動部長：未使用人材，收益-5% -${cut}`,'b'); }
    }
  }
  // 地皮炒家：累計未移動回合數，超過3回合的設施-1
  if(hasPartner('land_speculator')){
    if(!G._landSpecStale) G._landSpecStale={};
    for(let _r=0;_r<GN();_r++) for(let _c=0;_c<GN();_c++){
      if(G.grid[_r][_c]){
        const k=`${_r},${_c}`;
        G._landSpecStale[k]=(G._landSpecStale[k]||0)+1;
        if(G._landSpecStale[k]>3){
          const penalty=G._landSpecStale[k]-3;
          G.cellMods[k]=(G.cellMods[k]||0)-penalty;
          addLog(`🏚️ 地皮炒家：(${_r+1},${_c+1}) ${penalty}回合未移動，-${penalty}`,'b');
        }
      }
    }
  }

  // 稅務局：每回合開始隨機升級一個設施
  {
    const taxCells=findCells((r,c,b)=>b==='tax_office');
    if(taxCells.length>0){
      const allFilled=[];
      findCells((r,c,b)=>isFacility(b)&&b!=='tax_office').forEach(p=>allFilled.push(p));
      if(allFilled.length>0){
        const [tr,tc]=allFilled[Math.floor(Math.random()*allFilled.length)];
        const key=`${tr},${tc}`;
        G.bldgUpgrades[key]=(G.bldgUpgrades[key]||0)+1;
        addLog(`🏛 稅務局：${BLDG[G.grid[tr][tc]].emoji}${BLDG[G.grid[tr][tc]].name} (${tr+1},${tc+1}) 自動升級！`,'w');
      }
    }
  }

  // 磁力板：每回合開始與相鄰隨機設施交換位置
  {
    const magnets=[];
    for(let r=0;r<GN();r++) for(let cc=0;cc<GN();cc++){
      if(G.grid[r][cc]==='magnet_plate') magnets.push([r,cc]);
    }
    // 隨機順序處理，避免固定優先
    magnets.sort(()=>Math.random()-.5);
    const swapped=new Set(); // 避免同一格被重複交換
    magnets.forEach(([mr,mc])=>{
      const mk=`${mr},${mc}`;
      if(swapped.has(mk)) return;
      const adj=[[mr-1,mc],[mr+1,mc],[mr,mc-1],[mr,mc+1]]
        .filter(([ar,ac])=>ar>=0&&ar<GN()&&ac>=0&&ac<GN()&&isFacility(G.grid[ar][ac])&&!swapped.has(`${ar},${ac}`));
      if(adj.length===0) return;
      const [tr,tc]=adj[Math.floor(Math.random()*adj.length)];
      const tmp=G.grid[tr][tc];
      swapCellData(mr,mc,tr,tc);
      swapped.add(mk); swapped.add(`${tr},${tc}`);
      addLog(`🧲 磁力板 (${mr+1},${mc+1}) ↔ ${BLDG[tmp].emoji}${BLDG[tmp].name} (${tr+1},${tc+1})`,'w');
      onFacilityMoved(tr,tc,mr,mc);
    });
  }

  // 爆破裝置：倒數計時（先收集再處理，避免迭代中修改 grid）
  if(!G.bombTimers) G.bombTimers={};
  const _bombs=[];
  for(let r=0;r<GN();r++) for(let cc=0;cc<GN();cc++){
    if(G.grid[r][cc]==='bomb_device') _bombs.push([r,cc]);
  }
  _bombs.forEach(([r,cc])=>{
    if(G.grid[r][cc]!=='bomb_device') return; // 已被其他爆炸波及消滅
    const key=`${r},${cc}`;
    if(G.bombTimers[key]===undefined) G.bombTimers[key]=3;
    G.bombTimers[key]--;
    if(G.bombTimers[key]<=0){
      // 先記錄相鄰設施（爆炸前）
      const adj=[[r-1,cc],[r+1,cc],[r,cc-1],[r,cc+1]]
        .filter(([ar,ac])=>ar>=0&&ar<GN()&&ac>=0&&ac<GN()&&isFacility(G.grid[ar][ac])&&G.grid[ar][ac]!=='bomb_device');
      addLog(`💣 爆破裝置 (${r+1},${cc+1}) 爆炸！`,'b');
      destroyFacility(r,cc);
      if(adj.length>0){
        const [tr,tc]=adj[Math.floor(Math.random()*adj.length)];
        const victimId=G.grid[tr][tc];
        if(victimId){
          addLog(`💣 爆炸波及：${BLDG[victimId].emoji}${BLDG[victimId].name} (${tr+1},${tc+1}) 被消滅！`,'b');
          destroyFacility(tr,tc);
        }
      } else {
        addLog(`💣 周圍無設施，未波及`);
      }
      delete G.bombTimers[key];
    } else {
      addLog(`💣 爆破裝置 (${r+1},${cc+1}) 倒數 ${G.bombTimers[key]} 回合`);
    }
  });

  // 人力訓練中心：每回合+1人材
  for(let r=0;r<GN();r++) for(let cc=0;cc<GN();cc++){
    if(G.grid[r][cc]==='talent_training'){
      G.talentCards=(G.talentCards||0)+1;
      addLog(`🎓 人力訓練中心 (${r+1},${cc+1})：+1人材（共${G.talentCards}）`,'g');
    }
  }
  // 公路之星：每回合中央隨機2格+2，每10回合累積+2（10→+4，20→+6…）
  if(hasPartner('highway_star')){
    const centerList=[...getCenterCells()].sort(()=>Math.random()-.5).slice(0,2);
    const tier = Math.floor(G.turn / 10);
    const bonus = 2 + tier * 2;
    centerList.forEach(key=>{
      G.cellMods[key]=(G.cellMods[key]||0)+bonus;
    });
    addLog(`🌟 公路之星：中央2格+${bonus}${tier>0?`（${tier}階加成）`:''}（${centerList.join(' ')}）`,'g');
    G.inv.hwCenter=false;
  }
  // 期貨交易所：上回合被觸發的交易所移動到隨機空格
  if(G._futuresMoveNext&&G._futuresMoveNext.length>0){
    G._futuresMoveNext.forEach(({r,c})=>{
      if(G.grid[r][c]!=='futures_market') return;
      const gn=GN();
      const empties=[];
      for(let er=0;er<gn;er++) for(let ec=0;ec<gn;ec++) if(!G.grid[er][ec]) empties.push([er,ec]);
      if(empties.length>0){
        const [nr,nc]=empties[Math.floor(Math.random()*empties.length)];
        G.grid[r][c]=null; G.grid[nr][nc]='futures_market';
        // 轉移附帶資料
        const ok=`${r},${c}`, nk=`${nr},${nc}`;
        ['bldgUpgrades','leyaPctMods','cellMods','bombTimers','cellOverlay','tempShedMoves','logisticsVault','futuresPct'].forEach(dk=>{
          if(G[dk]&&G[dk][ok]!==undefined){ G[dk][nk]=G[dk][ok]; delete G[dk][ok]; }
        });
        // 轉移並重新抽選百分比
        if(G.futuresPct){ delete G.futuresPct[ok]; }
        if(!G.futuresPct) G.futuresPct={};
        G.futuresPct[nk]=Math.floor(Math.random()*21)-10;
        addLog(`🏛 期貨交易所 (${r+1},${c+1})→(${nr+1},${nc+1}) 移動，本回合 ${G.futuresPct[nk]>=0?'+':''}${G.futuresPct[nk]}%`,'w');
      } else {
        // 沒有空格，消滅自己
        destroyFacility(r,c);
        addLog(`🏛 期貨交易所 (${r+1},${c+1}) 無空格可移動，自我消滅！`,'b');
      }
    });
    G._futuresMoveNext=[];
  }
  // 期貨交易所：每回合重新抽選所有期貨的百分比
  {
    if(!G.futuresPct) G.futuresPct={};
    const gn=GN();
    for(let r=0;r<gn;r++) for(let c=0;c<gn;c++){
      if(G.grid[r][c]==='futures_market'){
        const k=`${r},${c}`;
        G.futuresPct[k]=Math.floor(Math.random()*21)-10;
      }
    }
  }
  // 場風大師：每回合重新抽方向（颱風時不覆蓋）
  if(hasPartner('wind_master')){
    const dirs=['left','right','top','bottom'];
    const labels={left:'← 左側',right:'→ 右側',top:'↑ 上方',bottom:'↓ 下方'};
    G.windDir=dirs[Math.floor(Math.random()*dirs.length)];
    addLog(`🌀 場風大師：本回合只能從 ${labels[G.windDir]} 投入，獲得×2倍率`,'w');
  } else if(!(G.buff&&G.buff.typhoonActive)){
    G.windDir=null;
  }
  addLog(`── 回合 ${G.turn}/${G.maxTurns} ──`);
  render();
  // 人材發光提示
  if((G.talentCards||0)>0){
    const tt=document.querySelector('.talent-token');
    if(tt){ tt.classList.remove('talent-glow'); void tt.offsetWidth; tt.classList.add('talent-glow'); }
  }
  if(hasPartner('tanya')){
    tanyaOfferSwap(); // 譚雅：先交換再選行動
  } else {
    openActionOverlay();
  }
}

// ══════════════════════════════════════
// 回合推進
// ══════════════════════════════════════
function scaledCost(base){
  return Math.ceil(base*Math.max(1,(1+(G.round-1)*0.5)));
}
function doNext(){
  // Tutorial hook: step8 玩家可在 place 階段直接結束回合跳過拆遷隊
  if(TUT.active && (TUT.waitingFor==='use_demolition'||TUT.waitingFor==='confirm_rearrange')){
    TUT.waitingFor=null;
    document.querySelectorAll('.joker-card').forEach(c=>{c.style.outline='';c.style.animation='';});
    TUT.step=8;
    TUT.next();
    return;
  }
  if(G.phase!=='done')return;
  // Tutorial hook
  if(TUT.active && TUT.waitingFor==='end_turn'){ TUT.onAction('end_turn'); return; }
  // Tutorial hook: step6 結束回合後進入 step7（回合3）
  if(TUT.active && TUT.waitingFor==='tut_end_turn_for_partner'){
    G.turn = 3; // 推進到回合3
    render();
    TUT.waitingFor = null;
    TUT.step = 6;
    TUT.next();
    return;
  }
  // 教學模式下，如果沒有預期的 waitingFor，不執行正常回合推進
  if(TUT.active){
    return;
  }

  // 儲存本回合 log 到歷史
  commitTurnLog();

  // 每回合結束清除格子修正（只持續一回合）
  G.cellMods={}; G.cellPctMods={};
  G.buff={};G.sel=null;G.moveMode=false;G.moveSrc=null;

  // 回合用盡（未達標）→ 失敗
  if(G.turn>=G.maxTurns){
    showModal('lose',`第 ${G.round} 輪失敗！\n收益 ${G.profit} / 目標 ${G.goal}\n差距 ${G.goal-G.profit}`);
    return;
  }

  G.turn++;

  // 達到預定回合時觸發事件（延遲事件可能提前至 turn 2 或 1）
  if(G.nextEvent && G.turn>=G.nextEventTurn){
    let ev=G.nextEvent;
    G._eventDeferred=0;
    // 莫菲定律劫持：第2輪起根據權重替換預告事件
    if(checkMurphyHijack()){
      ev=EVENTS.find(e=>e.id==='murphy');
    }
    G.nextEvent=null;
    G.cellMods={}; G.cellPctMods={}; // 確保事件效果從乾淨狀態套用
    G.phase='event';
    ev.show(ev);
    pickNextEvent();
    render();
    return;
  }

  // 產生本回合2個行動選項
  pickActionOptions();
  startTurn();
}

function openActionOverlay(){
  const chooser=document.getElementById('action-chooser');
  const cards=document.getElementById('action-cards');
  DM.onActionOpen();
  if(!G.actionOptions||G.actionOptions.length===0){chooser.style.display='none';return;}
  // Check if player can afford any option
  const canAffordAny=G.actionOptions.some(a=>G.profit>=scaledCost(a.cost));
  cards.innerHTML=G.actionOptions.map(act=>{
    const sc=scaledCost(act.cost);
    const canAfford=G.profit>=sc;
    return `<div class="acard ${!canAfford?'acard-disabled':''}" onclick="${canAfford?`doAction('${act.id}')`:''}" onmouseenter="DM.onActionHover('${act.label.replace(/^[^\u4e00-\u9fa5a-zA-Z]+/, '')}')" style="cursor:${canAfford?'pointer':'not-allowed'}">
      <div class="acard-label">${act.label}</div>
      <div class="acard-desc">${act.desc}</div>
      <div class="acard-cost ${act.cost===0?'free':''}">${act.cost===0?'免費':'-'+sc+' 收益'}</div>
    </div>`;
  }).join('');
  // Hide skip button if player can afford options (must choose)
  const skipBtn=chooser.querySelector('button[onclick="closeActionOverlay()"]');
  if(skipBtn) skipBtn.style.display=canAffordAny?'none':'block';
  chooser.style.display='flex';
}
function closeActionOverlay(){
  document.getElementById('action-chooser').style.display='none';
  // sloth demon: trigger on skip
  if(hasPartner('sloth')&&G.actionOptions&&G.actionOptions.length>0){
    PARTNERS.sloth.onSkipAction(G);
  }
  G.actionOptions=[];
}
let modalMode='';
function showModal(mode,msg){
  modalMode=mode;
  document.getElementById('memo').textContent=mode==='win'?'🎉':'😔';
  document.getElementById('mtitle').textContent=mode==='win'?'過關！':'失敗…';
  document.getElementById('mmsg').textContent=msg;
  document.getElementById('mbtn').textContent=mode==='win'?'繼續下一輪':'重新開始';
  document.getElementById('modal').classList.add('show');
}
function onMBtn(){
  document.getElementById('modal').classList.remove('show');
  if(modalMode==='win'){
    startRound();
  } else {
    G=newGame(); showStarterPartnerSelection();
  }
}

// RENDER
// ══════════════════════════════════════
function render(){
  document.getElementById('r-turn').textContent=`第${G.round}輪 回合${G.turn}/${G.maxTurns}`;
  document.getElementById('r-profit').textContent=G.profit;
  document.getElementById('r-goal').textContent=G.goal;
  const pct=Math.min(100,Math.round(G.profit/G.goal*100));
  document.getElementById('pbar-fill').style.width=pct+'%';
  // 動態難度指標（第2輪後顯示）
  const diffChip=document.getElementById('diff-chip');
  if(diffChip){
    if(G.round>1&&G.difficultyMult!==1.0){
      diffChip.style.display='';
      const dm=G.difficultyMult;
      document.getElementById('r-diff').textContent=`×${dm.toFixed(2)}`;
      document.getElementById('r-diff').style.color=dm>1.1?'var(--red)':dm<0.95?'var(--green)':'var(--blue)';
    } else { diffChip.style.display='none'; }
  }

  // 同步卡牌 UI（fan hand handles display)
  if(G.card) updateCard(G.card);

  // 提升設施提示橫幅
  document.getElementById('upgrade-hint').classList.toggle('show', !!G.upgradeMode);

  // 場風大師 / 颱風方向提示
  const windHint=document.getElementById('wind-hint');
  if(windHint){
    const isTyphoon=G.buff&&G.buff.typhoonActive;
    const isWind=hasPartner('wind_master');
    if((isWind||isTyphoon)&&G.windDir&&G.phase==='place'){
      const dirLabels={left:'← 左側',right:'→ 右側',top:'↑ 上方',bottom:'↓ 下方'};
      const dirArrows={left:'←',right:'→',top:'↑',bottom:'↓'};
      const icon=isTyphoon?'🌀 颱風：':'🌀 場風大師：';
      const extra=isTyphoon?' （物流失效，原料→金錢翻倍）':'（獲得×2倍率）';
      windHint.style.display='flex';
      windHint.style.background=isTyphoon?'rgba(122,26,26,.1)':'rgba(26,78,122,.1)';
      windHint.style.borderColor=isTyphoon?'rgba(122,26,26,.25)':'rgba(26,78,122,.25)';
      windHint.style.color=isTyphoon?'var(--red)':'var(--blue)';
      document.getElementById('wind-hint-text').textContent=`${icon}本回合只能從 ${dirLabels[G.windDir]} 投入 ${extra}`;
      document.getElementById('wind-dir-arrow').textContent=dirArrows[G.windDir];
    } else {
      windHint.style.display='none';
    }
  }

  document.getElementById('btn-next').disabled=G.phase!=='done';

  // 行動選項按鈕（右側面板，點擊開啟卡牌 overlay）

  renderGrid();
  renderHand();
  renderPartners();
  renderFanHand();
  renderTalentPanel();
  renderSideLog();
}

function renderPartners(){
  const row = document.getElementById('partner-row');
  const section = document.getElementById('partner-section');
  if(!row||!section) return;
  section.style.display='block';
  if(!G.partners||G.partners.length===0){
    row.innerHTML='<div style="font-size:9px;color:var(--hi);padding:4px 0;">尚無合夥人</div>';
    return;
  }
  row.innerHTML = G.partners.map((pid,i) => {
    const p = PARTNERS[pid];
    if(!p) return '';
    const isDemon = p.isDemon ? ' demon' : '';
    const tip = [p.name, p.pos?'✓ '+p.pos:'', p.neg&&p.neg!=='無'?'✕ '+p.neg:'']
      .filter(Boolean).join('|').replace(/"/g,'&quot;');
    const isDemo=pid==='demolition';
    const charges=isDemo?(G.demolitionCharges||0):0;
    const isDemoExpert=pid==='demolition_expert';
    const expertClickable=isDemoExpert&&G.phase==='place'&&G.profit>=2;
    const clickable=(isDemo&&charges>0)||expertClickable;
    const avatarSrc = PARTNER_AVATARS && PARTNER_AVATARS[pid];
    const emojiHtml = avatarSrc
      ? `<img src="${avatarSrc}" class="jc-avatar" alt="${p.name}">`
      : `<div class="jc-emoji">${p.emoji}</div>`;
    return `<div class="joker-card${isDemon}" style="z-index:${i+1};${clickable?'cursor:pointer;':''}"
      data-tip="${tip}"
      onmouseenter="tipFromAttr(event,this); DM.onPartnerHover('${p.name}'); showPartnerFloat(event)"
      onmouseleave="hideTooltip(); hidePartnerFloat(event)"
      ${isDemo&&charges>0?`onclick="useDemolition()"`:''} ${expertClickable?`onclick="useDemoExpert()"`:''}>
      ${emojiHtml}
      <div class="jc-name">${p.name}</div>
      ${isDemo&&charges>0?`<div style="font-size:9px;font-weight:700;background:var(--acc);color:#fff;border-radius:99px;padding:1px 6px;margin-top:2px;">×${charges}</div>`:''}
      ${expertClickable?`<div style="font-size:8px;font-weight:700;color:var(--red);margin-top:1px;">-2💰摧毀</div>`:''}
    </div>`;
  }).join('');
}

let _partnerFloatTimer=null;
function showPartnerFloat(e){
  if(!G.partners||G.partners.length<=1) return;
  clearTimeout(_partnerFloatTimer);
  const pf=document.getElementById('partner-float');
  const pfRow=document.getElementById('pf-row');
  if(!pf||!pfRow) return;
  // 複製合夥人卡片內容到浮動面板（保留 onclick 等互動）
  pfRow.innerHTML=document.getElementById('partner-row').innerHTML;
  pfRow.querySelectorAll('.joker-card').forEach(c=>{
    c.style.marginRight='0';
    // 移除浮動面板內卡片的 showPartnerFloat/hidePartnerFloat（防止遞迴）
    c.setAttribute('onmouseenter','tipFromAttr(event,this)');
    c.setAttribute('onmouseleave','hideTooltip()');
    // 點擊合夥人效果後關閉浮動面板
    const origClick=c.getAttribute('onclick');
    if(origClick){
      c.setAttribute('onclick',origClick+";document.getElementById('partner-float').style.display='none';");
      c.style.cursor='pointer';
    }
  });
  // 定位：出現在左側面板右邊
  const section=document.getElementById('partner-section');
  if(section){
    const rect=section.getBoundingClientRect();
    pf.style.left=(rect.right+6)+'px';
    pf.style.top=Math.max(8,rect.top)+'px';
  }
  pf.style.display='block';
}
function hidePartnerFloat(e){
  const pf=document.getElementById('partner-float');
  if(!pf) return;
  // 延遲隱藏，讓鼠標可以移到浮動面板上
  _partnerFloatTimer=setTimeout(()=>{pf.style.display='none';},200);
}
// 浮動面板本身的 hover 保持顯示
document.addEventListener('DOMContentLoaded',()=>{
  const pf=document.getElementById('partner-float');
  if(pf){
    pf.addEventListener('mouseenter',()=>clearTimeout(_partnerFloatTimer));
    pf.addEventListener('mouseleave',()=>{pf.style.display='none';});
  }
});

// 轉運中心方向選擇器
function showTransferHubDirPicker(r,c){
  const dirs=[
    {dir:'top',emoji:'⬆️',label:'上'},
    {dir:'bottom',emoji:'⬇️',label:'下'},
    {dir:'left',emoji:'⬅️',label:'左'},
    {dir:'right',emoji:'➡️',label:'右'},
  ];
  const cellEl=document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  const rect=cellEl?cellEl.getBoundingClientRect():{left:200,top:200};
  const panel=document.createElement('div');
  panel.style.cssText=`position:fixed;z-index:600;background:var(--sur);border:2px solid var(--acc);border-radius:10px;padding:8px;box-shadow:0 6px 20px rgba(0,0,0,.25);display:flex;gap:6px;left:${rect.left}px;top:${rect.bottom+4}px;`;
  dirs.forEach(d=>{
    const btn=document.createElement('button');
    btn.className='abtn';
    btn.style.cssText='width:44px;height:44px;font-size:22px;display:flex;align-items:center;justify-content:center;padding:0;margin:0;';
    btn.textContent=d.emoji;
    btn.title=d.label;
    btn.onclick=()=>{
      // 替換為對應方向的物流設施
      const dirMap={top:'logistics_up',bottom:'logistics_down',left:'logistics_left',right:'logistics_right'};
      G.grid[r][c]=dirMap[d.dir];
      addLog(`🔀 轉運中心 (${r+1},${c+1}) → ${d.emoji} ${d.label}`,'g');
      panel.remove();
      render();
    };
    panel.appendChild(btn);
  });
  panel.onclick=(e)=>e.stopPropagation();
  document.body.appendChild(panel);
  // 點擊外部或 ESC 關閉（保留 transfer_hub 原樣，預設 dir:right）
  const _closePicker=()=>{ if(panel.parentNode) panel.remove(); document.removeEventListener('keydown',_escPicker); };
  const _escPicker=(e)=>{ if(e.key==='Escape') _closePicker(); };
  setTimeout(()=>document.addEventListener('click',_closePicker,{once:true}),50);
  document.addEventListener('keydown',_escPicker);
}

function renderHand(){
  const el=document.getElementById('hand-list');
  const items=G.hand.filter(h=>h.count>0);
  if(!items.length){el.innerHTML='<div style="font-size:10px;color:var(--hi);">手牌空了</div>';return;}
  el.innerHTML=items.map(h=>{
    const sel=G.sel===h.id;
    const canSel=G.phase==='place';
    if(h.compound){
      const b1=BLDG[h.parts[0]],b2=BLDG[h.parts[1]];
      if(!b1||!b2) return '';
      const compTip=`${b1.emoji} ${b1.name}\\n${b1.desc}\\n基礎輸出: +${b1.fn(1)-1}\\n\\n🔗 ${h.dirLabel}\\n\\n${b2.emoji} ${b2.name}\\n${b2.desc}\\n基礎輸出: +${b2.fn(1)-1}`;
      return `<div class="hi${sel?' sel':''}${!canSel?' off':''}" style="border-color:var(--blue);overflow:hidden;"
        draggable="${canSel?'true':'false'}"
        ondragstart="onBldgDragStart(event,'${h.id}')"

        onmouseleave="hideTooltip()"

        <div style="flex:1;min-width:0;overflow:hidden;"><div class="hi-nm" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${b1.name}${h.dirLabel}${b2.name}</div><div class="hi-ds" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${b1.desc} ＋ ${b2.desc}</div></div>

    return `<div class="hi${sel?' sel':''}${!canSel?' off':''}"

function renderSideLog(){
  const el=document.getElementById('side-log');
  if(!el) return;
  let html='';

  // 過去回合（舊→新，最新在底部）
  if(G.turnLogHistory){
    const reversed=[...G.turnLogHistory].reverse();
    reversed.forEach(t=>{
      html+=`<div class="log-turn-block" style="opacity:.7;">`;
      html+=`<div class="log-turn-hdr" style="color:var(--mu);">第${t.round}輪 回合${t.turn}</div>`;
      html+=t.entries.map(e=>{
        const isCalc=e.msg.startsWith('  ');
        return `<div class="${isCalc?'log-calc':'log-entry'} ${e.cls||''}">${e.msg.trim()}</div>`;
      }).join('');
      html+=`</div>`;
    });
  }

  // 當前回合（最新，在最底部）
  if(G.turnLog&&G.turnLog.length>0){
    html+=`<div class="log-turn-block">`;
    html+=`<div class="log-turn-hdr">第${G.round}輪 回合${G.turn}</div>`;
    html+=G.turnLog.map(e=>{
      const isCalc=e.msg.startsWith('  ');
      return `<div class="${isCalc?'log-calc':'log-entry'} ${e.cls||''}">${e.msg.trim()}</div>`;
    }).join('');
    html+=`</div>`;
  }

  if(!html) html='<div style="font-size:9px;color:var(--hi);">尚無記錄</div>';
  el.innerHTML=html;
  // 自動捲到最底顯示最新 log
  el.scrollTop=el.scrollHeight;
}

function pulse(r,c){

  if(!el)return;
  el.classList.remove('pulse');void el.offsetWidth;el.classList.add('pulse');

}
function fdelta(text,color,x,y){
  const d=document.createElement('div');
  d.className='delta';d.textContent=text;
  d.style.cssText=`left:${x}px;top:${y}px;color:${color};`;
  document.body.appendChild(d);setTimeout(()=>d.remove(),950);
}

// 浮動提示工具
// ══════════════════════════════════════
const tip=()=>document.getElementById('tooltip');
function showTooltip(e,html){
  const t=tip(); if(!t)return;
  t.innerHTML=html; t.classList.add('show');
  positionTooltip(e);
}
function positionTooltip(e){
  const t=tip(); if(!t)return;
  let x=e.clientX+14, y=e.clientY+14;
  if(x+210>window.innerWidth) x=e.clientX-220;
  if(y+120>window.innerHeight) y=e.clientY-130;
  t.style.left=x+'px'; t.style.top=y+'px';
}
function hideTooltip(){ const t=tip(); if(t) t.classList.remove('show'); }
document.addEventListener('mousemove',e=>{ const t=tip(); if(t&&t.classList.contains('show')) positionTooltip(e); });

// 選擇卡片渲染（設施/合夥人統一格式）
// ══════════════════════════════════════
function makeSelCard(emoji,name,desc,pos,neg,onclick,extraClass='',pid='',hoverFn=''){
  const negLine=neg&&neg!=='無'?`<div class="sel-card-neg">✕ ${neg}</div>`:'';
  const tipParts=[desc||''];
  if(pos) tipParts.push('✓ '+pos);
  if(neg&&neg!=='無') tipParts.push('✕ '+neg);
  const tipAttr=tipParts.join('\n').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  const avatarSrc = PARTNER_AVATARS && PARTNER_AVATARS[pid];
  const emojiHtml = avatarSrc
    ? `<img src="${avatarSrc}" class="sel-card-avatar" alt="${name}">`
    : `<div class="sel-card-emoji">${emoji}</div>`;
  const hoverCall = hoverFn || `DM.onPartnerHover(this.querySelector('.sel-card-name').textContent); DM.onBldgHover(Object.keys(BLDG).find(k=>BLDG[k].name===this.querySelector('.sel-card-name').textContent)||'');`;
  return `<div class="sel-card ${extraClass}" onclick="${onclick}"
    data-tip="${tipAttr}"
    onmouseenter="tipFromAttr(event,this); ${hoverCall}"
    onmouseleave="hideTooltip()">
    ${emojiHtml}
    <div class="sel-card-name">${name}</div>
    <div class="sel-card-desc">${desc||''}</div>
    ${pos?`<div class="sel-card-pos">✓ ${pos}</div>`:''}
    ${negLine}
  </div>`;
}

let _cardChooserSkipFn=null;
function showCardChooser(title, cards, onSkip){
  _cardChooserSkipFn=onSkip;
  const el=document.getElementById('card-chooser');
  document.getElementById('card-chooser-title').textContent=title;
  document.getElementById('card-chooser-cards').innerHTML=cards.map(card=>
    makeSelCard(card.emoji,card.name,card.desc,card.pos,card.neg,card.onclick,'',card.pid||'')
  ).join('');

    closeCardChooser();
    if(_cardChooserSkipFn) _cardChooserSkipFn();
  };
  el.style.display='flex';
}
function closeCardChooser(){
  document.getElementById('card-chooser').style.display='none';
  _cardChooserSkipFn=null;
}
function cardChooserPick(fn){
  closeCardChooser();
  fn();
}

function tipFromAttr(e,el){
  const raw=(el.getAttribute('data-tip')||'')
    .replace(/&quot;/g,'"').replace(/&#39;/g,"'");
  const txt=raw.replace(/\|/g,'\n');
  if(txt&&e) showTooltip(e,txt);
}
function tipBldg(e,id){
  const b=BLDG[id]; if(!b)return;
  showTooltip(e, b.name + '\n' + (b.desc||'') + '\n基礎輸出: +' + (b.fn(1)-1));
  DM.onBldgHover(id);
}

// 格子懸停：短暫顯示設施名，1秒後顯示詳細加成
let _cellHoverTimer=null, _cellHoverEvt=null;
function cellHoverStart(e,r,c){
  clearTimeout(_cellHoverTimer);
  _cellHoverEvt=e;
  const bId=G.grid[r][c];
  if(bId&&BLDG[bId]){
    tipBldg(e,bId);
  }
  // 1秒後顯示詳細加成面板
  _cellHoverTimer=setTimeout(()=>showCellDetailTip(e,r,c),1000);
}
function cellHoverEnd(){
  clearTimeout(_cellHoverTimer);
  hideTooltip();
}
function showCellDetailTip(e,r,c){
  const k=`${r},${c}`;
  const bId=G.grid[r][c];
  const lines=[];
  // 設施基礎資訊
  if(bId&&BLDG[bId]){
    const b=BLDG[bId];
    lines.push(`<b>${b.emoji} ${b.name}</b>`);
    lines.push(b.desc||'');
  } else if(bId==='ruin'){
    lines.push('<b>🏚️ 廢墟</b>');
  } else {
    lines.push('<b>空格</b>');
  }
  // 升級加成
  const upg=G.bldgUpgrades&&G.bldgUpgrades[k]||0;
  if(upg>0) lines.push(`⬆ 升級加成: +${upg}`);
  // 蕾雅百分比
  const leya=G.leyaPctMods&&G.leyaPctMods[k]||0;
  if(leya>0) lines.push(`👩‍🔧 蕾雅: +${leya}%`);
  // cellMods（人材/地皮炒家等）
  const mod=G.cellMods&&G.cellMods[k]||0;
  if(mod!==0) lines.push(`${mod>0?'🧑‍💼':'🏚️'} 格子加成: ${mod>0?'+':''}${mod}`);
  // cellPctMods（事件效果）
  const pct=G.cellPctMods&&G.cellPctMods[k]||0;
  if(pct!==0) lines.push(`🎲 事件效果: ${pct>0?'+':''}${pct}%`);
  // 期貨百分比
  if(bId==='futures_market'){
    const fp=G.futuresPct&&G.futuresPct[k]||0;
    lines.push(`🏛 本回合期貨: ${fp>=0?'+':''}${fp}%`);
  }
  // 爆破倒數
  if(bId==='bomb_device'&&G.bombTimers&&G.bombTimers[k]!==undefined){
    lines.push(`💣 爆炸倒數: ${G.bombTimers[k]} 回合`);
  }
  // 疊加設施
  if(G.cellOverlay&&G.cellOverlay[k]){
    const ov=BLDG[G.cellOverlay[k]];
    if(ov) lines.push(`🚛 疊加: ${ov.emoji} ${ov.name}`);
  }
  // 事件預告
  if(G.nextEvent&&G.nextEventData&&G.nextEventData.cells&&G.nextEventData.cells.includes(k)){
    lines.push(`⚠ 預告: ${G.nextEvent.title}`);
  }
  // 只在有加成資訊時顯示（超過基本設施描述）
  if(lines.length>2||(!bId&&lines.length>1)){
    showTooltip(_cellHoverEvt||e, lines.join('\n'));
  }
}

let fanEventCards = []; // 當前事件選擇卡 [{id,emoji,name,desc,pos,neg,onclick,isSkip}]

function fanCardClick(i) {
  const area = document.getElementById('hand-fan-area');
  if (!area || !area._cards) return;
  const card = area._cards[i];
  if (!card) return;

  if (card.type === 'element') {
    addLog('💡 將元素卡拖曳到地圖邊緣箭頭投入');
    return;
  } else if (card.type === 'bldg') {
    if (card.disabled) return;
    selBldg(card.id);
  } else if (card.type === 'event') {
    if (card.disabled) return;
    if (card.isSkip) {
      fanEventCards = [];
      renderFanHand();
      if (card.onSkip) card.onSkip();
      return;
    }
    const el = document.getElementById('fancard-' + i);
    if (el) {
      el.classList.add('burning');
      setTimeout(() => {
        fanEventCards = [];
        renderFanHand();
        if (card.onClickFn) card.onClickFn();
      }, 650);
    } else {
      fanEventCards = [];
      renderFanHand();
      if (card.onClickFn) card.onClickFn();
    }
  }
}

function fanCardHover(i, entering, evt) {
  const el = document.getElementById('fancard-' + i);
  if (!el) return;

    el.style.zIndex = 200;

    const area = document.getElementById('hand-fan-area');
    if (area && area._cards) {
      const card = area._cards[i];
      if (card) {
        if (card.type === 'bldg') DM.onBldgHover(card.id);
        else if (card.type === 'element') tryDialogue('bldg_hover_元素卡');
      }

    const zi = area && area._cards ? (i + 1) : 1;
    el.style.zIndex = String(zi);
    hideTooltip();
  }
}

function renderFanHand() {
  const area = document.getElementById('hand-fan-area');
  if (!area) return;

  const cards = [];

  // 1. Building hand cards — expand by count (including compound)
  G.hand.filter(h => h.count > 0).forEach(h => {
    if(h.compound){
      const canSel = G.phase === 'place';
      const b1=BLDG[h.parts[0]], b2=BLDG[h.parts[1]];
      if(!b1||!b2) return;
      cards.push({
        type: 'compound', id: h.id,
        emoji: b1.emoji, emoji2: b2.emoji,
        name: `${b1.name}${h.dirLabel}${b2.name}`,
        desc: `${b1.desc} ＋ ${b2.desc}`,
        dirLabel: h.dirLabel,
        selected: G.sel === h.id,
        disabled: !canSel,
        draggable: canSel,
      });
      return;
    }
    const b = BLDG[h.id];
    if (!b) return;
    const canSel = G.phase === 'place';
    for (let n = 0; n < h.count; n++) {
      cards.push({
        type: 'bldg', id: h.id,
        emoji: b.emoji, name: b.name, desc: b.desc,
        selected: G.sel === h.id,
        disabled: !canSel,
        draggable: canSel,
      });
    }
  });

  // 2. Event choice cards (if any)
  fanEventCards.forEach((ev, ei) => {
    cards.push({ type: 'event', _evIdx: ei, ...ev });
  });

  // 人材卡已移至左側面板 (renderTalentPanel)

  // 3. Element card always last (rightmost)
  if (G.card) {
    const emojis = {money:'💵', material:'🪨', goods:'📦', diamond:'💎'};
    const canDrag = G.phase === 'place';
    cards.push({
      type: 'element',
      emoji: emojis[G.card.type] || '💵',
      name: TLABEL[G.card.type] || '元素',
      val: G.card.value,
      draggable: canDrag,
      disabled: !canDrag,
    });
  }

  if (cards.length === 0) { area.innerHTML = ''; return; }

  const total = cards.length;
  const maxAngle = Math.min(25, total * 4);

  area.innerHTML = cards.map((card, i) => {
    const frac  = total > 1 ? (i / (total - 1)) - 0.5 : 0;
    const angle = frac * maxAngle * 2;
    const sinkY = Math.abs(frac) * 14;
    const zi    = card.selected ? 50 : i + 1;
    const tx    = 0; // flex handles horizontal spacing

    const selBorder = card.selected ? 'border-color:var(--acc) !important;' : '';
    const dimStyle  = '';
    const typeClass = card.type === 'event' ? ' event-card' :
                      card.type === 'element' ? ' el-card-fan' :
                      card.type === 'talent' ? ' talent-card' : '';

    // Back face HTML — unified pattern, no content
    const backHTML = `<div class="fc-back-mark">🏙</div>`;

    // Front face HTML
    let frontHTML = '';
    if (card.type === 'element') {
      const extraUses = G.elementExtraUses||0;
      const talentBadge = extraUses > 0
        ? `<div style="position:absolute;top:4px;left:4px;background:var(--green);color:#fff;font-size:9px;font-weight:900;border-radius:6px;padding:1px 5px;line-height:1.4;box-shadow:0 1px 4px rgba(0,0,0,.2);">🧑‍💼×${extraUses}</div>`
        : '';
      const buffDesc = extraUses > 0
        ? `<div style="color:var(--green);font-size:9px;font-weight:700;margin-top:2px;">額外投入 ${extraUses} 次</div>`
        : `<div class="fc-desc" style="color:var(--mu);font-size:9px;">拖曳投入</div>`;
      frontHTML = `${talentBadge}<div class="fc-emoji">${card.emoji}</div>
        <div class="fc-val">${card.val}</div>
        <div class="fc-type">${card.name}</div>
        ${buffDesc}`;
    } else if (card.type === 'talent') {
      frontHTML = `<div class="fc-emoji">${card.emoji}</div>
        <div class="fc-name">${card.name}</div>
        <div class="fc-desc">${card.desc}</div>`;
    } else if (card.type === 'compound') {
      const isVert = card.dirLabel==='↑'||card.dirLabel==='↓';
      const order = card.dirLabel==='↑'||card.dirLabel==='←' ? [card.emoji2,card.emoji] : [card.emoji,card.emoji2];
      frontHTML = `<div style="display:flex;${isVert?'flex-direction:column;':''}gap:1px;align-items:center;justify-content:center;">
        <span style="font-size:16px;">${order[0]}</span>
        <span style="font-size:10px;color:var(--mu);">🔗</span>
        <span style="font-size:16px;">${order[1]}</span>
      </div>
      <div class="fc-name" style="font-size:7px;line-height:1.2;">${card.name}</div>`;
    } else if (card.type === 'bldg') {
      frontHTML = `<div class="fc-emoji">${card.emoji}</div>
        <div class="fc-name">${card.name}</div>
        <div class="fc-desc">${card.desc}</div>`;
    } else {
      frontHTML = `<div class="fc-emoji">${card.emoji || '🎴'}</div>
        <div class="fc-name">${card.name}</div>
        <div class="fc-desc">${card.desc || ''}</div>
        ${card.pos ? `<div style="font-size:7px;color:var(--green);">✓${card.pos}</div>` : ''}`;
    }

    const tipData = [card.name, card.desc||'', card.pos?'✓'+card.pos:'', card.neg&&card.neg!=='無'?'✕'+card.neg:'']
      .filter(Boolean).join('|').replace(/"/g,'&quot;');

    // drag attrs for element card
    const cardIdx = i; // capture for talent drag
    const dragAttrs = card.draggable && card.type === 'element'
      ? `draggable="true" ondragstart="onCardDragStart(event)" ondragend="onCardDragEnd(event)"
         ondragover="onTalentDragOver(event)" ondragleave="onTalentDragLeave(event)" ondrop="onTalentDrop(event)"`
      : card.draggable && (card.type === 'bldg' || card.type === 'compound')
      ? `draggable="true" ondragstart="onBldgDragStart(event,'${card.id}')" ondragend="onBldgDragEnd(event)"`
      : card.draggable && card.type === 'talent'
      ? `draggable="true" ondragstart="onTalentDragStart(event,${i})" ondragend="onTalentDragEnd(event)"`
      : '';

    return `<div class="fan-card${typeClass}" id="fancard-${i}"
      style="transform: translateY(${sinkY}px) rotate(${angle}deg); z-index:${zi}; ${selBorder}${dimStyle}background:var(--sur);border:1.5px solid var(--br2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:6px 5px;box-shadow:0 4px 12px rgba(42,26,8,.13);"
      onclick="fanCardClick(${i})"
      onmouseenter="fanCardHover(${i},true,event)"
      onmouseleave="fanCardHover(${i},false,null)"
      data-tip="${tipData}"
      ${dragAttrs}
      ${card.type==='element'?'ondragover="onTalentDragOver(event)" ondrop="onTalentDrop(event)" ondragleave="onTalentDragLeave(event)"':''}
      >${frontHTML}</div>`;
  }).join('');

  area._cards = cards;
}

// 從合夥人卡片飛出 +X 收益動畫
// 通用收益飛行動畫：從任意元素飛向收益 UI
function profitFlyFrom(srcEl, amount){
  const targetEl=document.getElementById('r-profit');
  if(!srcEl||!targetEl) return;
  const src=srcEl.getBoundingClientRect();
  const dst=targetEl.getBoundingClientRect();
  const fly=document.createElement('div');
  fly.className='profit-fly';
  fly.textContent=(amount>=0?'+':'')+amount;
  if(amount<0) fly.style.color='var(--red)';
  fly.style.left=(src.left+src.width/2)+'px';
  fly.style.top=(src.top+src.height/2)+'px';
  fly.style.setProperty('--tx',(dst.left-src.left-src.width/2)+'px');
  document.body.appendChild(fly);
  setTimeout(()=>fly.remove(),1300);
}

function demolitionChargeFly(){
  const row=document.getElementById('partner-row');
  if(!row) return;
  const cards=row.querySelectorAll('.joker-card');
  let dCard=null;
  G.partners.forEach((pid,i)=>{ if(pid==='demolition') dCard=cards[i]; });
  if(!dCard) return;

  const dst=dCard.getBoundingClientRect();
  const fly=document.createElement('div');
  fly.className='profit-fly';
  fly.textContent='+1';
  fly.style.cssText=`left:${window.innerWidth/2}px;top:${window.innerHeight/2}px;color:var(--money);font-size:18px;`;
  fly.style.setProperty('--tx',(dst.left-window.innerWidth/2+dst.width/2)+'px');
  // custom animation: fly toward card (downward if card is above center)
  fly.style.animation='none';
  document.body.appendChild(fly);

  const startY=window.innerHeight/2;
  const endY=dst.top+dst.height/2;
  const startX=window.innerWidth/2;
  const endX=dst.left+dst.width/2;

  fly.animate([
    {opacity:1,transform:`translate(0,0) scale(1)`},
    {opacity:1,transform:`translate(${endX-startX}px,${endY-startY}px) scale(0.7)`},
    {opacity:0,transform:`translate(${endX-startX}px,${endY-startY}px) scale(0.3)`}
  ],{duration:600,easing:'cubic-bezier(.4,0,.2,1)'}).onfinish=()=>{
    fly.remove();
    // pulse demolition card
    if(dCard){ dCard.style.transform='translateY(-14px) scale(1.18)'; setTimeout(()=>dCard.style.transform='',350); }
    renderPartners();
  };
}

function expandGrid(grid, newSize){
  const newGrid=Array(newSize).fill(null).map(()=>Array(newSize).fill(null));
  for(let r=0;r<Math.min(grid.length,newSize);r++)
    for(let cc=0;cc<Math.min(grid[r].length,newSize);cc++)
      newGrid[r][cc]=grid[r][cc];
  return newGrid;
}

// ══ 人材拖曳系統 ══
let talentDragging = false;
let talentDragIdx = -1;

function onTalentDragStart(e, idx) {
  if(G.phase !== 'place') { e.preventDefault(); return; }
  talentDragging = true;
  talentDragIdx = idx;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain','talent');
  setTimeout(()=>{
    const el = document.getElementById('fancard-'+idx);
    if(el) el.style.opacity = '0.45';
  },0);
}
function onTalentDragEnd(e) {
  talentDragging = false;
  talentDragIdx = -1;
  // restore all talent token/card opacity
  document.querySelectorAll('.talent-token,.talent-card').forEach(el=>el.style.opacity='');
  // 還原元素卡的 outline/shadow（如果拖到非目標處放開）
  document.querySelectorAll('.fan-card.el-card-fan').forEach(el=>{el.style.outline='';el.style.boxShadow='';});
}
function onTalentDragOver(e) {
  if(!talentDragging) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  // highlight element card
  e.currentTarget.style.outline = '3px solid var(--green)';
  e.currentTarget.style.boxShadow = '0 0 12px rgba(42,122,58,.4)';
}
function onTalentDragLeave(e) {
  e.currentTarget.style.outline = '';
  e.currentTarget.style.boxShadow = '';
}
function onTalentDrop(e) {
  e.preventDefault();
  e.currentTarget.style.outline = '';
  e.currentTarget.style.boxShadow = '';
  if(!talentDragging) return;
  talentDragging = false;
  // Use talent: grant extra use on element card（每回合限1次）
  if(G._talentUsedOnElement){ addLog('🧑‍💼 本回合已對資源使用過人材','b'); return; }
  // 人力資源總監：每次只能使用1個人材（拖到元素卡）
  if(hasPartner('hr_director')&&G._hrUsedThisTurn){ addLog('👔 人力資源總監：每次只能使用1個人材','b'); return; }
  if((G.talentCards||0) > 0) {
    const talentsBefore=G.talentCards;
    G.talentCards--;
    G._talentUsedOnElement = true;
    if(hasPartner('hr_director')) G._hrUsedThisTurn=true;
    if(hasPartner('labor_minister')) G._laborMinisterUsed=true;
    G.elementExtraUses = (G.elementExtraUses||0) + 1;
    addLog(`🧑‍💼 人材使用！元素獲得額外投入 ${G.elementExtraUses} 次`,'g');
    // 人力資源總監正面：用光全部人材時每個+15
    if(hasPartner('hr_director')&&G.talentCards===0&&talentsBefore>0){
      const hrBonus=talentsBefore*15;
      if(G.card){ G.card.value+=hrBonus; updateCard(G.card); }
      addLog(`👔 人力資源總監：全部${talentsBefore}人材投入，+${hrBonus}數值！`,'g');
    }
    renderTalentPanel();
    renderFanHand();
    // flash element card
    const area = document.getElementById('hand-fan-area');
    if(area && area._cards) {
      const elIdx = area._cards.findIndex(c=>c.type==='element');
      if(elIdx >= 0) {
        const elCard = document.getElementById('fancard-'+elIdx);
        if(elCard) {
          elCard.style.transform = 'translateY(-50px) scale(1.15)';
          elCard.style.boxShadow = '0 0 20px rgba(42,122,58,.6)';
          setTimeout(()=>{ elCard.style.transform=''; elCard.style.boxShadow=''; }, 500);
        }
      }
    }
  }
}

function onTalentDropCell(e, r, c) {

  const cellEl = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);

// ══════════════════════════════════════
// 中央區域判斷
// 4×4: (1,1)(1,2)(2,1)(2,2) — 內圈2×2
// 5×5: (1,1)~(3,3) — 內圈3×3
// ══════════════════════════════════════
let _centerCellsCache=null;
let _centerCellsCacheSize=0;
function getCenterCells(n){
  n = n || GN();
  if(_centerCellsCache && _centerCellsCacheSize===n) return _centerCellsCache;
  const cells = new Set();
  if(n===4){
    [[1,1],[1,2],[2,1],[2,2]].forEach(([r,c])=>cells.add(`${r},${c}`));
  } else if(n===5){
    for(let r=1;r<=3;r++) for(let cc=1;cc<=3;cc++) cells.add(`${r},${cc}`);
  } else {
    // generic: exclude outer ring
    for(let r=1;r<n-1;r++) for(let cc=1;cc<n-1;cc++) cells.add(`${r},${cc}`);
  }
  _centerCellsCache=cells;
  _centerCellsCacheSize=n;
  return cells;
}
function isCenterCell(r,c){ return getCenterCells().has(`${r},${c}`); }

function destroyFacility(r, c){
  const bId=G.grid[r][c];
  if(!bId||bId==='ruin') return;
  // 百貨公司：消滅任一格時連帶消滅整個 2×2
  if(bId==='dept_store'||bId==='dept_store_part'){
    // 找到 anchor
    const key=`${r},${c}`;
    let ak=bId==='dept_store'?key:(G.deptStoreParts&&G.deptStoreParts[key]);
    if(ak){
      const [ar,ac]=ak.split(',').map(Number);
      for(let dr=0;dr<2;dr++) for(let dc=0;dc<2;dc++){
        const cr=ar+dr, cc=ac+dc, ck=`${cr},${cc}`;
        if(G.grid[cr]&&(G.grid[cr][cc]==='dept_store'||G.grid[cr][cc]==='dept_store_part')){
          G.grid[cr][cc]='ruin';
          if(!G.ruinCells) G.ruinCells=new Set();
          G.ruinCells.add(ck);
          delete G.bldgUpgrades[ck];
          delete G.leyaPctMods[ck];
        }
        if(G.deptStoreParts) delete G.deptStoreParts[ck];
      }
      if(G.deptStoreAnchors) delete G.deptStoreAnchors[ak];
    }
    addLog(`🏬 百貨公司 被消滅！整個 2×2 區域變為廢墟`,'b');
    if(hasPartner('facility_destroyer')){
      G.profit+=50;
      addLog(`💣 設施破壞者：百貨公司被消滅，+50收益！`,'g');
    }
    if(hasPartner('ruin_scavenger')) addLog(`💀 廢墟掠奪者：百貨公司廢墟+5`,'g');
    renderFanHand(); render(); return;
  }
  // 設施破壞者：+50收益
  if(hasPartner('facility_destroyer')){
    G.profit+=50;
    addLog(`💣 設施破壞者：${BLDG[bId].name}被消滅，+50收益！`,'g');
    setTimeout(()=>profitFlyFromPartner('facility_destroyer',50),100);
  }
  // Clear upgrades for that cell
  if(G.bldgUpgrades) delete G.bldgUpgrades[`${r},${c}`];
  if(G.leyaPctMods) delete G.leyaPctMods[`${r},${c}`];
  // 廢墟紀念碑消滅後還原為空格，不變成廢墟
  if(bId==='ruin_monument'){
    G.grid[r][c]=null;
    addLog(`🗿 廢墟紀念碑 (${r+1},${c+1}) 被消滅，格子還原為空地`);
  } else {
    // 放置廢墟
    G.grid[r][c]='ruin';
    if(!G.ruinCells) G.ruinCells=new Set();

  }
  renderFanHand();
  render();
}

// ── 格子資料交換（grid + bldgUpgrades + leyaPctMods + cellMods） ──
function swapCellData(r1,c1,r2,c2){
  const k1=`${r1},${c1}`, k2=`${r2},${c2}`;
  // grid
  const tmp=G.grid[r2][c2];
  G.grid[r2][c2]=G.grid[r1][c1];
  G.grid[r1][c1]=tmp;
  // bldgUpgrades
  const u1=G.bldgUpgrades[k1], u2=G.bldgUpgrades[k2];
  if(u1||u2){ G.bldgUpgrades[k1]=u2; G.bldgUpgrades[k2]=u1; }
  if(!G.bldgUpgrades[k1]) delete G.bldgUpgrades[k1];
  if(!G.bldgUpgrades[k2]) delete G.bldgUpgrades[k2];
  // leyaPctMods
  const l1=G.leyaPctMods[k1], l2=G.leyaPctMods[k2];
  if(l1||l2){ G.leyaPctMods[k1]=l2; G.leyaPctMods[k2]=l1; }
  if(!G.leyaPctMods[k1]) delete G.leyaPctMods[k1];
  if(!G.leyaPctMods[k2]) delete G.leyaPctMods[k2];
  // cellMods（人材加成、地皮炒家等跟隨設施移動）
  const m1=G.cellMods[k1], m2=G.cellMods[k2];
  if(m1||m2){ G.cellMods[k1]=m2; G.cellMods[k2]=m1; }
  if(!G.cellMods[k1]) delete G.cellMods[k1];
  if(!G.cellMods[k2]) delete G.cellMods[k2];
  // bombTimers
  if(G.bombTimers){
    const bt1=G.bombTimers[k1], bt2=G.bombTimers[k2];
    if(bt1!==undefined||bt2!==undefined){ G.bombTimers[k1]=bt2; G.bombTimers[k2]=bt1; }
    if(G.bombTimers[k1]===undefined) delete G.bombTimers[k1];
    if(G.bombTimers[k2]===undefined) delete G.bombTimers[k2];
  }
  // cellOverlay（物流之王/倉儲女王疊加設施）
  if(G.cellOverlay){
    const ov1=G.cellOverlay[k1], ov2=G.cellOverlay[k2];
    if(ov1||ov2){ G.cellOverlay[k1]=ov2; G.cellOverlay[k2]=ov1; }
    if(!G.cellOverlay[k1]) delete G.cellOverlay[k1];
    if(!G.cellOverlay[k2]) delete G.cellOverlay[k2];
  }
  // tempShedMoves / logisticsVault
  ['tempShedMoves','logisticsVault','futuresPct'].forEach(dk=>{
    if(!G[dk]) return;
    const v1=G[dk][k1], v2=G[dk][k2];
    if(v1!==undefined||v2!==undefined){ G[dk][k1]=v2; G[dk][k2]=v1; }
    if(G[dk][k1]===undefined) delete G[dk][k1];
    if(G[dk][k2]===undefined) delete G[dk][k2];
  });
}

// ── 交換後附帶效果（臨時工棚/拆遷補償局/地皮炒家） ──
function onFacilityMoved(r,c,sr,sc){
  G.turnFacMoved=(G.turnFacMoved||0)+1;
  for(let ri=0;ri<GN();ri++) for(let ci=0;ci<GN();ci++){
    if(G.grid[ri][ci]==='temp_shed'){
      const tk=`${ri},${ci}`;
      G.tempShedMoves[tk]=Math.min((G.tempShedMoves[tk]||0)+1,5);
    }
  }
  { const bureaus=findCells((r,c,b)=>b==='demolish_bureau');
    if(bureaus.length>0){G.profit+=1;addLog('🏢 拆遷補償局：設施移動+1收益','g');profitFlyFromCell(bureaus[0][0],bureaus[0][1],1);} }
  if(hasPartner('land_speculator')){
    if(!G._landSpecStale) G._landSpecStale={};
    G.cellMods[`${r},${c}`]=(G.cellMods[`${r},${c}`]||0)+20;
    G._landSpecStale[`${r},${c}`]=0;
    if(sr!==undefined) G._landSpecStale[`${sr},${sc}`]=0;
    addLog(`🏚️ 地皮炒家：(${r+1},${c+1}) 下次投入+20`,'g');
  }
}

// ── 蕾雅升級（+1 upgrade, +2% pct） ──
function leyaUpgrade(r,c,bId){
  const key=`${r},${c}`;
  G.bldgUpgrades[key]=(G.bldgUpgrades[key]||0)+1;
  G.leyaPctMods[key]=(G.leyaPctMods[key]||0)+2;
  addLog(`👩‍🔧 蕾雅：${BLDG[bId].emoji}${BLDG[bId].name} (${r+1},${c+1}) 升級！+${G.bldgUpgrades[key]}, +${G.leyaPctMods[key]}%`,'g');
}

// 套用格子升級加成（所有special設施共用）
function applyUpgradeBonus(r, c, val, bName){
  const key=`${r},${c}`;
  const upg=G.bldgUpgrades&&G.bldgUpgrades[key]||0;
  if(upg>0){
    addLog(`    ⬆ ${bName}升級加成：+${upg}`,'g');
    return val+upg;
  }
  return val;
}

function pickStarterPartner(pid){
  G.partners.push(pid);
  if(PARTNERS[pid]&&PARTNERS[pid].onRecruit) PARTNERS[pid].onRecruit(G);
  if(pid==='envy') addHand('envy_factory');
  addLog(`🤝 選擇了 ${PARTNERS[pid].emoji}${PARTNERS[pid].name} 作為起始合夥人！`,'g');
  // 未選到的兩位加入合夥人招募池
  const starters=['demolition','tanya','leya'];
  starters.filter(s=>s!==pid).forEach(s=>{
    if(!G.partnerPool) G.partnerPool=[];
    if(!G.partnerPool.includes(s)) G.partnerPool.unshift(s); // 加到最前面提高機率
    addLog(`🤝 ${PARTNERS[s].emoji}${PARTNERS[s].name} 進入合夥人招募池`,'w');
  });
  document.getElementById('card-chooser').style.display='none';
  startRound();
}

      `pickStarterPartner('${pid}')`, '', pid,

  el.style.display='flex';
}

// 台詞管理器 DialogueManager
// ══════════════════════════════════════
const DM = {
  _timer: null,

  show(text, duration=4000, expr=0){
    if(!text) return;
    // 教學期間，只允許 TUT 自己呼叫的台詞（duration===99999 或 TUT._allowDM）
    if(TUT && TUT.active && !TUT._allowDM) return;
    const el = document.getElementById('char-bubble');
    if(!el) return;
    if(this._timer) clearTimeout(this._timer);
    // 切換角色表情
    if(expr >= 1 && expr <= 6) setCharExpr(expr);
    el.textContent = text;
    el.classList.add('show');
    this._timer = setTimeout(()=>{
      el.classList.remove('show');
      this._timer = null;
      // 對話結束後恢復預設表情
      setCharExpr(1);
    }, duration);
  },

  // 主要觸發入口：傳入觸發鍵值
  trigger(key){
    const text = DIALOGUES[key];
    if(text) this.show(text, 4000, DIALOGUE_EXPR[key]||1);
  },

  // 事件觸發（by title keyword）
  onEvent(title){
    const map = {
      '設施補給':'event_設施補給', '原料出口熱':'event_原料出口熱',
      '商品熱銷':'event_商品熱銷', '平靜的一天':'event_平靜的一天',
      '行業熱潮':'event_行業熱潮', '區域效應':'event_區域效應',
      '地塊共鳴':'event_地塊共鳴', '颱風來襲':'event_颱風來襲',
      '地區叛亂':'event_地區叛亂',
    };
    for(const [k,v] of Object.entries(map)){
      if(title.includes(k)){
        const text = DIALOGUES[v];
        if(text) this.show(text, 5000, DIALOGUE_EXPR[v]||1);
        return;
      }
    }
  },

  // 設施 hover（立即覆蓋）
  onBldgHover(bldgId){
    const b = BLDG[bldgId];
    if(!b) return;
    const name = b.special==='redirect' ? '物流中心' : b.name;
    const key = 'bldg_hover_' + name;
    const text = DIALOGUES[key];
    if(text) this.show(text, 4000, DIALOGUE_EXPR[key]||1);
  },

  // 行動 hover（立即覆蓋）
  onActionHover(label){
    const clean = label.replace(/^[^一-龥a-zA-Z]+/, '').trim();
    const key = 'action_hover_' + clean;
    if(DIALOGUES[key]) this.show(DIALOGUES[key], 4000, DIALOGUE_EXPR[key]||1);
  },

  // 行動選擇開啟（短時間，讓位給 hover）
  onActionOpen(){
    const key = 'action_open';
    if(DIALOGUES[key]) this.show(DIALOGUES[key], 4000, DIALOGUE_EXPR[key]||1);
  },

  // 合夥人 hover（選擇時）
  onPartnerHover(name){
    const pKey = 'partner_hover_' + name;
    const sKey = 'starter_hover_' + name;
    const text = DIALOGUES[pKey] || DIALOGUES[sKey];
    const expr = DIALOGUE_EXPR[pKey] || DIALOGUE_EXPR[sKey] || 1;
    if(text) this.show(text, 4000, expr);
  },

  // 起始合夥人 hover
  onStarterHover(name){
    const key = 'starter_hover_' + name;
    if(DIALOGUES[key]) this.show(DIALOGUES[key], 4000, DIALOGUE_EXPR[key]||1);
  },
};

// 向後相容舊呼叫
function tryDialogue(key){ DM.trigger(key); }
function showBubble(text, dur){ DM.show(text, dur); }

// ── 譚雅：每回合開始顯示交換選單 ──
function tanyaOfferSwap(){
  if(!hasPartner('tanya')) return;
  const handOptions = G.hand.filter(h=>h.count>0);
  if(handOptions.length === 0){ addLog('👩‍💼 譚雅：手牌無設施可交換，跳過','w'); return; }
  // 隨機抽3個設施
  const pool = Object.keys(BLDG)
    .filter(id=>id!=='envy_factory'&&id!=='ruin'&&id!=='dept_store_part')
    .sort(()=>Math.random()-.5)
    .slice(0,3);
  G._tanyaSwapPool = pool;
  G._tanyaSwapPending = true;

  // Build chooser: first pick from hand what to give
  showTanyaHandPick(pool);
}

function showTanyaHandPick(pool){
  const el = document.getElementById('card-chooser');
  document.getElementById('card-chooser-title').textContent = '👩‍💼 譚雅：選擇要交換出去的手牌設施';
  const handOptions = G.hand.filter(h=>h.count>0);
  document.getElementById('card-chooser-cards').innerHTML = handOptions.map(h=>
    makeSelCard(BLDG[h.id].emoji, BLDG[h.id].name, BLDG[h.id].desc, '', '',
      `tanyaSelectGive('${h.id}')`, '', '', '')
  ).join('');
  // Skip button
  const skipBtn = document.getElementById('card-chooser-skip');
  if(skipBtn){ skipBtn.style.display=''; skipBtn.textContent='✕ 跳過交換'; skipBtn.onclick=()=>{ closeCardChooser(); tanyaSwapDone(); }; }
  el.style.display='flex';
}

function tanyaSelectGive(giveId){
  closeCardChooser();
  const pool = G._tanyaSwapPool || [];
  // Now show 3 options to receive
  const el = document.getElementById('card-chooser');
  document.getElementById('card-chooser-title').textContent =
    `👩‍💼 譚雅：交出 ${BLDG[giveId].emoji}${BLDG[giveId].name}，選擇換入的設施（+1）`;
  document.getElementById('card-chooser-cards').innerHTML = pool.map(bid=>
    makeSelCard(BLDG[bid].emoji, BLDG[bid].name, BLDG[bid].desc+' 【+1】', '', '',
      `tanyaDoSwap('${giveId}','${bid}')`, '', '', '')
  ).join('');
  const skipBtn = document.getElementById('card-chooser-skip');
  if(skipBtn){ skipBtn.style.display=''; skipBtn.textContent='✕ 取消'; skipBtn.onclick=()=>{ closeCardChooser(); showTanyaHandPick(pool); }; }
  el.style.display='flex';
}

function tanyaDoSwap(giveId, receiveId){
  closeCardChooser();
  // Remove one from hand
  const slot = G.hand.find(h=>h.id===giveId);
  if(slot && slot.count>0) slot.count--;
  // Add received
  const existing = G.hand.find(h=>h.id===receiveId);
  if(existing) existing.count++;
  else G.hand.push({id:receiveId, count:1});
  // Mark +1 bonus for when placed
  if(!G._tanyaNewBldg) G._tanyaNewBldg={};
  G._tanyaNewBldg[receiveId] = (G._tanyaNewBldg[receiveId]||0)+1;
  addLog(`👩‍💼 譚雅：交出 ${BLDG[giveId].emoji}${BLDG[giveId].name}，換入 ${BLDG[receiveId].emoji}${BLDG[receiveId].name}（+1）！`,'g');
  renderFanHand();
  tanyaSwapDone();
}

function tanyaSwapDone(){
  G._tanyaSwapPending = false;
  G._tanyaSwapPool = null;
  openActionOverlay();
}

// 教學台詞表情對照
const TUT_TEXT_EXPR = {
  "哈囉！我是譚雅♡ 很高興認識你～":2,
  "很棒！設施蓋好了！":2,
  "幹得好！你賺到了收益！":2,
  "雖然這次沒有賺到收益，但沒關係！":3,
  "哎呀，這樣的話你的設施排列可能不太好……":3,
  "好了，基礎就這樣！正式遊戲開始，祝你好運～♡":6,
};

const TUT = {
  active: false,
  step: 0,
  waitingFor: null, // 'place_mat_factory' | 'send_el' | 'end_turn' | etc.

  // ── 教學用遊戲狀態 ──
  initState(){
    G = newGame();
    G.hand = []; // 清空手牌，教學控制
    G.card = null; // 清空元素卡，教學控制
    G.tutorialMode = true;
    G.profit = 0;
    G.phase = 'place';
    G.turn = 1; G.round = 1; G.maxTurns = 10;
    G.goal = 30;
  },

  start(){
    TUT.active = true;
    TUT.step = 0;
    TUT.initState();
    // 隱藏所有 UI，只留標題和格子
    TUT.setUIVisibility(false);
    render();
    setTimeout(()=>TUT.next(), 200);
  },

  // 逐步顯示 UI
  setUIVisibility(show){
    const ids = ['hdr','profit-area','pbar','ev-banner','hand-fan-area',
                 'partner-section','btn-next','talent-section-title','talent-panel',
                 'el-profit','side-log','upgrade-hint'];
    ids.forEach(id=>{
      const el = document.getElementById(id);
      if(el) el.style.visibility = show ? '' : 'hidden';
    });
    // left panel and right panel
    const panels = document.querySelectorAll('#main .panel');
    panels.forEach(p=>{ if(p) p.style.visibility = show ? '' : 'hidden'; });
  },

  next(){
    TUT.step++;
    const fn = TUT[`step${TUT.step}`];
    if(fn) fn.call(TUT);
  },

  // ── Step 1: 只顯示標題 + 格子 ──
  step1(){
    TUT.setUIVisibility(false);
    // 確保 hdr logo 可見（只顯示標題）
    const logo = document.getElementById('logo');
    const hdr = document.getElementById('hdr');
    if(hdr) hdr.style.visibility = '';
    if(logo) logo.style.visibility = '';
    // 隱藏收益
    const pa = document.getElementById('profit-area');
    if(pa) pa.style.visibility = 'hidden';
    TUT.bubble('（載入中...）');
    setTimeout(()=>TUT.next(), 800);
  },

  // ── Step 2: 譚雅蕾雅出現，自我介紹 ──
  step2(){
    TUT.speak([
      '哈囉！我是譚雅♡ 很高興認識你～',
      '我是蕾雅。簡單說一下——',
      '中間那個格子，就是你的小鎮！你可以在上面蓋各種設施。',
      '把設施組合起來，讓資源在裡面流轉，產生收益就是你的目標！',
    ], ()=>TUT.next());
  },

  // ── Step 3: 獲得原料廠，引導放置 ──
  step3(){
    // 顯示左側面板（手牌設施）
    const panels = document.querySelectorAll('#main .panel');
    if(panels[0]) panels[0].style.visibility = '';
    // 顯示手牌 UI
    const fanArea = document.getElementById('hand-fan-area');
    if(fanArea) fanArea.style.visibility = '';

    TUT.speak([
      '我給你一張原料廠！',
    ], ()=>{
      // 台詞說完才給原料廠，同時設定 waitingFor
      G.hand = [{id:'mat_factory', count:1}];
      TUT.waitingFor = 'place_mat_factory';
      renderHand();
      renderFanHand();
      TUT.speak([
        '把它從下方的手牌拖到格子上，試著放到小鎮裡吧～',
      ], ()=>{
        // 如果 onAction 已經處理過，waitingFor 會是 null，不要重複呼叫 next
        if(TUT.waitingFor !== 'place_mat_factory') return;
        // 檢查玩家是否已經放置了
        let hasMatFactory = false;
        if(findCells((r,c,b)=>b==='mat_factory').length>0) hasMatFactory=true;
        if(hasMatFactory){
          TUT.waitingFor = null;
          TUT.next();
        } else {
          TUT.highlightGrid(true);
        }
      });
    });
  },

  // ── Step 4: 投入一塊錢 ──
  step4(){
    TUT.highlightGrid(false);
    G.hand = []; // 清空手牌
    renderFanHand();
    TUT.speak([
      '很棒！設施蓋好了！',
      '現在給你一塊錢，試著從任意一側把它送入小鎮吧！',
    ], ()=>{
      // 台詞說完才給金錢，同時設定 waitingFor
      G.card = {value:1, type:'money'};
      TUT.waitingFor = 'send_el';
      renderFanHand();
      TUT.speak([
        '拖曳元素卡時小鎮四周會出現箭頭，將卡片拖到箭頭方向鬆手吧。',
      ]);
    });
  },

  // ── Step 5: 收益為零，給工廠和商店 ──
  step5(){
    // 顯示右側面板（本次收益、回合記錄）
    const panels = document.querySelectorAll('#main .panel');
    if(panels[1]) panels[1].style.visibility = '';
    const sideLog = document.getElementById('side-log');
    if(sideLog) sideLog.style.visibility = '';
    // 顯示收益欄
    const profitEl = document.getElementById('el-profit');
    if(profitEl) profitEl.style.visibility = '';
    const pa = document.getElementById('profit-area');
    if(pa) pa.style.visibility = '';
    const pbar = document.getElementById('pbar');
    if(pbar) pbar.style.visibility = '';
    render();
    TUT.speak([
      '來，我再給你一個工廠和商店——',
    ], ()=>{
      // 給工廠和商店，同時設定 waitingFor
      G.hand = [{id:'factory', count:1}, {id:'shop', count:1}];
      TUT.waitingFor = 'place_factory_shop';
      renderHand();
      renderFanHand();
      TUT.speak([
        '原料→工廠→商品→商店→金錢，這樣就能賺到錢了！',
        '把工廠和商店也放到格子上吧～',
      ], ()=>{
        // 如果 onAction 已經處理過，waitingFor 會是 null，不要重複呼叫 next
        if(TUT.waitingFor !== 'place_factory_shop') return;
        // 檢查玩家是否已經放置了
        let hasFac=false, hasShop=false;
        for(let r=0;r<GN();r++) for(let cc=0;cc<GN();cc++){
          if(G.grid[r][cc]==='factory') hasFac=true;
          if(G.grid[r][cc]==='shop') hasShop=true;
        }
        if(hasFac && hasShop){
          TUT.waitingFor = null;
          TUT.next();
        }
      });
    });
  },

  // ── Step 6: 放置完成，投入金錢並結束回合 ──
  step6(){
    // 顯示結束回合按鈕
    const btn = document.getElementById('btn-next');
    if(btn) btn.style.visibility = '';
    TUT.speak([
      '設施都蓋好了，快試試看能賺多少錢！',
      '投入你的金錢，看看能賺多少收益！',
    ], ()=>{
      // 給玩家一塊錢
      G.card = {value:1, type:'money'};
      G.phase = 'place';
      renderFanHand();
      TUT.waitingFor = 'tut_send_for_profit';
    });
  },

  // ── Step 7: 顯示拆遷隊選擇 ──
  step7(){
    // 顯示合夥人面板
    const partnerSection = document.getElementById('partner-section');
    if(partnerSection) partnerSection.style.visibility = '';
    const hasProfit = G.profit > 0;
    TUT.speak(hasProfit ? [
      '幹得好！你賺到了收益！',
      '現在，我們來介紹「合夥人」！',
      '合夥人會在整輪遊戲中持續幫助你——但通常也有負面效果。',
      '這次我們提供你一個特別的合夥人：拆遷隊。選擇它吧！',
    ] : [
      '雖然這次沒有賺到收益，但沒關係！',
      '現在，我們來介紹「合夥人」！',
      '合夥人會在整輪遊戲中持續幫助你——但通常也有負面效果。',
      '這次我們提供你一個特別的合夥人：拆遷隊。選擇它吧！',
    ], ()=>{
      // Show single partner choice: demolition only
      TUT.showTutPartnerChoice();
    });
  },

  // ── Step 8: 觸發行業熱潮，引導使用拆遷隊 ──
  step8(){
    // 清空事件預告（已觸發）
    G.nextEvent = null;
    // 顯示事件橫幅
    const evBanner = document.getElementById('ev-banner');
    if(evBanner){
      evBanner.style.visibility = '';
      evBanner.classList.add('show');
    }
    document.getElementById('ev-title').textContent = '🎲 行業熱潮';
    // Apply row_buff event manually
    G.buff = G.buff||{};
    // 隨機一行 +1
    const bonusRow = Math.floor(Math.random()*4);
    const penaltyRow = (bonusRow+2)%4;
    document.getElementById('ev-desc').textContent = `第${bonusRow+1}行 +10%，第${penaltyRow+1}行 -10%`;
    // 清空事件選項按鈕
    document.querySelector('.ev-opts').innerHTML = '';
    if(!G.cellPctMods) G.cellPctMods={};
    for(let cc=0;cc<GN();cc++){
      const k1=`${bonusRow},${cc}`;
      const k2=`${penaltyRow},${cc}`;
      G.cellPctMods[k1]=(G.cellPctMods[k1]||0)+10;
      G.cellPctMods[k2]=(G.cellPctMods[k2]||0)-10;
    }
    // 給拆遷隊次數
    G.demolitionCharges = 1;
    G.phase = 'place';
    render();
    renderPartners();
    TUT.speak([
      `🎲 行業熱潮！第${bonusRow+1}行 +10%，第${penaltyRow+1}行 -10%！`,
      '哎呀，這樣的話你的設施排列可能不太好……',
      '拆遷隊的能力可以讓你重新排列設施！點擊合夥人欄的拆遷隊來使用吧！',
    ], ()=>{
      TUT.waitingFor = 'use_demolition';
      TUT.highlightPartner('demolition');
      // 保持 phase='place' 讓拆遷隊可用，手動啟用結束回合按鈕
      document.getElementById('btn-next').disabled=false;
    });
  },

  // ── Step 9: 最後說明，進入正式遊戲 ──
  step9(){
    TUT.speak([
      '很棒！看到了吧？合夥人能讓你更靈活地應對各種狀況。',
      '但記得——每個合夥人都有自己的負面效果，選擇時要仔細考慮策略！',
      '好了，基礎就這樣！正式遊戲開始，祝你好運～♡',
    ], ()=>{
      TUT.finish();
    });
  },

  finish(){
    TUT.active = false;
    TUT.waitingFor = null;
    // 補全所有 UI
    TUT.setUIVisibility(true);
    // 隱藏事件橫幅
    const evBanner = document.getElementById('ev-banner');
    if(evBanner) evBanner.classList.remove('show');
    // 保留教學中放置的設施和合夥人
    const savedGrid = G.grid.map(row=>[...row]);
    const savedPartners = [...G.partners];
    const savedGridSize = G.gridSize;
    // 從 newGame() 取得乾淨狀態
    G = newGame();
    // 還原保留項目
    G.grid = savedGrid;
    G.partners = savedPartners;
    G.gridSize = savedGridSize;
    G.hand = [{id:'mat_factory',count:1},{id:'factory',count:1},{id:'shop',count:1}];
    G.card = {value:1, type:'money'};
    render();
    renderFanHand();
    renderPartners();
    // 正式開始第一輪
    startRound();
  },

  // ── 輔助：顯示連續台詞 ──
  _speechQueue: [],
  _speechIdx: 0,
  speak(lines, onDone){
    TUT._speechQueue = lines;
    TUT._speechIdx = 0;
    TUT._speechDone = onDone;
    TUT._nextLine();
  },
  _nextLine(){
    if(TUT._speechIdx >= TUT._speechQueue.length){
      TUT._allowDM = false;
      if(TUT._speechDone) TUT._speechDone();
      return;
    }
    const line = TUT._speechQueue[TUT._speechIdx++];
    const expr = TUT_TEXT_EXPR[line] || 1;
    TUT._allowDM = true;
    DM.show(line, 3000, expr);
    TUT._allowDM = false;
    TUT._speechTimer = setTimeout(()=>TUT._nextLine(), 3200);
  },

  bubble(text){
    const expr = TUT_TEXT_EXPR[text] || 1;
    TUT._allowDM = true;
    DM.show(text, 99999, expr);
    TUT._allowDM = false;
  },

  // ── 輔助：高亮格子 ──
  highlightGrid(on){
    const grid = document.getElementById('grid');
    if(grid) grid.style.outline = on ? '3px solid var(--acc)' : '';
  },

  // ── 輔助：高亮合夥人 ──
  highlightPartner(pid){
    const cards = document.querySelectorAll('.joker-card');
    cards.forEach(card=>{
      const name = card.querySelector('.jc-name')?.textContent;
      if(name === PARTNERS[pid]?.name){
        card.style.outline = '3px solid var(--acc)';
        card.style.animation = 'pulse-acc 1s infinite';
      }
    });
  },

  // ── 教學合夥人選擇（只有拆遷隊）──
  showTutPartnerChoice(){
    const el = document.getElementById('card-chooser');
    document.getElementById('card-chooser-title').textContent = '🎮 選擇你的合夥人（教學）';
    const p = PARTNERS['demolition'];
    document.getElementById('card-chooser-cards').innerHTML =
      makeSelCard(p.emoji, p.name, p.pos, p.pos, '', `TUT.pickTutPartner('demolition')`, '', 'demolition', '');
    const skipBtn = document.getElementById('card-chooser-skip');
    if(skipBtn) skipBtn.style.display = 'none';
    el.style.display = 'flex';
  },

  pickTutPartner(pid){
    closeCardChooser();
    G.partners.push(pid);
    addLog(`🤝 獲得合夥人：${PARTNERS[pid].emoji}${PARTNERS[pid].name}！`,'g');
    // 設定事件預告（行業熱潮）- 在當前回合3觸發
    G.nextEvent = {id:'row_buff', title:'📈 行業熱潮', desc:'隨機一行+10%，另一行-10%'};
    G.nextEventTurn = G.turn; // 當前回合觸發
    renderPartners();
    render();
    setTimeout(()=>TUT.next(), 500);
  },

  // ── 教學事件：玩家觸發特定動作時呼叫 ──
  onAction(action, data){
    if(!TUT.active) return false;
    if(TUT.waitingFor === action){
      TUT.waitingFor = null;
      setTimeout(()=>TUT.next(), 600);
      return true;
    }
    return false;
  },
};

// ══════════════════════════════════════
// 開發者測試模式
// 啟動序列：標題×2 → 立繪×1 → 標題×2
// ══════════════════════════════════════
const DEV={
  seq:[],                     // 'L'=logo, 'C'=char
  pattern:['L','L','C','L','L'],
  timer:null,
  push(code){
    this.seq.push(code);
    if(this.timer) clearTimeout(this.timer);
    this.timer=setTimeout(()=>this.seq=[],3000);
    // 檢查末尾是否匹配
    const p=this.pattern;
    const s=this.seq;
    if(s.length>=p.length){
      const tail=s.slice(-p.length);
      if(tail.every((v,i)=>v===p[i])){
        this.seq=[];
        this.open();
      }
    }
  },
  open(){
    const panel=document.getElementById('dev-panel');
    panel.classList.add('show');
    this.render();
  },
  close(){
    document.getElementById('dev-panel').classList.remove('show');
  },
  render(){
    const panel=document.getElementById('dev-panel');
    let h='';
    // header
    h+=`<div id="dev-close"><span style="font-weight:700;font-size:12px;">🛠 開發者模式</span>
      <button onclick="DEV.close()">✕</button></div>`;

    // ── 資源操作 ──
    h+=`<div class="dev-sec"><div class="dev-sec-title">💰 資源</div>
      <div class="dev-row" title="直接增加 50 收益" onclick="G.profit+=50;render();"><span class="de">💰</span><span class="dn">收益 +50</span></div>
      <div class="dev-row" title="直接增加 500 收益" onclick="G.profit+=500;render();"><span class="de">💰</span><span class="dn">收益 +500</span></div>
      <div class="dev-row" title="手牌資源金錢 +10（沒有資源時建立一張）" onclick="G.card={value:G.card?G.card.value+10:10,type:'money'};updateCard(G.card);"><span class="de">💵</span><span class="dn">金錢 +10</span></div>
      <div class="dev-row" title="直接增加 5 個人材" onclick="G.talentCards=(G.talentCards||0)+5;renderTalentPanel();renderFanHand();"><span class="de">🧑‍💼</span><span class="dn">人材 +5</span></div>
    </div>`;

    // ── 設施 ──
    h+=`<div class="dev-sec"><div class="dev-sec-title">🏗 設施</div>`;
    h+=`<div class="dev-row" title="隨機生成一張兩格黏合設施卡加入手牌" onclick="DEV.addRandomCompound();"><span class="de">🔗</span><span class="dn">隨機複合設施</span></div>`;
    h+=`<div class="dev-row" title="清除小鎮所有格子（含設施、廢墟、百貨公司資料）" onclick="DEV.clearGrid();"><span class="de">🗑️</span><span class="dn">清除小鎮所有設施</span></div>`;
    h+=`<div style="display:flex;flex-wrap:wrap;">`;
    for(const[id,b] of Object.entries(BLDG)){
      if(id==='envy_factory'||id==='ruin'||id==='dept_store_part') continue;
      h+=`<div class="dev-card" onclick="addHand('${id}');renderHand();renderFanHand();" title="${b.desc}">
        <div class="de">${b.emoji}</div><div class="dn">${b.name}</div></div>`;
    }
    h+=`</div></div>`;

    // ── 合夥人 ──
    h+=`<div class="dev-sec"><div class="dev-sec-title">🤝 合夥人</div><div style="display:flex;flex-wrap:wrap;">`;
    for(const[id,p] of Object.entries(PARTNERS)){
      const owned=hasPartner(id);
      const tipParts=[];if(p.pos)tipParts.push('正：'+p.pos);if(p.neg&&p.neg!=='無')tipParts.push('負：'+p.neg);
      h+=`<div class="dev-card" style="${owned?'opacity:.35;pointer-events:none;':''}"
        onclick="if(!hasPartner('${id}')){recruitPartner('${id}');DEV.render();}" title="${tipParts.join('\n')}">
        <div class="de">${p.emoji}</div><div class="dn">${p.name}</div></div>`;
    }
    h+=`</div></div>`;

    // ── 市場事件 ──
    h+=`<div class="dev-sec"><div class="dev-sec-title">🎲 市場事件</div>`;
    EVENTS.forEach((ev,i)=>{
      h+=`<div class="dev-row" title="${(ev.desc||ev.title).replace(/"/g,'&quot;')}" onclick="G.phase='event';EVENTS[${i}].show(EVENTS[${i}]);render();">
        <span class="de">🎲</span><span class="dn">${ev.title}</span></div>`;
    });
    h+=`</div>`;

    // ── 商業行動 ──
    h+=`<div class="dev-sec"><div class="dev-sec-title">⚡ 商業行動</div>`;
    ACTION_POOL.forEach(act=>{
      h+=`<div class="dev-row" title="免費執行此行動（暫時補滿收益避免不夠扣）" onclick="G.profit+=9999;doAction('${act.id}');G.profit-=9999;DEV.render();">
        <span class="de">⚡</span><span class="dn">${act.label}</span></div>`;
    });
    h+=`</div>`;

    // ── 遊戲控制 ──
    h+=`<div class="dev-sec"><div class="dev-sec-title">🎮 遊戲控制</div>
      <div class="dev-row" title="強制設定 phase 為 place，可以放置設施" onclick="G.phase='place';render();"><span class="de">▶</span><span class="dn">強制 phase=place</span></div>
      <div class="dev-row" title="強制設定 phase 為 done，可以結束回合" onclick="G.phase='done';render();"><span class="de">⏹</span><span class="dn">強制 phase=done</span></div>
      <div class="dev-row" title="直接跳到本輪的最後一個回合" onclick="G.turn=G.maxTurns-1;render();"><span class="de">⏩</span><span class="dn">跳到最後回合</span></div>
      <div class="dev-row" title="將收益設為等於目標，之後結束回合即過關" onclick="G.profit=G.goal;render();"><span class="de">🏆</span><span class="dn">收益=目標（過關）</span></div>
    </div>`;

    panel.innerHTML=h;
  },
  addRandomCompound(){
    const pool=Object.keys(BLDG).filter(id=>!COMPOUND_EXCLUDE.has(id));
    if(pool.length<2){ addLog('⚠ 可用設施不足','b'); return; }
    const a=pool[Math.floor(Math.random()*pool.length)];
    let b=a; while(b===a) b=pool[Math.floor(Math.random()*pool.length)];
    const dir=COMPOUND_DIRS[Math.floor(Math.random()*COMPOUND_DIRS.length)];
    G.hand.push({
      id:`compound_${++_compoundSeq}`,
      compound:true,
      parts:[a,b],
      dr:dir.dr, dc:dir.dc, dirLabel:dir.label,
      count:1
    });
    addLog(`🔗 DEV：複合設施 ${BLDG[a].emoji}${BLDG[a].name} ${dir.label} ${BLDG[b].emoji}${BLDG[b].name}`,'w');
    renderHand(); renderFanHand();
  },
  clearGrid(){
    const gn=GN();
    for(let r=0;r<gn;r++) for(let c=0;c<gn;c++) G.grid[r][c]=null;
    G.bldgUpgrades={};
    if(G.leyaPctMods) G.leyaPctMods={};
    G.cellMods={};
    G.bombTimers={};
    if(G.tempShedMoves) G.tempShedMoves={};
    G.ruinCells=new Set();
    G.deptStoreAnchors={};
    G.deptStoreParts={};
    addLog('🗑️ DEV：已清除小鎮所有設施（含廢墟）','b');
    render();
  }
};

// 標題點擊
document.getElementById('logo').addEventListener('click',()=>DEV.push('L'));

// BOOT
G=newGame();
// Show tutorial prompt first
showTutorialPrompt();
