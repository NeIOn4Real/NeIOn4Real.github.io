// 開發者測試模式
// 啟動序列：標題×2 → 立繪×1 → 標題×2
// ══════════════════════════════════════
const DEV={
  seq:[],                     // 'L'=logo, 'C'=char
  pattern:['L','L','C','L','L'],
  timer:null,
  push(code){
    this.seq.push(code);
    if(this.timer) clearTimeout(this.timer);
    this.timer=setTimeout(()=>this.seq=[],3000);
    // 檢查末尾是否匹配
    const p=this.pattern;
    const s=this.seq;
    if(s.length>=p.length){
      const tail=s.slice(-p.length);
      if(tail.every((v,i)=>v===p[i])){
        this.seq=[];
        this.open();
      }
    }
  },
  open(){
    const panel=document.getElementById('dev-panel');
    panel.classList.add('show');
    this.render();
  },
  close(){
    document.getElementById('dev-panel').classList.remove('show');
  },
  render(){
    const panel=document.getElementById('dev-panel');
    let h='';
    // header
    h+=`<div id="dev-close"><span style="font-weight:700;font-size:12px;">🛠 開發者模式</span>
      <button onclick="DEV.close()">✕</button></div>`;

    // ── 資源操作 ──
    h+=`<div class="dev-sec"><div class="dev-sec-title">💰 資源</div>
      <div class="dev-row" title="直接增加 50 收益" onclick="G.profit+=50;render();"><span class="de">💰</span><span class="dn">收益 +50</span></div>
      <div class="dev-row" title="直接增加 500 收益" onclick="G.profit+=500;render();"><span class="de">💰</span><span class="dn">收益 +500</span></div>
      <div class="dev-row" title="手牌資源金錢 +10（沒有資源時建立一張）" onclick="G.card={value:G.card?G.card.value+10:10,type:'money'};updateCard(G.card);"><span class="de">💵</span><span class="dn">金錢 +10</span></div>
      <div class="dev-row" title="直接增加 5 個人材" onclick="G.talentCards=(G.talentCards||0)+5;renderTalentPanel();renderFanHand();"><span class="de">🧑‍💼</span><span class="dn">人材 +5</span></div>
    </div>`;

    // ── 設施 ──
    h+=`<div class="dev-sec"><div class="dev-sec-title">🏗 設施</div>`;
    h+=`<div class="dev-row" title="隨機生成一張兩格黏合設施卡加入手牌" onclick="DEV.addRandomCompound();"><span class="de">🔗</span><span class="dn">隨機複合設施</span></div>`;
    h+=`<div class="dev-row" title="清除小鎮所有格子（含設施、廢墟、百貨公司資料）" onclick="DEV.clearGrid();"><span class="de">🗑️</span><span class="dn">清除小鎮所有設施</span></div>`;
    h+=`<div style="display:flex;flex-wrap:wrap;">`;
    for(const[id,b] of Object.entries(BLDG)){
      if(id==='envy_factory'||id==='ruin'||id==='dept_store_part') continue;
      h+=`<div class="dev-card" onclick="addHand('${id}');renderHand();renderFanHand();" title="${b.desc}">
        <div class="de">${b.emoji}</div><div class="dn">${b.name}</div></div>`;
    }
    h+=`</div></div>`;

    // ── 合夥人 ──
    h+=`<div class="dev-sec"><div class="dev-sec-title">🤝 合夥人</div><div style="display:flex;flex-wrap:wrap;">`;
    for(const[id,p] of Object.entries(PARTNERS)){
      const owned=hasPartner(id);
      const tipParts=[];if(p.pos)tipParts.push('正：'+p.pos);if(p.neg&&p.neg!=='無')tipParts.push('負：'+p.neg);
      h+=`<div class="dev-card" style="${owned?'opacity:.35;pointer-events:none;':''}"
        onclick="if(!hasPartner('${id}')){recruitPartner('${id}');DEV.render();}" title="${tipParts.join('\n')}">
        <div class="de">${p.emoji}</div><div class="dn">${p.name}</div></div>`;
    }
    h+=`</div></div>`;

    // ── 市場事件 ──
    h+=`<div class="dev-sec"><div class="dev-sec-title">🎲 市場事件</div>`;
    EVENTS.forEach((ev,i)=>{
      h+=`<div class="dev-row" title="${(ev.desc||ev.title).replace(/"/g,'&quot;')}" onclick="G.phase='event';EVENTS[${i}].show(EVENTS[${i}]);render();">
        <span class="de">🎲</span><span class="dn">${ev.title}</span></div>`;
    });
    h+=`</div>`;

    // ── 商業行動 ──
    h+=`<div class="dev-sec"><div class="dev-sec-title">⚡ 商業行動</div>`;
    ACTION_POOL.forEach(act=>{
      h+=`<div class="dev-row" title="免費執行此行動（暫時補滿收益避免不夠扣）" onclick="G.profit+=9999;doAction('${act.id}');G.profit-=9999;DEV.render();">
        <span class="de">⚡</span><span class="dn">${act.label}</span></div>`;
    });
    h+=`</div>`;

    // ── 遊戲控制 ──
    h+=`<div class="dev-sec"><div class="dev-sec-title">🎮 遊戲控制</div>
      <div class="dev-row" title="強制設定 phase 為 place，可以放置設施" onclick="G.phase='place';render();"><span class="de">▶</span><span class="dn">強制 phase=place</span></div>
      <div class="dev-row" title="強制設定 phase 為 done，可以結束回合" onclick="G.phase='done';render();"><span class="de">⏹</span><span class="dn">強制 phase=done</span></div>
      <div class="dev-row" title="直接跳到本輪的最後一個回合" onclick="G.turn=G.maxTurns-1;render();"><span class="de">⏩</span><span class="dn">跳到最後回合</span></div>
      <div class="dev-row" title="將收益設為等於目標，之後結束回合即過關" onclick="G.profit=G.goal;render();"><span class="de">🏆</span><span class="dn">收益=目標（過關）</span></div>
      <div class="dev-row" title="增加10回合上限" onclick="G.maxTurns+=10;addLog('DEV：+10回合（共'+G.maxTurns+'）');render();"><span class="de">⏱️</span><span class="dn">+10 回合</span></div>
      <div class="dev-row" title="獲得1張廢墟紀念碑" onclick="addHand('ruin_monument');renderFanHand();render();"><span class="de">🗿</span><span class="dn">獲得廢墟紀念碑</span></div>
    </div>`;

    panel.innerHTML=h;
  },
  addRandomCompound(){
    const pool=Object.keys(BLDG).filter(id=>!COMPOUND_EXCLUDE.has(id));
    if(pool.length<2){ addLog('⚠ 可用設施不足','b'); return; }
    const a=pool[Math.floor(Math.random()*pool.length)];
    let b=a; while(b===a) b=pool[Math.floor(Math.random()*pool.length)];
    const dir=COMPOUND_DIRS[Math.floor(Math.random()*COMPOUND_DIRS.length)];
    G.hand.push({
      id:`compound_${++_compoundSeq}`,
      compound:true,
      parts:[a,b],
      dr:dir.dr, dc:dir.dc, dirLabel:dir.label,
      count:1
    });
    addLog(`🔗 DEV：複合設施 ${BLDG[a].emoji}${BLDG[a].name} ${dir.label} ${BLDG[b].emoji}${BLDG[b].name}`,'w');
    renderHand(); renderFanHand();
  },
  clearGrid(){
    const gn=GN();
    for(let r=0;r<gn;r++) for(let c=0;c<gn;c++) G.grid[r][c]=null;
    G.bldgUpgrades={};
    if(G.leyaPctMods) G.leyaPctMods={};
    G.cellMods={};
    G.bombTimers={};
    if(G.tempShedMoves) G.tempShedMoves={};
    G.ruinCells=new Set();
    G.deptStoreAnchors={};
    G.deptStoreParts={};
    addLog('🗑️ DEV：已清除小鎮所有設施（含廢墟）','b');
    render();
  }
};

// 標題點擊
document.getElementById('logo').addEventListener('click',()=>DEV.push('L'));

// BOOT
G=newGame();
SM.goto('title');
</script>

  <img src="img/C_1.png" alt="譚雅與蕾雅">
</div>

<div id="dev-panel"></div>
