<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>創業小鎮</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4efe5;--bg2:#ebe3d0;--bg3:#ddd4bc;--sur:#faf7f1;
  --br:rgba(80,55,20,.13);--br2:rgba(80,55,20,.25);
  --tx:#2a1a08;--mu:rgba(42,26,8,.5);--hi:rgba(42,26,8,.28);
  --money:#b06000;--mat:#7a4e1a;--goods:#2a6e3a;
  --acc:#b33a00;--blue:#1a4e7a;--green:#2a7a3a;--red:#c0392b;
  --cell:66px;--r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--tx);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:12px;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(80,55,20,.03) 40px,rgba(80,55,20,.03) 41px),
    repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(80,55,20,.03) 40px,rgba(80,55,20,.03) 41px);}

/* HEADER */
#hdr{width:100%;max-width:880px;display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
#logo{font-size:18px;font-weight:900;letter-spacing:-.5px;}
#logo span{color:var(--acc);}
.chip{display:flex;align-items:center;gap:4px;background:var(--sur);border:1px solid var(--br2);
  border-radius:99px;padding:4px 12px;font-size:12px;font-weight:700;
  box-shadow:0 1px 3px rgba(80,55,20,.07);}
.chip .v{color:var(--money);}
#profit-area{margin-left:auto;display:flex;align-items:center;gap:6px;}
#pbar{height:7px;width:100px;background:var(--bg3);border-radius:99px;overflow:hidden;border:1px solid var(--br);}
#pbar-fill{height:100%;background:var(--green);border-radius:99px;transition:width .4s;}

/* LAYOUT */
#main{width:100%;max-width:880px;display:grid;grid-template-columns:155px 1fr 220px;gap:10px;align-items:start;}
.panel{background:var(--sur);border:1px solid var(--br2);border-radius:var(--r);padding:10px 12px;box-shadow:0 2px 6px rgba(80,55,20,.05);}
.pt{font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.7px;
  padding-bottom:6px;border-bottom:1px solid var(--br);margin-bottom:8px;}

/* EVENT BANNER */
#ev-banner{width:100%;max-width:880px;background:var(--sur);border:1px solid var(--br2);
  border-radius:var(--r);padding:10px 14px;margin-bottom:10px;display:none;
  box-shadow:0 2px 8px rgba(80,55,20,.07);}
#ev-banner.show{display:block;}
#ev-title{font-size:12px;font-weight:700;margin-bottom:3px;}
#ev-desc{font-size:11px;color:var(--mu);margin-bottom:8px;}
.ev-opts{display:flex;gap:6px;flex-wrap:wrap;}
.eopt{padding:6px 14px;border-radius:99px;border:1px solid var(--br2);background:var(--bg2);
  font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'Noto Sans TC',sans-serif;}
.eopt:hover{background:var(--bg);border-color:var(--acc);color:var(--acc);}
.eopt.pri{background:var(--acc);color:#fff;border-color:var(--acc);}

/* GRID */
#grid-area{display:flex;flex-direction:column;align-items:center;gap:2px;}
.drow{display:flex;gap:2px;position:relative;}
.dcol-wrap{display:flex;align-items:center;gap:2px;}
.dside{display:flex;flex-direction:column;gap:2px;}
.dbtn{
  width:var(--cell);height:26px;background:transparent;border:2px dashed transparent;
  border-radius:6px;cursor:pointer;font-size:16px;font-weight:900;color:transparent;
  transition:all .2s;display:flex;align-items:center;justify-content:center;
  font-family:'Noto Sans TC',sans-serif;pointer-events:none;opacity:0;
}
.dbtn.side{width:26px;height:var(--cell);}
/* 拖曳中才顯示箭頭 */
body.card-dragging .dbtn:not(.wind-blocked){
  opacity:1;pointer-events:auto;color:var(--acc);
  border-color:rgba(179,58,0,.25);background:rgba(179,58,0,.05);
  z-index:70;position:relative;
}
/* 場風/颱風限制方向：拖曳中也保持隱藏 */
body.card-dragging .dbtn.wind-blocked{
  opacity:0 !important;pointer-events:none !important;
}
/* 允許方向：加強顯示 */
body.card-dragging .dbtn.wind-active{
  opacity:1;pointer-events:auto;
  color:var(--acc);border-color:var(--acc);
  background:rgba(179,58,0,.12);
  animation:windPulse 1s ease-in-out infinite;
}
@keyframes windPulse{
  0%,100%{ box-shadow:0 0 0 0 rgba(179,58,0,.3); }
  50%{ box-shadow:0 0 0 6px rgba(179,58,0,.0); }
}
body.card-dragging .dbtn:hover:not(.wind-blocked),
.dbtn.drag-over{
  background:rgba(42,122,58,.18)!important;border-color:var(--green)!important;
  color:var(--green)!important;transform:scale(1.15);opacity:1;pointer-events:auto;
}
.dbtn:disabled{opacity:0!important;pointer-events:none;}
#grid{display:grid;gap:2px;background:var(--bg3);border:2px solid var(--br2);
  border-radius:var(--r);padding:4px;box-shadow:0 4px 14px rgba(80,55,20,.1);}
.cell{width:var(--cell);height:var(--cell);background:var(--bg2);border:1px solid var(--br);
  border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;position:relative;user-select:none;}
.cell:hover:not(.filled){background:var(--bg);border-color:var(--br2);}
.cell.filled{background:var(--bg);border-color:var(--br2);cursor:default;}
.cell.filled:hover{background:var(--bg);}
.cell.pulse{animation:pulse .45s ease;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.cemoji{font-size:22px;line-height:1;}
.cname{font-size:8px;color:var(--mu);margin-top:1px;}

/* HAND */
.hi{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:7px;
  background:var(--bg2);border:1px solid var(--br);cursor:pointer;transition:all .15s;margin-bottom:4px;}
.hi:hover{background:var(--bg);border-color:var(--br2);}
.hi.sel{background:rgba(179,58,0,.1);border-color:var(--acc);}
.hi.off{opacity:.35;cursor:not-allowed;pointer-events:none;}
.hi-em{font-size:18px;flex-shrink:0;}
.hi-nm{font-size:11px;font-weight:700;}
.hi-ds{font-size:9px;color:var(--mu);line-height:1.3;}
.hi-ct{font-size:10px;font-weight:700;color:var(--acc);margin-left:auto;}

/* BTNS */
.abtn{width:100%;padding:9px 12px;border:1px solid var(--br2);border-radius:var(--r);
  background:var(--sur);color:var(--tx);font-size:12px;font-weight:700;
  font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .15s;
  text-align:left;margin-bottom:5px;}
.abtn:hover:not(:disabled){background:var(--bg2);}
.abtn.pri{background:var(--acc);color:#fff;border-color:var(--acc);}
.abtn.pri:hover{opacity:.88;}
.abtn:disabled{opacity:.28;cursor:not-allowed;}

/* LOG */
#side-log{
  background:var(--sur);border:1px solid var(--br);
  border-radius:var(--r);padding:8px 10px;
  height:100%;overflow-y:auto;font-size:10px;
  min-height:200px;
}
.log-turn-block{ margin-bottom:10px; }
.log-turn-hdr{ font-size:10px;font-weight:700;color:var(--acc);margin-bottom:3px;padding-bottom:3px;border-bottom:1px solid var(--br); }
.log-entry{ line-height:1.6;color:var(--mu);padding-left:4px; }
.log-entry.g{ color:var(--green); }
.log-entry.b{ color:var(--red); }
.log-entry.w{ color:var(--money); }
.log-entry.h{ color:var(--tx);font-weight:700; }
.log-calc{ font-family:'DM Mono',monospace;font-size:9px;color:var(--blue);padding-left:8px; }

/* MODAL */
#modal{display:none;position:fixed;inset:0;z-index:100;background:rgba(42,26,8,.55);
  align-items:center;justify-content:center;}
#modal.show{display:flex;}
#mbox{background:var(--sur);border:1px solid var(--br2);border-radius:14px;padding:28px 24px;
  text-align:center;max-width:300px;width:90%;box-shadow:0 8px 28px rgba(42,26,8,.18);
  animation:min .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes min{from{transform:scale(.7);opacity:0}}
#memo{font-size:38px;margin-bottom:8px;}
#mtitle{font-size:20px;font-weight:900;margin-bottom:6px;}
#mmsg{font-size:11px;color:var(--mu);margin-bottom:16px;line-height:1.7;white-space:pre-line;}
#mbtn{padding:9px 24px;border-radius:99px;border:none;font-size:12px;font-weight:700;
  font-family:'Noto Sans TC',sans-serif;cursor:pointer;background:var(--acc);color:#fff;}

/* DELTA */
.delta{position:fixed;pointer-events:none;font-size:14px;font-weight:900;z-index:200;
  animation:fup .9s ease forwards;}
@keyframes fup{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-44px)}}
/* ── 元素卡牌 ── */

@keyframes cardPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

.cell.move-src{outline:3px solid var(--acc);box-shadow:0 0 10px rgba(179,58,0,.3);z-index:2;}
.cell.ruin-cell{background:repeating-linear-gradient(45deg,var(--bg2),var(--bg2) 4px,rgba(120,100,80,.12) 4px,rgba(120,100,80,.12) 8px);border-color:rgba(120,100,80,.4);}
.cell.drag-target{background:rgba(179,58,0,.1);border-color:var(--acc);border-style:dashed;}
.cell.drag-over-cell{background:rgba(42,122,58,.12);border:2px solid var(--green);}

/* ── 元素移動動畫 ── */
#el-mover{
  position:fixed;width:56px;height:66px;
  background:linear-gradient(145deg,var(--sur),var(--bg2));
  border:2px solid var(--acc);border-radius:8px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;pointer-events:none;z-index:500;
  box-shadow:0 4px 14px rgba(179,58,0,.3);
  transition:left .32s cubic-bezier(.4,0,.2,1),top .32s cubic-bezier(.4,0,.2,1);
}
#el-mover .mv-emoji{font-size:16px;line-height:1;}
#el-mover .mv-val{font-size:14px;font-weight:900;font-family:'DM Mono',monospace;}
#el-mover .mv-type{font-size:7px;color:var(--mu);}

/* ── 收益飛行動畫 ── */
.profit-fly{
  position:fixed;pointer-events:none;z-index:600;
  font-size:20px;font-weight:900;color:var(--green);
  text-shadow:0 2px 8px rgba(42,122,58,.4);
  animation:profitFly 1.2s cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes profitFly{
  0%{opacity:0;transform:scale(.5) translateY(0);}
  20%{opacity:1;transform:scale(1.2) translateY(-20px);}
  80%{opacity:1;}
  100%{opacity:0;transform:scale(.6) translateY(-120px) translateX(var(--tx,0px));}
}
/* 莫菲定律全屏特效 */
@keyframes murphyShake{
  0%,100%{transform:translate(0,0)}
  10%{transform:translate(-8px,4px)}
  20%{transform:translate(6px,-6px)}
  30%{transform:translate(-10px,2px)}
  40%{transform:translate(8px,-4px)}
  50%{transform:translate(-4px,8px)}
  60%{transform:translate(6px,-2px)}
  70%{transform:translate(-6px,6px)}
  80%{transform:translate(4px,-8px)}
  90%{transform:translate(-2px,4px)}
}
@keyframes murphyFadeIn{
  0%{opacity:0;}
  100%{opacity:1;}
}
#murphy-overlay{
  position:fixed;inset:0;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  background:rgba(0,0,0,.7);
  pointer-events:auto;cursor:pointer;
}
#murphy-overlay .murphy-text{
  color:#fff;font-size:22px;font-weight:900;text-align:center;
  text-shadow:0 2px 16px rgba(0,0,0,.9);
  padding-top:24px;
  z-index:2;
  animation:murphyFadeIn .6s ease-out;
}
#murphy-overlay .murphy-chars{
  display:flex;align-items:flex-start;justify-content:center;
  width:80vw;max-width:700px;height:calc(100vh - 80px);overflow:hidden;
  margin-top:-10px;
}
#murphy-overlay .murphy-chars img{
  width:100%;height:100%;
  object-fit:cover;object-position:top center;
  image-rendering:auto;
  filter:drop-shadow(0 4px 24px rgba(0,0,0,.7));
}
.murphy-shaking{ animation:murphyShake .5s ease-in-out 3; }
/* 人材發光提示 */
@keyframes talentGlow{
  0%,100%{box-shadow:0 0 4px rgba(176,96,0,.2);}
  50%{box-shadow:0 0 14px rgba(176,96,0,.6),0 0 24px rgba(176,96,0,.3);}
}
.talent-glow{ animation:talentGlow 1.5s ease-in-out 3; }

/* ── 格子閃光 ── */
.cell.active-path{
  background:rgba(179,58,0,.08);
  border-color:rgba(179,58,0,.4);
  box-shadow:0 0 0 2px rgba(179,58,0,.2);
}
.cell.transform-flash{animation:tflash .5s ease;}
@keyframes tflash{0%{background:rgba(42,122,58,.2)}100%{background:inherit}}

/* ── 數值變化標籤 ── */
.change-badge{
  position:absolute;top:-18px;left:50%;transform:translateX(-50%);
  background:var(--green);color:#fff;border-radius:99px;
  padding:2px 8px;font-size:10px;font-weight:700;white-space:nowrap;
  animation:badgePop .5s ease forwards;pointer-events:none;z-index:10;
}
@keyframes badgePop{0%{opacity:0;transform:translateX(-50%) scale(.5)}
  60%{opacity:1;transform:translateX(-50%) scale(1.1)}
  100%{opacity:1;transform:translateX(-50%) scale(1)}}

/* 行動選項 */
.act-opt{width:100%;padding:7px 10px;margin-bottom:5px;border-radius:8px;
  border:1px solid var(--br2);background:var(--bg2);cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;text-align:left;transition:all .15s;}
.act-opt:hover:not(:disabled){background:var(--bg);border-color:var(--acc);}
.act-opt:disabled{opacity:.3;cursor:not-allowed;}
.act-opt-label{font-size:11px;font-weight:700;display:flex;justify-content:space-between;align-items:center;}
.act-opt-desc{font-size:9px;color:var(--mu);margin-top:2px;}
.act-cost{color:var(--acc);font-size:10px;font-weight:700;white-space:nowrap;}
.act-cost.free{color:var(--green);}
.cell.upgrade-glow{
  border-color:var(--money)!important;
  box-shadow:0 0 0 2px rgba(176,96,0,.3), 0 0 10px rgba(176,96,0,.2);
  animation:upgradeGlow 1.2s ease-in-out infinite;
  cursor:pointer!important;
}
@keyframes upgradeGlow{0%,100%{box-shadow:0 0 0 2px rgba(176,96,0,.3)}50%{box-shadow:0 0 0 3px rgba(176,96,0,.6),0 0 14px rgba(176,96,0,.3)}}
/* 事件預告格子高亮 */
.cell.event-preview{
  border-color:var(--blue)!important;
  box-shadow:0 0 0 2px rgba(26,78,122,.25), 0 0 8px rgba(26,78,122,.15);
  animation:eventPreviewPulse 2s ease-in-out infinite;
}
@keyframes eventPreviewPulse{0%,100%{box-shadow:0 0 0 2px rgba(26,78,122,.2)}50%{box-shadow:0 0 0 3px rgba(26,78,122,.45),0 0 10px rgba(26,78,122,.2)}}
.upgrade-hint{width:100%;max-width:880px;background:rgba(176,96,0,.1);border:1px solid rgba(176,96,0,.3);
  border-radius:8px;padding:7px 14px;margin-bottom:8px;font-size:11px;font-weight:700;color:var(--money);display:none;}
.upgrade-hint.show{display:block;}
.acard{width:160px;background:var(--sur);border:1.5px solid var(--br2);border-radius:14px;padding:16px 14px;
  display:flex;flex-direction:column;gap:7px;transition:all .15s;
  box-shadow:0 8px 28px rgba(42,26,8,.18),0 2px 6px rgba(42,26,8,.08);opacity:1;}
.acard:hover:not(.acard-disabled){border-color:var(--acc);transform:translateY(-4px);box-shadow:0 14px 36px rgba(179,58,0,.22);}
.acard-disabled{opacity:1;pointer-events:none;border-color:var(--red);background:var(--bg2);}
.acard-disabled .acard-label{color:var(--mu);}
.acard-disabled .acard-desc{color:var(--hi);}
.acard-disabled .acard-cost{color:var(--red);}
.acard-label{font-size:12px;font-weight:700;color:var(--tx);}
.acard-desc{font-size:9px;color:var(--mu);line-height:1.5;flex:1;}
.acard-cost{font-size:11px;font-weight:700;color:var(--acc);text-align:right;}
.acard-cost.free{color:var(--green);}
/* 格子增幅標記 */
.cell-mod-pos{position:absolute;bottom:2px;right:3px;font-size:9px;font-weight:900;color:var(--green);}
.cell-mod-neg{position:absolute;bottom:2px;right:3px;font-size:9px;font-weight:900;color:var(--red);}
/* 合夥人卡片 */
.partner-card{
  flex-shrink:0;width:72px;
  background:var(--sur);border:1px solid var(--br2);border-radius:10px;
  padding:8px 6px;text-align:center;
  box-shadow:0 2px 8px rgba(42,26,8,.1);
  transition:transform .15s;cursor:default;
}
.partner-card:hover{transform:translateY(-2px);}
.partner-card .pc-emoji{font-size:20px;line-height:1;margin-bottom:3px;}
.partner-card .pc-name{font-size:8px;font-weight:700;color:var(--tx);line-height:1.2;}
.partner-card .pc-pos{font-size:7px;color:var(--green);margin-top:2px;line-height:1.3;}
.partner-card .pc-neg{font-size:7px;color:var(--red);margin-top:1px;line-height:1.3;}

/* 浮動說明視窗 */
#tooltip{
  position:fixed;z-index:9999;pointer-events:none;
  background:var(--tx);color:var(--bg);
  border-radius:8px;padding:8px 12px;
  font-size:10px;line-height:1.6;max-width:200px;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
  opacity:0;transition:opacity .15s;
  white-space:pre-wrap;
}
#tooltip.show{opacity:1;}

/* 選擇卡片（設施/合夥人） */
.sel-card{
  width:180px;flex-shrink:0;
  min-height:200px;
  background:var(--sur);border:1.5px solid var(--br2);border-radius:12px;
  padding:14px 12px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  box-shadow:0 4px 14px rgba(42,26,8,.12);
  transition:all .15s;
  text-align:center;
}
.sel-card:hover{border-color:var(--acc);transform:translateY(-3px);box-shadow:0 8px 20px rgba(179,58,0,.18);}
.sel-card-emoji{font-size:24px;line-height:1;margin-bottom:2px;}
.sel-card-name{font-size:12px;font-weight:700;color:var(--tx);text-align:center;width:100%;}
.sel-card-desc{font-size:9px;color:var(--mu);line-height:1.4;flex:1;text-align:center;width:100%;}
.sel-card-pos{font-size:8px;color:var(--green);margin-top:2px;}
.sel-card-neg{font-size:8px;color:var(--red);margin-top:1px;}
/* partner card hover tooltip */
.partner-card{position:relative;}

/* ══ 扇形手牌系統 ══ */
#hand-fan-area {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 60;
  background: linear-gradient(to top, rgba(244,239,229,0.98) 75%, transparent);
  overflow: visible;
}

/* 卡牌基底 */
.fan-card {
  position: relative;
  flex-shrink: 0;
  width: 114px;
  height: 158px;
  border-radius: 14px;
  cursor: pointer;
  pointer-events: auto;
  transform-origin: center bottom;
  transition: transform 0.22s cubic-bezier(.4,0,.2,1), box-shadow 0.2s;
  user-select: none;
  will-change: transform;
  margin: 0 -12px;
}

.fan-card:hover {
  transform: translateY(-80px) rotate(0deg) scale(1.1) !important;
  z-index: 200 !important;
}
.fan-card.event-card,
.fan-card.el-card-fan,
.fan-card.talent-card {
  border-color: var(--money);
  background: linear-gradient(145deg, #fff9ee, #fff3d4);
}

.fan-card .fc-emoji { font-size: 30px; line-height: 1; z-index: 1; }
.fan-card .fc-name  { font-size: 12px; font-weight: 700; text-align: center; line-height: 1.3; color: var(--tx); }
.fan-card .fc-desc  { font-size: 10px; color: var(--mu); text-align: center; line-height: 1.3; }
.fan-card .fc-count { font-size: 13px; font-weight: 700; color: var(--acc); }
.fan-card .fc-val   { font-size: 21px; font-weight: 900; color: var(--green); font-family: 'DM Mono', monospace; }
.fan-card .fc-type  { font-size: 12px; color: var(--mu); }
.fan-card .fc-back-mark { font-size: 28px; opacity: .15; }

/* 燃燒消失動畫 */
@keyframes burnAway {
  0%   { opacity:1; transform: translateY(-80px) scale(1.1); filter: brightness(1); }
  40%  { opacity:.9; transform: translateY(-130px) scale(1.12); filter: brightness(1.6) sepia(1) saturate(4); }

#partner-float{

.joker-card:hover {

}

.joker-card.demon .jc-name { color:#c0392b; }

/* ── 角色立繪（右下角） ── */
#char-tray {
  position: fixed;
  bottom: -22%;
  right: -5px;
  z-index: 98;
  pointer-events: none;
  width: clamp(276px, 27.6vw, 437px);
}

/* ── 對話泡泡 ── */
#char-bubble {
  position: fixed;
  right: 6px;
  bottom: calc(clamp(276px, 27.6vw, 437px) * 1.2);
  max-width: 240px;
  background: #fff;
  border: 2px solid var(--br2);
  border-radius: 16px 16px 16px 4px;
  padding: 10px 14px;
  font-size: 12px;
  line-height: 1.6;
  color: var(--tx);
  box-shadow: 0 4px 16px rgba(42,26,8,.15);
  z-index: 99;
  pointer-events: none;
  opacity: 0;
  transform: translateY(6px) scale(0.96);
  transition: opacity .22s ease, transform .22s ease;
  word-break: break-word;
}
#char-bubble.show {
  opacity: 1;
  transform: translateY(0) scale(1);
}
/* 泡泡尾巴朝右下（指向人物） */
#char-bubble::after {
  content: '';
  position: absolute;
  bottom: -10px;
  right: 12px;
  border: 6px solid transparent;
  border-top-color: var(--br2);
}
#char-bubble::before {
  content: '';
  position: absolute;
  bottom: -7px;
  right: 13px;
  border: 5px solid transparent;
  border-top-color: #fff;
  z-index: 1;
}
/* 人物發光效果 */
#char-tray img {
  width: 100%;
  display: block;
  pointer-events: auto;
  cursor: pointer;
  filter: drop-shadow(-3px 0 12px rgba(0,0,0,.18));
  transition: transform .2s ease, filter .3s ease;
}

#char-tray:hover img {
  transform: translateY(-6px) scale(1.01);
}

/* 合夥人頭像卡片 */
.sel-card-avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  object-fit: cover;
  object-position: top center;
  margin-bottom: 6px;
  flex-shrink: 0;
}

@keyframes pulse-acc {
  0%,100%{ box-shadow:0 0 0 0 rgba(179,58,0,.4); }
  50%{ box-shadow:0 0 0 8px rgba(179,58,0,0); }
}

function hasPartner(id){ return G.partners.some(p=>p===id); }
function hasPride(){ return hasPartner('pride'); }
function isDemonNegDisabled(pid){
  // 傲慢惡魔只豁免名稱含「惡魔」的合夥人負面效果
  if(!hasPride()) return false;
  if(!pid) return false;
  const p=PARTNERS[pid];
  return p&&p.name&&p.name.includes('惡魔');
}

const N=4; // base grid size
function GN(){ return (G&&G.gridSize)||N; }
function isFacility(bId){ return bId&&bId!=='ruin'; }
function isShopType(bId){ return bId&&BLDG[bId]&&BLDG[bId].isShop===true; }
function eachCell(fn){ for(let r=0;r<GN();r++) for(let c=0;c<GN();c++) fn(r,c,G.grid[r][c]); }
function findCells(pred){ const res=[]; eachCell((r,c,b)=>{ if(pred(r,c,b)) res.push([r,c]); }); return res; }

    show:(ev)=>{
      const labels={top:'↑上',bottom:'↓下',left:'←左',right:'→右'};
      const ed=G.nextEventData||{};
      const d=ed.dir||['top','bottom','left','right'][Math.floor(Math.random()*4)];
      const gn=GN();
      // 需要轉移的位置鍵值資料表
      const keyedData=['bldgUpgrades','leyaPctMods','cellMods','bombTimers','tempShedMoves','logisticsVault','cellOverlay','futuresPct'];
      // 計算每個設施的目標位置（廢墟不滑動，視為障礙）
      const moves={}; // 'r,c' → [nr,nc]
      const dr=d==='top'?-1:d==='bottom'?1:0;
      const dc=d==='left'?-1:d==='right'?1:0;
      // 依滑動方向決定遍歷順序（靠近目標邊的先處理）
      const rows=[...Array(gn).keys()], cols=[...Array(gn).keys()];
      if(dr>0) rows.reverse();
      if(dc>0) cols.reverse();
      const occupied=new Set();
      // 先標記廢墟位置（不動，視為障礙）
      for(let r=0;r<gn;r++) for(let c=0;c<gn;c++) if(G.grid[r][c]==='ruin') occupied.add(`${r},${c}`);
      // 逐一滑動設施
      for(const r of rows) for(const c of cols){
        if(!isFacility(G.grid[r][c])) continue;
        let nr=r, nc=c;
        while(true){
          const tr=nr+dr, tc=nc+dc;
          if(tr<0||tr>=gn||tc<0||tc>=gn) break;
          if(occupied.has(`${tr},${tc}`)) break;
          nr=tr; nc=tc;
        }
        occupied.add(`${nr},${nc}`);
        if(nr!==r||nc!==c) moves[`${r},${c}`]=[nr,nc];
      }
      // 執行移動
      const newGrid=Array(gn).fill(null).map((_,r)=>[...G.grid[r]]);
      const newKeyed={}; keyedData.forEach(k=>newKeyed[k]={...(G[k]||{})});
      // 先清除舊位置
      Object.keys(moves).forEach(k=>{
        const [r,c]=k.split(',').map(Number);
        newGrid[r][c]=null;
        keyedData.forEach(dk=>{ delete newKeyed[dk][k]; });
      });
      // 放到新位置
      Object.entries(moves).forEach(([k,[nr,nc]])=>{
        const [r,c]=k.split(',').map(Number);
        const nk=`${nr},${nc}`;
        newGrid[nr][nc]=G.grid[r][c];
        keyedData.forEach(dk=>{ const v=G[dk]?.[k]; if(v!==undefined) newKeyed[dk][nk]=v; });
      });
      G.grid=newGrid;
      keyedData.forEach(k=>G[k]=newKeyed[k]);
      // 重建 ruinCells（廢墟不動，但以防萬一）
      G.ruinCells=new Set();
      for(let r=0;r<gn;r++) for(let c=0;c<gn;c++) if(G.grid[r][c]==='ruin') G.ruinCells.add(`${r},${c}`);
      // 重建百貨公司追蹤
      G.deptStoreAnchors={}; G.deptStoreParts={};

          G.deptStoreAnchors[ak]=true;

            if(pr<gn&&pc<gn&&G.grid[pr][pc]==='dept_store_part') G.deptStoreParts[`${pr},${pc}`]=ak;
          });
        }
      }
      const moveCount=Object.keys(moves).length;
      addLog(`🌍 地震：所有設施往 ${labels[d]} 滑動！（${moveCount}個設施移動）`,'b');
      showEv(ev.title,`地震！所有設施往 ${labels[d]} 方向滑動`,`<button class="eopt pri" onclick="evDone()">確認</button>`);
      render();
    },

          const k=`${r},${c}`;
          facs.push({bId:G.grid[r][c], upg:G.bldgUpgrades[k]||0, leya:G.leyaPctMods[k]||0, mods:G.cellMods[k]||0});
          G.grid[r][c]=null; delete G.bldgUpgrades[k]; delete G.leyaPctMods[k]; delete G.cellMods[k];
        }
      }
      // 收集所有空格（含剛清空的）
      const empties=[];
      for(let r=0;r<gn;r++) for(let c=0;c<gn;c++) if(!G.grid[r][c]||G.grid[r][c]==='ruin') empties.push([r,c]);
      // 隨機放回
      empties.sort(()=>Math.random()-.5);
      facs.sort(()=>Math.random()-.5);
      facs.forEach((f,i)=>{
        if(i>=empties.length) return;
        const [nr,nc]=empties[i];
        const nk=`${nr},${nc}`;
        if(G.grid[nr][nc]==='ruin'&&G.ruinCells) G.ruinCells.delete(nk);
        G.grid[nr][nc]=f.bId;
        if(f.upg) G.bldgUpgrades[nk]=f.upg;
        if(f.leya) G.leyaPctMods[nk]=f.leya;
        if(f.mods) G.cellMods[nk]=f.mods;
      });
      // 清除疊加設施和爆破計時（打亂後位置不對應）
      G.cellOverlay={};
      G.bombTimers={};
      G._futuresMoveNext=[];
      // 重建百貨公司追蹤
      G.deptStoreAnchors={}; G.deptStoreParts={};
      for(let r=0;r<gn;r++) for(let c=0;c<gn;c++){
        if(G.grid[r][c]==='dept_store'){
          const ak=`${r},${c}`;
          G.deptStoreAnchors[ak]=true;
          [[r,c+1],[r+1,c],[r+1,c+1]].forEach(([pr,pc])=>{
            if(pr<gn&&pc<gn&&G.grid[pr][pc]==='dept_store_part') G.deptStoreParts[`${pr},${pc}`]=ak;
          });
        }
      }
      // 給予 2 張保證複合設施
      const _mPool=Object.keys(BLDG).filter(bid=>!COMPOUND_EXCLUDE.has(bid));
      for(let _mi=0;_mi<2;_mi++){
        const a=_mPool[Math.floor(Math.random()*_mPool.length)];
        const b2=_mPool.filter(bid=>bid!==a)[Math.floor(Math.random()*(_mPool.length-1))];
        const dir=COMPOUND_DIRS[Math.floor(Math.random()*COMPOUND_DIRS.length)];
        G.hand.push({id:`compound_${++_compoundSeq}`,compound:true,parts:[a,b2],dr:dir.dr,dc:dir.dc,dirLabel:dir.label,count:1});
        addLog(`🔗 複合設施！${BLDG[a].emoji}${BLDG[a].name} ${dir.label} ${BLDG[b2].emoji}${BLDG[b2].name}`,'w');
      }
      // 莫菲定律後，下次事件限定為特定池
      G._murphyNextPool=true;
      // 觸發後重置權重追蹤，避免連續觸發
      G._murphyTrack={lastSend:null,repeatCount:0,noMove:0};
      addLog(`🔀 莫菲定律：所有設施被打亂！獲得2張複合設施`,'b');
      // 全屏特效：震動 + 立繪 + 台詞
      document.getElementById('main').classList.add('murphy-shaking');
      // 隱藏右下常駐立繪
      const charTray=document.getElementById('char-tray');
      if(charTray) charTray.style.display='none';
      const overlay=document.createElement('div');
      overlay.id='murphy-overlay';
      overlay.innerHTML=`
        <div class="murphy-text">最近好像過得有點太順利了？<br>這在地獄是不可能的。</div>
        <div class="murphy-chars">
          <img src="img/C_2.png" alt="譚雅與蕾雅">
        </div>
      `;
      overlay.onclick=()=>{
        overlay.remove();
        document.getElementById('main').classList.remove('murphy-shaking');
        if(charTray) charTray.style.display='';
        showEv(ev.title,`所有設施位置被隨機打亂！獲得2張複合設施作為補償。`,`<button class="eopt pri" onclick="evDone()">確認</button>`);
        render();
      };
      document.body.appendChild(overlay);
      // 自動跳過（5秒後）
      setTimeout(()=>{ if(document.getElementById('murphy-overlay')) overlay.click(); },5000);
    },
  },
  {
    id:'job_assist', title:'💼 就業輔助', onShow:()=>tryDialogue('event_就業輔助'), desc:'獲得目標20%的收益',
    show:(ev)=>{
      const bonus=Math.ceil(G.goal*0.2);
      G.profit+=bonus;
      addLog(`💼 就業輔助：獲得目標20%收益 +${bonus}（共${G.profit}）`,'g');
      showEv(ev.title,`獲得收益目標的 20% 作為補助：+${bonus}`,`<button class="eopt pri" onclick="evDone()">確認</button>`);
      setTimeout(()=>profitFlyFrom(document.getElementById('ev-banner'),bonus),300);
      render();
    },
  },
];

// ── 格子修正 helper ──
function applyRowColPctMod(axis,idx,val){
  if(!G.cellPctMods) G.cellPctMods={};
  for(let i=0;i<GN();i++){
    const key=axis==='row'?`${idx},${i}`:`${i},${idx}`;
    G.cellPctMods[key]=(G.cellPctMods[key]||0)+val;
  }
  flashModCells(axis,idx,val);
}
function apply2x2PctMod(r,c,val){
  if(!G.cellPctMods) G.cellPctMods={};
  for(let dr=0;dr<2;dr++) for(let dc=0;dc<2;dc++){
    const key=`${r+dr},${c+dc}`;
    G.cellPctMods[key]=(G.cellPctMods[key]||0)+val;
  }
  flash2x2Cells(r,c,val);
}
function flashModCells(axis,idx,val){
  setTimeout(()=>{
    for(let i=0;i<GN();i++){
      const [r,ci]=axis==='row'?[idx,i]:[i,idx];
      const el=document.querySelector(`[data-r="${r}"][data-c="${ci}"]`);
      if(el){ el.style.outline=`3px solid ${val>0?'var(--green)':'var(--red)'}`;
        setTimeout(()=>el.style.outline='',1200); }
    }
  },100);
}
function flash2x2Cells(r,c,val){
  setTimeout(()=>{
    for(let dr=0;dr<2;dr++) for(let dc=0;dc<2;dc++){
      const el=document.querySelector(`[data-r="${r+dr}"][data-c="${c+dc}"]`);
      if(el){ el.style.outline=`3px solid ${val>0?'var(--green)':'var(--red)'}`;
        setTimeout(()=>el.style.outline='',1200); }
    }
  },100);
}

const EVENT_INTERVAL=3; // 每 3 回合一次（第 3、6、9 回合）

let G;
function newGame(){

    ],

    nextEvent:null,      // 預告的隨機事件
    nextEventTurn:3,     // 預告事件將在哪個回合觸發
    actionOptions:[],    // 本回合2個行動選項

    cellPctMods:{},      // 格子百分比修正值 {"r,c": +10/-10}，每輪清除

    _goalReachedTurn:0,  // 本輪首次達標的回合數（0=尚未達標）
    logs:[],

  };
}

function startRound(){
  G.cellMods={};
  G.cellPctMods={};
  // 保留上一輪未觸發的預告事件，每次延遲提前觸發回合
  if(G.nextEvent){
    G._eventDeferred=(G._eventDeferred||0)+1;
    // 每延遲一次，觸發回合提前 1（最早第 1 回合立即觸發）
    G.nextEventTurn=Math.max(1, EVENT_INTERVAL - G._eventDeferred);
    G.nextEventData=precomputeEventData(G.nextEvent);
  } else {
    G._eventDeferred=0;
    pickNextEvent();
  }
  pickActionOptions();
  // partner round start effects
  G.partners.forEach(pid=>{
    const p=PARTNERS[pid];
    if(p&&p.onRoundStart) p.onRoundStart(G);
  });
  // 稅務局升級邏輯已移至 startTurn()，每回合觸發
  addLog(`══ 第 ${G.round} 輪　目標收益：${G.goal} ══`,'w');
  // 合夥人第一回合開始效果
  G.partners.forEach(pid=>{
    const p=PARTNERS[pid];
    if(p&&p.onTurnStart) p.onTurnStart(G);
  });
  // 場風大師：第一回合也需要設定方向（颱風時不覆蓋）
  if(hasPartner('wind_master')){
    const dirs=['left','right','top','bottom'];
    const labels={left:'← 左側',right:'→ 右側',top:'↑ 上方',bottom:'↓ 下方'};
    G.windDir=dirs[Math.floor(Math.random()*dirs.length)];
    addLog(`🌀 場風大師：本回合只能從 ${labels[G.windDir]} 投入，獲得×2倍率`,'w');
  } else if(!(G.buff&&G.buff.typhoonActive)){
    G.windDir=null;
  }
  G.phase='place';
  render();
  if(hasPartner('tanya')){
    tanyaOfferSwap();
  } else {
    openActionOverlay();
  }
}

let _logRenderTimer=null;
function addLog(msg,cls=''){
  // Add to current turn log entries
  if(!G.turnLog) G.turnLog=[];
  G.turnLog.push({msg,cls});
  // 節流：合併短時間內的多次 log 渲染
  if(!_logRenderTimer){
    _logRenderTimer=setTimeout(()=>{ _logRenderTimer=null; renderSideLog(); },50);
  }
}

function commitTurnLog(){
  // Save current turn log to history (keep last 3 turns)
  if(!G.turnLogHistory) G.turnLogHistory=[];
  if(G.turnLog&&G.turnLog.length>0){
    G.turnLogHistory.unshift({turn:G.turn, round:G.round, entries:[...G.turnLog]});
    if(G.turnLogHistory.length>3) G.turnLogHistory.pop();
  }
  G.turnLog=[];
}
function addHand(id,n=1){
  const e=G.hand.find(h=>h.id===id);
  if(e)e.count+=n; else G.hand.push({id,count:n});
}

// ── 複合設施系統 ──
const COMPOUND_EXCLUDE=new Set([
  'mat_factory','factory','shop','refinery','warehouse','booster','converter',
  'bomb_device','envy_factory','ruin','ruin_monument',
  'dept_store','dept_store_part',
  'logistics_up','logistics_down','logistics_left','logistics_right'
]);
let _compoundSeq=0;
const COMPOUND_DIRS=[{dr:0,dc:1,label:'→'},{dr:0,dc:-1,label:'←'},{dr:-1,dc:0,label:'↑'},{dr:1,dc:0,label:'↓'}];

function addHandMaybeCompound(id){
  if(COMPOUND_EXCLUDE.has(id)||!BLDG[id]){ addHand(id); return; }
  if(Math.random()<1/3){
    const pool=Object.keys(BLDG).filter(bid=>!COMPOUND_EXCLUDE.has(bid)&&bid!==id);
    if(!pool.length){ addHand(id); return; }
    const partner=pool[Math.floor(Math.random()*pool.length)];
    const dir=COMPOUND_DIRS[Math.floor(Math.random()*COMPOUND_DIRS.length)];
    G.hand.push({
      id:`compound_${++_compoundSeq}`,
      compound:true,
      parts:[id,partner],
      dr:dir.dr, dc:dir.dc, dirLabel:dir.label,
      count:1
    });
    addLog(`🔗 複合設施！${BLDG[id].emoji}${BLDG[id].name} ${dir.label} ${BLDG[partner].emoji}${BLDG[partner].name}`,'w');
  } else {
    addHand(id);
  }
}

// ── 百貨公司 2×2 放置：尋找包含(r,c)的 2×2 商店區域 ──
function findShop2x2(r,c){
  const gn=GN();
  // 檢查(r,c)可能作為哪個 2x2 的一部分（4 種可能的左上角）
  for(let dr=0;dr>=-1;dr--) for(let dc=0;dc>=-1;dc--){
    const tr=r+dr, tc=c+dc;
    if(tr<0||tc<0||tr+1>=gn||tc+1>=gn) continue;
    if(isShopType(G.grid[tr][tc])&&isShopType(G.grid[tr][tc+1])&&
       isShopType(G.grid[tr+1][tc])&&isShopType(G.grid[tr+1][tc+1])) return [tr,tc];
  }
  return null;
}
function placeDeptStore(r,c,anchor){
  const [tr,tc]=anchor;
  // 清除 4 格的舊資料
  for(let dr=0;dr<2;dr++) for(let dc=0;dc<2;dc++){
    const key=`${tr+dr},${tc+dc}`;
    delete G.bldgUpgrades[key];
    delete G.leyaPctMods[key];
  }
  // 放置：左上為 anchor，其餘為 part
  G.grid[tr][tc]='dept_store';
  G.grid[tr][tc+1]='dept_store_part';
  G.grid[tr+1][tc]='dept_store_part';
  G.grid[tr+1][tc+1]='dept_store_part';
  if(!G.deptStoreAnchors) G.deptStoreAnchors={};
  const ak=`${tr},${tc}`;
  G.deptStoreAnchors[ak]=true;
  // 記錄哪些格子屬於這個百貨公司
  [`${tr},${tc+1}`,`${tr+1},${tc}`,`${tr+1},${tc+1}`].forEach(k=>{
    if(!G.deptStoreParts) G.deptStoreParts={};
    G.deptStoreParts[k]=ak;
  });
}

function isCompoundHand(h){ return h&&h.compound===true; }
function getCompoundSecondCell(r,c,h){ return [r+h.dr, c+h.dc]; }
function canPlaceCompound(r,c,h){
  const gn=GN();
  const [r2,c2]=getCompoundSecondCell(r,c,h);
  if(r<0||r>=gn||c<0||c>=gn||r2<0||r2>=gn||c2<0||c2>=gn) return false;
  if(G.grid[r][c]||G.grid[r2][c2]) return false;
  return true;
}

function triggerEvent(){
  G.phase='event';
  let ev;
  if(checkMurphyHijack()){
    ev=EVENTS.find(e=>e.id==='murphy');
  } else {
    const pool=EVENTS.filter(e=>e.id!=='murphy');
    ev=pool[Math.floor(Math.random()*pool.length)];
  }
  G.nextEventData=precomputeEventData(ev);
  ev.show(ev);
  render();
}
function showEv(title,desc,optsHtml){
  document.getElementById('ev-title').textContent=title;
  document.getElementById('ev-desc').textContent=desc;
  document.getElementById('ev-opts').innerHTML=optsHtml;
  document.getElementById('ev-banner').classList.add('show');
  DM.onEvent(title);
}
function hideEv(){
  document.getElementById('ev-banner').classList.remove('show');
}
function evDone(){
  hideEv();
  // 拆遷隊：每3回合獲得並儲存一次免費重排機會
  if(hasPartner('demolition') && G.turn > 0 && G.turn % 3 === 0){
    G.demolitionCharges = (G.demolitionCharges||0) + 1;
    addLog(`🔨 拆遷隊：第${G.turn}回合，獲得免費重排機會！（累積 ${G.demolitionCharges} 次）`,'g');
    renderPartners();
  }
  G.actionOptions=[];
  startTurn();
}
function evPickTanya(id, tanyaBonus){
  // 選設施後加入手牌，若譚雅效果則額外+1升級（譚雅交換不觸發複合）
  addHand(id);
  if(tanyaBonus){
    // 找到手牌中此設施並記錄+1升級標記（作為初始升級加成）
    G._tanyaNewBldg = G._tanyaNewBldg || {};
    G._tanyaNewBldg[id] = (G._tanyaNewBldg[id]||0) + 1;
    addLog(`👩‍💼 譚雅：${BLDG[id].emoji}${BLDG[id].name} 加入手牌，額外 +1！`,'g');
  } else {
    addLog(`🎁 獲得 ${BLDG[id].emoji}${BLDG[id].name}！`,'g');
  }
  evDone();
}

function evPick(id,fromEl){
  const handBefore=G.hand.length;
  addHandMaybeCompound(id);
  // addHandMaybeCompound 已在複合時 addLog，普通時這裡補 log
  const wasCompound=G.hand.length>handBefore&&G.hand[G.hand.length-1].compound;
  if(!wasCompound) addLog(`🎁 獲得 ${BLDG[id].emoji}${BLDG[id].name}！`,'g');
  if(fromEl){
    const src=fromEl.getBoundingClientRect();
    const dst=document.getElementById('hand-list').getBoundingClientRect();
    const fly=document.createElement('div');
    fly.textContent=BLDG[id].emoji;
    fly.style.cssText=`position:fixed;left:${src.left+src.width/2}px;top:${src.top+src.height/2}px;
      font-size:28px;pointer-events:none;z-index:500;transition:all .6s cubic-bezier(.4,0,.2,1);`;
    document.body.appendChild(fly);
    setTimeout(()=>{
      fly.style.left=(dst.left+20)+'px';
      fly.style.top=(dst.top+10)+'px';
      fly.style.opacity='0';fly.style.fontSize='14px';
    },30);
    setTimeout(()=>fly.remove(),700);
  }
  hideEv();
  closeCardChooser();
  closeActionOverlay();
  G.actionOptions=[];
  startTurn();
}
function applyBuff(key,val){
  G.buff[key]=val;
  const msgs={matOutMult:'📈 本回合原料輸出 ×2',goodsBonus:'🛒 本回合商品→金錢 +2'};
  addLog(msgs[key]||'效果已套用','w');
  evDone();
}

// ══════════════════════════════════════
function selBldg(id){
  if(G.phase!=='place')return;
  G.sel=G.sel===id?null:id;
  if(G.sel&&BLDG[G.sel]&&BLDG[G.sel].ruinOnly){
    const count=G.ruinCells?G.ruinCells.size:0;
    if(count===0) addLog('🗿 目前沒有廢墟格可放置','b');
    else addLog(`🗿 請點擊廢墟格（灰色斜紋格子）放置，共${count}個`,'w');
  }
  render();
  renderFanHand();
}
function onCell(r,c){
  if(G.phase!=='place')return;

  // 爆破工程師摧毀模式
  if(G._demoExpertMode){
    if(!G.grid[r][c]){ addLog('🧨 請點擊有設施的格子','b'); return; }
    G.profit-=2;
    const bId=G.grid[r][c];
    addLog(`🧨 爆破工程師：消耗2收益，摧毀 ${BLDG[bId].emoji}${BLDG[bId].name} (${r+1},${c+1})！`,'b');
    destroyFacility(r,c);
    G._demoExpertMode=false;
    render(); return;
  }

  // 提升設施模式
  if(G.upgradeMode){
    if(!G.grid[r][c]){addLog('請點擊有設施的格子','b');return;}
    upgradeCell(r,c);
    return;
  }

  // 路線規劃師：免費移動一個物流中心
  if(G._freeMoveLogistics){
    const bId=G.grid[r][c];
    if(!G._freeMoveLogisticsSrc){
      // 第一次點擊：選擇物流中心
      if(!bId||BLDG[bId].special!=='redirect'){addLog('🗺️ 請點擊一個物流中心','b');return;}
      G._freeMoveLogisticsSrc=[r,c];
      addLog(`🗺️ 選中 ${BLDG[bId].emoji}${BLDG[bId].name} (${r+1},${c+1})，再點擊目標格子`);
      render(); return;
    } else {
      // 第二次點擊：移動到目標格
      const [sr,sc]=G._freeMoveLogisticsSrc;
      if(r===sr&&c===sc){G._freeMoveLogisticsSrc=null;addLog('🗺️ 取消選擇');render();return;}
      if(bId&&bId!=='ruin'){addLog('🗺️ 目標格子已有設施，請選擇空格或廢墟','b');return;}
      const srcId=G.grid[sr][sc];
      swapCellData(sr,sc,r,c);
      onFacilityMoved(r,c,sr,sc);
      addLog(`🗺️ 路線規劃師：移動 ${BLDG[srcId].emoji}${BLDG[srcId].name} (${sr+1},${sc+1})→(${r+1},${c+1})`,'g');
      G._freeMoveLogistics=false;
      G._freeMoveLogisticsSrc=null;
      pulse(r,c); render(); return;
    }
  }

  // 自由排列模式（拖曳設施到目標格子交換）
  if(G.freeRearrange){
    if(G.grid[r][c]){
      addLog(`💡 拖曳 ${BLDG[G.grid[r][c]].emoji}${BLDG[G.grid[r][c]].name} 到想要的位置`);
    }
    return;
  }

  // 一般移動設施模式
  if(G.moveMode){
    if(!G.moveSrc){
      if(!G.grid[r][c]){addLog('請點擊有設施的格子','b');return;}
      G.moveSrc=[r,c];
      addLog(`選中 ${BLDG[G.grid[r][c]].emoji}${BLDG[G.grid[r][c]].name}，再點空格放置`);
      render(); return;
    } else {
      const [sr,sc]=G.moveSrc;
      if(r===sr&&c===sc){G.moveSrc=null;render();return;}
      if(G.grid[r][c]){addLog('目標格子已有設施','b');return;}
      G.grid[r][c]=G.grid[sr][sc];
      G.grid[sr][sc]=null;
      addLog(`移動 ${BLDG[G.grid[r][c]].emoji}${BLDG[G.grid[r][c]].name} 到 (${r+1},${c+1})`,'g');
      G.moveMode=false;G.moveSrc=null;
      pulse(r,c);render(); return;
    }
  }

  // 正常放置模式
  if(!G.sel){addLog('請先選擇手牌設施','b');return;}

  // ── 複合設施放置 ──
  const selHand=G.hand.find(h=>h.id===G.sel);
  if(selHand&&isCompoundHand(selHand)){
    if(!canPlaceCompound(r,c,selHand)){
      const [r2,c2]=getCompoundSecondCell(r,c,selHand);
      const gn=GN();
      if(r2<0||r2>=gn||c2<0||c2>=gn) addLog('🔗 複合設施：第二格超出邊界','b');
      else if(G.grid[r][c]) addLog('🔗 複合設施：錨點格子已有設施','b');
      else addLog('🔗 複合設施：第二格已有設施','b');
      return;
    }
    const [r2,c2]=getCompoundSecondCell(r,c,selHand);
    selHand.count--;
    G.grid[r][c]=selHand.parts[0];
    G.grid[r2][c2]=selHand.parts[1];
    addLog(`🔗 放置複合：${BLDG[selHand.parts[0]].emoji}${BLDG[selHand.parts[0]].name} (${r+1},${c+1}) + ${BLDG[selHand.parts[1]].emoji}${BLDG[selHand.parts[1]].name} (${r2+1},${c2+1})`,'g');
    G.sel=null;
    pulse(r,c); pulse(r2,c2); render();
    return;
  }

  // 廢墟紀念碑：只能放在廢墟格
  if(G.sel&&BLDG[G.sel]&&BLDG[G.sel].ruinOnly){
    if(G.grid[r][c]!=='ruin'){
      addLog(`🗿 廢墟紀念碑只能放在廢墟上！目前廢墟：${[...(G.ruinCells||[])].map(k=>{const[rr,cc]=k.split(',');return `(${+rr+1},${+cc+1})`;}).join(' ')||'無'}`,'b');
      return;
    }
    // 清除廢墟，允許放置
    G.grid[r][c]=null;
    G.ruinCells&&G.ruinCells.delete(`${r},${c}`);
  }
  // 百貨公司：需要 2×2 商店
  if(G.sel&&BLDG[G.sel]&&BLDG[G.sel].needs2x2){
    const anchor=findShop2x2(r,c);
    if(!anchor){
      addLog(`🏬 百貨公司需要 2×2 的商店區域！請點擊四個商店組成的 2×2 區域`,'b');
      return;
    }
    const e2=G.hand.find(h=>h.id===G.sel);
    if(!e2||e2.count<=0) return;
    e2.count--;
    const [tr,tc]=anchor;
    addLog(`🏬 百貨公司：取代 2×2 商店 (${tr+1},${tc+1})~(${tr+2},${tc+2})`,'g');
    placeDeptStore(r,c,anchor);
    G.sel=null; pulse(tr,tc); render(); return;
  }
  // 蕾雅：相同設施點擊同類設施格 → 視為升級 + 額外+2%
  if(G.sel&&G.grid[r][c]&&G.grid[r][c]===G.sel&&hasPartner('leya')){
    const e2=G.hand.find(h=>h.id===G.sel);
    if(!e2||e2.count<=0){ addLog('👩‍🔧 蕾雅：手牌不足','b'); return; }
    e2.count--;
    leyaUpgrade(r,c,G.sel);
    G.sel=null; pulse(r,c); render(); return;
  }
  // 中央限定設施
  if(G.sel&&BLDG[G.sel]&&BLDG[G.sel].centerOnly&&!isCenterCell(r,c)){
    addLog(`🚫 ${BLDG[G.sel].name}只能放在中央區域！`,'b');
    return;
  }
  // 物流之王/倉儲女王：允許疊在物流中心上
  if(G.grid[r][c]){
    const existing=BLDG[G.grid[r][c]];
    const canOverlay=existing&&existing.special==='redirect'&&(hasPartner('logistics_king')||hasPartner('storage_queen'))&&!G.cellOverlay[`${r},${c}`];
    if(canOverlay){
      const e2=G.hand.find(h=>h.id===G.sel);
      if(!e2||e2.count<=0) return;
      // 倉儲女王負面：疊加行動費+2收益
      if(hasPartner('storage_queen')&&!hasPartner('logistics_king')){
        if(G.profit<2){ addLog('👑 倉儲女王：收益不足（需要2）','b'); return; }
        G.profit-=2;
        addLog(`👑 倉儲女王：疊加行動費 -2 收益`,'b');
      }
      e2.count--;
      G.cellOverlay[`${r},${c}`]=G.sel;
      const who=hasPartner('logistics_king')?'🚛 物流之王':'👑 倉儲女王';
      addLog(`${who}：${BLDG[G.sel].emoji}${BLDG[G.sel].name} 疊加在 ${existing.emoji}${existing.name} 上！`,'g');
      G.sel=null; pulse(r,c); render(); return;
    }
    addLog(G.grid[r][c]==='ruin'?'該格子是廢墟，無法放置設施':'該格子已有設施','b');return;
  }
  const e=G.hand.find(h=>h.id===G.sel);
  if(!e||e.count<=0)return;
  e.count--;
  G.grid[r][c]=G.sel;
  // 期貨交易所：放置時決定本回合百分比
  if(G.sel==='futures_market'){
    if(!G.futuresPct) G.futuresPct={};
    G.futuresPct[`${r},${c}`]=Math.floor(Math.random()*21)-10;
  }
  addLog(`放置 ${BLDG[G.sel].emoji}${BLDG[G.sel].name} (${r+1},${c+1})`);
  // 轉運中心：放置後選擇方向
  if(G.sel==='transfer_hub'){
    G.sel=null; pulse(r,c); render();
    showTransferHubDirPicker(r,c);
    return;
  }
  G.sel=null;
  pulse(r,c);
  render();
}

// ══════════════════════════════════════
// 元素卡牌拖曳系統
// ══════════════════════════════════════
let cardDragging=false;

function onCardDragStart(e){
  if(G.phase!=='place'){e.preventDefault();return;}
  cardDragging=true;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain','el-card');
  document.body.classList.add('card-dragging');
}
function onCardDragEnd(e){
  cardDragging=false;
  document.body.classList.remove('card-dragging');
  document.querySelectorAll('.dbtn').forEach(b=>b.classList.remove('drag-over'));
}
function onDirDragOver(e,btn){
  if(!cardDragging)return;
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  btn.classList.add('drag-over');
}
function onDirDragLeave(btn){btn.classList.remove('drag-over');}
function onDirDrop(e,dir,idx){
  e.preventDefault();
  document.body.classList.remove('card-dragging');
  document.querySelectorAll('.dbtn').forEach(b=>b.classList.remove('drag-over'));
  if(!cardDragging)return;
  cardDragging=false;
  sendEl(dir,idx);
}

// 設施拖曳到格子
let bldgDragging=null;
const _emptyDragImg=(()=>{const c=document.createElement('canvas');c.width=1;c.height=1;return c;})();
function onBldgDragStart(e,id){
  if(G.phase!=='place'){e.preventDefault();return;}
  const h=G.hand.find(h=>h.id===id);
  if(!h||h.count<=0){e.preventDefault();return;}
  bldgDragging=id;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain','bldg:'+id);
  e.dataTransfer.setDragImage(_emptyDragImg,0,0);
  // 高亮空格子（排除廢墟）
  document.querySelectorAll('.cell:not(.filled):not(.ruin-cell)').forEach(c=>c.classList.add('drag-target'));
}
function _clearBldgPreview(){
  document.querySelectorAll('.bldg-drag-preview').forEach(el=>el.remove());
  document.querySelectorAll('.compound-preview').forEach(el=>{el.classList.remove('compound-preview','drag-over-cell');});
  document.querySelectorAll('.drag-over-cell').forEach(el=>{el.classList.remove('drag-over-cell');el.style.outline='';el.style.boxShadow='';});
}
function _insertBldgPreview(cellEl, bId){
  if(!cellEl) return;
  const b=BLDG[bId]; if(!b) return;
  const div=document.createElement('div');
  div.className='bldg-drag-preview';
  div.style.cssText='position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;opacity:.55;z-index:2;';
  div.innerHTML=`<div class="cemoji">${b.emoji}</div><div class="cname">${b.name}</div>`;
  cellEl.appendChild(div);
}
function onBldgDragEnd(e){
  bldgDragging=null;
  _clearBldgPreview();
  document.querySelectorAll('.cell').forEach(c=>{c.classList.remove('drag-target');});
}
function onCellDragOver(e,r,c){
  if(!bldgDragging) return;
  // 複合設施：檢查兩格都可用
  const compH=G.hand.find(h=>h.id===bldgDragging&&h.compound);
  if(compH){
    _clearBldgPreview();
    if(!canPlaceCompound(r,c,compH)) return;
    e.preventDefault();
    const cellEl=document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
    if(cellEl){ cellEl.classList.add('drag-over-cell','compound-preview'); }
    _insertBldgPreview(cellEl, compH.parts[0]);
    const [r2,c2]=getCompoundSecondCell(r,c,compH);
    const cell2=document.querySelector(`[data-r="${r2}"][data-c="${c2}"]`);
    if(cell2){ cell2.classList.add('drag-over-cell','compound-preview'); }
    _insertBldgPreview(cell2, compH.parts[1]);
    return;
  }
  // 百貨公司：2×2 預覽
  if(bldgDragging==='dept_store'){
    _clearBldgPreview();
    const anchor=findShop2x2(r,c);
    if(!anchor) return;
    e.preventDefault();
    const [tr,tc]=anchor;
    for(let dr=0;dr<2;dr++) for(let dc=0;dc<2;dc++){
      const cell=document.querySelector(`[data-r="${tr+dr}"][data-c="${tc+dc}"]`);
      if(cell){ cell.classList.add('drag-over-cell','compound-preview'); }
      if(dr===0&&dc===0) _insertBldgPreview(cell,'dept_store');
    }
    return;
  }
  // 蕾雅：允許拖到相同設施的格子
  const isLeyaUpgrade = G.grid[r][c]===bldgDragging && hasPartner('leya');
  // 廢墟紀念碑：允許拖到廢墟格
  const isRuinPlace = bldgDragging==='ruin_monument' && G.grid[r][c]==='ruin';
  if(G.grid[r][c] && !isLeyaUpgrade && !isRuinPlace) return;
  e.preventDefault();
  _clearBldgPreview();
  const cellEl=document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  if(cellEl) cellEl.classList.add('drag-over-cell');
  if(isLeyaUpgrade && cellEl){
    cellEl.style.outline='3px solid var(--money)';
    cellEl.style.boxShadow='0 0 12px rgba(176,96,0,.45)';
  } else {
    _insertBldgPreview(cellEl, bldgDragging);
    if(isRuinPlace && cellEl) cellEl.style.outline='3px solid var(--money)';
  }
}
function onCellDragLeave(r,c){
  _clearBldgPreview();
}
function onCellDrop(e,r,c){
  e.preventDefault();
  _clearBldgPreview();
  document.querySelectorAll('.cell').forEach(el=>{el.classList.remove('drag-target');el.style.outline='';el.style.boxShadow='';});
  if(!bldgDragging) return;

  // ── 百貨公司拖放 ──
  if(bldgDragging==='dept_store'){
    const anchor=findShop2x2(r,c);
    if(!anchor){ addLog('🏬 需要 2×2 商店區域','b'); bldgDragging=null; return; }
    const h=G.hand.find(h=>h.id==='dept_store');
    if(!h||h.count<=0){ bldgDragging=null; return; }
    h.count--;
    const [tr,tc]=anchor;
    addLog(`🏬 百貨公司：取代 2×2 商店 (${tr+1},${tc+1})~(${tr+2},${tc+2})`,'g');
    placeDeptStore(r,c,anchor);
    bldgDragging=null;
    pulse(tr,tc); render(); return;
  }

  // ── 複合設施拖放 ──
  const compH=G.hand.find(h=>h.id===bldgDragging&&h.compound);
  if(compH){
    if(!canPlaceCompound(r,c,compH)){ addLog('🔗 複合設施：無法放置在此位置','b'); bldgDragging=null; return; }
    const [r2,c2]=getCompoundSecondCell(r,c,compH);
    compH.count--;
    G.grid[r][c]=compH.parts[0];
    G.grid[r2][c2]=compH.parts[1];
    addLog(`🔗 放置複合：${BLDG[compH.parts[0]].emoji}${BLDG[compH.parts[0]].name} (${r+1},${c+1}) + ${BLDG[compH.parts[1]].emoji}${BLDG[compH.parts[1]].name} (${r2+1},${c2+1})`,'g');
    bldgDragging=null;
    pulse(r,c); pulse(r2,c2); render(); return;
  }

  // 蕾雅：相同設施拖到小鎮格子 → 視為升級 + 額外+2%
  if(G.grid[r][c]===bldgDragging && hasPartner('leya')){
    const h=G.hand.find(h=>h.id===bldgDragging);
    if(!h||h.count<=0){ addLog('👩‍🔧 蕾雅：手牌不足','b'); bldgDragging=null; return; }
    h.count--;
    leyaUpgrade(r,c,bldgDragging);
    bldgDragging=null;
    pulse(r,c); render(); return;
  }

  // 廢墟紀念碑：拖曳放置到廢墟格
  if(bldgDragging==='ruin_monument'&&G.grid[r][c]==='ruin'){
    const h=G.hand.find(h=>h.id===bldgDragging);
    if(!h||h.count<=0){ bldgDragging=null; return; }
    h.count--;
    G.grid[r][c]='ruin_monument';
    G.ruinCells&&G.ruinCells.delete(`${r},${c}`);
    addLog(`放置 ${BLDG.ruin_monument.emoji}${BLDG.ruin_monument.name} (${r+1},${c+1})（取代廢墟）`);
    bldgDragging=null;
    pulse(r,c); render(); return;
  }
  if(G.grid[r][c]) return;
  const h=G.hand.find(h=>h.id===bldgDragging);
  if(!h||h.count<=0) return;
  h.count--;
  G.grid[r][c]=bldgDragging;
  // 期貨交易所：放置時決定本回合百分比
  if(bldgDragging==='futures_market'){
    if(!G.futuresPct) G.futuresPct={};
    G.futuresPct[`${r},${c}`]=Math.floor(Math.random()*21)-10;
  }
  // Tutorial hook
  if(TUT.active){
    if(TUT.waitingFor==='place_mat_factory' && bldgDragging==='mat_factory') TUT.onAction('place_mat_factory');
    else if(TUT.waitingFor==='place_factory_shop' && (bldgDragging==='factory'||bldgDragging==='shop')){
      // check if both placed
      let hasFac=false,hasShop=false;
      for(let ri=0;ri<GN();ri++) for(let ci=0;ci<GN();ci++){
        if(G.grid[ri][ci]==='factory') hasFac=true;
        if(G.grid[ri][ci]==='shop') hasShop=true;
      }
      if(hasFac&&hasShop) TUT.onAction('place_factory_shop');
    }
  }
  // 譚雅：放置時套用額外+1升級
  if(G._tanyaNewBldg && G._tanyaNewBldg[bldgDragging] > 0){
    const key=`${r},${c}`;
    G.bldgUpgrades[key]=(G.bldgUpgrades[key]||0)+1;
    G._tanyaNewBldg[bldgDragging]--;
    if(G._tanyaNewBldg[bldgDragging]<=0) delete G._tanyaNewBldg[bldgDragging];
    addLog(`放置 ${BLDG[bldgDragging].emoji}${BLDG[bldgDragging].name} (${r+1},${c+1})（譚雅+1已套用）`);
  } else {
    addLog(`放置 ${BLDG[bldgDragging].emoji}${BLDG[bldgDragging].name} (${r+1},${c+1})`);
  }
  // 轉運中心：放置後選擇方向
  if(bldgDragging==='transfer_hub'){
    bldgDragging=null;
    pulse(r,c); render();
    showTransferHubDirPicker(r,c);
    return;
  }
  bldgDragging=null;
  pulse(r,c);
  render();
}

// 更新元素卡牌 UI
// ══════════════════════════════════════
function updateCard(el){
  G.card=el;
  if(typeof renderFanHand==='function') renderFanHand();
  if(typeof renderTalentPanel==='function') renderTalentPanel();
}

// ══════════════════════════════════════
// 元素投入主流程
// ══════════════════════════════════════
function sendEl(dir,idx){
  if(G.phase!=='place')return;
  // 颱風：只能從指定方向投入
  if(G.buff&&G.buff.typhoonActive&&G.windDir&&dir!==G.windDir){
    addLog(`🌀 颱風：只能從 ${G.windDir} 方向投入！`,'b');
    return;
  }
  // 場風大師：只能從指定方向投入
  if(hasPartner('wind_master')){
    const wd=getWindDir();
    if(wd && dir!==wd){
      addLog(`🌀 場風大師：本回合只能從 ${wd} 方向投入！`,'b');
      return;
    }
  }
  G.phase='animating';
  G._tutHitMatFactory = false; // 教學：每次投入重置
  G.sel=null;
  // 莫菲定律：追蹤重複投入模式
  const sendKey=`${dir},${idx}`;
  if(!G._murphyTrack) G._murphyTrack={lastSend:null,repeatCount:0,noMove:0};
  if(sendKey===G._murphyTrack.lastSend) G._murphyTrack.repeatCount++;
  else { G._murphyTrack.lastSend=sendKey; G._murphyTrack.repeatCount=1; }
  render();

  const path=[];
  const _N=GN();
  if(dir==='left')  for(let c=0;c<_N;c++)     path.push([idx,c]);
  if(dir==='right') for(let c=_N-1;c>=0;c--) path.push([idx,c]);
  if(dir==='top')   for(let r=0;r<_N;r++)     path.push([r,idx]);
  if(dir==='bottom')for(let r=_N-1;r>=0;r--)  path.push([r,idx]);

  let startCard = {...G.card};
  // Gluttony: swap material/goods
  if(hasPartner('gluttony') && !isDemonNegDisabled('gluttony')){
    if(startCard.type==='material') startCard={...startCard,type:'goods'};
    else if(startCard.type==='goods') startCard={...startCard,type:'material'};
  }
  G.inv={facHit:0, logSet:new Set(), envyPen:false, cenHits:0, logHits:0,
    speedAct:false, ampAct:false, fxM2G:false, fxG2M:false, arbM2G:false, arbG2M:false,
    windOK:hasPartner('wind_master')&&!!G.windDir, hwCenter:false, exchBoard:false,
    clearanceBonus:0, clearanceCells:[]};
  const startVal=startCard.value;
  const startType=startCard.type;
  let el={value:startVal,type:startType};
  const dname={left:'左側',right:'右側',top:'上方',bottom:'下方'}[dir];
  addLog(`▶ 送入 ${TLABEL[startType]} ${startVal}`,'h');
  updateCard(el);

  // 啟動移動器
  const mover=document.getElementById('el-mover');
  mover.style.display='flex';
  const emojis={money:'💵',material:'🪨',goods:'📦'};
  function updateMover(el){
    mover.querySelector('.mv-emoji').textContent=emojis[el.type]||'❓';
    mover.querySelector('.mv-val').textContent=el.value;
    mover.querySelector('.mv-val').style.color=TCOLOR[el.type]||'var(--tx)';
    mover.querySelector('.mv-type').textContent=TLABEL[el.type]||el.type;
    mover.style.borderColor=TCOLOR[el.type]||'var(--acc)';
  }
  updateMover(el);

  stepWithMover(path,el,0,startVal,mover,updateMover);
}

function stepWithMover(path,el,i,startVal,mover,updateMover){
  if(i>=path.length){
    mover.style.display='none';
    finish(el,startVal);
    return;
  }
  const[r,c]=path[i];

  // 移動移動器到格子位置
  const cellEl=document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  if(cellEl){
    const rect=cellEl.getBoundingClientRect();
    mover.style.left=(rect.left+2)+'px';
    mover.style.top=(rect.top+2)+'px';
  }

  // 高亮當前格
  document.querySelectorAll('.cell').forEach(c=>c.classList.remove('active-path'));
  cellEl?.classList.add('active-path');

  const bId=G.grid[r][c];
  // 速遞站：經過空格或廢墟時消耗 flag（效果浪費）
  if((!bId||bId==='ruin')&&G.inv.speedAct) G.inv.speedAct=false;
  // ── 共用尾碼 helper ──
  // 速遞站：上一格觸發速遞站後，本格設施額外觸發一次
  const _speedReplay=G.inv.speedAct&&bId&&isFacility(bId)&&BLDG[bId]?.special!=='speed_station';
  if(_speedReplay) G.inv.speedAct=false;
  const _next=(delay=350)=>{
    if(_speedReplay){
      addLog(`  ⚡ 速遞站：再觸發一次！`,'g');
      setTimeout(()=>stepWithMover(path,el,i,startVal,mover,updateMover),delay);
    } else {
      setTimeout(()=>stepWithMover(path,el,i+1,startVal,mover,updateMover),delay);
    }
  };
  const _hit=(delay=350)=>{G.inv.facHit=(G.inv.facHit||0)+1;pulse(r,c);updateCard(el);updateMover(el);_next(delay);};
  // ── 廢墟：資源直接通過，不產生任何交互 ──
  if(bId==='ruin'){
    // 廢墟掠奪者：廢墟格+5
    if(hasPartner('ruin_scavenger')){
      el={...el,value:el.value+5};
      addLog(`  💀 廢墟掠奪者：廢墟格+5→${el.value}`,'g');
      updateCard(el); updateMover(el);
    }
    _next(300); return;
  }
  if(bId){
    const b=BLDG[bId];
    // 教學：記錄是否通過原料廠
    if(TUT.active && bId==='mat_factory') G._tutHitMatFactory = true;

    // ── 人材幣通過商店：×3 變金錢 ──
    // (人材幣機制已移除)
    // ── 鑽石通過商店：×12 變金錢 ──
    if(el.type==='diamond' && isShopType(bId)){
      const prev={...el};
      let nv=el.value*12+(G.bldgUpgrades&&G.bldgUpgrades[`${r},${c}`]||0);
      el={value:nv,type:'money'};
      cellEl?.classList.add('transform-flash');
      setTimeout(()=>cellEl?.classList.remove('transform-flash'),500);
      if(cellEl){
        const badge=document.createElement('div');
        badge.className='change-badge';
        badge.textContent=`💚 ${BLDG.shop.emoji}商店: 💎${prev.value} → 💰${nv} (×12)`;
        badge.style.background=TCOLOR.money;
        cellEl.appendChild(badge);
        setTimeout(()=>badge.remove(),800);
      }
      addLog(`  🏪 商店: 💎鑽石 ${prev.value} → 💰金錢 ${nv} (×12)`,'g');
      G.partners.forEach(pid=>{ const p=PARTNERS[pid]; if(p&&p.onBuildingHit){ const pb=G.profit; p.onBuildingHit(G,'shop'); const g=G.profit-pb; if(g>0){addLog(`  ${p.emoji}${p.name}：+${g} 收益`,'g');setTimeout(()=>profitFlyFromPartner(pid,g),200);} } });
      _hit(); return;
    }

    // ── 設施特效調度 ──
    if(b.special && FACILITY_FX[b.special]){
      let _fxDone=false;
      const fx={
        el, r, c, cellEl,
        hit(d=350){_fxDone=true;el=fx.el;_hit(d);},
        next(d=350){_fxDone=true;el=fx.el;_next(d);},
        pulse(){pulse(r,c);},
        updateCard(){el=fx.el;updateCard(el);},
        updateMover(){el=fx.el;updateMover(el);},
      };
      FACILITY_FX[b.special](fx);
      if(_fxDone) return;
      el=fx.el;
    }

    // ── 物流中心：轉向 ──
    if(b.special==='redirect'){
      // 颱風/運輸異常：物流失效
      if(G.buff&&(G.buff.typhoonActive||G.buff.logisticsDisabled)){
        const reason=G.buff.typhoonActive?'颱風':'運輸異常';
        addLog(`  ${b.emoji}${b.name}: ${reason}導致物流失效，略過`,'b');
        _next(300); return;
      }
      // 每次投入每格只能觸發一次
      const cellKey=`${r},${c}`;
      if(G.inv.logSet&&G.inv.logSet.has(cellKey)){
        addLog(`  ${b.emoji}${b.name}: 已觸發過，略過`);
        _next(300); return;
      }
      if(!G.inv.logSet) G.inv.logSet=new Set();
      G.inv.logSet.add(cellKey);
      // 運輸大亨：每次通過物流+3
      if(hasPartner('transport_tycoon')){
        el={...el,value:el.value+3};
        addLog(`  🚢 運輸大亨：通過物流+3→${el.value}`,'g');
        G.inv.logHits=(G.inv.logHits||0)+1;
      }
      pulse(r,c);
      cellEl?.classList.add('transform-flash');
      setTimeout(()=>cellEl?.classList.remove('transform-flash'),400);

      // upgrade bonus (for redirect cell itself, not overlay)
      const upgradeBonus=G.bldgUpgrades?.[`${r},${c}`]||0;
      if(upgradeBonus>0){
        el={...el,value:el.value+upgradeBonus};
        addLog(`  ${b.emoji}${b.name}: 轉向 + 升級加成 +${upgradeBonus} → ${el.value}`);
      } else {
        addLog(`  ${b.emoji}${b.name}: 轉向 ${b.dir}`);
      }
      updateCard(el);
      setTimeout(()=>updateMover(el),100);

      // rebuild remaining path from next cell in new direction
      const newDir=b.dir;
      const newPath=[];
      let nr=r,nc=c;
      const visited=new Set();
      visited.add(`${r},${c}`);
      const _gn2=GN();
      for(let s=0;s<_gn2*4;s++){
        if(newDir==='top')    nr--;
        if(newDir==='bottom') nr++;
        if(newDir==='left')   nc--;
        if(newDir==='right')  nc++;
        if(nr<0||nr>=_gn2||nc<0||nc>=_gn2) break;
        if(visited.has(`${nr},${nc}`)) break; // 防止迴圈
        visited.add(`${nr},${nc}`);
        newPath.push([nr,nc]);
      }

      // 物流之王：先執行疊加設施效果，再轉向
      const overlayId=G.cellOverlay&&G.cellOverlay[`${r},${c}`];
      if(overlayId&&BLDG[overlayId]){
        const ob=BLDG[overlayId];
        const effType2=el.type;
        if(ob.req==='any'||ob.req===effType2){
          const ov_prev={...el};
          const ov_nv=ob.fn(el.value)+(G.bldgUpgrades?.[`${r},${c}`]||0);
          const ov_nt=ob.out||el.type;
          el={value:ov_nv,type:ov_nt};
          addLog(`  🚛 物流之王疊加 ${ob.emoji}${ob.name}: ${TLABEL[ov_prev.type]}${ov_prev.value} → ${TLABEL[el.type]}${el.value}`);
          updateCard(el);
          setTimeout(()=>updateMover(el),100);
        }
      }
      setTimeout(()=>{
        if(newPath.length===0){
          mover.style.display='none';
          document.querySelectorAll('.cell').forEach(c=>c.classList.remove('active-path'));
          finish(el,startVal);
        } else {
          stepWithMover(newPath,el,0,startVal,mover,updateMover);
        }
      },400);
      return;
    }

    // 暴食惡魔：material<->goods 互換用於匹配和輸出
    let effType=el.type;
    if(hasPartner('gluttony')){
      if(el.type==='material') effType='goods';
      else if(el.type==='goods') effType='material';
    }
    if(b.req==='any'||b.req===effType||b.req===el.type){
      // 運輸異常：原料無法→商品
      if(G.buff&&G.buff.noMatToGoods&&(el.type==='material'||effType==='material')&&b.out==='goods'){
        addLog(`  🚫 ${b.emoji}${b.name}：運輸異常，原料無法轉為商品，略過`,'b');
        _next(300); return;
      }
      // 嫉妒惡魔：進入非嫉妒工廠前若已有設施命中則中斷
      if(hasPartner('envy')&&bId!=='envy_factory'&&b.special!=='envy'){
        if((G.inv.facHit||0)===0){}
      }
      if(hasPartner('envy')&&bId==='envy_factory'&&(G.inv.facHit||0)>0){
        addLog('  💚 嫉妒惡魔：已經過其他設施，嫉妒工廠中斷','b');
        setTimeout(()=>{ mover.style.display='none'; document.querySelectorAll('.cell').forEach(c=>c.classList.remove('active-path')); finish(el,startVal); },400);
        return;
      }
      // 嫉妒工廠負面：投入時非鑽石則最終收益-50%
      if(bId==='envy_factory' && el.type!=='diamond'){
        G.inv.envyPen=true;
        addLog('  💚 嫉妒工廠：非鑽石投入，最終收益將-50%','b');
      }
      // 暴食惡魔：若匹配是因為互換，則視為互換類型進入
      if(hasPartner('gluttony')&&b.req===effType&&b.req!==el.type) el={...el,type:effType};
      G.inv.facHit=(G.inv.facHit||0)+1;
      if(isCenterCell(r,c)){ G.inv.cenHits=(G.inv.cenHits||0)+1; G.inv.hwCenter=true; }
      const prev={...el};
      const modKey=`${r},${c}`;
      const upgradeBonus=(!b.special||b.special==='cafeteria')&&G.bldgUpgrades?.[modKey]||0;

      // ── Step 1: 基礎轉換 ──
      let nv=b.fn(el.value);
      let nt=b.out||el.type;

      // 物流放大器：本設施效果×2
      if(G.inv.ampAct){ nv=nv*2; G.inv.ampAct=false; addLog(`  📡 物流放大器：×2 → ${nv}`,'g'); }

      // 暴食惡魔：輸出類型互換
      if(hasPartner('gluttony')){
        if(nt==='material') nt='goods';
        else if(nt==='goods') nt='material';
      }

      // ── Step 2: 事件 buff 加成 ──
      // 原料大降：金錢→原料×2，原料→金錢÷2，原料→商品×2
      if(G.buff.matCrash){
        if(prev.type==='money'&&nt==='material'){ nv=nv*2; addLog(`  📉 原料大降：金錢→原料 ×2`,'w'); }
        else if(prev.type==='material'&&nt==='money'){ nv=Math.max(1,Math.floor(nv/2)); addLog(`  📉 原料大降：原料→金錢 ÷2`,'b'); }
        else if(prev.type==='material'&&nt==='goods'){ nv=nv*2; addLog(`  📉 原料大降：原料→商品 ×2`,'w'); }
      }
      // 原料出口熱 ×2 + 累積加成（與原料大降互斥）
      if(G.buff.matOutMult&&!G.buff.matCrash&&prev.type==='material'&&nt!=='material'){
        nv=Math.round(nv*G.buff.matOutMult);
        if(G.buff.matBoomExtra){ nv+=G.buff.matBoomExtra; addLog(`  📈 原料出口熱累積：+${G.buff.matBoomExtra}`,'g'); }
      }
      if(G.buff.matToMoneyDouble&&prev.type==='material'&&nt==='money'){
        nv=nv*2;
        addLog(`  🌀 颱風：原料→金錢翻倍！`,'w');
      }
      // 重大食安：金錢→商品時 -5（最小1）
      if(G.buff.moneyToGoodsPenalty&&prev.type==='money'&&nt==='goods'){
        nv=Math.max(1,nv-5);
        addLog(`  🍽 重大食安：金錢→商品 -5 → ${nv}`,'b');
      }

      // ── Step 3: 格子固定加成 + 升級加成 ──
      let cellMod=G.cellMods[modKey]||0;
      // 激情惡魔：逆轉減益
      if(cellMod<0 && hasPartner('wrath')){
        cellMod=-cellMod;
        addLog(`  🔥 激情惡魔：減益逆轉 → +${cellMod}`,'g');
        G.partnerState.wrath=G.partnerState.wrath||{noDebuffTurns:0};
        G.partnerState.wrath.noDebuffTurns=0;
      }
      const totalFixed=cellMod+upgradeBonus;
      if(totalFixed!==0) nv=Math.max(0,nv+totalFixed);

      // ── Step 3.5: 格子百分比修正（+10%/-10%，向上取整，最小1） ──
      const pctMod=G.cellPctMods?G.cellPctMods[modKey]||0:0;
      if(pctMod!==0){
        const pctChange=Math.ceil(Math.abs(nv*pctMod/100))*Math.sign(pctMod);
        nv=Math.max(1,nv+pctChange);
        addLog(`  ${pctMod>0?'📈':'📉'} 格子${pctMod>0?'+':''}${pctMod}%：${pctMod>0?'+':''}${pctChange} → ${nv}`);
      }

      // ── Step 3.6: 蕾雅升級百分比加成（永久，+2%可累積） ──
      const leyaPct=G.leyaPctMods?G.leyaPctMods[modKey]||0:0;
      if(leyaPct>0){
        const leyaChange=Math.ceil(nv*leyaPct/100);
        nv=nv+leyaChange;
        addLog(`  👩‍🔧 蕾雅+${leyaPct}%：+${leyaChange} → ${nv}`);
      }

      // ── Step 4: 商品熱銷固定加成 ──
      if(G.buff.goodsBonus&&prev.type==='goods'&&nt==='money'){
        nv+=G.buff.goodsBonus;
      }

      // ── Step 5: 下次輸出加成（nextBonus）──
      if(G.nextBonus&&G.nextBonus.amount>0){
        if(G.nextBonus.type==='any'||G.nextBonus.type===nt){
          nv+=G.nextBonus.amount;
          addLog(`  ✨ 下次輸出加成：+${G.nextBonus.amount}（${TLABEL[nt]}輸出）`,'g');
          G.nextBonus=null; // 消耗一次
        }
      }

      // ── Step 6: 合夥人設施命中效果 ──
      // 黑市商人：商品→金錢時額外倍率
      if(hasPartner('black_market')&&prev.type==='goods'&&nt==='money'){
        const st=G.partnerState.black_market||{mult:3};
        if(st.mult>1){
          const bmBonus=Math.floor(nv*(st.mult-1));
          nv+=bmBonus;
          addLog(`  🕶️ 黑市商人：商品→金錢 ×${st.mult} +${bmBonus}`,'g');
        }
        st.mult=Math.max(1,st.mult-0.5);
        G.partnerState.black_market=st;
      }
      // 壟斷者正面：每3個商店+5%
      if(hasPartner('monopolist')&&prev.type==='goods'&&nt==='money'){
        let _sc=findCells((r,c,b)=>isShopType(b)).length;
        const _tiers=Math.floor(_sc/3);
        if(_tiers>0){ const _bonus=Math.ceil(nv*_tiers*0.05); nv+=_bonus; addLog(`  🎩 壟斷者：${_sc}商店（${_tiers}×3），+${_tiers*5}% +${_bonus}`,'g'); }
      }
      // 追蹤轉換方向（外匯交易員/套利者用）
      if(prev.type==='money'&&nt==='goods'){ G.inv.fxM2G=true; G.inv.arbM2G=true; }
      if(prev.type==='goods'&&nt==='money'){ G.inv.fxG2M=true; G.inv.arbG2M=true; }

      el={value:nv,type:nt};

      pulse(r,c);
      cellEl?.classList.add('transform-flash');
      setTimeout(()=>cellEl?.classList.remove('transform-flash'),500);

      if(cellEl){
        const badge=document.createElement('div');
        badge.className='change-badge';
        badge.textContent=`${b.emoji} ${TLABEL[prev.type]}${prev.value}→${TLABEL[el.type]}${el.value}${el.value!==prev.value?` (+${el.value-prev.value})`:''}`;
        badge.style.background=TCOLOR[el.type]||'var(--green)';
        cellEl.style.position='relative';
        cellEl.appendChild(badge);
        setTimeout(()=>badge.remove(),700);
      }

      // partner onBuildingHit
      G.partners.forEach(pid=>{
        const p=PARTNERS[pid];
        if(p&&p.onBuildingHit){
          const profitBefore=G.profit;
          p.onBuildingHit(G,G.grid[r][c]);
          const gained=G.profit-profitBefore;
          if(gained>0){
            addLog(`★ ${p.emoji}${p.name}：+${gained} 收益`,'g');
            setTimeout(()=>profitFlyFromPartner(pid,gained),200);
          }
        }
      });
      const upgrade=upgradeBonus;
      // 建立算式說明（包含所有加成）
      let calcParts=[];
      const baseChg=b.fn(1)-1;
      if(baseChg!==0||nt!==prev.type) calcParts.push(`基礎${baseChg>=0?'+':''}${baseChg}`);
      if(G.buff.matCrash&&prev.type==='material') calcParts.push('原料大降');
      if(G.buff.matOutMult&&!G.buff.matCrash&&prev.type==='material'&&nt!=='material') calcParts.push(`出口熱×${G.buff.matOutMult}`);
      if(G.buff.matToMoneyDouble&&prev.type==='material'&&nt==='money') calcParts.push(`颱風×2`);
      if(upgrade>0) calcParts.push(`升級+${upgrade}`);
      if(cellMod>0) calcParts.push(`格子+${cellMod}`);
      if(cellMod<0) calcParts.push(`格子${cellMod}`);
      if(G.buff.goodsBonus&&prev.type==='goods'&&nt==='money') calcParts.push(`熱銷+${G.buff.goodsBonus}`);
      const calcStr=calcParts.length?`（${calcParts.join('，')}）`:'';
      addLog(`  ${b.emoji}${b.name}: ${TLABEL[prev.type]}${prev.value}→${TLABEL[el.type]}${el.value}${calcStr}`);
      updateCard(el);
      setTimeout(()=>{ updateMover(el); _next(); },350);
      return;
    } else {
      // 類型不符：略過此格，繼續前進
      addLog(`  ⏭ ${b.emoji}${b.name} 類型不符（需要 ${TLABEL[b.req]}），略過`);
    }
  }
  _next(300);
}

function finish(el,startVal){
  document.querySelectorAll('.cell').forEach(c=>c.classList.remove('active-path'));
  // Tutorial hook: after send - check if mat_factory was hit (回合1)
  if(TUT.active && TUT.waitingFor==='send_el'){
    const hitMatFactory = G._tutHitMatFactory;
    G._tutHitMatFactory = false;
    TUT.waitingFor = null;
    setTimeout(()=>{
      // 如果通過原料廠，原料返回 G.card
      if(hitMatFactory && el.type === 'material'){
        G.card = {value: el.value, type: 'material'};
      } else {
        G.card = null;
      }
      // 回合1結束，推進到回合2
      G.turn = 2;
      G.phase = 'place';
      render();
      renderFanHand();
      if(hitMatFactory){
        TUT.speak([
          '金錢通過了原料廠，變成了原料！',
          '不過……原料不是金錢，所以收益還是零。',
        ], ()=>{
          // 進入 step5（給工廠和商店）
          TUT.step = 4;
          TUT.next();
        });
      } else {
        TUT.speak([
          '金錢直接穿過格子，沒有通過原料廠……',
          '所以資源沒有被轉換，收益是零。',
        ], ()=>{
          // 進入 step5（給工廠和商店）
          TUT.step = 4;
          TUT.next();
        });
      }
    }, 800);
    // 教學模式下不執行後續的正常遊戲結算邏輯
    return;
  }
  // Tutorial hook: step6 投入金錢獲得收益（回合2）
  if(TUT.active && TUT.waitingFor==='tut_send_for_profit'){
    TUT.waitingFor = null;
    // 正常執行收益結算，但之後進入 step7
    // 不 return，讓後續正常結算邏輯執行
  }
  // (人材幣機制已移除)
  // Diamond exits without shop: convert at face value (no bonus)
  if(el.type==='diamond') el={value:el.value,type:'money'};
  // Lust demon
  if(hasPartner('lust')){
    el=PARTNERS.lust.modifyFinish(G,el,G.inv.facHit||0);
  }
  const finalMoney=el.type==='money'?el.value:Math.floor(el.value*0.6);
  const profit=Math.max(0,finalMoney-startVal);
  const profitAtStart=G.profit;
  G.profit+=profit;
  // 清倉拍賣場：結算時入帳
  if(G.inv.clearanceBonus>0){
    G.profit+=G.inv.clearanceBonus;
    addLog(`  🏷️ 清倉拍賣場結算：+${G.inv.clearanceBonus}收益`,'g');
    (G.inv.clearanceCells||[]).forEach((cc,i)=>setTimeout(()=>profitFlyFromCell(cc.r,cc.c,cc.bonus),i*200));
    G.inv.clearanceBonus=0; G.inv.clearanceCells=[];
  }
  // 匯率波動板：本次投入有通過匯率波動板，隨機調整收益
  if(G.inv.exchBoard && profit > 0){
    const pcts = [-15,-12,-10,-8,-5,-3,3,5,8,10,12,15];
    const pct = pcts[Math.floor(Math.random()*pcts.length)];
    const adj = Math.ceil(Math.abs(profit * pct / 100)) * Math.sign(pct);
    G.profit += adj;
    addLog(`📈 匯率波動板：結算隨機 ${pct>0?'+':''}${pct}% → ${adj>0?'+':''}${adj} 收益（共${G.profit}）`, adj>=0?'g':'b');
    G.inv.exchBoard = false;
  }
  // ── 合夥人結算效果（onSettle hook） ──
  G.partners.forEach(pid=>{
    const p=PARTNERS[pid];
    if(p&&p.onSettle) p.onSettle.call(p, G, profit, el);
  });
  // 稅務局：-10%最終收益
  if(profit>0){
    const taxCells=findCells((r,c,b)=>b==='tax_office');
    if(taxCells.length>0){
      const cut=Math.ceil(profit*0.1);
      G.profit-=cut;
      addLog(`  🏛 稅務局：-10% (-${cut})`,'b');
      setTimeout(()=>profitFlyFromCell(taxCells[0][0],taxCells[0][1],-cut),150);
    }
  }
  if(G.inv.envyPen && profit>0 && !isDemonNegDisabled('envy')){
    const cut=Math.floor(profit*0.5);
    G.profit-=cut;
    addLog(`💚 嫉妒工廠負面：收益-50% (-${cut})`,'b');
    const envyCells=findCells((r,c,b)=>b==='envy_factory');
    if(envyCells.length>0) setTimeout(()=>profitFlyFromCell(envyCells[0][0],envyCells[0][1],-cut),150);
    G.inv.envyPen=false;
  }
  // 勞工保險：最終收益扣除 人材數×2%
  if(G.buff&&G.buff.laborInsurance&&profit>0){
    const talents=G.talentCards||0;
    const pct=talents*2;
    if(pct>0){
      const cut=Math.ceil(profit*pct/100);
      G.profit-=cut;
      addLog(`📋 勞工保險：人材${talents}×2=${pct}%，收益-${cut}`,'b');
    }
  }
  addLog(`💰 結算：${TLABEL[el.type]}${el.value} → 入帳${finalMoney}，+${profit}收益`,'g');

  // 收益飛行動畫
  const profitEl=document.getElementById('el-profit');
  const profitRect=profitEl.getBoundingClientRect();
  const targetEl=document.getElementById('r-profit');
  const targetRect=targetEl.getBoundingClientRect();
  const fly=document.createElement('div');
  fly.className='profit-fly';
  fly.textContent=`+${profit}`;
  fly.style.left=profitRect.left+'px';
  fly.style.top=profitRect.top+'px';
  const dx=targetRect.left-profitRect.left;
  fly.style.setProperty('--tx',dx+'px');
  document.body.appendChild(fly);
  setTimeout(()=>fly.remove(),1300);

  // 計算本回合總收益（含所有合夥人加成）並更新顯示
  const totalTurnProfit=G.profit-profitAtStart;
  const hasBonus=totalTurnProfit!==profit;
  let profitHTML=`<span style="color:var(--green);font-size:18px;">+${totalTurnProfit}</span>`;
  if(hasBonus) profitHTML+=`<div style="font-size:9px;color:var(--mu);margin-top:2px;">投入+${profit}，加成${totalTurnProfit-profit>=0?'+':''}${totalTurnProfit-profit}</div>`;
  document.getElementById('el-profit').innerHTML=profitHTML;

  if((G.elementExtraUses||0)>0){
    G.elementExtraUses--;
    addLog(`🧑‍💼 人材效果：可再投入一次（剩餘 ${G.elementExtraUses} 次）`,'g');
    G.phase='place';
    // 額外投入階段：保留當前卡牌值再投入一次
    updateCard(el);
    render();
    return;
  }
  G.phase='done';
  updateCard(el);
  render();

  // Tutorial hook: step6 投入完成後，提示點擊結束回合
  if(TUT.active && TUT.step===6 && !TUT.waitingFor){
    // 立即允許結束回合（不等對話結束）
    TUT.waitingFor = 'tut_end_turn_for_partner';
    setTimeout(()=>{
      if(totalTurnProfit > 0){
        TUT.speak([
          `太棒了！你獲得了 +${totalTurnProfit} 收益！`,
          '現在點擊「結束回合」按鈕吧！',
        ]);
      } else {
        TUT.speak([
          '哎呀，這次沒有獲得收益……',
          '可能是設施的排列方式不對，讓資源沒有正確轉換成金錢。',
          '沒關係，先點「結束回合」繼續吧！',
        ]);
      }
    }, 500);
    return;
  }

  // 首次達標：記錄回合數
  if(G.profit>=G.goal && !G._goalReachedTurn){
    G._goalReachedTurn=G.turn;
  }

  if(G.profit>=G.goal){
    setTimeout(()=>{
      const oldRound=G.round; const oldGoal=G.goal;
      const turnsUsed=G._goalReachedTurn||G.turn;

      // 記錄本輪歷史
      G.roundHistory.push({round:oldRound, turnsUsed, goal:oldGoal, profit:G.profit});

      // 動態難度調整
      adjustDifficulty();

      G.round++;
      // 套用動態倍率到目標公式：base ×1.8 → base ×(1.8 × mult)
      const scaledMult=1.8*G.difficultyMult;
      G.goal=Math.round(oldGoal*scaledMult+15);

      G._goalReachedTurn=0;
      G.turn=1; G.buff={}; G.sel=null; G.cellMods={}; G.cellPctMods={};

      const diffPct=Math.round((G.difficultyMult-1)*100);
      const diffLabel=diffPct>0?` 📈難度+${diffPct}%`:diffPct<0?` 📉難度${diffPct}%`:'';
      showModal('win',`第 ${oldRound} 輪過關！（${turnsUsed}回合達標）\n達成目標 ${oldGoal}\n\n第 ${G.round} 輪新目標：${G.goal}${diffLabel}`);
    },600);
  }
}

// ══════════════════════════════════════
// 動態難度調整
// ══════════════════════════════════════
function adjustDifficulty(){
  const hist=G.roundHistory;
  if(hist.length===0) return;

  const recent=hist.slice(-3); // 最近 3 輪
  const avgTurns=recent.reduce((s,h)=>s+h.turnsUsed,0)/recent.length;

  let delta=0;

  // ── 基於平均達標速度 ──
  if(avgTurns<=2)      delta+=0.25;  // 極快：強力加壓
  else if(avgTurns<=4) delta+=0.15;  // 快速：中度加壓
  else if(avgTurns<=6) delta+=0.05;  // 略快：微調
  else if(avgTurns<=8) delta+=0;     // 正常：不調整
  else                 delta-=0.08;  // 勉強/緩慢：減壓

  // ── 連續瞬殺檢測（連續 2+ 輪 ≤3 回合達標）──
  if(recent.length>=2){
    const streak=recent.filter(h=>h.turnsUsed<=3).length;
    if(streak>=3)      delta+=0.2;   // 3 連瞬殺
    else if(streak>=2) delta+=0.1;   // 2 連瞬殺
  }

  // ── 超額達標檢測（收益遠超目標）──
  const lastRound=hist[hist.length-1];
  const overRatio=lastRound.profit/lastRound.goal;
  if(overRatio>=3)      delta+=0.15;  // 收益 ≥3 倍目標
  else if(overRatio>=2) delta+=0.08;  // 收益 ≥2 倍目標

  // ── 套用並限制範圍 ──
  G.difficultyMult=Math.max(0.6, Math.min(2.5, G.difficultyMult+delta));

  // log
  if(delta>0) addLog(`📈 動態難度：+${Math.round(delta*100)}%（平均${avgTurns.toFixed(1)}回合達標，倍率${G.difficultyMult.toFixed(2)}）`,'w');
  else if(delta<0) addLog(`📉 動態難度：${Math.round(delta*100)}%（平均${avgTurns.toFixed(1)}回合達標，倍率${G.difficultyMult.toFixed(2)}）`,'g');
}

  { id:'buy_fac',   label:'🏗 購買設施',         cost:4, desc:'從設施池隨機取3個，選1加入手牌' },
  { id:'trig_ev',   label:'⚡ 觸發隨機事件',      cost:2, desc:'立即觸發一個隨機事件' },
  { id:'move_fac',  label:'🔧 重新排列設施',       cost:2, desc:'自由移動所有設施，確定後鎖定' },
  { id:'get_partner',label:'🤝 招募合夥人',         cost:5, desc:'隨機招募一位合夥人' },
  { id:'upgrade',   label:'⬆ 提升設施數值',       cost:3, desc:'選一個設施，永久提升輸出 +1' },
