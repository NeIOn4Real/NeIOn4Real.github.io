// ══════════════════════════════════════
// 過關結算（支援連續結算：當收益同時超越多輪目標時自動連鎖）
// ══════════════════════════════════════
function performWinSettlement(turnsUsed){
  G._winPending=false;
  const startRound=G.round;
  const passedGoals=[];
  // 連續結算：只要 profit 仍 >= 當前 goal 就繼續過關（上限 20 輪防護）
  // 連續結算期間，每輪 goal 用同一個（結算前的）難度倍率計算；
  // 全部結算完後再呼叫一次 adjustDifficulty()，避免每輪複利加碼
  let _iter=0;
  while(G.profit>=G.goal && _iter<20){
    _iter++;
    const oldGoal=G.goal;
    passedGoals.push({round:G.round,goal:oldGoal});
    G.roundHistory.push({round:G.round,turnsUsed,goal:oldGoal,profit:G.profit});
    // 合約結算：本輪結束（在 round++ 之前），檢查 deadlineRound === G.round 的合約
    checkContractDeadlines(G.round);
    G.round++;
    const scaledMult=1.4*G.difficultyMult;
    G.goal=Math.round(oldGoal*scaledMult+8);
    // 合約違約：累積目標倍率（多份違約相乘）→ 套用到下一輪目標
    if(G._contractGoalMultPending && G._contractGoalMultPending !== 1){
      const baseGoal=G.goal;
      G.goal=Math.ceil(G.goal*G._contractGoalMultPending);
      addLog(`📜 合約違約：第 ${G.round} 輪目標 ${baseGoal} → ${G.goal}（×${G._contractGoalMultPending.toFixed(2)}）`,'b');
      G._contractGoalMultPending=null;
    }
  }
  // 多輪連跳補發：把「途中跳過、但屬於合約觸發輪」的輪次加入 chooser 隊列
  // — 起始輪已經啟動過（或剛被結算），跳過；終點輪由 startRound 自己 queue，跳過
  if(passedGoals.length > 0){
    const startingRound = passedGoals[0].round;
    const finalRound = G.round; // 即將進入此輪（startRound 會處理）
    for(let tr=startingRound+1; tr<finalRound; tr++){
      if(isContractTriggerRound(tr)){
        queueContractChooser(tr);
        addLog(`📜 第 ${tr} 輪合約被多輪過關跳過，將補發選擇`,'w');
      }
    }
  }
  if(passedGoals.length===0) return; // 保險：理論不會發生
  // 連續結算後一次性評估難度（依累積後完整 roundHistory）
  adjustDifficulty();
  G._goalReachedTurn=0;
  G.turn=1; G.buff={}; G.sel=null; G.cellMods={}; G.cellPctMods={};
  const diffPct=Math.round((G.difficultyMult-1)*100);
  const diffLabel=diffPct>0?` 📈難度+${diffPct}%`:diffPct<0?` 📉難度${diffPct}%`:'';
  autoSave();
  let modalText;
  if(passedGoals.length===1){
    modalText=`第 ${startRound} 輪過關！（${turnsUsed}回合達標）\n達成目標 ${passedGoals[0].goal}\n\n第 ${G.round} 輪新目標：${G.goal}${diffLabel}`;
  } else {
    const chain=passedGoals.map(p=>`第${p.round}輪(目標${p.goal})`).join(' → ');
    modalText=`🎉 連續結算 ${passedGoals.length} 輪！\n總收益 ${G.profit} 連過：\n${chain}\n\n第 ${G.round} 輪新目標：${G.goal}${diffLabel}`;
  }
  showModal('win',modalText);
}

// ══════════════════════════════════════
// 動態難度調整
// ══════════════════════════════════════
function adjustDifficulty(){
  const hist=G.roundHistory;
  if(hist.length===0) return;

  const recent=hist.slice(-3);
  const avgTurns=recent.reduce((s,h)=>s+h.turnsUsed,0)/recent.length;

  let delta=0;

  // ── 基於平均達標速度 ──
  // 新數值體系下收益更高，玩家達標更快是正常的
  // 閾值從 2/4/6/8 上調至 3/5/7/9
  if(avgTurns<=3)      delta+=0.20;   // 3 回合內達標：強力加壓
  else if(avgTurns<=5) delta+=0.10;   // 5 回合內：中度加壓
  else if(avgTurns<=7) delta+=0.03;   // 7 回合內：微調
  else if(avgTurns<=9) delta+=0;      // 正常節奏
  else                 delta-=0.10;   // 幾乎用盡回合：降壓

  // ── 連續速通檢測 ──
  if(recent.length>=2){
    const streak=recent.filter(h=>h.turnsUsed<=3).length;
    if(streak>=3)      delta+=0.15;   // 連續 3 輪速通
    else if(streak>=2) delta+=0.08;   // 連續 2 輪速通
  }

  // ── 收益/目標倍數差異（核心調整）──
  const lastRound=hist[hist.length-1];
  const overRatio=lastRound.profit/lastRound.goal;
  if(overRatio>=10)     delta+=0.30;  // 收益 ≥10 倍：極端加壓
  else if(overRatio>=5) delta+=0.20;  // 收益 ≥5 倍：重度加壓
  else if(overRatio>=3) delta+=0.12;  // 收益 ≥3 倍
  else if(overRatio>=2) delta+=0.06;  // 收益 ≥2 倍

  // ── 最近 3 輪平均超額比率 ──
  const avgRatio=recent.reduce((s,h)=>s+h.profit/h.goal,0)/recent.length;
  if(avgRatio>=5)       delta+=0.15;  // 平均 5 倍以上：持續碾壓
  else if(avgRatio>=3)  delta+=0.08;  // 平均 3 倍以上

  // ── 掙扎檢測：玩家收益遠低於目標時降壓 ──
  if(overRatio<1.3&&overRatio>=1.0) delta-=0.05; // 險過：微降
  // 連續多輪剛好過關
  if(recent.length>=2&&recent.every(h=>h.profit/h.goal<1.5)) delta-=0.05;

  // ── 套用並限制範圍 ──
  G.difficultyMult=Math.max(0.5, Math.min(3.0, G.difficultyMult+delta));

  // log
  const ratioStr=overRatio>=2?`，超額${overRatio.toFixed(1)}倍`:'';
  if(delta>0) addLog(`📈 動態難度：+${Math.round(delta*100)}%（平均${avgTurns.toFixed(1)}回合${ratioStr}，倍率${G.difficultyMult.toFixed(2)}）`,'w');
  else if(delta<0) addLog(`📉 動態難度：${Math.round(delta*100)}%（平均${avgTurns.toFixed(1)}回合${ratioStr}，倍率${G.difficultyMult.toFixed(2)}）`,'g');
}

// ══════════════════════════════════════
// 8種行動選項池
// ══════════════════════════════════════
const ACTION_POOL = [
  { id:'buy_fac',   label:'🏗 購買設施',         cost:6, desc:'從設施池隨機取3個，選1加入手牌' },
  { id:'trig_ev',   label:'⚡ 觸發隨機事件',      cost:3, desc:'立即觸發一個隨機事件' },
  { id:'move_fac',  label:'🔧 重新排列設施',       cost:4, desc:'自由移動所有設施，確定後鎖定' },
  { id:'get_partner',label:'🤝 招募合夥人',         cost:8, desc:'隨機招募一位合夥人' },
  { id:'upgrade',   label:'⬆ 提升設施數值',       cost:5, desc:'選一個設施，永久提升輸出 +1' },
  { id:'next_bonus',label:'✨ 下次輸出加成',       cost:4, desc:'下次元素以商品/原料/金錢輸出時 +3' },
  { id:'swap_ev',   label:'🔄 更換預告事件',       cost:2, desc:'重新抽一個下回合的隨機事件' },
  { id:'nothing',   label:'😴 什麼也沒發生',       cost:0, desc:'跳過行動，保留收益' },
];

function pickActionOptions(){
  const shuffled=[...ACTION_POOL].sort(()=>Math.random()-.5);
  G.actionOptions=shuffled.slice(0,2);
}

function pickNextEvent(){
  // 預告下一個 EVENT_INTERVAL 倍數回合的事件
  const nextEvTurn = Math.ceil((G.turn+1)/EVENT_INTERVAL)*EVENT_INTERVAL;
  // 莫菲定律後，下次事件限定池
  let pool=G._murphyNextPool
    ? EVENTS.filter(e=>['pick_fac','earthquake','job_assist','leya_gift'].includes(e.id))
    : EVENTS.filter(e=>e.id!=='murphy'); // 莫菲定律不進預告池
  G._murphyNextPool=false;
  G.nextEvent=pool[Math.floor(Math.random()*pool.length)];
  G.nextEventTurn=nextEvTurn;
  G.nextEventData=precomputeEventData(G.nextEvent);
}
// 莫菲定律：事件觸發時檢查是否劫持（第2輪起）
function checkMurphyHijack(){
  if(G.round<2||TUT.isBlocking()) return false;
  const mt=G._murphyTrack||{repeatCount:0,noMove:0};
  // 跨輪計算：1 回合達標的玩家 repeatCount 跨輪累積
  const murphyWeight=1+Math.max(0,mt.repeatCount-2)*3+Math.max(0,mt.noMove-3)*2;
  if(murphyWeight<=1) return false;
  const prob=Math.min(0.6, murphyWeight/(murphyWeight+5));
  return Math.random()<prob;
}

function precomputeEventData(ev){
  if(!ev) return null;
  const gn=GN();
  const data={cells:[]};
  if(ev.id==='row_buff'){
    data.r1=Math.floor(Math.random()*gn);
    data.r2=(data.r1+1+Math.floor(Math.random()*(gn-1)))%gn;
    for(let i=0;i<gn;i++){ data.cells.push(`${data.r1},${i}`); data.cells.push(`${data.r2},${i}`); }
  } else if(ev.id==='col_buff'){
    data.c1=Math.floor(Math.random()*gn);
    data.c2=(data.c1+1+Math.floor(Math.random()*(gn-1)))%gn;
    for(let i=0;i<gn;i++){ data.cells.push(`${i},${data.c1}`); data.cells.push(`${i},${data.c2}`); }
  } else if(ev.id==='area_buff'){
    const positions=[];
    for(let r=0;r<gn-1;r++) for(let c=0;c<gn-1;c++) positions.push([r,c]);
    const [pr1,pc1]=positions[Math.floor(Math.random()*positions.length)];
    const nonOv=positions.filter(([r,c])=>Math.abs(r-pr1)>=2||Math.abs(c-pc1)>=2);
    const cand=nonOv.length>0?nonOv:positions.filter(([r,c])=>!(r===pr1&&c===pc1));
    const [pr2,pc2]=cand.length>0?cand[Math.floor(Math.random()*cand.length)]:[pr1,pc1];
    data.r1=pr1; data.c1=pc1; data.r2=pr2; data.c2=pc2;
    for(let dr=0;dr<2;dr++) for(let dc=0;dc<2;dc++){ data.cells.push(`${data.r1+dr},${data.c1+dc}`); data.cells.push(`${data.r2+dr},${data.c2+dc}`); }
  } else if(ev.id==='rebellion'){
    const corners=[[0,0],[0,gn-1],[gn-1,0],[gn-1,gn-1]];
    const count=Math.floor(Math.random()*4)+1;
    data.victims=corners.sort(()=>Math.random()-.5).slice(0,count);
    data.victims.forEach(([r,c])=>data.cells.push(`${r},${c}`));
  } else if(ev.id==='earthquake'){
    const dirs=['top','bottom','left','right'];
    data.dir=dirs[Math.floor(Math.random()*4)];
    for(let r=0;r<gn;r++) for(let c=0;c<gn;c++) if(isFacility(G.grid[r][c])) data.cells.push(`${r},${c}`);
  } else if(ev.id==='hazardous_waste'){
    const empties=[];
    for(let r=0;r<gn;r++) for(let c=0;c<gn;c++) if(!G.grid[r][c]||G.grid[r][c]==='ruin') empties.push([r,c]);
    data.picks=empties.sort(()=>Math.random()-.5).slice(0,1);
    data.picks.forEach(([r,c])=>data.cells.push(`${r},${c}`));
  } else if(ev.id==='leya_gift'){
    const filled=[];
    for(let r=0;r<gn;r++) for(let c=0;c<gn;c++) if(isFacility(G.grid[r][c])) filled.push([r,c]);
    if(filled.length>0){ data.target=filled[Math.floor(Math.random()*filled.length)]; data.cells.push(`${data.target[0]},${data.target[1]}`); }
  } else if(ev.id==='murphy'){
    // 預告高亮所有設施格
    for(let r=0;r<gn;r++) for(let c=0;c<gn;c++) if(isFacility(G.grid[r][c])) data.cells.push(`${r},${c}`);
  }
  return data;
}

function doAction(id){
  // 立即關閉卡牌
  document.getElementById('action-chooser').style.display='none';
  const act=ACTION_POOL.find(a=>a.id===id);
  if(!act)return;
  const actCost=scaledCost(act.cost);
  if(G.profit<actCost){ addLog(`⚠ 收益不足（需要 ${actCost}，現有 ${G.profit}）`,'b'); return; }
  G.profit-=actCost;

  const _tc=getPlayerTagCounts(); // 快取詞條計數（本次行動共用）
  if(id==='buy_fac'){
    const pool=weightedPickN(Object.keys(BLDG).filter(isPoolableBldg),3,_tc);
    const refund=actCost;
    showCardChooser(
      '🏗 選擇一個設施加入手牌',
      pool.map(bid=>({
        emoji:BLDG[bid].emoji, name:BLDG[bid].name,
        desc:BLDG[bid].desc, pos:'', neg:'',
        onclick:`cardChooserPick(()=>{evPick('${bid}',null)})`
      })),
      ()=>{G.profit+=refund; closeActionOverlay(); G.actionOptions=[]; G.phase="place"; render();}
    );
    G.phase='event'; render(); return;
  }
  if(id==='trig_ev'){
    triggerEvent(); return;
  }
  if(id==='move_fac'){
    // 進入自由排列模式（無論是否有拆遷隊都一樣）
    saveGridSnapshot();
    G.freeRearrange=true; G.moveMode=false; G.moveSrc=null;
    G._demolishBureauPending=false; G._tradeZonePending=null; G._dynamicAmpPending=null;
    addLog('🔧 自由排列模式：拖曳設施到想要的位置，完成後點「確認排列」');
    G.phase='place'; render(); return;
  }
  if(id==='get_partner'){
    let pool=Object.keys(PARTNERS).filter(pid=>!hasPartner(pid));
    // 惡魔合約：只出惡魔，且重複出現（不過濾已持有）
    if(typeof hasActiveContract==='function' && hasActiveContract('demon_pact_contract')){
      pool = Object.keys(PARTNERS).filter(pid=>PARTNERS[pid] && PARTNERS[pid].isDemon);
      addLog('📜 惡魔合約：招募池限定惡魔（含重複）','w');
    }
    if(!pool.length){addLog('⚠ 已招募所有合夥人','b');G.profit+=actCost;G.phase='place';render();return;}
    // 安全網：大幅提高蕾雅/譚雅出現機率
    let picks;
    if(checkSafetyNet()){
      const priority=['tanya','leya'].filter(pid=>pool.includes(pid));
      const rest=weightedPickN(pool.filter(pid=>!priority.includes(pid)),3-priority.length,_tc);
      picks=[...priority,...rest].slice(0,3);
    } else {
      picks=weightedPickN(pool,3,_tc);
    }
    const refund=actCost;
    showCardChooser(
      '🤝 招募合夥人',
      picks.map(pid=>({
        emoji:PARTNERS[pid].emoji, name:PARTNERS[pid].name,
        desc:PARTNERS[pid].desc||'',
        pos:PARTNERS[pid].pos||'', neg:PARTNERS[pid].neg||'',
        onclick:`cardChooserPick(()=>{recruitPartner('${pid}');G.phase='place';render();})`
      })),
      ()=>{G.profit+=refund; closeActionOverlay(); G.actionOptions=[]; G.phase="place"; render();}
    );
    G.phase='event'; render(); return;
  }
  if(id==='upgrade'){
    const filled=findFacilityCells();
    if(!filled.length){addLog('⚠ 沒有可提升的設施','b');G.profit+=act.cost;G.phase='place';render();return;}
    G.upgradeMode=true;
    G.phase='place';
    addLog('⬆ 點擊想要提升的設施（永久 +1 輸出）','w');
    render();
    return;
  }
  if(id==='next_bonus'){
    const types=['money','material','goods'];
    const t=types[Math.floor(Math.random()*types.length)];
    G.nextBonus={type:t,amount:3};
    addLog(`✨ 下次 ${TLABEL[t]} 輸出時額外 +3`,'g');
  }
  if(id==='swap_ev'){
    const oldId=G.nextEvent&&G.nextEvent.id;
    pickNextEvent();
    // 不能換到與原來一樣的事件
    if(oldId&&G.nextEvent.id===oldId){
      const alt=EVENTS.filter(e=>e.id!=='murphy'&&e.id!==oldId);
      if(alt.length){ G.nextEvent=alt[Math.floor(Math.random()*alt.length)]; G.nextEventData=precomputeEventData(G.nextEvent); }
    }
    addLog(`🔄 預告事件已更換為：${G.nextEvent.title}`,'g');
  }
  if(id==='nothing'){
    addLog('😴 什麼也沒發生，收益保留');
  }

  closeActionOverlay();
  G.actionOptions=[];
  G.phase='place';
  render();
}

function upgradeCell(r,c){
  hideEv();
  const bId=G.grid[r][c];
  if(!isFacility(bId)) return;
  const b=BLDG[bId];
  const key=`${r},${c}`;
  G.bldgUpgrades[key]=(G.bldgUpgrades[key]||0)+1;
  addLog(`⬆ ${b.emoji}${b.name} (${r+1},${c+1}) 升級！+${G.bldgUpgrades[key]}`,'g');
  G.upgradeMode=false;
  G.actionOptions=[];
  pulse(r,c);
  upgradeFx(r,c,1); // 升級音效 + 浮動 +1
  G.phase='place'; render();
}

function recruitPartner(pid){
  G.partners.push(pid);
  if(PARTNERS[pid]&&PARTNERS[pid].onRecruit) PARTNERS[pid].onRecruit(G);
  if(!G.partnerState[pid]&&PARTNERS[pid].state) G.partnerState[pid]={...PARTNERS[pid].state};
  addLog(`🤝 招募了 ${PARTNERS[pid].emoji}${PARTNERS[pid].name}！`,'g');
  if(pid==='envy') addHand('envy_factory');
  // 場風大師：招募後立即設定本回合方向
  if(pid==='wind_master'&&!G.windDir) rollWindDir();
  G.actionOptions=[];
  closeActionOverlay();
  renderPartners();
  render();
  // 招募音效 + 合夥人卡 pop-in 動畫
  recruitEffect(pid);
  // envy 自動贈卡：飛入手牌
  if(pid==='envy') setTimeout(()=>flyCardToHand('envy_factory', getPartnerCardEl(pid)), 300);
}

// ── 自由排列拖曳系統 ──
let _rearrangeSrc=null;
function onRearrangeDragStart(e,r,c){
  if(!G.freeRearrange||!G.grid[r][c]||G.grid[r][c]==='ruin'){e.preventDefault();return;}
  // 百貨公司（2×2）不可在排列模式中拖曳，避免拆散結構
  if(G.grid[r][c]==='dept_store'||G.grid[r][c]==='dept_store_part'){
    addLog('🏬 百貨公司不可在排列模式中移動','b');
    e.preventDefault();
    return;
  }
  _rearrangeSrc=[r,c];
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain','rearrange');
  const cellEl=cellQ(r,c);
  if(cellEl) cellEl.style.opacity='0.4';
  // 高亮所有格子為可放置目標
  document.querySelectorAll('.cell').forEach(el=>{
    if(el.dataset.r!==String(r)||el.dataset.c!==String(c)) el.classList.add('drag-target');
  });
}
function onRearrangeDragEnd(e){
  _rearrangeSrc=null;
  document.querySelectorAll('.cell').forEach(el=>{el.style.opacity='';el.classList.remove('drag-target');el.classList.remove('drag-over-cell');});
}
function onRearrangeDragOver(e,r,c){
  if(!_rearrangeSrc) return;
  const [sr,sc]=_rearrangeSrc;
  if(r===sr&&c===sc) return;
  // 廢墟不可作為交換目標，不顯示可投放提示
  if(G.grid[r][c]==='ruin') return;
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  const cellEl=cellQ(r,c);
  if(cellEl) cellEl.classList.add('drag-over-cell');
}
function onRearrangeDragLeave(r,c){
  if(!_rearrangeSrc) return;
  const cellEl=cellQ(r,c);
  if(cellEl) cellEl.classList.remove('drag-over-cell');
}
function onRearrangeDrop(e,r,c){
  if(!_rearrangeSrc) return;
  e.preventDefault();
  const [sr,sc]=_rearrangeSrc;
  _rearrangeSrc=null;
  document.querySelectorAll('.cell').forEach(el=>{el.style.opacity='';el.classList.remove('drag-target');el.classList.remove('drag-over-cell');});
  if(r===sr&&c===sc) return;
  const srcId=G.grid[sr][sc], dstId=G.grid[r][c];
  // 目標也不可是百貨公司（會破壞 2×2 結構）
  if(dstId==='dept_store'||dstId==='dept_store_part'){
    addLog('🏬 百貨公司不可作為交換目標','b');
    return;
  }
  // 廢墟不可被交換位置：若目標是廢墟則拒絕
  if(dstId==='ruin'){
    addLog('🏚️ 廢墟不可被交換位置','b');
    return;
  }

  // 蕾雅新規格：同類設施視為不同建築，不再於重新排列時自動合併（落在正常交換流程）

  // 一般交換
  swapCellData(sr,sc,r,c);
  addLog(`🔧 已交換 (${sr+1},${sc+1}) ↔ (${r+1},${c+1})`,'g');
  // 只有實際設施被移動時才觸發合夥人效果
  if(isFacility(G.grid[r][c])||isFacility(G.grid[sr][sc])) onFacilityMoved(r,c,sr,sc);
  G.moveSrc=null;
  pulse(r,c); render();
}

function cancelRearrange(){
  // 還原到進入排列模式前的狀態
  restoreGridSnapshot();
  G.freeRearrange=false; G.moveSrc=null;
  G._demolitionRearrange=false;
  G._demolishBureauPending=false;
  G._tradeZonePending=null;
  G._dynamicAmpPending=null;
  addLog('↩ 取消排列，設施已還原');
  render();
}
function confirmRearrange(){
  // 只有從拆遷隊啟動的重排才扣次數
  if(G._demolitionRearrange && hasPartner('demolition')){
    G.demolitionCharges=Math.max(0,(G.demolitionCharges||0)-1);
    addLog(`🔨 拆遷隊使用 1 次，剩餘 ${G.demolitionCharges} 次`,'g');
  }
  G._demolitionRearrange = false;
  // 排列確定 / 移動 session 結束：統一 flush 拆遷補償局 / 貿易特區 / 動態加強器累積效果
  _flushMoveSession();
  // 莫菲定律：重排後重置未移動計數
  if(G._murphyTrack) G._murphyTrack.noMove=0;
  deleteGridSnapshot();
  G.freeRearrange=false; G.moveSrc=null;
  addLog('✅ 設施排列已確定','g');
  render();
  TUT.hookConfirmRearrange();
}

let _lastStartedTurn=-1; // 防止同回合重複執行 startTurn
function startTurn(){
  // 同回合同輪防重入：行動選項中的 evPick/evDone 會再呼叫 startTurn，跳過重複
  const turnKey=G.round*1000+G.turn;
  if(_lastStartedTurn===turnKey){
    G.phase='place'; render();
    if(hasPartner('tanya')&&!G._tanyaSwappedThisTurn){ G._tanyaSwappedThisTurn=true; tanyaOfferSwap(); }
    else openActionOverlay();
    return;
  }
  _lastStartedTurn=turnKey;
  G.phase='place';
  G._turnPitchOffset = 0; // 每回合音階位移歸零
  G._talentUsedOnElement = false;
  G._demoExpertMode = false;
  G._demoExpertUsedThisTurn = false; // 爆破工程師每回合限 1 次
  G._ruinScavengerUsedThisTurn = false; // 廢墟掠奪者每回合限 1 次
  G._yongqingSellMode = false;
  G._hrUsedThisTurn = false; // 人力資源總監每回合重置
  G._hrTalentUsedCount = 0; // 人力資源總監：每回合人材投入計數重置
  G._mobileCityMode = false;
  G._mobileCitySrc = null;
  G._mobileCityUsedThisTurn = false;
  G._mobileCityMoveCount = 0;
  G._ruinPassedThisTurn = false;
  G._omniGainedThisTurn = false;
  G._dispatchHqFiredThisTurn = false;
  G._logCenterRotated = new Set(); // 物流中心：每回合最多旋轉一次
  G._bureauHitThisTurn = new Set(); // 中央監督局：本回合被資源投入過的監督局格子
  G._staffHousingHitThisTurn = new Set(); // 員工住宅：本回合被資源投入過
  G._staffHousingFiredThisTurn = new Set(); // 員工住宅：本回合已觸發過加成（防多 send 重複）
  G.dynamicAmpMoves = {}; // 動態加強器：本回合每格被移動次數（per-cell, per-turn）
  G._facilitiesDestroyedThisTurn = 0; // 災害控管局：本回合消滅設施總數（per-turn 累計）
  G._disasterBureauFiredThisTurn = false; // 災害控管局：本回合是否已給過加成（防多 send 重複）
  // 人材倉庫：回合開始時若持有 ≥4 人材，本回合此設施對任意資源 → 商品 +4
  G._talentStorageActive = (G.talentCards||0) >= 4;
  // 防呆：每回合開始時保證 元素卡額外投入狀態 歸零，避免上一輪殘留導致按鈕失效
  G.elementExtraUses = 0;
  G._extraUsePhase = false;
  G._turnInvested = false;
  G._turnStartProfit = G.profit||0; // 貧窮神/貪婪惡魔：本回合收益基準
  G._firstFacInvestedThisTurn = false; // 嫉妒惡魔：本回合是否已有設施被投入過
  // 莫菲定律：追蹤未移動設施的回合數（跨輪累計，但新輪第 1 回合不計）
  if(!G._murphyTrack) G._murphyTrack={lastSend:null,repeatCount:0,noMove:0};
  if(G.turnFacMoved===0&&G.turn>1) G._murphyTrack.noMove++;
  else if(G.turn>1) G._murphyTrack.noMove=0;
  // turn===1 時不動 noMove（玩家還沒機會操作）
  G.turnFacMoved = 0; // 動態加強器用：本回合設施移動計數（重置放在檢查之後）
  _safetyNetRoll = false; // 重置安全網判定
  G._permShopUsed = false; // 重置商店使用
  // 合夥人每回合開始效果
  runPartnerHook('onTurnStart');
  runContractHook('onTurnStart');

  // 勞動部長：效果已移至 onSettle（最終收益時失半人材每個+4）
  // 地皮炒家：負面已移除（舊：>3回合未移動-1）

  // ── 新設施回合開始效果 ──
  // 人力銀行：釋放上回合預約的人材（+4 累計）
  if((G._talentBankPending||0)>0){
    const pending=G._talentBankPending;
    G.talentCards=(G.talentCards||0)+pending;
    addLog(`🏧 人力銀行：發放預約人材 +${pending}`,'g');
    G._talentBankPending=0;
    if(typeof renderTalentPanel==='function') renderTalentPanel();
  }
  // H1: 巨人村：回合開始時若人材為 0，獲得 +8（人材 >0 時不發揮效果）
  if((G.talentCards||0)===0 && findCells((r,c,b)=>b==='giant_village').length>0){
    G.talentCards=8;
    addLog('🏰 巨人村：人材為0，獲得+8人材','g');
    if(typeof renderTalentPanel==='function') renderTalentPanel();
  }
  // 大型電子供給站：每回合開始，最頂端那個（base 或最後一個 overlay）若未被覆蓋 → 疊加一個於自身
  // 等價：每回合對每格 mega_elec_supply 永遠 +1 個 overlay（topmost 是 mega_elec_supply 才觸發）
  findCells((r,c,b)=>b==='mega_elec_supply').forEach(([mr,mc])=>{
    if(!G.cellOverlay) G.cellOverlay={};
    const ovs=getOverlays(mr,mc);
    // 確認 topmost 仍是 mega_elec_supply（避免被其他疊加機制接管後仍堆疊）
    const topmost=ovs.length>0?ovs[ovs.length-1]:G.grid[mr][mc];
    if(topmost!=='mega_elec_supply') return;
    ovs.push('mega_elec_supply');
    setOverlays(mr,mc,ovs);
    addLog(`🔋 大型電子供給站 (${mr+1},${mc+1})：自動疊加，總計 ${ovs.length+1} 個`,'g');
  });

  // 稅務局：每回合開始隨機升級一個設施
  {
    const taxCells=findCells((r,c,b)=>b==='tax_office');
    if(taxCells.length>0){
      const allFilled=[];
      findCells((r,c,b)=>isFacility(b)&&b!=='tax_office').forEach(p=>allFilled.push(p));
      if(allFilled.length>0){
        const [tr,tc]=allFilled[Math.floor(Math.random()*allFilled.length)];
        const key=`${tr},${tc}`;
        G.bldgUpgrades[key]=(G.bldgUpgrades[key]||0)+1;
        addLog(`🏛 稅務局：${BLDG[G.grid[tr][tc]].emoji}${BLDG[G.grid[tr][tc]].name} (${tr+1},${tc+1}) 自動升級！`,'w');
      }
    }
  }

  // 磁力板：每回合開始與相鄰隨機設施交換位置
  {
    const magnets=findCells((r,c,b)=>b==='magnet_plate');
    // 隨機順序處理，避免固定優先
    magnets.sort(()=>Math.random()-.5);
    const swapped=new Set(); // 避免同一格被重複交換
    magnets.forEach(([mr,mc])=>{
      const mk=`${mr},${mc}`;
      if(swapped.has(mk)) return;
      // 排除大型設施與其 part（會破壞 2×2 結構，且大型設施不應被移動）
      const adj=[[mr-1,mc],[mr+1,mc],[mr,mc-1],[mr,mc+1]]
        .filter(([ar,ac])=>{
          if(ar<0||ar>=GN()||ac<0||ac>=GN()) return false;
          const b=G.grid[ar][ac];
          if(!isFacility(b)||swapped.has(`${ar},${ac}`)) return false;
          if(BLDG[b]&&BLDG[b].isLarge) return false;
          if(b==='dept_store_part'||b==='ancient_factory_part') return false;
          return true;
        });
      if(adj.length===0) return;
      const [tr,tc]=adj[Math.floor(Math.random()*adj.length)];
      const tmp=G.grid[tr][tc];
      swapCellData(mr,mc,tr,tc);
      swapped.add(mk); swapped.add(`${tr},${tc}`);
      // 交換後被交換設施（現在位於 mr,mc）永久 +2（bldgUpgrades 會跟隨設施移動）
      const targetKey=`${mr},${mc}`;
      G.bldgUpgrades[targetKey]=(G.bldgUpgrades[targetKey]||0)+2;
      // 若對方也是磁力板，交換後兩端皆 +2（磁力板仍位於 tr,tc）
      const bothMagnet=tmp==='magnet_plate';
      if(bothMagnet){
        const srcKey=`${tr},${tc}`;
        G.bldgUpgrades[srcKey]=(G.bldgUpgrades[srcKey]||0)+2;
        addLog(`🧲 磁力板 (${mr+1},${mc+1}) ↔ 🧲磁力板 (${tr+1},${tc+1})，兩邊皆永久+2`,'w');
      } else {
        addLog(`🧲 磁力板 (${mr+1},${mc+1}) ↔ ${BLDG[tmp].emoji}${BLDG[tmp].name} (${tr+1},${tc+1})，被交換設施永久+2`,'w');
      }
      onFacilityMoved(tr,tc,mr,mc);
    });
  }

  // 爆破裝置：倒數計時（先收集再處理，避免迭代中修改 grid）
  if(!G.bombTimers) G.bombTimers={};
  const _bombs=findCells((r,c,b)=>b==='bomb_device');
  _bombs.forEach(([r,cc])=>{
    if(G.grid[r][cc]!=='bomb_device') return; // 已被其他爆炸波及消滅
    const key=`${r},${cc}`;
    if(G.bombTimers[key]===undefined) G.bombTimers[key]=3;
    G.bombTimers[key]--;
    if(G.bombTimers[key]<=0){
      // 先記錄相鄰設施（爆炸前）
      const adj=[[r-1,cc],[r+1,cc],[r,cc-1],[r,cc+1]]
        .filter(([ar,ac])=>ar>=0&&ar<GN()&&ac>=0&&ac<GN()&&isFacility(G.grid[ar][ac])&&G.grid[ar][ac]!=='bomb_device');
      addLog(`💣 爆破裝置 (${r+1},${cc+1}) 爆炸！`,'b');
      destroyFacility(r,cc);
      if(adj.length>0){
        const [tr,tc]=adj[Math.floor(Math.random()*adj.length)];
        const victimId=G.grid[tr][tc];
        if(victimId){
          addLog(`💣 爆炸波及：${BLDG[victimId].emoji}${BLDG[victimId].name} (${tr+1},${tc+1}) 被消滅！`,'b');
          destroyFacility(tr,tc);
        }
      } else {
        addLog(`💣 周圍無設施，未波及`);
      }
      delete G.bombTimers[key];
    } else {
      addLog(`💣 爆破裝置 (${r+1},${cc+1}) 倒數 ${G.bombTimers[key]} 回合`);
      // 倒數 ≤1 時警告：紅閃 + invalid 短音（下一回合就爆）
      if(G.bombTimers[key]<=1){
        SFX.invalid();
        requestAnimationFrame(()=>{ const el=cellQ(r,cc); if(el){ el.classList.remove('invalid-shake'); void el.offsetWidth; el.classList.add('invalid-shake'); setTimeout(()=>el.classList.remove('invalid-shake'),360); } });
      }
    }
  });

  // 人力訓練中心：每回合+1人材
  findCells((r,c,b)=>b==='talent_training').forEach(([r,c])=>{
    G.talentCards=(G.talentCards||0)+1;
    addLog(`🎓 人力訓練中心 (${r+1},${c+1})：+1人材（共${G.talentCards}）`,'g');
  });
  // 公路之星：每回合中央隨機2格+2，每10回合累積+2（10→+4，20→+6…）
  if(hasPartner('highway_star')){
    const centerList=[...getCenterCells()].sort(()=>Math.random()-.5).slice(0,2);
    const tier = Math.floor(G.turn / 10);
    const bonus = 2 + tier * 2;
    centerList.forEach(key=>{
      G.cellMods[key]=(G.cellMods[key]||0)+bonus;
    });
    addLog(`🌟 公路之星：中央2格+${bonus}${tier>0?`（${tier}階加成）`:''}（${centerList.join(' ')}）`,'g');
    G.inv.hwCenter=false;
  }
  // 期貨交易所：每回合重新抽選 0/2/4/8 加成值
  {
    if(!G.futuresValue) G.futuresValue={};
    const gn=GN();
    const choices=[0,2,4,8];
    for(let r=0;r<gn;r++) for(let c=0;c<gn;c++){
      if(G.grid[r][c]==='futures_market'){
        G.futuresValue[`${r},${c}`]=choices[Math.floor(Math.random()*4)];
      }
    }
  }
  // 場風大師：每回合重新抽方向（颱風時不覆蓋）
  if(hasPartner('wind_master')){
    rollWindDir();
  } else if(!(G.buff&&G.buff.typhoonActive)){
    G.windDir=null;
  }
  addLog(`── 回合 ${G.turn}/${G.maxTurns} ──`);
  autoSave();
  render();
  // 人材發光提示
  if((G.talentCards||0)>0){
    const tt=document.querySelector('.talent-token');
    if(tt){ tt.classList.remove('talent-glow'); void tt.offsetWidth; tt.classList.add('talent-glow'); }
  }
  // 譚雅交換：同一回合只觸發一次（evPick/evDone 重入 startTurn 時跳過）
  if(hasPartner('tanya')&&!G._tanyaSwappedThisTurn){
    G._tanyaSwappedThisTurn=true;
    tanyaOfferSwap();
  } else {
    openActionOverlay();
  }
}

// 回合推進
// ══════════════════════════════════════
function scaledCost(base){
  return Math.ceil(base*Math.max(1,(1+(G.round-1)*0.35)));
}
function doNext(){
  if(TUT.hookDoNext()) return;
  // 額外投入階段：允許跳過
  if(G.phase==='place'&&G._extraUsePhase){
    G.elementExtraUses=0;
    G._extraUsePhase=false;
    G.phase='done';
    addLog('⏩ 跳過剩餘人材投入','w');
    render();
  }
  // 容錯：本回合已投入且無 UI 阻塞時，強制進入 done
  // phase==='event' 但無模態顯示視為殘留狀態（事件/商店/動作彈窗未正確 reset phase）
  if(G.phase!=='done'&&G._turnInvested&&!G.freeRearrange&&!G.moveMode&&!G._yongqingSellMode&&!G._demoExpertMode&&!G._omniDragging&&G.phase!=='animating'){
    if(G.phase!=='event' || !isAnyEventModalOpen()){
      G.phase='done';
    }
  }
  if(G.phase!=='done')return;

  // 儲存本回合 log 到歷史
  commitTurnLog();

  // 臨時工棚：回合結束時自動賣出自己 +2，且若場上有廢墟則隨機賣出一個 +2
  findCells((r,c,b)=>b==='temp_shed').forEach(([r,c])=>{
    G.grid[r][c]=null;
    clearKeyedData(`${r},${c}`);
    G.profit+=2;
    addLog(`🛖 臨時工棚 (${r+1},${c+1})：回合結束自動賣出，+2 收益`,'g');
    profitFlyFromCell(r,c,2);
    if(G.ruinCells&&G.ruinCells.size>0){
      const ruins=[...G.ruinCells];
      const pick=ruins[Math.floor(Math.random()*ruins.length)];
      const [rr,rc]=pick.split(',').map(Number);
      G.grid[rr][rc]=null;
      G.ruinCells.delete(pick);
      clearKeyedData(pick);
      G.profit+=2;
      addLog(`🛖 臨時工棚：順便賣出廢墟 (${rr+1},${rc+1})，+2 收益`,'g');
      profitFlyFromCell(rr,rc,2);
    }
  });

  // 勞工兄弟屋：回合結束時清除自身，獲得人材 +2
  let _wbhCleared=0;
  findCells((r,c,b)=>b==='worker_brother_house').forEach(([r,c])=>{
    G.grid[r][c]=null;
    clearKeyedData(`${r},${c}`);
    G.talentCards=(G.talentCards||0)+2;
    addLog(`🏘 勞工兄弟屋 (${r+1},${c+1})：回合結束清除，獲得人材 +2`,'g');
    _wbhCleared++;
  });
  if(_wbhCleared>0){
    if(typeof renderTalentPanel==='function') renderTalentPanel();
    recomputeBoosterAura();
  }

  // 合夥人回合結束效果（貧窮神、貪婪惡魔、傲慢惡魔、激情惡魔等）
  runPartnerHook('onTurnEnd');
  runContractHook('onTurnEnd');

  // 地產 / 產線 違約倒數：每回合結束減 1（finish 中已套用本回合歸零）
  if((G._contractProfitZeroTurns||0) > 0){
    G._contractProfitZeroTurns--;
    if(G._contractProfitZeroTurns === 0) addLog('📜 合約違約懲罰結束（收益歸零回合用完）','w');
  }

  // 每回合結束清除格子修正（只持續一回合）
  G.cellMods={}; G.cellPctMods={};
  G.buff={};G.sel=null;G.moveMode=false;G.moveSrc=null;
  G._tanyaSwappedThisTurn=false;

  // 達標判定（轉換收益等非投入方式也能觸發過關）
  if(G.profit>=G.goal){
    if(!G._goalReachedTurn) G._goalReachedTurn=G.turn;
    const oldRound=G.round; const oldGoal=G.goal;
    const turnsUsed=G._goalReachedTurn||G.turn;
    G.roundHistory.push({round:oldRound, turnsUsed, goal:oldGoal, profit:G.profit});
    adjustDifficulty();
    G.round++;
    const scaledMult=1.4*G.difficultyMult;
    G.goal=Math.round(oldGoal*scaledMult+8);
    G._goalReachedTurn=0;
    G.turn=1; G.buff={}; G.sel=null; G.cellMods={}; G.cellPctMods={};
    const diffPct=Math.round((G.difficultyMult-1)*100);
    const diffLabel=diffPct>0?` 📈難度+${diffPct}%`:diffPct<0?` 📉難度${diffPct}%`:'';
    autoSave();
    showModal('win',`第 ${oldRound} 輪過關！（${turnsUsed}回合達標）\n達成目標 ${oldGoal}\n\n第 ${G.round} 輪新目標：${G.goal}${diffLabel}`);
    return;
  }

  // 回合用盡（未達標）→ 失敗
  if(G.turn>=G.maxTurns){
    showModal('lose',`第 ${G.round} 輪失敗！\n收益 ${G.profit} / 目標 ${G.goal}\n差距 ${G.goal-G.profit}`);
    return;
  }

  G.turn++;
  // 回合推進：短促 click + 數字 pop（render 後才能找到 turn DOM 元素）
  SFX.turnTick();
  // 最後 2 回合（剩 1~2 回合）追加警告短音 + 倒數數字紅閃
  const turnsLeft=(G.maxTurns||10)-G.turn+1;
  if(turnsLeft<=2 && turnsLeft>=1){
    setTimeout(()=>SFX.invalid(),120);
  }
  setTimeout(()=>{
    const turnEl=document.getElementById('r-turn');
    if(turnEl){
      turnEl.classList.remove('turn-pop'); void turnEl.offsetWidth; turnEl.classList.add('turn-pop');
      if(turnsLeft<=2 && turnsLeft>=1){
        turnEl.classList.remove('temp-debuff'); void turnEl.offsetWidth; turnEl.classList.add('temp-debuff');
      } else {
        turnEl.classList.remove('temp-debuff');
      }
    }
  },0);

  // 拆遷隊：已改為計數制（在 PARTNERS.demolition.onTurnStart 實作）

  // 達到預定回合時觸發事件（延遲事件可能提前至 turn 2 或 1）
  if(G.nextEvent && G.turn>=G.nextEventTurn){
    let ev=G.nextEvent;
    G._eventDeferred=0;
    // 莫菲定律劫持：第2輪起根據權重替換預告事件
    if(checkMurphyHijack()){
      ev=EVENTS.find(e=>e.id==='murphy');
    }
    G.nextEvent=null;
    G.cellMods={}; G.cellPctMods={}; // 確保事件效果從乾淨狀態套用
    G.phase='event';
    G._currentEventId = ev.id; // 供惡魔巨人 evDone 檢查
    _playEventSfx(ev);
    ev.show(ev);
    pickNextEvent();
    render();
    return;
  }

  // 產生本回合2個行動選項
  pickActionOptions();
  startTurn();
}

// ── 常駐行動：購買設施（商店） ──
function getPermShopCost(){
  let cost = scaledCost(8); // 基礎 8，隨輪數遞增
  if(typeof hasActiveContract === 'function' && hasActiveContract('expand_contract')){
    cost *= 3; // 擴展合約：商店費用 ×3
  }
  return cost;
}
function isPermShopFree(){
  const handFacs=G.hand.filter(h=>h.count>0).length;
  if(handFacs>0) return false;
  return findFacilityCells().length < GN()*GN()/2;
}
function doPermShop(){
  if(G.phase!=='place'&&G.phase!=='done') return;
  if(G._permShopUsed) return;
  // 本回合 offer 快取：每回合首次開啟生成，之後（取消重開）沿用，避免反覆 roll 刷內容
  let offer = G._permShopOffer;
  if(!offer || offer.turn !== G.turn || offer.round !== G.round){
    const _shopTc=getPlayerTagCounts();
    // 基礎設施池 + 商店限定工具池 + 1 隨機物流方向
    let pool=[...BASIC_FACILITIES, ...SHOP_ONLY_FACILITIES];
    pool.push(LOGISTICS_DIRS[Math.floor(Math.random()*LOGISTICS_DIRS.length)]);
    // 35% 機率額外出現一個非基礎設施
    if(Math.random()<0.35){
      const nonBasic=Object.keys(BLDG).filter(id=>
        isPoolableBldg(id)&&!BASIC_FACILITIES.includes(id)
      );
      if(nonBasic.length) pool.push(weightedPickN(nonBasic,1,_shopTc)[0]);
    }
    // 荒蕪合約：下次商店出 5 張全免費（首次生成時消耗 flag）
    const barrenBoost = !!G._contractBarrenNextShopFiveFree;
    const numCards = barrenBoost ? 5 : 3;
    const shuffled=weightedPickN([...new Set(pool)],numCards,_shopTc);
    const hasFree = barrenBoost || isPermShopFree();
    const freeIdx=(hasFree && !barrenBoost) ? Math.floor(Math.random()*shuffled.length) : -1;
    if(barrenBoost){
      G._contractBarrenNextShopFiveFree = false; // 一次性消耗（生成時）
      addLog('📜 荒蕪：商店出現 5 張免費設施','g');
    }
    offer = { ids:shuffled, freeIdx, hasFree, barrenBoost, turn:G.turn, round:G.round };
    G._permShopOffer = offer;
  }
  const cost=getPermShopCost();
  const prevPhase=G.phase;
  showCardChooser(
    `🏗 商店${offer.barrenBoost?' （荒蕪：5 張免費）':(offer.hasFree?' （含免費）':'')}`,
    offer.ids.map((bid,i)=>{
      const isFree = offer.barrenBoost || (i===offer.freeIdx);
      const c=isFree?0:cost;
      const afford=G.profit>=c;
      return {
        emoji:BLDG[bid].emoji, name:BLDG[bid].name,
        desc:BLDG[bid].desc+(isFree?'':(afford?'':'\n⚠ 收益不足')),
        pos:isFree?'免費':'-'+c+' 收益', neg:'',
        extraClass:isFree?'free-card':'',
        onclick:afford?`cardChooserPick(()=>{G.profit-=${c};G._permShopUsed=true;G._permShopOffer=null;addHandMaybeCompound('${bid}');addLog('🏗 購買了 ${BLDG[bid].emoji}${BLDG[bid].name}${isFree?" （免費）":""}','g');G.phase='${prevPhase}';render();flyCardToHand('${bid}');})`:'',
      };
    }),
    ()=>{ G.phase=prevPhase; render(); } // 取消（不清除 offer，下次開仍是同一批）
  );
  G.phase='event'; render();
  // 含免費設施時，額外播一段 SSR 級提示音 + 金粉
  if(offer.hasFree){
    setTimeout(()=>{
      SFX.rareDrop();
      const cardsRow=document.getElementById('card-chooser-cards');
      if(cardsRow) showSsrSparkle(cardsRow.querySelector('.sel-card.free-card')||cardsRow,{silent:true});
    },180);
  }
}
// ── 常駐行動：資源轉換器 ──
function doPermConvert(){
  if(G.phase!=='place'&&G.phase!=='done') return;
  if(!G.card||G.card.type==='money') return;
  const oldType=G.card.type, oldVal=G.card.value;
  const profit=Math.max(1,Math.floor(oldVal*0.6));
  G.profit+=profit;
  G.card={value:1,type:'money'};
  updateCard(G.card);
  addLog(`🔄 資源轉換：${TLABEL[oldType]}${oldVal} → +${profit} 收益`,'g');
  render();
  profitFlyFrom(document.getElementById('btn-perm-convert'),profit);
  // 達標：立即觸發過關（與投入路徑一致；支援連續結算）
  if(G.profit>=G.goal){
    if(!G._goalReachedTurn){ G._goalReachedTurn=G.turn; showGoalReachedFx(); }
    if(!G._winPending){
      G._winPending=true;
      const turnsUsed=G._goalReachedTurn||G.turn;
      setTimeout(()=>performWinSettlement(turnsUsed),600);
    }
  }
}
// 更新常駐按鈕狀態
function updatePermBtns(){
  const shopBtn=document.getElementById('btn-perm-shop');
  const convBtn=document.getElementById('btn-perm-convert');
  if(!shopBtn||!convBtn) return;
  const inGame=G.phase==='place'||G.phase==='done';

  const shopUsed=G._permShopUsed||false;

function openActionOverlay(){
  const chooser=document.getElementById('action-chooser');
  const cards=document.getElementById('action-cards');
  DM.onActionOpen();
  if(!G.actionOptions||G.actionOptions.length===0){chooser.style.display='none';return;}
  // Check if player can afford any option
  const canAffordAny=G.actionOptions.some(a=>G.profit>=scaledCost(a.cost));
  cards.innerHTML=G.actionOptions.map(act=>{
    const sc=scaledCost(act.cost);
    const canAfford=G.profit>=sc;
    return `<div class="acard ${!canAfford?'acard-disabled':''}" onclick="${canAfford?`doAction('${act.id}')`:`actionDeny(this)`}" onmouseenter="DM.onActionHover('${act.label.replace(/^[^\u4e00-\u9fa5a-zA-Z]+/, '')}')" style="cursor:${canAfford?'pointer':'not-allowed'}">
      <div class="acard-label">${act.label}</div>
      <div class="acard-desc">${act.desc}</div>
      <div class="acard-cost ${act.cost===0?'free':''}">${act.cost===0?'免費':'-'+sc+' 收益'}</div>
    </div>`;
  }).join('');
  // Hide skip button if player can afford options (must choose) — sloth demon always allows skip
  const skipBtn=chooser.querySelector('button[onclick="closeActionOverlay()"]');
  const showSkip=!canAffordAny||hasPartner('sloth');
  if(skipBtn){
    skipBtn.style.display=showSkip?'block':'none';
    skipBtn.classList.toggle('btn-glow',!canAffordAny&&showSkip);
  }
  chooser.style.display='flex';
  // 進場動畫（套用在 cards row）+ 音效
  if(cards){ cards.classList.remove('overlay-popin'); void cards.offsetWidth; cards.classList.add('overlay-popin'); }
  SFX.openShop();
}
function closeActionOverlay(){
  document.getElementById('action-chooser').style.display='none';
  // sloth demon: trigger on skip
  if(hasPartner('sloth')&&G.actionOptions&&G.actionOptions.length>0){
    PARTNERS.sloth.onSkipAction(G);
  }
  G.actionOptions=[];
}

function render(){
  document.getElementById('r-turn').textContent=`第${G.round}輪 回合${G.turn}/${G.maxTurns}`;
  document.getElementById('r-profit').textContent=G.profit;
  document.getElementById('r-goal').textContent=G.goal;
  // 合約按鈕：每次 render 同步狀態與計數
  if(typeof renderContractBtn==='function') renderContractBtn();
  const pct=Math.min(100,Math.round(G.profit/G.goal*100));
  document.getElementById('pbar-fill').style.width=pct+'%';
  // 動態難度指標（第2輪後顯示）
  const diffChip=document.getElementById('diff-chip');
  if(diffChip){
    if(G.round>1&&G.difficultyMult!==1.0){
      diffChip.style.display='';
      const dm=G.difficultyMult;
      document.getElementById('r-diff').textContent=`×${dm.toFixed(2)}`;
      document.getElementById('r-diff').style.color=dm>1.1?'var(--red)':dm<0.95?'var(--green)':'var(--blue)';
    } else { diffChip.style.display='none'; }
  }

  // 同步卡牌 UI（fan hand handles display)
  if(G.card) updateCard(G.card);

  // 提升設施提示橫幅
  document.getElementById('upgrade-hint').classList.toggle('show', !!G.upgradeMode);

  // 場風大師 / 颱風方向提示
  const windHint=document.getElementById('wind-hint');
  if(windHint){
    const isTyphoon=G.buff&&G.buff.typhoonActive;
    const isWind=hasPartner('wind_master');
    if((isWind||isTyphoon)&&G.windDir&&G.phase==='place'){
      const dirLabels={left:'← 左側',right:'→ 右側',top:'↑ 上方',bottom:'↓ 下方'};
      const dirArrows={left:'→',right:'←',top:'↓',bottom:'↑'};
      const icon=isTyphoon?'🌀 颱風：':'🌀 場風大師：';
      const extra=isTyphoon?' （物流失效，原料→金錢翻倍）':'（獲得×2倍率）';
      windHint.style.display='flex';
      windHint.style.background=isTyphoon?'rgba(122,26,26,.1)':'rgba(26,78,122,.1)';
      windHint.style.borderColor=isTyphoon?'rgba(122,26,26,.25)':'rgba(26,78,122,.25)';
      windHint.style.color=isTyphoon?'var(--red)':'var(--blue)';
      document.getElementById('wind-hint-text').textContent=`${icon}本回合只能從 ${dirLabels[G.windDir]} 投入 ${extra}`;
      document.getElementById('wind-dir-arrow').textContent=dirArrows[G.windDir];
    } else {
      windHint.style.display='none';
    }
  }

  const _btnNext=document.getElementById('btn-next');
  // 按鈕 enable 條件：
  // 1. phase='done'（正常投入完成）
  // 2. phase='place' 且 _extraUsePhase（額外投入階段可跳過）
  // 3. 容錯：本回合已投入過（_turnInvested），且不在其他互動模式 → 允許結束
  //    phase==='event' 視為阻塞「僅在實際有事件/商店/動作模態顯示時」，避免殘留 phase 卡死按鈕
  const _eventBlocking=G.phase==='event'&&isAnyEventModalOpen();
  const _inOtherMode=G.freeRearrange||G.moveMode||G._yongqingSellMode||G._demoExpertMode||G._omniDragging||G.phase==='animating'||_eventBlocking;
  const _canEnd=G.phase==='done' || (G.phase==='place'&&G._extraUsePhase) || (G._turnInvested&&!_inOtherMode);
  _btnNext.disabled=!_canEnd;
  _btnNext.textContent=G._extraUsePhase?'⏩ 跳過額外投入':'⏩ 結束回合';
  updatePermBtns();

  renderGrid();
  renderHand();
  renderPartners();
  renderFanHand();
  renderTalentPanel();
  renderSideLog();
}

      ${expertClickable?`<div style="font-size:8px;font-weight:700;color:var(--red);margin-top:1px;">-2💰摧毀</div>`:''}
      ${yqClickable?`<div style="font-size:8px;font-weight:700;color:var(--money);margin-top:1px;">賣出設施</div>`:''}
      ${isOmni&&omniCount>0?`<div style="font-size:9px;font-weight:700;background:var(--money);color:#fff;border-radius:99px;padding:1px 6px;margin-top:2px;line-height:1.2;">📊×${omniCount}</div>${omniClickable?'<div style="font-size:8px;color:var(--money);font-weight:700;margin-top:1px;line-height:1.1;">點擊灌注</div>':''}`:''}
      ${(partnerCount>=0&&partnerCount>0)?`<div style="font-size:8px;font-weight:700;color:var(--hi);margin-top:1px;">計數 ${partnerCount}</div>`:''}

function hideOmniDragPanel(){
  const p=document.getElementById('omni-drag-panel');
  if(p){
    if(p._cleanup) p._cleanup();
    p.remove();
  }
}
function closeOmniPanel(){ hideOmniDragPanel(); }

function installOmniPanelCloser(panel){
  // ESC 或點擊面板外部 → 關閉；面板內部點擊不關閉
  const onKey=(ev)=>{ if(ev.key==='Escape') closeOmniPanel(); };
  const onDocDown=(ev)=>{ if(!panel.contains(ev.target)) closeOmniPanel(); };
  // 延遲掛載，避免觸發 useOmniAccountant 的 click 事件連帶關閉。
  // 若面板在 setTimeout 觸發前被關閉（例如快速 drop 重建面板），cleanup 會先執行；
  // 此時 attached=false，setTimeout 回呼需檢查 panel 是否仍在 DOM 中才掛載。
  let attached=false;
  const timerId=setTimeout(()=>{
    if(!document.body.contains(panel)) return; // panel 已被移除，不掛載
    document.addEventListener('keydown',onKey);
    document.addEventListener('mousedown',onDocDown,true);
    attached=true;
  },150);
  panel._cleanup=()=>{
    clearTimeout(timerId);
    if(attached){
      document.removeEventListener('keydown',onKey);
      document.removeEventListener('mousedown',onDocDown,true);
    }
  };
}

// 面板內 omni source card 拖曳
function onOmniDragStart(e){
  G._omniDragging=true;
  try{
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain','omni');
  }catch(_){}
  const src=document.getElementById('omni-source-card');
  if(src) src.style.opacity='0.5';
}

function onOmniDragEnd(e){
  G._omniDragging=false;
  const src=document.getElementById('omni-source-card');
  if(src) src.style.opacity='';
  document.querySelectorAll('.omni-drop-card.omni-hover').forEach(el=>el.classList.remove('omni-hover'));
}

function onOmniDragOverPanel(e,pid){
  if(!G._omniDragging) return;
  if(!COUNT_PARTNERS.includes(pid)) return;
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  const card=e.currentTarget;
  if(card) card.classList.add('omni-hover');
}

function onOmniDragLeavePanel(e){
  const card=e.currentTarget;
  if(card) card.classList.remove('omni-hover');
}

function onOmniDropPanel(e,pid){
  if(!G._omniDragging) return;
  if(!COUNT_PARTNERS.includes(pid)) return;
  e.preventDefault();
  G._omniDragging=false;
  document.querySelectorAll('.omni-drop-card.omni-hover').forEach(el=>el.classList.remove('omni-hover'));
  // 直接套用計數
  const st=G.partnerState.omni_accountant||{count:0};
  if(st.count<=0){ closeOmniPanel(); return; }
  const tgt=G.partnerState[pid]||{count:0};
  tgt.count++;
  st.count--;
  G.partnerState[pid]=tgt;
  G.partnerState.omni_accountant=st;
  addLog(`📊 全能會計師：${PARTNERS[pid].name} 計數+1（目前 ${tgt.count}）`,'g');
  processCountTrigger(pid);
  // 如果 omni 還有計數，刷新面板內容讓玩家繼續；否則關閉
  if(st.count>0){
    showOmniDragPanel(); // 重建面板（含新計數、willTrigger 狀態）
  } else {
    closeOmniPanel();
  }
  render();
}

// 轉運中心方向選擇器
let _transferPickerCleanup=null; // 全域追蹤，防止多個 picker 洩漏
function showTransferHubDirPicker(r,c,onDone,onCancel){
  // 清除舊 picker（防止洩漏；視為被取消，套用 right 預設）
  if(_transferPickerCleanup){ _transferPickerCleanup(); _transferPickerCleanup=null; }
  const dirs=[
    {dir:'top',emoji:'⬆️',label:'上'},
    {dir:'bottom',emoji:'⬇️',label:'下'},
    {dir:'left',emoji:'⬅️',label:'左'},
    {dir:'right',emoji:'➡️',label:'右'},
  ];
  const dirMap={top:'logistics_up',bottom:'logistics_down',left:'logistics_left',right:'logistics_right'};
  const cellEl=cellQ(r,c);
  const rect=cellEl?cellEl.getBoundingClientRect():{left:200,top:200};
  const panel=document.createElement('div');
  panel.style.cssText=`position:fixed;z-index:600;background:var(--sur);border:2px solid var(--acc);border-radius:10px;padding:8px;box-shadow:0 6px 20px rgba(0,0,0,.25);display:flex;gap:6px;left:${rect.left}px;top:${rect.bottom+4}px;`;
  let _selectedDir=null;
  // 集中 finalize：依當前 cell 內容決定變身/改向行為
  // - transfer_hub：變成單向物流站（logistics_X）
  // - logistics_hub：變成物流中心（logistics_center）並設定起始方向
  // - logistics_X：紅綠燈情境，僅改變方向
  const _finalize=()=>{
    const cur=G.grid[r][c];
    const isLogStation=cur==='logistics_up'||cur==='logistics_down'||cur==='logistics_left'||cur==='logistics_right';
    if(cur!=='transfer_hub'&&cur!=='logistics_hub'&&!isLogStation) return;
    if(_selectedDir){
      const d=dirs.find(x=>x.dir===_selectedDir);
      if(cur==='transfer_hub'){
        G.grid[r][c]=dirMap[_selectedDir];
        addLog(`🔀 轉運中心 (${r+1},${c+1}) → ${d.emoji} ${d.label}`,'g');
      } else if(cur==='logistics_hub'){
        G.grid[r][c]='logistics_center';
        if(!G.cellRedirectDir) G.cellRedirectDir={};
        G.cellRedirectDir[`${r},${c}`]=_selectedDir;
        addLog(`🔀 物流轉運中心 (${r+1},${c+1}) → 物流中心（起始 ${d.emoji} ${d.label}）`,'g');
      } else {
        // 紅綠燈
        G.grid[r][c]=dirMap[_selectedDir];
        addLog(`🚦 紅綠燈 (${r+1},${c+1}) → ${d.emoji} ${d.label}`,'g');
      }
    } else {
      // 取消預設
      if(cur==='transfer_hub'){
        G.grid[r][c]='logistics_right';
      } else if(cur==='logistics_hub'){
        G.grid[r][c]='logistics_center';
        if(!G.cellRedirectDir) G.cellRedirectDir={};
        G.cellRedirectDir[`${r},${c}`]='right';
      }
      // 紅綠燈未選：保持原物流站方向不動
    }
    render();
  };
  const _cleanup=()=>{
    if(panel.parentNode) panel.remove();
    document.removeEventListener('keydown',_escPicker);
    document.removeEventListener('click',_clickClose);
    _transferPickerCleanup=null;
    const wasCancelled=(_selectedDir===null);
    _finalize();
    if(wasCancelled&&typeof onCancel==='function') onCancel();
    if(typeof onDone==='function') setTimeout(onDone,0);
  };
  const _escPicker=(e)=>{ if(e.key==='Escape') _cleanup(); };
  const _clickClose=()=>{ _cleanup(); };
  _transferPickerCleanup=_cleanup;
  dirs.forEach(d=>{
    const btn=document.createElement('button');
    btn.className='abtn';
    btn.style.cssText='width:44px;height:44px;font-size:22px;display:flex;align-items:center;justify-content:center;padding:0;margin:0;';
    btn.textContent=d.emoji;
    btn.title=d.label;
    btn.onclick=()=>{ _selectedDir=d.dir; _cleanup(); };
    panel.appendChild(btn);
  });
  panel.onclick=(e)=>e.stopPropagation();
  document.body.appendChild(panel);
  setTimeout(()=>document.addEventListener('click',_clickClose,{once:true}),50);
  document.addEventListener('keydown',_escPicker);
}

function renderHand(){

  el.innerHTML=items.map(h=>{

    const canSel=G.phase==='place';

function renderSideLog(){
  const el=document.getElementById('side-log');
  if(!el) return;
  let html='';

  // 過去回合（舊→新，最新在底部）
  if(G.turnLogHistory){
    const reversed=[...G.turnLogHistory].reverse();
    reversed.forEach(t=>{
      html+=`<div class="log-turn-block" style="opacity:.7;">`;
      html+=`<div class="log-turn-hdr" style="color:var(--mu);">第${t.round}輪 回合${t.turn}</div>`;
      html+=t.entries.map(e=>{
        const isCalc=e.msg.startsWith('  ');
        return `<div class="${isCalc?'log-calc':'log-entry'} ${e.cls||''}">${e.msg.trim()}</div>`;
      }).join('');
      html+=`</div>`;
    });
  }

  // 當前回合（最新，在最底部）
  if(G.turnLog&&G.turnLog.length>0){
    html+=`<div class="log-turn-block">`;
    html+=`<div class="log-turn-hdr">第${G.round}輪 回合${G.turn}</div>`;
    html+=G.turnLog.map(e=>{
      const isCalc=e.msg.startsWith('  ');
      return `<div class="${isCalc?'log-calc':'log-entry'} ${e.cls||''}">${e.msg.trim()}</div>`;
    }).join('');
    html+=`</div>`;
  }

  if(!html) html='<div style="font-size:9px;color:var(--hi);">尚無記錄</div>';
  el.innerHTML=html;
  // 自動捲到最底顯示最新 log
  el.scrollTop=el.scrollHeight;
}

// 貿易特區：永久 +2 加成助手
function _addTradeZoneBonus(zr,zc,reason){
  const k=`${zr},${zc}`;
  G.bldgUpgrades[k]=(G.bldgUpgrades[k]||0)+2;
  addLog(`🌏 貿易特區 (${zr+1},${zc+1})：${reason}，永久+2（累計${G.bldgUpgrades[k]}）`,'g');
  SFX.upgrade();
  requestAnimationFrame(()=>{ const el=cellQ(zr,zc); if(el){ el.classList.remove('transform-flash'); void el.offsetWidth; el.classList.add('transform-flash'); setTimeout(()=>el.classList.remove('transform-flash'),500); } });
}
function _maybeAddTradeZoneBonus(zr,zc,reason){
  if(_isInMoveSession()){
    if(!G._tradeZonePending) G._tradeZonePending=[];
    G._tradeZonePending.push({zr,zc,reason});
  } else {
    _addTradeZoneBonus(zr,zc,reason);
  }
}
// (r,c) 的 8 鄰居（不含自己）
function _eachAdj8(r,c,fn){
  const gn=GN();
  for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
    if(dr===0&&dc===0) continue;
    const nr=r+dr, nc=c+dc;
    if(nr<0||nr>=gn||nc<0||nc>=gn) continue;
    fn(nr,nc);
  }
}
function _isWithin8(r1,c1,r2,c2){
  return Math.max(Math.abs(r1-r2),Math.abs(c1-c2))===1;
}

// 設施放置時觸發的永久效果（放置瞬間結算一次）
// opts.bldgId 指定剛放置的設施 id（疊加 / 複雜情境），未指定則讀 G.grid[r][c]
function onFacilityPlaced(r,c,bldgId){
  if(!bldgId||bldgId==='ruin'||bldgId==='dept_store_part') return;
  // 電子工廠：場上每有一個電子設施（含自己、含疊加），這個設施永久+2
  if(bldgId==='elec_factory'){
    let elecCount=findCells((rr,cc,bb)=>bb&&hasTag(bb,'electronic')).length;
    eachCell((rr,cc)=>{ getOverlays(rr,cc).forEach(ovId=>{ if(hasTag(ovId,'electronic')) elecCount++; }); });
    if(elecCount>0){
      const k=`${r},${c}`;
      G.bldgUpgrades[k]=(G.bldgUpgrades[k]||0)+elecCount*2;
      addLog(`⚡ 電子工廠 (${r+1},${c+1})：場上 ${elecCount} 個電子設施，永久+${elecCount*2}（累計+${G.bldgUpgrades[k]}）`,'g');
    }
  }
  // 貿易特區規則：「商店被設置在周圍 8 格」就 +2
  // 1) 任何商店（含 trade_zone 自己）放置時，掃描 8 鄰居中的所有 trade_zone +2
  if(BLDG[bldgId]&&BLDG[bldgId].isShop){
    _eachAdj8(r,c,(nr,nc)=>{
      if(G.grid[nr][nc]==='trade_zone'){
        _maybeAddTradeZoneBonus(nr,nc,`周圍 (${r+1},${c+1}) 設置${BLDG[bldgId].name}`);
      }
    });
  }
  // 2) trade_zone 自己被放置：自己作為商店 +2，再掃描 8 鄰居既有商店每個 +2
  if(bldgId==='trade_zone'){
    _maybeAddTradeZoneBonus(r,c,`自身為商店`);
    _eachAdj8(r,c,(nr,nc)=>{
      const nb=G.grid[nr][nc];
      if(nb&&BLDG[nb]&&BLDG[nb].isShop){
        _maybeAddTradeZoneBonus(r,c,`既有 (${nr+1},${nc+1}) ${BLDG[nb].name}`);
      }
    });
  }
  // 強化增幅裝置光環：設施位置變動 → 重算
  recomputeBoosterAura();
}

// 放置設施：強化視覺特效（彈出動畫 + 光環 + 火花）+ 音效
// opts.overlay=true 時用 SFX.placeOverlay（疊加：蕾雅/物流之王/倉儲女王/大財團取代）
// opts.bldgId 指定剛放置 id（供 onFacilityPlaced 使用；疊加時需顯式傳入）
function placeEffect(r,c,opts){
  opts=opts||{};
  if(opts.overlay) SFX.placeOverlay(); else SFX.place();
  const el=cellQ(r,c);
  if(!el) return;
  // 彈出動畫
  el.classList.remove('place-spawn');void el.offsetWidth;el.classList.add('place-spawn');
  setTimeout(()=>el.classList.remove('place-spawn'),600);
  // 光環（expanding ring）
  const parent=el.parentElement;
  if(parent){
    const rect=el.getBoundingClientRect(), pRect=parent.getBoundingClientRect();
    const ring=document.createElement('div');
    ring.className='place-ring';
    ring.style.left=(rect.left-pRect.left)+'px';
    ring.style.top=(rect.top-pRect.top)+'px';
    ring.style.width=rect.width+'px';
    ring.style.height=rect.height+'px';
    parent.style.position=parent.style.position||'relative';
    parent.appendChild(ring);
    setTimeout(()=>ring.remove(),600);
    // 火花粒子（6 顆向外飛散）
    for(let i=0;i<6;i++){
      const sp=document.createElement('div');
      sp.className='place-sparkle';
      sp.textContent='✨';
      const cx=rect.left-pRect.left+rect.width/2-8;
      const cy=rect.top-pRect.top+rect.height/2-8;
      sp.style.left=cx+'px';
      sp.style.top=cy+'px';
      const angle=(i/6)*Math.PI*2;
      sp.style.setProperty('--sx',Math.cos(angle)*42+'px');
      sp.style.setProperty('--sy',Math.sin(angle)*42+'px');
      parent.appendChild(sp);
      setTimeout(()=>sp.remove(),850);
    }
  }
  // 放置後觸發的設施專屬效果（如電子工廠 +2×N）
  const placedId = opts.bldgId || G.grid[r][c];
  onFacilityPlaced(r, c, placedId);
}

// 消滅 / 爆破：cell 紅閃 + 6 顆碎片飛散（cell-only，不全屏）+ 音效
// 必須在 G.grid 變更前呼叫；紅閃 + 碎片都用 fixed + body append，
// 獨立於 grid-area 的 innerHTML 重建（destroyFacility 後續會 render() 重建 cell DOM）
function destroyEffect(r,c,opts){
  // opts.silent=true 跳過音效（百貨公司 2×2 連消時，只在第一格播音避免疊 4 次）
  if(!opts||!opts.silent) SFX.destroy();
  const el=cellQ(r,c);
  if(!el) return;
  const rect=el.getBoundingClientRect();
  // 紅閃浮層（覆蓋 cell 位置，獨立於 cell DOM）
  const flash=document.createElement('div');
  flash.className='destroy-boom destroy-flash-layer';
  flash.style.cssText=`position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;height:${rect.height}px;pointer-events:none;z-index:9099;border-radius:8px;`;
  document.body.appendChild(flash);
  setTimeout(()=>flash.remove(),580);
  // 6 顆碎片（同樣 fixed + body）
  const shards=['💥','🔥','⚙️','💢','🧱','💨'];
  const cx=rect.left+rect.width/2-9;
  const cy=rect.top+rect.height/2-9;
  for(let i=0;i<6;i++){
    const sh=document.createElement('div');
    sh.className='destroy-shard';
    sh.textContent=shards[i];
    sh.style.left=cx+'px';
    sh.style.top=cy+'px';
    const angle=(i/6)*Math.PI*2 + Math.random()*0.5;
    const dist=36+Math.random()*18;
    sh.style.setProperty('--sx',Math.cos(angle)*dist+'px');
    sh.style.setProperty('--sy',Math.sin(angle)*dist+'px');
    sh.style.setProperty('--sr',(Math.random()*360-180)+'deg');
    document.body.appendChild(sh);
    setTimeout(()=>sh.remove(),700);
  }
}

// SSR 金粉灑落：從 srcEl（或畫面中心）向 12 個方向飛散金色 ✨
// opts.silent=true 跳過 SFX.rareDrop（避免與 showExpandFx 等大型音效衝突）
function showSsrSparkle(srcEl, opts){
  let cx=window.innerWidth/2, cy=window.innerHeight/2;
  if(srcEl && srcEl.getBoundingClientRect){
    const r=srcEl.getBoundingClientRect();
    cx=r.left+r.width/2; cy=r.top+r.height/2;
  }
  if(!opts||!opts.silent) SFX.rareDrop();
  for(let i=0;i<12;i++){
    const sp=document.createElement('div');
    sp.className='ssr-sparkle';
    sp.textContent='✨';
    sp.style.left=(cx-10)+'px';
    sp.style.top=(cy-10)+'px';
    const angle=(i/12)*Math.PI*2;
    const dist=80+Math.random()*40;
    sp.style.setProperty('--sx',Math.cos(angle)*dist+'px');
    sp.style.setProperty('--sy',Math.sin(angle)*dist+'px');
    document.body.appendChild(sp);
    setTimeout(()=>sp.remove(),1450);
  }
}

const tip=()=>document.getElementById('tooltip');
function showTooltip(e,html){
  const t=tip(); if(!t)return;
  t.innerHTML=html; t.classList.add('show');
  positionTooltip(e);
}
function positionTooltip(e){
  const t=tip(); if(!t)return;
  let x=e.clientX+14, y=e.clientY+14;
  if(x+210>window.innerWidth) x=e.clientX-220;
  if(y+120>window.innerHeight) y=e.clientY-130;
  t.style.left=x+'px'; t.style.top=y+'px';
}
function hideTooltip(){ const t=tip(); if(t) t.classList.remove('show'); }
document.addEventListener('mousemove',e=>{ const t=tip(); if(t&&t.classList.contains('show')) positionTooltip(e); });

function makeSelCard(emoji,name,desc,pos,neg,onclick,extraClass='',pid='',hoverFn=''){
  const negLine=neg&&neg!=='無'?`<div class="sel-card-neg">✕ ${neg}</div>`:'';
  const tipParts=[desc||''];
  if(pos) tipParts.push('✓ '+pos);
  if(neg&&neg!=='無') tipParts.push('✕ '+neg);
  const tipAttr=tipParts.join('\n').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  const pDef=pid&&PARTNERS[pid];
  const emojiHtml = pDef&&pDef.avatar
    ? `<img src="${pDef.avatar}" class="sel-card-avatar" alt="${name}">`
    : `<div class="sel-card-emoji">${emoji}</div>`;
  const hoverCall = hoverFn || `DM.onPartnerHover(this.querySelector('.sel-card-name').textContent); DM.onBldgHover(Object.keys(BLDG).find(k=>BLDG[k].name===this.querySelector('.sel-card-name').textContent)||'');`;
  // 稀有度：pid 優先從 PARTNER_RARITY 取；若非合夥人則以 name 反查 BLDG id
  let rarity='';
  if(pid&&PARTNER_RARITY[pid]) rarity=PARTNER_RARITY[pid];
  else{
    const matchBid=Object.keys(BLDG).find(k=>BLDG[k].name===name);
    if(matchBid&&BLDG_RARITY[matchBid]) rarity=BLDG_RARITY[matchBid];
  }
  const rarityClass=rarity?' rarity-'+rarity.toLowerCase():'';
  return `<div class="sel-card ${extraClass}${rarityClass}" onclick="${onclick}"
    data-tip="${tipAttr}"
    onmouseenter="tipFromAttr(event,this); ${hoverCall}"
    onmouseleave="hideTooltip()">
    ${emojiHtml}
    <div class="sel-card-name">${name}</div>
    <div class="sel-card-desc">${highlightDescTags(desc||'')}</div>
    ${pos?`<div class="sel-card-pos">✓ ${highlightDescTags(pos)}</div>`:''}
    ${negLine}
  </div>`;
}

let _cardChooserSkipFn=null;

  // 暗叫合約：facility 類卡（無 pid 且非 contract-card）以卡背顯示，玩家盲選

    let ec = card.extraClass||'';
    if(_hideFacOnChooser && !card.pid && !ec.includes('contract-card')){
      ec = ec ? (ec + ' card-back-fac') : 'card-back-fac';
    }
    return makeSelCard(card.emoji,card.name,card.desc,card.pos,card.neg,card.onclick,ec,card.pid||'');

  const skipBtn=document.getElementById('card-chooser-skip');

function tipFromAttr(e,el){
  const raw=(el.getAttribute('data-tip')||'')
    .replace(/&quot;/g,'"').replace(/&#39;/g,"'");
  const txt=raw.replace(/\|/g,'\n');
  if(txt&&e) showTooltip(e,txt);
}
function tipBldg(e,id){
  const b=BLDG[id]; if(!b)return;
  showTooltip(e, b.name + '\n' + (b.desc||'') + '\n基礎輸出: +' + (b.fn(1)-1));
  DM.onBldgHover(id);

// 格子懸停：短暫顯示設施名，1秒後顯示詳細加成
let _cellHoverTimer=null, _cellHoverEvt=null;
function cellHoverStart(e,r,c){
  clearTimeout(_cellHoverTimer);
  _cellHoverEvt=e;
  const bId=G.grid[r][c];
  if(bId&&BLDG[bId]){
    const ovs=getOverlays(r,c);
    if(ovs.length>0){
      let tip=BLDG[bId].name+'\n'+(BLDG[bId].desc||'');
      ovs.forEach(ovId=>{ const ob=BLDG[ovId]; if(ob) tip+='\n── 疊加 ──\n'+ob.name+'\n'+(ob.desc||''); });
      showTooltip(e, tip);
    } else {
      tipBldg(e,bId);
    }
  }
  // 1秒後顯示詳細加成面板
  _cellHoverTimer=setTimeout(()=>showCellDetailTip(e,r,c),1000);
}
function cellHoverEnd(){
  clearTimeout(_cellHoverTimer);
  hideTooltip();
}
function showCellDetailTip(e,r,c){
  const k=`${r},${c}`;
  const bId=G.grid[r][c];
  const lines=[];
  // 設施基礎資訊
  if(bId&&BLDG[bId]){
    const b=BLDG[bId];
    lines.push(`<b>${b.emoji} ${b.name}</b>`);
    lines.push(b.desc||'');
  } else if(bId==='ruin'){
    lines.push('<b>🏚️ 廢墟</b>');
  } else {
    lines.push('<b>空格</b>');
  }
  // 升級加成
  const upg=G.bldgUpgrades&&G.bldgUpgrades[k]||0;
  if(upg>0) lines.push(`⬆ 升級加成: +${upg}`);
  // 蕾雅百分比
  const leya=G.leyaPctMods&&G.leyaPctMods[k]||0;
  if(leya>0) lines.push(`👩‍🔧 蕾雅: +${leya}%`);
  // cellMods（人材/派遣總部/磁力板/公路之星等，每回合清除）
  const mod=G.cellMods&&G.cellMods[k]||0;
  if(mod!==0) lines.push(`${mod>0?'🧑‍💼':'🏚️'} 本回合加成: ${mod>0?'+':''}${mod}`);
  // boosterAura（強化增幅裝置光環，被動 +2 給周圍 4 格設施）
  const aura=G.boosterAura&&G.boosterAura[k]||0;
  if(aura>0) lines.push(`⚡ 強化增幅裝置光環: +${aura}`);
  // permCellMods（地皮炒家空格+4 等永久）
  const permMod=G.permCellMods&&G.permCellMods[k]||0;
  if(permMod!==0) lines.push(`🏚️ 永久加成: ${permMod>0?'+':''}${permMod}`);
  // cellPctMods（事件效果）
  const pct=G.cellPctMods&&G.cellPctMods[k]||0;
  if(pct!==0) lines.push(`🎲 事件效果: ${pct>0?'+':''}${pct}%`);
  // 期貨加成值
  if(bId==='futures_market'){
    const fv=G.futuresValue&&G.futuresValue[k]||0;
    lines.push(`🏛 本回合期貨: +${fv}（投入商品時會重抽）`);
  }
  // 爆破倒數
  if(bId==='bomb_device'&&G.bombTimers&&G.bombTimers[k]!==undefined){
    lines.push(`💣 爆炸倒數: ${G.bombTimers[k]} 回合`);
  }
  // 疊加設施
  const _ovs=getOverlays(r,c);
  _ovs.forEach(ovId=>{
    const ov=BLDG[ovId];
    if(ov){
      lines.push(`── 疊加設施 ──`);
      lines.push(`<b>${ov.emoji} ${ov.name}</b>`);
      lines.push(ov.desc||'');
    }
  });
  // 事件預告
  if(G.nextEvent&&G.nextEventData&&G.nextEventData.cells&&G.nextEventData.cells.includes(k)){
    lines.push(`⚠ 預告: ${G.nextEvent.title}`);
  }
  // 只在有加成資訊時顯示（超過基本設施描述）
  if(lines.length>2||(!bId&&lines.length>1)){
    showTooltip(_cellHoverEvt||e, lines.join('\n'));
  }
}

function fanCardClick(i) {
  const area = document.getElementById('hand-fan-area');

      setTimeout(() => {

        renderFanHand();
        if (card.onClickFn) card.onClickFn();
      }, 650);
    } else {
      fanEventCards = [];
      renderFanHand();
      if (card.onClickFn) card.onClickFn();
    }
  }
}

function renderFanHand() {
  const area = document.getElementById('hand-fan-area');
  if (!area) return;

  const cards = [];

  // 1. Building hand cards — expand by count (including compound)
  G.hand.filter(h => h.count > 0).forEach(h => {
    if(h.compound){
      const canSel = G.phase === 'place';
      const b1=BLDG[h.parts[0]], b2=BLDG[h.parts[1]];
      if(!b1||!b2) return;
      cards.push({
        type: 'compound', id: h.id,
        emoji: b1.emoji, emoji2: b2.emoji,
        name: `${b1.name}${h.dirLabel}${b2.name}`,
        desc: `${b1.desc}\n${b2.desc}`,
        dirLabel: h.dirLabel,
        selected: G.sel === h.id,
        disabled: !canSel,
        draggable: canSel,
      });
      return;
    }
    const b = BLDG[h.id];
    if (!b) return;
    const canSel = G.phase === 'place';
    for (let n = 0; n < h.count; n++) {
      cards.push({
        type: 'bldg', id: h.id,
        emoji: b.emoji, name: b.name, desc: b.desc,
        selected: G.sel === h.id,
        disabled: !canSel,
        draggable: canSel,
      });
    }
  });

  // 2. Event choice cards (if any)
  fanEventCards.forEach((ev, ei) => {
    cards.push({ type: 'event', _evIdx: ei, ...ev });
  });

  // 人材卡已移至左側面板 (renderTalentPanel)

  // 3. Element card always last (rightmost)
  if (G.card) {
    const emojis = {money:'💵', material:'🪨', goods:'📦', diamond:'💎'};
    const canDrag = G.phase === 'place';
    cards.push({
      type: 'element',
      emoji: emojis[G.card.type] || '💵',
      name: TLABEL[G.card.type] || '元素',
      val: G.card.value,
      draggable: canDrag,
      disabled: !canDrag,
    });
  }

  if (cards.length === 0) { area.innerHTML = ''; return; }

  const total = cards.length;
  const maxAngle = Math.min(25, total * 4);

  area.innerHTML = cards.map((card, i) => {
    const frac  = total > 1 ? (i / (total - 1)) - 0.5 : 0;
    const angle = frac * maxAngle * 2;
    const sinkY = Math.abs(frac) * 14;
    const zi    = card.selected ? 50 : i + 1;

    const typeClass = card.type === 'event' ? ' event-card' :
                      card.type === 'element' ? ' el-card-fan' :
                      card.type === 'talent' ? ' talent-card' :
                      card.type === 'compound' ? ' fc-compound' : '';
    const selClass = card.selected ? ' fc-selected' : '';
    // 暗叫合約：手牌的設施/複合卡顯示為卡背（複合卡保留方向形狀）
    const hideAsBack = hasActiveContract('hidden_call') && (card.type === 'bldg' || card.type === 'compound');
    const backClass = hideAsBack ? ' card-back-fac' : '';

    // Front face HTML
    let frontHTML = '';
    if (card.type === 'element') {
      const extraUses = G.elementExtraUses||0;
      const talentBadge = extraUses > 0
        ? `<div class="fc-talent-badge">🧑‍💼×${extraUses}</div>` : '';
      const buffDesc = extraUses > 0
        ? `<div class="fc-buff-desc fc-buff-active">額外投入 ${extraUses} 次</div>`
        : `<div class="fc-buff-desc fc-buff-idle">拖曳投入</div>`;
      frontHTML = `${talentBadge}<div class="fc-emoji">${card.emoji}</div>
        <div class="fc-val">${card.val}</div>
        <div class="fc-type">${card.name}</div>
        ${buffDesc}`;
    } else if (card.type === 'compound') {
      const isVert = card.dirLabel==='↑'||card.dirLabel==='↓';
      const order = card.dirLabel==='↑'||card.dirLabel==='←' ? [card.emoji2,card.emoji] : [card.emoji,card.emoji2];
      frontHTML = `<div class="fc-compound-layout${isVert?' fc-vert':''}">
        <span class="fc-compound-emoji">${order[0]}</span>
        <span class="fc-compound-link">🔗</span>
        <span class="fc-compound-emoji">${order[1]}</span>
      </div>
      <div class="fc-name fc-compound-name">${card.name}</div>`;
    } else if (card.type === 'bldg') {
      frontHTML = `<div class="fc-emoji">${card.emoji}</div>
        <div class="fc-name">${card.name}</div>
        <div class="fc-desc">${highlightDescTags(card.desc)}</div>`;
    } else {
      frontHTML = `<div class="fc-emoji">${card.emoji || '🎴'}</div>
        <div class="fc-name">${card.name}</div>
        <div class="fc-desc">${card.desc || ''}</div>
        ${card.pos ? `<div class="fc-pos-mark">✓${card.pos}</div>` : ''}`;
    }

    const tipData = [card.name, card.desc||'', card.pos?'✓'+card.pos:'', card.neg&&card.neg!=='無'?'✕'+card.neg:'']
      .filter(Boolean).join('|').replace(/"/g,'&quot;');

    // drag attrs for element card
    const dragAttrs = card.draggable && card.type === 'element'
      ? `draggable="true" ondragstart="onCardDragStart(event)" ondragend="onCardDragEnd(event)"
         ondragover="onTalentDragOver(event)" ondragleave="onTalentDragLeave(event)" ondrop="onTalentDrop(event)"`
      : card.draggable && (card.type === 'bldg' || card.type === 'compound')
      ? `draggable="true" ondragstart="onBldgDragStart(event,'${card.id}')" ondragend="onBldgDragEnd(event)"`
      : '';

    // 稀有度 class：設施卡才套用（複合設施取第一部分；事件/元素卡不套用）
    let rarityClass='';
    if(card.type==='bldg'&&card.id&&BLDG_RARITY[card.id]) rarityClass=' rarity-'+BLDG_RARITY[card.id].toLowerCase();
    else if(card.type==='compound'&&card.id){
      // 複合卡：用第一段設施稀有度
      const hSlot=G.hand.find(h=>h.id===card.id);
      if(hSlot&&hSlot.parts&&hSlot.parts[0]&&BLDG_RARITY[hSlot.parts[0]]) rarityClass=' rarity-'+BLDG_RARITY[hSlot.parts[0]].toLowerCase();
    }
    // 暗叫卡背：tooltip 與 data-bid 也隱藏（防玩家透過 hover 或 inspector 偷看）
    const tipDataFinal = hideAsBack ? '🃏 暗叫合約：尚未設置' : tipData;
    const dataBidAttr = (hideAsBack || !card.id) ? '' : `data-bid="${card.id}"`;
    return `<div class="fan-card${typeClass}${selClass}${rarityClass}${backClass}" id="fancard-${i}"
      ${dataBidAttr}
      style="transform:translateY(${sinkY}px) rotate(${angle}deg);z-index:${zi}"
      onclick="fanCardClick(${i})"
      onmouseenter="fanCardHover(${i},true,event)"
      onmouseleave="fanCardHover(${i},false,null)"
      data-tip="${tipDataFinal}"
      ${dragAttrs}
      ${card.type==='element'&&!card.draggable?'ondragover="onTalentDragOver(event)" ondrop="onTalentDrop(event)" ondragleave="onTalentDragLeave(event)"':''}
      >${frontHTML}</div>`;
  }).join('');

  area._cards = cards;

  // 激情惡魔：手牌 >1 時罰目標 +10%/張，警示結束按鈕脈動
  const _btnNext=document.getElementById('btn-next');
  if(_btnNext){
    const handCount=(G.hand||[]).reduce((s,h)=>s+(h.compound?1:(h.count||0)),0);
    const warn=hasPartner('wrath')&&!isDemonNegDisabled('wrath')&&handCount>1;
    _btnNext.classList.toggle('temp-debuff', warn);
  }
}

// 用於：商店購買、事件補給、招募贈卡（envy_factory）、合夥人 onTurnStart 贈卡 等
function flyCardToHand(bldgId, srcEl){

// 情境 A：直接獲得卡牌（onTurnStart 補牌 / swap 補牌）
// → 卡牌出現在畫面中央特寫 → 飛入手牌
function tanyaGainCardCinematic(bldgId, onComplete){
  const b=BLDG[bldgId];
  if(!b){ onComplete&&onComplete(); return; }
  closeUIForCinematic();
  const backdrop=_showCinematicBackdrop();
  const card=document.createElement('div');
  card.className='tanya-cinematic-card';
  const cardW=200, cardH=280;
  const cx=window.innerWidth/2-cardW/2;
  const cy=window.innerHeight/2-cardH/2;
  card.style.left=cx+'px'; card.style.top=cy+'px';
  card.style.width=cardW+'px'; card.style.height=cardH+'px';
  card.style.transform='scale(.3) rotate(-10deg)'; card.style.opacity='0';
  card.innerHTML=_makeCinematicCardContent(bldgId);
  document.body.appendChild(card);
  // Phase 1: 彈出放大（0-500ms）
  requestAnimationFrame(()=>{
    card.style.transform='scale(1) rotate(0deg)';
    card.style.opacity='1';
  });
  // Phase 2: 特寫停留（500~1500ms）
  // Phase 3: 飛向手牌（1500~2100ms）
  setTimeout(()=>{
    const handArea=document.getElementById('hand-fan-area');
    if(handArea){
      const dst=handArea.getBoundingClientRect();
      card.style.transition='left .6s cubic-bezier(.4,0,.2,1),top .6s cubic-bezier(.4,0,.2,1),width .6s,height .6s,transform .6s,opacity .4s';
      card.style.left=(dst.left+dst.width/2-38)+'px';
      card.style.top=(dst.top+20)+'px';
      card.style.width='76px'; card.style.height='96px';
      card.style.transform='scale(.5) rotate(8deg)';
      card.style.opacity='0';
    }
    backdrop.classList.remove('show');
  },1500);
  setTimeout(()=>{
    card.remove(); backdrop.remove();
    onComplete&&onComplete();
  },2200);
}
// 情境 B：交換卡牌
// → 交出卡從手牌飛到畫面中央 → 顫抖 → 發光變成新卡 → 特寫 → 飛入手牌
function tanyaSwapCardCinematic(giveId, receiveId, onComplete){
  const giveB=BLDG[giveId], recvB=BLDG[receiveId];
  if(!giveB||!recvB){ onComplete&&onComplete(); return; }
  closeUIForCinematic();
  // 找手牌中 give 卡位置（呼叫時應尚未 renderFanHand）
  const handArea=document.getElementById('hand-fan-area');
  const giveEl=handArea?.querySelector(`.fan-card[data-bid="${giveId}"]`);
  const srcRect=giveEl?giveEl.getBoundingClientRect():null;
  // 隱藏原手牌卡（視覺上移交給 cinematic 卡）
  if(giveEl) giveEl.style.opacity='0';
  // 包裝 onComplete：確保無論動畫成敗，原手牌卡的 opacity 會被還原（renderFanHand 也會替換 DOM，雙保險）
  const safeComplete=()=>{
    if(giveEl&&document.body.contains(giveEl)) giveEl.style.opacity='';
    onComplete&&onComplete();
  };
  const backdrop=_showCinematicBackdrop();
  const card=document.createElement('div');
  card.className='tanya-cinematic-card';
  const cardW=200, cardH=280;
  const startW=srcRect?srcRect.width:76;
  const startH=srcRect?srcRect.height:96;
  const startL=srcRect?srcRect.left:window.innerWidth/2-startW/2;
  const startT=srcRect?srcRect.top:window.innerHeight/2-startH/2;
  card.style.left=startL+'px'; card.style.top=startT+'px';
  card.style.width=startW+'px'; card.style.height=startH+'px';
  card.style.transform='none'; card.style.opacity='1';
  card.innerHTML=_makeCinematicCardContent(giveId);
  document.body.appendChild(card);
  const cx=window.innerWidth/2-cardW/2;
  const cy=window.innerHeight/2-cardH/2;
  // Phase 1: 飛到中央放大（0~500ms）
  requestAnimationFrame(()=>{
    card.style.left=cx+'px'; card.style.top=cy+'px';
    card.style.width=cardW+'px'; card.style.height=cardH+'px';
  });
  // Phase 2: 顫抖（500~1700ms，2 次各 600ms）
  setTimeout(()=>{
    // 將 left/top 轉為 center transform 以便 shake 動畫
    const centerL=window.innerWidth/2, centerT=window.innerHeight/2;
    card.style.left=centerL+'px'; card.style.top=centerT+'px';
    card.style.marginLeft='0'; card.style.marginTop='0';
    card.style.transform='translate(-50%,-50%)';
    card.style.transition='none';
    card.classList.add('tanya-shake');
  },550);
  // Phase 3: 發光 + 變身（1700~2500ms）
  setTimeout(()=>{
    card.classList.remove('tanya-shake');
    card.classList.add('tanya-glow-flash');
    // 在發光高峰時切換內容
    setTimeout(()=>{
      card.innerHTML=_makeCinematicCardContent(receiveId);
      card.style.borderColor='#72bd72';
    },320);
  },1700);
  // Phase 4: 特寫停留（2500~3000ms）+ 飛向手牌（3000~3600ms）
  setTimeout(()=>{
    card.classList.remove('tanya-glow-flash');
    const handArea2=document.getElementById('hand-fan-area');
    if(handArea2){
      const dst=handArea2.getBoundingClientRect();
      card.style.transition='left .6s cubic-bezier(.4,0,.2,1),top .6s cubic-bezier(.4,0,.2,1),width .6s,height .6s,transform .6s,opacity .4s';
      card.style.left=(dst.left+dst.width/2)+'px';
      card.style.top=(dst.top+24)+'px';
      card.style.width='76px'; card.style.height='96px';
      card.style.transform='translate(-50%,-50%) scale(.6)';
      card.style.opacity='0';
    }
    backdrop.classList.remove('show');
  },3000);
  setTimeout(()=>{
    card.remove(); backdrop.remove();
    safeComplete();
  },3700);
}

function yongqingSellCell(r,c){
  if(!G._yongqingSellMode) return false;
  const bId=G.grid[r][c];
  if(!isFacility(bId)){
    addLog('🏠 取消賣出');
    G._yongqingSellMode=false;
    if(G._yongqingSellEsc){ document.removeEventListener('keydown',G._yongqingSellEsc); G._yongqingSellEsc=null; }
    render();
    return true;
  }
  // 計算收益：+2 收益，每次賣出永久 +2
  const st=G.partnerState.yongqing_house||{bonus:2};
  const bonus=st.bonus;
  // 移除設施（不產生廢墟）
  const b=BLDG[bId];
  const k=`${r},${c}`;
  // 嫉妒惡魔負面：嫉妒工廠（base 或 overlay）被賣出 → 遊戲結束
  // 必須在 clearKeyedData 之前呼叫，否則 cellOverlay 已被清空
  _triggerEnvyGameOverIfPresent(r, c, '被賣出');
  // 賣出視覺效果（cell-only 紅閃 + 碎片 + destroy 音效）
  destroyEffect(r,c);
  // 百貨公司賣出：4 格都觸發特效
  if(bId==='dept_store'||bId==='dept_store_part'){
    const ank=bId==='dept_store'?k:(G.deptStoreParts&&G.deptStoreParts[k]||k);
    const [_ar,_ac]=ank.split(',').map(Number);
    for(let dr=0;dr<2;dr++) for(let dc=0;dc<2;dc++){
      const pr=_ar+dr, pc=_ac+dc;
      if((pr!==r||pc!==c)&&pr<GN()&&pc<GN()&&(G.grid[pr]&&(G.grid[pr][pc]==='dept_store'||G.grid[pr][pc]==='dept_store_part'))){
        destroyEffect(pr,pc,{silent:true}); // 第一格已播音，其餘只跑視覺
      }
    }
  }
  G.grid[r][c]=null; // 不用 destroyFacility（那會產生廢墟）
  // 清除附帶資料
  clearKeyedData(k);
  // 百貨公司：只移除被點的那組（用錨點定位）
  if(bId==='dept_store'||bId==='dept_store_part'){
    const anchor=bId==='dept_store'?k:(G.deptStoreParts&&G.deptStoreParts[k]||k);
    const [ar,ac]=anchor.split(',').map(Number);
    for(let dr=0;dr<2;dr++) for(let dc=0;dc<2;dc++){
      const pr=ar+dr, pc=ac+dc;
      if(pr<GN()&&pc<GN()&&(G.grid[pr][pc]==='dept_store'||G.grid[pr][pc]==='dept_store_part')){
        const dk=`${pr},${pc}`;
        G.grid[pr][pc]=null;
        clearKeyedData(dk);
      }
    }
    rebuildDeptStore();
  }
  G.profit+=bonus;
  st.bonus+=2; // 每次賣出永久 +2
  G.partnerState.yongqing_house=st;
  G._yongqingSellMode=false;
  if(G._yongqingSellEsc){ document.removeEventListener('keydown',G._yongqingSellEsc); G._yongqingSellEsc=null; }
  addLog(`🏠 擁慶記房屋：賣出 ${b.emoji}${b.name}，+${bonus}收益（下次賣出 +${st.bonus}）`,'g');
  profitFlyFromCell(r,c,bonus);
  render();
  return true;
}

function expandGrid(grid, newSize){
  const newGrid=Array(newSize).fill(null).map(()=>Array(newSize).fill(null));
  for(let r=0;r<Math.min(grid.length,newSize);r++)
    for(let cc=0;cc<Math.min(grid[r].length,newSize);cc++)
      newGrid[r][cc]=grid[r][cc];
  return newGrid;
}

// 內部：執行一次「人材→設施格」投入的所有副作用（不含 final render）
// silent=true 時抑制 per-投入 log（批量模式由外層產生總結 log）
function _runTalentInvestSideEffects(r, c, silent){
  const talentBefore = G.talentCards||0;
  G.talentCards--;
  G._hrTalentUsedCount=(G._hrTalentUsedCount||0)+1;
  // 工會主席：持有8+人材時，額外投入+2人材到設施（以投入前的人材數判定）
  if(hasPartner('union_chief')&&talentBefore>=8){
    G.cellMods[`${r},${c}`]=(G.cellMods[`${r},${c}`]||0)+2;
    if(!silent) addLog(`✊ 工會主席：8+人材，額外+2！`,'g');
    SFX.partnerProc();
  }
  // 人類惡魔：投入人材時+2永久
  if(hasPartner('human_demon')){
    const hk=`${r},${c}`;
    G.bldgUpgrades[hk]=(G.bldgUpgrades[hk]||0)+2;
    if(!silent) addLog(`😈 人類惡魔：投入人材，${BLDG[G.grid[r][c]]?.name||'設施'}永久+2`,'g');
  }
  // 北漂者：人材投入非中央設施-2
  if(hasPartner('northbound')&&!isCenterCell(r,c)&&!(G.buff&&G.buff._allCenter)){
    G.cellMods[`${r},${c}`]=(G.cellMods[`${r},${c}`]||0)-2;
    if(!silent) addLog(`🧳 北漂者：非中央設施，本回合-2`,'b');
  }
  // 人力銀行：每投入 2 人材到此設施，預約下回合 +4 人材（per-cell 累計）
  if(G.grid[r][c]==='talent_bank'){
    const k=`${r},${c}`;
    if(!G.talentBankCount) G.talentBankCount={};
    G.talentBankCount[k]=(G.talentBankCount[k]||0)+1;
    if(G.talentBankCount[k]>=2){
      G.talentBankCount[k]-=2;
      G._talentBankPending=(G._talentBankPending||0)+4;
      addLog(`🏧 人力銀行 (${r+1},${c+1})：投入第 2 人材，下回合 +4 人材（累計預約 ${G._talentBankPending}）`,'g');
    } else if(!silent) {
      addLog(`🏧 人力銀行 (${r+1},${c+1})：投入第 1 人材，再投入 1 個觸發效果`,'b');
    }
  }
  // 分身大師：人材投入時，周遭（8方向）隨機一格設施額外 +2
  if(hasPartner('clone_master')){
    const gn=GN();
    const adj=[];
    for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
      if(dr===0&&dc===0) continue;
      const ar=r+dr, ac=c+dc;
      if(ar<0||ar>=gn||ac<0||ac>=gn) continue;
      if(isFacility(G.grid[ar][ac])) adj.push([ar,ac]);
    }
    if(adj.length>0){
      const [tr,tc]=adj[Math.floor(Math.random()*adj.length)];
      G.cellMods[`${tr},${tc}`]=(G.cellMods[`${tr},${tc}`]||0)+2;
      const tb=BLDG[G.grid[tr][tc]];
      if(!silent) addLog(`👥 分身大師：${tb.emoji}${tb.name} (${tr+1},${tc+1}) 本回合額外+2`,'g');
      const tEl=cellQ(tr,tc);
      if(tEl){
        tEl.style.outline='3px solid #a8f';
        tEl.style.boxShadow='0 0 14px rgba(170,136,255,.55)';
        setTimeout(()=>{ tEl.style.outline=''; tEl.style.boxShadow=''; },800);
      }
    }
  }
  // Store as cellMod (temporary, cleared each turn)
  const key = `${r},${c}`;
  G.cellMods[key] = (G.cellMods[key]||0) + 1;
  // 工會合約：累計每格人材投入次數（永久）
  G.cellTalentInvested = G.cellTalentInvested || {};
  G.cellTalentInvested[key] = (G.cellTalentInvested[key]||0) + 1;
  if(!silent){
    const b = BLDG[G.grid[r][c]];
    addLog(`🧑‍💼 人材強化 ${b.emoji}${b.name}！本回合 +1`,'g');
    SFX.upgrade();
  }
}

function onTalentDropCell(e, r, c) {
  e.preventDefault();
  const cellEl = cellQ(r,c);
  if(cellEl){ cellEl.style.outline=''; cellEl.style.boxShadow=''; }
  if(!talentDragging) return;
  if(!G.grid[r][c]){ addLog('🧑‍💼 沒有設施可以強化','b'); return; }
  if((G.talentCards||0) <= 0) return;
  talentDragging = false;
  // 批量投入：min(設定量, 現有人材數)
  const bulkSize = (G._talentBulkSize==='all') ? (G.talentCards||0) : (Number(G._talentBulkSize)||1);
  const total = Math.max(1, Math.min(bulkSize, G.talentCards||0));
  const bIdNow = G.grid[r][c];
  for(let i=0; i<total; i++){
    if((G.talentCards||0) <= 0) break;
    if(!isFacility(G.grid[r][c])) break;
    _runTalentInvestSideEffects(r, c, total>1);
  }
  if(total > 1){
    const b = BLDG[bIdNow];
    addLog(`🧑‍💼 批量投入 ×${total}：${b?.emoji||''}${b?.name||'設施'}（本回合 +${total}）`,'g');
    SFX.upgrade();
  }
  if(cellEl){
    cellEl.style.outline = '3px solid var(--money)';
    cellEl.style.boxShadow = '0 0 14px rgba(176,96,0,.5)';
    setTimeout(()=>{ cellEl.style.outline=''; cellEl.style.boxShadow=''; },800);
  }
  renderFanHand();
  render();
}
