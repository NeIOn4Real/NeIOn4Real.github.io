<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>創業小鎮</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4efe5;--bg2:#ebe3d0;--bg3:#ddd4bc;--sur:#faf7f1;
  --br:rgba(80,55,20,.13);--br2:rgba(80,55,20,.25);
  --tx:#2a1a08;--mu:rgba(42,26,8,.5);--hi:rgba(42,26,8,.28);
  --money:#b06000;--mat:#7a4e1a;--goods:#2a6e3a;
  --acc:#b33a00;--blue:#1a4e7a;--green:#2a7a3a;--red:#c0392b;
  --cell:66px;--r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--tx);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:12px;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(80,55,20,.03) 40px,rgba(80,55,20,.03) 41px),
    repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(80,55,20,.03) 40px,rgba(80,55,20,.03) 41px);}

/* HEADER */
#hdr{width:100%;max-width:880px;display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
#logo{font-size:18px;font-weight:900;letter-spacing:-.5px;}
#logo span{color:var(--acc);}
.chip{display:flex;align-items:center;gap:4px;background:var(--sur);border:1px solid var(--br2);
  border-radius:99px;padding:4px 12px;font-size:12px;font-weight:700;
  box-shadow:0 1px 3px rgba(80,55,20,.07);}
.chip .v{color:var(--money);}
#profit-area{margin-left:auto;display:flex;align-items:center;gap:6px;}
#pbar{height:7px;width:100px;background:var(--bg3);border-radius:99px;overflow:hidden;border:1px solid var(--br);}
#pbar-fill{height:100%;background:var(--green);border-radius:99px;transition:width .4s;}

/* LAYOUT */
#main{width:100%;max-width:880px;display:grid;grid-template-columns:155px 1fr 220px;gap:10px;align-items:start;}
.panel{background:var(--sur);border:1px solid var(--br2);border-radius:var(--r);padding:10px 12px;box-shadow:0 2px 6px rgba(80,55,20,.05);}
.pt{font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.7px;
  padding-bottom:6px;border-bottom:1px solid var(--br);margin-bottom:8px;}

/* EVENT BANNER */
#ev-banner{width:100%;max-width:880px;background:var(--sur);border:1px solid var(--br2);
  border-radius:var(--r);padding:10px 14px;margin-bottom:10px;display:none;
  box-shadow:0 2px 8px rgba(80,55,20,.07);}
#ev-banner.show{display:block;}
#ev-title{font-size:12px;font-weight:700;margin-bottom:3px;}
#ev-desc{font-size:11px;color:var(--mu);margin-bottom:8px;}
.ev-opts{display:flex;gap:6px;flex-wrap:wrap;}
.eopt{padding:6px 14px;border-radius:99px;border:1px solid var(--br2);background:var(--bg2);
  font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'Noto Sans TC',sans-serif;}
.eopt:hover{background:var(--bg);border-color:var(--acc);color:var(--acc);}
.eopt.pri{background:var(--acc);color:#fff;border-color:var(--acc);}

/* GRID */
#grid-area{display:flex;flex-direction:column;align-items:center;gap:2px;}
.drow{display:flex;gap:2px;position:relative;}
.dcol-wrap{display:flex;align-items:center;gap:2px;}
.dside{display:flex;flex-direction:column;gap:2px;}
.dbtn{
  width:var(--cell);height:26px;background:transparent;border:2px dashed transparent;
  border-radius:6px;cursor:pointer;font-size:16px;font-weight:900;color:transparent;
  transition:all .2s;display:flex;align-items:center;justify-content:center;
  font-family:'Noto Sans TC',sans-serif;pointer-events:none;opacity:0;
}
.dbtn.side{width:26px;height:var(--cell);}
/* 拖曳中才顯示箭頭 */
body.card-dragging .dbtn:not(.wind-blocked){
  opacity:1;pointer-events:auto;color:var(--acc);
  border-color:rgba(179,58,0,.25);background:rgba(179,58,0,.05);
  z-index:70;position:relative;
}
/* 拖曳元素卡時淡化手牌，讓投入箭頭更明顯 */
body.card-dragging #hand-fan-area {
  opacity: 0.3;
}
/* 場風/颱風限制方向：拖曳中也保持隱藏 */
body.card-dragging .dbtn.wind-blocked{
  opacity:0 !important;pointer-events:none !important;
}
/* 允許方向：加強顯示 */
body.card-dragging .dbtn.wind-active{
  opacity:1;pointer-events:auto;
  color:var(--acc);border-color:var(--acc);
  background:rgba(179,58,0,.12);
  animation:windPulse 1s ease-in-out infinite;
}
@keyframes windPulse{
  0%,100%{ box-shadow:0 0 0 0 rgba(179,58,0,.3); }
  50%{ box-shadow:0 0 0 6px rgba(179,58,0,.0); }
}
body.card-dragging .dbtn:hover:not(.wind-blocked),
.dbtn.drag-over{
  background:rgba(42,122,58,.18)!important;border-color:var(--green)!important;
  color:var(--green)!important;transform:scale(1.15);opacity:1;pointer-events:auto;
}
.dbtn:disabled{opacity:0!important;pointer-events:none;}
#grid{display:grid;gap:2px;background:var(--bg3);border:2px solid var(--br2);
  border-radius:var(--r);padding:4px;box-shadow:0 4px 14px rgba(80,55,20,.1);}
.cell{width:var(--cell);height:var(--cell);background:var(--bg2);border:1px solid var(--br);
  border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;position:relative;user-select:none;}
.cell:hover:not(.filled){background:var(--bg);border-color:var(--br2);}
.cell.filled{background:var(--bg);border-color:var(--br2);cursor:default;}
.cell.filled:hover{background:var(--bg);}
.cell.pulse{animation:pulse .45s ease;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.cell.place-spawn{animation:placeSpawn .55s cubic-bezier(.34,1.56,.64,1);z-index:10;}
@keyframes placeSpawn{
  0%{transform:scale(.2) rotate(-8deg);opacity:0;}
  55%{transform:scale(1.22) rotate(4deg);opacity:1;}
  80%{transform:scale(.96) rotate(-2deg);}
  100%{transform:scale(1) rotate(0);opacity:1;}
}
.place-ring{
  position:absolute;pointer-events:none;z-index:9;
  border:3px solid var(--acc);border-radius:12px;
  animation:placeRing .55s ease-out forwards;
}
@keyframes placeRing{
  0%{transform:scale(.6);opacity:.9;}
  100%{transform:scale(1.8);opacity:0;}
}
.place-sparkle{
  position:absolute;pointer-events:none;z-index:11;
  font-size:16px;animation:placeSparkle .8s ease-out forwards;
}
@keyframes placeSparkle{
  0%{transform:translate(0,0) scale(.4);opacity:1;}
  100%{transform:translate(var(--sx,0),var(--sy,-40px)) scale(1.2);opacity:0;}
}
.cemoji{font-size:22px;line-height:1;}
.cname{font-size:8px;color:var(--mu);margin-top:1px;}

/* HAND */
.hi{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:7px;
  background:var(--bg2);border:1px solid var(--br);cursor:pointer;transition:all .15s;margin-bottom:4px;}
.hi:hover{background:var(--bg);border-color:var(--br2);}
.hi.sel{background:rgba(179,58,0,.1);border-color:var(--acc);}
.hi.off{opacity:.35;cursor:not-allowed;pointer-events:none;}
.hi-em{font-size:18px;flex-shrink:0;}
.hi-nm{font-size:11px;font-weight:700;}
.hi-ds{font-size:9px;color:var(--mu);line-height:1.3;}
.hi-ct{font-size:10px;font-weight:700;color:var(--acc);margin-left:auto;}

/* BTNS */
.abtn{width:100%;padding:9px 12px;border:1px solid var(--br2);border-radius:var(--r);
  background:var(--sur);color:var(--tx);font-size:12px;font-weight:700;
  font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .15s;
  text-align:left;margin-bottom:5px;}
.abtn:hover:not(:disabled){background:var(--bg2);}
.abtn.pri{background:var(--acc);color:#fff;border-color:var(--acc);}
.abtn.pri:hover{opacity:.88;}
.abtn:disabled{opacity:.28;cursor:not-allowed;}

/* LOG */
#side-log{
  background:var(--sur);border:1px solid var(--br);
  border-radius:var(--r);padding:8px 10px;
  height:100%;overflow-y:auto;font-size:10px;
  min-height:200px;
}
.log-turn-block{ margin-bottom:10px; }
.log-turn-hdr{ font-size:10px;font-weight:700;color:var(--acc);margin-bottom:3px;padding-bottom:3px;border-bottom:1px solid var(--br); }
.log-entry{ line-height:1.6;color:var(--mu);padding-left:4px; }
.log-entry.g{ color:var(--green); }
.log-entry.b{ color:var(--red); }
.log-entry.w{ color:var(--money); }
.log-entry.h{ color:var(--tx);font-weight:700; }
.log-calc{ font-family:'DM Mono',monospace;font-size:9px;color:var(--blue);padding-left:8px; }

/* MODAL */
#modal{display:none;position:fixed;inset:0;z-index:100;background:rgba(42,26,8,.55);
  align-items:center;justify-content:center;}
#modal.show{display:flex;}
#mbox{background:var(--sur);border:1px solid var(--br2);border-radius:14px;padding:28px 24px;
  text-align:center;max-width:300px;width:90%;box-shadow:0 8px 28px rgba(42,26,8,.18);
  animation:min .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes min{from{transform:scale(.7);opacity:0}}
#memo{font-size:38px;margin-bottom:8px;}
#mtitle{font-size:20px;font-weight:900;margin-bottom:6px;}
#mmsg{font-size:11px;color:var(--mu);margin-bottom:16px;line-height:1.7;white-space:pre-line;}
#mbtn{padding:9px 24px;border-radius:99px;border:none;font-size:12px;font-weight:700;
  font-family:'Noto Sans TC',sans-serif;cursor:pointer;background:var(--acc);color:#fff;}

/* DELTA */
.delta{position:fixed;pointer-events:none;font-size:14px;font-weight:900;z-index:200;
  animation:fup .9s ease forwards;}
@keyframes fup{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-44px)}}
/* ── 元素卡牌 ── */


.cell.move-src{outline:3px solid var(--acc);box-shadow:0 0 10px rgba(179,58,0,.3);z-index:2;}
.cell.ruin-cell{background:repeating-linear-gradient(45deg,var(--bg2),var(--bg2) 4px,rgba(120,100,80,.12) 4px,rgba(120,100,80,.12) 8px);border-color:rgba(120,100,80,.4);}
.cell.drag-target{background:rgba(179,58,0,.1);border-color:var(--acc);border-style:dashed;}
.cell.drag-over-cell{background:rgba(42,122,58,.12);border:2px solid var(--green);}

/* ── 元素移動動畫 ── */
#el-mover{
  position:fixed;width:56px;height:66px;
  background:linear-gradient(145deg,var(--sur),var(--bg2));
  border:2px solid var(--acc);border-radius:8px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;pointer-events:none;z-index:500;
  box-shadow:0 4px 14px rgba(179,58,0,.3);
  transition:left .32s cubic-bezier(.4,0,.2,1),top .32s cubic-bezier(.4,0,.2,1);
}
#el-mover .mv-emoji{font-size:16px;line-height:1;}
#el-mover .mv-val{font-size:14px;font-weight:900;font-family:'DM Mono',monospace;}
#el-mover .mv-type{font-size:7px;color:var(--mu);}

/* ── 收益飛行動畫 ── */
.profit-fly{
  position:fixed;pointer-events:none;z-index:600;
  font-size:20px;font-weight:900;color:var(--green);
  text-shadow:0 2px 8px rgba(42,122,58,.4);
  animation:profitFly 1.2s cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes profitFly{
  0%{opacity:0;transform:scale(.5) translateY(0);}
  20%{opacity:1;transform:scale(1.2) translateY(-20px);}
  80%{opacity:1;}
  100%{opacity:0;transform:scale(.6) translateY(-120px) translateX(var(--fly-x,0px));}
}
/* 匯率波動板：單格浮動 ±2（不飛向收益區） */
.cell-float{
  position:fixed;pointer-events:none;z-index:600;
  font-size:18px;font-weight:900;
  text-shadow:0 2px 6px rgba(0,0,0,.3);
  animation:cellFloat .8s cubic-bezier(.3,.7,.4,1) forwards;
}
@keyframes cellFloat{
  0%{opacity:0;transform:scale(.6) translate(-50%,0);}
  25%{opacity:1;transform:scale(1.15) translate(-50%,-14px);}
  75%{opacity:1;transform:scale(1) translate(-50%,-30px);}
  100%{opacity:0;transform:scale(.8) translate(-50%,-52px);}
}
/* 莫菲定律全屏特效 */
@keyframes murphyShake{
  0%,100%{transform:translate(0,0)}
  10%{transform:translate(-8px,4px)}
  20%{transform:translate(6px,-6px)}
  30%{transform:translate(-10px,2px)}
  40%{transform:translate(8px,-4px)}
  50%{transform:translate(-4px,8px)}
  60%{transform:translate(6px,-2px)}
  70%{transform:translate(-6px,6px)}
  80%{transform:translate(4px,-8px)}
  90%{transform:translate(-2px,4px)}
}
@keyframes murphyFadeIn{
  0%{opacity:0;}
  100%{opacity:1;}
}
#murphy-overlay{
  position:fixed;inset:0;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  background:rgba(0,0,0,.7);
  pointer-events:auto;cursor:pointer;
}
#murphy-overlay .murphy-text{
  color:#fff;font-size:22px;font-weight:900;text-align:center;
  text-shadow:0 2px 16px rgba(0,0,0,.9);
  padding-top:24px;
  z-index:2;
  animation:murphyFadeIn .6s ease-out;
}
#murphy-overlay .murphy-chars{
  display:flex;align-items:flex-start;justify-content:center;
  width:80vw;max-width:700px;height:calc(100vh - 80px);overflow:hidden;
  margin-top:-10px;
}
#murphy-overlay .murphy-chars img{
  width:100%;height:100%;
  object-fit:cover;object-position:top center;
  image-rendering:auto;
  filter:drop-shadow(0 4px 24px rgba(0,0,0,.7));
}
.murphy-shaking{ animation:murphyShake .5s ease-in-out 3; }
/* 大熱波全屏特效 */
#heatwave-overlay{
  position:fixed;inset:0;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(30,0,0,.8);
  pointer-events:auto;cursor:pointer;
}
#heatwave-overlay .hw-explosion{
  font-size:120px;position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  animation:hwBoom .8s ease-out forwards;z-index:2;
}
@keyframes hwBoom{0%{transform:translate(-50%,-50%) scale(0);opacity:1}40%{transform:translate(-50%,-50%) scale(3);opacity:1}100%{transform:translate(-50%,-50%) scale(4);opacity:0}}
/* 疊加設施輪播 */
.ov-rotate{font-size:24px;line-height:1;position:relative;width:32px;height:32px;}
.ov-rotate .ov-a,.ov-rotate .ov-b{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);animation:ovSwap 3s ease-in-out infinite;}
.ov-rotate .ov-b{animation-delay:1.5s;animation-fill-mode:backwards;}
@keyframes ovSwap{0%,40%{opacity:1}50%,90%{opacity:0}100%{opacity:1}}
#heatwave-overlay .hw-text{
  color:#ff4444;font-size:22px;font-weight:900;text-align:center;
  text-shadow:0 2px 16px rgba(255,0,0,.7);
  z-index:3;animation:murphyFadeIn .6s ease-out .5s both;
}
#heatwave-overlay .hw-chars{
  display:flex;align-items:flex-start;justify-content:center;
  width:80vw;max-width:700px;height:calc(100vh - 120px);overflow:hidden;
  margin-top:-20px;z-index:1;animation:murphyFadeIn .8s ease-out .3s both;
}
#heatwave-overlay .hw-chars img{
  width:100%;height:100%;
  object-fit:cover;object-position:top center;
  filter:drop-shadow(0 4px 24px rgba(255,0,0,.5));
}
/* 人材發光提示 */
/* 擁慶記房屋賣出模式：設施發抖 */
@keyframes sellShake{
  0%,100%{transform:translate(0,0) rotate(0deg);}
  20%{transform:translate(-2px,1px) rotate(-1deg);}
  40%{transform:translate(2px,-1px) rotate(1deg);}
  60%{transform:translate(-1px,2px) rotate(-0.5deg);}
  80%{transform:translate(1px,-1px) rotate(0.5deg);}
}
.sell-shake{animation:sellShake .4s ease-in-out infinite;cursor:pointer !important;}
.sell-shake:hover{outline:2px solid var(--red);box-shadow:0 0 10px rgba(200,0,0,.3);}
@keyframes talentGlow{
  0%,100%{box-shadow:0 0 4px rgba(176,96,0,.2);}
  50%{box-shadow:0 0 14px rgba(176,96,0,.6),0 0 24px rgba(176,96,0,.3);}
}
.talent-glow{ animation:talentGlow 1.5s ease-in-out 3; }

/* ── 格子閃光 ── */
.cell.active-path{
  background:rgba(179,58,0,.08);
  border-color:rgba(179,58,0,.4);
  box-shadow:0 0 0 2px rgba(179,58,0,.2);
}
.cell.transform-flash{animation:tflash .5s ease;}
@keyframes tflash{0%{background:rgba(42,122,58,.2)}100%{background:inherit}}

/* ── 數值變化標籤 ── */
.change-badge{
  position:absolute;top:-18px;left:50%;transform:translateX(-50%);
  background:var(--green);color:#fff;border-radius:99px;
  padding:2px 8px;font-size:10px;font-weight:700;white-space:nowrap;
  animation:badgePop .5s ease forwards;pointer-events:none;z-index:10;
}
@keyframes badgePop{0%{opacity:0;transform:translateX(-50%) scale(.5)}
  60%{opacity:1;transform:translateX(-50%) scale(1.1)}
  100%{opacity:1;transform:translateX(-50%) scale(1)}}

/* 行動選項 */
.act-opt{width:100%;padding:7px 10px;margin-bottom:5px;border-radius:8px;
  border:1px solid var(--br2);background:var(--bg2);cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;text-align:left;transition:all .15s;}
.act-opt:hover:not(:disabled){background:var(--bg);border-color:var(--acc);}
.act-opt:disabled{opacity:.3;cursor:not-allowed;}
.act-opt-label{font-size:11px;font-weight:700;display:flex;justify-content:space-between;align-items:center;}
.act-opt-desc{font-size:9px;color:var(--mu);margin-top:2px;}
.act-cost{color:var(--acc);font-size:10px;font-weight:700;white-space:nowrap;}
.act-cost.free{color:var(--green);}
/* 通用按鈕發光提示 */
@keyframes btnGlow{0%,100%{box-shadow:0 0 4px rgba(176,96,0,.3)}50%{box-shadow:0 0 14px rgba(176,96,0,.6),0 0 24px rgba(176,96,0,.25)}}
.btn-glow{animation:btnGlow 1.2s ease-in-out infinite;border-color:var(--acc)!important;}
/* 常駐按鈕 */
.perm-btn{
  display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:8px;
  border:1.5px solid var(--br2);background:var(--sur);cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;font-size:10px;font-weight:700;color:var(--tx);
  transition:box-shadow .2s,border-color .2s;
}
.perm-btn:hover:not(.perm-disabled){border-color:var(--acc);box-shadow:0 0 8px rgba(176,96,0,.2);}
.perm-btn.perm-disabled{opacity:.4;cursor:not-allowed;}
.cell.upgrade-glow{
  border-color:var(--money)!important;
  box-shadow:0 0 0 2px rgba(176,96,0,.3), 0 0 10px rgba(176,96,0,.2);
  animation:upgradeGlow 1.2s ease-in-out infinite;
  cursor:pointer!important;
}
.omni-drop-card.omni-hover{
  transform:scale(1.08)!important;
  border-color:var(--green)!important;
  box-shadow:0 0 0 3px var(--green), 0 0 18px rgba(72,133,72,.55)!important;
  z-index:100!important;
}
@keyframes upgradeGlow{0%,100%{box-shadow:0 0 0 2px rgba(176,96,0,.3)}50%{box-shadow:0 0 0 3px rgba(176,96,0,.6),0 0 14px rgba(176,96,0,.3)}}
@keyframes omniPanelIn{from{opacity:0;transform:translate(-50%,calc(-50% - 8px))}to{opacity:1;transform:translate(-50%,-50%)}}
/* 事件預告格子高亮 */
.cell.event-preview{
  border-color:var(--blue)!important;
  box-shadow:0 0 0 2px rgba(26,78,122,.25), 0 0 8px rgba(26,78,122,.15);
  animation:eventPreviewPulse 2s ease-in-out infinite;
}
@keyframes eventPreviewPulse{0%,100%{box-shadow:0 0 0 2px rgba(26,78,122,.2)}50%{box-shadow:0 0 0 3px rgba(26,78,122,.45),0 0 10px rgba(26,78,122,.2)}}
.upgrade-hint{width:100%;max-width:880px;background:rgba(176,96,0,.1);border:1px solid rgba(176,96,0,.3);
  border-radius:8px;padding:7px 14px;margin-bottom:8px;font-size:11px;font-weight:700;color:var(--money);display:none;}
.upgrade-hint.show{display:block;}
.acard{width:160px;background:var(--sur);border:1.5px solid var(--br2);border-radius:14px;padding:16px 14px;
  display:flex;flex-direction:column;gap:7px;transition:all .15s;
  box-shadow:0 8px 28px rgba(42,26,8,.18),0 2px 6px rgba(42,26,8,.08);opacity:1;}
.acard:hover:not(.acard-disabled){border-color:var(--acc);transform:translateY(-4px);box-shadow:0 14px 36px rgba(179,58,0,.22);}
.acard-disabled{opacity:1;pointer-events:none;border-color:var(--red);background:var(--bg2);}
.acard-disabled .acard-label{color:var(--mu);}
.acard-disabled .acard-desc{color:var(--hi);}
.acard-disabled .acard-cost{color:var(--red);}
.acard-label{font-size:12px;font-weight:700;color:var(--tx);}
.acard-desc{font-size:9px;color:var(--mu);line-height:1.5;flex:1;}
.acard-cost{font-size:11px;font-weight:700;color:var(--acc);text-align:right;}
.acard-cost.free{color:var(--green);}
/* 格子增幅標記 */
.cell-mod-pos{position:absolute;bottom:2px;right:3px;font-size:9px;font-weight:900;color:var(--green);}
.cell-mod-neg{position:absolute;bottom:2px;right:3px;font-size:9px;font-weight:900;color:var(--red);}
/* 合夥人卡片 */
.partner-card{
  flex-shrink:0;width:72px;
  background:var(--sur);border:1px solid var(--br2);border-radius:10px;
  padding:8px 6px;text-align:center;
  box-shadow:0 2px 8px rgba(42,26,8,.1);
  transition:transform .15s;cursor:default;
}
.partner-card:hover{transform:translateY(-2px);}
.partner-card .pc-emoji{font-size:20px;line-height:1;margin-bottom:3px;}
.partner-card .pc-name{font-size:8px;font-weight:700;color:var(--tx);line-height:1.2;}
.partner-card .pc-pos{font-size:7px;color:var(--green);margin-top:2px;line-height:1.3;}
.partner-card .pc-neg{font-size:7px;color:var(--red);margin-top:1px;line-height:1.3;}

/* 浮動說明視窗 */
#tooltip{
  position:fixed;z-index:9999;pointer-events:none;
  background:var(--tx);color:var(--bg);
  border-radius:8px;padding:8px 12px;
  font-size:10px;line-height:1.6;max-width:200px;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
  opacity:0;transition:opacity .15s;
  white-space:pre-wrap;
}
#tooltip.show{opacity:1;}
/* 複合設施懸浮預覽 */
#compound-preview-float{
  position:fixed;z-index:9998;pointer-events:none;
  display:none;gap:8px;
}
#compound-preview-float.show{display:flex;}
.cpf-card{
  width:120px;background:var(--sur);border:1.5px solid var(--br2);
  border-radius:12px;padding:10px 8px;
  box-shadow:0 4px 16px rgba(42,26,8,.18);
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.cpf-card .cpf-emoji{font-size:28px;line-height:1;}
.cpf-card .cpf-name{font-size:11px;font-weight:700;color:var(--tx);text-align:center;}
.cpf-card .cpf-desc{font-size:9px;color:var(--mu);text-align:center;line-height:1.4;}
.cpf-dir{display:flex;align-items:center;font-size:16px;color:var(--mu);font-weight:700;}

/* 選擇卡片（設施/合夥人） */
.sel-card{
  width:180px;flex-shrink:0;
  min-height:200px;
  background:var(--sur);border:1.5px solid var(--br2);border-radius:12px;
  padding:14px 12px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  box-shadow:0 4px 14px rgba(42,26,8,.12);
  transition:all .15s;
  text-align:center;
}
.sel-card:hover{border-color:var(--acc);transform:translateY(-3px);box-shadow:0 8px 20px rgba(179,58,0,.18);}
.sel-card-emoji{font-size:24px;line-height:1;margin-bottom:2px;}
.sel-card-name{font-size:12px;font-weight:700;color:var(--tx);text-align:center;width:100%;}
.sel-card-desc{font-size:9px;color:var(--mu);line-height:1.4;flex:1;text-align:center;width:100%;}
.sel-card-pos{font-size:8px;color:var(--green);margin-top:2px;}
.sel-card-neg{font-size:8px;color:var(--red);margin-top:1px;}
/* partner card hover tooltip */
.partner-card{position:relative;}

/* ══ 扇形手牌系統 ══ */
#hand-fan-area {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 60;
  background: linear-gradient(to top, rgba(244,239,229,0.98) 75%, transparent);
  overflow: visible;
}

/* 卡牌基底 */
.fan-card {
  position: relative;
  flex-shrink: 0;
  width: 114px;
  height: 158px;
  border-radius: 14px;
  cursor: pointer;
  pointer-events: auto;
  transform-origin: center bottom;
  transition: transform 0.22s cubic-bezier(.4,0,.2,1), box-shadow 0.2s;
  user-select: none;
  will-change: transform;
  margin: 0 -12px;
  background: var(--sur);
  border: 1.5px solid var(--br2);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 6px 5px;
  box-shadow: 0 4px 12px rgba(42,26,8,.13);
}
.fan-card.fc-selected { border-color: var(--acc) !important; }
/* ── 稀有度外框（卡片 / 合夥人牌） ── */
.fan-card.rarity-n,.joker-card.rarity-n,.acard.rarity-n,.omni-drop-card.rarity-n,.sel-card.rarity-n{border-color:#b0a89a!important;box-shadow:0 2px 8px rgba(176,168,154,.3)!important;}
.fan-card.rarity-r,.joker-card.rarity-r,.acard.rarity-r,.omni-drop-card.rarity-r,.sel-card.rarity-r{border-color:#4a90c2!important;box-shadow:0 2px 10px rgba(74,144,194,.45)!important;}
.fan-card.rarity-sr,.joker-card.rarity-sr,.acard.rarity-sr,.omni-drop-card.rarity-sr,.sel-card.rarity-sr{border-color:#c06bd6!important;box-shadow:0 2px 12px rgba(192,107,214,.55)!important;}
.fan-card.rarity-ssr,.joker-card.rarity-ssr,.acard.rarity-ssr,.omni-drop-card.rarity-ssr,.sel-card.rarity-ssr{border-color:#e8a820!important;box-shadow:0 2px 14px rgba(232,168,32,.6),0 0 18px rgba(232,168,32,.35)!important;animation:rarityGlowSSR 2.4s ease-in-out infinite!important;}
@keyframes rarityGlowSSR{0%,100%{box-shadow:0 2px 14px rgba(232,168,32,.5),0 0 14px rgba(232,168,32,.3)}50%{box-shadow:0 2px 16px rgba(232,168,32,.75),0 0 24px rgba(232,168,32,.5)}}
/* ── 譚雅電影式卡牌動畫 ── */
.tanya-cinematic-card{
  position:fixed;z-index:9200;pointer-events:none;
  background:linear-gradient(160deg,#fff9f2,#fcefb0);
  border:3px solid #e8a820;border-radius:16px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:18px 14px;box-sizing:border-box;
  box-shadow:0 12px 40px rgba(0,0,0,.45), 0 0 60px rgba(232,168,32,.5);
  font-family:'Noto Sans TC',sans-serif;color:var(--tx);
  transition:left .5s cubic-bezier(.3,1.6,.5,1),top .5s cubic-bezier(.3,1.6,.5,1),width .5s,height .5s,transform .5s,opacity .4s;
}
.tanya-cinematic-backdrop{
  position:fixed;z-index:9150;inset:0;background:rgba(0,0,0,.5);
  opacity:0;transition:opacity .3s;pointer-events:none;
}
.tanya-cinematic-backdrop.show{opacity:1;}
@keyframes tanyaShake{
  0%,100%{transform:translate(-50%,-50%) rotate(0)}
  15%{transform:translate(-52%,-50%) rotate(-4deg)}
  30%{transform:translate(-48%,-50%) rotate(4deg)}
  45%{transform:translate(-51%,-50%) rotate(-3deg)}
  60%{transform:translate(-49%,-50%) rotate(3deg)}
  75%{transform:translate(-50.5%,-50%) rotate(-2deg)}
  90%{transform:translate(-49.5%,-50%) rotate(2deg)}
}
.tanya-cinematic-card.tanya-shake{animation:tanyaShake .6s ease-in-out 2;}
@keyframes tanyaGlowFlash{
  0%{filter:brightness(1) saturate(1);box-shadow:0 12px 40px rgba(0,0,0,.45),0 0 60px rgba(232,168,32,.5)}
  40%{filter:brightness(2.4) saturate(1.6);box-shadow:0 12px 80px rgba(255,230,130,1),0 0 160px rgba(255,215,0,.9)}
  100%{filter:brightness(1) saturate(1);box-shadow:0 12px 40px rgba(0,0,0,.45),0 0 60px rgba(72,133,72,.6)}
}
.tanya-cinematic-card.tanya-glow-flash{animation:tanyaGlowFlash .8s ease-in-out forwards;}
/* ── 詞條醒目化 ── */
.tag-chip{display:inline-block;padding:0 4px;margin:0 1px;border-radius:4px;font-weight:700;font-size:.92em;line-height:1.3;vertical-align:baseline;}

.tag-chip.tag-trade{background:#f2e0d8;color:#8a3a1a;}
.tag-chip.tag-demolish{background:#f5d8d0;color:#9a2a1a;}
.tag-chip.tag-demon{background:#3a1a1a;color:#ffb0a0;}

.fan-card:hover {
  transform: translateY(-80px) rotate(0deg) scale(1.1) !important;
  z-index: 200 !important;
}
.fan-card.event-card,
.fan-card.el-card-fan,
.fan-card.talent-card {

}

/* 複合設施卡牌內部佈局 */
.fc-compound-layout { display: flex; gap: 1px; align-items: center; justify-content: center; }
.fc-compound-layout.fc-vert { flex-direction: column; }

.fc-compound-layout .fc-compound-link { font-size: 10px; color: var(--mu); }

/* 燃燒消失動畫 */
@keyframes burnAway {
  0%   { opacity:1; transform: translateY(-80px) scale(1.1); filter: brightness(1); }
  40%  { opacity:.9; transform: translateY(-130px) scale(1.12); filter: brightness(1.6) sepia(1) saturate(4); }
  100% { opacity:0; transform: translateY(-200px) scale(.7); filter: brightness(2) sepia(1) saturate(6) blur(4px); }
}

  animation: burnAway 0.7s ease-out forwards !important;
  pointer-events: none;
}

/* main area bottom padding so content isn't hidden by hand */
body { padding-bottom: 150px; }

/* ── 合夥人卡片（小丑牌風格） ── */
#partner-section {
  width:100%;max-width:880px;
  margin-bottom:8px;
  padding:0 4px;
}
#partner-section-title {
  font-size:10px;font-weight:700;color:var(--mu);
  letter-spacing:.6px;text-transform:uppercase;
  margin-bottom:5px;padding-left:2px;
}
#partner-row {
  display:flex;gap:0;
  overflow-x:auto;overflow-y:visible;
  padding:8px 4px 12px;
  scrollbar-width:thin;
  scrollbar-color:var(--br2) transparent;
  scroll-behavior:smooth;
}
#partner-row::-webkit-scrollbar{height:6px;}
#partner-row::-webkit-scrollbar-track{background:transparent;}
#partner-row::-webkit-scrollbar-thumb{background:var(--br2);border-radius:3px;}
#partner-row::-webkit-scrollbar-thumb:hover{background:var(--acc);}
/* 懸停展開合夥人浮動面板 */
#partner-float{
  position:fixed;z-index:500;
  background:var(--sur);border:2px solid var(--br2);border-radius:12px;
  box-shadow:0 8px 30px rgba(42,26,8,.25);
  padding:10px 14px 14px;
  display:none;
}
#partner-float .pf-title{font-size:10px;font-weight:700;color:var(--mu);margin-bottom:6px;}
#partner-float .pf-row{display:flex;gap:6px;flex-wrap:wrap;}
.joker-card {
  flex-shrink:0;
  width:64px;height:88px;
  background:linear-gradient(160deg,#fff9f2,var(--sur));
  border:1.5px solid var(--br2);
  border-radius:10px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:4px;
  margin-right:-12px;
  cursor:default;
  position:relative;
  box-shadow:2px 2px 8px rgba(42,26,8,.13),0 1px 3px rgba(42,26,8,.08);
  transition:transform .15s, z-index 0s, box-shadow .15s;
  z-index:1;
}
.joker-card:hover {
  transform:translateY(-14px) scale(1.06);
  z-index:50;
  box-shadow:4px 6px 18px rgba(42,26,8,.22);
}
.joker-card .jc-emoji { font-size:28px;line-height:1; }
.joker-card .jc-avatar { width:40px;height:40px;border-radius:50%;object-fit:cover;object-position:top center; }
.joker-card .jc-name  { font-size:7px;font-weight:700;color:var(--tx);text-align:center;line-height:1.2;padding:0 3px; }
.joker-card.demon { border-color:#c0392b; background:linear-gradient(160deg,#fff5f5,#fff0ee); }
.joker-card.demon .jc-name { color:#c0392b; }

/* ── 角色立繪（右下角） ── */
#char-tray {
  position: fixed;
  bottom: -22%;
  right: -5px;
  z-index: 98;
  pointer-events: none;
  width: clamp(276px, 27.6vw, 437px);
}

/* ── 對話泡泡 ── */
#char-bubble {
  position: fixed;
  right: 6px;
  bottom: calc(clamp(276px, 27.6vw, 437px) * 1.2);
  max-width: 240px;
  background: #fff;
  border: 2px solid var(--br2);
  border-radius: 16px 16px 16px 4px;
  padding: 10px 14px;
  font-size: 12px;
  line-height: 1.6;
  color: var(--tx);
  box-shadow: 0 4px 16px rgba(42,26,8,.15);
  z-index: 99;
  pointer-events: none;
  opacity: 0;
  transform: translateY(6px) scale(0.96);
  transition: opacity .22s ease, transform .22s ease;
  word-break: break-word;
}
#char-bubble.show {
  opacity: 1;
  transform: translateY(0) scale(1);
}
/* 泡泡尾巴朝右下（指向人物） */
#char-bubble::after {
  content: '';
  position: absolute;
  bottom: -10px;
  right: 12px;
  border: 6px solid transparent;
  border-top-color: var(--br2);
}
#char-bubble::before {
  content: '';
  position: absolute;
  bottom: -7px;
  right: 13px;
  border: 5px solid transparent;
  border-top-color: #fff;
  z-index: 1;
}
/* 人物發光效果 */
#char-tray img {
  width: 100%;
  display: block;
  pointer-events: auto;
  cursor: pointer;
  filter: drop-shadow(-3px 0 12px rgba(0,0,0,.18));
  transition: transform .2s ease, filter .3s ease;
}

#char-tray:hover img {
  transform: translateY(-6px) scale(1.01);
}


/* 合夥人選擇卡頭像 */
.sel-card-avatar {
  width:80px;height:80px;border-radius:50%;
  object-fit:cover;object-position:top center;
  margin-bottom:6px;flex-shrink:0;
}

@keyframes pulse-acc {
  0%,100%{ box-shadow:0 0 0 0 rgba(179,58,0,.4); }
  50%{ box-shadow:0 0 0 8px rgba(179,58,0,0); }
}

<script>
// ══════════════════════════════════════
// 音效系統（Web Audio API）
// ══════════════════════════════════════
const SFX=(()=>{
  let ctx=null;
  function getCtx(){ if(!ctx) ctx=new(window.AudioContext||window.webkitAudioContext)(); return ctx; }
  // 五聲音階（C 大調）：C, D, E, G, A — 避免小二度/大七度等刺耳音程
  const PENTATONIC = [0, 2, 4, 7, 9];
  // 本回合投入次數（G._turnPitchOffset）映射到五聲音階音高偏移（半音數）
  // 單一投入內部不再每步升調，只依「本回合投入次數」決定本次音高
  function pitchOffset(){
    const n = (typeof G!=='undefined' && G && G._turnPitchOffset) || 0;
    const octave = Math.floor(n / PENTATONIC.length);
    const idx = n % PENTATONIC.length;
    return Math.min(36, octave * 12 + PENTATONIC[idx]);
  }
  // 設施通過音效：音調只依本回合投入次數（不隨 step 變化），step 參數保留相容
  function hit(_step){
    try{
      const c=getCtx(); if(c.state==='suspended') c.resume();
      const freq=261.63*Math.pow(2,pitchOffset()/12); // C4 + 五聲音階位移
      const osc=c.createOscillator();
      const gain=c.createGain();
      osc.type='triangle';
      osc.frequency.value=freq;
      gain.gain.setValueAtTime(0.12,c.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.15);
      osc.connect(gain); gain.connect(c.destination);
      osc.start(c.currentTime); osc.stop(c.currentTime+0.15);
    }catch(e){}
  }
  // 轉換音效（類型改變時）— 同樣只依本回合投入次數
  function convert(_step){
    try{
      const c=getCtx(); if(c.state==='suspended') c.resume();
      const freq=329.63*Math.pow(2,pitchOffset()/12); // E4 + 五聲音階位移
      const osc=c.createOscillator();
      const gain=c.createGain();
      osc.type='sine';
      osc.frequency.value=freq;
      gain.gain.setValueAtTime(0.10,c.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.2);
      osc.connect(gain); gain.connect(c.destination);
      osc.start(c.currentTime); osc.stop(c.currentTime+0.2);
    }catch(e){}
  }
  // 放置設施音效：短促「咔」聲 + 高音琶音（實心、打擊感）
  function place(){
    try{
      const c=getCtx(); if(c.state==='suspended') c.resume();
      // 低音「咔」
      const osc1=c.createOscillator();
      const gain1=c.createGain();
      osc1.type='square';
      osc1.frequency.setValueAtTime(180,c.currentTime);
      osc1.frequency.exponentialRampToValueAtTime(80,c.currentTime+0.06);
      gain1.gain.setValueAtTime(0.08,c.currentTime);
      gain1.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.08);
      osc1.connect(gain1); gain1.connect(c.destination);
      osc1.start(c.currentTime); osc1.stop(c.currentTime+0.08);
      // 高音亮片
      const osc2=c.createOscillator();
      const gain2=c.createGain();
      osc2.type='triangle';
      osc2.frequency.setValueAtTime(880,c.currentTime+0.04);
      osc2.frequency.exponentialRampToValueAtTime(1760,c.currentTime+0.16);
      gain2.gain.setValueAtTime(0.05,c.currentTime+0.04);
      gain2.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.22);
      osc2.connect(gain2); gain2.connect(c.destination);
      osc2.start(c.currentTime+0.04); osc2.stop(c.currentTime+0.22);
    }catch(e){}
  }
  // 疊加設施音效：雙音和弦 + 柔和泛音（蕾雅 / 物流之王 / 倉儲女王 / 大財團 取代）
  // 與 place() 明顯不同：無低音咔聲，改為上行小和弦琶音
  function placeOverlay(){
    try{
      const c=getCtx(); if(c.state==='suspended') c.resume();
      // 上行琶音：E5 → G5 → B5（大三和弦）
      [659.25, 783.99, 987.77].forEach((freq,i)=>{
        const osc=c.createOscillator();
        const gain=c.createGain();
        osc.type='sine';
        osc.frequency.value=freq;
        const t=c.currentTime+i*0.05;
        gain.gain.setValueAtTime(0.07,t);
        gain.gain.exponentialRampToValueAtTime(0.001,t+0.28);
        osc.connect(gain); gain.connect(c.destination);
        osc.start(t); osc.stop(t+0.28);
      });
      // 加上柔和的 2x 諧波鋪底
      const osc2=c.createOscillator();
      const gain2=c.createGain();
      osc2.type='triangle';
      osc2.frequency.value=329.63; // E4
      gain2.gain.setValueAtTime(0.04,c.currentTime);
      gain2.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.35);
      osc2.connect(gain2); gain2.connect(c.destination);
      osc2.start(c.currentTime); osc2.stop(c.currentTime+0.35);
    }catch(e){}
  }
  // 收益結算音效
  function settle(){
    try{
      const c=getCtx(); if(c.state==='suspended') c.resume();
      [523.25,659.25,783.99].forEach((freq,i)=>{
        const osc=c.createOscillator();
        const gain=c.createGain();
        osc.type='sine';
        osc.frequency.value=freq;
        gain.gain.setValueAtTime(0.08,c.currentTime+i*0.08);
        gain.gain.exponentialRampToValueAtTime(0.001,c.currentTime+i*0.08+0.25);
        osc.connect(gain); gain.connect(c.destination);
        osc.start(c.currentTime+i*0.08); osc.stop(c.currentTime+i*0.08+0.25);
      });
    }catch(e){}
  }
  return {hit,convert,settle,place,placeOverlay};
})();

// 把 desc 開頭（以「。」分隔的首幾句）中的詞條關鍵字包成 span
// 只處理「。」前綴段的單詞（避免誤標後續句子中的一般用字）
function highlightDescTags(desc){
  if(!desc||typeof desc!=='string') return desc||'';
  // 只檢查開頭一段（第一個句號之前的前綴），通常是分號連接的詞條
  const firstDotIdx=desc.indexOf('。');
  if(firstDotIdx<=0) return desc;
  let prefix=desc.slice(0,firstDotIdx);
  const rest=desc.slice(firstDotIdx);
  TAG_KEYWORDS_MAP.forEach(({cn,cls})=>{
    // 使用 split/join 逐次替換，避免已 wrap 過的 span 內容被重複包
    if(prefix.includes(cn)){
      prefix=prefix.split(cn).join(`<span class="tag-chip ${cls}">${cn}</span>`);
    }
  });
  return prefix+rest;
}

// ── 稀有度×輪數 出現權重 ──
// 回傳一個 0~1+ 的權重乘數，低輪數壓制高稀有度，高輪數釋放
// round: 當前輪數
// rarity: 'N'|'R'|'SR'|'SSR'
function rarityWeightByRound(round, rarity){
  // 基礎權重表：每個稀有度在各輪數區間的出現倍率
  // N:   總是可用，但隨輪數遞減（讓位給高稀有度）
  // R:   第1輪起少量出現，第2輪起正常
  // SR:  第1~2輪極低，第3輪起漸增
  // SSR: 第1~3輪極低，第4輪起漸增，第6輪起正常
  if(rarity==='N'){
    // N 權重隨輪數緩慢降低（但永不為 0）
    return Math.max(0.3, 1.0 - (round-1)*0.07);
  }
  if(rarity==='R'){
    if(round<=1) return 0.3;
    if(round<=2) return 0.7;
    return 1.0;
  }
  if(rarity==='SR'){
    if(round<=1) return 0.05;
    if(round<=2) return 0.15;
    if(round<=3) return 0.4;
    if(round<=4) return 0.7;
    return 1.0;
  }
  if(rarity==='SSR'){
    if(round<=2) return 0.02;
    if(round<=3) return 0.05;
    if(round<=4) return 0.15;
    if(round<=5) return 0.35;
    if(round<=6) return 0.6;
    return 1.0;
  }
  return 1.0;
}

const TAG_WEIGHT=0.12; // 每個匹配詞條加 12% 權重

// 計算玩家當前擁有的詞條計數
function getPlayerTagCounts(){
  const tc={};
  const _add=id=>{ if(TAGS[id]) TAGS[id].forEach(t=>tc[t]=(tc[t]||0)+1); };
  // 小鎮設施
  const gn=GN();
  for(let r=0;r<gn;r++) for(let c=0;c<gn;c++){
    const b=G.grid[r]&&G.grid[r][c];
    if(b&&b!=='ruin') _add(b);
  }
  // 手牌
  G.hand.forEach(h=>{
    if(h.compound){ h.parts.forEach(p=>_add(p)); }
    else { for(let i=0;i<h.count;i++) _add(h.id); }
  });
  // 合夥人
  G.partners.forEach(pid=>_add(pid));
  return tc;
}

// 根據詞條 + 稀有度×輪數 計算候選項權重
function tagWeightFor(id, tagCounts){
  const tags=TAGS[id];
  let w=1;
  if(tags) tags.forEach(t=>{ if(tagCounts[t]) w+=tagCounts[t]*TAG_WEIGHT; });
  // 稀有度×輪數權重乘數
  const rarity=getItemRarity(id);
  const round=G&&G.round||1;
  w*=rarityWeightByRound(round,rarity);
  return Math.max(0.01, w); // 永不為 0，保證極小機率仍可出現
}

// 加權隨機抽取 n 個不重複項目
function weightedPickN(pool, n, tagCounts){
  if(!tagCounts) tagCounts=getPlayerTagCounts();
  const items=pool.map(id=>({id, w:tagWeightFor(id, tagCounts)}));
  const result=[];
  while(result.length<n&&items.length>0){
    const total=items.reduce((s,x)=>s+x.w,0);
    let r=Math.random()*total;
    let idx=0;
    for(let i=0;i<items.length;i++){
      r-=items[i].w;
      if(r<=0){idx=i;break;}
    }
    result.push(items[idx].id);
    items.splice(idx,1);
  }
  return result;
}

let _safetyNetRoll=false; // 本回合安全網是否已判定
function checkSafetyNet(){
  // 每回合只判定一次，多處呼叫共用結果
  if(_safetyNetRoll!==false) return _safetyNetRoll;
  const z=G._zeroProfitTurns||0, used=G._safetyNetUsed||0;
  if(z<3||used>=4){ _safetyNetRoll=false; return false; }
  const chance=[1,0.75,0.5,0.25][used]||0;
  _safetyNetRoll=Math.random()<chance;
  if(_safetyNetRoll){ G._safetyNetUsed=used+1; G._zeroProfitTurns=0; }
  return _safetyNetRoll;
}

function findHeatwaveTarget(){
  let target=null, bestVal=0;
  const pathFacs=(G.inv.facPath||[]);
  const hw=G._heatwave||{facProfits:{}};
  eachCell((r,c,b)=>{
    if(!isFacility(b)) return;
    const cumProfit=hw.facProfits[b]||0;
    const turnProfit=G.inv.facProfitMap&&G.inv.facProfitMap[b]||0;
    const inPath=pathFacs.includes(b);
    const score=cumProfit+turnProfit+(inPath?50:0);
    if(score>bestVal){ bestVal=score; target=[r,c]; }
  });
  return target;
}
function checkHeatwave(){
  if(TUT.isBlocking()) return;
  if(!G._heatwave) G._heatwave={facProfits:{}, samePathCount:0, lastPath:''};
  const hw=G._heatwave;
  // 更新設施收益追蹤
  if(G.inv.facProfitMap) Object.entries(G.inv.facProfitMap).forEach(([k,v])=>{ hw.facProfits[k]=(hw.facProfits[k]||0)+v; });
  // 更新路徑歷史（方向+設施序列）——跨輪累計
  const pathKey=(G.inv.sendDir||'')+'|'+(G.inv.facPath||[]).join(',');
  if(pathKey===hw.lastPath) hw.samePathCount++;
  else { hw.samePathCount=1; hw.lastPath=pathKey; }

  // 觸發方式A：收益超過目標100倍
  if(G.profit>=G.goal*100){
    const t=findHeatwaveTarget();
    if(t){ hw.facProfits={}; hw.samePathCount=0; hw.lastPath=''; triggerHeatwave(t); return; }
  }

  // 觸發方式B：條件放寬（跨輪累計路徑 + 1 回合達標）
  const rh=G.roundHistory||[];
  const cond1=rh.length>=3&&rh.slice(-3).every(r=>r.turnsUsed<=1); // 連續 3 輪 1 回合達標
  const cond2=(G.inv.facHit||0)<4;                                  // 經過少於 4 設施
  const cond3=Object.values(hw.facProfits).some(v=>v>G.goal*1.5);   // 有設施累積收益 > 目標 150%
  const cond4=hw.samePathCount>=3;                                   // 連續 3 次相同路徑（跨輪計算）
  if(!(cond1&&cond2&&cond3&&cond4)) return;

  const t=findHeatwaveTarget();
  hw.facProfits={}; hw.samePathCount=0; hw.lastPath='';
  if(t) triggerHeatwave(t);
}

  const dirs=['left','right','top','bottom'];

function eachCell(fn){ for(let r=0;r<GN();r++) for(let c=0;c<GN();c++) fn(r,c,G.grid[r][c]); }
function findCells(pred){ const res=[]; eachCell((r,c,b)=>{ if(pred(r,c,b)) res.push([r,c]); }); return res; }
function findFacilityCells(){ return findCells((r,c,b)=>isFacility(b)); }
function cellQ(r,c){ return document.querySelector(`[data-r="${r}"][data-c="${c}"]`); }
function saveGridSnapshot(){
  G._gridSnapshot=G.grid.map(r=>[...r]);
  G._keyedSnapshot={};
  KEYED_DATA_FIELDS.forEach(dk=>{ G._keyedSnapshot[dk]=JSON.parse(JSON.stringify(G[dk]||{})); });
  G._ruinCellsSnapshot=G.ruinCells?new Set(G.ruinCells):new Set();
}
function restoreGridSnapshot(){
  if(!G._gridSnapshot) return;
  G.grid=G._gridSnapshot;
  if(G._keyedSnapshot) KEYED_DATA_FIELDS.forEach(dk=>{ G[dk]=G._keyedSnapshot[dk]||{}; });
  if(G._ruinCellsSnapshot) G.ruinCells=G._ruinCellsSnapshot;
  deleteGridSnapshot();
}
function deleteGridSnapshot(){
  delete G._gridSnapshot; delete G._keyedSnapshot; delete G._ruinCellsSnapshot;
}

function applyRowColPctMod(axis,idx,val){
  if(!G.cellPctMods) G.cellPctMods={};
  for(let i=0;i<GN();i++){
    const key=axis==='row'?`${idx},${i}`:`${i},${idx}`;
    G.cellPctMods[key]=(G.cellPctMods[key]||0)+val;
  }
  flashModCells(axis,idx,val);
}
function apply2x2PctMod(r,c,val){
  if(!G.cellPctMods) G.cellPctMods={};
  for(let dr=0;dr<2;dr++) for(let dc=0;dc<2;dc++){
    const key=`${r+dr},${c+dc}`;
    G.cellPctMods[key]=(G.cellPctMods[key]||0)+val;
  }
  flash2x2Cells(r,c,val);
}
function flashModCells(axis,idx,val){
  setTimeout(()=>{
    for(let i=0;i<GN();i++){
      const [r,ci]=axis==='row'?[idx,i]:[i,idx];
      const el=cellQ(r,ci);
      if(el){ el.style.outline=`3px solid ${val>0?'var(--green)':'var(--red)'}`;
        setTimeout(()=>el.style.outline='',1200); }
    }
  },100);
}
function flash2x2Cells(r,c,val){
  setTimeout(()=>{
    for(let dr=0;dr<2;dr++) for(let dc=0;dc<2;dc++){
      const el=cellQ(r+dr,c+dc);
      if(el){ el.style.outline=`3px solid ${val>0?'var(--green)':'var(--red)'}`;
        setTimeout(()=>el.style.outline='',1200); }
    }
  },100);
}

function startRound(){
  G.cellMods={};
  G.cellPctMods={};
  // 保留上一輪未觸發的預告事件，每次延遲提前觸發回合
  if(G.nextEvent){
    G._eventDeferred=(G._eventDeferred||0)+1;
    // 每延遲一次，觸發回合提前 1（最早第 1 回合立即觸發）
    G.nextEventTurn=Math.max(1, EVENT_INTERVAL - G._eventDeferred);
    G.nextEventData=precomputeEventData(G.nextEvent);
  } else {
    G._eventDeferred=0;
    pickNextEvent();
  }
  pickActionOptions();
  // 大熱波：每輪重置設施收益追蹤（samePathCount 跨輪保留以偵測固定路徑）
  if(G._heatwave){ G._heatwave.facProfits={}; }
  // partner round start effects
  G.partners.forEach(pid=>{
    const p=PARTNERS[pid];
    if(p&&p.onRoundStart){
      try{ p.onRoundStart(G); }
      catch(e){ console.warn('partner.onRoundStart 失敗:',pid,e); }
    }
  });
  // 稅務局升級邏輯已移至 startTurn()，每回合觸發
  addLog(`══ 第 ${G.round} 輪　目標收益：${G.goal} ══`,'w');
  // 第一回合的 onTurnStart/場風/UI 統一由 startTurn() 處理（避免重複觸發）
  startTurn();
}

function commitTurnLog(){

  if(!G.turnLogHistory) G.turnLogHistory=[];
  if(G.turnLog&&G.turnLog.length>0){
    G.turnLogHistory.unshift({turn:G.turn, round:G.round, entries:[...G.turnLog]});

  G.turnLog=[];
}
function addHand(id,n=1){

const COMPOUND_EXCLUDE=new Set([
  'mat_factory','factory','shop','refinery','warehouse','booster','converter',
  'bomb_device','envy_factory','ruin','ruin_monument',
  'dept_store','dept_store_part',
  'logistics_up','logistics_down','logistics_left','logistics_right','logistics_center',

  'giant_village','ancient_factory','world_wonder','mega_elec_supply','disaster_bureau',

  'trade_hub','tech_lab','center_trade','center_tech','center_factory_bureau','center_shop_bureau','center_mat_bureau','center_elec_net'
]);
let _compoundSeq=0;
const COMPOUND_DIRS=[{dr:0,dc:1,label:'→'},{dr:0,dc:-1,label:'←'},{dr:-1,dc:0,label:'↑'},{dr:1,dc:0,label:'↓'}];

function addHandMaybeCompound(id){
  if(COMPOUND_EXCLUDE.has(id)||!BLDG[id]){ addHand(id); return; }
  if(Math.random()<1/3){
    const pool=Object.keys(BLDG).filter(bid=>!COMPOUND_EXCLUDE.has(bid)&&bid!==id);
    if(!pool.length){ addHand(id); return; }
    const partner=weightedPickN(pool,1)[0];
    const dir=COMPOUND_DIRS[Math.floor(Math.random()*COMPOUND_DIRS.length)];
    G.hand.push({
      id:`compound_${++_compoundSeq}`,
      compound:true,
      parts:[id,partner],
      dr:dir.dr, dc:dir.dc, dirLabel:dir.label,
      count:1
    });
    addLog(`🔗 複合設施！${BLDG[id].emoji}${BLDG[id].name} ${dir.label} ${BLDG[partner].emoji}${BLDG[partner].name}`,'w');
  } else {
    addHand(id);
  }
}

// ── 百貨公司 2×2 放置：尋找包含(r,c)的 2×2 商店區域 ──
function _isNonDeptShop(bId){ return isShopType(bId)&&bId!=='dept_store'&&bId!=='dept_store_part'; }
function findShop2x2(r,c){
  const gn=GN();
  // 檢查(r,c)可能作為哪個 2x2 的一部分（4 種可能的左上角），排除已有的百貨公司
  for(let dr=0;dr>=-1;dr--) for(let dc=0;dc>=-1;dc--){
    const tr=r+dr, tc=c+dc;
    if(tr<0||tc<0||tr+1>=gn||tc+1>=gn) continue;
    if(_isNonDeptShop(G.grid[tr][tc])&&_isNonDeptShop(G.grid[tr][tc+1])&&
       _isNonDeptShop(G.grid[tr+1][tc])&&_isNonDeptShop(G.grid[tr+1][tc+1])) return [tr,tc];
  }
  return null;
}

// ── 大財團：大型設施可取代 2×2 非大型區域。找一個 2×2（含(r,c)），4 格都是空格或可消滅的非大型設施 ──
function _isEmptyOrNonLargeDestructible(bId){
  if(!bId) return true; // 空格
  if(bId==='ruin') return false; // 廢墟不取代
  const b=BLDG[bId];
  if(!b) return false;
  if(b.isLarge) return false; // 大型設施不取代
  if(b.indestructible) return false; // 不可消滅不取代
  if(bId==='dept_store'||bId==='dept_store_part') return false; // 百貨公司另有規則
  return true;
}
function findAny2x2(r,c){
  const gn=GN();
  for(let dr=0;dr>=-1;dr--) for(let dc=0;dc>=-1;dc--){
    const tr=r+dr, tc=c+dc;
    if(tr<0||tc<0||tr+1>=gn||tc+1>=gn) continue;
    if(_isEmptyOrNonLargeDestructible(G.grid[tr][tc])&&_isEmptyOrNonLargeDestructible(G.grid[tr][tc+1])&&
       _isEmptyOrNonLargeDestructible(G.grid[tr+1][tc])&&_isEmptyOrNonLargeDestructible(G.grid[tr+1][tc+1])) return [tr,tc];
  }
  return null;
}
function placeDeptStore(r,c,anchor){
  const [tr,tc]=anchor;
  // 清除 4 格的舊資料
  for(let dr=0;dr<2;dr++) for(let dc=0;dc<2;dc++){
    const key=`${tr+dr},${tc+dc}`;
    delete G.bldgUpgrades[key];
    delete G.leyaPctMods[key];
  }
  // 放置：左上為 anchor，其餘為 part
  G.grid[tr][tc]='dept_store';
  G.grid[tr][tc+1]='dept_store_part';
  G.grid[tr+1][tc]='dept_store_part';
  G.grid[tr+1][tc+1]='dept_store_part';
  if(!G.deptStoreAnchors) G.deptStoreAnchors={};
  const ak=`${tr},${tc}`;
  G.deptStoreAnchors[ak]=true;
  // 記錄哪些格子屬於這個百貨公司
  [`${tr},${tc+1}`,`${tr+1},${tc}`,`${tr+1},${tc+1}`].forEach(k=>{
    if(!G.deptStoreParts) G.deptStoreParts={};
    G.deptStoreParts[k]=ak;
  });
}

function isCompoundHand(h){ return h&&h.compound===true; }
function getCompoundSecondCell(r,c,h){ return [r+h.dr, c+h.dc]; }
function canPlaceCompound(r,c,h){
  const gn=GN();
  const [r2,c2]=getCompoundSecondCell(r,c,h);
  if(r<0||r>=gn||c<0||c>=gn||r2<0||r2>=gn||c2<0||c2>=gn) return false;
  if(G.grid[r][c]||G.grid[r2][c2]) return false;
  return true;
}

  if(ev&&ev.classList.contains('show')) return true;
  const cc=document.getElementById('card-chooser');
  if(cc&&cc.style.display==='flex') return true;
  const ac=document.getElementById('action-chooser');
  if(ac&&ac.style.display==='flex') return true;
  return false;
}
function evDone(){
  hideEv();
  G.actionOptions=[];
  // 惡魔巨人：每次觸發「市場事件」後，挑選（玩家選）一個合夥人消滅（排除自身）
  const eventId = G._currentEventId;
  G._currentEventId = null;
  const isMarketEvent = MARKET_EVENT_IDS.indexOf(eventId) >= 0;
  if(isMarketEvent && hasPartner('demon_giant') && !isDemonNegDisabled('demon_giant')){
    const candidates = G.partners.filter(pid=>pid!=='demon_giant');
    if(candidates.length>0){
      showDemonGiantChooser(candidates);
      return; // 由 chooser 的 onclick 接續 startTurn
    }
  }
  startTurn();
}

function showDemonGiantChooser(candidates){
  const cards = candidates.map(pid=>{
    const p = PARTNERS[pid];
    return {
      emoji: p.emoji,
      name: p.name,
      desc: p.desc||'',
      pos: p.pos||'',
      neg: p.neg||'',
      onclick: `cardChooserPick(()=>{ demonGiantDestroy('${pid}'); })`
    };
  });
  showCardChooser('👹 惡魔巨人：挑選一位合夥人消滅（市場事件後觸發）', cards, null);
  // 隱藏取消按鈕：此選擇是強制的
  const skipBtn = document.getElementById('card-chooser-skip');
  if(skipBtn) skipBtn.style.display = 'none';
}

function demonGiantDestroy(pid){
  const p = PARTNERS[pid];
  G.partners = G.partners.filter(x=>x!==pid);
  if(p) addLog(`👹 惡魔巨人：${p.emoji}${p.name} 被消滅！`,'b');
  startTurn();
}
function evPick(id,fromEl){
  const handBefore=G.hand.length;
  addHandMaybeCompound(id);
  // addHandMaybeCompound 已在複合時 addLog，普通時這裡補 log
  const wasCompound=G.hand.length>handBefore&&G.hand[G.hand.length-1].compound;
  if(!wasCompound) addLog(`🎁 獲得 ${BLDG[id].emoji}${BLDG[id].name}！`,'g');
  if(fromEl){
    const src=fromEl.getBoundingClientRect();
    const dst=document.getElementById('hand-list').getBoundingClientRect();
    const fly=document.createElement('div');
    fly.textContent=BLDG[id].emoji;
    fly.style.cssText=`position:fixed;left:${src.left+src.width/2}px;top:${src.top+src.height/2}px;
      font-size:28px;pointer-events:none;z-index:500;transition:all .6s cubic-bezier(.4,0,.2,1);`;
    document.body.appendChild(fly);
    setTimeout(()=>{
      fly.style.left=(dst.left+20)+'px';
      fly.style.top=(dst.top+10)+'px';
      fly.style.opacity='0';fly.style.fontSize='14px';
    },30);
    setTimeout(()=>fly.remove(),700);
  }
  hideEv();
  closeCardChooser();
  closeActionOverlay();
  G.actionOptions=[];
  startTurn();
}

function selBldg(id){
  if(G.phase!=='place')return;
  G.sel=G.sel===id?null:id;
  if(G.sel&&BLDG[G.sel]&&BLDG[G.sel].ruinOnly){
    const count=G.ruinCells?G.ruinCells.size:0;
    if(count===0) addLog('🗿 目前沒有廢墟格可放置','b');
    else addLog(`🗿 請點擊廢墟格（灰色斜紋格子）放置，共${count}個`,'w');
  }
  render();
  renderFanHand();
}
// ══════════════════════════════════════
// 統一放置邏輯（click / drag 共用）
// 回傳 true=放置成功, false=無法放置（保留選取）
// ══════════════════════════════════════
function tryPlaceAtCell(r,c,bldgId){
  if(!bldgId) return false;
  const handItem=G.hand.find(h=>h.id===bldgId);

  // ── 複合設施 ──
  if(handItem&&isCompoundHand(handItem)){
    if(!canPlaceCompound(r,c,handItem)){
      const [r2,c2]=getCompoundSecondCell(r,c,handItem);
      const gn=GN();
      if(r2<0||r2>=gn||c2<0||c2>=gn) addLog('🔗 複合設施：第二格超出邊界','b');
      else if(G.grid[r][c]) addLog('🔗 複合設施：錨點格子已有設施','b');
      else addLog('🔗 複合設施：第二格已有設施','b');
      return false;
    }
    const [r2,c2]=getCompoundSecondCell(r,c,handItem);
    handItem.count--;
    G.grid[r][c]=handItem.parts[0];
    G.grid[r2][c2]=handItem.parts[1];
    addLog(`🔗 放置複合：${BLDG[handItem.parts[0]].emoji}${BLDG[handItem.parts[0]].name} (${r+1},${c+1}) + ${BLDG[handItem.parts[1]].emoji}${BLDG[handItem.parts[1]].name} (${r2+1},${c2+1})`,'g');
    pulse(r,c); pulse(r2,c2); render();
    return true;
  }

  // ── 蕾雅：手牌百貨公司 疊加於 小鎮百貨公司 上（視為不同建築，永久+2）──
  if(bldgId==='dept_store'&&hasPartner('leya')){
    const clickedBId=G.grid[r][c];
    if(clickedBId==='dept_store'||clickedBId==='dept_store_part'){
      if(!handItem||handItem.count<=0){ addLog('👩‍🔧 蕾雅：手牌不足','b'); return false; }
      // 找到錨點
      let ar=r,ac=c;
      if(clickedBId==='dept_store_part'){
        const ak=G.deptStoreParts[`${r},${c}`];
        if(ak){[ar,ac]=ak.split(',').map(Number);}
      }
      handItem.count--;
      // 錨點疊加 dept_store（視為不同建築）
      const ovs=getOverlays(ar,ac);
      ovs.push('dept_store');
      setOverlays(ar,ac,ovs);
      // 錨點永久 +2（dept_store FX 會聚合 2×2 四格的 bldgUpgrades）
      const ak=`${ar},${ac}`;
      G.bldgUpgrades[ak]=(G.bldgUpgrades[ak]||0)+2;
      addLog(`👩‍🔧 蕾雅：🏬 百貨公司 疊加於 (${ar+1},${ac+1})，永久+2（共${G.bldgUpgrades[ak]}）`,'g');
      placeEffect(ar,ac,{overlay:true,bldgId:'dept_store'}); render();
      return true;
    }
  }

  // ── 大型設施數量限制（isLarge）：小鎮中只能存在一個大型設施，惡魔巨人豁免 ──
  if(BLDG[bldgId]&&BLDG[bldgId].isLarge&&!hasPartner('demon_giant')){
    const hasOtherLarge=findCells((rr,cc,bb)=>bb&&BLDG[bb]&&BLDG[bb].isLarge).length>0;
    if(hasOtherLarge){
      addLog(`🚫 ${BLDG[bldgId].name}：小鎮中只能存在一個大型設施（惡魔巨人可豁免）`,'b');
      return false;
    }
  }

  // ── 百貨公司 / 大型設施 2×2 放置 ──
  if(BLDG[bldgId]&&BLDG[bldgId].needs2x2){
    const isDept=bldgId==='dept_store';
    // 先試專屬條件（百貨公司：2×2 商店）
    let anchor = isDept ? findShop2x2(r,c) : null;
    let useBigCorp = false;
    // 大財團：若專屬條件失敗（或本來就不是 dept_store），嘗試任意 2×2 非大型區域
    if(!anchor && hasPartner('big_corp')){
      anchor = findAny2x2(r,c);
      if(anchor) useBigCorp = true;
    }
    if(!anchor){
      if(isDept) addLog('🏬 百貨公司需要 2×2 的一般商店區域（不含已有的百貨公司）','b');
      else addLog(`🚫 ${BLDG[bldgId].name}需要 2×2 空間（大財團可取代非大型區域）`,'b');
      return false;
    }
    if(!handItem||handItem.count<=0) return false;
    const [tr,tc]=anchor;
    // 大財團：先消滅 2×2 內現有的非大型設施
    if(useBigCorp){
      let destroyed=0;
      for(let dr=0;dr<2;dr++) for(let dc=0;dc<2;dc++){
        const er=tr+dr, ec=tc+dc;
        if(G.grid[er][ec] && G.grid[er][ec]!=='ruin'){
          const destroyedName=BLDG[G.grid[er][ec]]?.name||'設施';
          destroyFacility(er,ec);
          destroyed++;
          addLog(`🏢 大財團：消滅 ${destroyedName} (${er+1},${ec+1})`,'b');
        }
      }
      if(destroyed>0) addLog(`🏢 大財團：${BLDG[bldgId].name} 取代 ${destroyed} 個非大型設施`,'g');
    }
    handItem.count--;
    if(isDept){
      addLog(`🏬 百貨公司：取代 2×2 ${useBigCorp?'區域':'商店'} (${tr+1},${tc+1})~(${tr+2},${tc+2})`,'g');
      placeDeptStore(r,c,anchor);
    } else {
      // 非百貨公司的大型設施：目前實作為單格（居主格），其餘 3 格以 null 佔住 anchor 標記
      // 依現行實作保持單格行為，僅消滅 2×2 區域釋出空間
      G.grid[r][c]=bldgId;
      addLog(`放置 ${BLDG[bldgId].emoji}${BLDG[bldgId].name} (${r+1},${c+1})`,'g');
    }
    placeEffect(tr,tc); render();
    return true;
  }

  // ── 蕾雅：相同設施疊加（視為不同建築，每次永久 +2）──
  if(G.grid[r][c]&&G.grid[r][c]===bldgId&&hasPartner('leya')){
    if(!handItem||handItem.count<=0){ addLog('👩‍🔧 蕾雅：手牌不足','b'); return false; }
    handItem.count--;
    const ovs=getOverlays(r,c);
    ovs.push(bldgId);
    setOverlays(r,c,ovs);
    const k=`${r},${c}`;
    G.bldgUpgrades[k]=(G.bldgUpgrades[k]||0)+2;
    addLog(`👩‍🔧 蕾雅：${BLDG[bldgId].emoji}${BLDG[bldgId].name} 疊加於 (${r+1},${c+1})，永久+2（共${G.bldgUpgrades[k]}）`,'g');
    placeEffect(r,c,{overlay:true,bldgId}); render();
    return true;
  }

  // ── 廢墟紀念碑（ruinOnly） ──
  if(BLDG[bldgId]&&BLDG[bldgId].ruinOnly){
    if(G.grid[r][c]!=='ruin'){
      addLog(`🗿 廢墟紀念碑只能放在廢墟上！目前廢墟：${[...(G.ruinCells||[])].map(k=>{const[rr,cc]=k.split(',');return `(${+rr+1},${+cc+1})`;}).join(' ')||'無'}`,'b');
      return false;
    }
    if(!handItem||handItem.count<=0) return false;
    handItem.count--;
    G.grid[r][c]=bldgId;
    G.ruinCells&&G.ruinCells.delete(`${r},${c}`);
    addLog(`放置 ${BLDG[bldgId].emoji}${BLDG[bldgId].name} (${r+1},${c+1})（取代廢墟）`);
    placeEffect(r,c); render();
    return true;
  }

  // ── 中央限定 ──
  if(BLDG[bldgId]&&BLDG[bldgId].centerOnly&&!isCenterCell(r,c)){
    addLog(`🚫 ${BLDG[bldgId].name}只能放在中央區域！`,'b');
    return false;
  }

  // ── 物流之王/倉儲女王疊加 ──
  if(G.grid[r][c]&&(hasPartner('logistics_king')||hasPartner('storage_queen'))){
    const existing=BLDG[G.grid[r][c]];
    const placing=BLDG[bldgId];
    const ovs=getOverlays(r,c);
    const maxOv=hasPartner('storage_queen')?2:1;
    // 設施蓋在物流上，或物流蓋在設施上
    const facOnLog=existing&&existing.special==='redirect'&&placing&&placing.special!=='redirect'&&ovs.length<maxOv;
    const logOnFac=existing&&existing.special!=='redirect'&&placing&&placing.special==='redirect'&&isFacility(G.grid[r][c])&&ovs.length===0;
    if(facOnLog||logOnFac){
      if(!handItem||handItem.count<=0) return false;
      if(hasPartner('storage_queen')&&!hasPartner('logistics_king')){
        if(G.profit<2){ addLog('👑 倉儲女王：收益不足（需要2）','b'); return false; }
        G.profit-=2;
        addLog('👑 倉儲女王：疊加行動費 -2 收益','b');
      }
      handItem.count--;
      if(facOnLog){
        ovs.push(bldgId);
        setOverlays(r,c,ovs);
      } else {
        // 物流蓋在設施上：物流變底，原設施變 overlay
        setOverlays(r,c,[G.grid[r][c]]);
        G.grid[r][c]=bldgId;
      }
      const who=hasPartner('logistics_king')?'🚛 物流之王':'👑 倉儲女王';
      addLog(`${who}：${BLDG[bldgId].emoji}${BLDG[bldgId].name} 與 ${existing.emoji}${existing.name} 疊加！`,'g');
      // 轉運中心放置時選擇方向
      if(bldgId==='transfer_hub'||bldgId==='logistics_hub') showTransferHubDirPicker(r,c);
      placeEffect(r,c,{overlay:true,bldgId}); render();
      return true;
    }
  }
  if(G.grid[r][c]){
    addLog(G.grid[r][c]==='ruin'?'該格子是廢墟，無法放置設施':'該格子已有設施','b');
    return false;
  }

  // ── 一般放置 ──
  if(!handItem||handItem.count<=0) return false;
  handItem.count--;
  G.grid[r][c]=bldgId;
  // 期貨交易所：放置時決定本回合百分比
  if(bldgId==='futures_market'){
    if(!G.futuresPct) G.futuresPct={};
    G.futuresPct[`${r},${c}`]=Math.floor(Math.random()*21)-10;
  }
  TUT.hookPlace(bldgId);
  addLog(`放置 ${BLDG[bldgId].emoji}${BLDG[bldgId].name} (${r+1},${c+1})`);
  // 轉運中心：放置後選擇方向
  if(bldgId==='transfer_hub'||bldgId==='logistics_hub'){
    placeEffect(r,c); render();
    showTransferHubDirPicker(r,c);
    return true;
  }
  placeEffect(r,c);
  render();
  return true;
}

function onCell(r,c){
  // DEV 選定清除模式（優先攔截）
  if(DEV._selectClearCells){DEV.toggleSelectCell(r,c);return;}

  if(G.phase!=='place')return;

  // 擁慶記房屋賣出模式
  if(G._yongqingSellMode){
    yongqingSellCell(r,c);
    return;
  }

  // 爆破工程師摧毀模式
  if(G._demoExpertMode){
    const bId=G.grid[r][c];
    if(!bId){ addLog('🧨 請點擊有設施的格子','b'); return; }
    if(bId==='ruin'){ addLog('🧨 廢墟無法摧毀','b'); return; }
    if(BLDG[bId]&&BLDG[bId].indestructible){ addLog(`🧨 ${BLDG[bId].emoji}${BLDG[bId].name} 不可摧毀`,'b'); return; }
    G.profit-=8;
    addLog(`🧨 爆破工程師：失去8收益，摧毀 ${BLDG[bId].emoji}${BLDG[bId].name} (${r+1},${c+1})！`,'b');
    destroyFacility(r,c);
    G._demoExpertMode=false;
    render(); return;
  }

  // 提升設施模式
  if(G.upgradeMode){
    if(!G.grid[r][c]){addLog('請點擊有設施的格子','b');return;}
    upgradeCell(r,c);
    return;
  }

  // 移動都市：周圍 8 格兩兩交換（每回合一次）
  if(G._mobileCityMode){
    const mcCells=findCells((rr,cc,bb)=>bb==='mobile_city');
    const gn=GN();
    const inRangeOfAny=(rr,cc)=>mcCells.some(([mr,mc])=>Math.abs(rr-mr)<=1&&Math.abs(cc-mc)<=1&&!(rr===mr&&cc===mc));
    const bId=G.grid[r][c];
    if(!G._mobileCitySrc){
      if(!isFacility(bId)){addLog('🏙 請點擊移動都市周圍 8 格內的設施','b');return;}
      if(!inRangeOfAny(r,c)){addLog('🏙 該格不在任何移動都市周圍 8 格內','b');return;}
      if(bId==='mobile_city'){addLog('🏙 不能選擇移動都市本身','b');return;}
      if(bId==='dept_store'||bId==='dept_store_part'){addLog('🏙 百貨公司不可移動','b');return;}
      G._mobileCitySrc=[r,c];
      addLog(`🏙 選中 ${BLDG[bId].emoji}${BLDG[bId].name} (${r+1},${c+1})，再點擊目標格（周圍 8 格內的空地/廢墟/設施）`);
      render(); return;
    } else {
      const [sr,sc]=G._mobileCitySrc;
      if(r===sr&&c===sc){G._mobileCitySrc=null;addLog('🏙 取消選擇');render();return;}
      if(!inRangeOfAny(r,c)){addLog('🏙 目標格不在任何移動都市周圍 8 格內','b');return;}
      if(bId==='mobile_city'){addLog('🏙 不能覆寫移動都市本身','b');return;}
      if(bId==='dept_store'||bId==='dept_store_part'){addLog('🏙 百貨公司不可移動','b');return;}
      const srcId=G.grid[sr][sc];
      swapCellData(sr,sc,r,c);
      onFacilityMoved(r,c,sr,sc);
      if(isFacility(bId)) onFacilityMoved(sr,sc,r,c);
      addLog(`🏙 移動都市：交換 ${BLDG[srcId].emoji}${BLDG[srcId].name} (${sr+1},${sc+1}) ↔ (${r+1},${c+1})`,'g');
      G._mobileCityMode=false;
      G._mobileCitySrc=null;
      G._mobileCityUsedThisTurn=true;
      pulse(r,c); render(); return;
    }
  }

  // 路線規劃師：免費移動一個物流中心
  if(G._freeMoveLogistics){
    const bId=G.grid[r][c];
    if(!G._freeMoveLogisticsSrc){
      // 第一次點擊：選擇物流中心
      if(!bId||BLDG[bId].special!=='redirect'){addLog('🗺️ 請點擊一個物流中心','b');return;}
      G._freeMoveLogisticsSrc=[r,c];
      addLog(`🗺️ 選中 ${BLDG[bId].emoji}${BLDG[bId].name} (${r+1},${c+1})，再點擊目標格子`);
      render(); return;
    } else {
      // 第二次點擊：移動到目標格
      const [sr,sc]=G._freeMoveLogisticsSrc;
      if(r===sr&&c===sc){G._freeMoveLogisticsSrc=null;addLog('🗺️ 取消選擇');render();return;}
      if(bId&&bId!=='ruin'){addLog('🗺️ 目標格子已有設施，請選擇空格或廢墟','b');return;}
      const srcId=G.grid[sr][sc];
      swapCellData(sr,sc,r,c);
      onFacilityMoved(r,c,sr,sc);
      addLog(`🗺️ 路線規劃師：移動 ${BLDG[srcId].emoji}${BLDG[srcId].name} (${sr+1},${sc+1})→(${r+1},${c+1})`,'g');
      G._freeMoveLogistics=false;
      G._freeMoveLogisticsSrc=null;
      pulse(r,c); render(); return;
    }
  }

  // 自由排列模式（拖曳設施到目標格子交換）
  if(G.freeRearrange){
    if(G.grid[r][c]&&G.grid[r][c]!=='ruin'){
      addLog(`💡 拖曳 ${BLDG[G.grid[r][c]].emoji}${BLDG[G.grid[r][c]].name} 到想要的位置`);
    }
    return;
  }

  // 一般移動設施模式
  if(G.moveMode){
    if(!G.moveSrc){
      if(!G.grid[r][c]){addLog('請點擊有設施的格子','b');return;}
      G.moveSrc=[r,c];
      addLog(`選中 ${BLDG[G.grid[r][c]].emoji}${BLDG[G.grid[r][c]].name}，再點空格放置`);
      render(); return;
    } else {
      const [sr,sc]=G.moveSrc;
      if(r===sr&&c===sc){G.moveSrc=null;render();return;}
      if(G.grid[r][c]){addLog('目標格子已有設施','b');return;}
      const bName=BLDG[G.grid[sr][sc]].emoji+BLDG[G.grid[sr][sc]].name;
      swapCellData(sr,sc,r,c);
      // 清除來源廢墟標記（目標原為空格）
      if(G.ruinCells) G.ruinCells.delete(`${sr},${sc}`);
      onFacilityMoved(r,c,sr,sc);
      addLog(`移動 ${bName} 到 (${r+1},${c+1})`,'g');
      G.moveMode=false;G.moveSrc=null;
      pulse(r,c);render(); return;
    }
  }

  // 正常放置模式
  if(!G.sel){addLog('請先選擇手牌設施','b');return;}
  if(tryPlaceAtCell(r,c,G.sel)) G.sel=null;
}

let cardDragging=false;

function onCardDragStart(e){
  if(G.phase!=='place'){e.preventDefault();return;}
  cardDragging=true;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain','el-card');
  document.body.classList.add('card-dragging');

// 設施拖曳到格子
let bldgDragging=null;
const _emptyDragImg=(()=>{const c=document.createElement('canvas');c.width=1;c.height=1;return c;})();
function onBldgDragStart(e,id){
  if(G.phase!=='place'){e.preventDefault();return;}
  const h=G.hand.find(h=>h.id===id);
  if(!h||h.count<=0){e.preventDefault();return;}
  hideCompoundPreview();
  bldgDragging=id;

  e.dataTransfer.setData('text/plain','bldg:'+id);
  e.dataTransfer.setDragImage(_emptyDragImg,0,0);

  document.querySelectorAll('.cell:not(.filled):not(.ruin-cell)').forEach(c=>c.classList.add('drag-target'));
}
function _clearBldgPreview(){
  document.querySelectorAll('.bldg-drag-preview').forEach(el=>el.remove());
  document.querySelectorAll('.compound-preview').forEach(el=>{el.classList.remove('compound-preview','drag-over-cell');});
  document.querySelectorAll('.drag-over-cell').forEach(el=>{el.classList.remove('drag-over-cell');el.style.outline='';el.style.boxShadow='';});
}
function _insertBldgPreview(cellEl, bId){
  if(!cellEl) return;
  const b=BLDG[bId]; if(!b) return;
  const div=document.createElement('div');
  div.className='bldg-drag-preview';
  div.style.cssText='position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;opacity:.55;z-index:2;';
  div.innerHTML=`<div class="cemoji">${b.emoji}</div><div class="cname">${b.name}</div>`;
  cellEl.appendChild(div);
}
function onBldgDragEnd(e){
  bldgDragging=null;
  _clearBldgPreview();
  document.querySelectorAll('.cell').forEach(c=>{c.classList.remove('drag-target');});
}
function onCellDragOver(e,r,c){
  if(!bldgDragging) return;
  // 複合設施：檢查兩格都可用
  const compH=G.hand.find(h=>h.id===bldgDragging&&h.compound);
  if(compH){
    _clearBldgPreview();
    if(!canPlaceCompound(r,c,compH)) return;
    e.preventDefault();
    const cellEl=cellQ(r,c);
    if(cellEl){ cellEl.classList.add('drag-over-cell','compound-preview'); }
    _insertBldgPreview(cellEl, compH.parts[0]);
    const [r2,c2]=getCompoundSecondCell(r,c,compH);
    const cell2=cellQ(r2,c2);
    if(cell2){ cell2.classList.add('drag-over-cell','compound-preview'); }
    _insertBldgPreview(cell2, compH.parts[1]);
    return;
  }
  // 百貨公司：2×2 預覽 或 蕾雅升級預覽
  if(bldgDragging==='dept_store'){
    _clearBldgPreview();
    // 蕾雅：拖到已有的百貨公司上 → 升級預覽
    if(hasPartner('leya')&&(G.grid[r][c]==='dept_store'||G.grid[r][c]==='dept_store_part')){
      e.preventDefault();
      const cellEl=cellQ(r,c);
      if(cellEl){cellEl.classList.add('drag-over-cell');cellEl.style.boxShadow='0 0 0 3px rgba(0,200,100,.4)';}
      return;
    }
    const anchor=findShop2x2(r,c);
    if(!anchor) return;
    e.preventDefault();
    const [tr,tc]=anchor;
    for(let dr=0;dr<2;dr++) for(let dc=0;dc<2;dc++){
      const cell=cellQ(tr+dr,tc+dc);
      if(cell){ cell.classList.add('drag-over-cell','compound-preview'); }
      if(dr===0&&dc===0) _insertBldgPreview(cell,'dept_store');
    }
    return;
  }
  // 中央限定：非中央格不預覽
  if(BLDG[bldgDragging]&&BLDG[bldgDragging].centerOnly&&!isCenterCell(r,c)) return;
  // 蕾雅：允許拖到相同設施的格子（百貨公司：拖到錨點或部分格都算）
  const isLeyaUpgrade = hasPartner('leya')&&(
    G.grid[r][c]===bldgDragging||
    (bldgDragging==='dept_store'&&(G.grid[r][c]==='dept_store'||G.grid[r][c]==='dept_store_part'))
  );
  // 廢墟紀念碑：允許拖到廢墟格
  const isRuinPlace = bldgDragging==='ruin_monument' && G.grid[r][c]==='ruin';
  // 物流之王/倉儲女王：允許雙向疊加
  const existB=G.grid[r][c]&&BLDG[G.grid[r][c]];
  const placingB=BLDG[bldgDragging];
  const hasOverlayPartner=hasPartner('logistics_king')||hasPartner('storage_queen');
  const _ovs=getOverlays(r,c), _maxOv=hasPartner('storage_queen')?2:1;
  const isOverlay = hasOverlayPartner&&existB&&(
    (existB.special==='redirect'&&placingB&&placingB.special!=='redirect'&&_ovs.length<_maxOv)||
    (existB.special!=='redirect'&&placingB&&placingB.special==='redirect'&&isFacility(G.grid[r][c])&&_ovs.length===0)
  );
  if(G.grid[r][c] && !isLeyaUpgrade && !isRuinPlace && !isOverlay) return;
  e.preventDefault();
  _clearBldgPreview();
  const cellEl=cellQ(r,c);
  if(cellEl) cellEl.classList.add('drag-over-cell');
  if((isLeyaUpgrade||isOverlay) && cellEl){
    cellEl.style.outline='3px solid var(--money)';
    cellEl.style.boxShadow='0 0 12px rgba(176,96,0,.45)';
  } else {
    _insertBldgPreview(cellEl, bldgDragging);
    if(isRuinPlace && cellEl) cellEl.style.outline='3px solid var(--money)';
  }
}
function onCellDragLeave(r,c){
  _clearBldgPreview();
}
function onCellDrop(e,r,c){
  e.preventDefault();
  _clearBldgPreview();
  document.querySelectorAll('.cell').forEach(el=>{el.classList.remove('drag-target');el.style.outline='';el.style.boxShadow='';});
  if(!bldgDragging) return;
  tryPlaceAtCell(r,c,bldgDragging);
  bldgDragging=null;
}

function sendEl(dir,idx){
  if(G.phase!=='place')return;
  // 工業化模式：跳過方向限制
  if(!G._industrializing){
    // 颱風：只能從指定方向投入
    if(G.buff&&G.buff.typhoonActive&&G.windDir&&dir!==G.windDir){
      addLog(`🌀 颱風：只能從 ${G.windDir} 方向投入！`,'b');
      return;
    }
    // 場風大師：只能從指定方向投入
    if(hasPartner('wind_master')&&G.windDir){
      if(dir!==G.windDir){
        addLog(`🌀 場風大師：本回合只能從 ${G.windDir} 方向投入！`,'b');
        return;
      }
    }
  }
  G.phase='animating';
  G._tutHitMatFactory = false; // 教學：每次投入重置
  G.sel=null;
  // 莫菲定律：追蹤重複投入模式
  const sendKey=`${dir},${idx}`;
  if(!G._murphyTrack) G._murphyTrack={lastSend:null,repeatCount:0,noMove:0};
  if(sendKey===G._murphyTrack.lastSend) G._murphyTrack.repeatCount++;
  else { G._murphyTrack.lastSend=sendKey; G._murphyTrack.repeatCount=1; }
  render();

  const path=[];
  const _N=GN();
  if(dir==='left')  for(let c=0;c<_N;c++)     path.push([idx,c]);
  if(dir==='right') for(let c=_N-1;c>=0;c--) path.push([idx,c]);
  if(dir==='top')   for(let r=0;r<_N;r++)     path.push([r,idx]);
  if(dir==='bottom')for(let r=_N-1;r>=0;r--)  path.push([r,idx]);

  let startCard = {...G.card};
  // Gluttony: swap material/goods
  if(hasPartner('gluttony') && !isDemonNegDisabled('gluttony')){
    if(startCard.type==='material') startCard={...startCard,type:'goods'};
    else if(startCard.type==='goods') startCard={...startCard,type:'material'};
  }
  G.inv={facHit:0, logSet:new Set(), envyPen:false, cenHits:0, logHits:0,
    speedAct:false, ampAct:false, fxM2G:false, fxG2M:false, arbM2G:false, arbG2M:false,
    windOK:hasPartner('wind_master')&&!!G.windDir, hwCenter:false, exchBoard:false,
    clearanceBonus:0, clearanceCells:[],
    facPath:[], facProfitMap:{}, sendDir:dir, sendIdx:idx, cellPath:[]};
  const startVal=startCard.value;
  const startType=startCard.type;
  let el={value:startVal,type:startType};
  const dname={left:'左側',right:'右側',top:'上方',bottom:'下方'}[dir];
  addLog(`▶ 送入 ${TLABEL[startType]} ${startVal}`,'h');
  updateCard(el);

  // 啟動移動器
  const mover=document.getElementById('el-mover');
  mover.style.display='flex';
  const emojis={money:'💵',material:'🪨',goods:'📦',diamond:'💎'};
  function updateMover(el){
    mover.querySelector('.mv-emoji').textContent=emojis[el.type]||'❓';
    mover.querySelector('.mv-val').textContent=el.value;
    mover.querySelector('.mv-val').style.color=TCOLOR[el.type]||'var(--tx)';
    mover.querySelector('.mv-type').textContent=TLABEL[el.type]||el.type;
    mover.style.borderColor=TCOLOR[el.type]||'var(--acc)';
  }
  updateMover(el);

  stepWithMover(path,el,0,startVal,mover,updateMover);
}
